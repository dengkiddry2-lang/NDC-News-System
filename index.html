<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPC Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f2f2f7;
  --black: #06000f; --dark1: #110820; --dark2: #0a0518;
  --dark3: #1a1030;
  --white: #fff; --offwhite: #fafafd;
  --border: rgba(255,255,255,0.1); --border-b: rgba(0,0,0,0.07);
  --tw: #f0eefa; --tw2: #b0a8c8; --tw3: #7a7090;
  --tb: #1a1028; --tb2: #5a5070; --tb3: #8a8098;
  --blue: #6e5cff; --blue2: #a78bfa;
  --must: #ff3b5c; --must2: #ff6b7a;
  --gold: #e8d5a3;
  --hero-grad: linear-gradient(160deg, #08001a 0%, #0d0525 40%, #080018 70%, #000d20 100%);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); font-family: 'Inter',-apple-system,'SF Pro Display','Helvetica Neue','Noto Sans TC',sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; color: var(--tb); }

/* ── GLOBAL NAV ── */
#gnav {
  height: 44px; background: rgba(0,0,0,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; position: sticky; top: 0; z-index: 900; gap: 0;
}
.gnav-left { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.gnav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
.gnav-name { font-size: 15px; font-weight: 600; color: var(--tw); letter-spacing: 0.02em; }
.gnav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; gap: 0; flex: 1; justify-content: center; }
.gnav-tabs::-webkit-scrollbar { display: none; }
.gnav-tab {
  padding: 0 14px; height: 44px; border: none; background: none;
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55);
  cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: color 0.15s; letter-spacing: 0.02em;
}
.gnav-tab:hover { color: var(--tw); }
.gnav-tab.active { color: var(--blue2); }
.gnav-date { font-size: 11px; color: var(--tw3); flex-shrink: 0; }

/* ── HERO ── */
.hero-block {
  background: var(--hero-grad);
  text-align: center;
  padding: 110px 24px 80px;
  border-bottom: 1px solid rgba(110,92,255,0.15);
  position: relative; overflow: hidden;
  transition: background 0.8s ease;
}
.hero-block::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 40%, rgba(110,92,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 75% 60%, rgba(100,60,180,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tw3); margin-bottom: 20px; }
.hero-headline { font-size: 72px; font-weight: 700; letter-spacing: -0.05em; line-height: 1.0; color: var(--tw); margin-bottom: 16px; }
.hero-sub { font-size: 21px; color: var(--tw2); font-weight: 300; margin-bottom: 56px; letter-spacing: -0.01em; }
.hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--blue2); margin-bottom: 20px; }
.hero-kpis { display: flex; justify-content: center; gap: 72px; padding-top: 40px; border-top: 1px solid var(--border); }
.kpi-val { font-size: 52px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
.kpi-val.red { color: var(--must2); }
.kpi-val.blue { color: var(--blue2); }
.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--tw3); margin-top: 8px; }

/* ── HIGHLIGHTS STRIP ── */
.highlights-section { background: var(--offwhite); padding: 40px 0 36px; border-bottom: 1px solid var(--border-b); }
.highlights-eyebrow { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; color: var(--tb); text-align: center; margin-bottom: 24px; }
.highlights-scroll {
  display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none;
  padding: 0 24px; scroll-snap-type: x mandatory;
}
.highlights-scroll::-webkit-scrollbar { display: none; }
.highlight-card {
  flex-shrink: 0; width: 160px; background: var(--white);
  border-radius: 18px; padding: 22px 18px; cursor: pointer;
  border: 1px solid rgba(110,92,255,0.15); scroll-snap-align: start;
  transition: transform 0.2s, box-shadow 0.2s;
}
.highlight-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(110,92,255,0.12); }
.highlight-card.highlight-must { background: linear-gradient(135deg, #ff3b5c, #7c3aed); border-color: transparent; }
.highlight-card.highlight-must .hl-label,
.highlight-card.highlight-must .hl-value { color: #fff; }
.hl-label { font-size: 13px; font-weight: 600; color: var(--tb); margin-bottom: 6px; letter-spacing: -0.01em; }
.hl-value { font-size: 13px; color: var(--tb3); font-weight: 400; }

/* ── CATEGORY BRICKS ── */
#brick-grid {
  background: var(--bg); display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px; padding: 12px;
}
.brick {
  border-radius: 22px; min-height: 440px;
  padding: 48px 40px; display: flex; flex-direction: column;
  justify-content: flex-end; cursor: pointer; position: relative;
  overflow: hidden; transition: transform 0.25s cubic-bezier(.25,.46,.45,.94);
}
.brick:hover { transform: scale(1.01); }
.brick-full { grid-column: 1 / -1; min-height: 480px; justify-content: center; align-items: flex-start; }
.brick-dark { background: var(--dark1); }
.brick-must-zone { background: #130828; }
.brick-must-zone .brick-eyebrow { color: var(--blue2); }
.brick-must-zone .brick-cta { color: var(--blue2); }
.brick-must-zone .brick-title { color: var(--tw); }
.brick-must-zone .brick-summary { color: var(--tw2); }
.brick-must-zone .brick-source { color: var(--tw3); }
.brick-light { background: var(--white); border: 1px solid var(--border-b); }

.brick-must-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #ff3b5c, #a78bfa); border-radius: 22px 22px 0 0; }
.brick-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 14px; }
.brick-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.25;
  color: var(--tw); margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.brick-full .brick-title { font-size: 28px; -webkit-line-clamp: 2; }
.brick-light .brick-title { color: var(--tb); }
.brick-summary {
  font-size: 15px; color: var(--tw2); line-height: 1.65; margin-bottom: 20px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.brick-full .brick-summary { -webkit-line-clamp: 4; }
.brick-source { font-size: 12px; color: var(--tw3); }
.brick-light .brick-source { color: var(--tb3); }
.brick-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.badge-must { background: var(--must); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em; }
.brick-light .brick-summary { color: var(--tb2); }
.brick-cta-row { display: flex; gap: 24px; align-items: center; }
.brick-cta { font-size: 17px; color: var(--blue); font-weight: 400; letter-spacing: -0.01em; }
.brick-cta2 { font-size: 17px; color: var(--tw2); font-weight: 400; letter-spacing: -0.01em; }
.brick-light .brick-cta2 { color: var(--tb2); }

/* ── CATEGORY VIEW ── */
#cat-view { display: none; background: var(--bg); min-height: 100vh; }
.cat-nav {
  background: rgba(245,245,247,0.88); backdrop-filter: blur(20px);
  height: 44px; display: flex; align-items: center;
  padding: 0 22px; gap: 16px; border-bottom: 1px solid var(--border-b);
  position: sticky; top: 44px; z-index: 800;
}
.cat-nav-title { font-size: 14px; font-weight: 600; color: var(--tb); letter-spacing: -0.01em; }
.back-btn {
  background: none; border: none; font-size: 17px; color: var(--blue);
  cursor: pointer; font-family: inherit; padding: 0; display: flex;
  align-items: center; gap: 2px; transition: opacity 0.15s;
}
.back-btn:hover { opacity: 0.7; }

/* News rows in cat-view */
#cat-news-list { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }
.news-row {
  background: var(--white); border-radius: 18px; margin-top: 12px;
  overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid var(--border-b);
}
.news-row:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.news-row-inner { padding: 28px 32px; position: relative; }
.row-must-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--must); }
.row-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.row-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; color: var(--tb); margin-bottom: 10px; }
.row-summary { font-size: 14px; color: var(--tb2); line-height: 1.65; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.row-footer { display: flex; align-items: center; justify-content: space-between; }
.row-source { font-size: 12px; color: var(--tb3); }
.row-cta { font-size: 14px; color: var(--blue); }

/* ── ARTICLE VIEW ── */
#article-view { display: none; background: var(--white); min-height: 100vh; }
.article-nav {
  background: rgba(255,255,255,0.88); backdrop-filter: saturate(180%) blur(20px);
  height: 44px; display: flex; align-items: center; padding: 0 22px;
  border-bottom: 1px solid var(--border-b); position: sticky; top: 44px; z-index: 800; gap: 16px;
}
.article-nav-cat { font-size: 13px; color: var(--tb3); margin-left: auto; }
.article-hero {
  background: var(--white); padding: 72px 24px 48px; text-align: center;
  border-bottom: 1px solid var(--border-b);
}
.article-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; }
.article-headline { font-size: 44px; font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; color: var(--tb); margin-bottom: 20px; max-width: 760px; margin-left: auto; margin-right: auto; }
.article-source { font-size: 14px; color: var(--tb3); }
.article-summary-block {
  background: var(--offwhite); border-bottom: 1px solid var(--border-b);
  padding: 32px 24px;
}
.article-summary-block > * { max-width: 680px; margin-left: auto; margin-right: auto; }
.art-summary-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.art-summary-text { font-size: 17px; color: var(--tb2); line-height: 1.7; font-weight: 400; letter-spacing: -0.01em; }
.article-body { max-width: 680px; margin: 0 auto; padding: 52px 24px 100px; }
.article-body p { font-size: 19px; line-height: 1.9; color: var(--tb); margin-bottom: 1.5em; font-weight: 400; letter-spacing: -0.01em; }
.article-body p:last-child { margin-bottom: 0; }

/* ── MUST SECTION ── */
.must-section {
  background: linear-gradient(180deg, #0a0018 0%, #0d0520 100%);
  padding: 0 0 2px;
  border-bottom: 1px solid rgba(110,92,255,0.2);
}
.must-section-header {
  padding: 36px 24px 20px;
  display: flex; align-items: baseline; gap: 16px;
}
.must-section-label {
  font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
  background: linear-gradient(90deg, #f0eefa 0%, #c4b5fd 50%, #a78bfa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.must-section-sub {
  font-size: 13px; color: var(--tw3); font-weight: 400;
}
.must-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 2px;
}
.brick-must-zone {
  background: #1a0a0a;
}
.brick-must-zone .brick-eyebrow { color: #ff6b60; }
.brick-must-zone .brick-title { color: var(--tw); }
.brick-must-zone .brick-summary { color: var(--tw2); }
.brick-must-zone .brick-source { color: var(--tw3); }
.brick-must-zone .brick-cta { color: #ff6b60; }

.all-section { background: #f2f2f7; }
.all-section-label { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; color: var(--tb); }
.all-section-header {
  padding: 32px 24px 16px;
}
.all-section-label {
  font-size: 22px; font-weight: 700; letter-spacing: -0.025em; color: var(--tb);
}

/* responsive */
/* ── SCROLL REVEAL ANIMATION ── */
.brick {
  opacity: 0;
  transform: translateY(28px);
  transition:
    opacity 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
    transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
    filter 0.3s ease;
}
.brick.brick-revealed {
  opacity: 1;
  transform: translateY(0);
}
.highlight-card {
  opacity: 0;
  transform: translateY(16px);
  transition:
    opacity 0.4s ease,
    transform 0.4s ease,
    box-shadow 0.2s ease;
}
.highlight-card.brick-revealed {
  opacity: 1;
  transform: translateY(0);
}
.highlight-card.brick-revealed:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(110,92,255,0.12);
}

/* ── HERO PARALLAX ── */
.hero-block {
  will-change: transform;
  transform-origin: top center;
}

@media (max-width: 720px) {
  .hero-headline { font-size: 48px; }
  .hero-sub { font-size: 17px; }
  .hero-kpis { gap: 32px; }
  .kpi-val { font-size: 40px; }
  #brick-grid { grid-template-columns: 1fr; }
  .brick { min-height: 340px; padding: 36px 28px; border-radius: 18px; }
  .brick-title { font-size: 22px; }
  .brick.brick-full .brick-title { font-size: 26px; }
  .article-headline { font-size: 30px; }
  .article-body p { font-size: 17px; }
  .gnav-tabs { display: none; }
  .gnav-date { display: none; }
}

</style>
</head>
<body>

<!-- GLOBAL NAV -->
<nav id="gnav">
  <div class="gnav-left">
    <span class="gnav-dot"></span>
    <span class="gnav-name">EPC</span>
  </div>
  <div class="gnav-tabs" id="gnav-tabs"></div>
  <span class="gnav-date" id="gnav-date"></span>
</nav>

<!-- HOME VIEW -->
<div id="home-view">

  <!-- HERO -->
  <section class="hero-block">
    <p class="hero-eyebrow">National Development Council · Economic Planning Division</p>
    <h1 class="hero-headline">一眼掌握。</h1>
    <p class="hero-sub">今日經濟訊號，重點整理完成。</p>
    <div class="hero-kpis">
      <div>
        <div class="kpi-val red" id="kpi-must">16</div>
        <div class="kpi-label">Must Read</div>
      </div>
      <div>
        <div class="kpi-val blue" id="kpi-total">82</div>
        <div class="kpi-label">Today's Total</div>
      </div>
      <div>
        <div class="kpi-val" id="kpi-cat">5</div>
        <div class="kpi-label">Categories</div>
      </div>
    </div>
  </section>

  <!-- HIGHLIGHTS STRIP -->
  <section class="highlights-section">
    <p class="highlights-eyebrow">看這裡，畫重點。</p>
    <div class="highlights-scroll" id="highlights-scroll"></div>
  </section>

  <!-- 今日必看 -->
  <section class="must-section" id="must-section">
    <div class="must-section-header">
      <span class="must-section-label">今日必看</span>
      <span class="must-section-sub">以下新聞今日登上各大報頭版，且符合本科關注領域</span>
    </div>
    <div class="must-grid" id="must-grid"></div>
  </section>

  <!-- 所有新聞 -->
  <section class="all-section">
    <div class="all-section-header">
      <span class="all-section-label">全部新聞</span>
    </div>
    <div id="brick-grid"></div>
  </section>

</div><!-- end home-view -->

<!-- CATEGORY VIEW (drill-down) -->
<div id="cat-view">
  <div class="cat-nav">
    <button class="back-btn" onclick="closeCatView()">&#8249; 返回</button>
    <span class="cat-nav-title" id="cat-view-title"></span>
  </div>
  <div id="cat-news-list"></div>
</div>

<!-- ARTICLE VIEW (full-page reading) -->
<div id="article-view">
  <nav class="article-nav">
    <button class="back-btn" onclick="closeArticle()" id="art-back-btn">&#8249; 返回</button>
    <span class="article-nav-cat" id="art-nav-cat"></span>
  </nav>
  <div class="article-hero">
    <p class="article-eyebrow" id="art-cat"></p>
    <h1 class="article-headline" id="art-title"></h1>
    <p class="article-source" id="art-source"></p>
  </div>
  <div class="article-summary-block" id="art-summary-block">
    <p class="art-summary-label">三句重點</p>
    <p class="art-summary-text" id="art-summary"></p>
  </div>
  <div class="article-body" id="art-body"></div>

<script>
const DATA = [{"title": "AI熱爆 3月景氣燈號連四紅", "source": "工商時報 A01 要聞", "cat": "台灣總體經濟與數據", "priority": 1, "summary": "人工智慧（AI）浪潮帶動下，出口延續強勁成長動能，國發會27日公布3月景氣燈號，續亮代表景氣熱絡的紅燈，且連4紅。國發會官員表示，由於AI商機並未消退，預期第2季經濟表現仍穩健可期，但因傳產仍具不確定性，對於4月是否能亮第5顆紅燈，整體來說「審慎樂觀」。國發會經濟發展處處長陳美菊表示，AI持續扮演支撐景氣的關鍵動能，從生成式AI發展至代理式AI，詞元（Token）消耗數增加，提升算力需求，也推升先進製程與高效能運算晶片。", "full_text": "人工智慧（AI）浪潮帶動下，出口延續強勁成長動能，國發會27日公布3月景氣燈號，續亮代表景氣熱絡的紅燈，且連4紅。國發會官員表示，由於AI商機並未消退，預期第2季經濟表現仍穩健可期，但因傳產仍具不確定性，對於4月是否能亮第5顆紅燈，整體來說「審慎樂觀」。國發會經濟發展處處長陳美菊表示，AI持續扮演支撐景氣的關鍵動能，從生成式AI發展至代理式AI，詞元（Token）消耗數增加，提升算力需求，也推升先進製程與高效能運算晶片。\n\n此外，另一關鍵則是AI供應鏈多採空運，因受中東地緣衝突影響相對有限，加上台灣原物料掌握度亦佳，出口受影響較小，預期第2季景氣可維持穩健。國發會指出，3月景氣對策信號綜合判斷分數為39分，月減2分，燈號續呈紅燈。景氣燈號9項構成項目中，隨春節落點差異影響消退，工業及服務業加班工時轉為黃紅燈，減少1分；\n\n製造業營業氣候測驗點轉為黃藍燈，減少1分；其餘7項燈號維持不變。其中，同時指標為反映當前景氣當下狀況的綜合指標，不含趨勢指數為109.26，較2月上升1.77％，從出口、工業生產指數及機械設備進口等，可看到主要指標都上升，僅工業及服務業加班工時受春節效應去除後，較前一月下滑。\n\n國發會表示，隨全球雲端大廠持續推進AI基礎建設、新一代運算產品出貨，以及代理、邊緣AI等應用快速發展，出口可望延續高速成長態勢；國內半導體大廠因應市場需求增加資本支出規模，也帶動相關供應鏈加速擴廠與產線升級。陳美菊說，觀察台積電4月中旬的法說會內容，整體產能仍然緊俏，資本支出持續上修，且第二季營收持續成長，毛利率升至66.2％，可以預期下一季經濟表現仍相當穩健；\n\n但不同產業表現分岐，科技業在AI強勢帶動下表現亮眼，傳產則面臨原物料價格波動等，還需關注。隨著國內主要智庫看好出口成長、持續上調全年經濟成長率，國發會表示，燈號已連續4個月亮出代表熱絡的紅燈，受惠AI基礎建設需求強勁與台積電法說會釋出的樂觀展望，顯示整體出口動能與生產活動依然穩健，下半年經濟表現仍值得期待。"}, {"title": "台股閃見4萬點 寫四驚奇 指數盤中、收盤、市值創新高，台積也一度漲至2,330元，法人看好九利多將助漲到7月", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股27日衝40,000點，寫下加權指數盤中、收盤、市值及台積電寫盤中與收盤齊創高「四大驚奇」，然因資金齊聚台積電，一檔就貢獻台股663點，占27日全數漲點的97％，受資金排擠效應影響，1,355檔個股黯然下跌，意外上演「賺了指數，卻賠了價差」戲碼。台股再演飆漲行情，盤中最高至40,194點，一度大漲1,262點，台積電以「股號」2,330元創高，光其單檔市值就貢獻58.74兆元、占比 45.53％，牽動上市市值飆129.50兆元新高，...", "full_text": "台股27日衝40,000點，寫下加權指數盤中、收盤、市值及台積電寫盤中與收盤齊創高「四大驚奇」，然因資金齊聚台積電，一檔就貢獻台股663點，占27日全數漲點的97％，受資金排擠效應影響，1,355檔個股黯然下跌，意外上演「賺了指數，卻賠了價差」戲碼。台股再演飆漲行情，盤中最高至40,194點，一度大漲1,262點，台積電以「股號」2,330元創高，光其單檔市值就貢獻58.74兆元、占比 45.53％，牽動上市市值飆129.50兆元新高，再加計上櫃市值10.25兆元，上市櫃市值以139.75兆元同日登頂。三大法人成提款大戶，外資及陸資賣超511.96億元居冠，再加計自營商賣超105.42億元，儘管有投信站在買方買超145.02億元，三大法人合計賣超金額仍達472.38億元。\n\n上市融資跟著大增111.37億元創史上第二大，融資餘額達4,520.4 4億元為2000年9月19日來新高，連兩日上市融資增加212.19億元。台股衝新高，三大法人合計賣超澆台股一盆冷水，但統一投顧董事長黎方國以九大利多樂看台股一路漲到7月，包括ETF單一持股鬆綁2 5％政策加持、台股各均線技術面均呈多頭排列、戰爭結束時間點浮現。首先是4月27日英國國王查爾斯三世將訪美、美國科技七巨頭季報優、七巨頭估值相對偏低、資金面仍呈貨幣寬鬆、6 月 1 日台北國際電腦展登場，兆元宴風雲再起、5～6 月股東會作夢行情起動、S ＆P 500 過去 10 年漲多跌少，以月線言之，5月上漲9次，6月上漲8次，7月上漲率更是百分百。\n\n從技術面分析，康和證券投資總監廖繼弘短期行情偏向高檔震盪緩和過熱走勢，因台積電強勢，指數低檔有限，短線支撐看4月23日1. 46兆元大量高點38,921點上下，上檔空間則視台積電漲勢而定，留意類股和個股因台積大漲資金排擠的短線調整走勢，大方向看好先進製程、封測、設備、散熱、ASIC、PCB及ABF等。富邦投顧董事長陳奕光說，23日台股爆出 1.46兆元新高量，27日見到新高價，後市只要不跌破37,164 點，續航機會仍高，惟晴空萬里下仍須貿意四個潛在風險，包括台股年線乖離率達44.76％，創歷史新高、融資餘額增加速度過快、高價股本益比偏高、4月漲點恐逾8,00 0點、寫歷史新高，推測後市漲多震盪難免，應居高思危。"}, {"title": "高價股激情演出 外資功勞大", "source": "工商時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "台股40,000點大時代銳不可當，除權值股近期攻勢猛烈，千金股扶搖直上也是一絕。過去一段時間股王信驊、股后穎崴都貴為萬元股，展現帶頭示範作用，法人指出，千金股檔數相比起一年前早已增加超過1倍，隨外資不斷調高目標價喊買，未來不但檔數有望再增，股價也可能比過去更驚人。台股27日盤中一度問鼎40,000點大關至40,194點，儘管終場未能站穩，仍以39,616點寫下收盤歷史新高，高價股漲跌互見，然從波段角度來看，有二大正向意義：首先，外資對高...", "full_text": "台股40,000點大時代銳不可當，除權值股近期攻勢猛烈，千金股扶搖直上也是一絕。過去一段時間股王信驊、股后穎崴都貴為萬元股，展現帶頭示範作用，法人指出，千金股檔數相比起一年前早已增加超過1倍，隨外資不斷調高目標價喊買，未來不但檔數有望再增，股價也可能比過去更驚人。台股27日盤中一度問鼎40,000點大關至40,194點，儘管終場未能站穩，仍以39,616點寫下收盤歷史新高，高價股漲跌互見，然從波段角度來看，有二大正向意義：首先，外資對高價股的興趣極為濃烈，調升財務預測與目標價的熱情，從股王信驊、權王台積電，一路擴散至各熱門族群領頭羊，近期罕有調降例子。\n\n其次，三大權值股台積電、台達電及聯發科也都是千金等級高價股，權值股與高價股的分野開始模糊，凸顯資金願意給搭上AI浪潮的權值股更高評價。以台積電為例，不只貴為台股最大權值股，也是2字頭高價千金一員，外資賦予的目標價已經拉高到2,500～2,800元以上，最高甚至有里昂證券喊出3,030元。另外，各次族群高價領頭羊目標價也連連獲得調升，像是高盛證券最近將弘塑推測合理股價升至 4,500 元，大和資本證券給予散熱指標股健策7,000元股價預期，摩根士丹利、廣發、麥格理、高盛證券等集體力挺聯發科；\n\n另外，台光電股價則是已超越（ㄏㄨㄟˋ）豐、高盛證券賦予的股價估值，評價能否進一步向上，也是話題焦點之一。整體看來，台股寫盤中 40,000 點里程碑，千金族群勢力依舊龐大，有高達 45 檔股價超過千元；有趣的是，僅19檔千金股股價介於1,000 ～2,000元之間，卻有多達26檔股價在2,000元以上的升級版千金。\n\n不過，若以單日表現論之，則浮現二大隱憂：一、股后穎崴跌破萬元。原本台股已進入股王信驊、股后穎崴的雙萬金時代，但27日二檔萬金股都跌，穎崴更是下挫近半根停板，股價打回四位數的9,580元。二、加權指數奔騰寫新紀錄之際，千金族群有半數終場收跌，高價族群氣氛似不像先前那般激情。"}, {"title": "美伊和談停滯》伊朗暫停鋼品出口 高盛上調油價預測", "source": "工商時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "美伊和談進度延宕，荷姆茲海峽運輸仍無法解禁，中東衝突將屆2 個月，除油價大漲推升通膨隱憂，全球鋼鐵供應鏈也將遭受新的衝擊。伊朗27日宣布，暫停鋼板和鋼材出口至 5月30日。該禁令將涵蓋板材、熱軋捲材、冷軋捲材、鍍鋅板材等66類鋼鐵產品。", "full_text": "美伊和談進度延宕，荷姆茲海峽運輸仍無法解禁，中東衝突將屆2 個月，除油價大漲推升通膨隱憂，全球鋼鐵供應鏈也將遭受新的衝擊。伊朗27日宣布，暫停鋼板和鋼材出口至 5月30日。該禁令將涵蓋板材、熱軋捲材、冷軋捲材、鍍鋅板材等66類鋼鐵產品。\n\n由於伊朗是全球半成品鋼材市場的重要供應國，這次出口暫停，將使國際鋼材價格面臨上行壓力。此外，市場仍高度關注油市，鑑於美伊危機恐短期無法解除，荷姆茲海峽封鎖預料還要持續一段時間，高盛集團大幅上調油價預測，並警告中東減產正以空前速度消耗全球石油庫存。根據Axios新聞網站報導，伊朗已透過巴基斯坦轉交給美國新方案，重點是優先解決荷姆茲海峽危機與美國封鎖問題，內容包括延長停火期限，或由雙方同意永久結束戰爭。\n\n核談判則待海峽重新開放、封鎖解除後才會展開。白宮已收到該提案，美國官員透露，川普與國安及外交團隊在白宮戰情室開會，討論如何突破談判僵局與下一步行動。而川普26日接受福斯新聞訪問時表示，他希望持續海上封鎖以切斷伊朗石油出口，迫使德黑蘭未來幾周做出讓步。\n\n受美伊和平談判缺乏大幅進展影響，西德州原油6月期貨價27日盤中揚升1％至每桶95.34美元。布蘭特6月期油上漲1.3％至每桶106.7 3美元，稍早一度攀抵108.5美元。基於美伊危機短期難以收尾，荷姆茲海峽封鎖預料還要持續一段時間，高盛集團27日大幅上調油價預測，將今年第四季布蘭特原油均價調高從每桶80美元上修至90美元、西德州原油均價從75美元調升至83美元，並警告中東減產正以空前速度消耗全球石油庫存。\n\n高盛還預測本季全球石油市場將出現每日960萬桶的供應缺口。此外，值得注意的是，伊朗27日宣布暫停鋼板和鋼材出口至5月30 日。伊朗暫停鋼品出口，意在優先保障國內供應。\n\n以色列4月初襲擊伊朗鋼鐵和石化廠，當時伊朗7成的鋼鐵產能遭到摧毀。伊朗的鋼鐵產量目前居世界第十位，2025年伊朗鋼鐵產量約占全球總產量的1.8 ％，產量相當於德國，約占美國產量的40％，接近歐洲總產量的四分之一。"}, {"title": "台股閃見40K 寫五紀錄 加權、電子指數皆創新高 台積一度站上2,330天價 上市櫃市值合計139兆 外資大砍511億元", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股昨（27）日在權王台積電領頭，盤中衝上與股號一樣的2,330元天價帶動下，加權指數首見「40K」、一度勁揚1,262點至40,194點，終場漲684點收39,616點，盤中、收盤指數雙創新高，成交值1.24兆元為史上第二高。展望後市，法人表示，「指數沒有最高、只有更高」，即便過程中出現震盪，拉回都是買點。台股昨天創高之際，盤面竟出現高達1,346家上市櫃公司下跌的狀況，外資也賣超511.9億元，且期貨淨空單增加3,590口至44,2...", "full_text": "台股昨（27）日在權王台積電領頭，盤中衝上與股號一樣的2,330元天價帶動下，加權指數首見「40K」、一度勁揚1,262點至40,194點，終場漲684點收39,616點，盤中、收盤指數雙創新高，成交值1.24兆元為史上第二高。展望後市，法人表示，「指數沒有最高、只有更高」，即便過程中出現震盪，拉回都是買點。台股昨天創高之際，盤面竟出現高達1,346家上市櫃公司下跌的狀況，外資也賣超511.9億元，且期貨淨空單增加3,590口至44,223口；\n\n自營商亦賣超105.4億元；但投信買超145億元，三大法人合計賣超472.3億元。儘管外資、自營商賣超，其他內資持續大舉湧進台股，融資餘額增加 111.3億元至4,520.4億元。\n\n統計台股昨天創五大紀錄，包括加權指數盤中40,194點、收盤39,616點；上市市值129.18兆元、上市櫃合計市值139.43兆元；台積電股價盤中2,330元、收2,265元、市值58.73兆元；\n\n電子指數盤中2,603.45點、收2,557.69點；以及台指期盤中40,458點、收盤39,888點，都是歷史新高紀錄。台積電昨日盤中再寫新天價，市值一度突破60兆元，金管會宣布基金、ETF開放投資上限以來，台積電帶領台股多頭持續衝鋒，惟尾盤遭摜壓30元，以2,265元漲80元收市。\n\n外資昨天逢高賣超台積電逾1.8萬張，為本月來最大賣超量，主要賣壓來自瑞銀、上海滙豐、美林、花旗環球等。外資賣超台積電，以散戶為主的零股交易倒是暴增，盤中加盤後零股成交金額擴增至 193.7億元，較上周五（24日）97.5億元翻倍，可見散戶對台積電信心十足。綜合統一投顧董事長黎方國及兆豐投顧董事長李秀利的看法，加權指數「沒有最高、只有更高」，不必預設高點，有機會一路漲到7月。\n\n指數一度衝到4萬點，一定會出現籌碼整理，三日內只要沒有封閉跳空缺口38,989點，短線指數仍將持續上攻。而中長線只要守在35,500點之上，多頭格局就不變。黎方國建議，即便上漲期間出現震盪整理，拉回都是買點。\n\n布局仍以 AI 為主軸，包括半導體、材料、PCB、散熱、CPO、記憶體等。"}, {"title": "高盛、花旗調高預估 油價上看150美元", "source": "經濟日報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "電高盛27日發布報告，上調第4季油價預估均價至每桶90美元，高於先前預期的每桶80美元；花旗26日也調高布蘭特今年底前均價，並表示若6月底荷莫茲海峽運輸持續受阻，油價可能漲到每桶150美元。根據彭博資訊報價，布蘭特原油6月期貨27日揚升1.8%，攀抵每桶107.23美元，西德州中級原油6月期貨上漲1.6%，報每桶95.91美元。", "full_text": "電高盛27日發布報告，上調第4季油價預估均價至每桶90美元，高於先前預期的每桶80美元；花旗26日也調高布蘭特今年底前均價，並表示若6月底荷莫茲海峽運輸持續受阻，油價可能漲到每桶150美元。根據彭博資訊報價，布蘭特原油6月期貨27日揚升1.8%，攀抵每桶107.23美元，西德州中級原油6月期貨上漲1.6%，報每桶95.91美元。\n\n分析師們表示：「我們估計，波斯灣地區原油生產損失量為每日1,450萬桶，正導致全球石油庫存以創紀錄的每日1,100萬至1,200萬桶速度下降。」「由於如此極端的庫存提取無法持續，如果供應衝擊持續更久，可能需要更劇烈的需求下降來平衡市場。」 Axios引述美國官員和兩名知情人士報導，伊朗已向美國提出重啟荷莫茲海峽並結束戰爭的新提案，內容包括延後核談判，但花旗認為美伊目前尚未達成共識，所以把荷莫茲海峽預計重開的預估時間，從 4月中下旬延到5月底。\n\n花旗認為，荷莫茲海峽運輸中斷持續至6月底的可能性為30%，在這情境下，布蘭特可能飆到每桶150美元，第2季和第3季均價將接近130美元，第4季回落到100美元。"}, {"title": "中國進口製毒化學品 桃園山區破製毒廠 起出黑市2.5億喵喵", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "製毒集團以鋼鐵製品名義，掩護從中國進口製毒化學品來台製毒，檢、警蒐證後發動查緝，在桃園市平鎮區的製毒工廠，當場查獲約二百公斤的「4-甲基甲基卡西酮」（喵喵）成品、半成品，黑市價近二．五億元，逮捕鍾姓製毒嫌犯和黃姓同夥，檢方近日依毒品罪嫌將兩人起訴。以鋼鐵製品名義掩護毒品原料製毒嫌犯、同夥毒品罪嫌起訴刑事警察局偵六大隊第四隊隊長劉永畯表示，去年三月間接獲情資，有毒品犯罪集團以鋼鐵製品名義，自中國進口一批約一六○公斤製毒化學品來台疑供製毒，...", "full_text": "製毒集團以鋼鐵製品名義，掩護從中國進口製毒化學品來台製毒，檢、警蒐證後發動查緝，在桃園市平鎮區的製毒工廠，當場查獲約二百公斤的「4-甲基甲基卡西酮」（喵喵）成品、半成品，黑市價近二．五億元，逮捕鍾姓製毒嫌犯和黃姓同夥，檢方近日依毒品罪嫌將兩人起訴。以鋼鐵製品名義掩護毒品原料製毒嫌犯、同夥毒品罪嫌起訴刑事警察局偵六大隊第四隊隊長劉永畯表示，去年三月間接獲情資，有毒品犯罪集團以鋼鐵製品名義，自中國進口一批約一六○公斤製毒化學品來台疑供製毒，立即組成專案小組，除報請桃園地檢署指揮，並與調查局航業調查處台中調查站共同擴大偵辦。檢、警蒐證完成熟，去年九月廿六日，到桃園市平鎮區偏遠山區的鐵皮屋製毒工廠攻堅，當場壓制逮捕正在製毒的鍾姓男子（四十歲）和同夥黃姓男子（四十六歲），現場查扣第三級毒品甲基甲基卡西酮（喵喵）成品三公斤、半成品一二一．三五公斤、第四級毒品先驅原料「2-溴-4-甲基苯丙酮」七十六．六六公斤、製毒器具等證物，將兩人依毒品罪嫌送辦，檢方近日偵結起訴。\n\n警方表示，該批喵喵成品和半成品，約可製成五十萬包的毒品咖啡包，初估黑市價達二．五億元。警方發現，鍾嫌因缺錢花用，透過自學而會製毒，且為避免製毒過程散發刺激化學氣味引人注意，由黃嫌提供偏遠山區鐵皮屋，並藉周圍養殖業所產生之惡臭掩蓋氣味，掩人耳目。"}, {"title": "游盈隆：中選會有6大挑戰 中國介選 須提高警覺", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "中選會昨舉行主委交接典禮，由行政院秘書長張惇涵擔任監交人，新主委游盈隆及李禮仲、蘇子喬、蘇嘉宏三位委員正式就任。游盈隆致詞時提出中選會正面臨中國介選等六大挑戰，並直言中共介入台灣選舉早已是常數，而非變數，今年中國當局更成立「因應台灣地方選舉工作專組」，中選會必須提高警覺，絕不可掉以輕心。游掌中選會示警深偽訊息衝擊選情游盈隆指出，在未來任期中，至少有兩大任務要完成，包含今年的九合一地方選舉及二○二八總統暨立委大選。", "full_text": "中選會昨舉行主委交接典禮，由行政院秘書長張惇涵擔任監交人，新主委游盈隆及李禮仲、蘇子喬、蘇嘉宏三位委員正式就任。游盈隆致詞時提出中選會正面臨中國介選等六大挑戰，並直言中共介入台灣選舉早已是常數，而非變數，今年中國當局更成立「因應台灣地方選舉工作專組」，中選會必須提高警覺，絕不可掉以輕心。游掌中選會示警深偽訊息衝擊選情游盈隆指出，在未來任期中，至少有兩大任務要完成，包含今年的九合一地方選舉及二○二八總統暨立委大選。\n\n他會努力打造一個絕對超然、公正、客觀、中立與專業的中選會。然而，目前 AI 與網路時代深偽訊息衝擊選情，已經是全球民主國家共同面臨的難題。幾乎所有民主國家都如臨大敵，台灣也不例外，即將到來的台灣九合一地方選舉，如何有效因應防不勝防的深偽訊息左右選情，傷害選舉公平性，是絕對不可忽視的課題。\n\n北京設台灣選舉專組不可掉以輕心針對中國介選問題，游盈隆直言，中國介入台灣選舉由來已久，最早是一九九六年台灣總統大選，公然以發射飛彈，文攻武嚇，製造軍事危機試圖影響選情；此後，每一場總統大選都少不了中共對台的恫嚇、干擾與威脅。今年中國當局更史無前例、毫不避諱成立「因應台灣地方選舉工作專組」，直接接受中共中央對台工作領導小組指導，中選會必須提高警覺，絕不可掉以輕心。\n\n除中共介選、AI深偽訊息問題，游盈隆也提到其餘四大挑戰，包含中選會如何適當處理立院所提公投案、公投綁大選、不在籍投票、中配參政權爭議等。針對中國介選問題，國安局四月初也向立院報告，指今年底台灣將舉行「九合一」地方公職人員選舉，中共勢必透過假訊息、假民調、落地招待等複合式手法介選。對此，法務部也著手以各種方式因應，包括成立專責查察體系、強化深偽情資研析與鑑識量能、升級賭盤查察模式、速查嚴辦境外勢力介選、強化檢舉獎金宣導。"}, {"title": "台積內鬼洩密案 陳力銘判刑10年 東京威力須賠1億元、付台灣公庫5千萬元", "source": "自由時報 A01 焦點新聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台積電離職工程師陳力銘轉至東京威力科創公司任職後，涉嫌勾結台積電工程師吳秉駿、戈一平、陳韋傑，竊取台積電二奈米及更先進的「十四埃米」製程等機密，東京威力高階主管盧怡尹則曾刪除陳力銘翻拍台積電的營業秘密圖檔；智慧財產及商業法院合議庭昨斥責陳力銘所為危及產業國際競爭力與國家經濟安全，依違反國家安全法及營業秘密法共五罪合併判刑十年。工程師陳韋傑不認罪判刑6年吳秉駿違反國安法及營業秘密法共兩罪判刑三年、戈一平犯國安法判刑兩年，兩人認罪獲台積電原...", "full_text": "台積電離職工程師陳力銘轉至東京威力科創公司任職後，涉嫌勾結台積電工程師吳秉駿、戈一平、陳韋傑，竊取台積電二奈米及更先進的「十四埃米」製程等機密，東京威力高階主管盧怡尹則曾刪除陳力銘翻拍台積電的營業秘密圖檔；智慧財產及商業法院合議庭昨斥責陳力銘所為危及產業國際競爭力與國家經濟安全，依違反國家安全法及營業秘密法共五罪合併判刑十年。工程師陳韋傑不認罪判刑6年吳秉駿違反國安法及營業秘密法共兩罪判刑三年、戈一平犯國安法判刑兩年，兩人認罪獲台積電原諒獲輕判；\n\n陳韋傑犯國安法，因否認犯行且未獲原諒，判刑六年；盧怡尹因湮滅證據罪判刑十月，緩刑三年，並向公庫支付一百萬元及接受法治教育六場次；東京威力犯國安法及營業秘密法共五罪，因承認犯罪與台積電和解等，判處罰金一．五億元，緩刑三年，條件是支付台積電一億元、公庫五千萬元。\n\n東京威力犯5罪和解緩刑3年檢調查出，東京威力是台積電其他製程蝕刻機供應商，為了切入二奈米製程，以測試方式尋求蝕刻機站點供應資格，該公司行銷及產品經理陳力銘，為了改善機台良率、希望通過測試等原因，二○二三年八月找上前同事吳秉駿、戈一平幫忙，約在台積電外部會議室、餐廳及吳、戈住處見面，並說服兩人打開公司配發的筆電登入系統，持手機翻拍「Security B或C」等級製程或實驗結果等機密；甚至在二○二四年底測試沒過關而「掉單」後，仍為爭取最先進製程供應機會而持續犯行至去年五月止。陳力銘也透過陳韋傑借用不知情同事帳號密碼登入台積電資料庫，偷拍「十四埃米」製程。"}, {"title": "台積天價 盤面「漲指數、跌個股」藏風險 閃現4萬點台股新高 法人：結構虛胖", "source": "聯合報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股大盤指數昨在台積電股價帶動下，盤中閃現四萬點，終場收在三萬九六一六點的新高，但市場結構明顯失衡，由於資金集中權值股，上市櫃合計多達一三四六家下跌、僅四八一家上漲，呈現「漲指數、跌個股」的背離現象。法人表示，當前台股「結構虛胖」的跡象，恐怕讓指數榮景只是短期假象。外資逢高賣台積散戶搶著撿台積電股價昨天盤中漲至和股票代號相同的二三三○元天價，助攻台股上漲一二六二點至四萬零一九四點，但台積尾盤遭摜壓卅元、收二二六五元。", "full_text": "台股大盤指數昨在台積電股價帶動下，盤中閃現四萬點，終場收在三萬九六一六點的新高，但市場結構明顯失衡，由於資金集中權值股，上市櫃合計多達一三四六家下跌、僅四八一家上漲，呈現「漲指數、跌個股」的背離現象。法人表示，當前台股「結構虛胖」的跡象，恐怕讓指數榮景只是短期假象。外資逢高賣台積散戶搶著撿台積電股價昨天盤中漲至和股票代號相同的二三三○元天價，助攻台股上漲一二六二點至四萬零一九四點，但台積尾盤遭摜壓卅元、收二二六五元。\n\n其中外資昨天逢高賣超台積電逾一點八萬張，為四月以來最大賣超量。相形之下，以散戶為主的零股交易卻暴增，顯示散戶對台積電的信心。台股指數終場上漲六八四點、收在三萬九六一六點，盤中和收盤指數雙創新高。\n\n不過，櫃買指數則連三黑，中小型股連兩日慘跌。一超帶多強資金集中半導體法人分析，台股呈現失衡格局有兩大因素。首先是產業明顯傾斜，在ＡＩ浪潮帶動下，資金高度集中於以台積電為核心的半導體供應鏈，相關族群股價快速上揚，形成「一超帶多強」的結構；\n\n其次是政策因素推波助瀾，金管會上周放寬台股基金和主動式ＥＴＦ（指數股票型基金）持股限制，使資金更傾向集中於台積電，進一步強化指數表現，但也壓縮其他族群的資金動能。券商主管說，過去強勢的光通訊族群走弱，顯示資金開始調節，盤面分化更加嚴重。大盤幾乎由台積電一檔撐盤，即使多數個股下跌，指數仍能維持高檔震盪，形成市場俗稱的「拉積盤」格局。\n\n不僅傳產族群持續疲弱，電子類股內部同樣出現分化。法人表示，台股指數漲幅百分之一點七六，但半導體指數漲幅高達百分之三，其餘類股皆低於大盤，顯見這波行情集中於半導體ＡＩ相關供應鏈，非ＡＩ族群則震盪甚至回檔，「更不用說傳產類股」，這種「強者恆強」的走勢，雖有助於推升指數，但也使市場結構更加單一，增加後續波動風險。當沖活絡全民投資氛圍濃厚此外，政策因素也被視為加速資金集中的關鍵。\n\n在金管會上周政策鬆綁後，基金經理人為追求績效與規模，勢必提高對權值股的配置比重，尤其台積電將持續吸引資金流入。不過，這樣的配置策略，也使部分前波漲幅較大的中小型股出現賣壓，市場資金呈現「由廣轉窄」的趨勢。台股大盤昨成交量一點二四兆元創史上次高，加上當沖交易活絡，投資人參與程度明顯提升，「全民投資」氛圍濃厚。\n\n然而，全球經濟仍面臨通膨以及利率的不確定性，但台股因台廠受惠ＡＩ產業飛速發展，展現相對強勢，使市場短期內對總體風險的敏感度降低。因此，一旦外部環境出現變化，例如通膨壓力升溫或資金成本上升，當前高度集中的市場結構，恐將放大風險。該主管坦言，資金過度集中、且投資人透過加大槓桿參與市場，台股潛在風險不容忽視。\n\n若台積電等權值股出現修正，指數下殺的速度會相當快，市場震盪幅度非同小可。"}, {"title": "只在雙北 垃圾費隨袋徵收 推不動 實行25年 垃圾減量解方 地方習慣難扭轉 加劇環境挑戰", "source": "聯合報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "台灣家戶垃圾量十年成長一點六倍，各地垃圾堆積、處理壓力大。被視為垃圾減量解方之一的垃圾費「隨袋徵收」，早成為雙北首都圈的日常，桃園市、台中市等地曾取經試辦，堆積垃圾量最多的台南市、人均垃圾量六都最高的高雄市，僅停留在局部試辦，但「隨袋徵收」難以全面推動，加劇環境挑戰。北市資源回收率達六成七台北市推動垃圾費隨袋徵收已四分之一個世紀，北市家戶垃圾量從原本每天二九七○公噸，逐年降至去年底一○一九公噸，資源回收率高達六成七，傲視全國；", "full_text": "台灣家戶垃圾量十年成長一點六倍，各地垃圾堆積、處理壓力大。被視為垃圾減量解方之一的垃圾費「隨袋徵收」，早成為雙北首都圈的日常，桃園市、台中市等地曾取經試辦，堆積垃圾量最多的台南市、人均垃圾量六都最高的高雄市，僅停留在局部試辦，但「隨袋徵收」難以全面推動，加劇環境挑戰。北市資源回收率達六成七台北市推動垃圾費隨袋徵收已四分之一個世紀，北市家戶垃圾量從原本每天二九七○公噸，逐年降至去年底一○一九公噸，資源回收率高達六成七，傲視全國；\n\n新北市二○一○年跟進，隔年垃圾量即大減三成，資收率現提高到六成五。新北與桃園僅一路之隔，為防止新北垃圾跨區丟到桃園，二○二一年起在龜山、八德區共四里推出丟垃圾須用「專用垃圾袋」，但垃圾費仍隨水費徵收；直到今年元月，桃園市才對機關、市場與學校推行隨袋徵收，垃圾減量兩成五。\n\n已用專用袋四年的龜山、八德當地里長，都認同政策促使垃圾減量，但市府遲未擴大實施，直言「不夠魄力」。桃園市環保局坦言，改變民眾的習慣不容易，像新北市二○○八年七月先在深坑區實施隨袋徵收，垃圾因此外溢到鄰近區域，造成周邊區域垃圾量大增。台中隨水徵收接受程度高台中市石岡區試辦隨袋徵收廿六年，仍無法全市推動。\n\n台中市環保局曾在市區六處社區大樓試辦，定期記錄垃圾子車清運量，僅限實驗性質，未改變收費方式，後繼無力。「最主要還是太麻煩了。」住台中市區透天厝的李先生說，石岡非都會區、人口少，垃圾量少，比較好配合；\n\n雖然隨袋徵收比較省錢，但不如隨水徵收方便。台北市政策推動前，曾面臨垃圾山堆置、自燃等垃圾去化困境，南港、內湖居民叫苦。北市環保局科長鄭智⽂說，一九九五年南韓推動隨袋徵收，垃圾減量成效很好；\n\n北市率先施行後，資收率從不到一成，一路翻倍成長，現在朝七成邁進。鄭智⽂說，相較隨⽂徵收，隨袋徵收的家戶垃圾費可節省三到五成，垃圾明顯減量；北市垃圾收運點密度全國最高、專用袋鋪貨點多，購買便利也帶動政策成功。\n\n縣市來取經的不少，關鍵在財政能否⽂撐「隨袋徵收」後的費⽂落差。以北市為例，原本垃圾費隨⽂徵收時期，年收入約十五億元，改為隨袋徵收後，因廢棄物處理量減少，年收入減為四⽂五億元，垃圾處理成本跟著提高。環團批垃圾費長期低廉看守台灣協會秘書長謝和霖說，縣市政府為了討好民眾，長期向民眾收取低廉的垃圾費，垃圾清除費用多是縣市自掏腰包補貼；\n\n雙北財政較充裕，能忍受低廉垃圾費帶來的赤字，其他縣市若要轉為隨袋徵收，垃圾費收得更少，恐面臨經費排擠困境。他直言，縣市普遍採隨水徵收，無法反映真實處理成本，也缺乏經濟效率，讓地方政府更難推動有效的回收與減量政策；建議政府推動隨袋或隨量徵收制度，並調漲垃圾處理費率，才能真正讓垃圾減量、驅動循環經濟。"}, {"title": "接任中選會主委提6挑戰 指李貞秀案絕非最後一例 除非修憲 游盈隆：國籍法處理陸配參政 牽強", "source": "中國時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "內政部以《國籍法》20條認定陸配、前民眾黨立委李貞秀未放棄對岸國籍，不具立委資格。此爭議在民眾黨因李貞秀言行問題開除其黨籍後，李貞秀喪失立委資格，風波暫告一段落。但中選會新任主委游盈隆 27 日表態，除非修憲，否則以《國籍法》處理陸配參政權問題，「實屬牽強，且具高度爭議性」。", "full_text": "內政部以《國籍法》20條認定陸配、前民眾黨立委李貞秀未放棄對岸國籍，不具立委資格。此爭議在民眾黨因李貞秀言行問題開除其黨籍後，李貞秀喪失立委資格，風波暫告一段落。但中選會新任主委游盈隆 27 日表態，除非修憲，否則以《國籍法》處理陸配參政權問題，「實屬牽強，且具高度爭議性」。\n\n但內政部昨仍重申，陸配參政權須依《國籍法》辦理，並舉前國民黨立委李慶安與李明星等案例，強調「適用標準一致」。中選會昨舉行新任主委交接典禮，由游盈隆與代理主委吳容輝進行交接，行政院祕書長張惇涵擔任監交人。游盈隆說明未來6大挑戰，並稱「在這段期間深刻感受到，中選會不是一個單純的選務辦理機關而已」。\n\n兩岸關係具特殊性法律仍不完備6大挑戰包括「公投綁大選」、「不在籍投票」、「適當處理立法院的公投案」、「陸配參政權」、「AI網路時代深偽訊息衝擊選情」 及「中國介選問題」。關於陸配參政權，游盈隆說，李貞秀被開除黨籍失去立委身分後，陸配相關爭議平息，很多人鬆一口氣，但李貞秀案絕對不是最後一案例，類似案例將層出不窮，「除非我國《憲法》與相關法律做出妥適周延的因應和修正，而這需要政府跟國會共同努力，從根本著手才能解決」。游盈隆指出，兩岸關係有其特殊性，現階段以《國籍法》處理陸配參政權問題，實屬牽強，且具有高度爭議性，李貞秀案凸顯我國《憲法》與法律體性仍然有不完備之處。\n\n游認為，陸配取得身分證10年後可取得參政權，是依《兩岸人民關係條例》規定，現今在兩岸交流後已有逾 14 萬名陸配，隨著時間巨輪前進，未來將有愈來愈多陸配擁有參政權，因此李貞秀案帶來「如何周延健全、合理解決陸配參政權問題」的啟發，要明確釐清陸配在台戶籍時間該如何確認、根據為何？相關單位應深入且很快釐清，否則 2026年選舉將至，中選會相關工作需有明確依據，才能審查參選人資格要件。審九合一參選資格亟需明確依據民眾黨因實施兩年條款，去年便預告李貞秀將遞補立委，陸配擔任立委議題受到廣泛討論。\n\n雖然李貞秀曾說明她親自赴陸辦理放棄國籍卻失敗，但內政部仍堅持以《國籍法》規定要求放棄中華人民共和國國籍，事後還衍生質疑李不符《兩岸人民關係條例》的單一戶籍制，行政院長卓榮泰更曾下令，各部會首長不必接受李質詢、不回覆索資，只稱其「女士」，不肯承認其立委資格。在民眾黨內，李貞秀屢屢發生失言風波，指新竹市長高虹安拿創黨主席柯文哲700萬元，儘管她隨即道歉認錯，但仍在擔任立委70天後，遭民眾黨開除黨籍，理由除了言論嚴重影響黨譽外，更指控她將辭職作為對價，要求獲取特定金額補償。失去民眾黨籍後，李貞秀即失去不分區立委資格。\n\n內政部堅稱依法行政指標準一致對於游盈隆認為以《國籍法》處理陸配參政權「實屬牽強」，內政部昨晚重申「依法行政，從未改變立場」，依《國籍法》第20條規定，欲擔任我國民選公職者，均應於就職前辦理放棄中華民國以外國籍，並於就職1年內完成，過去包括李慶安、李明星等案例，與李貞秀案適用標準一致。李明星、李慶安為美國籍，本來就是外國人，但李貞秀為大陸人，依兩岸人民關係條例為中華民國大陸地區人民，並非外國人，兩者本質上完全不一樣。內政部指出，依中華人民共和國的《國家安全法》、《國家情報法 》及《反間諜法》等規定，原中國大陸人民在未放棄該國國籍前，有配合該國情報單位要求提供情報義務，所以公職若未依法放棄中國國籍，恐面臨國家忠誠義務衝突。"}, {"title": "台股閃現4萬點 台積貢獻92％漲點 資金流向少數電子族群 中小型股下挫", "source": "中國時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "美國與伊朗談判再度受挫，絲毫不影響亞股上演狂歡派對，在美國科技股上周五創高帶動下，日韓股市27日雙創新高，台股則在台積電盤中衝上歷史新天價2330元助攻下，盤中首次攻上4萬點大關，最高來到40194.92點，尾盤台積電遭摜壓，4萬點得而復失，終場仍上漲 684.23點，以39616點再寫新高。「護國神山」台積電走勢最為關鍵，27 日盤中觸及歷史新天價 233 0 元，恰是台積電的股票代號「2330」，隨即湧現賣壓，最後一盤更一口氣爆出2...", "full_text": "美國與伊朗談判再度受挫，絲毫不影響亞股上演狂歡派對，在美國科技股上周五創高帶動下，日韓股市27日雙創新高，台股則在台積電盤中衝上歷史新天價2330元助攻下，盤中首次攻上4萬點大關，最高來到40194.92點，尾盤台積電遭摜壓，4萬點得而復失，終場仍上漲 684.23點，以39616點再寫新高。「護國神山」台積電走勢最為關鍵，27 日盤中觸及歷史新天價 233 0 元，恰是台積電的股票代號「2330」，隨即湧現賣壓，最後一盤更一口氣爆出2185張賣單，直接打到當日最低價 2265元，台股因此未能站穩4萬點。不過台積電仍貢獻636漲點，占台股漲點將近92％。\n\n台股指數創新高，但外資卻與散戶對做，三大法人逆勢賣超482.2 億元，其中外資重砍511.96億元，由買轉賣，光賣超台積電就近1.9 萬張，高達429億元。反觀散戶卻是勇敢進場，融資連兩日大增超過百億元，27日增加111.37億元，餘額來到4520.44億元的高點。台新投顧總經理黃文清分析，以台積電為首的電子權值股走勢強勁，帶動台股衝破4萬點，盤中甚至貢獻大盤指數超過千點，但盤面資金流向少數電子權值股，中小型股下挫，形成類似「蹺蹺板」現象，隨指數來到相對高點，不排除震盪走勢，應避免盤中過度追高。\n\n台股這波上漲猶如急驚風，今年1月5日首度站上3萬點後，即使因美伊開戰壓回，卻無損其多頭格局，不到4個月就見到4萬點。台積電股價在4月10日首度觸及2000元後，更發揮「一人打全場」作用，台股從站上3萬5000點到昨日初見4萬點，僅用了短短11個交易日。不只台股表現耀眼，亞洲股市27日表現普遍都不錯，顯示投資人對美伊戰爭的風險敏感度有所鈍化。\n\n日股表現尤為強勁，日經指數上漲 1.4％，收在60537點，不僅刷新歷史紀錄，亦為首度突破6萬關卡。韓國綜合指數（KOSPI）亦上漲2.2％，同步創下新高。日經指數去年10月突破5萬點以來，僅半年時間便突破6萬點。\n\n回顧過去走勢，3萬到4萬點耗時3年，而 4 萬到 5 萬點僅 1 年半。韓股資金主要流向 AI 基礎設施與電力相關產業，半導體與電力設備類股成為主力，三星電子上漲2.3％，SK海力士則大漲5.7％，改寫歷史新高。"}, {"title": "盼透過3階段架構 突破與美談判僵局 伊朗提案 停火、解封荷莫茲、再談核", "source": "中國時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "據外媒27日報導，伊朗向美國提出三階段新談判方案，即首先討論終止戰爭，再談荷莫茲海峽議題，最後才處理核問題。如果能繞開核問題，將有助美伊更快達成協議，但若美國先解除海上封鎖並止戰，川普總統手中籌碼恐會大縮水。黎巴嫩「廣場」電視台報導，伊朗已向斡旋國提出分三階段推進的談判架構，並表示若美國接受這一方案，談判即可恢復。", "full_text": "據外媒27日報導，伊朗向美國提出三階段新談判方案，即首先討論終止戰爭，再談荷莫茲海峽議題，最後才處理核問題。如果能繞開核問題，將有助美伊更快達成協議，但若美國先解除海上封鎖並止戰，川普總統手中籌碼恐會大縮水。黎巴嫩「廣場」電視台報導，伊朗已向斡旋國提出分三階段推進的談判架構，並表示若美國接受這一方案，談判即可恢復。\n\n談判架構的第一階段重點在於，確保戰火不會在伊朗和黎巴嫩重燃。若第一階段達成共識，談判將進入第二階段，重點圍繞荷莫茲海峽的管理。伊方擬與阿曼方面協調，推動建立管理這一戰略水道的新法律架構。\n\n第三階段將涉及伊朗核計畫。而伊方只會在前兩個階段達成協議後，才準備就核計畫展開討論。美媒Axios也報導說，美國已收到伊朗透過巴基斯坦轉交的新談判方案。\n\n新方案與上述三階段架構類似，首先聚焦於解決荷莫茲海峽危機和美國封鎖問題。作為該方案的一部分，停火將被長期延長或同意永久結束戰事。核談判只會在荷莫茲海峽重新開放、美國封鎖解除後才開始舉行。\n\nAxios指出，伊朗提交新方案的著眼點，在於繞過其領導層內部對核談判讓步幅度的分歧，透過優先解決荷莫茲海峽危機，來突破談判僵局。然而，若美國先行解除對伊朗的海上封鎖，川普在後續核談判的籌碼恐會大幅縮水。川普希望迫使德黑蘭交出高濃縮鈾庫存，並承諾暫停鈾濃縮活動至少10年，這兩點是其發動對伊朗戰爭的核心談判目標。\n\n伊朗外長阿拉奇25日赴巴基斯坦首都伊斯蘭馬巴德，與巴方討論上述新方案。阿拉奇隨後於26日訪問阿曼，傍晚再次抵達伊斯蘭馬巴德，當天深夜離開。阿拉奇27日到訪俄羅斯聖彼得堡，與俄羅斯總統普丁舉行會談，討論中東局勢。\n\nAxios 還援引相關人士的話稱，川普預計 27 日與其國安和外交政策團隊開會，討論當前與伊朗談判的僵局，以及伊朗戰事下一階段的潛在應對方案。川普 26 日表示，若伊朗希望透過談判結束戰事，可以主動聯繫美國。「如果他們想談，可以來找我們，或者給我們打電話。」"}, {"title": "AI熱爆 3月景氣燈號連四紅", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "人工智慧（AI）浪潮帶動下，出口延續強勁成長動能，國發會27日公布3月景氣燈號，續亮代表景氣熱絡的紅燈，且連4紅。國發會官員表示，由於AI商機並未消退，預期第2季經濟表現仍穩健可期，但因傳產仍具不確定性，對於4月是否能亮第5顆紅燈，整體來說「審慎樂觀」。國發會經濟發展處處長陳美菊表示，AI持續扮演支撐景氣的關鍵動能，從生成式AI發展至代理式AI，詞元（Token）消耗數增加，提升算力需求，也推升先進製程與高效能運算晶片。", "full_text": "人工智慧（AI）浪潮帶動下，出口延續強勁成長動能，國發會27日公布3月景氣燈號，續亮代表景氣熱絡的紅燈，且連4紅。國發會官員表示，由於AI商機並未消退，預期第2季經濟表現仍穩健可期，但因傳產仍具不確定性，對於4月是否能亮第5顆紅燈，整體來說「審慎樂觀」。國發會經濟發展處處長陳美菊表示，AI持續扮演支撐景氣的關鍵動能，從生成式AI發展至代理式AI，詞元（Token）消耗數增加，提升算力需求，也推升先進製程與高效能運算晶片。\n\n此外，另一關鍵則是AI供應鏈多採空運，因受中東地緣衝突影響相對有限，加上台灣原物料掌握度亦佳，出口受影響較小，預期第2季景氣可維持穩健。國發會指出，3月景氣對策信號綜合判斷分數為39分，月減2分，燈號續呈紅燈。景氣燈號9項構成項目中，隨春節落點差異影響消退，工業及服務業加班工時轉為黃紅燈，減少1分；\n\n製造業營業氣候測驗點轉為黃藍燈，減少1分；其餘7項燈號維持不變。其中，同時指標為反映當前景氣當下狀況的綜合指標，不含趨勢指數為109.26，較2月上升1.77％，從出口、工業生產指數及機械設備進口等，可看到主要指標都上升，僅工業及服務業加班工時受春節效應去除後，較前一月下滑。\n\n國發會表示，隨全球雲端大廠持續推進AI基礎建設、新一代運算產品出貨，以及代理、邊緣AI等應用快速發展，出口可望延續高速成長態勢；國內半導體大廠因應市場需求增加資本支出規模，也帶動相關供應鏈加速擴廠與產線升級。陳美菊說，觀察台積電4月中旬的法說會內容，整體產能仍然緊俏，資本支出持續上修，且第二季營收持續成長，毛利率升至66.2％，可以預期下一季經濟表現仍相當穩健；\n\n但不同產業表現分岐，科技業在AI強勢帶動下表現亮眼，傳產則面臨原物料價格波動等，還需關注。隨著國內主要智庫看好出口成長、持續上調全年經濟成長率，國發會表示，燈號已連續4個月亮出代表熱絡的紅燈，受惠AI基礎建設需求強勁與台積電法說會釋出的樂觀展望，顯示整體出口動能與生產活動依然穩健，下半年經濟表現仍值得期待。"}, {"title": "社論／美伊僵局 海灣國家戰略轉向", "source": "中國時報 AA01 要聞", "cat": "社論與評論觀點", "priority": 1, "summary": "美國與伊朗持續的衝突，醞釀中東地緣政治寂靜的改造。阿聯王儲哈立德訪問大陸後，隨即成立對華投資專責機構。在此同時，沙烏地阿拉伯王儲與北京高層通話，確認雙方戰略夥伴關係的重要性，科威特最高政治領袖米沙勒也明確表達，考慮將其「2035國家願景」與中國「一帶一路」倡議對接。", "full_text": "美國與伊朗持續的衝突，醞釀中東地緣政治寂靜的改造。阿聯王儲哈立德訪問大陸後，隨即成立對華投資專責機構。在此同時，沙烏地阿拉伯王儲與北京高層通話，確認雙方戰略夥伴關係的重要性，科威特最高政治領袖米沙勒也明確表達，考慮將其「2035國家願景」與中國「一帶一路」倡議對接。\n\n海灣國家經濟傾中這一系列密集的戰略調整，伴隨人民幣結算機制的確立、中國新能源產業鏈的成熟，海灣國家開始將資本重心從歐美市場轉移至中國，此一轉移代表中國與海灣國家的關係，將從單純的能源貿易夥伴，躍升為構建未來的戰略夥伴。轉移的背後是這些國家對國際局勢劇烈動盪的反思，特別是爆發的美伊衝突。伊朗與美軍封鎖荷莫茲海峽，威脅海灣國家的經濟命脈；\n\n能源設施在衝突中蒙受損失，傳統盟友卻自顧不暇，未能提供庇護，讓海灣國家驚醒：依賴美國軍事保護的「石油換安全」模式難以為繼。這場危機不僅為海灣國家帶來巨大的經濟損失，更暴露單一依賴西方安全保障的脆弱。對這些海灣君主國而言，當「保護者」反而成了風險的來源，尋找新的戰略支點便成為了國家生存的必要課題。\n\n無論戰爭結果如何，美國在該地區的軍事影響力難免收縮，「石油美元」體系也可能鬆動。隨著美國頻繁將美元體系武器化（如凍結主權資產），海灣國家對過度依賴美元產生不安。為了防範潛在的制裁風險，沙烏地與阿聯開始在對華能源交易中試點數位人民幣與本幣結算。\n\n石油美元若衰退，將不僅是金融現象，更象徵美國對全球能源定價權與資本流動控制力的削弱。隨著氣候變遷、新能源的開發及美國石油進入國際市場，海灣國家也面臨「後石油時代」的生存挑戰。無論是沙烏地的「2030願景」或阿聯的「2071百年計畫」，都在擺脫對原油出口的單一依賴，企圖實現經濟多元化。\n\n轉型並不容易，它需要強大的工業基礎、先進的技術支撐和高效的基建能力。反觀歐美，因去工業化的結果導致實體製造能力空心化，難以提供海灣國家急需的全產業鏈解決方案。而中國是唯一一個擁有完整工業體系且願意分享技術紅利的合作夥伴。\n\n持續改革贏得信任追求「戰略自主」成為海灣國家經濟與安全政策的核心邏輯。他們不願做地緣政治棋盤上任人擺佈的棋子，而試圖在大國博弈中追求自身利益的最大化。加強與中國的戰略對接，正是這一邏輯的直接體現。\n\n在金融上，他們透過多元化儲備、成立自主主權基金，減少對西方資本市場的被動反應；在安全上，他們引進中國技術推動軍工現代化，以分散安全風險。中國能成為海灣國家的新選擇，關鍵在於中國提供了西方國家無法比擬的獨特機遇。\n\n中國不僅擁有全球最完整的工業門類和領先的新能源、人工智慧技術，更具備在短時間內構建完整產業生態的系統能力。從太陽能設施到電動汽車，從5G網路到智慧城市，中國不僅能提供產品，更能輸出標準、技術和管理經驗，幫助海灣國家建立起屬於自己的現代工業體系。中國龐大的市場與經濟前景也對海灣國家資金充滿吸引力。\n\n海灣國家與中國加速經貿與戰略合作，反映了美中在中東的影響力消長。美國實力隨著其提供安全保障能力和經濟互補性的下降而逐漸衰退，中國則憑藉強大的實體經濟實力和包容的合作理念，成為中東新格局中的關鍵變數。海灣國家用真金白銀對「東升西降」投下信任票，中國若能持續改革，國際和平信譽繼續提升、人民幣自由化進程加速，國力更為強大，全球資本流向將加速改變，並推動舊世界的終結和新世界的開啟。"}, {"title": "台積2倍速擴產 2奈米五座廠同步爬坡 下一世代A16製程亦持續推進，並加碼CoWoS、SoIC等先進封裝技術", "source": "工商時報 A02 火線焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "晶圓代工龍頭台積電加速擴張先進製程產能。在近期落幕的北美技術論壇中，資深副總暨副共同營運長侯永清釋出關鍵訊號指出，為因應人工智慧（AI）與高效能運算（HPC）需求爆發，相較過往，台積電正以「2 倍速」推進擴廠計畫，今年更同時有五座2奈米晶圓廠進入產能爬坡階段（ramp-up），寫下歷年最積極的擴產紀錄。侯永清說，2奈米製程正式邁入量產，且良率學習曲線優於3奈米世代，即便採用更複雜的奈米片（Nanosheet）架構，仍能快速提升製造穩定度...", "full_text": "晶圓代工龍頭台積電加速擴張先進製程產能。在近期落幕的北美技術論壇中，資深副總暨副共同營運長侯永清釋出關鍵訊號指出，為因應人工智慧（AI）與高效能運算（HPC）需求爆發，相較過往，台積電正以「2 倍速」推進擴廠計畫，今年更同時有五座2奈米晶圓廠進入產能爬坡階段（ramp-up），寫下歷年最積極的擴產紀錄。侯永清說，2奈米製程正式邁入量產，且良率學習曲線優於3奈米世代，即便採用更複雜的奈米片（Nanosheet）架構，仍能快速提升製造穩定度，展現台積電在先進製程上的技術領先優勢。\n\n下一世代A16 製程（結合背面供電技術）亦持續推進，將進一步滿足AI與車用市場對高效能與低功耗的嚴苛需求。在產能布局上，台積電自去年開始展開前所未有產能擴張，其中，今年同時有五座（Phase）2奈米晶圓廠同步推進量產，侯永清分析，這種一年內多廠同步導入新製程的模式，過去從未出現；凸顯AI需求已迫使供應鏈進入「超高速擴張」階段，受惠於此，2奈米首年產出將較3奈米同期提升約45％，顯示產能開出效率顯著提升。\n\n不僅此，台積電整體產能擴張節奏亦同步加快。侯永清透露，202 5年至2026年間，每年平均推動九座新建廠或產能轉換計畫，擴張速度較過去倍增，形成「2倍速擴廠」態勢。在全球布局方面，美國亞利桑那、日本熊本及德國德勒斯登等地同步擴產，強化地緣供應鏈韌性。\n\n在需求強勁支撐下，AI晶片出貨動能強勁。侯永清說，2022年至2 026年間，用於AI加速器的晶圓出貨量已大幅成長11倍，其中大尺寸晶粒需求亦同步提升6倍，反映AI運算架構朝向高整合與高效能發展。先進封裝方面，台積電亦同步加碼。\n\nCoWoS與SoIC等3D封裝技術持續升級，並大幅縮短量產導入時間，其中SoIC導入時程縮短達75％，強化客戶產品上市速度。整體先進封裝產能自2022年至2027年將大幅成長約80％，顯示封裝已從後段製程躍升為AI晶片競爭關鍵。隨2奈米進入量產並啟動五廠同步爬坡，搭配全球2倍速擴廠與先進封裝擴張，台積電正全面強化其在AI晶片供應鏈中的關鍵地位。\n\n業界預期，在先進製程與封裝雙引擎驅動下，台積電將持續擴大領先優勢，並主導下一波半導體產業成長節奏。"}, {"title": "國人逾10％是股東…台積擁戴率高燒不墜", "source": "工商時報 A02 火線焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股權王台積電再寫歷史新頁。在人工智慧（AI）與高效能運算（ HPC）需求持續爆發帶動下，台積電27日股價盤中衝2,330元，再刷歷史新高，不僅象徵市值再創高峰，「2330」這組代號，也成台股最具代表性的關鍵密碼。隨股價不斷攀升，台積電股東人數同步飆升，據集保最新統計，股東人數達246萬人，較年初185萬人大幅增加逾60萬人，惟較4月2日2 55.96萬人的歷史高點略為回落。", "full_text": "台股權王台積電再寫歷史新頁。在人工智慧（AI）與高效能運算（ HPC）需求持續爆發帶動下，台積電27日股價盤中衝2,330元，再刷歷史新高，不僅象徵市值再創高峰，「2330」這組代號，也成台股最具代表性的關鍵密碼。隨股價不斷攀升，台積電股東人數同步飆升，據集保最新統計，股東人數達246萬人，較年初185萬人大幅增加逾60萬人，惟較4月2日2 55.96萬人的歷史高點略為回落。\n\n以台灣人口約2,327萬估算，約等同每十人中就有一人為股東，滲透率維持高檔，凸顯「全民股」地位。法人分析，這波股價與股東人數同步攀高，背後有三大動能。首先，AI需求持續擴張，無論是NVIDIA、雲端服務供應商（CSP），或自研ASIC業者，均加大對先進製程與先進封裝投片需求，帶動台積電產能長期滿載。\n\n其次，台積電在3奈米與即將量產的2奈米製程上維持技術領先，並透過CoWoS等先進封裝技術卡位AI核心供應鏈，進一步鞏固競爭優勢。第三，資金面持續偏多。在全球資金尋找AI受惠標的之際，台積電兼具成長性與穩定現金流，吸引外資、投信與散戶同步加碼，加上金管會放寬單一個股上限至25％，ETF與高股息產品持續納入或加碼，推升散戶參與度，形成股價與股東人數「正向循環」。\n\n從籌碼面觀察，散戶比重明顯提升，但法人仍有關鍵影響力。外資雖短線調節，整體持股水位仍高，長線看好趨勢未變。投信則在季底作帳與ETF資金挹注下持續買超，成穩盤重要力量。"}, {"title": "AI時代關鍵平台 台積CoWoS加速升咖", "source": "工商時報 A02 火線焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "AI算力競賽全面升溫，半導體產業版圖正出現關鍵轉折。過去被視為後段製程的先進封裝技術，如今躍升為決定勝負的核心關鍵，台積電CoWoS地位快速抬升，成為全球AI供應鏈最緊俏資源之一。供應鏈分析，透過2.5D與3D封裝架構，結合晶粒堆疊與異質整合，在製程微縮趨緩之際延續摩爾定律，封裝已不再只是製程延伸，而是左右AI晶片效能、功耗與系統架構的關鍵平台。", "full_text": "AI算力競賽全面升溫，半導體產業版圖正出現關鍵轉折。過去被視為後段製程的先進封裝技術，如今躍升為決定勝負的核心關鍵，台積電CoWoS地位快速抬升，成為全球AI供應鏈最緊俏資源之一。供應鏈分析，透過2.5D與3D封裝架構，結合晶粒堆疊與異質整合，在製程微縮趨緩之際延續摩爾定律，封裝已不再只是製程延伸，而是左右AI晶片效能、功耗與系統架構的關鍵平台。\n\n晶片業者估算，單片CoWoS晶圓平均售價（ASP）約1萬美元，已與 7奈米先進製程相當，凸顯封裝環節正式進入高價值競爭領域。同時，在高 ASP 與相對較低資本支出的結構下，其毛利率亦具備比肩先進製程的潛力，顛覆過去封測產業「低毛利」的刻板印象。低設備折舊為先進封裝獲利的關鍵。\n\n設備業者透露，先進製程仰賴造價逾1.5億美元的EUV機台，而CoWoS 在不需昂貴前段製程的情況下，單位產能資本支出相對較低，再加上導入多家台廠設備，如弘塑、 均華、萬潤等，享有高訂價、低折舊優勢。儘管目前先進封裝毛利率仍低於台積電整體平均水準，但隨規模經濟擴大，未來有望成為重要獲利引擎。法人預估，台積電2026年產能約130萬片，2027年挑戰提升至200萬片，供給端正加速追趕需求。\n\n進一步拆解台積電營收結構，先進封裝占台積電營收比重已逐步提升，2025年約達1成，且隨AI晶片需求爆發，未來占比仍將持續攀升；這意味著台積電營運模式正由「晶圓代工」轉向「系統級整合服務」，封裝價值顯著放大。台積電亦積極布局下一代封裝與光電整合，例如SoIC與COUPE（矽光子整合平台），透過3D堆疊與光電共封裝（CPO），將運算與光通訊整合至同一封裝架構，進一步降低功耗並提升傳輸效率。"}, {"title": "ETF、基金單一持股上限提高至25％，後市進場資金蓄勢待發 投信大買台積 創史上之最", "source": "工商時報 A03 財經要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "隨著金管會開放限制，國內股票型基金與主動式ETF之後可將台積電比重從10％以內的限制調高至25％，投信27日買超台股高達145億史上第六高，其中台積電買超121.41億元，創史上單日最大紀錄。法人則指出，目前各投信仍須完成送審與契約修訂程序，短期內資金尚未進場，待完成程序，預估台積電將有望湧入1,668億元的資金活水，但也要視當下市場主流股風向而定。台新投顧總經理黃文清表示，目前主動式台股ETF與前十大股票型基金持有台積電比重均值約達8...", "full_text": "隨著金管會開放限制，國內股票型基金與主動式ETF之後可將台積電比重從10％以內的限制調高至25％，投信27日買超台股高達145億史上第六高，其中台積電買超121.41億元，創史上單日最大紀錄。法人則指出，目前各投信仍須完成送審與契約修訂程序，短期內資金尚未進場，待完成程序，預估台積電將有望湧入1,668億元的資金活水，但也要視當下市場主流股風向而定。台新投顧總經理黃文清表示，目前主動式台股ETF與前十大股票型基金持有台積電比重均值約達8％，為10％上限的8成，若上限鬆綁至 25％，以8成比例來推估預估基金對台積電持股比重可望提升至20％，依現有基金與主動式ETF規模推算，若後續皆將台積電持股比重拉升至20％，合計將可帶動逾千億元的加碼資金。\n\n然而，規模較小的基金為績效考量，通常偏向持有中小型股，而非大型股，千億買盤能否落實，取決於市場行情，若台積電股價獨強，為避免績效落後，大小基金有望同步加碼，若市場資金輪動至中小型電子股，台積電的持股比重則會低於20％。據統計，台股共同基金與主動式ETF若將台積電持股比重都提升至 20％，共可挹注1,668億元資金：共同基金中，千億規模的有安聯台灣科技，百億規模的有安聯台灣智慧、統一奔騰等，整體台股共同基金規模則有1.03兆元，若皆將台積電加碼至2成持股比重，台新投顧推算約可加碼台積電1,236億元。主動式台股ETF目前有14檔，將受惠開放條款的有11檔，目前台積電持股皆在1成以下，包括千億規模的主動統一台股增長，及百億規模的主動群益科技創新、主動群益台灣強棒等，11檔ETF在27日合計規模達3,870億元，若後續皆將台積電加碼至2成持股比重，約可加碼台積電432億元。\n\n14檔中的另外3檔ETF則是受惠於發行投信先前通過金管會「鼓勵投信躍進計畫」，因此單一持股股權重可達30％，包括主動野村台灣5 0、主動復華未來50、主動第一金台股優等ETF等，此外，即將在5月 12日掛牌的統一台股升級50主動式ETF（00403A），市場傳出募集超過800億元，其最大持股也可達30％。"}, {"title": "「積」情演出 退休基金躺著賺 台積電4月飆漲505元加持，估單月輕鬆獲利逾1兆元", "source": "工商時報 A03 財經要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "權王台積電向來是退休基金的最愛，各基金對台積電持股在32％～ 47％不等，近日「台積電條款」發威，推升4月來到27日止，台積電單月飆漲505元，形同政府操作的退休基金「躺著賺」，保守估計， 4月單月可輕鬆獲利逾1兆元，很可能是去年一整年的獲利水準；而勞退基金分紅大發利市，估計超過6萬元，也將輾壓去年全年不到6萬元。翻開過去各基金持股台積電的歷史來看，退休基金穩穩增加持股。", "full_text": "權王台積電向來是退休基金的最愛，各基金對台積電持股在32％～ 47％不等，近日「台積電條款」發威，推升4月來到27日止，台積電單月飆漲505元，形同政府操作的退休基金「躺著賺」，保守估計， 4月單月可輕鬆獲利逾1兆元，很可能是去年一整年的獲利水準；而勞退基金分紅大發利市，估計超過6萬元，也將輾壓去年全年不到6萬元。翻開過去各基金持股台積電的歷史來看，退休基金穩穩增加持股。\n\n國保年金於99年6月底首度公布前十大持股比率時，不見台積電蹤影，直至100年底才以2.84％持股居第十名，114年底持股為38.96％；勞保基金從100年6月底持股僅7.19％，114年底飆升至48.15％。新制及舊制勞退基金於105年6月底公布前十大持股時，對台積電持有14.59％及22.16％，114年底各上升至31.96％及37.42％。\n\n退撫基金106年6月底首度公布前十大持股時，台積電為11.65％， 114年底為47.23％。持股比率都翻好幾倍。今年來台積電股價飆漲715元、漲幅46.13％，27日收2,265元；\n\n預期屆時公布6月底持股將大幅攀升或創新高水位，對退休基金獲利貢獻度持續攀升。台積電也成為退休基金最重要的獲利來源，3月股市遇美伊戰事亂流，台積電單月跌235元或11.78％，可能會將2月賺的吐回逾三分之二，估計單月虧損可能達到3,000～4,000億元，然前三個月獲利仍有約6,000億元以上水位，最後精確數字待勞動基金運用局及退撫金管理局於5月4日公布3月收益。4月來台股春暖花開，展開飆馬行情，加權指數大漲7,893點漲幅2 4.88％，台積電更大漲505元漲幅28.69％，退休基金持有台積電部位最重，若到月底維持目前大漲態勢，估計單月不只賺逾1兆元；\n\n加計尚待公布前三月估計賺 6,000 億元，前四月勞工及公教退休基金獲利幾乎可以篤定將大幅贏過去年全年的 1.37 兆元。對比勞工及公教退休基金一路來增加台積電持股水位，外資反而近年來大賣台積電。據統計，外資最新27日持有台積電水位 70.91％，相較 106 年 6 月 8 日對台積電持股達到 80.21％的歷史高峰，減少 9.3 個百分點；\n\n同期間，外資賣超台積電1.51兆元，但持有台積電市值仍達 41.65兆元。"}, {"title": "挺產業 經部：維持現行空污法 此次修法恐削減電力及供應鏈韌性，預計影響半導體等關鍵產業8千家，並增加停工風險", "source": "工商時報 A04 綜合要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "維持現行空污法此次修法恐削減電力及供應鏈韌性，預計影響半導體等關鍵產業8千家，並增加停工風險針對立法院社會福利及衛生環境委員會擬於29日排審《空氣污染防制法》部分條文修正草案，經濟部於27日表示，此次修法恐削減我國電力供應及產業供應鏈韌性，預計將全面影響國內半導體、鋼鐵、石化、紡織、造紙、水泥等領有固定污染源排放許可的關鍵產業 8,000 家廠商，經濟部必須為產業請命，籲維持現行《空污法》制度。針對排審的《空污法》經濟部提出五點疑慮。首...", "full_text": "維持現行空污法此次修法恐削減電力及供應鏈韌性，預計影響半導體等關鍵產業8千家，並增加停工風險針對立法院社會福利及衛生環境委員會擬於29日排審《空氣污染防制法》部分條文修正草案，經濟部於27日表示，此次修法恐削減我國電力供應及產業供應鏈韌性，預計將全面影響國內半導體、鋼鐵、石化、紡織、造紙、水泥等領有固定污染源排放許可的關鍵產業 8,000 家廠商，經濟部必須為產業請命，籲維持現行《空污法》制度。針對排審的《空污法》經濟部提出五點疑慮。首先，許可證未完成審查即失效，讓產業面臨停工風險。\n\n經濟部指出，依據民眾黨黨團版本，只要地方政府兩個月內未完成審查，即由產業承擔地方政府未能及時完成審查的後果，極不合理。經濟部表示，綜觀全國約8,000家中大型廠商皆倚賴操作許可持續運作，其中逾5成為高科技光電半導體業、石化業、鋼鐵業、水泥業、國防產業及各中大型企業的鍋爐，若僅因地方政府審查程序較長，便逕自轉為強制停工恐造成大規模上下游斷鏈與經濟損失，且連續運轉設備，若強制停工也會造成不可逆的損失。第二，下修許可證效期增加成本、且劃設「三級防制區」衝擊經濟發展。\n\n經濟部說明，將許可證展延有效期間由三至五年，縮短為二至五年，增加營運業者及主管機關行政負擔，且不利穩定操作，違背信賴保護原則。而新增「三級防制區」可縮短展延期限，恐使西半部多數電廠與高科技產業許可證有效期大幅縮短，增加頻繁申請負擔。第三，經濟部表示，刪除鼓勵業者主動申請新舊製程同步改善污染的友善機制，且直接授權地方政府可以加碼要求業者配合減量，不但無端增加營運風險，且缺乏中央監督機制，易生中央與地方政府管制標準不一的情形。\n\n第四，地方政府可片面公告禁止電廠使用燃料，將可能衝擊全國用電。經濟部指出，此舉將導致全國各地的公民營電廠均面臨運作受限疑慮，嚴重影響國家能源供應穩定。最後，經濟部認為，法律不明確，會影響企業投資可預期性。\n\n修正草案允許地方政府在展延審查時，得以「認定有削減或加嚴操作條件必要者」、「有健康風險之虞」為由，變更原許可內容。條文規範模糊、空白授權，反而可能衍生執行不確定性與重複管制的疑慮。"}, {"title": "台積條款有望吸金2,000億 投信大部隊資金還沒上車 持股比率已攀至3.11%新高 引發想像空間", "source": "經濟日報 A02 話題", "cat": "台灣產業與投資動向", "priority": 0, "summary": "金管會上周四（23日）放寬國內股票型基金及主動式ETF對於單一個股投資比率限制，台積電成為台股當前唯一受惠者，激勵股價連兩日勁揚。法人推估，保守情境下，新制將為台積電帶來 1,500億元投信資金，樂觀則可達2,000億元。台積電昨（27）日盤中閃見2,330元驚喜價，市場高度關注投信資金進場時點與規模。", "full_text": "金管會上周四（23日）放寬國內股票型基金及主動式ETF對於單一個股投資比率限制，台積電成為台股當前唯一受惠者，激勵股價連兩日勁揚。法人推估，保守情境下，新制將為台積電帶來 1,500億元投信資金，樂觀則可達2,000億元。台積電昨（27）日盤中閃見2,330元驚喜價，市場高度關注投信資金進場時點與規模。\n\n投信業者表示，屆時是否將台積電提高到淨資產25%仍需視盤視狀況及經理人而異，在專業法人資金還沒上車前，台股中長線持續樂觀可期。金管會放寬國內股票型基金及主動式ETF對於單一個股的投資比率上限，由10%提高到25%。投信上周五買超台積1,168張後，昨日擴大買超4,992張，為2025年11月26日來單日新高，推升投信持股比率攀升至3.11%，創有統計來最高，引發想像空間。\n\n法人表示，投信目前管理規模中，在台股逾6.5兆元，單是被動式ETF占近乎三分之二，而主動式基金約1.06兆元、主動式ETF約0.4兆元，假設各類別都提高台積電權重10%至15%間，推估流入台積電資金規模將落在1,500億元至2,000億元之間。不過，以作業流程來看，目前多數業者都仍處在內部作業階段，後續仍需要出具保管行、律師意見書等說明對投資人權益無重大影響，並須將投資審核程序，將風險監控機制與管理流程等納入內部控制制度，並提董事會通過後，再向主管機關提出申請修約。相關作業快則一個月，慢約需二、三個月。\n\n投信業者分析，主動式基金及ETF是否加碼台積電，需視盤面狀況、經理人態度而異，但提高上限，對經理人來說，可增加操作彈性。舉例來說，適用深耕計畫，單一持股上限三成的主動式ETF，其中，主動野村台灣50昨日持有台積電張數維持1,372張，權重連兩日在29%之上；主動復華未來50單日增持台積電1,250張，持股比從14.92%跳升至22.14%；\n\n主動第一金台股優昨日增持56張，持股比從14.75%跳升至17.11%，可見各經理人操作策略不一而足。"}, {"title": "房市投資人跳船 錢進股市 台積房賣壓沉重 屋主將鎖在不動產中的資金釋出 投入金融商品", "source": "經濟日報 A02 話題", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台積房出現多殺多，投資人跳船。根據591房屋交易網最新統計，過去一年六都及新竹地區的成屋刊登數量顯著攀升，而且賣壓最大的區域多環繞科學園區，並以台積電或相關供應鏈廠區周邊相對嚴峻。專家更點出，房市鬆綁無期，房市資金流向股市愈趨明顯。", "full_text": "台積房出現多殺多，投資人跳船。根據591房屋交易網最新統計，過去一年六都及新竹地區的成屋刊登數量顯著攀升，而且賣壓最大的區域多環繞科學園區，並以台積電或相關供應鏈廠區周邊相對嚴峻。專家更點出，房市鬆綁無期，房市資金流向股市愈趨明顯。\n\n高力國際業主代表服務部董事黃舒衛表示，房市資金流入股市的現象，逐步成趨勢，且因房市政策未鬆綁，近一年高資產族群透過房地產作為資金槓桿投入股市的樣態，也愈趨多元。黃舒衛表示，在選擇性信用管制與貸款成數限制下，不少持有房產的屋主開始透過轉增貸或「理財型房貸（科目四）」活化資產，將原本鎖在不動產中的資金釋出，進一步投入股市或其他金融商品。觀察賣壓最沉重的十大地區，則以台中市的情況最為嚴重，不僅包辦前三名，更一口氣奪下五個席次，另，過去因台積概念房而備受矚目的高雄市橋頭區及楠梓區等，也都同步上榜。\n\n專家表示，在房市政策多重壓抑下，市場上許多資產族群都認為「買台積電概念房不如買台積電股票」，導致市場資金「錢」進台股，尤其過去受惠台積電設廠等題材，房價暴漲的區域正迎來屋主跳船潮，資金明顯流向表現火熱的台股市場。觀察全台十大成屋賣壓區，台中市大雅區過去因台積電新廠話題帶動，區域房市備受青睞，但近一年託售件數暴增35.9%，年增幅居冠，刊登物件數量從2024年的761件新增至1,034件。南屯區與大里區也分別成長32%與30%，台中市北區、沙鹿區也上榜，年增量體皆逾兩成。\n\n高雄市則有小港、橋頭及楠梓入榜，增幅皆突破兩成，顯見這些區域過去幾年受惠台積電設廠等科技話題，房價一度狂飆，如今在環境下行之際，成為待售重災區。此外，台北市內湖、北投兩區，過去也受到科技相關產業園區的帶動，房市一度受到火熱追捧，但去年刊登量亦較前年成長26.3%及18.7%。"}, {"title": "OpenAI攻智慧機 台積大贏家 傳與聯發科、高通合作開發新處理器 提供全面性AI代理服務 晶圓一哥營運進補", "source": "經濟日報 A03 話題", "cat": "台灣產業與投資動向", "priority": 0, "summary": "生成式AI巨頭OpenAI傳將跨足智慧手機領域。陸系分析師昨（27）日在社群平台發文表示，OpenAI正與聯發科及高通合作開發旗下首款手機搭載的處理器，以打造出「重新定義智慧手機」的產品為目標，要讓手機提供全面性AI代理服務，目標2028年量產。OpenAI 已在生成式 AI 市場雄霸一方，業界認為，若該公司投入智慧手機領域，無論採用高通或聯發科的處理器，台積電都是贏家。", "full_text": "生成式AI巨頭OpenAI傳將跨足智慧手機領域。陸系分析師昨（27）日在社群平台發文表示，OpenAI正與聯發科及高通合作開發旗下首款手機搭載的處理器，以打造出「重新定義智慧手機」的產品為目標，要讓手機提供全面性AI代理服務，目標2028年量產。OpenAI 已在生成式 AI 市場雄霸一方，業界認為，若該公司投入智慧手機領域，無論採用高通或聯發科的處理器，台積電都是贏家。\n\n若最終聯發科的方案獲得OpenAI青睞，也將為聯發科智慧手機業務帶來更多新動能。陸系外資提到，OpenAI要打造手機，是要完全掌控作業系統與硬體，藉此讓手機提供全面性的AI代理服務，而非只是讓用戶使用一堆應用程式（App）。同時，這款新手機會高度整合雲端與裝置端AI，手機硬體會持續理解用戶文本，因此手機處理器的設計關鍵在於耗電、記憶體分層管理與基本較小模型運作等，至於複雜或高強度的需求則由雲端 AI執行。\n\n供應商方面，陸系分析師認為，OpenAI正與聯發科和高通合作開發手機處理器，預計2026年底或2027年第1季決定規格與供應商。雖然聯發科與Google合作的TPU Zebrafish，單顆AI晶片營收大約等同於30至40個AI代理手機的處理器，但初期若鎖定全球每年3億至4億支高階機種，相關換機潮仍是一大強力動能。聯發科與高通是全球非蘋手機處理器雙雄，近年雖然各自以不同角度進攻雲端資料中心應用市場，但手機晶片仍是不可割捨的業務。\n\n聯發科已連續21季蟬聯全球手機晶片出貨量龍頭，聯發科執行長蔡力行先前於法說會中示警，今年對智慧型手機產業來說，「會是艱難的一年」。但他也強調，相信明年或之後一年半的智慧手機需求將保持強健，相關需求肯定回升，聯發科為此做好準備。此外，陸系外資預期，中國大陸組裝大廠立訊將是OpenAI這款手機獨家系統協力設計與製造商，預計2028年量產。\n\n根據陸系外資的說法，立訊在蘋果供應鏈的組裝地位很難超越鴻海，然而，一旦立訊成為 OpenAI 手機代工夥伴，可望因提前布局而受惠，成為下一個手機世代的領先受益者。在商業模式方面，陸系外資認為，OpenAI可能會將訂閱制與硬體捆綁銷售，並建立全新的AI代理生態與開發商合作。"}, {"title": "經部衝量子產業 台廠動了 宣布多項跨國合作 金仁寶集團攜手美商SEEQC研發晶片 橫跨兩大領域 後市有戲", "source": "經濟日報 A03 話題", "cat": "台灣產業與投資動向", "priority": 0, "summary": "經濟部昨（27）日宣布成立量子產業推動辦公室，揭露多家台廠參與，以及多項與國際大廠合作成果，最受關注的是台灣已與美國知名上市量子運算公司SEEQC開發量子晶片，台廠中，金寶已入股SEEQC公司並展開合作，隨著SEEQC與台灣量子合作邁步，業界看好金寶領先群雄，成為大贏家。經濟部並公布量子產業推動辦公室各項分工，產業類共分為電子半導體、設備、材料、控制軟體、應用等五大類，金仁寶集團以金寶及仁寶兩家公司，分別橫跨電子半導體與應用兩類，是台灣...", "full_text": "經濟部昨（27）日宣布成立量子產業推動辦公室，揭露多家台廠參與，以及多項與國際大廠合作成果，最受關注的是台灣已與美國知名上市量子運算公司SEEQC開發量子晶片，台廠中，金寶已入股SEEQC公司並展開合作，隨著SEEQC與台灣量子合作邁步，業界看好金寶領先群雄，成為大贏家。經濟部並公布量子產業推動辦公室各項分工，產業類共分為電子半導體、設備、材料、控制軟體、應用等五大類，金仁寶集團以金寶及仁寶兩家公司，分別橫跨電子半導體與應用兩類，是台灣主要大型企業集團當中，唯一同時橫跨兩大類布局的集團。鴻海、緯創兩大集團則都隸屬電子半導體領域。\n\n金寶董事長許介立日前受訪時即透露，非常看好量子運算前景，金寶積極投入，希望能成為日後集團營運的新動能。法人分析，金仁寶集團已在消費性電子、PC代工領域聞名國際，但在AI時代腳步稍顯落後，如今在備受業界期待的量子運算領域全面卡位，有望洞燭機先，扳回一城。經濟部強調，積極進行量子技術與產業布局，目前已有具體成果，包括開發出能承受攝氏零下 269度的低溫控制晶片，更促成與國際業者展開合作，例如與 SEEQC 開發量子晶片、與美商 Rigetti Computing 合作開發低溫模組，為台灣量子領域扎下深厚根基。\n\n為了進一步幫助企業切入量子市場，與國際接軌，並積極取得訂單，經濟部決定成立「量子產業技術推動辦公室」，不僅要扮演關鍵推動角色，還會串聯工研院研發量能與民間產業實力，打造具備國際競爭力的量子產業生態系。業界指出，經濟部揭露台灣與SEEQC開發量子晶片，意味金寶量子布局也邁出大步。金寶已入股SEEQC，雙方攜手合作開發單磁通量子（SFQ）控制IC。\n\nSEEQC目前也獲得輝達轉投資合作，並推動以輝達GPU運算架構與SFQ技術結合，共同推動量子運算技術開發。若SEEQC技術發展成功，代表金寶未來亦有機會攻入輝達量子電腦供應鏈當中，這也是金寶本次以電子半導體項目加入經濟部召開的量子產業技術推動辦公室的主要原因。此外，仁寶早在去年中就宣布將攜手量子國家隊，共同開發量子啟發運算應用。\n\n仁寶指出，仁寶與量子國家隊已經開始在不同領域合作研究量子啟發運算應用。"}, {"title": "3月景氣熱 亮第四顆紅燈 AI商機強強滾 經濟穩健成長領先指標連二月滑落 後續變化待觀察", "source": "經濟日報 A04 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "國發會昨（27）日發布3月景氣燈號，再次亮出代表「景氣熱絡」的紅燈，至3月已「連四紅」，受惠於AI商機熱轉，國內經濟穩健成長。不過景氣對策信號綜合判斷分數降到39分，較2月減少2分，且領先指標已連二月滑落，後續景氣變化仍待觀察。國發會經濟發展處處長陳美菊指出，3月景氣分數回落，主要來自兩項因素。", "full_text": "國發會昨（27）日發布3月景氣燈號，再次亮出代表「景氣熱絡」的紅燈，至3月已「連四紅」，受惠於AI商機熱轉，國內經濟穩健成長。不過景氣對策信號綜合判斷分數降到39分，較2月減少2分，且領先指標已連二月滑落，後續景氣變化仍待觀察。國發會經濟發展處處長陳美菊指出，3月景氣分數回落，主要來自兩項因素。\n\n一是工業及服務業加班工時由紅燈轉為黃紅燈，主因春節落點差異影響逐漸消退，減少1分；二是製造業營業氣候測驗點由綠燈轉為黃藍燈，主要受中東衝突推升國際油價與不確定性影響，廠商對未來半年景氣轉趨審慎同樣減少 1分。至於其餘七項燈號維持不變，包含海關出口值、股價指數、工業生產指數、批發零售餐飲營業額等，都維持熱絡紅燈；\n\n貨幣總計數M1B則維持綠燈。從景氣指標觀察，3月領先指標轉為下滑，且已連續兩個月下降，主因外銷訂單動向轉弱，尤其傳統產業在國際情勢影響下，接單轉趨保守。不過，同時指標則已連續七個月上升，反映當前經濟活動仍處擴張階段，短期內景氣仍具韌性。\n\n陳美菊指出，雖部分指標轉弱，但整體經濟動能仍具支撐，出口、生產與內需表現持續穩定，特別是在 AI應用需求帶動下，相關產業景氣維持熱絡，成為支撐整體景氣的重要力量。陳美菊分析，近期AI應用持續擴展，從生成式AI延伸至邊緣AI與各類新興應用，帶動高效能運算與先進製程晶片需求強勁，半導體產能持續滿載，企業資本支出也持續擴大，有助支撐投資動能與整體經濟成長。展望未來，隨全球雲端大廠投入AI基礎建設，新一代運算產品陸續出貨，出口動能可望延續；\n\n投資方面，半導體業者擴廠與供應鏈升級，加上政府推動13項戰略產業及數位、淨零雙轉型政策，將持續挹注成長力道。內需方面，在就業市場穩定、股市上揚帶動財富效果，及減稅措施與演唱會、運動賽事活動加持下，民間消費可望維持活絡。國發會提醒，中東地緣政治情勢與美國貿易政策變化，仍將增加全球經貿與通膨不確定性。"}, {"title": "竊取機密 觸犯國安法 台積前工程師陳力銘判十年", "source": "經濟日報 A05 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "尹慧中、李珣瑛、編譯劉忠勇/綜合報導台積電四名前工程師陳力銘、吳秉駿、戈一平、陳韋傑，因涉竊取、外流台積電核心機密檔案，智慧財產及商業法院昨（27）日依營業秘密法、國家安全法意圖使用國家核心關鍵技術營業秘密共五罪，各判處四人十年、三年、二年及六年徒刑。另外，陳力銘轉職的台灣東京威力（TEL）公司，成為檢方依違反國安法起訴的公司法人首例。智慧財產及商業法院認為，東京威力公司未善盡監督之責，任由受雇人涉犯共五個營業秘密域外使用罪，處罰金 1...", "full_text": "尹慧中、李珣瑛、編譯劉忠勇/綜合報導台積電四名前工程師陳力銘、吳秉駿、戈一平、陳韋傑，因涉竊取、外流台積電核心機密檔案，智慧財產及商業法院昨（27）日依營業秘密法、國家安全法意圖使用國家核心關鍵技術營業秘密共五罪，各判處四人十年、三年、二年及六年徒刑。另外，陳力銘轉職的台灣東京威力（TEL）公司，成為檢方依違反國安法起訴的公司法人首例。智慧財產及商業法院認為，東京威力公司未善盡監督之責，任由受雇人涉犯共五個營業秘密域外使用罪，處罰金 1.5億元並宣告附條件緩刑三年，於判決確定日起一年內，向台積電和公庫各支付1億元及5,000萬元。\n\n對於相關判決，台積電表示，台積電對任何違反公司保護營業秘密及損害公司利益的行為，始終秉持零容忍態度，絕對從嚴處理，追究到底。台灣東京威力公司則回應，本次調查及判決結果，均無東京威力科創（Tokyo Electron）及TEL台灣存在組織性介入或相關機密資訊外流情事。TEL台灣強調，已和台積電協商，雙方同意強化營業秘密及機密資訊保護與共享原則，此事對該公司營運無影響。\n\n判決指出，陳力銘原任台積電12廠良率工程師，離職後轉任台積電半導體製造設備供應商、台灣東京威力行銷部門，為替東京威力爭取台積電先進製程更多站點的設備供應商，多次央求三人翻拍台積電機密檔案，用以改進東京威力的蝕刻機台。另外，曾帶領東京威力科創深耕中國大陸市場的陸籍主管陳捷日前離職，原因是他被查出涉及投資競爭對手。"}, {"title": "損供應鏈韌性 工商界︰勿修惡空污法", "source": "自由時報 A02 焦點新聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "國民黨立委羅廷瑋與民眾黨團分別提出「空污法」修正草案，立法院衛環委員會二十九日排審。全國工業總會與工業區廠商聯合總會已公開呼籲維持現行管理機制，經濟部昨與工商界同聲強調，草案涉及所有能源及產業的排放規定，恐削減我國電力供應及產業供應鏈韌性，預期將全面影響國內半導體、鋼鐵、石化、紡織、造紙、水泥等有固定污染源排放許可的關鍵產業八千家廠商，牽連甚廣，不可不慎，經濟部必須為產業請命，籲請立法院體察民瘼，維持現行「空污法」制度。經濟部總結產業界...", "full_text": "國民黨立委羅廷瑋與民眾黨團分別提出「空污法」修正草案，立法院衛環委員會二十九日排審。全國工業總會與工業區廠商聯合總會已公開呼籲維持現行管理機制，經濟部昨與工商界同聲強調，草案涉及所有能源及產業的排放規定，恐削減我國電力供應及產業供應鏈韌性，預期將全面影響國內半導體、鋼鐵、石化、紡織、造紙、水泥等有固定污染源排放許可的關鍵產業八千家廠商，牽連甚廣，不可不慎，經濟部必須為產業請命，籲請立法院體察民瘼，維持現行「空污法」制度。經濟部總結產業界意見指出草案疑慮，其中第三十條草案規定展延申請期間，操作許可效期期滿，只要地方政府兩個月內未完成審查則不得操作；\n\n但「由產業承擔地方政府未能及時完成審查的後果極不合理」，全國約有八千家中大型廠商皆依賴操作許可，強制停工恐造成大規模上下游斷鏈與不可逆的經濟損失。經濟部指出，草案擬下修許可證效期兩至五年，不僅增加業者及主管機關行政負擔且不利穩定操作，違背信賴保護原則；草案新增「三級防制區」可縮短展延期限，恐使西半部多數電廠與高科技產業許可證有效期大幅縮短，增加頻繁申請負擔。\n\n經濟部並表示，草案第二十七條「刪除」鼓勵業者主動申請新舊製程同步改善污染的友善機制，且直接授權地方政府可片面強制要求業者配合減量，不但無端增加營運風險，且缺乏中央監督機制，造成中央與地方政府管制標準不一的情形。此外，草案第二十八條允許地方政府片面公告禁止或限制使用生煤、燃油、SRF、天然氣等燃料，但貿然禁止或限制燃料使用，將衝擊全國能源與產業正常營運。"}, {"title": "工程師竊密 僅陳韋傑未獲台積電原諒", "source": "自由時報 A07 財經新聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台積電離職工程師陳力銘轉投東京威力公司後，為求個人工作表現，涉勾結台積電工程師吳秉駿、戈一平、陳韋傑，竊取台積電二奈米及十四埃米製程等機密；智慧財產及商業法院合議庭認定東京威力未能善盡監督受僱人的企業社會責任，但審酌該公司積極配合偵查及台積電內部調查，並偕同母公司與台積電和解，另積極檢討並建立防止措施，依違反國安法及營業秘密法共五罪，判處罰金一．五億元，緩刑三年，條件是支付台積電一億元並支付公庫五千萬元。合議庭認定東京威力有罪主因，是該...", "full_text": "台積電離職工程師陳力銘轉投東京威力公司後，為求個人工作表現，涉勾結台積電工程師吳秉駿、戈一平、陳韋傑，竊取台積電二奈米及十四埃米製程等機密；智慧財產及商業法院合議庭認定東京威力未能善盡監督受僱人的企業社會責任，但審酌該公司積極配合偵查及台積電內部調查，並偕同母公司與台積電和解，另積極檢討並建立防止措施，依違反國安法及營業秘密法共五罪，判處罰金一．五億元，緩刑三年，條件是支付台積電一億元並支付公庫五千萬元。合議庭認定東京威力有罪主因，是該公司對陳力銘工作績效表現的考核資料清楚記載：「能蒐集到客戶與競業資訊，公司內部不易取得的訊息」等評語，可知東京威力清楚明瞭陳力銘可能利用舊識情誼而非法蒐集不易取得的台積電內部資訊，而有國安法及營業秘密法規定的未善盡監督、防止之責。\n\n至於陳力銘，檢方去年八月起訴時求刑十四年，今年一月追加起訴再求刑七年；但這次法院量刑，其所犯五罪中最重一罪僅三年六月，不算重判。主因是合議庭審酌，陳所為雖造成台積電營業秘密可能外流危險，並危及產業國際競爭力與國家經濟安全，但他偵審均自白予以減刑，又主動供出陳韋傑，此部分免刑；\n\n台積電也具狀表明東京威力非其競爭對手，且陳蒐集的營業秘密未洩漏與東京威力及其母公司東京威力科創株式會社，而量處執行刑十年。洩密十四埃米製程陳否認犯行吳秉駿、戈一平兩人也因充分配合且協助調查，加上台積電具狀表明原諒，判處三年及兩年徒刑；但陳韋傑僅坦承客觀事實否認犯行，且其擅自重製十四埃米製程機密，為台積電半導體製程從「奈米邁入埃米」時代的先進技術節點，迄今未取得台積電諒解，判刑六年。\n\n陳男等人所犯國安營業秘密意圖域外使用罪為二級二審制，可上訴至最高法院。"}, {"title": "台積電最高觸及2330元 台股4萬點驚鴻一瞥", "source": "自由時報 A08 財經 證券", "cat": "台灣產業與投資動向", "priority": 0, "summary": "受金管會新規加持，週一台股上演「拉積盤」，權值王台積電（2330）股價一度強彈逾5%，來到跟股票代碼一樣的價格2330元，再創新高，帶動台股數度站上4萬點大關，最高觸及4萬194.92點，同創歷史新高，終場上漲684.23點、以3萬9616.63點作收，4萬點未能站穩，成交量近1.25兆元；中小型股為主的櫃買市場跌幅約1.18%，力守10日均線。觀察三大法人動向，外資昨賣超511.96億元、投信買超135.18億元、自營商賣超105.4...", "full_text": "受金管會新規加持，週一台股上演「拉積盤」，權值王台積電（2330）股價一度強彈逾5%，來到跟股票代碼一樣的價格2330元，再創新高，帶動台股數度站上4萬點大關，最高觸及4萬194.92點，同創歷史新高，終場上漲684.23點、以3萬9616.63點作收，4萬點未能站穩，成交量近1.25兆元；中小型股為主的櫃買市場跌幅約1.18%，力守10日均線。觀察三大法人動向，外資昨賣超511.96億元、投信買超135.18億元、自營商賣超105.43億元，合計賣超482.21億元；\n\n外資台指期淨空單昨增3590口，累積外資台指期淨空單約4.42萬口。放寬單一持股上限投信補庫存台積電玉山科技島基金經理人王偉哲指出，由於金管會放寬台股基金與主動式ETF單一持股上限，由10%提高至25%，預期投信針對晶圓龍頭大廠將出現一波補庫存行情，推估潛在增量資金可達2000億元，在資金回流與大型權值股走強的支撐下，指數表現可望持續維持相對強勢。野村臺灣新科技50ETF（00935）經理人林怡君表示，近期美國科技巨頭持續上修AI資本支出規模，雲端服務供應商加速擴建資料中心，而台灣AI供應鏈在先進製程、記憶體、光通訊、電源管理與高階封裝等環節受惠，訂單能見度仍維持高檔。\n\n元大投顧分析，從技術面觀察，加權指數的月線與季線乖離率分別超過11%與16%，現階段大盤融資餘額已超過4400億元，伴隨近期美伊戰局詭譎多變，消息面紛擾恐使台股波動加劇。10日均線至4萬1千點估本週指數高檔震盪元大投顧也提醒，週一盤面呈現「拉大出小」、下跌家數遠大於上漲家數，騰落指標（ADL）走降，買盤過度傾斜權值股，壓抑中小型股表現空間，預估本週指數將在10日均線之上、4萬1千點之下高檔震盪。"}, {"title": "南科效應 南漂 不再是「薪酸」選擇 科技業帶動轉型、人才需求變大 部分服務業薪資趕上雙北", "source": "聯合報 A05 財經", "cat": "台灣產業與投資動向", "priority": 0, "summary": "隨著台積電及相關供應鏈前往台南、嘉義、高雄擴廠，南漂就業話題興起。人力銀行數據顯示，不只就業人口往南部移動，連過去遠不如北部的餐飲休閒等低薪服務業也不再「薪酸」。市場需求大的職務，如行政人員、基層門市人員、客服人員、保險業務經紀人等，中南部都會區的月薪中位數逐漸追上台北，有些則與新北齊平，甚至超車新北。", "full_text": "隨著台積電及相關供應鏈前往台南、嘉義、高雄擴廠，南漂就業話題興起。人力銀行數據顯示，不只就業人口往南部移動，連過去遠不如北部的餐飲休閒等低薪服務業也不再「薪酸」。市場需求大的職務，如行政人員、基層門市人員、客服人員、保險業務經紀人等，中南部都會區的月薪中位數逐漸追上台北，有些則與新北齊平，甚至超車新北。\n\n「科技業扮演轉型引擎，不用再委屈南漂就業了！」一○四人力銀行永續長鍾文雄說，電子資訊產業在中南部的求供比來到二點二七至二點六二，等於每人可分配到約二點五個工作機會；當高科技人才回流或南移，伴隨而來的高消費力與人才居住需求，進一步支撐基層行政、門市與業務職務的調薪動能，讓「南漂」不再是退而求其次的選擇。\n\n從營收表現也可看出南部就業市場翻轉事實。竹科過去在科技業發展一枝獨秀。受惠於ＡＩ浪潮與半導體先進製程的強勁需求，近年來南科表現急起直追，竹科去年營業額一點七兆元，雖較前年成長百分之十二點二五，但南科去年營業額達二點九七兆元，較前年成長百分之卅四點二六。\n\n竹科就業人數近十八萬人，南科去年就業人數逼近十萬人，較前年增加五六八二人，成長驚人。鍾文雄表示，從一○四數據觀察，今年一月和去年同期相比，期望在中南部工作的人數比率成長百分之十三以上，大於留在北部的百分之十一點○三，顯示南漂數增多，中南部職場漸趨熱絡。一○四發現，諸如行政人員、基層門市、專櫃人員或客服人員，中南部薪資都與北部拉近，其中行政人員在台中、台南、高雄月薪中位數三點五萬元，追平新北市的三點五萬元，台北市則為三點八萬元。\n\n客服人員亦然，中南部月薪中位數三點八萬元，與新北三點八萬元齊平、台北四萬元。鍾文雄表示，以工程類的軟體工程師為例，新竹縣市因產業聚落密集，人力市場競爭下，月薪中位數還是最高，約六點九萬元；台北、新北約六萬元，台中五點二萬元，高雄五萬元，南北薪資落差較大，但受惠於南科效應，帶領許多高薪產業鏈進駐，消費力提升，人才需求大，為了搶人才，重塑當地產業鏈薪資，拉近北中南服務業薪資差距。\n\n一一一一人力銀行發言人莊雨潔指出，中南部服務業如連鎖咖啡等外場人員，尤其是高雄、台南的部分店家開出薪資都比新北高，甚至直逼台北，雖然可能與門市狀況地點不同，但可以看出南台灣因為比較多人才回流，加上科技業進駐南台灣，都帶動薪資接近北部。另外則是因南部人才缺口大，必須提高薪資留人。至於未來的薪資成長性，南台灣服務業現在才開始加薪找人，因此往上成長空間的確比北部大。"}, {"title": "衝擊領先 台積洩密案 4內鬼最重判10年 14埃米檔案外洩 「奈米」邁入「埃米」節點 營業秘密首件國安法判決", "source": "聯合報 A12 司法", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台積電四名前工程師陳力銘、吳秉駿、戈一平、陳韋傑，因涉竊取、外流台積電核心機密檔案，智慧財產及商業法院昨依營業秘密法、國家安全法意圖使用國家核心關鍵技術營業秘密共五罪，各判處四人十年、三年、二年及六年徒刑。是法院依違反國安法判決有罪的首例。四人當中，陳力銘、吳秉駿、戈一平偵審中認罪，均獲合議庭減刑，加上台灣東京威力科創與台積電和解，台積電具狀表示，東京威力屬其半導體製造設備供應商，非競爭對手；", "full_text": "台積電四名前工程師陳力銘、吳秉駿、戈一平、陳韋傑，因涉竊取、外流台積電核心機密檔案，智慧財產及商業法院昨依營業秘密法、國家安全法意圖使用國家核心關鍵技術營業秘密共五罪，各判處四人十年、三年、二年及六年徒刑。是法院依違反國安法判決有罪的首例。四人當中，陳力銘、吳秉駿、戈一平偵審中認罪，均獲合議庭減刑，加上台灣東京威力科創與台積電和解，台積電具狀表示，東京威力屬其半導體製造設備供應商，非競爭對手；\n\n其次，陳力銘所蒐集營業秘密，均未洩漏給台灣東京威力及其母公司日商東京威力科創株式會社以外的第三方，願接受東京威力道歉並原諒三人。唯一未獲台積電原諒及合議庭輕判，是矢口否認犯罪的陳韋傑。他被控利用不知情的同事帳號、密碼，登入公司資料庫，翻拍機密圖檔傳送給陳力銘，外洩的更是台積電最先進的「十四埃米」製程檔案，事涉台積電半導體製程從「奈米」邁入「埃米」時代的先進技術節點，嚴重影響台積電延續並保持全球先進製程領先地位，被合議庭認為不宜輕縱。\n\n判決指出，陳力銘原任台積電十二廠良率工程師，離職後轉任台積電半導體製造設備供應商、台灣東京威力行銷部門，為力求表現，替東京威力爭取台積電先進製程更多站點的設備供應商，多次運用與吳、戈、陳等人同事舊誼，央求三人翻拍台積電機密檔案外流，以改進東京威力的蝕刻機台。二○二三年八月至去年六月，四名工程師分別在台積電新竹廠區會議室、新竹市居酒屋、吳男及戈男住處及台積電台南封裝測試廠內，以仍在職的涉案工程師公務筆電，開啟機密檔案供陳力銘翻拍，或翻拍傳給陳力銘。判決指，身為始作俑者的陳力銘，與其餘三人共犯兩個一般侵害營業秘密之意圖域外使用罪，及三個國安營業秘密之意圖域外使用罪。\n\n不過，陳力銘獲取台積電「十四埃米」檔案，原與陳韋傑是共犯關係，因陳力銘供出來源是陳偉傑，符合國安法自首因而查獲其他共犯規定，此部分獲判免刑。台積電表示，台積對任何違反公司保護營業秘密及損害公司利益的行為，始終秉持零容忍態度，絕對從嚴處理，追究到底。台積電將持續強化內部管理及監控機制。"}, {"title": "台積電洩密案 前工程師判10年 3共犯2至6年徒刑 東京威力達成和解 罰1.5億緩刑3年 重申無外流、強化資訊管理", "source": "中國時報 A06 社會綜合", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台積電前工程師陳力銘等 4 人洩漏 2 奈米、14 埃米等商業機密，智慧財產及商業法院 27 日依《國家安全法》、《營業祕密法》，判處陳力銘10年有期徒刑，其餘3人處2至6年不等徒刑。陳離開台積電後任職東京威力科創台灣分公司，該公司遭檢方追加起訴，成為國安法起訴法人公司首例，因與台積電和解，緩刑3年，但需向台積電支付1億元、公庫支付5000萬元。東京威力科創（TEL）昨天表示，對於Tokyo Electron台灣子公司東京威力科創未能充...", "full_text": "台積電前工程師陳力銘等 4 人洩漏 2 奈米、14 埃米等商業機密，智慧財產及商業法院 27 日依《國家安全法》、《營業祕密法》，判處陳力銘10年有期徒刑，其餘3人處2至6年不等徒刑。陳離開台積電後任職東京威力科創台灣分公司，該公司遭檢方追加起訴，成為國安法起訴法人公司首例，因與台積電和解，緩刑3年，但需向台積電支付1億元、公庫支付5000萬元。東京威力科創（TEL）昨天表示，對於Tokyo Electron台灣子公司東京威力科創未能充分履行對前員工的監督義務，公司以極為嚴肅的態度看待，並強調將進一步強化全集團的資訊管理體制等相關措施。\n\nTEL表示，公司將遵守法令及倫理基準視為最重要的經營方針，不容許違反上述準則，而本次調查及法院判決結果，均無TEL及台灣子公司存在組織性介入或相關機密資訊外流的情勢；同時已與客戶協商，雙方同意強化營業祕密及機密資訊保護與共享原則，這次事件對營運無影響，未來將持續提升企業價值，以回應所有利害關係人的期待。判決指出，陳力銘為改善2奈米製程良率，民國114年經由前同事吳秉駿、戈一平協助翻拍台積電機密。\n\n另也找陳韋傑借用不知情同事帳號密碼，登入台積電公司資料庫翻拍圖檔。事件爆發後，東京威力主管盧怡尹刪除陳翻拍的台積電營業祕密圖檔，湮滅證據，但在發現刪除的電磁紀錄回復後，主動通報公司，判刑10月，緩刑3年，支付公庫100萬元。合議庭審酌陳力銘為求個人表現，造成台積電營業祕密可能外流，但未洩露給東京威力與其母公司以外的第三方，台積電願接受道歉，判10年徒刑。\n\n吳秉駿、戈一平坦承犯行，判吳3年、戈2年徒刑。陳韋傑否認具有域外使用的意圖，判6年徒刑。合議庭另考量東京威力承認犯罪、配合調查，其母公司與台積電達成和解，判處1億5000萬罰金、緩刑3年，應於判決確定1年內向台積電支付1億元、公庫支付5000萬。\n\n台積電表示，對任何違反公司保護營業祕密及損害公司利益的行為，始終秉持零容忍態度，絕對從嚴處理，追究到底；這次公司珍貴的營業祕密與技術得到充分保護，也將持續強化內部管理及監控機制，並在必要時與執法機關合作，確保競爭優勢及營運穩定，保護核心競爭力。"}, {"title": "台積一人武林 類股齊揚不再 一個台股、兩種世界 中小股慘殺跌停、傳產股「失聯」 政策偏袒恐迎反撲", "source": "中國時報 A07 財經綜合", "cat": "台灣產業與投資動向", "priority": 0, "summary": "視你有多久沒看到「類股齊揚」了？在台積電領軍衝鋒下，台股盤中順勢衝破4萬點，但這愈來愈像「一個人的武林」，在台積電包辦台股超過9成漲點同時，有超過1360檔股票收黑，還有169檔股票創下月新低，如果你手中沒有台積電或ETF，台股4萬點也與你無關，「一個台股、兩種世界」的對比愈來愈強烈。金管會上周宣布放寬國內股票型基金及主動式ETF單一持股比率，為台股衝關4萬點踢進臨門一腳，這項「台積電條款」直接騰出台積電潛在買盤近2000億元，台積電也...", "full_text": "視你有多久沒看到「類股齊揚」了？在台積電領軍衝鋒下，台股盤中順勢衝破4萬點，但這愈來愈像「一個人的武林」，在台積電包辦台股超過9成漲點同時，有超過1360檔股票收黑，還有169檔股票創下月新低，如果你手中沒有台積電或ETF，台股4萬點也與你無關，「一個台股、兩種世界」的對比愈來愈強烈。金管會上周宣布放寬國內股票型基金及主動式ETF單一持股比率，為台股衝關4萬點踢進臨門一腳，這項「台積電條款」直接騰出台積電潛在買盤近2000億元，台積電也不負所託，靠一己之力助攻台股登上4萬點高光時刻，但搶買台積電的同時，中小型股卻慘遭拋棄。\n\n金管會放寬台積電不能說錯，當台積電市值已占台股超過4成，硬要國內股票型基金及主動式ETF持股只能1成，確實不合理，這會導致在台積電幾乎等同大盤時，績效落後大盤。但不可否認，當這些投資標的幾乎跟著台積電或大盤在走，其差異性愈來愈小。於是乎，當主動式ETF只跟你討論含「積」量有多高時，資金排擠效應開始出現，以昨天的盤勢為例，台積電買盤不曾斷過，卻見多檔中小型股慘殺跌停，穩懋、全新、聯亞、波若威等電子股無一倖免，甚至連半導體設備股也被拖累，與台積電形成鮮明對比。\n\n這只是「電子股的世界」，非電子股，尤其是傳統產業，早從去年 4 月初美國總統川普宣布對等關稅迄今，就與台股完全「失聯」，別說資金早就轉移至半導體、AI類股，就連過往看傳產股的研究員都被調離，於是乎半年來研究報告沒見幾篇，股價更是持續崩跌。結果就是職場上講的「貧富差距」，完全複製在台股上。如果你沒有台積電，台股4萬點對你來說無感，但這還不是最慘的；\n\n如果你抱的不是台積電，相較對等關稅宣布前，如今帳上恐怕還虧，更像「選錯系」的諷刺，這如同台灣產業的縮影，剝奪感持續加劇。台積電很棒、台股很強，都是好事，但絕對不是衡量經濟好壞的唯一指標，畢竟不是每個國民都有台積電。且隨著台股指數從「參考台積電」到「看台積電一檔就好」，政府更需正視不只產業資源傾斜，當政策也只為特定產業打造時，仇恨值終將不惜代價反撲。"}, {"title": "軍購預算協商 朝野無共識", "source": "經濟日報 A04 焦點", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院昨（27）日第三度協商軍購特別預算，藍綠白三黨仍無共識，立法院長韓國瑜裁示5月6日再次協商。國防部長顧立雄籲支持政院1.25兆元版本，整體國防預算規劃，保衛國家安全，是攸關國家生死存亡大事。行政院所提軍購特別條例，預算規模為 1.25 兆元，國民黨版本為「3,800 億元+N」，民眾黨則主張 4,000 億元。", "full_text": "立法院昨（27）日第三度協商軍購特別預算，藍綠白三黨仍無共識，立法院長韓國瑜裁示5月6日再次協商。國防部長顧立雄籲支持政院1.25兆元版本，整體國防預算規劃，保衛國家安全，是攸關國家生死存亡大事。行政院所提軍購特別條例，預算規模為 1.25 兆元，國民黨版本為「3,800 億元+N」，民眾黨則主張 4,000 億元。\n\n昨日協商過程，國民黨立委徐巧芯首度拋出8,000億元版本，經協商後仍無共識，留待下周再議。根據經濟部、國防部先前規劃，盼以1.25兆元打造台灣之盾，國防產業將聚焦無人機／船、航太、船艦、機器狗及衛星五大領域。1.25兆元的特別預算估可創造4,000億元產值、帶來逾9萬個工作機會。\n\n國防部昨日在立法院專案報告「新興科技應用於不對稱作戰效能分析與未來發展」，書面報告指出，將以科技驅動國防力量持續提升。無人機部分，當前各類無人機已大量部署運用於戰場，執行情監偵、攻擊、通訊中繼、電戰、後勤與救援等任務。在地面無人載具部分，國軍已規劃導入機動性高、多功能及模組化之四足機器人（機器狗）、無人運輸及戰術載具，用於縱深、城鎮作戰中執行偵察、殲敵及物資運補任務。\n\n而水面、水下無人載具，為有效防禦海上威脅，規劃籌建小型自殺無人艇及水下除雷無人載具，增強近岸防衛與反登陸戰力。國防部表示，已編列特別預算，規劃籌獲反甲、監偵及攻擊型等各類無人機 21萬餘架。"}, {"title": "朝野無交集 軍購條例協商再破局", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜昨第三次針對「國防特別條例草案」召開協商，這次會前傳出國會受到美方敦促，有望「挑燈夜戰」達成共識，豈料朝野對預算上限仍無交集，僅開一小時許就散會，五月六日（下週三）將第四度協商；國防部長顧立雄表情無奈，民進黨團總召蔡其昌則諷藍白現在還談「空白授權」，機密專報這麼多場，「是在開心酸的嗎？」 五月六日將第四度協商協商過程中，國民黨團書記長林沛祥、立委陳永康先後詢問我國向美洽購「星盾」軍規衛星通訊系統進度，以及條文應考量「台灣之...", "full_text": "立法院長韓國瑜昨第三次針對「國防特別條例草案」召開協商，這次會前傳出國會受到美方敦促，有望「挑燈夜戰」達成共識，豈料朝野對預算上限仍無交集，僅開一小時許就散會，五月六日（下週三）將第四度協商；國防部長顧立雄表情無奈，民進黨團總召蔡其昌則諷藍白現在還談「空白授權」，機密專報這麼多場，「是在開心酸的嗎？」 五月六日將第四度協商協商過程中，國民黨團書記長林沛祥、立委陳永康先後詢問我國向美洽購「星盾」軍規衛星通訊系統進度，以及條文應考量「台灣之盾」系統建置等；\n\n立委徐巧芯則提議優先討論預算匡列上限。不過民眾黨立委邱慧洳表示，政院版軍購特別預算仍是「空白授權」，黨團難支持；民眾黨團總召陳清龍也說，只要國防部向大眾具體說明採購項目，民眾黨團就同意調增金額。\n\n對此，國防部戰規司長黃文啓回應，先前提供的軍售價格是基於美方「知會國會」資訊，後續會再依更低的發價書金額做調整；顧立雄重申，一．二五兆元預算運用已在機密專報中多次說明，他不曉得還能再說明什麼，表情略顯無奈。蔡其昌則諷藍白現在還談「空白授權」，機密專報這麼多場，「是在開心酸的嗎？」 徐巧芯提八千億版本傅稱個人意見據了解，由於徐巧芯提出八○○○億元軍購版本，美方近期與徐聯繫，表達相關態度，徐因此在協商中直接提出將軍購金額從國民黨團原定的「三八○○億元+Ｎ」版本，調升至八○○○億元；不過國民黨團總召傅崐萁反對，認為八○○○億元是徐的個人意見，傅堅持原案；陳清龍也表示，相關金額需要回到黨團開會研討。\n\n因朝野缺乏共識，韓宣布短暫休息，繼續開會後，韓便宣布因有黨團提出欲調整條文金額、項目，尚待黨團大會討論通過，宣布散會，下月六日召開第四度協商。蔡其昌會後表示，一．二五兆元國防軍購條例是捍衛中華民國的救命錢，希望下週能讓條例先過，否則未來的預算將會更難處理，拜託朝野以捍衛中華民國為念，支持軍購。蔡強調，國民黨今天的版本就算是八○○○億元，後面還有商購、自製。\n\n台中是無人機產業的重鎮，台中市長盧秀燕也在媒體上表示台中要發展無人機產業；若未來國民黨把無人機產業自製的部分全部砍掉，恐怕會打盧市長的臉。民進黨籍國防外交委員會召委陳冠廷補充，在近幾次協商中，韓院長的態度是希望一．二五兆元特別條例涵蓋更多項目，且包括商購在內。"}, {"title": "軍購條例協商再破局 綠問藍白：到底要拖多久？ 哪項戰力不重要？", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜昨天第三度主持「國防特別條例草案」的朝野黨團協商，僅一小時就匆匆宣布散會。民進黨痛批，藍白聯手拖了五個月，如今又推「需經黨團大會討論」，事實很清楚，就是故意擋國防，請好好回答：到底還要拖多久？哪一項戰力可以不要？", "full_text": "立法院長韓國瑜昨天第三度主持「國防特別條例草案」的朝野黨團協商，僅一小時就匆匆宣布散會。民進黨痛批，藍白聯手拖了五個月，如今又推「需經黨團大會討論」，事實很清楚，就是故意擋國防，請好好回答：到底還要拖多久？哪一項戰力可以不要？\n\n出現防衛破口，藍白可以負責嗎？若防衛出現破口藍白可負責嗎民進黨指出，國民黨、民眾黨昨在朝野協商時宣稱對金額沒共識、需要再多討論，更推說「改變金額需要經過黨團大會討論」，彷彿現場的黨團總召與多位立委什麼都不能決定，「一推、二拖、三裝死」，韓國瑜只好宣布五月六日再協商。從行政院提出國防特別條例至今，藍白已經聯手拖了五個月，預算編列、軍購進行也都被拖累。\n\n民進黨也列出藍白無心強化國防、不斷故意拖延的相關例證：四月九日配合「習鄭會」集體蹺班缺席委員會協商；十五日院長協商時，藍委擺爛稱「不知道國防規劃」；廿一日國防部配合提出機密專報，藍委除陳永康外再次蹺光光；\n\n廿三日第二次院長協商，藍白只關心法律條文不能提到「中共軍事威脅」和「國防產業」；昨第三次協商依然破局。民進黨痛斥，藍白立委不是擺爛、就是「沒出席」，更誇張的是，民眾黨立委劉書彬甚至狀況外到，讓韓國瑜忍不住提醒「你看一下附件一好不好？\n\n你問的問題就知道答案了嘛！」藍白這種態度，怎麼好意思說是在「監督國防」？根本就是在阻擋國防！\n\n提升國防已經不能再等！民進黨發言人吳崢指出，國防部早已清楚說明八年一．二五兆元國防特別預算的完整規劃、七大類支出項目及金額，絕非藍白口中的「黑箱、無菜單」，請藍白立委切莫閹割台灣國防。民進黨也點名藍白好好回答：到底還要拖多久？\n\n哪一項戰力可以不要？導致台灣出現防衛破口，藍白可以負責嗎？"}, {"title": "軍購金額黨內意見分歧 藍委：黨中央犯得著堅持當壞人嗎", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜昨就國防特別條例第三度召開朝野黨團協商，因國民黨內部意見分歧，仍須待黨團大會討論通過，五月六日再協商。據掌握，國民黨內多數立委都支持將上限調高到八○○○億元，並列出「有發價書始得編列」的但書，若美方下半年又有發價書來，就不必再為軍購攻防一次，但黨中央仍堅持黨版「三八○○億元+N」。有藍委無奈說，「黨中央犯得著堅持當壞人嗎？」 國民黨團明開大會研商為解決黨內軍購意見歧異，國民黨團昨以「特急件」發出開會通知，將於明天（廿九日）...", "full_text": "立法院長韓國瑜昨就國防特別條例第三度召開朝野黨團協商，因國民黨內部意見分歧，仍須待黨團大會討論通過，五月六日再協商。據掌握，國民黨內多數立委都支持將上限調高到八○○○億元，並列出「有發價書始得編列」的但書，若美方下半年又有發價書來，就不必再為軍購攻防一次，但黨中央仍堅持黨版「三八○○億元+N」。有藍委無奈說，「黨中央犯得著堅持當壞人嗎？」 國民黨團明開大會研商為解決黨內軍購意見歧異，國民黨團昨以「特急件」發出開會通知，將於明天（廿九日）中午召開黨團大會，研商重大法案軍購案，強調此次黨團大會視同「甲級動員」，要求黨籍立委務必出席「全程參與」；如未出席，視同支持黨團決議。行政院提出規模一．二五兆元的「強化防衛韌性及不對稱戰力計畫採購特別條例草案」，民眾黨團提出四○○○億元版本，國民黨則是「三八○○億元+N」，與政院版規模相去甚遠。\n\n台中市長盧秀燕接受本報專訪時表態，應通過八○○○億至一兆元才合理；前中廣董事長趙少康也認為，應先匡列八一○○億元，先審查通過已收到美國發價書的三五○○億元，剩下的四六○○億元暫時凍結，等收到新的美國發價書再行通過。前國民黨主席朱立倫子弟兵、桃園市議員凌濤也曾呼籲國民黨提出九○○○億元版本。\n\n據了解，國民黨內多數立委都支持將上限調高到八○○○億元，直接將軍購議題處理完，因為下半年就要選舉，若美方下半年又有發價書來，屆時還要再編一次預算，又要再為軍購攻防一次，韓國瑜、立法院副院長江啟臣也是傾向此主張。盼黨中央尊重黨團自主黨內人士表示，早先確實有黨團幹部與民眾黨主席黃國昌談過，認為國民黨能接受加碼到八○○○億元，沒想到後來黃在接受專訪時直接爆料「藍白方向一致」，但當時黨內還未完全達成共識，很多藍委聽到時都相當詫異，因為黨中央仍然堅持原本的「三八○○億元+N」版本。藍委無奈表示，黨中央有其堅持，但要尊重黨團自主，「黨中央犯得著堅持當壞人嗎？」而且軍購後續還有商售、委製的部分，能否買到實用、有品質的武器，都要好好把關，確保每一筆的軍購經費都確實用在提升戰力上，而不是留下任何的爭議空間。"}, {"title": "特別軍購 藍委首提8千億元 朝野昨協商30分鐘即散會韓國瑜邀下周三再談", "source": "聯合報 A02 焦點", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜昨第三度召集朝野協商軍購特別條例草案，國民黨立委徐巧芯協商時拋出特別預算八千億元，韓國瑜直呼「這個數字第一次出來」；韓國瑜原預告挑燈夜戰討論出共識，但朝野無共識，協商卅分鐘即散會。國民黨立院黨團明天也將召開黨團大會，韓國瑜宣布五月六日下周三再協商。", "full_text": "立法院長韓國瑜昨第三度召集朝野協商軍購特別條例草案，國民黨立委徐巧芯協商時拋出特別預算八千億元，韓國瑜直呼「這個數字第一次出來」；韓國瑜原預告挑燈夜戰討論出共識，但朝野無共識，協商卅分鐘即散會。國民黨立院黨團明天也將召開黨團大會，韓國瑜宣布五月六日下周三再協商。\n\n朝野協商昨天聚焦軍購條例草案第四、五條採購項目與金額等深水區。國民黨團首席副書記長許宇甄表示，如果美方對台軍售有第二批發價書，國民黨團「三八○○億元＋Ｎ」版本就可以再繼續往上加，並詢問國防部長顧立雄到底有無第二批發價書？民眾黨團總召陳清龍也說，民眾黨版本原本金額上限是四一○○億元，但只要有第二批軍購發價書，國防部也有明確訊息，民眾黨就可以調整草案。\n\n顧立雄說，金額就是行政院版本的一點二五兆元，軍購會有先行知會國會程序，美國已經有正式文件來表達，這在機密專案報告都有詳細說明，有些是沒有辦法公開的事項。徐巧芯協商時表示，國防部所提一點二五兆元包含軍售、商售與國內委製，國民黨立場認為分開較務實；軍售預算金額「大概是八千億元」左右，必須思考軍售以外項目是否要回到一般預算？\n\n韓國瑜此時特別強調，「八千億這個數字第一次出來」。民進黨團總召蔡其昌說，他有去找國民黨團總召傅崐萁溝通，傅認為八千億元版本是徐巧芯個別意見，國民黨團要再次討論；民眾黨團也表達，協商金額若從原先版本上升到八千億元，也需要回去再問黨團成員。\n\n蔡其昌說，對於藍白都需要再取得內部共識，民進黨團不會反對。徐巧芯表示，她僅是說明如果軍購條例草案匡列金額要支撐起第一波、第二波對美軍購的內容，基本上就是八千億元，要不要討論？後來韓國瑜就裁示休息，傅崐萁當時也說，就讓相關內容回到黨團大會做最後確定。\n\n傅崐萁表示，國民黨團有兩個原則，一個就是「對美軍購」才會同意，第二則是一定要有「指定品項」在預算裡；現在最怕就是空白授權，屆時國防部塞進一堆非對美軍購預算，在野黨每刪一項就會被側翼大做文章，因此必須要有源頭控管。谷立言：通過「全面性」預算非常重要美國在台協會（ＡＩＴ）處長谷立言接受媒體專訪時表示，台灣通過「全面性」特別預算條例非常重要，這不僅向國際社會發出非常重要的信號，且對於確保台灣能獲得所要求的全部防禦能力也至關重要，國防特別條例可以愈快通過愈好。"}, {"title": "藍白若有共識 5月8日院會表決 藍營內部若意見仍分歧可能「川習會」後再處理", "source": "聯合報 A02 焦點", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜昨第三度召集朝野協商軍購條例草案，卅分鐘就散會。據了解，韓國瑜下周三將再召集協商，屆時藍白若有一定共識，不排除五月八日在院會表決處理；但若藍營內部意見仍然分歧，很有可能「川習會」之後再處理。", "full_text": "立法院長韓國瑜昨第三度召集朝野協商軍購條例草案，卅分鐘就散會。據了解，韓國瑜下周三將再召集協商，屆時藍白若有一定共識，不排除五月八日在院會表決處理；但若藍營內部意見仍然分歧，很有可能「川習會」之後再處理。\n\n對藍白黨團版本軍購規模，國民黨高層指出，黨團原則是有美方發價書就同意，但若還沒有第二批美國發價書，就同意多匡列預算，屆時行政院送預算書來，一定夾雜很多不是對美採購項目，屆時在野黨不管刪哪個項目，都會遭綠營扣「賣台」帽子，藍營立委承受得了？對於軍購條例草案延後協商，是否意在讓軍購條例拖過川習會？國民黨中央重申，軍購條例各版本已在立法院協商，會尊重黨團自主；\n\n且川習會日期是否定案也未知，不可能有「拖過川習會」的指示。國民黨副主席蕭旭岑表示，國民黨軍購立場已很清楚，版本已經付委審查，至於黨版「三八○○億＋Ｎ」的Ｎ是多少，大家已有逐步共識，只要有發價書、也有明確的項目，大家可以來談。黨中央尊重黨團自主和立法院審議進度，最重要是還要跟民眾黨協商，最後處理一定是經藍白兩黨最高度的共識。\n\n國民黨人士指出，「＋Ｎ」已涵蓋八千億元的精神，要匡列金額還是把Ｎ拿掉，若在野黨討論後認為可加，「黨中央並非鐵板一塊」。"}, {"title": "可修法嚴謹界定 學者：陸配參政權應由兩岸條例規範", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "新任中選會主委游盈隆27日談及「陸配參政權」時表示，除非修改中華民國《憲法》與相關法律，否則現階段用《國籍法》處理陸配參政權問題，實屬牽強且具有高度爭議性；對此，中山大學榮譽教授廖達琪也認為，陸配參政權應透過《兩岸關係條例》做相應規範，使用 《國籍法》確實有疑慮。廖達琪解釋，我國有《兩岸關係條例》，且《憲法》也沒有將中國排除在外，所以若要用《國籍法》處理陸配參政的議題，在現有的憲政框架上確實有所疑慮，而游盈隆說法也是在憲法脈絡的一個法理...", "full_text": "新任中選會主委游盈隆27日談及「陸配參政權」時表示，除非修改中華民國《憲法》與相關法律，否則現階段用《國籍法》處理陸配參政權問題，實屬牽強且具有高度爭議性；對此，中山大學榮譽教授廖達琪也認為，陸配參政權應透過《兩岸關係條例》做相應規範，使用 《國籍法》確實有疑慮。廖達琪解釋，我國有《兩岸關係條例》，且《憲法》也沒有將中國排除在外，所以若要用《國籍法》處理陸配參政的議題，在現有的憲政框架上確實有所疑慮，而游盈隆說法也是在憲法脈絡的一個法理基礎。\n\n她認為，如果真的要讓陸配參政權更加明確，除了修憲外，也可以透過《兩岸關係條例》修法，讓政府更嚴謹地界定陸配身分，包括獲取身分證以及獲得參政權的年限。國民黨立委林沛祥說，感謝游盈隆講了大實話，一句「法理牽強」 等於幫大家把遮羞布掀開了，既然連中選會主委都說要「根本解決」，那國民黨團態度也很簡單，請行政院不要再把責任丟給國會，提出一個負責任的版本，大家好好討論，別再讓制度漏洞變成政治提款機，「大家都很忙，提款機也該休息一下了。」 民進黨立委鍾佳濱則回應，游盈隆可能還以為自己是學者，尚未習慣中選會主委的身分，作為獨立機關的首長，卻對非受理案件做出表態，「不曉得他這時解釋《憲法》以及《國籍法》的涵義何在？」 鍾佳濱認為，中選會做為獨立機關應該保持沉默以維持中立性，如今沒有相關個案卻發表此類言論，非獨立機關首長所應為。陸委會副主委梁文傑先前指出，陸配參政權是規範在《兩岸關係條例》之中，但是選上後就任公職是規範在《國籍法》。他強調，部分人認為特別法適用應優於普通法，但這是誤解，所謂特別法適用優於普通法，是針對同一事項。\n\n在此事上，《兩岸關係條例》僅規定陸配可以參選，後續就任公職是要按照《國籍法》規定。"}, {"title": "軍購協商又破局 下周三決戰 藍委徐巧芯首拋上限8000億元 在野均認為需與黨團成員討論 商購部分仍無解", "source": "中國時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜27日第3次針對「國防特別條例」草案召集朝野協商，原本以為可以談出最終結果，未料，國民黨立委徐巧芯會中首度拋出「8000億元」版本建議，但黨團總召傅（山昆）萁認為金額變動，需要經黨團大會通過。協商1小時後，韓國瑜最後宣布5月6日再召開協商。據了解，國民黨明（29）日將召開黨團大會討論，最快5月 8日院會就會處理。", "full_text": "立法院長韓國瑜27日第3次針對「國防特別條例」草案召集朝野協商，原本以為可以談出最終結果，未料，國民黨立委徐巧芯會中首度拋出「8000億元」版本建議，但黨團總召傅（山昆）萁認為金額變動，需要經黨團大會通過。協商1小時後，韓國瑜最後宣布5月6日再召開協商。據了解，國民黨明（29）日將召開黨團大會討論，最快5月 8日院會就會處理。\n\n美國在台協會（AIT)處長谷立言接受《中國時報》專訪，特別呼籲立院盡速通過「全面性」的國防特別條例；國防部長顧立雄昨也注意到谷立言談話，希望國防部所提方案能得到朝野支持。他強調，整體國防預算規畫能讓官兵獲得新式裝備來保衛國家安全，是一件攸關國家生死存亡的大事，希望朝野理性、嚴肅面對。\n\n昨天協商前，韓國瑜揚言不排除挑燈夜戰，但協商一開始，各黨團仍然各抒己見，民眾黨立委劉書彬甚至還在問上次協商的共識，讓韓忍不住打斷，要她自己看附件；民進黨團總召蔡其昌也感慨協商「又退回委員會時狀態」，認為在野黨不如講明哪些項目不要，才好聚焦討論。徐巧芯則提議先跳過採購項目，直接討論總額，獲得在場黨團同意。\n\n徐更進一步提出「8000億元」版本建議，認為國防部若繼續堅持軍購與商購、委製在一起，很難有共識，不如拆分來看，先處理最有共識的軍購部分，2波對美軍購大約8000億元，因此建議上限到8000億元，但條文須載明動支預算要有發價書。韓國瑜聽到徐巧芯具體提出數字後，說「這個數字第一次出來」，即宣布會議休息，讓各黨團私下交換意見協商。不過，經韓國瑜多方穿梭，協商仍未有共識，最後宣布「由於有黨團認為金額有變化，必須回去經黨團大會通過才行」，因此5月6日再協商。\n\n由於韓國瑜5月 9日至17日將率跨黨派立委赴歐洲國會外交，所以特別條例最快8日送院會處理。蔡其昌透露，他曾找傅（山昆）萁溝通，傅認為8000億元是徐巧芯個人意見，黨團需要再次討論找出共同看法；民眾黨團也表達協商金額從原黨版4000億元上升到8000多億元，需要再問黨團成員。\n\n據了解，國民黨預計明天召開黨團大會討論，藍委馬文君表示，8 000億元版本可以討論，因為原則沒變，就是要有發價書。但無人機等商購案就是不行，應該用年度預算採購最新、最好的。"}, {"title": "避緊急車遭開單 法制局促修法不舉發", "source": "中國時報 A05 生活 財經", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "駕駛未避讓救護車、消防車等緊急任務車輛件數去年334件創5年新高，立院法制局指出，為避免駕駛避讓反遭科技執法開單，建議修法明定不舉發，建立AI輔助辨識及舉發前複核機制。交通部回應，仍有人工審核可申訴撤單，暫無需修法。今年1月發生因駕駛顧慮科技執法，即便救護車鳴笛閃燈也不避讓，使救護車困在車陣4分鐘，引發社會對科技執法撻伐。", "full_text": "駕駛未避讓救護車、消防車等緊急任務車輛件數去年334件創5年新高，立院法制局指出，為避免駕駛避讓反遭科技執法開單，建議修法明定不舉發，建立AI輔助辨識及舉發前複核機制。交通部回應，仍有人工審核可申訴撤單，暫無需修法。今年1月發生因駕駛顧慮科技執法，即便救護車鳴笛閃燈也不避讓，使救護車困在車陣4分鐘，引發社會對科技執法撻伐。\n\n有民眾坦言，曾遇過為禮讓救護車，超越停止線而被拍照，雖然後續不用受罰，但之後又遇到救護車在後方，看紅燈秒數剩10秒左右，乾脆多等一下綠燈再開。公路局統計，未避讓緊急車輛件數逐年增加，去年舉發334件創5年新高，總罰鍰金額逾121萬元，1月底起罰鍰已提高至6000元至3萬元，並吊銷駕照及吊扣牌照6個月。法制局指出，各地廣設科技執法維持交通秩序，但駕駛若因避讓救護車而短暫壓線、駛入路口或變換車道，可能被拍下舉發，引起依法應避讓，卻因避讓反挨罰爭議。\n\n法制局建議，在《道交條例》增訂駕駛因避讓緊急任務車輛而短暫跨越停止線、換車道、駛入路口等，未妨害交通安全者不予處罰，使避讓時有保障，避免依賴申訴救濟。另為避免先開單、後申訴情況，建議可依影像資料不予舉發，並應建立科技執法案件的AI輔助辨識及舉發前複核機制。交通部回應，《行政罰法》已有免罰規定，無需修正《道交條例》。\n\n且有人工審核機制，若發現是禮讓救護車就不會開單，遭舉發可申訴撤單，後續將請警政署研處精進科技執法舉發案件的審核作業。"}, {"title": "國有財產持股市值衝破5兆", "source": "工商時報 A04 綜合要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股大盤頻傳新高，也讓國有財產有價證券身價水漲船高。依財政部最新統計，2025年國有財產總值新台幣12.92兆元，其中依財產種類區分，有價證券價值達5.09兆元，除了是首破5兆元，相較2021年時的2.99兆元更劇增7成。財政部統計處說明，國家依法取得、接受捐贈、或非屬私有或地方所有的財產，除法律另有規定，均為國有財產。", "full_text": "台股大盤頻傳新高，也讓國有財產有價證券身價水漲船高。依財政部最新統計，2025年國有財產總值新台幣12.92兆元，其中依財產種類區分，有價證券價值達5.09兆元，除了是首破5兆元，相較2021年時的2.99兆元更劇增7成。財政部統計處說明，國家依法取得、接受捐贈、或非屬私有或地方所有的財產，除法律另有規定，均為國有財產。\n\n其中有價證券的部分，像是國發基金或科技部研發基金的持股，或是部分校務基金持股等，都是國有財產。台股近年表現不俗，台積電股價更一飛衝天，都是造成國有財產有價證券市值大漲的主因。財政部表示，其中台積電股票在立院決議下，沒有出售的打算；\n\n至於其他國有財產有價證券，處理也都以不影響市場為原則。如按使用性質分，其中占逾1/2的各機關公務用財產增加8,607億元、年增12.6％最多，國營事業用財產亦增664億元、年增3.3％，若加計直接供公共使用的國有財產，2025年公用財產總值逾12兆元；非公用財產則維持9,100億元。\n\n若依財產種類區分，國有財產以土地為大宗，近五年各年總值約在 5.3兆至5.5兆元；其次為有價證券，近年隨台股走升而水漲船高，2 024年總值4.23兆元，單年大增1.1兆元、年增35.6％，2025年更達5 .09兆元。"}, {"title": "新壽外價金重算 惹話題 金額減四成 金管會要求釐清 董座魏寶生：合併前後會計基礎不同 一切合法合規", "source": "經濟日報 A10 金融", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台新新光金日前法說會，揭露新光人壽2026年1月開帳外匯價格準備金由996億元降到560億元，大減436億元。因外價金屬負債項目，減少將直接挹注淨值。據了解，金管會已請新壽釐清、說明相關疑慮，內部傾向「不同意」該調整。", "full_text": "台新新光金日前法說會，揭露新光人壽2026年1月開帳外匯價格準備金由996億元降到560億元，大減436億元。因外價金屬負債項目，減少將直接挹注淨值。據了解，金管會已請新壽釐清、說明相關疑慮，內部傾向「不同意」該調整。\n\n台新在法說會上說，外價金變動主要反映合併前後會計基礎不同，並就資產與負債進行全面評估後的結果。換言之，台新認為這是合併開帳的會計處理差異，並非是收回準備金。金管會旋即介入了解，內部傾向不同意此次調整方式，後續一旦確定要求調整，可能影響新壽淨值、並延後反映新光人壽董事長魏寶生強調「一切合法合規」，外價金餘額差異是因合併前後會計基礎不同所致。\n\n新光人壽發言人林宜靜則說明，2025年底新壽(合併前)的外價金餘額為996億元，但今年1月1日與台新人壽合併後，依會計處理原則，需往前回溯，視同7月24日金控合併時，壽險子公司也已合併，這一點會計研究發展基金會曾提出解釋函說明。同時新壽也參考同業（富邦金與日盛金合併）做法，在第二階段子公司合併時也有回溯至金控合併基準日，因此，依保險局對外價金提存的相關規範後，新壽(合併後)3月外價金餘額逾560億元。金管會不願評論新壽該說法，僅表示目前仍在釐清相關事實與適用規範。\n\n後續將依相關結果，決定是否需進行調整或採取相關監理措施。壽險圈認為，此案關鍵是會計準則與監理規範的適用解釋。由於會計公報多採原則性規範，實務操作仍存在解讀差異空間。\n\n市場也關注，是否透過會計師查核意見進一步釐清。部分業者認為，引入第二會計師意見，有助提升財報認定的一致性。市場指出，台新與新壽此案，表面是會計處理，實質卻是風險認定之爭。\n\n當「重算」與「收回」界線模糊，制度是否仍具一致性，成為市場最大疑問。若未釐清，未來恐出現更多類似案例。"}, {"title": "K型經濟 台股隱憂現 投資別衝過頭 學者：產業不均 拉大所得分配差異 AI類股創新高 很多公司下跌", "source": "聯合報 A03 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股大盤指數昨天盤中站上四萬點，學者指出，台股目前是以台積電為核心的ＡＩ供應鏈一枝獨秀，是ＡＩ強勁需求帶動的行情，後續如果有法人要獲利了結下車，風險就相對高。此外，台股隱憂「最大問題是Ｋ型經濟」，目前台股漲幅靠ＡＩ相關供應鏈及題材性上漲，但這股投資熱潮與美國經濟息息相關，要觀察美國經濟是否受戰事影響，一旦出現衰退，就有ＡＩ泡沫風險。東海大學經濟系兼任教授邱達生表示，台股基本面因ＡＩ引擎帶動表現強勁，ＡＩ需求出乎預料的強勁，尤其是各家科技...", "full_text": "台股大盤指數昨天盤中站上四萬點，學者指出，台股目前是以台積電為核心的ＡＩ供應鏈一枝獨秀，是ＡＩ強勁需求帶動的行情，後續如果有法人要獲利了結下車，風險就相對高。此外，台股隱憂「最大問題是Ｋ型經濟」，目前台股漲幅靠ＡＩ相關供應鏈及題材性上漲，但這股投資熱潮與美國經濟息息相關，要觀察美國經濟是否受戰事影響，一旦出現衰退，就有ＡＩ泡沫風險。東海大學經濟系兼任教授邱達生表示，台股基本面因ＡＩ引擎帶動表現強勁，ＡＩ需求出乎預料的強勁，尤其是各家科技巨頭持續進行ＡＩ投資擴大資本支出，以致ＡＩ相關供應鏈持續噴發。\n\n比較擔心的是，若有法人想要獲利了結下車，但有些投資人可能是在高點進場，風險相對高。從投資人角度來看，擔心有點衝過頭，恐怕要更謹慎。邱達生說，目前台股是以台積電為核心的ＡＩ供應鏈一枝獨秀，並非全面性個股都平均上漲，就像有一部超級引擎非常強，其他引擎幾乎熄火；\n\n但ＡＩ投資目前是否獲利，大家仍有疑問，如果獲利並未真正落地，就會有風險。對台灣來說，則是產業不均，造成與非ＡＩ的產業距離愈來愈拉開，拉大所得分配差異。此外，中央大學台經中心昨公布四月消費者信心指數，中央大學經濟系教授吳大任指出，民眾對投資台股信心指數廿三點○九點雖小幅上升，但指數接近二○二三年九月的歷史最低點，仍屬嚴重悲觀，中東戰爭爆發至今，雖然股市持續上漲，但民眾看法反而傾向悲觀。\n\n一來是對股市高檔的投資風險居高思危，另一個原因是不同類股表現不同，台積電等類股雖不斷創新高，但有些甚至創新低，「台股上四萬點，不是人人都漲，很多公司下跌」。對於台股表現的隱憂，吳大任直言，「最大問題是Ｋ型經濟」，台股漲幅靠ＡＩ相關供應鏈及題材性上漲，美股主要也是費城半導體指數上萬點在推動，這些都是靠美國七大科技公司表現在撐。這股投資熱潮與美國經濟息息相關，如果美國經濟維持強勁，ＡＩ泡沫風險低，但風險是中東戰事，如果戰事持續助長美國物價上漲，影響美國家庭經濟，購買ＡＩ服務能力下降，就有泡沫風險。"}, {"title": "AI、權值股主導 台股成加速型市場", "source": "聯合報 A03 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股指數昨天在台積電大漲帶動下，盤中一度站上四萬點，儘管台積電股價尾盤漲幅收斂，但法人表示，台積電對大盤指數的權重之高，看好四萬點不會曇花一現，短期內仍可望看到。法人指出，這波台股的飛漲，除了台積電是主力引擎，更是好幾股力道的交會與集結，一是來自ＡＩ產業的資本支出爆量成長帶動投資題材，二是外資及投信法人資金的動能，三是ＥＴＦ（指數股票型基金）帶動市場結構改變的推波助瀾結果，這使得台股在站上兩萬點之後，已成為由ＡＩ與權值股主導的「加速型市...", "full_text": "台股指數昨天在台積電大漲帶動下，盤中一度站上四萬點，儘管台積電股價尾盤漲幅收斂，但法人表示，台積電對大盤指數的權重之高，看好四萬點不會曇花一現，短期內仍可望看到。法人指出，這波台股的飛漲，除了台積電是主力引擎，更是好幾股力道的交會與集結，一是來自ＡＩ產業的資本支出爆量成長帶動投資題材，二是外資及投信法人資金的動能，三是ＥＴＦ（指數股票型基金）帶動市場結構改變的推波助瀾結果，這使得台股在站上兩萬點之後，已成為由ＡＩ與權值股主導的「加速型市場」。對於ＡＩ資本支出的題材導引資金洪流加碼，法人舉例，例如輝達、谷歌、微軟等科技巨頭在ＡＩ產業的爭霸，看好在ＡＩ領域會有更多資本投入，尤其對於ＡＩ伺服器、ＧＰＵ和ＴＰＵ、先進製程等需求之下，台積電也更被看好未來的多面向潛在商機。\n\n尤其ＥＴＦ機制發揮的推波助瀾效果，使台積電成為最大贏家。投信業者說，金管會上周四宣布台股基金和主動式ＥＴＦ投資單一個股的限制從百分之十拉高至百分之廿五，台積電是唯一受惠者，未來台積電股價受惠的程度更大，且對大盤指數也會發揮魚水互相幫襯的效果。法人分析，台積電原本就是多檔ＥＴＦ的名列前茅的成分股，台股上漲會使台積電為首的主力引擎市值變高，ＥＴＦ的權重自然會提升，接下來流入ＥＴＦ的資金就必須按照成分權重來加碼，對指數也會發揮成數效果，最後就是只要台積電等少數股票狂飆，指數就會跟著狂飆。\n\n第一金投顧董事長黃詣庭指出，台股昨天是台積電獨強，主要仍延續金管會上周宣布的政策利多，引發法人的「提前卡位潮」；由於投信業者要變更投資上限必須在契約書向投資人說明條件變更，因此新增投資尚未進場，但提前卡位的效應已出現，資金轉向大型權值股布局。"}, {"title": "澳、越、星、印度 國銀新南向授信今年四大熱區", "source": "工商時報 A06 財經生活", "cat": "國際經濟情勢", "priority": 0, "summary": "國銀今年攻新南向授信鎖定四大區塊，金管會公布，截至今年3月底，授信總餘額較去年底增加最多的國家為澳大利亞587億元、越南 350億元、新加坡349億元、印度346億元。金管會指出，主要是因受惠這些地區的經濟相對活絡，企業授信需求增加所致。台北富邦銀行表示，今年3月新南向授信金額為1,941億元，年成長 40％，主要為印度、澳洲及新加坡授信增加。", "full_text": "國銀今年攻新南向授信鎖定四大區塊，金管會公布，截至今年3月底，授信總餘額較去年底增加最多的國家為澳大利亞587億元、越南 350億元、新加坡349億元、印度346億元。金管會指出，主要是因受惠這些地區的經濟相對活絡，企業授信需求增加所致。台北富邦銀行表示，今年3月新南向授信金額為1,941億元，年成長 40％，主要為印度、澳洲及新加坡授信增加。\n\n今年在海外新據點的推動上，已於今年 2 月獲日本金融廳核發的東京分行執照，預計於 5 月正式開幕，可將服務版圖進一步延伸至東北亞市場，與新南向政策形成東亞及南向市場相互支撐的布局。並積極推動澳洲雪梨辦事處升格為分行，及印度GIFT City分行的申設作業。第一銀行說明，3月與前三月新南向授信放款較去年同期均取得雙位數成長，其中新加坡及澳洲均有亮眼表現。\n\n目前在新南向政策目標國家設有 19 個據點，其中東協八國已設置 1 8 個據點，完整涵蓋中南半島主要市場。中信銀行強調，目前在新南向共有超過 120 個據點，持續看好東南亞，陸續規劃於越南及印度設立新據點，雪梨辦事處也將升格為分行。考量越南腹地狹長，既有據點（胡志明分行／河內辦事處）存有服務限制，在去年12月中新設海防及平陽辦事處，完善台商金融服務。\n\n中信銀並考量印度政府於 GIFT City 建立國際金融服務中心，提供企業稅務誘因，為掌握 GIFT City 商機，並持續擴大對印度市場經營，已於今年3月中旬開立GIFT City分行。另外，中信銀澳洲雪梨辦事處也在拚升格分行，觀察核心客群已持續投資澳洲，同時也觀察到澳洲本地產業，如資料中心、航空運輸等產業具有發展潛力，未來雪梨分行將更能有效串連據點並強化當地商機爭取，提供完整的金融服務。"}, {"title": "全球軍事支出 創16年最高 去年升至近3兆美元，連11年增長，美中俄占比逾半", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "斯德哥爾摩國際和平研究所（SIPRI）27日發表報告指出，2025年全球軍事支出上升至將近3兆美元，連續11年增長，軍事支出占全球國內生產毛額（GDP）比率達2.5％，更創2009年以來最高水準，其中美國、俄羅斯與中國等三大國家軍事支出總額，占整體支出逾半。全球軍事支出在2025年增加2.9％至2.89兆美元，SIPRI解釋戰爭持續、不確定性和地緣政治動盪，導致大規模軍備擴張。雖然2025年全球軍事支出成長幅度，從2024年的9.7％，...", "full_text": "斯德哥爾摩國際和平研究所（SIPRI）27日發表報告指出，2025年全球軍事支出上升至將近3兆美元，連續11年增長，軍事支出占全球國內生產毛額（GDP）比率達2.5％，更創2009年以來最高水準，其中美國、俄羅斯與中國等三大國家軍事支出總額，占整體支出逾半。全球軍事支出在2025年增加2.9％至2.89兆美元，SIPRI解釋戰爭持續、不確定性和地緣政治動盪，導致大規模軍備擴張。雖然2025年全球軍事支出成長幅度，從2024年的9.7％，大幅縮減至2.9％，但SIPRI指稱在戰爭危機尚未結束，和多國訂下長期軍事支出目標，估計全球軍事支出日後將繼續增加。\n\n2025年全球軍事支出，美國、中國與俄羅斯合計1.48兆美元，占整體支出51％。其中美國高達9,540億美元，遠超中俄兩國合計金額。美國國會已批准2026年度國防支出逾1兆美元，大幅超過2025年，其戰爭部更提出2027年度國防支出高達約1.5兆美元，提出金額為歷來之最。\n\n歐洲軍事支出也大幅增長14％至8,640億美元，是帶動全球軍事支出上升的主要力量。在扣除俄國後，德國是歐洲最大軍事支出國，增加24％至1,140億美元，占德國GDP比率2.3％，為1990年以來首次超過北約提出的指導標準2％。若以支出增幅計算，西班牙為歐洲最高，飆升50％至402億美元。\n\n在亞洲，中國軍事支出增長7.4％，雖金額估3,360億美元，僅約美國的三分之一，但專家認為實際支出金額遠超SIPRI估計的數字，因為中國未完全對外公開其軍事支出；日本軍事支出大增9.7％至622億美元，占其GDP比率1.4％，創1958年來新高。"}, {"title": "亞太軍費增幅 16年最大 SIPRI最新報告 去年成長8.5%至6,810億美元 專家：台日支出攀升 因應大陸威脅", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "斯德哥爾摩國際和平研究所（SIPRI）指出，2025年全球軍事支出達近2.9兆美元，連續第11年成長，其中亞太國家軍事支出創16年來最大增幅，台灣年增14%至182億美元。全球前三大軍費支出國美國、中國大陸與俄羅斯合計開支達1.48兆美元，占全球總支出一半以上。在亞洲與大洋洲等亞太地區，軍事支出達6,810億美元，較2024年增加8.5%，創下該地區自2009年以來最大年度增幅。", "full_text": "斯德哥爾摩國際和平研究所（SIPRI）指出，2025年全球軍事支出達近2.9兆美元，連續第11年成長，其中亞太國家軍事支出創16年來最大增幅，台灣年增14%至182億美元。全球前三大軍費支出國美國、中國大陸與俄羅斯合計開支達1.48兆美元，占全球總支出一半以上。在亞洲與大洋洲等亞太地區，軍事支出達6,810億美元，較2024年增加8.5%，創下該地區自2009年以來最大年度增幅。\n\nSIPRI研究員史卡拉札托說，中國軍費開支已連續30年增長，2025年估計達3,360億美元，「更值得注意的或許是其他國家反應，例如南韓、日本與台灣，都在回應其所感受到的威脅」。日本2025年軍費開支增加9.7%，達622億美元，相當於國內生產毛額（GDP）的1.4%，創1958年來最高占比；台灣則增加14%，達182億美元。\n\n報告指出，儘管全球最大軍費支出國美國削減預算，2025年全球軍事開支仍較2024年成長2.9%。史卡拉札托表示，美國支出下滑幅度，已被歐洲與亞洲的增長抵銷，全球又經歷「戰爭與緊張局勢升高的一年」，這也反映出軍事支出占全球GDP比重已升至2009年以來最高水準。美國 2025 年軍費為 9,540 億美元，較 2024 年減少 7.5%，主因是未批准對烏克蘭的新一輪軍事援助。\n\n相比之下，華府在過去三年共向基輔承諾提供1,270億美元援助。不過，美國軍費減少只是短暫現象，美國國會已批准2026年軍費超過1兆美元，美國總統川普提出的2027年軍費支出可能增至1.5兆美元。推升全球軍費成長的主要動力來自歐洲，包括俄羅斯與烏克蘭，歐洲地區軍事開支大增 14%，達8,640億美元。\n\n史卡拉札托表示，主因是烏克蘭戰爭未歇，以及美國減少參與歐洲事務，要求歐洲加強自身防衛責任。全球第四大軍費支出國德國在2025年將軍事支出提高24%，達1,140億美元；西班牙則大增50%至402億美元，使軍費開支自1994年來首度超過GDP的2%。\n\n俄烏戰爭使雙方都提高軍事支出，創下軍費占比最高紀錄。俄羅斯軍費增加5.9%，達1,900億美元，相當於GDP的7.5%；烏克蘭則提高20%，達841億美元，相當於GDP的40%。\n\n儘管中東持續緊張，該地區軍事支出僅小幅成長0.1%，至2,180億美元。多數中東國家增加軍費，但以色列與伊朗去年都呈下降趨勢。伊朗軍費開支下滑 5.6%至74億美元，主要原因是年通膨率達42%。\n\n若以名目金額計算，相關支出實際上有所增加。以色列軍費則下滑4.9%至483億美元，這反映出2025年1月達成加薩停火協議後戰爭強度降低，不過以色列軍費開支仍比2022年高出97%。"}, {"title": "去年全球軍費91兆 亞太增幅16年來新高", "source": "自由時報 A06 國際新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "斯德哥爾摩國際和平研究所（SIPRI）廿七日發布最新報告指出，由於全球不安全感加劇與各國重新武裝的趨勢，二○二五年全球軍事支出總額已逼近二‧九兆美元（約新台幣九十一兆元），連續第十一年成長。其中亞太國家軍事支出創十六年來最大增幅，台灣年增十四％至一八二億美元（約新台幣五七一九億美元）。前三大美中俄占總支出逾半報告顯示，全球前三大軍費支出國分別為美國、中國與俄羅斯，三國的支出總和高達一‧四八兆美元，占全球總支出的半數以上。", "full_text": "斯德哥爾摩國際和平研究所（SIPRI）廿七日發布最新報告指出，由於全球不安全感加劇與各國重新武裝的趨勢，二○二五年全球軍事支出總額已逼近二‧九兆美元（約新台幣九十一兆元），連續第十一年成長。其中亞太國家軍事支出創十六年來最大增幅，台灣年增十四％至一八二億美元（約新台幣五七一九億美元）。前三大美中俄占總支出逾半報告顯示，全球前三大軍費支出國分別為美國、中國與俄羅斯，三國的支出總和高達一‧四八兆美元，占全球總支出的半數以上。\n\n儘管全球最大軍費支出國美國的開支有所減少，但二五年全球整體軍事支出仍比二四年增加二‧九％。SIPRI 研究員史卡拉札托（Lorenzo Scarazzato）指出，全球正經歷「又一個充滿戰爭與緊張局勢加劇的年度」；全球軍事支出占全球國內生產毛額（GDP）的比例，已創下自二○○九年以來的最高水準。\n\n中國3360億美元成長7.2％在亞洲與大洋洲地區，二五年軍費支出達到六八一○億美元，比二四年成長八‧五％，創下該地區自二○○九年以來的最大年度增幅。中國軍事支出在過去卅年來年年攀升，二五年估計達三三六○億美元，比二四年成長七‧二％。日本在二五年將軍事支出提高九‧七％，達到六二二億美元，相當於其GDP的一‧四％，創下自一九五八年以來的最高占比。\n\n台灣也將軍事支出增加十四％，達到一八二億美元。美國二五年的軍事支出為九五四○億美元，比二四年減少七‧五％，主要原因是未批准對烏克蘭提供新的軍事財政援助。不過，美國國會已批准二六年超過一兆美元的軍事支出；\n\n若美國總統川普的預算提案順利通過，二七年更可能飆升至一‧五兆美元。帶動全球軍費增長的主要動力來自歐洲地區，包括俄羅斯與烏克蘭，該地區支出激增十四％，達到八六四○億美元。全球第四大軍費支出國德國，二五年軍事支出大幅增加廿四％，達到一一四○億美元。\n\n西班牙的軍費也暴增五十％，達到四○二億美元，使得該國軍費占GDP的比例自一九九四年以來首度突破二％。隨著俄烏戰爭持續延燒，兩國都創下政府支出中分配給軍事比例最高紀錄。俄羅斯軍費增加五‧九％，達到一九○○億美元，相當於其GDP的七‧五％。\n\n烏克蘭支出則激增廿％，達八四一億美元，占其GDP的四十％。值得注意的是，儘管中東地區局勢持續緊繃，該地區的軍事支出卻僅微幅上升○‧一％，為二一八○億美元。儘管中東多數國家都提高軍費，以色列與伊朗卻逆勢下滑。"}, {"title": "伊朗提議 重啟荷姆茲終戰╱川普︰不能擁核武 否則沒理由會面", "source": "自由時報 A06 國際新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "美國Axios新聞網廿七日披露，伊朗透過斡旋國巴基斯坦向美國提交新協商方案，同意重啟關鍵能源航道荷姆茲海峽以結束戰爭，但也要求華府結束對德黑蘭的海上封鎖，至關重要的核協議則留待下階段處理。伊朗要求結束海上封鎖美聯社︰恐難獲美支持伊朗提議，雙方停火展延更長一段時間，或同意永久停戰，核協議只會在荷姆茲海峽重啟，並結束海上封鎖後的後續階段展開。白宮已接獲德黑蘭提案，仍不清楚是否會深入研究此方案。", "full_text": "美國Axios新聞網廿七日披露，伊朗透過斡旋國巴基斯坦向美國提交新協商方案，同意重啟關鍵能源航道荷姆茲海峽以結束戰爭，但也要求華府結束對德黑蘭的海上封鎖，至關重要的核協議則留待下階段處理。伊朗要求結束海上封鎖美聯社︰恐難獲美支持伊朗提議，雙方停火展延更長一段時間，或同意永久停戰，核協議只會在荷姆茲海峽重啟，並結束海上封鎖後的後續階段展開。白宮已接獲德黑蘭提案，仍不清楚是否會深入研究此方案。\n\n美伊第二輪談判已陷入僵局。針對核計畫議題，德黑蘭領導層對於要在談判桌上做出何種妥協，意見分歧。新提案繞過此議題，以便加速與美國達成協議。\n\n美國特使魏科夫和庫希納原定前往巴基斯坦首都伊斯蘭馬巴德，與伊朗外交部長阿拉奇進行談判，但美國總統川普已宣布取消。川普廿六日接受福斯新聞頻道（Fox News）訪問時表示，若伊朗想要協商結束兩國之間的戰爭，可以主動透過電話與美國聯繫。Axios 指出，解除海上封鎖意味著美方將失去在未來談判中，要求德黑蘭中止濃縮活動並移除濃縮鈾的有力籌碼。\n\n對此，白宮發言人韋爾斯回應Axios，「美國握有籌碼，只會達成以美國人民為優先、絕不允許伊朗擁有核武的協議。」 美聯社指出，川普想要的是在和平談判中納入終結伊朗核計畫的方案，因此解除海上封鎖的提案不太可能獲得支持。川普向福斯新聞重申，「他們曉得協議必須涵蓋的內容，非常簡單，那就是不能擁有核武，否則沒有理由會面。」 阿拉奇上週末往返巴基斯坦和阿曼，廿七日前往莫斯科與俄羅斯總統普廷會晤。在伊斯蘭馬巴德的會議中，阿拉奇向巴基斯坦、埃及、土耳其和卡達代表提到，對於中止濃縮活動至少十年並將濃縮鈾移出國外等要求，伊朗領導層內部對於如何回應美方沒有共識，主張先行繞過核協議。阿拉奇接受伊朗官方通訊社（IRNA）訪問時表示，是美方的態度使得協商延宕，並指責美方提出過度要求，「儘管在前一次的協商中取得進展，仍未能達成目標。」 紐約時報指出，隨著美伊和平談判進展停滯，德黑蘭與華府目前陷入一種「不戰不和」的尷尬僵局，雙方都在比誰能撐更久。分析人士認為，伊朗官員似乎有信心比川普更能承受戰爭帶來的經濟痛苦，但他們也擔心，如果談判缺乏推進動力，自己就會一直處於美國和以色列發動攻擊的威脅陰影。"}, {"title": "擱置核問題 伊朗拋方案 先停火開海 伊外長阿拉奇訪俄普亭重申支持 透過巴基斯坦向美轉達伊朗「紅線」", "source": "聯合報 A11 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "美國和以色列二月底對伊朗開戰，目前三方停火中。美國政治新聞網站Axios廿六日引述一位美國官
