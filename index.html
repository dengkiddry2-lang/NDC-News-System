\n川普取消派出特使威特科夫（Steve Witkoff）和女婿庫許納（Ja red Kushner）擔任談判特使，他解釋因認為伊朗提出願意達成和談 的條件不足，不想兩人為此奔波與浪費開銷。川普在社交平台Truth Social發文，伊朗領導層存在極嚴重的權力 鬥爭，內部混亂至連包括其高層在內，都沒人知道目前由誰主導伊朗 局面。現在所有談判籌碼都由美國掌握而非伊朗。\n\n若伊朗真想和談， 只要給他打電話就行。他說，在取消特使的談判行程後十分鐘，就收到伊朗提出更多讓步 。雖然這些讓步仍不足夠，但川普仍暗示雙方28日再進行談判的可能 。\n\n伊朗總統裴澤斯基安（Masoud Pezeshkian）重申願意談判，但拒 絕在面對壓力和威脅下被迫與美國談判，也不接受對方單方面提出的 條件，表示目前伊朗領導層既沒有強硬派，也沒有溫和派，警告若談 判破局就不排除軍事行動。此外，除非美國停止敵對行動和施加壓力 ，應該首先解除包括海道封鎖等障礙，雙方才能開始坐下來談判。伊朗提出的四大訴求，包括安全保障、持續推進核計畫並保留高濃 縮鈾、解除制裁、和2月底以來的戰爭賠償。\n\n美國則堅持伊朗不得擁 有核武，並持續封鎖其港口。回到目錄"}, {"title": "和談未明 川普：伊朗不擁核才能協議 美代表團取消赴巴基斯坦 伊朗外長又重返巴國：不在施壓下談判", "source": "聯合報 A10 國際", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美國總統川普廿五日聲稱，他從伊朗收到的美伊和平協議提案「不夠好」，因此取消美方代表團原定當天上午前往巴基斯坦的行程。他並強調，這並不代表美國及以色列將立即重啟對伊朗的攻擊。另外，伊朗官媒「伊朗通訊社」（ＩＲＮＡ）及美國有線電視新聞網（ＣＮＮ）引述伊朗消息人士報導，伊朗外長阿拉奇廿六日離開阿曼首都馬斯...", "full_text": "美國總統川普廿五日聲稱，他從伊朗收到的美伊和平協議提案「不夠好」，因此取消美方代表團原定當天上午前往巴基斯坦的行程。他並強調，這並不代表美國及以色列將立即重啟對伊朗的攻擊。另外，伊朗官媒「伊朗通訊社」（ＩＲＮＡ）及美國有線電視新聞網（ＣＮＮ）引述伊朗消息人士報導，伊朗外長阿拉奇廿六日離開阿曼首都馬斯開特，返回巴基斯坦首都伊斯蘭馬巴德；\n\n他當晚飛抵伊斯蘭馬巴德的努爾汗空軍基地，在短暫停留巴基斯坦後，將轉往俄羅斯莫斯科。阿拉奇感謝阿曼從中調解伊美的外交作為，並提醒美國在中東的軍事存在正造成不穩定及分裂；他在馬斯開特與阿曼蘇丹、國家元首塔瑞克會談，並重申伊朗致力維護和阿曼及其他波斯灣南部國家的友好關係。\n\n而這些伊朗鄰國境內均有美軍基地。川普廿五日宣布取消美方代表團赴巴基斯坦和伊方代表團舉行第二輪談判後指稱，「我們握有一切籌碼，伊朗卻一無所有，要是伊朗想談，只要打通電話就行，隨時都能聯絡我們；我已對我的團隊說，你們不用搭十八個小時的飛機過去那裡枯坐空談；\n\n他們原本已準備出發」。至於取消美方代表團原定的巴基斯坦行，是否代表美以伊戰爭將重燃戰火，川普說，「不是那個意思，我們還沒考慮到那一步」。川普還說，「（伊朗）他們給我們的協議文本應該要更好。\n\n但有趣的是，我取消美方代表團的行程後，還不到十分鐘，我們就收到一份更好的新文件，內容比原先的好很多」。他重申，整個協議「並不複雜」，即伊朗不能擁有核武，「就那麼簡單」；「他們做出很多讓步，但還不夠」。\n\n川普也在自創社媒真實社群又發文表示，伊朗領導高層內部目前內鬨嚴重且極為混亂，「沒人知道現在誰當家，甚至他們自己都不清楚」。伊朗外交部廿五日則發布聲明強調，伊美間（目前）沒計畫舉行談判，伊朗的想法將向巴基斯坦傳達。阿拉奇同日從巴基斯坦轉往阿曼訪問，他在社媒Ｘ寫道，巴基斯坦行成果豐碩，已提出讓這場戰爭終戰的可行框架。\n\n伊朗總統裴澤斯基安同日在與巴基斯坦總理夏立夫通話時表明，伊方將不會在美方的施壓、威脅及海上封鎖下談判，尤其美軍應先解除封鎖。負責美伊戰爭的美國中央司令部廿五日表示，美軍當天在阿拉伯海攔截一艘試圖闖關的「伊朗影子艦隊」油氣商船「塞凡號」。根據英國首相府，川普廿六日與英國首相施凱爾通話，討論當前急需紓解的荷莫茲海峽「塞船」問題。\n\n回到目錄"}, {"title": "美伊各認占上風 談判卡關", "source": "聯合報 A10 國際", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "第二輪美伊談判仍無具體時間表。華爾街日報廿五日報導，這代表白宮正面臨重燃戰火或尋求談判的兩難抉擇，雙方仍各說各話。上周在和於美伊間擔任調解方的巴基斯坦領導高層會談後，伊朗外長阿拉奇向伊朗官媒「伊朗通訊社」（ＩＲＮＡ）說，美國是否真的認真想推進外交，仍有待觀察。英國智庫「皇家國際事務研究所」主任瓦...", "full_text": "第二輪美伊談判仍無具體時間表。華爾街日報廿五日報導，這代表白宮正面臨重燃戰火或尋求談判的兩難抉擇，雙方仍各說各話。上周在和於美伊間擔任調解方的巴基斯坦領導高層會談後，伊朗外長阿拉奇向伊朗官媒「伊朗通訊社」（ＩＲＮＡ）說，美國是否真的認真想推進外交，仍有待觀察。\n\n英國智庫「皇家國際事務研究所」主任瓦基爾說，在伊朗和美國主張的立場更趨於接近前，伊方將不會想與美國直接談判；伊方認為現在就與美方會面沒意義，只會讓美國總統川普掌握話語權，看來像是伊方急於對話。在伊方封鎖荷莫茲海峽（下稱海峽）後，美方也封鎖伊朗各港口作為反制，因此伊方堅持除非美方先解除對伊朗港口的封鎖，雙方才能恢復談判。\n\n總部在比利時的非政府組織（ＮＧＯ）「國際危機組織」（ＩＣＧ）主任瓦艾斯也說，美伊都覺得自己占上風，要對海峽解封就應同時解封。除了海峽封鎖和以色列與黎巴嫩間的停火，伊朗核計畫更是美伊談判的重中之重。儘管白宮希望伊朗願將高純度的濃縮鈾庫存轉移海外，但德黑蘭仍堅持其核計畫是不可跨越的紅線，伊朗駐印度大使法塔里就強調，「唯有當敵人承認我國和平擁核的權利，那談判才能取得適當的進展」。\n\n為期兩周的美伊停火原定廿二日到期，但川普突宣布延期。然而，他仍持續對伊朗發出威脅。伊朗外交官及知情人士說，伊方已告知巴基斯坦，若美方願停止威脅，將有助說服德黑蘭的強硬派同意重啟美伊談判。\n\n回到目錄"}, {"title": "陸前談判代表：中美有分歧 也尋共同利益", "source": "聯合報 A11 兩岸", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美國總統川普預計五月中訪問中國大陸。對於中美關係，大陸外經貿部前副部長、前首席談判代表龍永圖廿六日表示，強者和弱者不太可能相互尊重，但這些年來中國迅速發展，中美實力差距縮小，兩國相互尊重、平等相待已有基礎。中新社報導，龍永圖廿六日在北京出席第十二屆中國與全球化研討會表示，中美是全球最大的兩個經濟體，...", "full_text": "美國總統川普預計五月中訪問中國大陸。對於中美關係，大陸外經貿部前副部長、前首席談判代表龍永圖廿六日表示，強者和弱者不太可能相互尊重，但這些年來中國迅速發展，中美實力差距縮小，兩國相互尊重、平等相待已有基礎。中新社報導，龍永圖廿六日在北京出席第十二屆中國與全球化研討會表示，中美是全球最大的兩個經濟體，中美關係好，有利於全球化發展。\n\n他指出，目前中美兩國雖然還有很多分歧，但由於雙方力量對比日益縮小，也有通過交流尋求共同利益的願望，因此他對兩國關係前景保持樂觀。龍永圖認為，中美兩國必須互相尊重、平等相待。由於歷史文化、社會制度和意識形態的不同，中美兩國肯定會有分歧甚至衝突。\n\n不過，只要加強溝通，中美就可以減少許多誤判，從而使關係保持一個理性、穩定的狀態。龍永圖說，儘管「世界大得很，事情複雜得很」，但中美兩國總能從複雜的利益交織當中找到共同利益。他指出，共同利益找到了，雙方就可能建立穩定、健康、可持續關係。\n\n回到目錄"}, {"title": "川普取消特使赴巴 美伊談判停擺", "source": "中國時報 AA02 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先預測，美伊雙方25日將針對結束戰爭、推動停火協議進行協商，不...", "full_text": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先預測，美伊雙方25日將針對結束戰爭、推動停火協議進行協商，不料伊朗外長阿拉奇（AbbasAraghchi）僅與巴基斯坦官員會談後便離開伊斯蘭馬巴德，阿拉奇稱，巴基斯坦之行成果豐碩，但他對華盛頓的意圖表示懷疑。\n\n伊朗國家電視台稱，阿拉奇沒有與美國官員會面的計畫，巴基斯坦將扮演傳遞提議的管道角色。路透報導，川普 25 日決定取消美國特使魏科夫（Steve Witkoff）和女婿庫許納（Jared Kushner）的訪問計畫，因為會談涉及過多的差旅和費用，而且伊朗最新的和平提議對他來說還不夠好。川普說，「我們掌握了所有籌碼。\n\n他們（伊朗）隨時可以聯繫我們，但我們不會再為了閒聊而飛 18 個小時了。」\n當被問及取消行程是否意味著戰火將重燃時，川普回應說：「不，這並不意味著戰爭會再次爆發。我們還沒有考慮過這個問題。\n\n」\n川普並表示，在他宣布取消訪問後，伊朗提交了一份修改後的方案，但還不夠好。根據伊朗通訊社（IRNA）報導，裴澤斯基安25日與夏立夫（Shehbaz Sharif）通話時，解釋了阻礙外交進程的因素。他強調，只要美國的敵對行動和軍事壓力持續存在，「重建信任和推進對話進程將面臨巨大困難」。\n\n裴澤斯基安表示，伊朗僅要求在國際法框架內維護本國合法權利，並未提出超出此框架的任何訴求。巴基斯坦總理辦公室發布聲明稱，兩國領導人就當前地區局勢以及為促進區域和平與穩定所做努力交換意見。另外，伊朗最高領袖穆吉塔巴．哈米尼（Mojtaba Khamenei）25日晚上在社群媒體上發文，敦促「伊朗南邊鄰國」認清形勢，作出正確判斷，對「邪惡勢力」的虛假承諾保持警惕。\n\n回到目錄"}, {"title": "伊朗：荷莫茲不恢復戰前狀態", "source": "中國時報 AA02 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返...", "full_text": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返回伊朗。真主黨一再敦促黎巴嫩退出停火談判，並警告任何協議都將缺乏全國共識，最近以色列發動的強力攻擊，進一步考驗與黎巴嫩之間脆弱的停火協議。\n\n黎巴嫩衛生部25日公佈的數據顯示，自3月2日黎以戰火重燃以來，以色列對黎巴嫩發動的攻擊已造成2496人死亡。以色列軍方稱，6名死者都是真主黨成員，包括消滅3名駕駛著裝滿武器車輛的真主黨成員，以及一名騎電動機車的真主黨成員，並在其他地點擊斃另外兩名武裝人員。另外，美軍中央司令部25日發聲明說，當天早些時候，美軍平克尼號飛彈驅逐艦出動直升機攔截一艘受到美國制裁的商船。\n\n據了解，這艘名為塞凡號（M／V Sevan）的油輪，是美國財政部24日制裁的19艘與伊朗有關的「影子艦隊」船隻之一，制裁原因是這些船隻涉嫌向海外市場運輸價值數十億美元的伊朗能源、石油和天然氣產品，包括丙烷和丁烷等。中央司令部指出，美軍持續執行進出伊朗港口船隻的封鎖。自封鎖措施實施以來，已有 37 艘船隻被迫改變航道。\n\n美伊雙方持續對荷莫茲海峽進行封鎖，已造成國際能源價格居高不下，據伊朗媒體 26日報導，伊朗伊斯蘭議會第二副議長尼克札德（Ali Nikzad）表示，伊朗最高領袖穆吉塔巴已明確下令，荷莫茲海峽不得恢復戰前狀態。回到目錄"}, {"title": "全球超級央行周 利率料全數按兵不動", "source": "工商時報 A02 火線焦點", "cat": "國際經濟與金融情勢", "label": "GLOBAL STABILITY", "priority": 1, "summary": "導】超級央行周登場，美加歐英日都將在本周公布貨幣決策。市場預估 五大央行將按兵不動，以觀察美伊衝突帶來的外溢衝擊與通膨影響。各大央行維持觀望的另一原因，則是美國聯準會（Fed）主席能否順 利換人仍存在不確定性。美國司法部已撤銷對Fed總部翻修超支與鮑爾的刑事調查，為美國 總統川普提名人選華許接任...", "full_text": "導】超級央行周登場，美加歐英日都將在本周公布貨幣決策。市場預估 五大央行將按兵不動，以觀察美伊衝突帶來的外溢衝擊與通膨影響。各大央行維持觀望的另一原因，則是美國聯準會（Fed）主席能否順 利換人仍存在不確定性。\n\n美國司法部已撤銷對Fed總部翻修超支與鮑爾的刑事調查，為美國 總統川普提名人選華許接任主席掃除障礙。這可能是鮑爾5月15日任 期屆滿前最後一次以主席身分主持會議，他在會後記者會如何評估通 膨走勢，將是市場關注焦點。經濟學家艾絲黛．歐（Estelle Ou）表示：「在未來一周，多數央 行料在美伊緊張局勢下維持利率不變，我們預期Fed將按兵不動至第 四季，歐洲與英國央行則會保留未來升息的可能性。\n\n」\n日本央行（日銀）28日將公布貨幣政策，從官員近期發言推斷本月 可能暫緩升息，多數經濟學家預期下一次升息可能在6月。受美伊開戰推升油氣價格的影響，市場對日銀短期升息的預期降溫 。日本因高度依賴能源進口而承受極大壓力。\n\nFed在當地時間28～29日（台灣時間30日凌晨）召開聯邦公開市場 委員會（FOMC）會議後，料將利率維持在3.5％～3.75％區間不變， 連三次按兵不動，原因是通膨壓力攀升、就業市場與經濟展現韌性。在企業投資強勁的支撐下，美國經濟今年初加速成長、第一季國內 生產毛額（GDP）季增年率估達2.2％，可望從2025年底政府停擺的低 迷中反彈。但消費支出成長料放緩，通膨也可能急遽升高，原因是美 伊衝突推高油價與生產成本。\n\n加拿大央行29日召開例會，市場預估利率將維持在2.25％不變，理 由是通膨水平接近目標。但官員將密切觀察戰爭造成的油價衝擊如何 影響經濟與物價。歐洲央行（ECB）與英國央行皆於30日公布貨幣決策，市場認為兩 者都可能維持現行利率不變，分別為2％與3.75％。\n\n歐元區4月通膨估升至3％，這將是2023年底以來最高，且遠高於E CB設定的2％目標。經濟動能也難逃衝擊，這可能促使ECB官員將升息 決策延後至6月，屆時將有新的季度預測可供參考。回到目錄"}, {"title": "美關鍵參議員不再阻撓 華許接掌Fed最大障礙沒了", "source": "工商時報 A02 火線焦點", "cat": "國際經濟與金融情勢", "label": "GLOBAL STABILITY", "priority": 1, "summary": "導】美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查， 替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙 。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員 會與全院擁有充足時間批准他的任命案。美國哥倫比亞特區檢察官皮洛（Jeanine Pirro）上周表...", "full_text": "導】美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查， 替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙 。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員 會與全院擁有充足時間批准他的任命案。美國哥倫比亞特區檢察官皮洛（Jeanine Pirro）上周表示，已要 求聯準會監察長仔細審查總部裝修超支問題後結束調查，但強調「若 事實證明有必要，也會重啟調查」。\n\n司法部撤銷對鮑爾的調查，為華許提名案在國會通過鋪平道路。北 卡羅來納州共和黨參議員、手握參院銀行委員會關鍵一票的提里斯（ Thom Tillis）26日表示，願意結束對聯準會主席提名人華許的阻撓 。共和黨在參院銀行委員會擁有13比11的多數席位，提里斯的投票非 常重要，因所有民主黨議員都拒絕在調查結束前審議此案。\n\n該委員會 尚未宣布推進此提名案的表決日期。在華許21日的聽證會上，提里斯將寶貴質詢時間用於解釋翻修成本 ，而非盤問這位提名人，他表示：「你的資歷非常出色，無可挑剔。讓我們結束這項調查，我才能支持你的任命案。\n\n」\n皮洛保留「重新啟動調查」權利的說法引發質疑，調查究竟是真的 結束或僅是暫停？鑒於川普政府處理其他法律案件的立場反覆無常， 兩者差別對鮑爾而言十分重要。鮑爾的任期將於5月15日屆滿，稍早他曾表示，若屆時繼任者尚未 就任，將繼續代理主席。\n\n此外，鮑爾身為Fed理事的任期要到2028年1月才會結束。依慣例， 卸任主席在繼任者宣誓就職時，也會一併辭去理事，但法律並未強制 要求。若鮑爾留任理事，便可繼續作為決策單位聯邦公開市場委員會 （FOMC）投票成員，一直到美國期中選舉甚至是川普第二任期最後一 年。\n\n回到目錄"}, {"title": "Fed本周開會 將以「鷹眼」緊盯通膨訊號 鮑爾可能暗示降息門檻高", "source": "經濟日報 A02 話題", "cat": "台灣總體經濟與人口數據", "label": "MACRO & DATA", "priority": 1, "summary": "美國及所有七大工業國集團（G7）本周都將召開利率決策會議，預料都將維持利率不變，聯準會（Fed）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員一同以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調將隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）...", "full_text": "美國及所有七大工業國集團（G7）本周都將召開利率決策會議，預料都將維持利率不變，聯準會（Fed）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員一同以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調將隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）28日開會，預料維持基準利率於0.75%。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於6月升息1碼。\n\nFed和加拿大央行都將於台灣時間30日發布利率決策，預料將位處觀望模式，等待及觀察中東情勢發展。Fed決策官員在3月會議後的發言已轉趨審慎，一些原先對降息持開放態度的「鴿派」官員現在也強調通膨上升風險，就連1月傾向降息的理事沃勒，近來都直接表示伊朗戰爭對能源價格的衝擊，並擴大成本壓力。美國參議院近期將針對Fed新任主席提名人華許人事案進行表決，若在5月15日前批准，本周將是鮑爾5月15日卸任前最後一次主持決策會議，鮑爾預料將暗示今年底前降息的門檻相當高。\n\n美國29日將公布的通膨指標3月個人消費支出（PCE）平減指數，預料將顯現中東戰爭對通膨的衝擊，3月核心PCE指標將月升0.3%，年升幅從3.0%升高到3.2%，促使決策官員更加高度警戒通膨預期是否快速升高。彭博經濟學家預期，Fed可能維持現行利率直到今年第4季。歐洲央行（ECB）與英國央行30日也將公布利率決策，幾乎能確定將釋出與Fed類似的訊息。\n\nECB近來從鷹派到鴿派官員似乎都認為應該按兵不動，先觀察伊朗戰爭結果與干擾的持續時間，預料將維持存款利率於 2%，可能會將升息延到6月，總裁拉加德預估將對各種選項都持開放態度。英國央行則可能保持基準利率在3.75%，但可能有兩位官員提出異議、主張升息1碼。彭博經濟學家認為，該央行今年都將維持利率不變。\n\n各大央行雖以國內經濟情勢為關注焦點，但荷莫茲海峽的動向也可能一部分決定貨幣政策的路徑。回到目錄"}, {"title": "荷莫茲封閉 金融市場掀連鎖反應 波灣各國主權基金重新評估支出次序 優先聚焦國內經濟 恐衝擊全球投資交易", "source": "經濟日報 A06 國際", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "伊朗戰爭所致荷莫茲海峽實質封閉，即將進入第三個月，波灣國家因原油出口受阻而收入下滑，促使各國主權財富基金重新評估支出優先次序，可能衝擊全球投資交易。同時，航運危機持續加深。航運業者表示，即使是最佳情況下，這條航線也要好幾個月才能恢復正常。英國金融時報（FT）報導，全球十大主權財富基金有六家位於波...", "full_text": "伊朗戰爭所致荷莫茲海峽實質封閉，即將進入第三個月，波灣國家因原油出口受阻而收入下滑，促使各國主權財富基金重新評估支出優先次序，可能衝擊全球投資交易。同時，航運危機持續加深。航運業者表示，即使是最佳情況下，這條航線也要好幾個月才能恢復正常。\n\n英國金融時報（FT）報導，全球十大主權財富基金有六家位於波灣，包括阿布達比投資局（ADIA）、沙烏地阿拉伯公共投資基金（PIF）及卡達投資局（QIA），共掌管價值近5兆美元的財富，協助為許多大型交易提供融資。但在波灣國家遭遇伊朗的軍事攻擊、及荷莫茲海峽封閉致使收入下滑後，主權財富基金正重新評估資產組合與部署策略。PitchBook數據顯示，北美與歐洲至少有價值1,060億美元，仍卡在波灣國家還沒完成的承諾，懸而未決。\n\n銀行業人士預期，波灣國家至少將暫停部分投資，以優先聚焦國內經濟，這些主權財富基金支出模式即便只有小幅變動，都會對金融市場造成連鎖效應。此外，美國與伊朗對荷莫茲海峽的「雙重封鎖」，已使這條關鍵水道的每天通行船隻降到接近零。一些業界主管表示，美國戰艦在該海域攔截船隻，促使伊朗加強以「蚊子」砲艇的威脅封閉海峽，導致波灣更加動盪。\n\n高盛分析師團隊指出，波灣各國的原油產量已經比戰前減少57%；即便海峽重新開放，恢復期也需要好幾個月。高盛全球事務主管柯恩表示，他最近前往沙烏地阿拉伯、卡達、阿聯開會，當地人士表示荷莫茲海峽不太可能恢復正常，即便在長期間仍可能如此。\n\n柯恩指出，縱使伊朗政權垮台，荷莫茲海峽也不會恢復到一開始的情況，也許會有部分船隻通行，但伊朗可能會維持部分管控、或維持片面控制。日本商船三井社長田村城太郎表示，原先預期戰局短期內就將結束，但迄今已持續七周以上，實際而言可能要一些時間才能解除情況；他認為全世界將不會恢復舊觀。\n\n船東及管理人員表示，目前有數百艘船陷在波斯灣內，受困船員高達 2萬人；船上食物及飲水供應無缺，一些船員也因為雇用合約到期而離船，但很難找到替換船員，而且價格昂貴。回到目錄"}, {"title": "超級央行週 美英歐日料利率不變", "source": "自由時報 A02 焦點新聞", "cat": "國際經濟與金融情勢", "label": "GLOBAL STABILITY", "priority": 1, "summary": "導〕戰爭局勢不明 彭博經濟學家預期 Q4前Fed將按兵不動彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策會議後，預料將維持借貸成本不變，同時密切關注伊朗戰爭引發的高能源成本是否加劇通膨。這些央行做出的最終決定，可能意味著全球貨幣政策官員再次重申他...", "full_text": "導〕戰爭局勢不明 彭博經濟學家預期 Q4前Fed將按兵不動彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策會議後，預料將維持借貸成本不變，同時密切關注伊朗戰爭引發的高能源成本是否加劇通膨。這些央行做出的最終決定，可能意味著全球貨幣政策官員再次重申他們準備好採取行動的決心。這種態度與二○二二年上次能源危機初期普遍存在的樂觀態度截然不同，當時許多決策官員認為，通膨飆升只是暫時的。\n\n儘管國內情況對所有央行至關重要，但全球能源供應的重要水道荷姆茲海峽局勢，也可能在一定程度上左右其貨幣政策的走向。美國總統川普取消高級特使飛往巴基斯坦展開和談的計畫，伊朗則表示只要受到威脅就不會進行談判，因此重啟和平談判的努力陷入停滯狀態。彭博經濟學家Estelle Ou表示：「未來一週，Fed、歐洲央行、英格蘭銀行、日本銀行和加拿大央行，可能會維持利率不變，因為美伊緊張局勢持續且動盪。\n\n我們預計Fed將維持利率不變直至第四季，而歐洲央行和英格蘭銀行則保留升息的選擇權。」\n日本銀行將率先於廿八日開會，上週發言的官員傾向於本月暫緩升息，多數經濟學家預期下一次升息可能在六月。經濟學家和投資人預期，Fed在廿九日會後將維持利率在三．五％至三．七五％區間不變，連三次按兵不動，主因中東衝突帶動能源價格飆升，導致通膨壓力攀升，而美國就業市場與經濟仍展現韌性；\n\n加拿大央行也將在廿九日會後維持利率二．二五％不變。歐洲央行和英格蘭銀行將於三十日會後公布利率決策，預料都將維持利率不變，分別為二％與三．七五％。回到目錄"}, {"title": "緊盯通膨 Fed年底前降息 門檻很高 美國及G7央行本周舉行決策會議 預料利率不變", "source": "聯合報 A06 話題", "cat": "台灣總體經濟與人口數據", "label": "MACRO & DATA", "priority": 1, "summary": "美國及所有七大工業國集團（Ｇ7）本周都將舉行利率決策會議，預料都將維持利率不變，聯準會（Ｆｅｄ）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）廿八日...", "full_text": "美國及所有七大工業國集團（Ｇ7）本周都將舉行利率決策會議，預料都將維持利率不變，聯準會（Ｆｅｄ）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）廿八日開會，預料維持基準利率於百分之○點七五。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於六月升息一碼。\n\n聯準會和加拿大央行都將於台灣時間卅日發布利率決策，預料將進入觀望模式，等待及觀察中東情勢發展。彭博經濟學家預期，聯準會可能維持現行利率直到今年第四季。美國聯邦參議院近期將針對聯準會新任主席提名人華許人事案進行表決，若在五月十五日前批准，本周將是鮑爾五月十五日卸任前最後一次主持決策會議，鮑爾預料將暗示今年底前降息的門檻相當高。\n\n歐洲央行（ＥＣＢ）與英國央行卅日也將公布利率決策，幾乎能確定將釋出與聯準會類似的訊息。ＥＣＢ預料將維持存款利率於百分之二，可能會將升息延到六月，總裁拉加德預估將對各種選項都持開放態度。英國央行則可能保持基準利率在百分之三點七五，彭博經濟學家認為，英國央行今年都將維持利率不變。\n\n回到目錄"}, {"title": "荷莫茲效應 凸顯全球化未告終 油價、糧食及供應鏈危機從美中到非洲都不能倖免", "source": "聯合報 A09 全球瞭望", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "美國與以色列於2月28日對伊朗展開聯合軍事打擊，雙方雖斷斷續續宣布停火2周，但荷莫茲海峽船舶數量仍未顯著恢復，油價、糧食及供應鏈危機也持續延燒，讓能源自主的美國飽受國內油價上漲之苦，反映出「全球化已死」雖在後冷戰時期不斷迴盪於耳，但全球化不會告終。油價飆漲 逾半美國人有感美國總統川普再度上任後，地緣...", "full_text": "美國與以色列於2月28日對伊朗展開聯合軍事打擊，雙方雖斷斷續續宣布停火2周，但荷莫茲海峽船舶數量仍未顯著恢復，油價、糧食及供應鏈危機也持續延燒，讓能源自主的美國飽受國內油價上漲之苦，反映出「全球化已死」雖在後冷戰時期不斷迴盪於耳，但全球化不會告終。油價飆漲 逾半美國人有感美國總統川普再度上任後，地緣政治的變動、貿易政策不確定性創新高，以及美國創下 1930年代以來最高水平的關稅，國際企業經營更具挑戰，貿易成本更高，也讓外界預測全球化將在後冷戰時期告終。但曾任教哈佛大學的卡拉貝爾博士4月10日投書華盛頓郵報，指出伊朗衝突反倒凸顯全球經濟整合的程度前所未見之高。\n\n全球商品市場，特別是石油、天然氣及化學肥料等關鍵大宗商品市場依舊高度整合，即使美中等經濟巨人也無法免於價格與供應鏈的衝擊。早在1970年代，美國就努力降低依賴進口石油帶來的脆弱性。到了2010年代末期，美國因投資開採頁岩油、液化天然氣及生產乙醇，成為能源淨出口國，而俄國2022年攻打烏克蘭與歐盟限制進口俄國石油，進一步降低美國對單一供應商的依賴。\n\n即使美國能源產量充足，仍無法擺脫荷莫茲航運中斷帶來的能源價格與供應鏈衝擊。據美國能源資訊署統計，其國內原油消費仍有近 3 分之 1 依賴進口。隨著能源價格飆漲，美國本土生產原油多為輕質原油，僅適合提煉汽油，用於生產柴油、航空燃油等其他石油產品的效率較低，仍需進口重質原油及相關成品。\n\n這讓美國國內油價受到全球供需與交易員預期心態的衝擊，飽受國際油價飆漲之苦。據益普索與路透 3月20日的美國民調中，55%的受訪者說汽油價格上漲對其家庭財務狀況造成一定程度影響；其中，21%的受訪者說受很大的影響。\n\n供應鏈中斷 恐釀長期通膨美國哈佛大學教授馬丁4月8日也投書紐約時報，表示眼下是水稻等糧食作物耕種季節，而尿素、氨等化肥原料短缺代表可能減產與漲價。新冠肺炎期間的經驗顯示，這類供應鏈中斷引發長期的通膨飆漲，衍生抵押貸款利率上升、財政危機到政治動盪等一系列副作用。中低收入國家將首當其衝。\n\n食品與能源價格上漲在美國等富裕國家是經濟壓力與政治動盪；但在其他國家可能是生死關頭。在非洲之角，進口化肥短缺更加深部分國家本已有的糧食危機。\n\n這證明全球能源、大宗商品及供應鏈仍高度相互依存，無論全球化是否失敗，國與國的互賴仍是當前現實。避開荷莫茲 中東拚新建設此外，中東國家正投注於後荷莫茲時代的韌性建設，興建新基礎設施以避開荷莫茲海峽。如沙烏地阿拉伯紅海港與擴建後的東西輸油管線，避開荷莫茲連接波斯灣與紅海；\n\n阿聯東海岸富查伊拉港與管線則連接波灣產油國與印度洋，阿曼發展杜格姆港與蘇哈爾港，避開荷莫茲海峽。商品與能源已循這些路線流通，部分則通過跨境陸橋。這顯示眼下全球化並無終結跡象，僅是既有全球貿易網路的重組與再配置。\n\n阿聯商業與慈善特使賈法 4月7日投書金融時報說，將關鍵商業活動由荷莫茲轉移他處，可降低全球供應鏈風險。對歐洲、亞洲及非洲來說，意味著減少供應衝擊與關鍵資源取得更可靠，投資者與民間基礎建設開發商則藉此協助建造下半個世紀輸送全球貿易的走廊。現代汽車執行長穆尼奧斯 4 月8 日接受彭博資訊訪問表示，現代汽車正著手調整全球船隊路線，避開荷莫茲海峽，繞道非洲南部好望角，這樣的規畫讓南韓運往歐洲組裝廠的關鍵零件，運輸時間增加 10至15天。\n\n海運路線改變導致成本上升與物流瓶頸，不影響對美國西海岸的出口，卻干擾歐洲、北非及中東貨運。這加速現代汽車自全球化採購轉型至區域化生產群聚模式。在歐洲，現代汽車正評估零件在地化取得，減少依賴中東航線，這也符合歐盟要求電動車零件在地採購 70%的規定。\n\n這意味在汽車市場中，傳統全球化模式可能瓦解，朝區域化加速競爭。回到目錄"}, {"title": "美伊戰事未解 衝擊AI發展前景", "source": "聯合報 A09 全球瞭望", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建設。但美伊衝突將中東各國捲入，AI數據中心也成攻擊目標，加上能源價格上漲、原物料供應等危機，AI泡沫化又再度成為熱議題。伊朗報復攻擊AI設施隨著美國與以色列2月28日聯手軍事打擊伊朗，麻省理工學院研究...", "full_text": "因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建設。但美伊衝突將中東各國捲入，AI數據中心也成攻擊目標，加上能源價格上漲、原物料供應等危機，AI泡沫化又再度成為熱議題。伊朗報復攻擊AI設施隨著美國與以色列2月28日聯手軍事打擊伊朗，麻省理工學院研究員克德羅斯基3月20日告訴時代雜誌，由於能源與資訊網路高度相互依存，而衝突結局又未知，圍繞AI而生的系統性經濟風險讓人憂心。\n\n由於 AI 數據中心成為伊朗報復攻擊目標，華府智庫戰略暨國際研究中心（CSIS）主任梅塔 3 月 11 日告訴 CNBC，管理AI基礎設施的企業可能制定因應方案，或考慮將數據中心移往風險較低的地區，或利用飛彈防禦、反無人機科技加強數據中心安全。跨國金融服務控股公司Hilco Global地緣政治部門執行董事墨菲說，「若波灣地緣政治風險不斷攀升，考量北歐、印度與東南亞的電力供應、監管機制及安全狀況更具預測性，企業可能會加速這些地區的建設」。美數據中心負荷超載雖然中東一向以廉價能源吸引科技企業的青睞；\n\n克德羅斯基認為，許多AI數據中心依賴天然氣供電，而波灣地區的天然氣設施卻成為攻擊目標，修復設施又耗時數個月，導致全球天然氣價格上漲。以歐洲天然氣價格主要基準之一的荷蘭天然氣交易中心（Dutch TTF）價格為例，2月25日價格為每百萬英制熱量單位10.75美元，3月19日漲至最高20.9美元，4月14日仍有15.03美元。儘管多數的數據中心仍位於美國，而美國又生產且出口天然氣，所受衝擊較低，不至於立即面臨成本上漲；\n\n但克德羅斯基說，其他數據中心的工作轉移至美國，而美國積累的工作量已非常龐大，無法負荷新任務將導致整個系統癱瘓。晶片製造成本恐變高美國政治與公共政策雜誌「美國展望」4月13日也指出，亞洲許多工業設施靠卡達與波灣地區供應的天然氣運作，而其供應已在戰爭期間耗盡。雖然台積電與南韓晶片製造商SK海力士均表示目前仍不受影響，拜登時期官員賈奎茲卻說，晶片製造商因與天然氣供應商簽署長期協議，故受市場日常波動影響較小。\n\n但合約屆期後若仍維持高價，製造商將支付更多能源與化學原料成本。半導體雖主要產自東亞與東南亞，許多原料卻來自中東，成為另一項問題。「美國展望」說，波灣國家化石燃料儲量豐富，而化石燃料又是生產半導體的關鍵。\n\n各企業斥資數千億美元建構數據中心之際，一旦生產中斷，不僅對消費性與商用電子產品的供應產生壓力，還可能嚴重阻礙AI算力成長。以氦氣為例，其可控制晶片生產過程中的溫度，也能偵測有毒化學物質外洩。美國知名信評機構惠譽稱，因生產設施受損與荷莫茲海峽運輸中斷影響，氦氣價格自戰爭以來已翻倍。\n\n卡達拉斯拉凡工業市氦氣產量占全球供應量近3分之1，卻因伊朗3月初的攻擊持續停產中。中東資料中心優勢減另一風險則是中東地區的數據中心成為衝突雙方飛彈攻擊的目標。面對美國與阿聯等國去年大力宣傳在中東興建大規模數據中心計畫，克德羅斯基說，這場衝突曠日持久，會讓這些建設計畫風險或成本過高。\n\n康乃爾大學教授尤峰崎說，衝突爆發前中東地區興建數據中心就面臨水資源消耗問題，若廉價可靠且無限的能源供應已不再穩定，「短期內許多公司可能會重新評估在中東建設資料中心」。歐盟媒體歐洲動態4月4日引述歐洲政策中心分析師勞斯伯格說法，電價、運費、原料成本上漲，「恐成壓垮駱駝的最後一根稻草」。回到目錄"}, {"title": "動能改善 陸GDP增長 外資機構上調至4.9% 全球地緣政治風險上升之際 看好人民幣資產由「可選配置」轉向重要組成", "source": "聯合報 A11 兩岸", "cat": "台灣總體經濟與人口數據", "label": "MACRO & DATA", "priority": 1, "summary": "大陸第一季多項經濟運行指數表現超過預期，多家外資機構近期紛紛調高大陸今年全年ＧＤＰ增長數據，並把人民幣資產正由「可選配置」逐步轉向全球資產配置的重要組成。據大陸國家統計局多項數據，第一季大陸經濟增長超預期，內需亦呈現改善，第一季固定資產投資年增百分之一點七，其中基建投資與製造業投資均有所回升。此外，...", "full_text": "大陸第一季多項經濟運行指數表現超過預期，多家外資機構近期紛紛調高大陸今年全年ＧＤＰ增長數據，並把人民幣資產正由「可選配置」逐步轉向全球資產配置的重要組成。據大陸國家統計局多項數據，第一季大陸經濟增長超預期，內需亦呈現改善，第一季固定資產投資年增百分之一點七，其中基建投資與製造業投資均有所回升。此外，出口勢頭強勁及房地產市場企穩等因素下，多國機構陸續更新對大陸經濟與出口前景評估。\n\n德意志銀行大中華區首席經濟學家熊奕及其團隊在最新研報中表示，將二○二六年大陸全年實際ＧＤＰ增長預測上調○點四個百分點至百分之四點九，名義ＧＤＰ增長預測則上調至百分之六點五，為二○二二年以來最高水準。熊奕指，大陸經濟今年第一季呈現「量價齊升」態勢，通膨回升趨勢確立，有助改善企業盈利與居民收入。在消費方面，渣打銀行大中華及北亞首席經濟學家丁爽認為，政策正由短期刺激轉向長期機制建設，包括提升居民收入、完善社保體系及拓展服務消費，以穩定內需並降低預防性儲蓄。\n\n熊奕亦指出，娛樂休閒、醫療保健與公共服務等領域仍具較大成長空間，若能持續突破，將有助提升整體內需動能。券商中國指出，在地緣政治持續波動下，大陸第一季經濟數據優於預期，提升全球資金配置大陸資產意願。多家外資機構認為，隨著大陸經濟動能改善、內需結構優化與制度型開放推進，人民幣資產正從「可選項」逐步轉向「必選項」，長期配置趨勢愈加明確。\n\n報導稱，在全球地緣政治風險上升背景下，資金正尋求美元以外的配置標的。丁爽表示，當前境外投資者尋找可替代安全資產的需求較為強烈，人民幣資產吸引力正在提升，未來將成為全球資產配置中不可或缺的一部分，有望成為全球資產配置的重要組成。摩根士丹利中國首席經濟學家邢自強近期則表示，在全球再配置趨勢下，資金正逐步降低對美元資產依賴，大陸資產有望持續吸引外資流入。\n\n回到目錄"}, {"title": "科技巨頭財報周登場 牽動市場波動 超級央行周 鮑爾最後談話成焦點", "source": "中國時報 A05 財經綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "合報導】全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed ）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日 中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時 持平，但政策訊號將為後續利率走向提供重要線索。日銀決策28日率先登場，市場預估將維持短期利率在0.75％不...", "full_text": "合報導】全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed ）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日 中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時 持平，但政策訊號將為後續利率走向提供重要線索。日銀決策28日率先登場，市場預估將維持短期利率在0.75％不變。\n\n儘管政策本身不變，但外界普遍預測日銀可能透過會後聲明或季度報 告釋出偏鷹訊號，為最快6月升息鋪路。隨後聯準會將在台北時間30日凌晨公布利率決議，市場預估利率仍 維持在3.5％至3.75％。在燃油成本飛漲的情況下，美國開始出現延 後徵才、消費者信心走弱的跡象。\n\n分析稱，即便油價漲勢趨緩，整體 物價仍處高檔，短期內不適宜降息。芝商所FedWatch工具亦顯示，聯 準會年底仍維持現行利率的機率超過60％。值得留意的是，聯準會主席鮑爾將主持卸任前最後一場利率會議。\n\n美國司法部上周末宣布撤銷對鮑爾的刑事調查、接任人選華許的任命 程序也隨之推進，聯準會正處於世代交替的動盪期，市場格外關注鮑 爾在會後記者會釋出的政策訊號與經濟評估。中央大學經濟系教授吳大任分析指出，近期國際油價因中東局勢波 動，相較前波高點已有回落，惟對美國通膨確實帶來影響，以最新數 據來看，美國3月消費者物價指數（CPI）年增率約3.3％，未回到2％ 的設定目標，顯示通膨壓力仍未解除。在此背景下，聯準會「這次最 可能還是維持利率不變」，並持續觀察4月及後續CPI走勢，再決定下 一步動作。\n\n歐盟與英國央行則將於30日傍晚壓軸公布決策。市場預期兩者本次 會議同樣維持利率不變，但對未來政策路徑的指引將成為焦點。路透 調查顯示，超過半數經濟學家預期歐洲央行可能在6月啟動升息，以 應對中東衝突帶來的能源衝擊及通膨壓力，目前歐元區通膨已明顯高 於2％目標。\n\n英國央行則被認為今年內大致維持現行利率水準，但市 場已上修對通膨的預期。央行決策外，本周同時迎來「超級財報周」，科技與製造業龍頭企 業密集發布業績。大型科技股中，Alphabet、三星、微軟、蘋果、亞 馬遜及 Meta 都將公布季度財報。\n\n市場普遍認為 30 日將成為本周最關鍵 時點，央行決議、企業財報與多項經濟數據集中公布，市場波動可能 因多方訊號進一步放大。回到目錄"}, {"title": "數位ｘ淨零的綠色整合方案", "source": "經濟日報 A04 焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "究所所長）當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台灣正處於「既要發展AI，又要落實減碳」的關鍵十字路口。近期舉行的「2026淨零城市國際峰會」中，我站在法人研發的前線觀察到：未來核心競爭力不在於兩者間的權衡，而在於能否掌握「數位×淨零」雙...", "full_text": "究所所長）當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台灣正處於「既要發展AI，又要落實減碳」的關鍵十字路口。近期舉行的「2026淨零城市國際峰會」中，我站在法人研發的前線觀察到：未來核心競爭力不在於兩者間的權衡，而在於能否掌握「數位×淨零」雙軸轉型能力，將電力消耗轉化為智慧成長動能。\n\n數位與綠色的結合，首先體現在建築空間的轉型。面對減碳最關鍵的場域，我們在設計階段便能運用能源模擬技術（如BESTAI）預測能耗，協助企業精準路徑規劃。實務上再結合AI電力感測（如Power Tab），以非侵入方式實現用電行為的可視化管理。\n\n這種從「可預測」到「可治理」的轉變，才是落實建築淨零的核心路徑。AI時代，算力已成國家競爭力指標，但隨著硬體規格升級，散熱需求也急遽攀升。當最新一代 NVIDIA晶片功耗直逼1,500W時，傳統氣冷散熱已達極限，液冷系統則伴隨高成本與漏液風險。\n\n對此，工研院開發出的「3D鋁製微流道熱虹吸散熱技術」，其提供現有機房「無痛升級」：企業更換高算力晶片時，無需改變建築結構或機房設施，散熱器於相同體積下即可穩定處理1,500W熱量，以極低成本換取頂級算力運行。針對未來晶片功耗突破2,000W的挑戰，我們也進一步部署「低壓冷媒兩相流冷板」技術。淨零轉型除了綠能總量外，電力系統是否具備足夠韌性也是關鍵，而這仰賴數位化與即時調控能力的提升。\n\n傳統電力系統強調集中式電廠與剛性輸配電網架，但在分散式與間歇式能源普及的今天，我們必須推動「微電網（Microgrid）」與「虛擬電廠（VPP）」雙管齊下。前者強化區域層級的供電韌性，後者則透過數位平台聚合分散資源，提升整體電網的調度彈性。以工研院為例，我們於南分院建置的微電網示範系統，實際整合再生能源預測與儲能調控，確保在電網不穩定甚至孤島狀態下，區域電力仍能韌性供應 。\n\n同時，我們透過「虛擬電廠平台」，有效聚合分散於各場域的再生能源、儲能與可調控負載，將原本零散、被動的用電與發電資源，轉化為可即時調度的彈性電力。另外，我們已成功將連鎖零售通路的冷凍設備化作「冷能電池」，在不影響保鮮前提下，於電網尖峰啟動數位調度，有效降低尖峰負載達5%以上。能源供應端的「脫碳」是達成2050淨零目標的終極戰場。\n\n台灣發展再生能源面臨間歇性供電挑戰，具備長時儲能特性、能跨越季節限制的「氫能」，遂成為重塑國家能源安全的關鍵戰略。目前工研院在台南沙崙建構的「氫應用示範驗證平台」，已邁向大規模產業驗證。面對2050淨零目標，我們不只是在研發技術，更是在構建一個高韌性的永續系統。\n\n台灣不僅能實踐自身的減碳承諾，更有機會在全球淨零賽道中，輸出一套以「數位×淨零」為核心的綠色整合方案，引領產業邁向高效能、低碳排且具競爭力的新時代。回到目錄"}, {"title": "石油期貨價格是騙人的？", "source": "經濟日報 A06 國際", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "布蘭特期貨油價又回升到每桶100美元以上，但相對於中東戰爭所造成的干擾，國際油市似乎出奇樂觀，尤其是較長期的石油期貨。開戰以來，近月期貨價格已上漲43%，2027年期貨卻僅上漲17%。對於這種情況，頁岩油業者Diamondback能源公司執行長霍夫直言，「遠期油價其實是在騙人」。這次石油市場受到...", "full_text": "布蘭特期貨油價又回升到每桶100美元以上，但相對於中東戰爭所造成的干擾，國際油市似乎出奇樂觀，尤其是較長期的石油期貨。開戰以來，近月期貨價格已上漲43%，2027年期貨卻僅上漲17%。對於這種情況，頁岩油業者Diamondback能源公司執行長霍夫直言，「遠期油價其實是在騙人」。\n\n這次石油市場受到的干擾，只有1956年發生的蘇伊士運河危機差堪比擬。過去兩個月來，全球已抽用5億桶庫存石油，相當於全球總庫存量的6%。到6月時，全球庫存量可能減少10%-12%，超過以往歷次的減幅。\n\n動用庫存，無疑是證明石油市場供給緊俏，期貨價格理應上漲。但期貨價於4月初達到頂峰後，即便荷莫茲海峽依然實質關閉，使庫存量持續減少，市場卻反而出現賣壓。直覺上看，這顯示市場對於目前的停火可能演變成持久的和平相當樂觀，荷莫茲海峽不久就能重新開放。\n\n牛津能源研究所專家鮑喬夫最近的報告指出，箇中原因包含技術因素。他發現，伊朗戰爭剛爆發時，避險基金大量累積近月期貨，帶動價格大漲。1個月與6個月期貨的逆價差在2月底時僅每桶2美元，到4月初時已擴大到約35美元，之後各國釋出戰略儲油，以及美國總統川普不斷放話，迫使許多避險基金4月初時賣出期貨，以控管風險、或獲利了結。\n\n鮑喬夫警告，這種「震撼吸收器」可能不會持續，尤其是在中東戰爭再度升高之際。即便戰局仍維持現狀，但庫存持續下降將引爆另一波買氣。在最樂觀情境下，即荷莫茲海峽立刻重新開放，仍要經過好幾個月才能清理完積壓的裝運工作，之後再出清波灣貯存的石油，最後才是使關閉的油井恢復生產，這要為時數月才能完成。\n\n儘管提用庫存的速度將會減緩，但庫存仍將減少。然而，目前戰局並非如此樂觀，而且荷莫茲海峽遭到美國與伊朗的雙重封鎖。達拉斯聯邦準備銀行對美國石油業主管的最新訪調顯示，80%受訪者預期荷莫茲海峽無法在8月前恢復正常，40%的受訪者預料要拖到11月之後。\n\n而且，逾50%受訪者預期今、明兩年美國石油產量成長將相對較小。這段真空期愈久，未來就需要愈長的時間重建庫存，因此較長期的期貨價格將會上漲，才能鼓勵業者增加產量，或發生「需求毀滅」現象，才能使庫存恢復正常。我們不知道庫存究竟再降低多少，才可能在期貨市場引發新一波的恐慌性買盤。\n\n但幾乎能確定的是，石油現貨與期貨價格的差距將愈來愈大。（作者Liam Denning是彭博資訊專欄作者／編譯任中原）回到目錄"}, {"title": "華許不蕭規曹隨，但動作空間有限", "source": "經濟日報 A14 台股熱點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美伊戰事持續著，但是華爾街已經對戰爭「脫敏」了，美股再創新高。美債走弱，收益率向上，債市資金對戰事還是擔心的。石油價格被美伊談判進程和社交媒體上的宣傳戰所左右，作大幅上下震盪。美元匯率貶值後再度走強，黃金白銀回吐，比特幣向好。美股迭創新高，那斯達克和S&P500所製造出來的周連升記錄，可以追溯到...", "full_text": "美伊戰事持續著，但是華爾街已經對戰爭「脫敏」了，美股再創新高。美債走弱，收益率向上，債市資金對戰事還是擔心的。石油價格被美伊談判進程和社交媒體上的宣傳戰所左右，作大幅上下震盪。\n\n美元匯率貶值後再度走強，黃金白銀回吐，比特幣向好。美股迭創新高，那斯達克和S&P500所製造出來的周連升記錄，可以追溯到2022年。此時此刻美伊戰爭仍在進行中，石油價格比戰前高出四成，生活成本暴升嚴重侵蝕中低層收入家庭消費信心，而天然氣、化工品、化肥、氦氣、鋁等中間產品正在製造供應鏈危機，但是美股對此卻選擇視而不見。\n\n市場對戰爭開始顯得無動於衷，定價戰事不久便會結束。美股上漲，有一定的道理。美國是能源淨出口國，幾乎不從荷莫茲海峽進口石油天然氣，最近反而接到亞洲國家大量石油急單、歐洲天然氣急單，美國的能源供應不受衝擊，只是價格上漲了。\n\n其次，上市公司的盈利狀況良好，從AI巨企到大型銀行多數盈利超預期。那麼美國經濟是不是真的可以對戰爭無動於衷呢？其實市場存在著分歧。\n\n美股早已創出新高，但是債市卻沒有那麼樂觀，現在的10年期收益率仍比戰前的4%水準仍然高出30至40百分點。換言之，債市對物價前景、政策利率前景持審慎態度，對政府控制赤字的能力也不樂觀。在戰爭與能源價格上，筆者更相信債市。\n\nAAA協會統計，美國平均汽油價格每加侖4.06美元，比戰前的2.75美元上漲了接近五成，對於收入水準處於Alice Threshold（Asset Limited，Income Constrained，Employed，大陸讀者更熟悉的表述叫「斬殺線」）之下的42%美國家庭，戰爭對消費信心的衝擊是巨大的。上周，白宮提名的聯準會主席候選人華許參加了參議院銀行委員會提名聽證，司法部旋即撤銷對現任聯準會主席鮑爾的指控，為他坐上貨幣政策頭把交椅掃清了最主要的障礙。華許聽證會上民主黨議員對其火力全開，不過真正有意義的話題集中在兩點上：一、是不是白宮的傀儡；\n\n二、如何重塑聯準會。儘管川普對現任聯準會主席鮑爾的極限打壓以及暗示華許降息對經濟的重要性，華許對此一口否認，「總統從來沒有要求我承諾作出任何特定的利率政策。如果他有這類要求，我也絕不會答應，但是他從未這麼要求過」。\n\n華許與川普之間是否存在默契和有什麼默契？不得而知，不過起碼在這個問題上他可以過關。至於入主聯準會後會怎樣重塑美國貨幣當局，華許就明白表達了希望作出架構改變（regime change）的想法，有意在聯準會如何衡量通膨、如何與外界溝通上作調整。\n\n他反對前瞻性指引，也反對例會前已經燙平了的政策立場，揚言喜歡更混亂（messier）的政策討論乃至觀點交鋒。這是對葛林斯班時代以來，高透明度、按部就班式政策管理模式的一次全面修正。就市場而言，不確定性更大了。\n\n華許一直主張重新定義與財政部的關係，認為維持經濟穩定和市場穩定的短期工作應該交由財政部處理，聯準會則應堅守穩定物價和就業最大化的雙重目標，除此之外不應該「管得寬」。如果華許未來把控聯準會政策，他的政策焦點會比前幾任更狹窄、更專注於國會賦予的「雙目標」和銀行最終借貸人角色。至於他對降息和縮表的立場，反而沒有成為聽證會的焦點，畢竟短期政策受到一系列不確定性的影響。\n\n筆者的預判是華許以不變應萬變起勢，既不降息也不縮表，根據就業、物價及金融市場的動向逐漸切入。縮表是他的長期目標，並不急於推開，而降息暫時條件尚不成熟，除非出現金融動盪。從管制理念到政策意境，華許都不是「蕭規曹隨」的人物，但是目前環境下迅速出手的限制太多。\n\n本周是央行大周，美、歐、日、英央行分別召開例會，聚焦點是鮑爾 5月15日卸任前的最後一次記者會，聯準會利率不會有變，但鮑爾留下了2020年QE和與川普恩怨等歷史遺產。日本銀行看來4月未必升息，但是植田和男記者會上的言論對市場判斷5月利率形勢頗為重要。歐洲央行和英格蘭銀行估計也不會動利率，不過行長在記者會關於通膨的立場仍需留意。\n\n除此之外，關注美伊談判。資料方面，美國PEC通膨預計升至3.5%。美國和歐元區GDP資料出爐。\n\n（作者是經濟學家，本文純屬個人觀點，不代表所在機構的官方立場和預測，亦非投資建議或勸誘）回到目錄"}, {"title": "自由廣場》國安修法防敵對動員 也要嚴守法治邊界", "source": "自由時報 A14 自由廣場", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。草案針對以文字、聲音、影像等方式，公開鼓吹、倡議或支持外國、中國、港澳或境外敵對勢力，對中華民...", "full_text": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。\n\n草案針對以文字、聲音、影像等方式，公開鼓吹、倡議或支持外國、中國、港澳或境外敵對勢力，對中華民國發動戰爭，或以非和平手段消滅中華民國主權者，可處行政罰。這個事實說明，爭點不在一般政治意見，而是敵對勢力的暴力目標能否被包進言論自由。既然牽涉言論，政府更不能只喊國安。\n\n誰來認定、如何認定、如何救濟，都必須寫清楚；若涉及網路內容處置、限制接取或命令改正，更應有明確門檻與司法監督。國安名義越大，行政權越要受檢驗，法治邊界才不會被擠壓。\n\n在野黨質疑構成要件不明、行政權過度集中，不能用一句「反國安」打發；但這項質疑也不能倒過來替鼓吹武力滅國找藉口。若把公開支持敵對政權以戰爭或非和平手段消滅台灣主權，全都塞回言論自由，實質上就是要求民主制度替自己的解體放行。\n\n成熟民主不是沒有紅線，而是紅線必須窄、準、可受檢驗。批評政府、主張政策、討論統獨，應受保障；鼓吹敵對勢力以暴力或非和平方式消滅主權，則應被排除。\n\n界線劃不好，政府會被懷疑擴權；完全不劃，國安防衛就會被敵對宣傳反覆測試。國安修法要快，更要準。\n\n政府不能拿國安換取空白授權，在野黨也不能拿言論自由拆掉國安門鎖。自由不是替滅國宣傳開後門，法治也不是給行政權開空白支票；把紅線寫窄、程序審嚴、執法攤在陽光下，才是台灣面對敵對滲透時最該守住的民主防線！\n\n（作者為退休人士）回到目錄"}, {"title": "自由廣場》併購案的國安盲點 外送大軍淪中共免費探路人？", "source": "自由時報 A14 自由廣場", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？然而，在全民國防的視角，這是一場山雨欲來的國土測繪保衛戰！所稱全民國防，即是認知到「生活處處是防線」。一旦戰爭打的是城鎮戰...", "full_text": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？\n\n然而，在全民國防的視角，這是一場山雨欲來的國土測繪保衛戰！所稱全民國防，即是認知到「生活處處是防線」。一旦戰爭打的是城鎮戰，勝負關鍵就在於「巷弄地形」。\n\n國人熟悉的Google地圖，多半只拍到大馬路。但Grab引以為傲的GrabMaps卻是大數據的「活地圖」，它即將可能靠著全台十幾萬名外送員，每天趕單進出防火巷、大樓側門、地下停車場等…鑽出來的。這無形中繪製出了台灣最精密的3D立體兵要圖。\n\n這些複雜的巷弄就是我們抵抗外敵的天然掩體，怎能輕易將數據交到外人手裡？Grab地圖技術與華為的「花瓣地圖」有著密切合作，其雲端服務更包含阿里巴巴的「阿里雲」，更令人毛骨悚然。在中共《國家情報法》的緊箍咒下，只要北京當局一聲令下，中企必須無條件交出所有數據。\n\n等於讓台灣十幾萬名外送大軍，於不知不覺中，被迫成為解放軍的免費探路人！試想，若我國防高官或重要將領，深夜點了一包鹹酥雞外送，敵方透過阿里雲的大數據比對，瞬間就能精準鎖定其座標與作息。若再循著被收買的外送員，其日常鑽出的「隱蔽路線」，直接進行精準斬首，後果不堪設想。\n\n全民國防不能只是一句口號，必須落實在每個數位細節裡。當我們的手機足跡已經成為現代戰爭的導引武器，公平會、數發部與國安單位，萬萬不能再用「外資合併」的單純商業邏輯來草率審查此案。呼籲相關單位，絕不能只用「市場有沒有壟斷」的舊有經濟思維來審查此案。\n\n台灣地理情資與全民個資，是數位時代最寶貴的國防資產。如果 Grab無法提出技術證明，保證台灣數據百分之百「落地」且徹底切斷與華為、阿里雲的聯繫，政府就應展現捍衛國土安全的魄力，直接否決這項併購案！守護台灣，就從守護我們的巷弄圖資做起。\n\n別讓一份日常的外送鐵板燒，成了中共無人機長驅直入的導航路標。（作者為教師）回到目錄"}, {"title": "當政策只是回應壓力 難解醫護流失", "source": "聯合報 B01 健康", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為明顯。總勞動力下降 各行各業缺工缺工不只發生在護理人力，...", "full_text": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為明顯。\n\n總勞動力下降 各行各業缺工缺工不只發生在護理人力，從工程師、機師到各類專業技術人員，缺工已是全面現象。當總體勞動供給下降，提高薪資與改善條件，往往只是產業間的人才再分配，而非真正增加人力。更根本的是，世代價值已經改變，新世代不再願意為高壓、長工時與高度責任承擔無限讓渡生活品質，護理工作的本質，與這樣的價值轉變之間，存在難以忽視的落差。\n\n台灣邁入超高齡社會，醫療與長照需求持續上升，但護理教育端招生不足，學成不願投入職場、留任率低，顯示供給緊縮，能提供服務的人卻愈來愈少。面對這樣的現實，如何讓護理人員在有尊嚴且合理的工作環境下留下來，同時改變醫療體系，解方或許是打掉重練，重建系統。首先，必須推動任務重分配，讓護理師從大量非核心工作中解放出來，將人力用在真正需要的地方。\n\n去年有人在公共政策網路平台倡議，要求落實三班護病比與非專業工作排除，例如要求明確把「點班（財物清點、物料盤點）與環境整理」等，定義為非護理專業，改由後勤或護理輔佐人力處理。當護理人員的雜務干擾減少，可回歸「直接照護病人」本業，這才是護理專業真正的價值。少子化難逆轉 規畫外籍人力其次，啟動國際人力引進。\n\n許多先進國家將外籍人力視為常態配置。在護理人力回歸核心工作之後，非核心工作可轉由外籍人力處理，在少子缺工的情況下，引進外籍人力無法避免，必須及早認真思考，並做出合理可行的規畫。第三，科技導入不能停留在口號。\n\n全球發展人工智慧已是時代趨勢，面對未來物聯網、巨量資料及 AI發展，加上台灣人口結構老化的不可逆現象，人工智慧不只可協助醫師，也能幫助護理師等其他醫事人員，也許目前臨床導入AI尚未成熟，應以開放包容的心態與人工智慧共存。評估重建體系 才是根本解方護理人員逃離醫院臨床工作，改善待遇與工作環境無庸置疑，但人力不足時，強制設定護病比標準，醫療機構只能透過關閉病床、減少收治量能來符合規範。當前討論在於「應該有多少人」的理想配置，但我們必須面對「實際上有多少人」。\n\n護理人力問題，從來不是單一職類問題，而是整體勞動供給結構的變化。台灣的政策討論反覆在理想與訴求間擺盪，如果政策只是回應壓力，未評估人力供給與體系承載能力，最終不僅無法改善護理人員處境，恐將使第一線更疲憊，民眾更難就醫。（作者陳柏同為財團法人厚生基金會執行長）回到目錄"}, {"title": "新四通不是政策想像 是逼近的現實", "source": "聯合報 A13 北部生活圈", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還是機會存乎一心。距金門僅三公里的廈門翔安國際機場今年底啟用，...", "full_text": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還是機會存乎一心。距金門僅三公里的廈門翔安國際機場今年底啟用，金廈大橋議題也受關注。\n\n議會日前下鄉考察，前往金沙鎮五龍山一帶，勘察金廈大橋預定銜接位置；眼見廈門段工程推進，預計今年底完成海上主體、明年底全線建成，預留延伸至金門的接口，但金門端還是荒草一片。對金門而言，這已不是遙遠的政策想像，而是正在逼近的現實。\n\n金門府會訪陸團為前往對岸了解翔安機場、新四通的影響，原訂四月二十七、二十八日由副縣長李文良偕議員赴陸，近期逢「鄭習會」、賴總統訪友邦史瓦帝尼生變等事件，中央對地方官員赴陸審查趨嚴。李文良及縣府一級主管赴陸申請遭駁回，遂緊急調整名單，改由副處長層級「代打」隨行。地方對金廈大橋、共用翔安機場看法兩極。\n\n金門仰賴台灣本島運油發電，成本高昂，若能透過陸橋系統引進對岸電力與天然氣可降低能源負擔，也能在霧季航班停飛、小三通中斷時，提供交通替代方案。若結合翔安機場，金門將成為兩岸與國際客往返的中轉樞紐，帶動觀光、餐飲、旅宿及租車等產業發展。反對者憂心，這不單純是交通建設，而是制度與安全選擇。\n\n值得關注的是，翔安機場啟用對金門是把雙面刃，利處是提升金門與國際接軌的效率，促進旅遊升級與產業出口，但大型客機低空起降帶來的飛安、噪音、空汙及海域汙染問題，對腹地有限、環境承載脆弱的金門將是長期且直接的壓力。廈門翔安機場牽動兩岸關係變化，對金門影響深遠，如何因應日後發展的新局、衝擊，地方政府要有協商對策，中央也應該展現態度。回到目錄"}, {"title": "科技競爭的本質在於功能與使用者體驗 而非產地標籤 從「高德地圖」看新媒體時代的理性判讀", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台的資訊服務系統；近期因紅綠燈秒數顯示幾乎「零時差」，在台...", "full_text": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台的資訊服務系統；\n\n近期因紅綠燈秒數顯示幾乎「零時差」，在台灣引發了資安與國安的討論，值得從資訊傳播的角度冷靜觀察。首先，交通資訊本質上多屬於開放資料範疇。全球主要導航系統，皆依賴衛星定位（ＧＰＳ、北斗系統）與公開或半公開的交通數據，再透過演算法進行整合與預測。\n\n這種技術運作邏輯，是當代資訊社會的常態。國際業者利用大數據與人工智慧，將零散資訊轉化為即時導航服務，其目的在於提升效率與便利性。因此，若僅因應用程式的「中國背景」，便直接將其視為涉及機密的安全威脅，恐過於簡化問題，也忽略了全球科技發展的共通基礎。\n\n其次，當我們使用手機地圖導航時，其實早已習慣開啟「雙向定位」機制；使用者在獲取位置服務的同時，也將自身位置資訊回傳給系統後端。這樣的模式不僅存在於「高德地圖」，同樣適用於 Google Maps或Apple Maps等國際主流平台。\n\n定位資料的收集與分析，是提供精準導航、交通預測、路況優化的基礎條件；關鍵不在於「蒐集」，而是「如何蒐集使用」、是否受到有效監管。第三，面對科技快速演進，我們應思考是否「逢中必防」？\n\n或建立更精細的風險評估機制？「高德地圖」因紅綠燈倒數顯示而受到關注，反映了其在使用體驗上的創新優勢；相較之下，既有市場主導者卻未必在細節上具備同樣表現。\n\n這提醒我們，科技競爭的本質仍在於功能與使用者體驗，而非產地標籤。再者，App生態本身具有高度流動性，今日爆紅的應用程式，有可能在短時間內即被其他更具創新、或更符合需求的產品取代。這種「議題帶動流量」的現象，正是大眾傳播與數位平台交互作用的典型案例。\n\n一款地圖App最終是否能在台灣市場立足，仍取決於其導航準確度、使用便利性與在地化程度；若無法滿足使用者需求，自然會被市場淘汰。正如過去結合地圖與遊戲機制而爆紅的寶可夢GO，也是在不斷優化中維持其生命力。\n\n最後，若關切應用程式可能涉及敏感交通資訊，核心責任仍在政府的資安治理與制度建設；包括資料來源的審核、跨境資料流的監控，以及關鍵基礎設施的防護，都是維繫公共安全的關鍵。同時，社會也應培養更成熟的媒體素養與科技理解能力；\n\n面對「匯流」帶來的資訊穿透，我們不僅需要防範風險，更應學習各國技術優勢，強化本土數位服務的競爭力。「高德地圖」爭議提醒我們，在新媒體與數位科技高度交織的時代，解讀任何單一技術，都不宜過度簡化、政治化，台灣使用者也不一定習慣對岸的設計思維。唯有在理性分析、制度保障、技術理解三者並進之下，社會才能在便利與安全之間，找到穩健而長遠的平衡。\n\n回到目錄"}, {"title": "不能對美說不vs.不能對中說好", "source": "聯合報 A15 民意", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "拿大多倫多）近期，針對發芽馬鈴薯標準的放寬，看似技術性問題，實則揭露更深層也更令人不安的現實：台灣正逐步陷入「對美不能說不、對中不能說好」的雙重戰略夾縫；而民生政策，正成為最先被擠壓的領域。台灣在安全與國際支持上的高度依賴，使對美合作幾乎成為不可動搖的政策前提。這種依附關係並非單純外交選擇，而是...", "full_text": "拿大多倫多）近期，針對發芽馬鈴薯標準的放寬，看似技術性問題，實則揭露更深層也更令人不安的現實：台灣正逐步陷入「對美不能說不、對中不能說好」的雙重戰略夾縫；而民生政策，正成為最先被擠壓的領域。台灣在安全與國際支持上的高度依賴，使對美合作幾乎成為不可動搖的政策前提。\n\n這種依附關係並非單純外交選擇，而是漸內化為政策慣性的現實。問題在於，當「不能說不」滲透到具體經貿與食品標準時，政府是否仍保有談判空間？還是只能在對方設定框架內調整本國標準？\n\n面對中國大陸，政府則採取幾乎相反策略。即便中國釋出對台十項措施，理論上可挹注台灣農業與觀光產業，政府卻以高度政治警惕回應，甚至拒絕進一步互動。這種「不能說好」的邏輯，同樣不是政策選擇，而是出於對主權、安全與政治滲透風險的整體判斷。\n\n於是，對美方要求傾向調整標準、積極配合；對中方釋出經濟利多，則高度保留甚至拒絕。台灣在兩大力量間不是單純選邊，而是同時承受兩種相反、但同樣強烈的約束。\n\n當農產品標準為配合對美貿易而調整時，社會承擔的是食安疑慮與政策信任流失；當可能為農民帶來收益的對中市場機會被政治考量阻擋時，承擔的則是產業發展受限與收入機會流失。表面上是兩條不同政策路線，實質上卻已形成對民生政策的雙重擠壓。\n\n回到目錄"}, {"title": "英國也成美「菜單」 吳志中怎能不怕", "source": "聯合報 A15 民意", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "外交部政務次長吳志中接受彭博專訪，面對即將舉行的川習會直言，「我們最害怕的，就是將台灣擺上習近平與川普總統談判的菜單上；我們也需避免這件事發生」。看來吳志中是清醒的，但真能喚醒賴政府，乃至依然對美國懷抱「出兵護獨」希望的眾青鳥？川習會預定五月十四至十五日舉行。各界預料，會談將涵蓋多項商業交易與採...", "full_text": "外交部政務次長吳志中接受彭博專訪，面對即將舉行的川習會直言，「我們最害怕的，就是將台灣擺上習近平與川普總統談判的菜單上；我們也需避免這件事發生」。看來吳志中是清醒的，但真能喚醒賴政府，乃至依然對美國懷抱「出兵護獨」希望的眾青鳥？\n\n川習會預定五月十四至十五日舉行。各界預料，會談將涵蓋多項商業交易與採購承諾。尤其是川普，必然想藉此取得北京承諾大力採購波音客機及大豆等農產品，以便成為他於美國期中選舉時赴各地助選演講的重要政績。\n\n既是美中「大交易」，即使屆時透過「川普贏學」的虛幻濾鏡可對外扭曲為「美國贏麻了」的敘事，但明眼人皆知，中方又怎可能任美方予取予求？亦即，美方也得犧牲部分籌碼。這即是吳志中面對外媒專訪時，不得不去面對的「背景板」。\n\n當一面倒的親美，甚至跪美、舔美早成賴政府基調，甚至還不讓國人疑美之時，吳志中這番談話，無疑如暮鼓晨鐘。吳志中是隨口說說，還是有所本？且不論自川普二度就任美國總統以來，一連串針對傳統盟友祭出關稅大棒或刺耳談話，單以事涉重中之重的國家主權而論，從揚言讓加拿大成為美國一州，到想要奪下丹麥所屬的格陵蘭島，就足以說明川普所謂「極限施壓」的毫無底線。\n\n這兩天，美國甚至不惜將矛頭對準鐵桿盟友英國。一名美國官員向路透披露，一封五角大廈的內部電子郵件，概述了美國因伊朗問題而懲罰北約盟友的選項，包括暫停西班牙的北約成員國資格，以及重新檢視英國對福克蘭群島主權聲索的立場，只因美國不滿部分盟友在美以伊戰爭中，不願或拒絕向美國提供進入權、駐軍權與飛越權。要知道，一九八二年的福克蘭群島主權之戰，對英國意義非凡。\n\n當時英國只剩下「日不落帝國」的餘暉，首相柴契爾夫人為了奪回遠在萬里之外的福克蘭群島，不惜傾舉國之力上演「帝國大反擊」，以傷亡上千名英軍的代價奪回福島、重振國威。但如今，美國國務院網站指出，該群島目前由英國管理，但仍由阿根廷主張擁有主權。與此同時，川普盟友、阿根廷的右翼民粹主義總統米雷伊則對前景表示樂觀。\n\n換言之，英國以帝國最後榮光奪回的福島，很可能已遭鐵桿盟友美國拿來當籌碼談資，簡直就是對英國最無情的羞辱。從美英關係演變之烈，再回看美中台三角關係，如果吳志中對川習會不感到憂心害怕，還真有失外交專業身分。只可惜，台灣有太多「裝睡的人」。\n\n回到目錄"}, {"title": "台灣關係法與九二共識的保台藝術 九二共識曾讓台灣海峽有了一九四九年之後最和平的時光 以模糊定位保台，就是台灣關係法與九二共識的共同智慧 說不清但可運作的空間，維繫了美國與我們斷交後的關係", "source": "聯合報 A15 民意", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "「鄭習會」之後，「九二共識」又成為兩岸關係的重要爭點。這四個字曾讓台灣海峽有了一九四九年之後最和平的時光；但民進黨執政後，「九二共識」漸被汙名化，連國民黨政治人物都不太多說。這次鄭麗文光明正大重申「九二共識」的原則，不出所料，綠營發動全面攻擊。陸委會說「九二共識，其實是在幫中共意圖消滅中華民國背...", "full_text": "「鄭習會」之後，「九二共識」又成為兩岸關係的重要爭點。這四個字曾讓台灣海峽有了一九四九年之後最和平的時光；但民進黨執政後，「九二共識」漸被汙名化，連國民黨政治人物都不太多說。\n\n這次鄭麗文光明正大重申「九二共識」的原則，不出所料，綠營發動全面攻擊。陸委會說「九二共識，其實是在幫中共意圖消滅中華民國背書」；民進黨立院黨團表示「接受九二共識就是接受一國兩制」。\n\n有趣的是，就在鄭習會當天，ＡＩＴ在社群媒體上發文，慶祝「台灣關係法」四十七周年，指出「台灣關係法與三個聯合公報及六項保證，對於維護台海的和平與穩定提供了實質幫助。」有人懷疑，這是不是美國在出招，搬出「台灣關係法」來與「九二共識」打對台，提醒「台灣關係法」才是護台定海神針！果然，民進黨大加頌讚，賴總統也「感謝美國政府依據台灣關係法以及六項保證履行對台灣的支持和承諾」（卻不提ＡＩＴ說的「三公報」）。\n\n然而，批評九二共識卻捧台灣關係法的人，可能沒搞清楚，台灣關係法和九二共識都是藉由模糊化台灣地位與兩岸關係，讓台灣在美國的「一中」原則、「不承認台灣」的國家地位下，依然有自主與和平的空間。以模糊定位來保台，就是台灣關係法與九二共識的共同智慧。誰要硬想要把兩岸定位「說清楚講明白」，而且還要在大陸、美國、台灣前共同攤牌，那就是打破這兩個定海神針奠定的和平穩定架構。\n\n先看台灣關係法。它的確對台灣的穩定提供基礎，也讓美國持續維護兩岸和平。然而，該法的前提是「美國終止與台灣之外交關係」以及「美國與中華人民共和國建立外交關係」。\n\n但在此前提下，仍要確保美台在「外交以外」\n的關係，同時也「關切」台海和平。而它在法理上更有意思之處，是在不承認台灣（或中華民國）作為一個「國家」時，卻用個別法律條文給台灣「類似國家地位」。例如，台灣人民可以部分適用美國的移民法，美國不在台設「大使館」卻設一個功能相近的非營利法人ＡＩＴ，同時賦予台灣駐美單位類似外國領事館之地位。\n\n台灣關係法讓美國可以給台灣「類似國家」的待遇，而且還明確規定美國將（而非「應」）提供台灣必要的防衛武力。你若硬要問：美國到底有沒有把台灣當成主權獨立的「國家」？那它只好說「沒有」！\n\n如果台灣本來就是主權獨立的國家，何須特別立法來規範？美國可沒有「日本關係法」、「英國關係法」、「中國關係法」。不過，他們不會說得很明白，通常只說「依據台灣關係法之規定」！\n\n或是像ＡＩＴ的聲明，引述「台灣關係法與三個聯合公報及六項保證」。這樣的模糊定位，才能在三個聯合公報的「一中」政策與「美國認知台灣是中國一部分」之下，找到一個空間。這個說不清但可以運作的空間，就維繫了美國與我們斷交後的關係，直到現在。\n\n你能說「模糊」\n之功不大嗎？九二共識不說清楚到底「一個中國」是哪個中國；台灣關係法對台灣是否為國家語焉不詳。\n\n這兩個充滿解釋空間的文件，就讓美、陸、台三方，都找到能與各自國內法制交代的說法。既然美國、大陸都享受著這個模糊空間，我們也是模糊的受益者，就讓它繼續維持健康的模糊吧。（作者為國立政治大學法律學系副教授）回到目錄"}, {"title": "組團地下化反添風險 政府應務實檢討對陸政策 掩耳盜鈴的赴陸禁團令", "source": "聯合報 A15 民意", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？基於陸方未開放陸客來台、且片面改變Ｍ5０3航路，以及考量觀光逆差與兩岸情勢，政府於二○二四年援引「發展觀光條例」第五十三條，以「...", "full_text": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？\n\n基於陸方未開放陸客來台、且片面改變Ｍ5０3航路，以及考量觀光逆差與兩岸情勢，政府於二○二四年援引「發展觀光條例」第五十三條，以「損害國家利益」為由，於該年六月起暫停旅行業組團赴陸旅遊。然而，這所謂的赴陸禁團令實施迄今近兩年，並未阻絕台灣民眾赴陸熱潮。根據觀光署統計，二○二四年台灣赴陸人數為二七七萬，去年則增長至近三二四萬，大陸為台灣出境目的地第二名，僅次於日本。\n\n若加上由港、澳或其他國家轉機，實施禁團令以來，台灣每年赴陸人次超過四百萬。亦即，數據反映：禁團令下台灣民眾赴陸反而有增加趨勢。然而，眾所周知，赴陸禁團令實施初期，為規避監管，許多旅行業者將組團行為轉入地下，改以「考察」、「交流」或「落地成團」等名義赴陸旅遊，「地下化」造成至少三大後果：首先，消費者權益無法得到保障。\n\n地下赴陸團品質參差不齊，且往往缺乏合法的旅行業責任保險，一旦發生旅遊事故，旅客無法得到完整的保障；其次，旅行產業失序。禁團令縛住合法旅行社手腳，市場反而被不具保障的低價團與灰色操作占據；\n\n這無異是對合法旅行業者的懲罰；最後，政府無從監管。赴陸旅遊地下化，使得政府不但難以掌握切確的統計數據與赴陸動向，更容易形成涉陸政策的決策盲區。\n\n由於赴陸禁團令影響我國觀光業甚鉅，且上述問題經專家學者、業者多次反映；迄今所謂的赴陸禁團令執行上已沒有那麼嚴格，可說只剩徒具形式。也就是說，雖然政策上仍未開放組團赴陸，但政府意識到，無論是旅遊、經商，台灣每年仍有數百萬人赴陸的需求，若無完整配套的堅壁清野，不但罔顧現實，亦無益國安，更可能造成產業與民眾的雙輸；\n\n因此實務上等同已鬆綁。誠如吾人一再強調：面對大陸，台灣不但要能審時度勢，更應以辯證思維回應陸方的舉措。雖然大陸仍強調「和戰兩手」，但從各種情勢研判，穩定的台海關係，以及與台灣更多的交流合作，是目前大陸對台主旋律。\n\n因此，如何正確判讀、因勢利導，不但已是台灣的當務之急，更是台灣安全不可或缺的戰略思維。台灣應秉持開放社會應有的自信，相信我們有能力與陸交流的同時，透過透明的規範來應對風險。因而可藉此事件，從檢討名存實亡、掩耳盜鈴的赴陸禁團令開始；\n\n透過公私協力，讓政府與社會進行更多層次討論，規範出一套風險可控、務實可行、利益台灣的對陸政策！回到目錄"}, {"title": "軍購今3度協商 8千億是關鍵密碼 立院可能挑燈夜戰拚送院會表決 在野準備加碼 設發價書才編預算但書", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "茵／台北報導】針對「國防特別條例」草案，立法院長韓國瑜今（27）日下午將召 集朝野黨團進行第3次協商，並已告知「加班處理」，無論有無共識 ，將完成協商程序送交院會表決。據了解，藍營已有多種金額策略， 但不輕易出手，如果執政黨願意退一步，不要堅持1.25兆元，在野黨 已準備加碼上看至8000億元，並列...", "full_text": "茵／台北報導】針對「國防特別條例」草案，立法院長韓國瑜今（27）日下午將召 集朝野黨團進行第3次協商，並已告知「加班處理」，無論有無共識 ，將完成協商程序送交院會表決。據了解，藍營已有多種金額策略， 但不輕易出手，如果執政黨願意退一步，不要堅持1.25兆元，在野黨 已準備加碼上看至8000億元，並列需有發價書始得編列的但書。民眾 黨主席黃國昌昨說，願意與國民黨針對新版本好好討論，但綠營仍堅 持1.25兆元，絕不打折。\n\n據了解，目前藍營有兩個方案，一是黨內有人覺得第二波軍購沒有 那麼快，主要是「川習會」在即和美國軍火商量能無法負荷，因此不 急著預匡第二波軍購預算，只要表明立場，有發價書就會加編預算就 好。另一方案為，預先匡列買美國的信任。由於韓國瑜壓力大，希望趕 快結束軍購戰場，因此藍白確實討論過，倘若綠營調降金額，在野也 願意調高至8000億元。\n\n不過從上周協商氣氛，若綠營不退讓，第二方 案恐無法推進。藍委徐巧芯表示，韓國瑜請他們把今晚行程先排開，雖然只有少少 條文，但確實可能要挑燈夜戰。她呼籲，協商過程中，希望各政黨秉 持撙節國家預算、審慎使用納稅錢，以及認同建軍的重要性，而在對 台軍售部分，其實國民黨相當有共識，所以在此前提之下，或許協商 過程會花些時間，但也希望能有初步好結果。\n\n黃國昌指出，如果因為時程非常趕，需要立法院先授權行政部門編 列美國至今還沒宣布的第二批軍購的話，立法條文技術要如何設計， 民眾黨也開始進行相關研議工作。至於外傳韓國瑜與多數藍委要支持8000億元版本，且版本與說帖都 已經準備好？黃國昌說，如果國民黨版本與說帖都準備好，就「趕快 拿出來討論，民眾黨開大門走大路，願意針對新版本，坐下來好好討 論。\n\n」但目前沒看到所謂版本，且國民黨也稱意見分歧、還在收攏中 。民進黨立法院黨團幹事長莊瑞雄強調，黨團立場一貫且明確，即「 一切以國家安全為最高原則」，對於能夠提升國軍戰力、強化國防體 系的內容，黨團會全力支持，但對於止於口號、規畫零散，切割、打 折，甚至可能影響整體國防布局的提案，民進黨團寸步不讓。綠委陳冠廷指出，中東戰事使台灣在軍購產線面臨與中東盟友競爭 優先順序的壓力，呼籲立法院盡速審議「國防特別條例」。\n\n回到目錄"}, {"title": "榮景或台灣病？政府治理應如履薄冰 天堂不撤守／專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣） 的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代， 應如履薄冰。筆者有感於全球局勢動盪及跨境產業激烈競爭，提出以 下反思...", "full_text": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣） 的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代， 應如履薄冰。筆者有感於全球局勢動盪及跨境產業激烈競爭，提出以 下反思與展望：一、驕兵必敗，台股榮景下潛藏不容忽視的「台灣病」隱患。據報導，台灣因科技產業的蓬勃發展，股市總市值超過英國，台股 指數正朝4萬點邁進，一切看似蒸蒸日上。\n\n但筆者對此憂喜參半，蓋 瞬變的股票市場行情只是表面，實則一個物價與房價齊揚而基本工資 卻漲幅有限的台灣，如何稱得上幸福？《經濟學人》去年底便以「台灣病」為封面報導，形容台灣現況宛 如 1970 年代產業失衡的「荷蘭病」翻版。如今不論是金管會放寬國內 ETF對於單一個股的投資比率限制，或台電對特定企業的電價補助等 ，均屬加速產業發展失衡的短視政策。\n\n全民除緊盯股價，更應在病入 膏肓前促請執政者正視日漸嚴重的台灣病！二、全面產業升級迫在眉睫，亟需當代李國鼎、孫運璿之高瞻遠矚 的政治家。當前台灣產業情勢嚴峻，包括對外有像川普不按牌理出牌的非典型 總統，不僅無視國際法秩序，更數度誹謗稱「台灣偷走了美國的晶片 產業」，並以關稅手段迫使台灣企業赴美投資；\n\n近日他再度點名台灣 ，宣稱美國必須在短期內取得全球近半的晶片供應，否則將對晶片進 口課徵高額關稅。但事實是，台積電的成功除了當年經國政府的鼓勵與扶持外，也包 括台積電創辦人張忠謀出眾的運營能力，首創「專業積體電路製造服 務商業模式」，加上台灣工業製造的地理集中性、從事製造業的工程 師和其他技術人員供應健全（包括法律人在內）等具競爭力之因素， 加上員工及相關產業鏈不懈的努力，才有今日成績！絕非川普口中的 台灣偷竊美國晶片市場，否則美國最大半導體公司英特爾何須積極與 台積電討論合作之可能性。\n\n但對於川普汙衊式的指控，不論是台積電董事長或董事會，或賴政 府均悶不吭聲，令筆者感到困惑。台積電董事會基於公司治理、善良 管理人注意義務，本不應輕易屈服於政府（不論是台灣或美國）之意 志，而做出違背公司長遠利益之投資決定。而政府（國發基金）乃台積電大股東之一，即便賴政府本該卻無力 以官方角色替台積電爭取權益，至少應在董事會中發聲，促使董事會 決策時審慎評估，並強化社會責任措施，包含促進整體產業轉型及競 爭力提升之方案，避免可能的大西瓜效應，吸光其他企業養分，否則 對台灣經濟百害無利。\n\n釜底抽薪，此刻台灣「政治產業」亟需像李國鼎、孫運璿等有能力 、有遠見的無私政治家，為台灣產業轉型提供清晰的路徑與配套（包 括重要的法制建置）。三、兩岸良制一國，政治產業沒有時間蹉跎！筆者認為，政治產業好、必須好，百工百業才會好！\n\n拋開意識形態 ，不論對美、對陸互動才能回歸福國利民之本質。兩岸求同存異且積 極良制融合，除可降低不必要的誤會，亦能在交流中互相學習、砥礪 ，一個台灣與大陸共好的中國，絕對比劍拔弩張對立的兩岸關係來得 更好。台灣病從政治產業而來，蔓延至法律及經濟產業之中，倘及時對症 下藥，「健康快樂、國泰民安、良制一國」之理想國世界將指日可待 ；\n\n否則，前途堪慮。何去何從，端在政府和全國選民一念之間！（作 者為超國界法學教授）回到目錄"}, {"title": "從荷莫茲到馬六甲 縱橫天下／專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從 荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天， 台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；在東 南亞，區域國家想的則是：如果馬六甲海峽也被封鎖，那又會是什麼 狀況？馬六甲海峽長900公里，沿岸有印尼、泰國、馬...", "full_text": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從 荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天， 台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；\n\n在東 南亞，區域國家想的則是：如果馬六甲海峽也被封鎖，那又會是什麼 狀況？馬六甲海峽長900公里，沿岸有印尼、泰國、馬來西亞、新加坡4國 ，是東亞到中東與歐洲最近的航路。全球海上貿易中有 22％的貨物經 過馬六甲，更是重要的能源通道，2025 年上半年，每天有 2320 萬桶石 油經過，占海上運輸石油量的29％，而每天從荷莫茲海峽經過的原油 也才2090萬桶。\n\n伊朗對荷莫茲海峽收費後也在馬六甲海峽相關國家內引起騷動。新 加坡強調自由航行權，認為應遵守國際法，不同意按照伊朗的要求付 過路費，也不願就過路費一事和伊朗談判。馬來西亞則不同調，他們 和伊朗談判，獲准讓幾艘馬國船隻通過海峽。\n\n印尼則一度考慮有樣學樣，22 日印尼財長波巴亞在一場研討會上拋 出馬六甲海峽也收費的點子，結果遭星、馬等國反對，波巴亞沒多久 就收回這個想法。其實馬六甲海峽收不收費是小事，更該攤開來看的是國際政經情勢 的大地圖。荷莫茲海峽遭到封鎖後，東南亞國家立刻感到震撼。\n\n缺油 影響到發電，也逼得許多國家不得不改採遠距上班；缺肥料更影響春 耕與糧食供給。論者謂東南亞國家受到震撼的「強度」，顯示其對中 東過於依賴，不若中國早就對能源供給想好多種備案。\n\n然而除了強度之外，更該注意的是「速度」: 何以荷莫茲海峽一被 封鎖，馬六甲海峽這邊立刻就感受到震撼？因為兩地的經濟早已整合 在一起了。通常我們把荷莫茲和馬六甲看成是兩個個別的海峽。\n\n但現在越來越 多地緣政治學者指出，從荷莫茲到馬六甲是一條連在一起的石油走廊 。油輪從荷莫茲海峽出來，向東過印度洋，最後是穿過馬六甲海峽進 到亞洲。所以新加坡是這個走廊的東端出口。\n\n這還不夠，學者指出，亞洲和海灣兩地的經濟關係日漸密切，所以 荷莫茲和馬六甲的聯繫不只是石油，還包括貿易、資金及制度化的連 結。這從幾次東協與海灣合作理事會的峰會成果就可看出。海灣國家與中國的貿易也不斷增加，2025年前9個月海灣國家的主 權基金有40％投到了亞洲。\n\n阿聯酋、沙烏地的公司與亞洲夥伴的國防 工業合作，將亞洲的科技與製造能力融入了海灣國家的工業生態。亞 洲的金融服務公司也在海灣各個金融中心擴大服務。荷莫茲到馬六甲 的海上走廊已內化成亞洲成長的基礎建設。\n\n所以學者指出，現在重點不是東南亞如何減少對中東的依賴，而是 如何與海灣國家一起有系統地分散風險，如聯合的倉儲設備、分散的 船運安排、跨國界的資本夥伴、更深化的金融合作等，讓彼此能在經 濟互賴的關係中，共同管控經濟的曝險程度。這個大戰略最終會形成 什麼樣的國際政經格局，值得繼續觀察。（作者為東吳大學政治系教 授）回到目錄"}, {"title": "社會觀察 接下大陸的橄欖枝", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "「惟仁者為能以大事小，惟智者為能以小事大。」台灣今日處境最 需要的就是智慧。賴總統計畫出訪非洲友邦史瓦帝尼，但在出發前夕被3國無預警取 消專機飛航許可，行程被迫暫緩，最終只能派特使林佳龍前往。此事 是否代表大陸除機艦繞台外，同時已經在台灣外圍築成「窒息圈」， 阻斷台獨任何國際空間，包括可能的逃亡...", "full_text": "「惟仁者為能以大事小，惟智者為能以小事大。」台灣今日處境最 需要的就是智慧。賴總統計畫出訪非洲友邦史瓦帝尼，但在出發前夕被3國無預警取 消專機飛航許可，行程被迫暫緩，最終只能派特使林佳龍前往。\n\n此事 是否代表大陸除機艦繞台外，同時已經在台灣外圍築成「窒息圈」， 阻斷台獨任何國際空間，包括可能的逃亡途徑？日前「鄭習會」，據與會人士轉述，大陸國家主席習近平神態輕鬆 而自信，除強調兩岸同根同源、同文同種、休戚與共外，也強調尊重 並理解兩岸隔離了那麼久，發展出完全不同的社會制度、生活方式。但這是一家人的事，只要有話好好說、有事多商量，就沒有化解不了 的矛盾分歧，但不容外人干預。\n\n任何政黨只要承認九二共識，反對台 獨，他都願意對話，共同為兩岸謀和平。事實上，習近平是向賴清德遞出了邀請函，也畫下紅線。但鄭麗文返台後希望與賴清德見面，得到的只是總統府的酸言冷語 ：趕快審「國防特別條例」。\n\n這意思是無視橄欖枝，繼續備戰囉！如 果備戰可以避戰，烏克蘭、伊朗怎會烽火連年？賴清德更說：「向威權者妥協，只是以主權與民主做代價，不會換 來自由、更沒有和平。\n\n」現在國際上還有比美國更威權的國家嗎？美 國開徵對等關稅逼我軍購，賴清德不都妥協了？但他卻擱置習近平的 「惠台10政策」，無視農漁民和觀光業者的欲哭無淚，這是民主嗎？\n\n賴清德出訪史瓦帝尼受阻，國安團隊立刻說是中共施壓，綠營立刻 帶風向「抗中保台」，卻沒發現全球風向已變。今天除了台灣，全世界幾乎公認美國是世界和平最大的威脅者，更 是背信者。因二戰迄今，美國發動戰爭89 次，又多次因未達預期目標 而棄守，任憑當地陷入經濟絕境，人民流離失所。\n\n這是台灣要的主權 與民主嗎？賴政府對川普霸凌台灣無感，卻拿放大鏡檢視習近平，這是以小事 大的智慧嗎？20年前陳水扁遭美中聯手打壓，還玩得起「迷航之旅」 ，專機可經過中東、荷蘭等航點，繞道前往美洲，順便訪問利比亞， 會晤該國領導人格達費。\n\n20年後賴清德連落地轉機的地方都找不到了 。這凸顯川普的肆意妄為正逐步擴大中國的影響力，甚至已具體到影 響行政操作（如航權審核），賴政府不該不寒而慄嗎？習近平是「軟的更軟、硬的更硬」，但智者懂得趨吉避凶，不會撞 了南牆還不回頭。\n\n想四海任遨遊，賴清德要懂得接下大陸的橄欖枝。（作者為中華語文教育促進協會祕書長）回到目錄"}, {"title": "東升西降 壓縮賴政府國際空間", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "日前賴總統出訪邦交國史瓦帝尼受阻，改派外交部長林佳龍為特使 ，25日抵達史國；史國並在晚宴上播放賴總統致詞影片，終於達成慶 賀史國國王登基40周年暨58歲生日的外交使命。我們樂見林部長達成使命，但不樂見中華民國總統出訪受阻。然而 客觀分析，賴總統出訪受阻不能都歸咎於「中共打壓」，自己也要負 政策...", "full_text": "日前賴總統出訪邦交國史瓦帝尼受阻，改派外交部長林佳龍為特使 ，25日抵達史國；史國並在晚宴上播放賴總統致詞影片，終於達成慶 賀史國國王登基40周年暨58歲生日的外交使命。我們樂見林部長達成使命，但不樂見中華民國總統出訪受阻。\n\n然而 客觀分析，賴總統出訪受阻不能都歸咎於「中共打壓」，自己也要負 政策錯誤的責任。回想十餘年前馬英九總統執政時期，政府提出「活路外交」政策， 對大陸釋出善意，避免直接對抗，因此馬出訪友邦，中共並未打壓， 8年任期他完成對22個邦交國的出訪，並多次過境美國本土。為何如 今賴總統出訪卻如此困難？\n\n賴總統在2024年12月訪問太平洋友邦馬紹爾群島、吐瓦魯及帛琉等 3國，只能在夏威夷與關島過境，連美國本土都無法踏入。究其實際 ，賴政府「逢中必反」，遇大陸凡事對抗，甚至連陸配都要打壓，大 陸以打壓賴出訪回應，不是很合理嗎？這是一昧「抗中保台」理應付 出的代價。\n\n真正值得注意的，是大陸能夠成功打壓。蔡英文總統時期，雖然因 為不承認「九二共識」讓兩岸關係生變，但外交出訪仍算順利，不僅 多次過境美國本土，還能兩次出訪史瓦帝尼。這次賴總統出訪航線的 飛航許可，如果真是在大陸操作下取消，那麼大陸以前做不到，現在 卻可以做到，就表示大陸的實力越來越強，國際影響力越來越大。\n\n這是警訊。2024年賴總統出訪南島3國不能在美國本土過境，就已 顯示國際大環境生變的警訊。賴政府兩岸政策已有重新檢討的必要。\n\n大環境的變化，就是「東升西降」或許不再是中國的主觀期望，而 是國際權力正在轉移的進行式。美伊戰爭是個轉捩點或是明確指標。美國動用大軍卻無法逼降伊朗；\n\n北約盟國不願協助美國作戰；美軍基 地不僅不能保護反拖累駐在國，沙烏地阿拉伯已轉而要求巴基斯坦駐 軍保護；波斯灣油國也紛紛訪問中國尋求協助。\n\n中國影響力正在擴大 ，即便美國，也必須適度地權衡尊重。現在美軍實力或許還領先解放軍，但數年後中國第4艘航空母艦成 軍，太平洋兩岸的軍事天平就將正式向中國傾斜。如果連太平洋美軍 的實力都無法抗衡，賴政府口口聲聲的「以實力確保和平」，不是在 說夢話嗎？\n\n賴總統這兩年不到的任期，就已將台灣的國際空間壓縮到極小，這 就是篤信「以實力確保和平」，堅持「抗中保台」的結果。國際政治 從來就是實力導向，賴政府如果繼續癡迷意識形態，國際空間將更被 壓縮。屆時自己選舉失利事小，損害台灣整體安全利益，才是影響台 灣未來的大事。\n\n（作者為台灣國際戰略學會執行長）回到目錄"}, {"title": "《社論》大陸經濟仍未擺脫「供強需弱」困境", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個 月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預 期改善，國內需求似在恢復。然而，深入剖析數據背後的結構性特徵 ，不難發現：這一輪物價回升的基礎並不牢...", "full_text": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個 月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預 期改善，國內需求似在恢復。\n\n然而，深入剖析數據背後的結構性特徵 ，不難發現：這一輪物價回升的基礎並不牢固，供給強、需求弱的根 本格局尚未扭轉。大陸3月PPI同比轉正，國際能源價格大漲是核心推手，這種由外部 成本衝擊驅動的價格上漲，本質上是一種「輸入性通膨」，而非國內 需求旺盛拉動的結果。值得警惕的是，PPI內部結構出現明顯分化。\n\n3月生產資料價格同比 上漲1.0％，而生活資料價格同比仍下降1.3％。這意味著價格回暖主 要集中在產業鏈上游，尚未有效傳導至終端消費品。上游原材料成本 上漲，下游需求卻依然疲弱，中下游企業的盈利空間將受到嚴重擠壓 。\n\n這種「成本推動型」的價格回升，不僅不能代表經濟全面復甦，反 而可能加劇企業經營困境。各項數據同時顯示，內生增長動力依然薄弱。從更宏觀的視角審視 ，當前居民消費呈現出「總量回暖、人均理性、結構性錯位」的複雜 態勢。\n\n清明假期（2026年4月）全國出遊人次年增6.8％，但出遊總花 費僅增長6.6％，人均消費並未出現爆發式反彈。消費者的行為模式 正在從「排場消費」轉向「悅己消費」和「深度遊」，傳統高額購物 支出減少，小眾城市旅遊、自然觀測等體驗式消費仍保持增長。實物消費領域同樣呈現出結構性特徵。\n\n近兩個月社會消費品零售總 額增速維持在2.8％～3.0％左右，實物商品特別是耐久財的需求依然 偏弱。主打性價比的電商平台和「白牌」商品的滲透率進一步提升， 而處於「腰部」的中端品牌面臨極大的去庫存壓力。高淨值人群支撐 的頂級白酒和奢侈品需求相對穩健，消費領域呈現出明顯的K型走勢 。\n\n房地產價格的低位震盪使居民資產負債表處於「收縮修復期」，在 負債端未結清、資產端未大幅增值之前，居民邊際消費傾向很難出現 跨越式提升。這種「理性的回歸」而非「報復性的噴發」，恰恰說明 了內需動能的不足。當前物價回升高度依賴外部輸入性通膨，內生需求支撐不足。\n\n持續 的物價低迷會強化企業和消費者對價格下行的預期，導致消費延遲、 投資收縮。雖然 PPI 轉正有利於打破通縮預期的負向循環，有利於企 業盈利修復，但促進物價合理回升仍需政策持續發力。首先，需要切實提振服務消費。\n\n服務消費占比提升是消費升級的客 觀規律，應通過放寬市場准入、優化消費環境、豐富消費場景等方式 ，激發服務消費潛力。其次，要增加居民收入。收入是消費的基礎， 應通過穩就業、完善社會保障、優化收入分配等方式，提升居民消費 能力和意願。\n\n再次，要穩定房地產市場。房地產是居民財富重要組成 部分，房價企穩有助修復居民資產負債表，進而提振消費信心。大陸經濟正走出通縮陰影，這固然令人欣喜。\n\n但必須清醒認識到， 本輪物價回升更多得益於外部供給衝擊，內需驅動的物價上漲動力仍 顯不足。PPI轉正主要依靠國際油價上漲的「虛火」，CPI回升也高度 依賴能源價格反彈，核心CPI平穩但缺乏向上彈性。供給強、需求弱 的困境尚未根本扭轉，政策支援對價格穩定仍十分重要。\n\n回到目錄"}, {"title": "社論/從採購到投資：ART架構下的戰略轉型", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應鏈治理整合為整體戰略，成為當前最重要的政策課題。在過去，...", "full_text": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應鏈治理整合為整體戰略，成為當前最重要的政策課題。\n\n在過去，對美採購往往被視為貿易平衡或政治協商的延伸工具，具高度被動性。然而在 ART架構下，若政府仍停留在「以進口換取空間」的思維，將錯失將經貿壓力轉化為戰略資產的機會。關鍵在於：如何讓採購不只是支出，而是能夠累積影響力的投資行為。\n\nART為台灣產業提供了調整空間。根據現行安排，美方對台灣產品採取15%且不疊加的對等關稅，並對2,072項產品提供豁免。此外，在半導體及部分232調查項目上，台灣也獲得較優惠待遇。\n\n這些措施有助於降低出口成本壓力，但關稅優勢本身並不會自動轉化為競爭力。真正的關鍵在於企業能否將成本節省轉投入自動化、數位轉型與低碳製程。政策應由防禦轉為引導，使「低關稅」\n進一步轉化為「低碳與高效率」的競爭優勢，確保台灣在美國供應鏈重組中持續扮演不可替代的角色。\n\n2025年至2029年間，台灣對美採購的承諾高達848億美元。若這筆資金僅用於傳統能源與設備的進口，將難以產生長期的戰略效果。然而，若將其重新界定為「準主權投資」，則可能改變台灣在全球供應鏈中的位置。\n\n在此脈絡下，「採購股權化」的思維值得正視。其核心並非將採購預算金融操作，而是在長期採購與合作的過程中，爭取與供應安全相關的股權、治理參與或資訊權益。例如，在能源合作中，透過主權基金與國營事業協同布局，參與美國液化天然氣（LNG）接收站、出口設施或上游開發案，並爭取董事席次或觀察員地位，使台灣由單純買方轉為具影響力的長期參與者。\n\n此一轉變具有雙重意涵。一、穩定的利益連結：當台灣資本嵌入美國關鍵基礎設施，雙方將形成更穩定的利益連結，使安全關係從政治承諾延伸至經濟結構。二、提升議價能力：透過治理參與，台灣可更接近供應鏈資訊與價格形成機制，逐步提升議價能力，而非完全依賴外部市場定價。\n\n然而，這一路徑也伴隨風險。跨境基礎設施投資涉及政治審查、法規限制與市場波動，若缺乏專業管理，將可能導致資產效率不彰，甚至產生財務負擔。此外，過度集中於特定市場也可能提高地緣政治風險。\n\n因此，「股權化」\n必須建立在嚴謹的風險控管與多元配置原則之上，而非政策口號。在制度面上，建立具專業治理能力的主權基金，已成為必要條件。面對如此規模的採購與投資需求，若仍受限於年度預算與傳統財政架構，將難以維持策略一致性。\n\n主權基金可作為資本整合平台，將分散的採購決策轉化為長期資產配置。其治理設計應強調去政治化與專業化：由政府設定戰略方向與風險邊界，實際投資與營運則交由專業團隊負責，以降低政策受選舉周期干擾的風險，並建立國際合作夥伴的信任。最終，ART的成敗不在於協定條文本身，而在於後續的治理能力。\n\n台灣面對的不只是能源採購問題，而是如何透過經貿安排，為未來數十年的產業韌性與安全結構奠基。因此，每一項採購所延伸的資產配置、治理參與與資訊掌握程度，都應納入國家安全與經濟安全的整體評估。《台美對等貿易協定》確實為台灣打開新的國際經貿空間，但真正的挑戰才正要開始。\n\n五年 848億美元的採購承諾，究竟會成為一次性的支出，還是轉化為可累積的戰略資產，關鍵取決於政策思維能否完成從「採購」到「投資」的轉型。唯有將採購視為資本運作的一環，並以制度化方式強化治理能力，台灣才能在新的經貿格局中，由被動回應者轉為具有實質影響力的參與者，為長期發展建立更穩固的基礎。回到目錄"}, {"title": "社論》中國人認同為台灣帶來的災難", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民主政治的政黨之爭角度，將無法理解藍白之亂的根源，應由台灣人認...", "full_text": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民主政治的政黨之爭角度，將無法理解藍白之亂的根源，應由台灣人認同與中國人認同衝突，才能正確剖析這場災難的癥結。\n\n在台灣，中國人認同是一種「想像的民族主義」，而台灣人認同則是「現實的命運共同體」。在台灣四百多年發展史上，來台的外來族群大抵具有兩種心態︰一種是從唐山渡過黑水溝而來，在台灣「篳路藍縷，以啟山林」，開拓新世界的移民心態；一種是逃難避禍而來，將台灣當成回歸母國跳板的難民心態。\n\n另有自古以來即是島嶼主人的原住民。難民關注他們想像的祖國，移民則重視落地生根，打造新的家國。這樣的差異造成對台灣定位的不同，成為內部衝突的根源。\n\n事實上，台灣四百年史，多數由外來政權統治，從荷蘭殖民南台灣，到明末鄭成功及其短命的東寧王國，後來清帝國終結了明鄭政權，但在清日甲午戰爭後，又將這個清人眼中「島不語、花不香」\n的島嶼與澎湖群島永久割讓於日本。日本統治台灣五十年，後因二戰敗戰，在舊金山和約正式放棄台、澎主權，但未言明台澎主權未來歸屬。因此台灣由蔣介石政權「暫時接管」，卻因蔣氏於國共內戰全面潰敗，乃率數百萬軍民逃難至此，將台灣當成反攻復國的跳板。\n\n由歷史看來，台灣不僅「自古不屬於中國」，同樣也不屬於任何東西方的殖民帝國。雖然歷經多次外來政權統治，近年的民主化與本土化，已使避難而來的中華民國獲得新的內涵，以中華民國台灣之名，成為移民者的新家園。新加坡是多種族國家，人口以華裔為主，而且曾被馬來西亞聯邦逐出，卻發展出一個小而強大的多族群國家，與台灣處境非常類似，因此新加坡的發展經驗值得台灣借鏡。\n\n新加坡前總理李顯龍曾語重心長呼籲華族社會要「落地生根」，不是「落葉歸根」，才能應對地緣政治衝突。這句話同樣是台灣移民與難民心態衝突的解方。遺憾的是，台灣雖已發展出令世人讚譽民主政治與經濟成就，與中國的專制獨裁截然不同，卻在蔣政權的大中國教育遺毒下，至今仍有部分政客的認同是中國，而習近平的「中華民族偉大復興」則深深觸動這些中國人的心靈。\n\n更不幸的是，這些「中國人」在國民黨掌權，走的是毫不掩飾的急統路線。代表性人物則是由早年的「外省人台灣獨立促進會」到投靠主張統一的國民黨的鄭麗文，在中共的力助下當上國民黨主席，從此日思夜想盼來了「鄭習會」。鄭見習之後，搖身一變成為習近平的小粉絲，回台後言必盛讚習近平的「英明偉大」。\n\n為何軍購案是藍白與綠的認同戰爭？此因具有台灣人認同才需要強化國防，防止中國的武力犯台，但是對中國人認同的政客來說，既然「兩岸都是中國人」，「中國人不打中國人」，那又何必購買武器，強化國防，成為大國博弈的棋子？換言之，鄭麗文的反軍購乃是基於兩種心態︰兩岸是一家人，中國人不打中國人。\n\n鄭麗文訪中回來，已淪為中共的宣傳工具。她不斷稱許習近平統治下的中國，已達「完全脫貧」及建成「全面小康社會」。在中國人不打中國人方面，鄭麗文更表明堅持「九二共識、反對台獨」，並且聲稱「全世界都奉行一中政策」，將一切台海緊張的責任全部推給「台獨」，完全附和中共的敘事框架。\n\n而鄭麗文對中共的武力犯台陰謀擦脂抹粉，辯稱「習主席是個重感情的人，對我們好都來不及了，怎麼還會想打我們呢？」實際上，中國人不打中國人，雖是感性的呼喚，卻從來都不是事實。試問蔣介石的國民黨與毛澤東的共產黨不也是同為中國人，而且也都堅持「一個中國」，但國共內戰之慘烈更甚於「抗日戰爭」，數百萬中國人死於蔣、毛中國人手裡，由此可見中國人不打中國的前提，就是一邊向另一邊投降。\n\n可悲的是，即使投降仍會遭到秋後算帳。另外一個統派常引用的論述是，同一種語言、文字、文化的種族必須共組一個國家，已被國際政治的現實所戳破。國際社會上，同時存在許多使用英文的國家，為何說中文就是中國人，就是屬於中國？\n\n藍營過去雖然主張統一，但仍披著中華民國的外衣，堅持「九二共識」仍有「一中各表」的空間，但這個模糊的彈性卻被紅統派的鄭麗文打破了。在鄭麗文的領導下，國民黨的未來只剩一條路可走，就是接受沒有各表空間的一中原則，呼應習近平的中華民族偉大復興的訴求，假和平之名，自我解除武裝，如此一來國民黨與中國的花瓶政黨「中國國民黨革命委員會」有何差異？鄭麗文這種中國人認同帶領的國民黨，不但本身就是一場災難，也透過杯葛政府預算與弱化國防來製造台灣的災難。\n\n回到目錄"}, {"title": "社論/可教化與鞭刑之辯，反映人民憂懼社安破漏", "source": "聯合報 A02 焦點", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。面對層出不窮的各式性侵案，從社安網到司法，都與人民的期待，距離愈來愈遠...", "full_text": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。\n\n面對層出不窮的各式性侵案，從社安網到司法，都與人民的期待，距離愈來愈遠。長榮女大生命案凶手梁育誌，對被害人施以強擄、性侵、殺害、棄屍等手段，甚至案發前還曾意圖擄走同校另名女生。但司法最終仍以「可教化」、「非屬最嚴重」為由，讓他逃過死刑。\n\n馬來西亞留台校友會痛批，判決未能從受害者角度考量，「過於仁慈，難回應社會對公平正義之期待」；馬來西亞留台校友會對台灣司法的批評，其實道出許多台灣人民的心聲。因而，此案的定讞看似對一起重大性侵殺人案的蓋棺論定，實則又對破漏的社會安全防護網補上一刀。\n\n畢竟，即使不復過往「強姦殺人唯一死刑」的刑罰威嚇年代，但難道三度判死的一、二審、更一審法院法官盡皆法盲？若連如此殘忍的作案都不算最嚴重犯罪，那法律作為正義最後防線的意義何在？就在社會苦吞司法的「仁慈」判決時，台南永康又發生女高中生在放學途中差點遭陌生男子強行拖入草叢事件，幸有路人見義勇為才逃過一劫；\n\n這起案件，更因發生在校園周邊而引發高度關注及憂懼。雖然兩案並無因果關聯，卻同時為當前台灣社會肇生了不安氛圍：一方面，司法對重大性侵殺人犯的寬容讓人民質疑；另一方面，即使長榮女大生案發生已五年，社安網顯然仍有疏漏。\n\n兩相交織，當然讓「吾家有女初長成」\n的父母深感憂懼。更讓家長不安的是，家扶基金會發布的兒少數位安全調查顯示，網路已成「誘惑陷阱」，面對「免費限量裝備」\n誘餌，近三成兒少坦言會與陌生人私聊、近一成六會傳送私密照。另一方面，衛福部統計近五年兒少性剝削案件運用網路犯罪占比高達七成，通報人數五年成長達百分之一一一點八三。\n\n這種新型態兒少性剝削案，與實質性侵案僅一「網」之隔，卻更加隱匿難防。藝人黃子佼等涉嫌從「創意私房」\n論壇購買數千部兒少不雅影像案即是顯例，迄今仍不知有多少受害兒少只能獨自療傷。司法對實質性侵案過於「仁慈」，政府又難以杜絕潛藏的性侵案源頭，正是當前社安網的實景。\n\n這不僅是人民的感受問題，更嚴重斲傷人民對公權力與司法的信任。在這樣的氛圍下，難怪國民黨立委洪孟楷提案對性侵案、虐童案、高額詐欺案等實施鞭刑，並倡議推動公投，立即獲五十二名立委連署，反映出多數民眾的治安憂慮；相對的，民進黨立委則認為推動鞭刑恐有違反保障人身自由與人格尊嚴的疑慮，直言「人權不應該走回頭路」。\n\n從重大性侵殺人凶手該不該判死，到性侵犯該不該施以鞭刑，相關爭論其實均直指一個更深層的問題：當既有制度無法提供足夠安全保障，又無法回應人民對公平正義的期待時，面對暴增的各式性犯罪，人民就更容易傾向「治亂世用重典」。但刑罰固有嚇阻效果，仍得靠政府建構交織互補的各層社安網來治本。例如應多從被害人處境思考，加重權衡犯罪手段的殘酷；\n\n除了加強高危地區及網路巡查，更應即時建立一站全包的救助機制，減少對被害人及其家屬的二次傷害。而執政者除了夸夸其談言加害者人權，更該拿出具體行動來免除人民的憂懼。回到目錄"}, {"title": "奔馳大地 翱翔天空 航向宇宙 社評／今日大陸系列八〈交通篇〉", "source": "中國時報 AA01 要聞", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "交通是國力的象徵。大陸今日的交通建設，已不僅是基礎設施的擴展，更是國家綜合實力的展現。高速公路縱橫千里，高鐵飛馳萬里，電動車綠色轉型，港口航運繁榮，航空網絡四通八達，太空探索更是邁向星辰大海。中國的交通強盛，已居世界之冠，成為現代化進程與國家崛起的鮮明標誌。陸海空宇宙行遍天下首先，高速公路網絡的...", "full_text": "交通是國力的象徵。大陸今日的交通建設，已不僅是基礎設施的擴展，更是國家綜合實力的展現。高速公路縱橫千里，高鐵飛馳萬里，電動車綠色轉型，港口航運繁榮，航空網絡四通八達，太空探索更是邁向星辰大海。\n\n中國的交通強盛，已居世界之冠，成為現代化進程與國家崛起的鮮明標誌。陸海空宇宙行遍天下首先，高速公路網絡的鋪展，堪稱「縱橫千里，四通八達」。自改革開放以來，大陸持續推動「五縱七橫」的高速公路主骨架，如今已形成覆蓋全境的龐大網絡，總里程居世界第一。\n\n截至2025年底，中國已有超過20個省級行政區實現「縣縣通高速」，連貴州、廣西在複雜地形下都克服困難達標。這不僅大幅縮短了城市間的距離，也促進了貨物流通與區域經濟的整合。高速公路的建設，讓偏遠地區得以融入全國市場，帶動了城鄉均衡發展。\n\n高鐵的成就更是舉世驚嘆。中國高鐵以「速度」與「規模」著稱，營運里程突破 4萬公里，佔全球高鐵總里程的8成以上。京滬、京廣、滬昆等幹線，串聯起人口稠密的經濟走廊，形成「半日生活圈」與「一日經濟圈」。\n\n高鐵不僅是交通工具，更是國家科技實力的象徵，展現了自主研發、工程管理與大規模建設的綜合能力。它縮短了時空距離，提升了人員交流與商業效率，成為推動內需與區域一體化的重要引擎。電動車的崛起則標誌交通綠色轉型。\n\n大陸已成為全球最大電動車市場，新能源汽車銷量連續多年居世界首位。比亞迪、蔚來、小鵬等品牌，逐漸在國際市場嶄露頭角。政府透過補貼政策、充電設施建設與技術研發支持，推動了產業鏈的完整發展。\n\n電動車的普及，不僅減少碳排放，亦促進能源結構的優化，呼應全球永續發展的潮流。從高速公路到高鐵，再到電動車，大陸的路上交通展現了「速度、規模、綠色」三大特徵，成為今日交通成就的重要篇章。若說陸上交通是大陸現代化的筋骨，那麼海空交通則是其伸向世界的臂膀。\n\n首先，船運方面，大陸港口建設已達世界頂尖。上海港、寧波舟山港、深圳港等，貨櫃吞吐量連續多年居全球前列。這些港口不僅是國際航運的重要樞紐，更是「一帶一路」戰略的支點，連接歐亞非市場。\n\n大陸船運企業如中遠海運，已成為全球航運巨頭，掌握龐大的船隊與航線網絡。船運的繁榮，支撐了大陸成為世界工廠與世界市場的地位。撐起世界工廠和市場空運的成就同樣耀眼。\n\n北京首都、上海浦東、廣州白雲等國際機場，旅客吞吐量與貨運量均居世界前列。大陸航空公司如中國國航、南方航空、東方航空，航線遍布全球，形成龐大的航空網絡。近年來，隨著「雙循環」格局的推進，空運在促進國際交流、維持供應鏈穩定方面，發揮了不可或缺的作用。\n\n更值得注意的是，大陸自主研製的C919大型客機已投入商業運行，象徵著航空製造業的突破，提升了國家在全球航空產業的話語權。太空交通的進展則展現了大陸追逐星辰大海的雄心。神舟系列載人飛船、嫦娥探月工程、天問火星探測器，以及正在建設的「中國空間站」，皆彰顯了航太科技的飛躍。\n\n這些成就不僅是科學探索，更是交通概念的延伸：從地球到太空，從人類出行到星際航行。大陸的太空交通，既是科技自立自強的象徵，也是未來全球競爭格局中的重要籌碼。船運、空運與太空，構成了大陸交通的「三維立體網絡」，使其不僅能暢行國內，更能通達世界，甚至邁向宇宙。\n\n世界的樣貌正在改變，交通不僅是基礎設施，更是國家競爭力的核心。今日大陸交通展現的是「速度、規模、創新」。展望未來將持續邁向智慧化、綠色化與國際化：智慧交通系統提升效率，綠色能源推動永續，國際合作拓展格局。\n\n交通的進步，既是經濟發展的動力，也是文明交流的橋梁。大陸交通的故事，正是現代化中國的縮影，亦是其走向世界的重要篇章。（本系列增加交通篇，視角更完整）回到目錄"}, {"title": "社論／四重壓力下 賴總統破局關鍵", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼 被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向 對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構 性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決台澎金 馬安身立命的前途問題。抗中保台 執政內外交迫轉眼...", "full_text": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼 被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向 對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構 性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決台澎金 馬安身立命的前途問題。\n\n抗中保台 執政內外交迫轉眼間賴總統上任近2年，從就職演說大談兩國互不隸屬，到後來 的祖國論、17條、併購論，再到今年初稱呼「大陸」、認同和平發展 ，以及此次「鄭習會」後低調回應，總統兩岸論述的花樣不少，挑釁 言辭也較有收斂，但情勢卻愈來愈緊張。從這次訪非受阻可以看出， 賴總統的壓力正在從4個方向同時襲來。首先是對岸的反獨政治壓力。\n\n從「鄭習會」上談「中華民族共同家 園」和「兩岸的事是家務事」，到史瓦帝尼事件後喊出「世界上早已 不存在中華民國總統」，大陸的態度非常明確：對認同「兩岸一家人 」的藍營可以有模糊空間，但對民進黨完全沒有模糊空間。換言之， 對於北京而言，即便賴總統依憲政體制就職，只要民進黨維持台獨路 線，就根本不會以「民選合法政府」對待之。此次賴總統出訪碰壁，是兩岸硬實力對決的一個側面。\n\n川普再次上 任後，賴政府一直謀畫出訪中南美，實現過境美國本土的政治目標， 華府卻不願為台灣與北京正面碰撞，川普2.0更重視美中經貿議題， 賴總統上任後保持過境美國本土「零紀錄」的尷尬。此次連專機航路 都被北京「截斷」，這絕非民進黨口中「經濟脅迫」\n那麼簡單，而是 北京影響力實實在在的體現。其次是台灣多數民意要求兩岸和平的壓力。\n\n訪非受阻事件後，民進 黨制式打「抗中」悲情牌，並對藍營兩岸路線、「鄭習會」發動全面 質疑。但穿透輿論喧囂感受民心溫度，老百姓對上述論述基本無感厭 倦。近期多份民調顯示，樂見「鄭習會」的民意居多，5成民意認同 兩岸談判，特別是史瓦帝尼作為全球最貧窮、最專制國家，反而會引 起民眾「為何而訪、為何外交」的反思。\n\n不可否認，多數民意願意維持兩岸分治、珍惜台灣現有制度與生活 方式，因而認同保持有威懾力的國防。但民眾同樣高度關切，備戰過 頭就變成引戰，高額國防採購滋生貪腐。儘管民進黨在國防預算上看 似理直氣壯，但民意疑慮仍然未消，尤其是民進黨完全執政8年「產 業國家隊」已淪為綠友友樂園，綠營若一棍子把嚴審預算者視為「叛 國」，遲早遭到反噬。\n\n尊重民意 開放兩岸交流第三股壓力源於民進黨內部希望「去意識形態化」的選舉壓力。眾 所周知，有別於總統層級大選，地方基層選舉時民眾「認人不認黨」 ，淡化意識形態。正因為此，「鄭習會」後大陸拋出開放觀光、直航 、農漁產的惠台10條後，綠營在中南部地方並未出現強烈排斥的聲音 ，甚至樂觀其成。\n\n同樣，黑熊學院創始人沈伯洋擬參選台北市長，綠 營內部對其「敗票」疑慮仍然瀰漫。第四股壓力源於美、日。美、日看似挺台堅定，但細看各懷鬼胎。\n\n美方對我國防預算的施壓一波高於一波，但這背後究竟是保台決心， 還是軍火商利益驅動？賴政府說不清，美國也不想說清。但另一方面 ，美國亦敦促兩岸對話，對「鄭習會」未表反對，也對賴總統構成無 形壓力。\n\n此外，日本雖關切「台海有事」，但無法容忍台灣主動操作 ，《日經》爆料卓揆高調訪日引起東京不滿，便是賴總統面臨信任危 機的冰山一角。身為元首，賴清德總統出訪受阻，絕非顏面問題，事關國家尊嚴。不過，既然賴總統代表中華民國台澎金馬2300萬人民行使職權，要彰 顯自己是「民選合法政府領導人」，就必須要尊重多數民意、獲得充 分民意授權，才會贏得各方信任。\n\n否則會愈來愈陷入不利和被動，直 至權威掃地。面對四重壓力，賴總統的抉擇事關台澎金馬前途，破局關鍵還是在 於開放兩岸自然交流互動。不久前，賴總統在核電議題上尊重多數民 意，展現務實態度。\n\n神主牌可以高高舉起，也可以輕輕放下。賴總統 應自信從容開放兩岸民間交流，勿濫用公權力阻擋或設障，讓各方「 鬆一口氣」，既是為自己好，也是為台灣好。回到目錄"}];
            const DEPTS = {"社論與評論觀點": {"icon": "📝", "label": "EDITORIALS & OPINIONS", "keywords": ["社論", "時評", "社評", "專欄", "論壇", "觀點", "評論", "時論", "名家", "經濟教室"]}, "國際機構與智庫報告": {"icon": "📘", "label": "RESEARCH & INSTITUTIONS", "keywords": ["IMF", "OECD", "World Bank", "WTO", "智庫", "Brookings", "PIIE", "國際貨幣基金", "世界銀行", "經濟合作暨發展組織", "BIS", "ADB", "WEF", "UN", "聯合國"]}, "台灣政府與政策訊息": {"icon": "🏛️", "label": "GOVERNMENT & POLICY", "keywords": ["總統府", "行政院", "國發會", "經濟部", "財政部", "政策", "計畫", "預算", "法案", "行政院會", "施政報告"]}, "台灣總體經濟與人口數據": {"icon": "📊", "label": "MACRO & DATA", "keywords": ["主計", "GDP", "CPI", "物價", "通膨", "失業率", "景氣", "出口", "外銷訂單", "進口", "進出口", "貿易統計", "薪資", "出生率", "死亡率", "人口統計", "少子化", "高齡化"]}, "台灣產業與投資動向": {"icon": "🏭", "label": "INDUSTRY & INVESTMENT", "keywords": ["AI", "半導體", "台積電", "聯發科", "資本支出", "投資", "供應鏈", "算力", "伺服器", "離岸風電"]}, "國際經濟與金融情勢": {"icon": "🌐", "label": "GLOBAL STABILITY", "keywords": ["Fed", "FOMC", "聯準會", "利率", "升息", "降息", "美元", "匯率", "地緣", "美中", "貿易戰"]}, "其他重要國內外事件": {"icon": "🗞️", "label": "KEY EVENTS", "keywords": []}};

            function init() {
                // 修正點 1: JS 處理民國日期
                const yr = new Date().getFullYear();
                document.getElementById('roc-year-label').textContent = '民國 ' + (yr - 1911) + ' 年';
                
                const nav = document.getElementById('nav-bar');
                Object.keys(DEPTS).forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'nav-item';
                    div.textContent = cat.replace('台灣', '').replace('與政策訊息', '').toUpperCase();
                    div.onclick = function() { filterFeed(cat, this); }; // 修正點 6
                    nav.appendChild(div);
                });

                renderHero();

            function renderHero() {
                const area = document.getElementById('hero-area');
                const featured = DATA.filter(i => i.priority === 1)[0] || DATA[0];
                if (!featured) return;

                area.innerHTML = `
                    <div class="featured-card">

                        <p>${featured.summary}</p>
                        <button class="imf-btn" onclick="showFull(${DATA.indexOf(featured)})">VIEW FULL ANALYSIS</button>
                    </div>
                    <div style="background:var(--imf-navy); color:#fff; padding:40px; display:flex; flex-direction:column; justify-content:center;">
                        <span class="cat-tag" style="color:#ffca28">ECONOMIC SNAPSHOT</span>

                `;

            function renderFeed(cat) {

                const filtered = cat === 'all' ? DATA : DATA.filter(i => i.cat === cat);
                
                filtered.forEach((item, idx) => {

                    if(idx < 8) {

            }

            function filterFeed(cat, el) {
                document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
                if (el) el.classList.add('active'); // 修正點 6
                document.getElementById('current-view-title').textContent = cat;
                renderFeed(cat);
                window.scrollTo(0, 450);
            }

            function goHome(el) {
                document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
                el.classList.add('active');
                document.getElementById('current-view-title').textContent = 'LATEST ANALYSIS';
                renderFeed('all');
                window.scrollTo(0, 0);
            }

            function showFull(idx) {
                const item = DATA[idx];
                const modal = document.getElementById('modal-content');
                modal.innerHTML = `
                    <span class="cat-tag" style="font-size:14px;">${item.label}</span>
                    <h1 class="report-headline">${item.title}</h1>
                    <div style="font-weight:700; color:#6c757d; margin-bottom:40px; letter-spacing:1px;">SOURCE: ${item.source}</div>
                    <div class="report-content">${item.full_text || '尚未擷取到全文內容'}</div>
                `;
                document.getElementById('modal').style.display = 'block';
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                document.getElementById('modal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }

            init();
        </script>
    </body>
    </html>
