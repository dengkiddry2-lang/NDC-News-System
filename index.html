借鏡。\n\n新加坡前總理李顯龍曾語重心長呼籲華族社會要「落地生根」，不是「落葉歸根」，才能應對地緣政治衝突。這句話同樣是台灣移民與難民心態衝突的解方。遺憾的是，台灣雖已發展出令世人讚譽民主政治與經濟成就，與中國的專制獨裁截然不同，卻在蔣政權的大中國教育遺毒下，至今仍有部分政客的認同是中國，而習近平的「中華民族偉大復興」則深深觸動這些中國人的心靈。\n\n更不幸的是，這些「中國人」在國民黨掌權，走的是毫不掩飾的急統路線。代表性人物則是由早年的「外省人台灣獨立促進會」到投靠主張統一的國民黨的鄭麗文，在中共的力助下當上國民黨主席，從此日思夜想盼來了「鄭習會」。鄭見習之後，搖身一變成為習近平的小粉絲，回台後言必盛讚習近平的「英明偉大」。\n\n為何軍購案是藍白與綠的認同戰爭？此因具有台灣人認同才需要強化國防，防止中國的武力犯台，但是對中國人認同的政客來說，既然「兩岸都是中國人」，「中國人不打中國人」，那又何必購買武器，強化國防，成為大國博弈的棋子？換言之，鄭麗文的反軍購乃是基於兩種心態︰兩岸是一家人，中國人不打中國人。\n\n鄭麗文訪中回來，已淪為中共的宣傳工具。她不斷稱許習近平統治下的中國，已達「完全脫貧」及建成「全面小康社會」。在中國人不打中國人方面，鄭麗文更表明堅持「九二共識、反對台獨」，並且聲稱「全世界都奉行一中政策」，將一切台海緊張的責任全部推給「台獨」，完全附和中共的敘事框架。\n\n而鄭麗文對中共的武力犯台陰謀擦脂抹粉，辯稱「習主席是個重感情的人，對我們好都來不及了，怎麼還會想打我們呢？」實際上，中國人不打中國人，雖是感性的呼喚，卻從來都不是事實。試問蔣介石的國民黨與毛澤東的共產黨不也是同為中國人，而且也都堅持「一個中國」，但國共內戰之慘烈更甚於「抗日戰爭」，數百萬中國人死於蔣、毛中國人手裡，由此可見中國人不打中國的前提，就是一邊向另一邊投降。\n\n可悲的是，即使投降仍會遭到秋後算帳。另外一個統派常引用的論述是，同一種語言、文字、文化的種族必須共組一個國家，已被國際政治的現實所戳破。國際社會上，同時存在許多使用英文的國家，為何說中文就是中國人，就是屬於中國？\n\n藍營過去雖然主張統一，但仍披著中華民國的外衣，堅持「九二共識」仍有「一中各表」的空間，但這個模糊的彈性卻被紅統派的鄭麗文打破了。在鄭麗文的領導下，國民黨的未來只剩一條路可走，就是接受沒有各表空間的一中原則，呼應習近平的中華民族偉大復興的訴求，假和平之名，自我解除武裝，如此一來國民黨與中國的花瓶政黨「中國國民黨革命委員會」有何差異？鄭麗文這種中國人認同帶領的國民黨，不但本身就是一場災難，也透過杯葛政府預算與弱化國防來製造台灣的災難。"}, {"title": "社論/可教化與鞭刑之辯，反映人民憂懼社安破漏", "source": "聯合報 A02 焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。", "full_text": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。\n\n面對層出不窮的各式性侵案，從社安網到司法，都與人民的期待，距離愈來愈遠。長榮女大生命案凶手梁育誌，對被害人施以強擄、性侵、殺害、棄屍等手段，甚至案發前還曾意圖擄走同校另名女生。但司法最終仍以「可教化」、「非屬最嚴重」為由，讓他逃過死刑。\n\n馬來西亞留台校友會痛批，判決未能從受害者角度考量，「過於仁慈，難回應社會對公平正義之期待」；馬來西亞留台校友會對台灣司法的批評，其實道出許多台灣人民的心聲。因而，此案的定讞看似對一起重大性侵殺人案的蓋棺論定，實則又對破漏的社會安全防護網補上一刀。\n\n畢竟，即使不復過往「強姦殺人唯一死刑」的刑罰威嚇年代，但難道三度判死的一、二審、更一審法院法官盡皆法盲？若連如此殘忍的作案都不算最嚴重犯罪，那法律作為正義最後防線的意義何在？就在社會苦吞司法的「仁慈」判決時，台南永康又發生女高中生在放學途中差點遭陌生男子強行拖入草叢事件，幸有路人見義勇為才逃過一劫；\n\n這起案件，更因發生在校園周邊而引發高度關注及憂懼。雖然兩案並無因果關聯，卻同時為當前台灣社會肇生了不安氛圍：一方面，司法對重大性侵殺人犯的寬容讓人民質疑；另一方面，即使長榮女大生案發生已五年，社安網顯然仍有疏漏。\n\n兩相交織，當然讓「吾家有女初長成」 的父母深感憂懼。更讓家長不安的是，家扶基金會發布的兒少數位安全調查顯示，網路已成「誘惑陷阱」，面對「免費限量裝備」 誘餌，近三成兒少坦言會與陌生人私聊、近一成六會傳送私密照。另一方面，衛福部統計近五年兒少性剝削案件運用網路犯罪占比高達七成，通報人數五年成長達百分之一一一點八三。\n\n這種新型態兒少性剝削案，與實質性侵案僅一「網」之隔，卻更加隱匿難防。藝人黃子佼等涉嫌從「創意私房」 論壇購買數千部兒少不雅影像案即是顯例，迄今仍不知有多少受害兒少只能獨自療傷。司法對實質性侵案過於「仁慈」，政府又難以杜絕潛藏的性侵案源頭，正是當前社安網的實景。\n\n這不僅是人民的感受問題，更嚴重斲傷人民對公權力與司法的信任。在這樣的氛圍下，難怪國民黨立委洪孟楷提案對性侵案、虐童案、高額詐欺案等實施鞭刑，並倡議推動公投，立即獲五十二名立委連署，反映出多數民眾的治安憂慮；相對的，民進黨立委則認為推動鞭刑恐有違反保障人身自由與人格尊嚴的疑慮，直言「人權不應該走回頭路」。\n\n從重大性侵殺人凶手該不該判死，到性侵犯該不該施以鞭刑，相關爭論其實均直指一個更深層的問題：當既有制度無法提供足夠安全保障，又無法回應人民對公平正義的期待時，面對暴增的各式性犯罪，人民就更容易傾向「治亂世用重典」。但刑罰固有嚇阻效果，仍得靠政府建構交織互補的各層社安網來治本。例如應多從被害人處境思考，加重權衡犯罪手段的殘酷；\n\n除了加強高危地區及網路巡查，更應即時建立一站全包的救助機制，減少對被害人及其家屬的二次傷害。而執政者除了夸夸其談言加害者人權，更該拿出具體行動來免除人民的憂懼。"}, {"title": "奔馳大地 翱翔天空 航向宇宙 社評／今日大陸系列八〈交通篇〉", "source": "中國時報 AA01 要聞", "cat": "社論與評論觀點", "priority": 0, "summary": "交通是國力的象徵。大陸今日的交通建設，已不僅是基礎設施的擴展，更是國家綜合實力的展現。高速公路縱橫千里，高鐵飛馳萬里，電動車綠色轉型，港口航運繁榮，航空網絡四通八達，太空探索更是邁向星辰大海。", "full_text": "交通是國力的象徵。大陸今日的交通建設，已不僅是基礎設施的擴展，更是國家綜合實力的展現。高速公路縱橫千里，高鐵飛馳萬里，電動車綠色轉型，港口航運繁榮，航空網絡四通八達，太空探索更是邁向星辰大海。\n\n中國的交通強盛，已居世界之冠，成為現代化進程與國家崛起的鮮明標誌。陸海空宇宙行遍天下首先，高速公路網絡的鋪展，堪稱「縱橫千里，四通八達」。自改革開放以來，大陸持續推動「五縱七橫」的高速公路主骨架，如今已形成覆蓋全境的龐大網絡，總里程居世界第一。\n\n截至2025年底，中國已有超過20個省級行政區實現「縣縣通高速」，連貴州、廣西在複雜地形下都克服困難達標。這不僅大幅縮短了城市間的距離，也促進了貨物流通與區域經濟的整合。高速公路的建設，讓偏遠地區得以融入全國市場，帶動了城鄉均衡發展。\n\n高鐵的成就更是舉世驚嘆。中國高鐵以「速度」與「規模」著稱，營運里程突破 4萬公里，佔全球高鐵總里程的8成以上。京滬、京廣、滬昆等幹線，串聯起人口稠密的經濟走廊，形成「半日生活圈」與「一日經濟圈」。\n\n高鐵不僅是交通工具，更是國家科技實力的象徵，展現了自主研發、工程管理與大規模建設的綜合能力。它縮短了時空距離，提升了人員交流與商業效率，成為推動內需與區域一體化的重要引擎。電動車的崛起則標誌交通綠色轉型。\n\n大陸已成為全球最大電動車市場，新能源汽車銷量連續多年居世界首位。比亞迪、蔚來、小鵬等品牌，逐漸在國際市場嶄露頭角。政府透過補貼政策、充電設施建設與技術研發支持，推動了產業鏈的完整發展。\n\n電動車的普及，不僅減少碳排放，亦促進能源結構的優化，呼應全球永續發展的潮流。從高速公路到高鐵，再到電動車，大陸的路上交通展現了「速度、規模、綠色」三大特徵，成為今日交通成就的重要篇章。若說陸上交通是大陸現代化的筋骨，那麼海空交通則是其伸向世界的臂膀。\n\n首先，船運方面，大陸港口建設已達世界頂尖。上海港、寧波舟山港、深圳港等，貨櫃吞吐量連續多年居全球前列。這些港口不僅是國際航運的重要樞紐，更是「一帶一路」戰略的支點，連接歐亞非市場。\n\n大陸船運企業如中遠海運，已成為全球航運巨頭，掌握龐大的船隊與航線網絡。船運的繁榮，支撐了大陸成為世界工廠與世界市場的地位。撐起世界工廠和市場空運的成就同樣耀眼。\n\n北京首都、上海浦東、廣州白雲等國際機場，旅客吞吐量與貨運量均居世界前列。大陸航空公司如中國國航、南方航空、東方航空，航線遍布全球，形成龐大的航空網絡。近年來，隨著「雙循環」格局的推進，空運在促進國際交流、維持供應鏈穩定方面，發揮了不可或缺的作用。\n\n更值得注意的是，大陸自主研製的C919大型客機已投入商業運行，象徵著航空製造業的突破，提升了國家在全球航空產業的話語權。太空交通的進展則展現了大陸追逐星辰大海的雄心。神舟系列載人飛船、嫦娥探月工程、天問火星探測器，以及正在建設的「中國空間站」，皆彰顯了航太科技的飛躍。\n\n這些成就不僅是科學探索，更是交通概念的延伸：從地球到太空，從人類出行到星際航行。大陸的太空交通，既是科技自立自強的象徵，也是未來全球競爭格局中的重要籌碼。船運、空運與太空，構成了大陸交通的「三維立體網絡」，使其不僅能暢行國內，更能通達世界，甚至邁向宇宙。\n\n世界的樣貌正在改變，交通不僅是基礎設施，更是國家競爭力的核心。今日大陸交通展現的是「速度、規模、創新」。展望未來將持續邁向智慧化、綠色化與國際化：智慧交通系統提升效率，綠色能源推動永續，國際合作拓展格局。\n\n交通的進步，既是經濟發展的動力，也是文明交流的橋梁。大陸交通的故事，正是現代化中國的縮影，亦是其走向世界的重要篇章。（本系列增加交通篇，視角更完整）"}, {"title": "社論／四重壓力下 賴總統破局關鍵", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決台澎金馬安身立命的前途問題。", "full_text": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決台澎金馬安身立命的前途問題。\n\n抗中保台執政內外交迫轉眼間賴總統上任近2年，從就職演說大談兩國互不隸屬，到後來的祖國論、17條、併購論，再到今年初稱呼「大陸」、認同和平發展，以及此次「鄭習會」後低調回應，總統兩岸論述的花樣不少，挑釁言辭也較有收斂，但情勢卻愈來愈緊張。從這次訪非受阻可以看出，賴總統的壓力正在從4個方向同時襲來。首先是對岸的反獨政治壓力。\n\n從「鄭習會」上談「中華民族共同家園」和「兩岸的事是家務事」，到史瓦帝尼事件後喊出「世界上早已不存在中華民國總統」，大陸的態度非常明確：對認同「兩岸一家人」的藍營可以有模糊空間，但對民進黨完全沒有模糊空間。換言之，對於北京而言，即便賴總統依憲政體制就職，只要民進黨維持台獨路線，就根本不會以「民選合法政府」對待之。此次賴總統出訪碰壁，是兩岸硬實力對決的一個側面。\n\n川普再次上任後，賴政府一直謀畫出訪中南美，實現過境美國本土的政治目標，華府卻不願為台灣與北京正面碰撞，川普2.0更重視美中經貿議題，賴總統上任後保持過境美國本土「零紀錄」的尷尬。此次連專機航路都被北京「截斷」，這絕非民進黨口中「經濟脅迫」 那麼簡單，而是北京影響力實實在在的體現。其次是台灣多數民意要求兩岸和平的壓力。\n\n訪非受阻事件後，民進黨制式打「抗中」悲情牌，並對藍營兩岸路線、「鄭習會」發動全面質疑。但穿透輿論喧囂感受民心溫度，老百姓對上述論述基本無感厭倦。近期多份民調顯示，樂見「鄭習會」的民意居多，5成民意認同兩岸談判，特別是史瓦帝尼作為全球最貧窮、最專制國家，反而會引起民眾「為何而訪、為何外交」的反思。\n\n不可否認，多數民意願意維持兩岸分治、珍惜台灣現有制度與生活方式，因而認同保持有威懾力的國防。但民眾同樣高度關切，備戰過頭就變成引戰，高額國防採購滋生貪腐。儘管民進黨在國防預算上看似理直氣壯，但民意疑慮仍然未消，尤其是民進黨完全執政8年「產業國家隊」已淪為綠友友樂園，綠營若一棍子把嚴審預算者視為「叛國」，遲早遭到反噬。\n\n尊重民意開放兩岸交流第三股壓力源於民進黨內部希望「去意識形態化」的選舉壓力。眾所周知，有別於總統層級大選，地方基層選舉時民眾「認人不認黨」，淡化意識形態。正因為此，「鄭習會」後大陸拋出開放觀光、直航、農漁產的惠台10條後，綠營在中南部地方並未出現強烈排斥的聲音，甚至樂觀其成。\n\n同樣，黑熊學院創始人沈伯洋擬參選台北市長，綠營內部對其「敗票」疑慮仍然瀰漫。第四股壓力源於美、日。美、日看似挺台堅定，但細看各懷鬼胎。\n\n美方對我國防預算的施壓一波高於一波，但這背後究竟是保台決心，還是軍火商利益驅動？賴政府說不清，美國也不想說清。但另一方面，美國亦敦促兩岸對話，對「鄭習會」未表反對，也對賴總統構成無形壓力。\n\n此外，日本雖關切「台海有事」，但無法容忍台灣主動操作，《日經》爆料卓揆高調訪日引起東京不滿，便是賴總統面臨信任危機的冰山一角。身為元首，賴清德總統出訪受阻，絕非顏面問題，事關國家尊嚴。不過，既然賴總統代表中華民國台澎金馬2300萬人民行使職權，要彰顯自己是「民選合法政府領導人」，就必須要尊重多數民意、獲得充分民意授權，才會贏得各方信任。\n\n否則會愈來愈陷入不利和被動，直至權威掃地。面對四重壓力，賴總統的抉擇事關台澎金馬前途，破局關鍵還是在於開放兩岸自然交流互動。不久前，賴總統在核電議題上尊重多數民意，展現務實態度。\n\n神主牌可以高高舉起，也可以輕輕放下。賴總統應自信從容開放兩岸民間交流，勿濫用公權力阻擋或設障，讓各方「 鬆一口氣」，既是為自己好，也是為台灣好。"}];
const DEPTS = {"社論與評論觀點": {"icon": "📝", "short": "社論"}, "國際機構與智庫報告": {"icon": "📘", "short": "智庫"}, "地緣政治與國際衝突": {"icon": "🌏", "short": "地緣"}, "國際金融與貨幣政策": {"icon": "🌐", "short": "金融"}, "台灣總體經濟與數據": {"icon": "📊", "short": "總經"}, "台灣產業與投資動向": {"icon": "🏭", "short": "產業"}, "台灣政府與政策訊息": {"icon": "🏛️", "short": "政策"}};
const CAT_ORDER = ["社論與評論觀點", "國際機構與智庫報告", "地緣政治與國際衝突", "國際金融與貨幣政策", "台灣總體經濟與數據", "台灣產業與投資動向", "台灣政府與政策訊息"];
const HIGHLIGHTS = [{"label": "今日必看", "value": "12 則", "cat": ""}, {"label": "社論", "value": "13 則・1 必看", "cat": "社論與評論觀點"}, {"label": "地緣", "value": "14 則・5 必看", "cat": "地緣政治與國際衝突"}, {"label": "金融", "value": "6 則・4 必看", "cat": "國際金融與貨幣政策"}, {"label": "總經", "value": "2 則・2 必看", "cat": "台灣總體經濟與數據"}, {"label": "產業", "value": "10 則", "cat": "台灣產業與投資動向"}, {"label": "政策", "value": "14 則", "cat": "台灣政府與政策訊息"}];

// ESC helper
function esc(s){
  let r = String(s||'');
  r = r.split('&').join('&amp;');
  r = r.split('<').join('&lt;');
  r = r.split('>').join('&gt;');
  r = r.split('"').join('&quot;');
  return r;
}

// ── GLOBAL NAV TABS ──
function buildGnavTabs(){
  const bar = document.getElementById('gnav-tabs');
  bar.innerHTML = '';
  const tabs = [{'label':'概覽','cat':'all'}].concat(
    CAT_ORDER.map(c=>({'label': DEPTS[c]?DEPTS[c].short:c, 'cat': c}))
  );
  tabs.forEach(t=>{
    const btn = document.createElement('button');
    btn.className = 'gnav-tab';
    btn.textContent = t.label;
    btn.dataset.cat = t.cat;
    btn.onclick = ()=>{
      if(t.cat==='all') goHome();
      else openCatView(t.cat);
    };
    bar.appendChild(btn);
  });
  setActiveTab('all');
}

function setActiveTab(cat){
  document.querySelectorAll('.gnav-tab').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat===cat);
  });
}

// ── HIGHLIGHTS STRIP ──
function buildHighlights(){
  const scroll = document.getElementById('highlights-scroll');
  scroll.innerHTML = '';
  HIGHLIGHTS.forEach(h=>{
    const card = document.createElement('div');
    card.className = 'highlight-card' + (h.cat===''?' highlight-must':'');
    card.innerHTML = '<div class="hl-label">'+esc(h.label)+'</div><div class="hl-value">'+esc(h.value)+'</div>';
    card.onclick = ()=>{
      if(h.cat==='') openCatView('must');
      else openCatView(h.cat);
    };
    scroll.appendChild(card);
  });
}

// ── CATEGORY BRICKS (home) ──
function renderBricks(){
  const grid = document.getElementById('brick-grid');
  grid.innerHTML = '';
  // 每個分類一塊 brick，交替深/淺
  const activeCats = CAT_ORDER.filter(c=>DATA.some(i=>i.cat===c));
  activeCats.forEach((cat, idx)=>{
    const items = DATA.filter(i=>i.cat===cat);
    const mustCnt = items.filter(i=>i.priority===1).length;
    const topItem = items.find(i=>i.priority===1) || items[0];
    const dept = DEPTS[cat] || {};
    const isLight = idx%2===1;
    const isFull = idx===0;

    const brick = document.createElement('div');
    brick.className = 'brick' + (isFull?' brick-full':'') + (isLight?' brick-light':' brick-dark');

    let inner = '';
    if(mustCnt>0) inner += '<div class="brick-must-bar"></div>';
    inner += '<div class="brick-eyebrow">'+(dept.icon||'')+' '+esc(cat)+'</div>';
    inner += '<div class="brick-title">'+esc(topItem.title)+'</div>';
    const summaryText = 'Today '+items.length+' 則' + (mustCnt?'，其中 '+mustCnt+' 則必看。':'');
    inner += '<div class="brick-summary">'+summaryText+'</div>';
    inner += '<div class="brick-cta-row"><span class="brick-cta">進一步了解 ›</span><span class="brick-cta2">查看全部 ›</span></div>';
    brick.innerHTML = inner;
    brick.querySelector('.brick-cta').onclick=(e)=>{ e.stopPropagation(); openArticle(DATA.indexOf(topItem)); };
    brick.querySelector('.brick-cta2').onclick=(e)=>{ e.stopPropagation(); openCatView(cat); };
    brick.onclick=()=>openCatView(cat);
    grid.appendChild(brick);
  });
}

// ── CATEGORY VIEW ──
function openCatView(cat){
  const isMust = cat==='must';
  const items = isMust ? DATA.filter(i=>i.priority===1) : DATA.filter(i=>i.cat===cat);
  const title = isMust ? '必看情報' : cat;
  document.getElementById('cat-view-title').textContent = title;
  const list = document.getElementById('cat-news-list');
  list.innerHTML = '';
  items.forEach(item=>{
    const dataIdx = DATA.indexOf(item);
    const row = document.createElement('div');
    row.className = 'news-row' + (item.priority===1?' news-row-must':'');
    row.innerHTML =
      '<div class="news-row-inner">' +
        (item.priority===1?'<div class="row-must-bar"></div>':'') +
        '<div class="row-cat">'+(DEPTS[item.cat]?DEPTS[item.cat].icon:'')+' '+esc(item.cat)+'</div>'+
        '<h3 class="row-title">'+esc(item.title)+'</h3>'+
        '<p class="row-summary">'+esc(item.summary)+'</p>'+
        '<div class="row-footer">'+
          '<span class="row-source">'+esc(item.source)+'</span>'+
          '<span class="row-cta">閱讀全文 ›</span>'+
        '</div>'+
      '</div>';
    row.onclick=()=>openArticle(dataIdx);
    list.appendChild(row);
  });
  showView('cat-view');
  setActiveTab(isMust?'all':cat);
}
function closeCatView(){ goHome(); }

// ── ARTICLE VIEW ──
function openArticle(idx){
  const item = DATA[idx];
  const cat = DEPTS[item.cat]?(DEPTS[item.cat].icon+' '+item.cat):item.cat;
  document.getElementById('art-cat').textContent = cat;
  document.getElementById('art-nav-cat').textContent = cat;
  document.getElementById('art-title').textContent = item.title;
  document.getElementById('art-source').textContent = '來源：' + item.source;
  document.getElementById('art-summary').textContent = item.summary;
  document.getElementById('art-summary-block').style.display = item.summary ? 'block' : 'none';
  const rawText = item.full_text || '尚未擷取到內文內容';
  const paras = rawText.split('\n\n').map(p=>'<p>'+esc(p.trim())+'</p>').join('');
  document.getElementById('art-body').innerHTML = paras;

  // back button context
  const fromCat = currentView === 'cat-view';
  document.getElementById('art-back-btn').onclick = fromCat
    ? ()=>{ showView('cat-view'); }
    : ()=>closeArticle();

  showView('article-view');
  history.pushState({view:'article', idx}, '');
}
function closeArticle(){
  if(currentView==='article-view'){
    const prev = history.state;
    if(prev && prev.view==='cat-view') showView('cat-view');
    else goHome();
  }
}

// ── VIEW MANAGER ──
let currentView = 'home-view';
function showView(id){
  ['home-view','cat-view','article-view'].forEach(v=>{
    document.getElementById(v).style.display = v===id ? 'block' : 'none';
  });
  currentView = id;
  window.scrollTo(0,0);
  document.body.style.overflow = '';
}
function goHome(){
  showView('home-view');
  setActiveTab('all');
}

window.addEventListener('popstate', e=>{
  if(currentView==='article-view') closeArticle();
  else if(currentView==='cat-view') goHome();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){
  if(currentView==='article-view') closeArticle();
  else if(currentView==='cat-view') goHome();
} });

// ── INIT ──
buildGnavTabs();
buildHighlights();
renderBricks();
showView('home-view');
</script>
</body>
</html>
