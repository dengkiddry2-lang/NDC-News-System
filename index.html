    <script>
        const DATA = [{"title": "美超級財報周 點火AI台鏈 四大CSP及蘋果季報將揭曉，投資人關注資本支出是否轉化為獲利成長", "cat": "台灣產業與投資動向", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨", "cat": "台灣產業與投資動向", "priority": 0, "summary": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式 發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新 里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後 段設計服務；\n\n供應鏈透露，...", "full_text": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式 發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新 里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後 段設計服務；\n\n供應鏈透露，聯發科增購FT（Final Test）與SLT（系 統級測試）機台，並持續拉高CoWoS需求，京元電子、精測、鴻勁等 供應鏈將同步受惠。Google新一代TPU 8架構分為TPU 8t（訓練）與TPU 8i（推論）， 聯發科切入訓練端核心設計，並採用台積電 N3P 製程與 CoWoS-S 先進封 裝技術共同打造 AI ASIC，顯示其技術能力已可支援高階 AI 模型訓練 需求。Marvell（邁威爾科技）近期傳出將加入ASIC競局，供應鏈指出， 目前尚未在TPU供應鏈中觀察到明確布局。\n\n隨設計難度提升，未來可 能出現Consign die（委託提供晶粒）商業模式，市場競爭將由單純 搶單轉向分工合作；Marvell亦可能切入LPU、NIC等其他AI加速領域 ，而非直接參與TPU專案。聯發科憑藉SerDes（序列化／反序列化器）、高速介面與系統整合 能力，在先進製程節點成功切入訓練晶片設計，市場地位快速提升。\n\n執行長蔡力行預期，今年ASIC業務將創造超過10億美元營收。法人分 析，Google TPU投片量持續上修，2027年有望達千萬顆規模，無論由 聯發科或博通分食，均可帶動顯著營收貢獻。供應鏈指出，AI訓練晶片因採用先進製程與高複雜度封裝，測試強 度大幅提升，京元電、精測深耕高效能運算（HPC）與AI晶片測試， 將直接受惠TPU放量；\n\n鴻勁則提供測試設備，隨晶片單價提升，測試 環節重要性提高，SLT有望成為標準流程。聯發科逐步建立「雲＋邊」雙軌布局，競爭優勢浮現。ASIC 業者分 析，未來 AI 晶片將朝 chiplet（小晶片）與異質整合發展，對CoWoS與 SoIC等先進封裝依賴度持續提高，帶動台積電產能利用率維持高檔， 並擴大封裝設備與材料需求。\n\n聯發科切入訓練晶片，不僅提升產品價 值，也推升台灣半導體供應鏈整體技術層級。"}, {"title": "台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～6GW設置容量", "cat": "其他", "priority": 0, "summary": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟 經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將 併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除 ，決開放作為開發風場海域，預估3-4期至少遠超...", "full_text": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟 經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將 併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除 ，決開放作為開發風場海域，預估3-4期至少遠超過4GW設置容量可以 釋出選商，今年底或明（2027）年初展開選商相關作業。另3-3期選商機制也傳出好消息，經濟部27日將發出開會通知，本 周再召開實體及線上溝通會議，針對ESG定義、獎勵機制電業執照的 作法，行政契約意見等三方面，釋出善意作出更彈性處置及溝通說明 ，預計半年備標期時程不變，今年底前會完成3-3期選商，經部預估 至少逾五家開發商有興趣。\n\n3-1期、3-2期獲選業者，不少外商未履約且解約撤出台灣市場，合 計未執行包括科里歐海鼎二、法商EDF及台亞蔚藍海、力麗集團海峽 二，3-2期未簽約的科理歐海鼎一、德能英華威集團德帥風場，以及 二階被解約的海峽一風場，合計至少2.2GW風場空間未開發可釋出併 入3-4期招商。知情人士透露，倘若業者布置密度更高，風機更大型 化，可設置容量不排除上看3G。另交通部3月27日公告，刪除台中兩岸直航I點及其航道，供作離岸 風場開發海域。\n\n據悉，航港局2024年曾委託海大調查，經由兩岸直航 台中段（I航道）進出使用率僅約4％，行政院召開多次跨部會協調， 決取消I點及其航道。據業者估計，可釋出空間約4至6GW。官員也說 ，此海域水深不深，不少業者趨之若鶩，已有人展開環評規劃。\n\n此外，能源署決對3-3期選商釋出更大彈性及善意，近日內再度召 開實體及線上會議，針對公協會提出意見正式回覆，幫業者釐清國外 總部質疑，以利備標。其中公協會最在意獎勵機制，20+N（N最長5年）是否抵觸電業法。原本《電業法》賦予電業執照最長可展延10年至30年的營運空間，業 者擔心3-3期計算基礎若改為20+N+10，恐橫生枝節，影響金融機構融 資到位意願。"}, {"title": "白宮記協晚宴 驚傳槍響", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收到伊朗新提案", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫...", "full_text": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫與女婿庫許納原定25日前往巴基斯坦首都伊斯蘭馬巴德，與伊朗代表團會談，但在伊朗外長阿拉奇25日離開巴基斯坦後，川普同日在社群媒體發文表示，「我才剛取消我的代表團到伊斯蘭馬巴德與伊朗人會面的行程，浪費太多時間在旅途，工作也太多，他們的『領導階層』內部激烈內鬥，沒有人知道誰在主導，連他們自己都不清楚」。\n\n他之後接受媒體採訪時說，「沒理由在那邊（伊斯蘭馬巴德）等兩天，讓人花16、17個小時在旅程上，我們不打算那樣做。如果他們（伊朗）想談，可以打通電話來」，但這未必代表美國會重啟戰爭。他也說，在他取消行程的不到10分鐘後，美國就收到一份新文件，內容比原先好很多。\n\n伊朗國營電視台則指出，阿拉奇並未安排與美方會晤。阿拉奇也在社群媒體發文表示，巴基斯坦之行「收穫豐碩」，已提出「永久結束戰爭的可行架構」，但質疑「美國是否真心渴望外交」。伊朗政府的聲明表示，伊朗總統裴澤斯基安透過電話告知巴基斯坦總理夏立夫，德黑蘭不會在封鎖的威脅下展開「被施壓的協商」，美國應先解除海上封鎖，雙方才能開始奠定和解的基礎。\n\n美軍25日在阿拉伯海攔截一艘遭制裁的船舶，伊朗也繼續以小型砲艇組成的「蚊子船隊」威脅商船，荷莫茲海峽通行量依然接近零。"}, {"title": "創業之星選秀 快來報名 創投產業推手跨境跨域整合實力，催動創新生態系升級 開發資本助新創搶AI先機", "cat": "台灣產業與投資動向", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "川普出席 白宮記協晚宴傳槍響", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "錄影「突圍」史國晚宴》 中華民國台灣是主權國家 賴：2300萬台灣人有權走向世界", "cat": "其他", "priority": 0, "summary": "賴清德總統原定上週啟程訪問非洲邦交國史瓦帝尼王國，卻因中國強行介入受阻。賴總統昨以錄影方式，在史國的重要外賓晚宴致詞強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻...", "full_text": "賴清德總統原定上週啟程訪問非洲邦交國史瓦帝尼王國，卻因中國強行介入受阻。賴總統昨以錄影方式，在史國的重要外賓晚宴致詞強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻的努力，台灣會持續強化實力，穩健走向國際。影片播映 三度獲得熱烈掌聲賴清德總統以全英語預錄影片為史瓦帝尼在國際會議中心舉辦的重要外賓晚宴致詞，慶賀恩史瓦帝三世國王登基四十週年，並紀念史王五十八歲華誕、史瓦帝尼王國獨立五十八週年，以及中華民國台灣與史瓦帝尼建交五十八週年「三個五十八」的歷史里程碑。\n\n據與會僑胞轉述，現場約一千五百位貴賓在場，播映過程三度獲得熱烈掌聲。賴清德強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，我們面對的外部壓力越是強烈，我們越要有勇氣與決心。我們會持續強化實力，穩健走向國際，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻的努力。\n\n賴說，對台灣而言，史瓦帝尼人民就像是家人，我們會繼續一起克服各項挑戰，攜手穩健前行。"}, {"title": "春雨助攻 高雄農業旱情解除", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "10公克大麻 萬元賣牌友 販二級毒品不承認 重判11年", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤人員中彈", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "供電吃緊 德國再掀重啟核能辯論 車諾比核災滿40周年梅爾茨指全面廢核電是戰略錯誤", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "獨家專訪／促台速通過國防特別條例 釋出強化自我防衛信號 谷立言：嚇阻力 維護和平最佳途徑", "cat": "其他", "priority": 0, "summary": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也...", "full_text": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業， 向國際社會釋出台灣願意強化自我防衛的重要信號，這對台灣的國防 與產業發展都有莫大助益。近月來華府數個智庫接連訪台，美國議員並聯合致函立法院長韓國 瑜，重點皆在關切1.25兆元國防特別預算條例早日立法，谷立言也為 此頻頻拜會在野人士，說明美方立場，盼能化解在野疑慮；他認為， 目前立法院的討論已經很接近他們希望達成的結果，國防特別預算條 例越快通過越好。\n\n以下為谷立言接受《中國時報》專訪重點：立院目前討論 已很接近期待結果問：韓院長為了通過國防特別預算條例，很積極召集朝野協商，但 尚未達成最後結論，台灣是否有迫切需要通過這項特別條例？答：我們非常感謝韓院長所做的努力。如你們所知，美國堅定支持 台灣的自我防衛能力。\n\n鑑於當前的區域安全形勢，我們與台灣一樣都 迫切希望確保嚇阻力，因為我們相信，這是維護和平的最佳途徑。我們歡迎國防部編列的特別預算條例草案，這將為台灣軍隊提供嚇 阻衝突所需的裝備和能力。我們注意到立法院有兩種立場，一種是以 特別預算來支付美國去年12月宣布的軍售案；\n\n另一種則是支持國防部 所有需求的綜合方案。我認為兩者並不矛盾，事實上，兩者都需盡快 進行。美方已針對多項防衛能力提供發價書，但由於立院尚未通過預算， 美國只好延長發價書最後期限，以便給予立法院更多時間完成相關工 作。\n\n在立院通過特別預算前，要先通過特別條例草案，因此希望立院 盡快通過特別條例。展現採購意願 爭取與武器商合作台灣通過「全面性」特別預算條例非常重要，這不僅向國際社會發 出非常重要的信號，且對於確保台灣能夠獲得其所要求的全部防禦能 力也至關重要。例如，我們已經宣布了一些系統，包括海馬士火箭和 M109自走砲系統，都是非常重要的系統；\n\n國防部的特別預算中，還希 望採購包括一體化防空反導系統、無人載具、無人機等。正如在中東 或烏克蘭戰場上所看到的情形，世界各地對這些系統的需求非常高， 無論是民間企業或是美國政府都在進行資源競爭。如果台灣能通過特別條例，這是向這些武器設備商發出信號，表明 台灣有採購的意願。\n\n但這並不意味著台灣必須在簽訂合約前支付款項 。我曾與一些美國大型國防科技公司的執行長交談過，許多人非常渴 望在台灣投資、建立供應鏈合作夥伴關係、開設辦事處，但他們都在 觀望台灣是否有購買這些裝備的意願。因此，如果台灣能夠通過全面 性的國防特別預算條例，這是向業界發出信號，即他們應該開始與台 灣合作，共同投資這些項目，這對台灣產業也很重要。\n\n直言越快通過越好 無具體期限問：有智庫學者警告，立法院若於5月7日前無法通過此特別條例， 將影響美方協助台灣意願？眾議院軍事委員會聽證會上所 述，他們都強調台灣盡快為其國防提供資金的重要性。如帕帕羅所說 ，我們正處於關鍵時刻，如果進行正確的投資，就能利用嚇阻力維護 和平。\n\n如果不這麼做，等於將來要面對一場準備不足的衝突，台灣將 陷入脆弱的困境。從華府的角度看，台灣越早表明自我防衛的意願，對所有人來說就 越安全，因為台灣面臨威脅的嚴重性，令美、台及該地區其他國家都 深有體會。因此，我們希望台灣盡快採取行動，似乎沒有必要再做更 多辯論。\n\n不過立法院的討論已經很接近我們希望達成的結果，國防特 別預算條例越快通過越好。"}, {"title": "又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教師闖安檢站開火遭逮", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "台積鉅額交易 創2,285元新高 總成交金額逾1.37億元", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年每案最高補貼3,000萬元、大專院校則為500萬元", "cat": "台灣產業與投資動向", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "AI中央廚房補助計畫地方美食IP化策略 讓特色料理變成數位資產", "cat": "台灣產業與投資動向", "priority": 0, "summary": "大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線 製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問 題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產 。這次計畫三大核心策略中，產線製程智慧化，主要以AI...", "full_text": "大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線 製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問 題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產 。這次計畫三大核心策略中，產線製程智慧化，主要以AIoT技術建立 智慧化中央廚房模組，實現烹煮、包裝與檢測等關鍵環節自動化作業 。國科會期望，藉由感測監控與數據分析，將傳統經驗轉化為可視化 數據，確保中央廚房食品安全與品質一致，提升整體生產效率與穩定 性。\n\n智慧餐廚模組化則是透過美食參數數據化，在終端場域透過智慧化 餐廚模組完成製作、烹調或復熱與擺盤，提供消費者現做感體驗，同 時降低對專業廚師依賴，打造可複製、可快速擴展的商業模式。而地方美食IP化，主要希望將地方特色料理轉為數位資產，如建立 數位IP食譜，運用AI將職人烹飪經驗「數據化」，涵蓋時間、溫度、 投料時機等關鍵變因，形成可跨地域轉移的數位資產。也可以透過AI風味優化演算法進行製程即時調控，針對產線波動進 行動態補償，確保跨區生產成品風味具高度一致性，甚至可進行規模 化製作，由在地走向多元通路供應。"}, {"title": "Q1信義房價指數房價有撐短期難大跌", "cat": "其他", "priority": 0, "summary": "房市冷，房價下修壓力持續。根據最新發布的信義房價指數，今年 第一季房價指數167.53，季增2.6％、年減0.53％，自2024年第四季 的歷史高點下修約1.1％，過去四季以來有三季指數年增率為負，顯 示房價自高點轉折向下盤整。不過房產業者...", "full_text": "房市冷，房價下修壓力持續。根據最新發布的信義房價指數，今年 第一季房價指數167.53，季增2.6％、年減0.53％，自2024年第四季 的歷史高點下修約1.1％，過去四季以來有三季指數年增率為負，顯 示房價自高點轉折向下盤整。不過房產業者也點出，近期台股熱絡、 通膨隱憂與賣方普遍惜售心態，房價下修力道有限，呈現盤整趨勢。\n\n信義房價指數顯示，2021年第四季至2022年第三季間是近年房價漲 勢最強勁的階段，年增率均在14％以上；2024年漲勢再起，四個季度 年增率也都超過10％。不過隨著央行推出第七波信用管制，市場交易 大幅降溫，房價指數在2024年第四季創下歷史高點169.46後，隨即向 下緩跌。\n\n經過約一年半的市場交易急凍、買盤接手力道轉弱之後，今年第一 季房價走勢呈現「北強、中南弱」的趨勢，七大都會區與上季相較， 雙北、桃園、新竹房價均有1％以上的漲幅，但高雄下跌1.1％，台南 跌幅更達2.9％；與去年同期相較，除台北市還能維持4％以上漲幅， 其餘六都房價均為年減，尤以中南部跌勢明顯，跌幅均超過3％，其 中台南下跌7.68％、台中4.69％較高。以各地房價來看，台北市獨強，第一季標準房價每坪82.6萬元，創 下歷史新高，新北連續三季守穩在5字頭之上，桃園也守穩在3字頭之 上，新竹則是已連續第五季跌破4字頭，台中、台南、高雄跌幅明顯 ，自高點起算，一年多單價也都下修了每坪2萬～3萬元。\n\n信義房價企研室專案經理曾敬德表示，房價經過修正盤整約一年多 ，雖然交易量能低落，今年以來由於股市旺、賣方對於降價求售壓力 有限，房價仍有相當支撐，短期難見大幅下跌，北部都會區因為剛需 穩定，回落幅度不大，過去漲幅較明顯的中南部則有較明顯修正。"}, {"title": "台積先進製程 神速擴產 法人推估今年底2、3奈米月產能上看28萬片 遠超預期 可望憑藉技術優勢「贏者全拿」", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "考量用電需求… 經部：強化資料中心審議機制", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "經長挺高雄設算力園區", "cat": "其他", "priority": 0, "summary": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他...", "full_text": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區，讓民間加速 AI算力中心興建，他詢問經濟部是否支持？\n\n龔明鑫回答，大型AI算力中心設置，到高雄比較適合，往接近電源地方設置。他並強調，經濟部會鼓勵、並支持高雄有國家算力園區，作為示範。賴瑞隆詢問，高雄有電力，如果在高雄設置國家算力園區，經濟部有哪些地方可以協助？\n\n龔明鑫表示，AI算力中心仍需要電網支持，台電需要把電網準備好。官員表示，因AI用電量龐大，密度高，台電建議愈接近電源愈好，以避免排擠原有用戶。而南部地區電力供應也較充足。"}, {"title": "環評總體檢 啟動雞尾酒療法", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "失能長照險混搭 保障互補 兩者理賠標準不同 雙重防護補足缺口 業者推出多元保單 協助小資族解決痛點", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "淨零承諾 企業的能源硬仗", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "廚餘養豬明年退場 營養午餐清運費恐大漲", "cat": "其他", "priority": 0, "summary": "楊綿傑／台北報導〕廚餘養豬將於明年元旦起全面退場，且下學期起各縣市都推動學校午餐免費，中華民國餐盒食品商業同業公會全聯會指出，預期廚餘處理費明年起將大幅增加，呼籲廚餘處理費應和學校午餐費脫鉤，確保食材品質。教育部表示，持續推動「取用適量、珍...", "full_text": "楊綿傑／台北報導〕廚餘養豬將於明年元旦起全面退場，且下學期起各縣市都推動學校午餐免費，中華民國餐盒食品商業同業公會全聯會指出，預期廚餘處理費明年起將大幅增加，呼籲廚餘處理費應和學校午餐費脫鉤，確保食材品質。教育部表示，持續推動「取用適量、珍惜食物」觀念，也與農業部及環境部合作，強化在地食材運用，協助學校觀察剩食情形並調整供餐模式。團膳籲廚餘處理費和餐費脫鉤為提高生物防治安全，農業部推動明年元旦起廚餘養豬全面退場，今年則鼓勵廚餘養豬戶轉型，環境部評估明年仍每天有三百卅噸廚餘無法多元利用，只能焚化掩埋處理，其中廚餘多來自學校午餐剩食，餐盒公會全聯會理事長陳明信憂明年廚餘處理清運費用恐提高，甚至翻倍成長，但各縣市學校午餐招標時，多將午餐和清運處理費用合併，隨清運處理費用高漲下，可能擠壓食材費用。\n\n環境部鼓勵清運業轉為乙級或丙級環境部環境管理署署長顏旭明說明，目前廚餘大部分轉為生質能或堆肥，但因相關設施仍要擴充，預估二○二七年才可全數轉為多元化利用，明年無法多元利用的廚餘將送焚化爐，除注意廚餘和其他垃圾處理配比外，也會鼓勵協助運送廚餘到養豬戶的業者轉為乙級或丙級清運業者，各縣市政府也會鼓勵清運業者擴大量能，清潔隊也會投入處理。顏旭明表示，環境部每兩週會和各縣市政府開會，隨時注意廚餘清運狀況，地方政府也會協助監控注意清運費用。教部：學校應持續落實源頭減量針對學校午餐，教育部說明，環境部已訂有「校園廚餘管理及處理原則」，提供各縣市參考運用，地方政府應建立教育單位與環保單位橫向溝通管道，並協調廚餘去化作業方式，教育單位除依環保單位分類及排出方式辦理外，將持續落實源頭減量。"}, {"title": "＜財經週報-本週熱點＞ 景氣燈號有望連4紅 首季拚雙位數成長", "cat": "台灣總體經濟與數據", "priority": 1, "summary": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會...", "full_text": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會先前公布的數據，2月景氣燈號綜合判斷分數升至40分，創下2024年5月以來、近22個月新高。\n\n其中，工業及服務業加班工時轉為紅燈，貢獻2分；製造業營業氣候測驗點則因春節工作天數減少轉為黃藍燈，減少1分，其餘指標維持不變，使整體景氣續呈熱絡格局。儘管 2 月底中東衝突升溫推升國際油價，為後續景氣增添變數，但在政府穩定油價機制啟動，以及出口動能強勁、股市續創新高支撐下，預期3月景氣燈號仍有機會維持紅燈表現。\n\n另一方面，主計總處將公布第一季國民所得概估。依據2月最新預測，今年經濟成長率由3.54%大幅上修至7.71%，當時預估今年四季經濟成長率分別為11.46%、9.3%、7.76%、3.09%。其中，第一季可望因基期因素有雙位數的成長，之後逐季下滑。\n\n3月出口發威 第一季GDP挑戰去年12.65%高牆3月雖然中東戰事爆發，不過受惠於AI需求應用持續擴張以及部分廠商提前拉貨效應發酵，財政部日前公布3月出口達801.8億元，創歷年單月新高，第一季出口規模1,957.4億美元，亦刷新歷史紀錄，並比主計總處預估值多了148億美元。在出口表現大幅優於預期，內需市場也維持穩定下，第一季GDP成長率可望站穩雙位數水準；至於是否能挑戰去年第四季12.65%、創下38年新高的紀錄，仍有待後續數據揭曉。"}, {"title": "時評 台灣淪先禁國家", "cat": "社論與評論觀點", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "台灣國是會議》司徒文呼籲立院通過增加國防預算", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對...", "full_text": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對美國及其在亞洲的民主鄰國的更廣泛安全利益，具有至關重要的地緣戰略意義。因此，台美的安全和經濟利益、共同價值觀以及台美的未來都息息相關。\n\n針對台美關係，司徒文表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，其「美國優先」經濟政策優先於傳統安全聯盟，致使台美關係緊張；許多台美民眾憂心，川普會成為不可靠的盟友。司徒文指出，截至今年三月，川普在台灣問題上仍保持模糊立場，一方面強調台海和平必要性，另一方面又表示是否入侵台灣「取決於習近平」，並拒絕明確表態是否會保衛台灣，這使得美國的安全承諾變得撲朔迷離。\n\n司徒文說，川普也要求台灣增加國防支出，他個人認同此觀點，樂見總統賴清德正朝此方向努力；川普也將美國對台灣國防承諾視作一份保單，曾說「台灣應該為我們的國防付費」。司徒文也點出，川普對台言論與政策引起國防支出的自相矛盾與延誤問題，儘管美國向台灣運送武器的進程持續延誤，台灣立法院對國防預算也存在分歧，但美國卻對台灣施加巨大壓力，要求台灣大幅增加國防預算。\n\n針對疑美論，司徒文則引述葛來儀與藍立雅去年在德國馬歇爾基金會撰文內容指出，「台灣民眾對美國歷來好感度正在下降」，疑美論正變得愈來愈根深蒂固，若任其惡化，恐損害美國利益。司徒文也認為，台灣半導體在海外擴大生產，致使台灣戰略重要性削弱的可能性微乎其微。司徒文總結指出，美國民調一直顯示，美國民眾普遍支持台灣的國防，近期美國跨黨派議員訪台時也曾強調，美國兩黨對台一致支持，呼籲立法院通過支持增加預算，以抵抗中國威脅；\n\n他相信，台灣與美國、日本、民主國家的關係，對台灣的未來仍然相當重要。"}, {"title": "又要普發現金？》藍再提稅收超徵修法 強調「還稅於民」制度化", "cat": "其他", "priority": 0, "summary": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國...", "full_text": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國民黨團於廿四日院會又提出相關修法，逕付二讀，交付黨團協商。對此，國民黨團人士表示，過去都是一次性的發放，目前在野黨推動的是把「還稅於民」制度化，讓未來只要稅收明顯超徵，就有一套明確、透明的機制，把多收的錢回饋給全民，這是建立可長可久的民生保障制度。\n\n國民黨團人士指出，行政院的態度始終比較保守，甚至可以說是抗拒。因為一旦制度化，就代表財政的運用要受到規範，不能再由行政部門自由裁量。現在的情況是，錢什麼時候發、發多少，幾乎完全由行政院決定，這其實就是把權力集中在少數人手上。\n\n國民黨團人士強調，他們不是為了短期討好，而是要建立一個公平原則：稅收來自人民，當政府多收了，就應該在合理門檻下回到人民手中，而不是變成政府可以任意運用、甚至擴張支出的工具。國民黨團廿四日於院會提案指出，鑑於自二○二一年起，全國賦稅收入實際金額皆超過該年度預算預估三千億元以上。為明確化政府超徵預算的運用，爰擬具「預算法增訂第八十一條之一條文草案」，明定超徵稅收的優先用途與分配順序，以制度解決亂象。\n\n國民黨團並提議抽出此案逕付二讀，由於朝野無異議，逕付二讀，交付黨團協商。提案稱，「全年實徵淨額達到當年度預算編列數一一五％時，應優先弭平當年度歲入歲出之差短；如有賸餘，應辦理普發現金。\n\n」提案說明，稅收是人民交給政府處理公眾事務的資金。如果政府的預算執行完畢後還有顯著賸餘，這部分「多收的錢」在法理上應該回饋給國人。因此，稅收超徵達一定數額，應將一定的比例普發現金。"}, {"title": "藍又要普發現金？》綠：擋預算又要發錢 讓國家失能", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推...", "full_text": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推「普發現金」討好民眾，邏輯自相矛盾；兼任民進黨發言人的立委李坤城也批評，在野黨不要只想做「無本生意」，呼籲趕快通過今年度中央政府總預算，不能又要馬兒好、又要馬兒不吃草。\n\n公民監督國會聯盟執行長張宏林質疑，地方政府稅收有盈餘，是不是也要比照普發？這些相關修法都是要拖垮中央財政、拖垮台灣，現在國民黨整個朝向不想執政，或認為無法執政的狀態，要拖著台灣一起去死，這才是最恐怖的。籲在野黨不要只想做「無本生意」立法院財政委員會去年三月初初審通過「預算法增訂第八十一條之一條文草案」，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但朝野、行政部門無共識，全案保留送院會協商，擱置至今；\n\n立法院國民黨團廿四日院會又提出相關修法，逕付二讀，交付黨團協商。莊瑞雄指出，所謂超徵稅收本就來自景氣波動與預測誤差，並非穩定財源，依法應優先用於減少赤字、償還債務與預留風險準備，而不是被寫成達標就發的固定公式，一手擋預算、一手要發錢，這不是監督，是讓國家失能。「今天發現金很爽，明天沒錢做事更痛！\n\n」莊瑞雄說，過去政府採取普發現金措施，是在整體情勢評估及國會壓力交織下的政策選擇；若強行入法常態化，將壓縮國防、社福與重大建設等必要支出，讓政府失去財政調度彈性。莊直言，預算不是紅包，是建設國家的未來，民進黨團支持在必要情況下紓困，但反對將短期討好制度化，將在後續協商中嚴格把關，守住國家財政紀律。\n\n李坤城也說明，如果有歲計賸餘，代表民進黨政府帶領國家拚經濟有成績，並不是政府「超收」人民的稅金，希望國民黨立委搞清楚。在野黨先前修改「財政收支劃分法」，已弱化中央政府的財政因應能力，如果有歲計賸餘，希望讓國家能有「子彈」面對國際情勢，呼籲在野黨趕快通過今年度總預算。"}, {"title": "兒托法訂定20項子法／教團反對監管雲 石崇良：不能隨時調閱", "cat": "其他", "priority": 0, "summary": "／台北報導〕「兒童托育服務法」日前三讀通過，衛福部將訂定約廿項子法，其中包括監管雲相關規範。但教保團體擔憂，托育機構將孩子生活影像上傳至監管雲恐侵害孩子個資及隱私，昨呼籲子法應落實避免全面監控、需有家長書面同意、有限度與制度調閱等原則；衛福...", "full_text": "／台北報導〕「兒童托育服務法」日前三讀通過，衛福部將訂定約廿項子法，其中包括監管雲相關規範。但教保團體擔憂，托育機構將孩子生活影像上傳至監管雲恐侵害孩子個資及隱私，昨呼籲子法應落實避免全面監控、需有家長書面同意、有限度與制度調閱等原則；衛福部長石崇良則強調，相關影像非永久保存，也非隨時可以調閱，不會有隱私洩漏問題。\n\n全面上傳恐危害孩子隱私、個資昨日廿個教保相關團體集結於立法院訴求「反雲端」，指控上傳監視器影像至雲端將違反兒童權利公約（CRC）、隱私權，且資料可能外洩，存在資安疑慮，訴求捍衛托育專業及勞動尊嚴，但也強調絕非「反監視器」。「聲稱上傳到監管雲是輔助管理，根本謊言！」中華民國兒童教保聯合總會總會長蔣叔融表示，托育中心早在二○二○年就已經透過監視器管理，若擔憂影像遺失可要求機構增購設備因應，托嬰中心是教育環境，人員需要信任、孩子需要愛，不是設置幾百支監視器就叫做保障，也不能因一起個案就懲罰全台近二○○○家托育中心人員。\n\n中華民國幼教聯合總會總會長葉若蕎則認為，未來托嬰中心孩子脫光光、換尿布都會被拍到，全面上傳恐危害孩子的隱私權及個資，AI時代雲端很容易遭駭，建議政府考量資安風險，與社會更多對話。衛福部長石崇良則表示，過去曾發生一些兒少保護爭議事件，調查過程中發現影像資料遺失，因此「兒托法」規劃監管雲等相關方式，衛福部會與相關團體討論執行細節，並透過子法規範。石：異地備援 不會永久存放石崇良強調，監管雲是「異地備援」概念，重點在於存放，而非直接使用，且監管雲資料過一段時間後就會刪除，並不會永久存放，更不會隨時可以調閱，不會有隱私洩漏問題。"}, {"title": "專家：軍購不能成「無菜單料理」", "cat": "其他", "priority": 0, "summary": "立法院今天將再度協商軍購特別條例草案，民眾黨昨舉辦國防論壇，中華戰略學會資深研究員張競說，行政部門並未向國人充分說明具體項目、採購邏輯、交付時程及風險控管，相關程序已經嚴重失衡，這是不負責任的國防規畫，軍購不能成為「無菜單料理」，並要求立委...", "full_text": "立法院今天將再度協商軍購特別條例草案，民眾黨昨舉辦國防論壇，中華戰略學會資深研究員張競說，行政部門並未向國人充分說明具體項目、採購邏輯、交付時程及風險控管，相關程序已經嚴重失衡，這是不負責任的國防規畫，軍購不能成為「無菜單料理」，並要求立委閉著眼睛埋單。海軍前上校黃征輝說，台灣建軍方向應該「質精量少」，將更多資源投入無人載台、ＡＩ控制與分散式作戰能力，國防預算必須花在真正能夠提升戰時存活率與嚇阻效果的方向。張競表示，行政部門將一點二五兆元軍購包裝成國家安全急迫需求，卻沒充分說明，相關程序失衡，這不是負責任的國防規畫，不應硬把國會推向「無料理菜單」與「無菜單料理」之間，並要求立委閉著眼睛埋單。\n\n台灣討論軍購時，應冷靜評估採購內容、交付期程、供應鏈風險及實際戰力效益。國防專家施孝瑋指出，台灣要買的不是政治符號，而是能降低戰爭風險、提升防衛能力、並確保第一線官兵能活下來、打得贏的裝備與制度。"}, {"title": "軍購協商 韓國瑜：今挑燈夜戰 額度爭議大 藍指民進黨團死守1.25兆 如何協商", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "灰色地帶操作 削弱旅客保障", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "「合法做不了、違規又不敢明做」 多輸局面 赴陸變形團政府續埋沙堆？", "cat": "其他", "priority": 0, "summary": "台灣人赴陸旅遊人數一再攀升，可見禁團令早就名存實亡，走向地下化的「變形團」不但打臉政府威信，也讓消費者權益保障處於灰色地帶，日前陸方提出惠台政策，較不觸及政治敏感的觀光，政府若再拒接球，兩岸觀光恐再陷入多輸局面。禁團令禁止台灣旅行社組團赴陸...", "full_text": "台灣人赴陸旅遊人數一再攀升，可見禁團令早就名存實亡，走向地下化的「變形團」不但打臉政府威信，也讓消費者權益保障處於灰色地帶，日前陸方提出惠台政策，較不觸及政治敏感的觀光，政府若再拒接球，兩岸觀光恐再陷入多輸局面。禁團令禁止台灣旅行社組團赴陸，然而，近年旅展上前往中國大陸的「參訪團」、「考察團」，不僅在旅展上熱賣，甚至連價格不菲的高端行程也吸引了不少詢問。市場需求增溫，許多旅行社只能在法律邊緣尋找生存空間，以各種名義或轉介方式協助旅客成行，變形成實質上的「地下團」市場。\n\n旅行業者一方面需遵守政策規範，另一方面又面對市場需求與營運壓力，形成「合法做不了、違規又不敢明做」的兩難。更嚴重的是旅客權益的流失。過去就有業者指出，在禁團令實施前，台灣旅客若赴陸旅遊發生糾紛，行程爭議、服務品質不符，甚至醫療事故等，仍可透過台灣旅行社進行申訴與求償，相關責任歸屬與處理機制相對明確。\n\n然而禁團令上路後，旅客一旦在中國大陸發生問題，往往只能直接與當地旅行社交涉，缺乏熟悉的法律與行政管道，權益保障明顯弱化，原本應由制度提供的保障機制，反而被排除在外。近期陸方釋出訊號，有意開放上海及福建居民赴台自由行，被視為兩岸觀光可能「破冰」的契機，但民進黨政府仍以「陸方善意未必為善意」為由，未正面回應相關提議。兩岸因為地理及文化相近，長期以來就是國人出國旅行的熱門地點，政府以政治力阻礙兩岸往來，但事實上需求依舊強勁，反而讓市場轉入地下。\n\n面對政策與市場脫節的現實，賴政府還能頭埋在沙堆裡多久？"}, {"title": "2024年3月原已要解禁 賴當選後生變… 禁團令一禁6年 旅行業氣煞", "cat": "其他", "priority": 0, "summary": "導台灣團甘肅車禍，釀一死十二傷，讓人想起三年前台灣旅客在新疆，一死三傷的車禍慘劇，事發不久，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年二○二四年三月一日解除，許多業者樂觀以為會迎來報復性旅遊，沒想到隔年二月又急踩煞車，禁團令政策一變再...", "full_text": "導台灣團甘肅車禍，釀一死十二傷，讓人想起三年前台灣旅客在新疆，一死三傷的車禍慘劇，事發不久，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年二○二四年三月一日解除，許多業者樂觀以為會迎來報復性旅遊，沒想到隔年二月又急踩煞車，禁團令政策一變再變。由於兩岸關係不佳，大陸早在二○一九年八月即停止自由行陸客來台旅遊。二○二○年初為防堵新冠肺炎疫情，政府禁止旅行社組團赴大陸旅遊，也禁止大陸人士來台，陸客團隨之中斷。\n\n二○二三年十月下旬，一團廿多名台灣民眾赴新疆旅遊，發生交通意外，造成一死三傷，此事也引發禁團令未解，陸團險走灰色地帶的討論。同年十一月初，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年春節前宣布解除，春節後三月一日起可組團到大陸及接待大陸旅遊團，旅行業者可提早準備。國內約有四千家旅行社業者以兩岸業務為主，高居國內旅行社九成，許多業者樂觀以為會迎來報復性旅遊，招兵買馬，大舉揪團。\n\n隔年一月十三日，總統選舉賴清德勝出，禁團令又悄悄生變，交通部觀光署在春節連假前一天，以中國大陸未開放陸客來台且片面改變Ｍ五○三航路，宣布即日起停止招攬大陸團。禁團令一出，很多旅行社業者氣得跳腳，因為已經收客，旅遊糾紛不知如何化解。業者氣罵，之前是防疫特別條例，現在是用什麼條例，不准旅行社業者組團？\n\n禁團令持續至今，兩岸隔空喊話，都要對方先釋出善意，卻不願意坐下來談，陸客來台人數也從二○一五年最高峰的四百一十八萬人次，掉到去年剩六十三萬人次，少了陸客，觀光署訂的來台旅客人數目標，年年跳票，觀光署祭出諸多振興方案，效果有限。"}, {"title": "甘肅翻車 國台辦：全力協助 死者家屬抵當地 3人留院5月1日全團返台", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "徒具形式 禁團令 旅遊業者：剩政治宣示意義 赴陸人數年年增 去年已達疫前8成 李奇嶽：市場需求難逆轉 不如實質納管", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "石崇良：安樂死有疑慮 不考慮推動 安寧照護「8成在醫院」 健保擬加碼給付鼓勵在宅安寧", "cat": "其他", "priority": 0, "summary": "導台灣安寧療護發展多年，臨終病人死亡品質居亞洲第一，然「在宅善終」（Home Hospice Care）接受度仍偏低，目前每年安寧服務約十萬人次，其中二萬人選擇居家安寧，其餘八成集中在醫院。為提高在家善終的可近性，健保擬透過加成給付，鼓勵醫...", "full_text": "導台灣安寧療護發展多年，臨終病人死亡品質居亞洲第一，然「在宅善終」（Home Hospice Care）接受度仍偏低，目前每年安寧服務約十萬人次，其中二萬人選擇居家安寧，其餘八成集中在醫院。為提高在家善終的可近性，健保擬透過加成給付，鼓勵醫療院所參與在宅安寧。據統計，癌症病患在死亡前一年接受安寧照護的比率達百分之六十五，非癌症患者僅百分之三十五，衛福部長石崇良表示，最近幾年「安樂死」倡議呼聲不小，一般認為，可能與現行制度未能達到尊嚴善終的目標有關，這代表安寧照護領域仍有努力及檢討空間，若安寧品質良好，民眾就不會追求更激烈的「安樂死」手段。\n\n石崇良指出，安樂死不僅是醫療問題，更涉及法律、倫理與社會價值，可分為「被動」與「主動」兩類，所謂被動安樂死，指停止或不進行延命治療，讓疾病自然進程結束。主動安樂死，則涉及以醫療手段主動結束生命，性質完全不同，台灣社會雖逐漸開放，但對此仍存在高度分歧，現階段不考慮主動安樂死。此外，安樂死涉及「協助自殺」，依台灣現行法律，協助他人自殺仍屬刑事犯罪，若未來真要推動安樂死制度，勢必需先處理刑法層面問題。\n\n衛福部醫事司長劉越萍指出，在安樂死等倡議仍有法律「加工死亡」等刑法的疑慮，社會未達共識下，仍將以提升安寧緩和醫療品質為主，讓民眾尊嚴善終。「優先建構安寧照護網絡，而非推動生命終結法制化。」劉越萍說，關鍵在於提升安寧品質，並肯定支持第一線醫療人員臨床實務上的付出。\n\n如果臨終病人能夠大幅減少痛苦，一一完成未竟心願，相信就可大幅降低極少數個案的「安樂死」極端需求。石崇良說，現行安寧照護主要分為住院安寧、安寧共照、居家安寧等三大類，其中以住院與共照模式占多數，顯示國人仍習慣在醫院接受臨終照護。但在地終老為長照最終目標，有必要提高居家安寧服務的可及性，為此，將提高居家安寧訪視費用，採論質計酬。\n\n衛福部健保署主秘劉林義表示，去年推出安寧緩和療護品質評核加成獎勵方案，已有一百家醫院提出申請，專家將於五月起至年底實際訪評在宅安寧的訪視頻率及次數、相關人員組成，以及如何讓家屬安心等細節，評估結果為優良醫事機構，則可獲得加成獎勵。「在宅安寧係讓長者在家走完人生最後一哩路，這是未來趨勢，也是安寧緩和的推動重點。」劉林義說，多數長者希望在熟悉的家中度過人生的最後時刻，再者，健保資源有限，在宅安寧也可降低醫療支出。\n\n健保署將制訂各項配套措施，讓安寧長輩病情緊急時，鄰近醫療團隊可盡速到宅協助，讓家屬無後顧之憂。"}, {"title": "制度補強 為失智者阻詐 民間促立法 台灣失智症協會擬定失智症基本法草案 盼患者面對財務法律問題不再孤立無援", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "充滿變數 申請卡關 金門今赴廈考察降級 副縣長遭駁回縣府緊急調整名單", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "司徒文促台增國防預算 吳志中籲結盟美日嚇阻", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內 為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民 眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台 灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中...", "full_text": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內 為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民 眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台 灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中國威脅。外交部次長吳志中則說，台灣需要鏈結美、日等友盟國家嚇阻戰事發 生。第14屆「海內外台灣國是會議」昨登場，邀請日本前防衛副大臣參 議員中山泰秀、AIT前處長司徒文，以及外交部次長吳志中等人，就 美日台三邊關係進行專題演講。\n\n司徒文表示，台美因共同價值觀團結，皆是民主國家，珍惜獨立、 自由、法治與人權，但除了共享價值觀外，共同利益至關重要，而台 灣位於亞太地區第一島鏈中心，這意味著台灣對美國及其在亞洲的民 主鄰國的更廣泛的安全利益具有至關重要的地緣戰略意義。因此，雙 邊的安全和經濟利益、共同價值觀，以及未來都息息相關。司徒文表示，川普確實為美台關係帶來更大不確定性，川普反覆無 常，政策經常發生突然且難以預測的變化，他並提到，川普種種發言 與表態都增加了台灣民眾對美國的不信任，如果任由「疑美論」惡化 ，可能會損害美國的利益。\n\n對於川普要求台灣增加國防支出，他個人認同此觀點，也樂見賴清 德總統朝此方向努力。他相信，台灣與美國、日本及各民主國家的關 係，對台灣的未來仍然相當重要吳志中認為，2004年台灣推動防衛性公投時，被國際質疑是企圖改 變現狀、是麻煩製造者，但如今「中國才是麻煩製造者」的國際敘事 已然成形，面對中國等獨裁政權的崛起，台灣不僅要準備好強大的國 防實力，更需要鏈結美、日等友盟國家，以國防及外交來嚇阻戰事發 生。"}, {"title": "支持國防不等於放棄監督 應考量實際防衛需求 專家：特別軍購不能成為無菜單料理", "cat": "其他", "priority": 0, "summary": "「國防特別條例」草案協商數度破局，立法院長韓國瑜今（27）日 將再召集朝野黨團協商。中華戰略學會資深研究員張競表示，行政部 門將 1.25 兆元的特別條例包裝成國安急迫需求，卻未充分說明具體項 目、採購邏輯、交付時程與風險控管，把國會推向「...", "full_text": "「國防特別條例」草案協商數度破局，立法院長韓國瑜今（27）日 將再召集朝野黨團協商。中華戰略學會資深研究員張競表示，行政部 門將 1.25 兆元的特別條例包裝成國安急迫需求，卻未充分說明具體項 目、採購邏輯、交付時程與風險控管，把國會推向「無料理菜單」與 「無菜單料理」間，要求立委閉著眼睛埋單，台灣社會不應輕易倉促 背書。民眾黨昨舉辦「從軍購到戰力：國防建軍決策與監督機制檢視」論 壇。\n\n前海軍上校黃征輝表示，台灣建軍方向應該「質精量少」，並將 更多資源投入無人載台、AI控制與分散式作戰能力，未來戰場關鍵不 在傳統大型平台堆疊，而在無人化、AI化與可持續作戰能力，預算須 花在能提升戰時存活率、嚇阻效果上。黃征輝認為，若台灣要談強化國防，就不能只談買什麼武器，更要 談如何建構戰場經營、民防準備與全民防衛體系，讓每一分國防預算 都能對應到實際防衛需求，而不是被既有軍種框架與政治口號綁架。張競批評，行政部門將1.25兆元特別軍購包裝成國家安全急迫需求 ，卻未充分向國會與人民說明具體項目等，反而透過外媒披露後才倉 促推動，程序上已嚴重失衡，這是不負責任的國防規畫。\n\n張競說，社會不能被「不買就是不愛台灣、不支持國防」情緒勒索 ，美國對外軍售本質是為了鞏固其國安利益、強化美國國防工業，因 此台灣應冷靜評估採購內容、交付期程、供應鏈風險與實際戰力效益 ，並非在資訊不透明的情況下倉促背書。國防部前視察盧德允強調，軍購清單不應該只符合美國軍工複合體 利益，更必須符合台灣防衛利益，若武器交付後無法有效強化防衛能 力，反而削弱有限資源配置，也未必符合美維持第一島鏈穩定的國家 利益，部分裝備如M109A7自走砲、海馬士、M1A2T戰車，都應被重新 放在未來戰爭型態中檢驗，而不是用過去戰爭的想像來編列未來數年 國防預算。"}, {"title": "軍購民調 年輕族群態度保留", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "通過國防特別條例 有助鄭訪美氛圍 谷立言肯定親美友日和陸路線 稱嚇阻與對話並重 可維護區域安全", "cat": "其他", "priority": 0, "summary": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也...", "full_text": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業， 向國際社會釋出台灣願意強化自我防衛的重要信號，這對台灣的國防 與產業發展都有莫大助益。近月來華府數個智庫接連訪台，美國議員並聯合致函立法院長韓國 瑜，重點皆在關切1.25兆元國防特別預算條例早日立法，谷立言也為 此頻頻拜會在野人士，說明美方立場，盼能化解在野疑慮；他認為， 目前立法院的討論已經很接近他們希望達成的結果，國防特別預算條 例越快通過越好。\n\n以下為谷立言接受《中國時報》專訪重點：立院目前討論 已很接近期待結果問：韓院長為了通過國防特別預算條例，很積極召集朝野協商，但 尚未達成最後結論，台灣是否有迫切需要通過這項特別條例？答：我們非常感謝韓院長所做的努力。如你們所知，美國堅定支持 台灣的自我防衛能力。\n\n鑑於當前的區域安全形勢，我們與台灣一樣都 迫切希望確保嚇阻力，因為我們相信，這是維護和平的最佳途徑。我們歡迎國防部編列的特別預算條例草案，這將為台灣軍隊提供嚇 阻衝突所需的裝備和能力。我們注意到立法院有兩種立場，一種是以 特別預算來支付美國去年12月宣布的軍售案；\n\n另一種則是支持國防部 所有需求的綜合方案。我認為兩者並不矛盾，事實上，兩者都需盡快 進行。美方已針對多項防衛能力提供發價書，但由於立院尚未通過預算， 美國只好延長發價書最後期限，以便給予立法院更多時間完成相關工 作。\n\n在立院通過特別預算前，要先通過特別條例草案，因此希望立院 盡快通過特別條例。展現採購意願 爭取與武器商合作台灣通過「全面性」特別預算條例非常重要，這不僅向國際社會發 出非常重要的信號，且對於確保台灣能夠獲得其所要求的全部防禦能 力也至關重要。例如，我們已經宣布了一些系統，包括海馬士火箭和 M109自走砲系統，都是非常重要的系統；\n\n國防部的特別預算中，還希 望採購包括一體化防空反導系統、無人載具、無人機等。正如在中東 或烏克蘭戰場上所看到的情形，世界各地對這些系統的需求非常高， 無論是民間企業或是美國政府都在進行資源競爭。如果台灣能通過特別條例，這是向這些武器設備商發出信號，表明 台灣有採購的意願。\n\n但這並不意味著台灣必須在簽訂合約前支付款項 。我曾與一些美國大型國防科技公司的執行長交談過，許多人非常渴 望在台灣投資、建立供應鏈合作夥伴關係、開設辦事處，但他們都在 觀望台灣是否有購買這些裝備的意願。因此，如果台灣能夠通過全面 性的國防特別預算條例，這是向業界發出信號，即他們應該開始與台 灣合作，共同投資這些項目，這對台灣產業也很重要。\n\n直言越快通過越好 無具體期限問：有智庫學者警告，立法院若於5月7日前無法通過此特別條例， 將影響美方協助台灣意願？眾議院軍事委員會聽證會上所 述，他們都強調台灣盡快為其國防提供資金的重要性。如帕帕羅所說 ，我們正處於關鍵時刻，如果進行正確的投資，就能利用嚇阻力維護 和平。\n\n如果不這麼做，等於將來要面對一場準備不足的衝突，台灣將 陷入脆弱的困境。從華府的角度看，台灣越早表明自我防衛的意願，對所有人來說就 越安全，因為台灣面臨威脅的嚴重性，令美、台及該地區其他國家都 深有體會。因此，我們希望台灣盡快採取行動，似乎沒有必要再做更 多辯論。\n\n不過立法院的討論已經很接近我們希望達成的結果，國防特 別預算條例越快通過越好。"}, {"title": "無人機納國防特別預算 嚇阻力最快速", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算， 但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無 人機這類裝備，台灣可以非常迅速地建立許多這類相對應的...", "full_text": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算， 但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無 人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，要 提供最快的嚇阻力量，最好的方法是將其納入國防特別預算。問：在野黨希望將商購及委製部分移為年度預算編列，華府會對此 感到失望嗎？答：我認為，台灣業者會非常失望。\n\n如果商購與委製移為一般年度 預算編列，資金到位的時間將會拉長，許多大型常規系統需要數年才 能建成並交付給台灣。像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能 力，如果你的目標是盡快提供最快的嚇阻力量，我認為最好的方法是 將其納入國防特別預算。一旦預算通過，台灣就可以立即生產。\n\n如同美國印太司令帕帕羅所說，這類系統在嚇阻方面至關重要，亦 如在伊朗衝突和烏克蘭衝突中所見，大規模生產的無人機系統對台灣 的安全具有舉足輕重的作用。因此，我們希望整套預算案能同時並進 、向前推進。這不僅有利於台灣的安全，也有利於我們共同建構新的 產業合作關係。\n\n問：國民黨擔心商購及委製的招標恐有不透明之處，易有弊端，因 此主張特別預算應該拆分處理，您的看法如何？答：我有聽說這種講法。任何政府進行採購都應該有監督機制審查 ，例如，台灣要買救護車或新的發電設備，都會進行公開招標，採購 無人機也相同。\n\n這對產業界是參與公開採購的機會，政府應有相關監 督機制，解決採購流程中的疑慮。我與台中市盧秀燕市長會面時也談到，國民黨內部愈來愈多的人了 解其中的巨大機會，對台中市的企業而言，漢翔科技就是領先的無人 機系統整合商之一。因此，這將惠及民進黨和國民黨兩黨執政縣市。\n\n所以，我希望雙方能找到共同點，將此視為台灣所有企業蓬勃發展 、為台灣安全做出貢獻的契機。從我們的角度來看，尤其對台灣的安 全而言，大規模生產無人系統是非常重要。"}, {"title": "翻轉經濟學人「地球上最危險的地方」看法 谷立言稱台是最重要的地方之一", "cat": "其他", "priority": 0, "summary": "訪】《經濟學人》（The Economist）曾於封面報導台灣是「地球上最 危險的地方」，此後國際均據此論述兩岸關係。美國在台協會（AIT ）處長谷立言卻認為，台灣應該是「最重要的地方之一」，台灣是美 國第四大貿易夥伴，重要性已無庸置疑，且...", "full_text": "訪】《經濟學人》（The Economist）曾於封面報導台灣是「地球上最 危險的地方」，此後國際均據此論述兩岸關係。美國在台協會（AIT ）處長谷立言卻認為，台灣應該是「最重要的地方之一」，台灣是美 國第四大貿易夥伴，重要性已無庸置疑，且各國普遍認為，避免台海 衝突非常重要。問：《經濟學人》曾報導，台海是地球上最危險的地方，您派駐於 此，也如此認為嗎？\n\n答：我會說台灣是世界上最重要的地方之一，尤其對美國而言，台 灣是美國第四大貿易夥伴，在關鍵技術領域，美國和台灣是同一團隊 ，台灣對世界的重要性無庸置疑。我認為，人們普遍認識到，台海衝 突的後果將對世界造成毀滅性打擊。有人估計，損失可能高達全球G DP的10％，甚至超過二戰造成的損失。\n\n雖然大部分損失將發生在台灣 和中國之間，但它會影響到世界。因此，我認為各國普遍認為，避免 台海衝突至關重要。與 5 年前我被派駐來台北時相比，我們在這一領域確實取得了長足 的進步。\n\n事實上，衝突的可能性已降低。一方面，是因為台灣本身在 軍事改革及社會韌性上投入了大量資源。另一方面，也是因為台灣與美國及眾多盟友攜手合作，重新平衡區 域安全環境。\n\n所以我認為，只要我們一方面繼續加大投入，另一方面 也積極開展外交活動，無論是美中之間，還是台北與北京之間，這兩 方面努力都能確保我們繼續享有和平，從而釋放台灣在區域內的繁榮 潛力。問：據報導，川普總統在 2 月與大陸國家主席習近平通話時，談到 對台軍售，請問這是否違反「六項保證」中的第二點，美國在制定軍 售前是否會與中華人民共和國事前諮商？答：那些報導出來後，白宮也被問到相同問題，他們非常明確地表 示，包括《台灣關係法》、三個公報和「六項保證」的美台政策，與 過去46年皆相同，我們的政策始終如一。\n\n白宮也表示，我們政策的架構，即保持美中關係穩定與美台夥伴關 係牢固，並不矛盾。我非常贊同這一觀點，我也認為，美中兩國，尤 其是在領導人層面，保持暢通的溝通，符合台灣的安全利益和兩岸和 平的利益。問：川習會前或會後，美方是否會對台灣做簡報？\n\n答：我不會評論我們的溝通細節。但我可以肯定地說，美國和台灣 在各個層面都保持著非常密切和持續的溝通，溝通管道非常暢通。"}, {"title": "看好無人機產業 雙方致力履行ART條款 谷立言：台美進入經濟合作黃金年代", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "中選會今復活 藍白各推公投 安樂死受矚目 國民黨鎖定鞭刑 民眾黨提善終法草案 外界預期挑戰敏感生死議題", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "8成安寧患者死在醫院 提倡在家善終 獎勵加碼至30%", "cat": "其他", "priority": 0, "summary": "台灣正式邁入超高齡社會，如何「死得其所」成為政策挑戰。據統 計，癌症、慢性病等使用安寧療護的患者，高達8成最後都是「死在 醫院」，僅2成得以在家走完最後一哩路。為提高居家安寧照護品質 ，衛福部預計今年提高給付獎勵最高30％，盼鼓勵醫護投入居...", "full_text": "台灣正式邁入超高齡社會，如何「死得其所」成為政策挑戰。據統 計，癌症、慢性病等使用安寧療護的患者，高達8成最後都是「死在 醫院」，僅2成得以在家走完最後一哩路。為提高居家安寧照護品質 ，衛福部預計今年提高給付獎勵最高30％，盼鼓勵醫護投入居家安寧 ，讓民眾更願意選擇在家善終。\n\n台灣安寧緩和醫學學會26日舉辦「臨終醫療與善終倫理的公共對話 研討會」。衛福部長石崇良指出，根據健保署統計，每年約10萬人使 用安寧緩和服務，高達8成都是在醫院住院時使用，僅約2成是返家進 行居家安寧，仍有進步空間。石崇良表示，希望推動臨終病患居家安寧，終結末期與衰弱病患「 家裡、急診、病房」的旋轉門效應。\n\n今年將推動「論值計酬」方案， 在既有的安寧療護給付基礎上，將安寧團隊實地訪視成果分成良、優 、特優三等級，依序給予 10％、20％、30％的加成，且須有 6 成是給 安寧療護的團隊。預計今年底辦理評核結果評定會議，據以發放獎勵 金。安樂死議題未解，近年更有「斷食」爭議。\n\n台灣安寧緩和醫學學會 理事長程劭儀表示，斷食是以主動加速死亡進程為目標，已非自然死 ，不符善終定義。理論上，斷絕食物與水分必須由病人自主決定，對 晚期與末期病人調整營養和水分，都是希望支持舒適度和生活品質， 不宜強迫飲食，也不應勉強斷絕食物與水分。程劭儀指出，台灣深受「不能餓死」觀念影響，家屬常將點滴視為 「沒有放棄治療」的生命線，導致醫療決策更為複雜，有的醫師還會 過度輸液，一天給3到5包的生理食鹽水。\n\n國內4家醫學中心共同研究發現，一天給1瓶點滴（約250到500毫升 ）的病人，「善終分數」比不給水分的病人好；這點在國際上也有共 識，在台日韓37家安寧病房約2000人的研究中，一天給1瓶點滴的患 者，善終情況最舒適。醫學會將參考這項結果，出版末期病人人工水 分營養臨床準則。"}, {"title": "官方看法 加工死有違醫生使命 衛福部不支持多數決", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "抗議監管雲 教團嗆石部長家先裝", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "變形團興起 禁團令剩政治宣示", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "假網購無卡提款詐騙 暴增4倍 僅需序號或掃二維碼就可秒領 立委籲調降額度 警盼禁網銀截圖降外洩風險", "cat": "其他", "priority": 0, "summary": "金融機構「無卡提款」功能，成為「假網購」詐騙集團新招。台北 市刑警大隊指出，詐團近期透過通訊軟體視訊截圖，取得被害人無卡 提款的二維碼，傳送給埋伏在提款機前的車手盜取現金，北市3月無 卡提領詐騙有95件，較2月的24件，暴增4倍。警方將與銀...", "full_text": "金融機構「無卡提款」功能，成為「假網購」詐騙集團新招。台北 市刑警大隊指出，詐團近期透過通訊軟體視訊截圖，取得被害人無卡 提款的二維碼，傳送給埋伏在提款機前的車手盜取現金，北市3月無 卡提領詐騙有95件，較2月的24件，暴增4倍。警方將與銀行等金融機 構協調，對金融APP螢幕截圖功能設限，降低二維碼外洩風險。\n\n無卡提款無需實體金融卡，透過銀行APP預約後，至提款機輸入序 號或掃描QR Code即可領現，無卡提款的序號與密碼就等同實體提款 卡。近期詐團利用無卡提款功能行騙，也引發立委關注，建議銀行降 低無卡提款限額，並建立異常提款延遲機制。據統計，北市自 114 年 9 月至 115 年 3 月，涉及無卡提款的詐騙案 449 件，大多始於網購平台與臉書社團，詐團扮演的假買家或假賣家，會 謊稱「因交易造成帳戶異常或被凍結」，要求被害人立刻操作無卡提 款功能，並提供「提款序號及密碼」，被害人一旦交出，車手約莫1 0至15分鐘內，就能成功盜領。\n\n此外，詐團也會利用LINE的視訊功能，要求被害人啟動「派對模式 」，被害人進入該模式後，手機畫面會同步分享給歹徒，當被害人打 開銀行APP顯示無卡提款的二維碼時，歹徒就會立刻截圖，傳給在提 款機旁待命的車手，若是遇到像郵局這類具有保護模式的APP，不能 透過視訊顯示二維碼或截圖，詐團也會改變話術，直接騙無卡提款的 序號及密碼。警方調查，無卡提款車手鮮少外籍人士，大多是本國籍，在詐團屬 於較核心的地位，深得集團信任。以往巡邏員警只要看見有人拿出多 張提款卡，便會加強盤查，無卡提款的車手身上沒有實體提款卡，作 案地點也不受限，打亂原本警方針對「提款熱點」的巡邏部署，增加 查緝難度。\n\n另外，整合多家銀行與電子支付的TWQR支付碼，同樣被詐團鎖定盜 刷。警方指出，將協調郵局、銀行與電支業者，推動在網銀 APP 的無 卡提款或電支頁面設定限制，防止螢幕截圖，避免被害人將重要畫面 傳送給詐團。"}, {"title": "未理賠可退保費 金管會要查 憂心健康險變儲蓄險，將偏", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "專家解析 防癌險強化被保險人保障 非退還現金", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "國銀激戰 富豪財管規模近2.4兆", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "台灣消費的寒冬", "cat": "其他", "priority": 0, "summary": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。\n\n這些年我們常會看到，經營許久的豆花店歇業，賣燈飾的小舖乏人 問津，很有口碑的咖啡館打烊，老字號的飯店吹熄燈號，...", "full_text": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。\n\n這些年我們常會看到，經營許久的豆花店歇業，賣燈飾的小舖乏人 問津，很有口碑的咖啡館打烊，老字號的飯店吹熄燈號，這些故事天 天在街頭上演，有人認為這是數位轉型的結果，其實這是消費走下坡 的徵兆。最近政府官員總以經濟成長、人均 GDP 超越日、韓而感到驕傲，不 少人都說股市熱絡會有財富效果，然而，去年民間消費低迷，哪來什 麼財富效果？依國民所得統計，1980年代民間消費平均每年成長9％ ，1990年代仍有7％，去年只有1.5％，股市大漲並沒有讓消費得到擴 張。\n\n財富集中日益嚴重去年經濟成長率8.7％，代表大家都更有錢了，何以消費弱到這步 田地？原因就在財富集中日益嚴重。當一億元為一人擁有，他一年再 怎麼花，終究花不完的，就算花個三千萬，還賸七千萬，消費能量怎 能不低？\n\n但當這一億分給一千人，每個人分到十萬後都會花光，一毛 不剩。同樣一億，一個人擁有與一千人擁有所創造的消費力道，哪個 大？不言可喻。\n\n辛棄疾說「千年田換八百主，一人口插幾張匙？」說的就是這個道 理，一個人再怎麼豪飲夜宴，再怎麼購買名車、買黃金珠寶，終究有 限，這就是何以有錢人消費傾向低，窮人消費傾向高的原因。多數人有個迷思，以為消費成長得靠有錢人，錯了，民間消費成長 的關鍵在於日常的小額消費，新車售價雖逾百萬，一年銷售不過7,6 00億，金飾珠寶有錢人最愛，一年不及400億，這些消費看似澎湃， 卻比不上小小一個便當。\n\n真的嗎？我們假設台灣有2,000萬人每天吃一個110元的便當，一年 下來便當的消費就高達8,000多億，比起汽車、珠寶黃金的消費多多 了。此外，依財政部統計，國人在咖啡館裡喝咖啡及買咖啡豆，去年 也花了300多億元，化妝品一年的消費更逾500億。\n\n這樣看來，吃便當 、喝咖啡、買化妝品這日常開銷比起買名車、買黃金珠寶對民間消費 的貢獻更大。日常開銷動能 走下坡然而，當國內有七成的人領不到平均薪資，工作貧窮日趨普遍，人 們就得省吃儉用，少吃一個便當，少喝一杯咖啡，少買一些化妝品， 看似小小的撙節，卻在無聲無息中窒息了消費動能。咖啡館、精品店 、書店、餐廳、文具店生意一落千丈，豈偶然哉？\n\n1980～2000年的台 灣沒有今天這麼有錢，可是消費活力遠勝於今天，原因就在於那個年 代GDP果實人人能分享。隨著資本經濟洗牌，贏者圈愈來愈小，貧富 差距愈來愈大，如此就算經濟成長、人均GDP睥睨全球，民間消費也 難以振衰起蔽。最後，拿民間消費占GDP比率與各國比一下，2000年台灣55％，低 於美國，而高於日、韓，消費是推升GDP的重要動能，去年台灣民間 消費占GDP比率降至43％，非僅不如日、韓、美，也拖累經濟成長。\n\n二十多年來到底發生什麼事，台灣消費動能何以一降再降，值得深思 。小檔案■依財政部營利事業銷售資料，2025年全新汽車零售額7,6 70億元。其他化妝品零售536億，香水及香粉零售6億。\n\n金銀飾零售2 45億、珠寶零售83億、金（銀）條及金（銀）塊及金（銀）幣金（銀 ）錠零售額30億。小檔案■辛棄疾：「千年田換八百主，一人口插幾張匙？」明詩： 「任君蓋下千間舍，一身能臥幾張床？\n\n」皆在說明一個人只有一張口 、一個身子，再怎麼消費，終究有限，萬貫家財集於一人之身，既無 處可消費，最後皆成為儲蓄，無法推升GDP。"}, {"title": "3月信保融資金額 五年半次高", "cat": "其他", "priority": 0, "summary": "今年雖有諸多不確定性，但主要機構預估今年國內景氣仍亮眼，企 業投資需求帶動資金潮，且 3 月因季底因素，及關稅不確定性及戰爭 等隱憂影響，企業融資需求大幅升溫。信保基金統計，3月承保金額 1,456.12億元，協助取得融資金額大增至1,74...", "full_text": "今年雖有諸多不確定性，但主要機構預估今年國內景氣仍亮眼，企 業投資需求帶動資金潮，且 3 月因季底因素，及關稅不確定性及戰爭 等隱憂影響，企業融資需求大幅升溫。信保基金統計，3月承保金額 1,456.12億元，協助取得融資金額大增至1,740.62億元，終止連二月 下滑，且創2020年8月來逾五年半次高水準，已連37個月單月均破千 億元。根據信保基金統計，去年融資金額1兆7,933億元，刷新史上最高紀 錄，今年融資金額不墜，第一季累計高達4,521.41億元，超越去年同 期3,835.21億元，創下史上同期新高紀錄，且年增幅達17.9％。\n\n銀行高層認為，今年國內景氣持續亮眼，包括主計處及央行等機構 都上修全年經濟成長率，中小廠商受到帶動，投資融資需求延續下， 信保每月融資金額仍會在相對高點。信保基金今年融資金額目標為 1.34 兆元，觀察信保統計，目前信保 融資金額每月至少都在 1,500 億元上下，以此估算，第三季應能提前 達成目標，全年再刷新史上新高機率大。信保強調，仍會配合政府推 行相關政策及專案而有所調整。\n\n銀行主管指出，3月是季底資金需求高峰期，又有關稅及戰爭等因 素，影響進口成本上揚，導致整體信保融資金額增加，4月影響逐步 趨緩，但廠商融資需求持續，整體金額應是持平，預期仍維持高檔表 現。銀行主管分析，國內出口超旺，3 月已經拉出連 29 紅，今年成長氣 勢可望持續，但仍須留意後續關稅影響，傳產接單仍不穩定。另外， 美伊戰爭雖利空鈍化，但打亂資本市場布局，是否對全球通膨帶來壓 力仍待觀察，將是今年投資動能變數。"}, {"title": "國人信用卡月費 十年增幅逾3成", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "亞資中心業務 拚全台落地 金管會7月起開放部分項目全國適用 市場看好家族辦公室、境外私募基金銷售先放行", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "公股銀放款中小企業 衝高 金額突破5.8兆元 年增2.4%兆豐、一銀成長最多 彰銀也揚升4.25%", "cat": "其他", "priority": 0, "summary": "截至今年2月底，國銀對中小企業放款餘額達10兆9,324億元，其中，前六大放款餘額皆由公股銀行包辦。合計八大公股銀行對中小企業放款餘額已突破 5.8 兆元，與去年同期相比年增 2.47%，從餘額年增率來看，兆豐銀、一銀分別年增6.45%及5...", "full_text": "截至今年2月底，國銀對中小企業放款餘額達10兆9,324億元，其中，前六大放款餘額皆由公股銀行包辦。合計八大公股銀行對中小企業放款餘額已突破 5.8 兆元，與去年同期相比年增 2.47%，從餘額年增率來看，兆豐銀、一銀分別年增6.45%及5.92%最多；臺銀、華銀、土銀則較去年同期相比略有衰退。\n\n根據金管會統計，截至今年2月底止，公股銀行對中小企業放款餘額當中，第一銀行放款餘額突破兆元大關、來到1兆152億元最高，其次是合庫銀行8,569億元、台灣企銀8,205億元緊追在後，華南銀行、兆豐銀行分別以7,587億元、7,429億元位居第四、第五名。合計八大公股銀行對中小企業放款餘額已突破 5兆8,881億元，占整體國銀比重超過五成。若以放款餘額與去年同期相比，兆豐銀行對中小企業放款餘額年增6.45%最多，其次是第一銀行年增5.92%，彰化銀行也年增4.25%；\n\n至於臺銀、華銀、土銀則較去年同期略有衰退，分別年減2.03%、1.73%及0.97%。針對中小企業放款餘額年減的主因，土銀表示，主要是因建築貸款受政府控管不動產授信政策影響，及建築貸款完工還款所致；華銀則表示，近年拓展中小企業新戶，以均衡資產及獲利結構為主軸，目前仍在調整過程，致中小企業放款餘額較去年同期略為減少。\n\n兆豐銀行指出，整體資金需求主要反映總體經濟環境變化，受惠於人工智慧應用持續發展，相關供應鏈及周邊產業資金需求相對穩定，另外，美伊戰爭情勢已從區域衝突升級為全球能源與供應鏈的系統性風險，因航程延長、運費飆漲造成高油耗與進出口依賴度高的產業成本及資金周轉壓力，相關產業放款需求也增加。第一銀行則指出，中小企業新增放款又以製造業最為突出，受惠全球景氣回溫，營運資金、周轉性融資需求增加，同時部分企業配合政策性貸款與補助方案，提升整體融資意願；放款減少較多的產業則是住宿及餐飲業，主要是因疫情期間申辦的紓困貸款陸續到期並完成清償所致。\n\n合庫銀行也說，中小企業放款增加較多的產業分別為電力供應業及不動產開發業；減少較多的產業則是短期住宿業、水產品批發業，增減原因主要是受到產業市場變化、景氣循環等因素影響。台企銀則以電力供應業（離岸風電為大宗）與AI應用相關產業表現最為突出。"}, {"title": "台日產業政策鏈結 聚焦5領域合作", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯...", "full_text": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯學的局勢下，台日基於戰略同盟所擘劃的國家級產業政策鏈結，換言之，台日合作已從民間企業自發行為，上升到國家產業政策的高度。產發署說明，該計畫鼓勵台日企業投入具前瞻性、創新性及應用潛力的研發合作專案，聚焦五大領域，一是智慧科技，包括光電及半導體技術、人工智慧、物聯網、第五／第六代行動及衛星通訊技術、資安與數位應用服務等；\n\n二是智慧製造，涵蓋高階自動化、工業機器人技術、先進製程整合等；三是材料與生物科技，包括奈米材料、高機能材料、綠色化學、生技醫藥、光電融合材料、重要礦物等；四是自主移動載具，包括無人機、無人車、服務型機器人等；\n\n五是綠能科技，包括儲能系統、再生能源、節能減碳設備技術與服務等。產發署說，為確保計畫品質與雙邊合作實效，技術審查著重四大面向，一是計畫整體可行性與執行能力，二是技術瓶頸突破性、預期成果成熟度與未來商品化應用潛力及國際市場需求的對接性，三是台日雙邊互補與互利的合作效益，四是符合本次徵案的五大重點補助領域。產發署補充，這項計畫申請時程自公告日起至今年六月三十日止，申請標的僅適用於企業尚未開發的研發計畫；\n\n合作的日本廠商資格須是在日本當地有營業登記的企業，並已向日本政府提出與本計畫合作相關的申請補助。"}, {"title": "打敗大盤 台股熱 主動式ETF規模狂飆 擁有主動選股優勢 第一季整體規模達2982億元、季增72%", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "金管會祭台積電條款 台股今拚4萬點 法人：慎防震盪", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股 價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬 點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬 點「一定會到」，但根據過往經驗，近關情怯恐難避免，...", "full_text": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股 價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬 點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬 點「一定會到」，但根據過往經驗，近關情怯恐難避免，屆時中小個 股震盪幅度勢必加大，仍須慎防殺盤。\n\n金管會放寬股票型基金、主動式ETF對台積電持股上限，帶動24日 台積電股價以2190元及2185元創下盤中及收盤新天價，推升台股盤中 攻上38989.94點新高，終場勁揚1218.25點，創下史上第5大單日漲點 ，以38932.4點作收，再創收盤新高，接下來將直取4萬點。法人指出，美伊戰事還在打，美國總統川普每天講的也都不一樣， 但市場對此利空似乎已經鈍化，台股更在AI題材加持下，持續走自己 的路，美股24日多數收紅，那斯達克和標準普爾500指數再度改寫歷 史新高，外在環境都營造台股持續走高的能量。富邦投顧董事長陳奕光指出，金管會放寬股票基金、主動式ETF對 台積電持股上限，可望帶動台積電股價走高，加上台積電權值高，將 帶動台股挑戰4萬點大關，甚至更高；\n\n而美股4大指數近期創新高，台 股會有比價效應，只要前波高點35579點未跌破，仍屬偏多格局。永豐投顧則說，外資持續加碼，內資受主動式ETF持續加碼買入， 融資融券同步增加，多頭氣勢充足，而台股在上周五成功收復上影線 站上歷史新高後，可先觀察能否站穩38900點，若能成功站穩，上攻 空間就可打開。也有法人認為，在台積領軍下，台股出現「漲不停」的大多頭行情 ，但居高思危的壓力並非沒有，以台股上周五大漲 1218.25 點來看， 台積電、台達電、聯發科三檔就貢獻了 1020的漲點，同時卻有 1224檔 股票下跌，有84檔股價還創月新低，顯示極不均衡。\n\n法人指出，大盤乖離率過高，且因短時間內急速暴漲，市場浮現「 擦鞋童理論」疑慮，當開戶人數、交易人數屢創新高，貪婪情緒升溫 ，隨時都可能反轉下殺，就像上周四出現衝高後急殺，高低點價差1 757點，這種震盪隨台股愈近4萬點，愈有可能頻繁發生。"}, {"title": "財經會客室 跨境支付 讓世界更易走進台灣", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "數位帳戶十年 走入打詐死胡同 交易額度下降 嚴審開戶市場飽和", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "純網銀助攻 延續數位帳戶熱潮", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "川普取消特使：伊朗想談可打電話", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "導】美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談 行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川 普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願 ，但拒絕被迫接受條件。\n\n川普取消派出特使威特科夫...", "full_text": "導】美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談 行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川 普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願 ，但拒絕被迫接受條件。\n\n川普取消派出特使威特科夫（Steve Witkoff）和女婿庫許納（Ja red Kushner）擔任談判特使，他解釋因認為伊朗提出願意達成和談 的條件不足，不想兩人為此奔波與浪費開銷。川普在社交平台Truth Social發文，伊朗領導層存在極嚴重的權力 鬥爭，內部混亂至連包括其高層在內，都沒人知道目前由誰主導伊朗 局面。現在所有談判籌碼都由美國掌握而非伊朗。\n\n若伊朗真想和談， 只要給他打電話就行。他說，在取消特使的談判行程後十分鐘，就收到伊朗提出更多讓步 。雖然這些讓步仍不足夠，但川普仍暗示雙方28日再進行談判的可能 。\n\n伊朗總統裴澤斯基安（Masoud Pezeshkian）重申願意談判，但拒 絕在面對壓力和威脅下被迫與美國談判，也不接受對方單方面提出的 條件，表示目前伊朗領導層既沒有強硬派，也沒有溫和派，警告若談 判破局就不排除軍事行動。此外，除非美國停止敵對行動和施加壓力 ，應該首先解除包括海道封鎖等障礙，雙方才能開始坐下來談判。伊朗提出的四大訴求，包括安全保障、持續推進核計畫並保留高濃 縮鈾、解除制裁、和2月底以來的戰爭賠償。\n\n美國則堅持伊朗不得擁 有核武，並持續封鎖其港口。"}, {"title": "和談未明 川普：伊朗不擁核才能協議 美代表團取消赴巴基斯坦 伊朗外長又重返巴國：不在施壓下談判", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "美伊各認占上風 談判卡關", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "陸前談判代表：中美有分歧 也尋共同利益", "cat": "其他", "priority": 0, "summary": "美國總統川普預計五月中訪問中國大陸。對於中美關係，大陸外經貿部前副部長、前首席談判代表龍永圖廿六日表示，強者和弱者不太可能相互尊重，但這些年來中國迅速發展，中美實力差距縮小，兩國相互尊重、平等相待已有基礎。中新社報導，龍永圖廿六日在北京出席...", "full_text": "美國總統川普預計五月中訪問中國大陸。對於中美關係，大陸外經貿部前副部長、前首席談判代表龍永圖廿六日表示，強者和弱者不太可能相互尊重，但這些年來中國迅速發展，中美實力差距縮小，兩國相互尊重、平等相待已有基礎。中新社報導，龍永圖廿六日在北京出席第十二屆中國與全球化研討會表示，中美是全球最大的兩個經濟體，中美關係好，有利於全球化發展。\n\n他指出，目前中美兩國雖然還有很多分歧，但由於雙方力量對比日益縮小，也有通過交流尋求共同利益的願望，因此他對兩國關係前景保持樂觀。龍永圖認為，中美兩國必須互相尊重、平等相待。由於歷史文化、社會制度和意識形態的不同，中美兩國肯定會有分歧甚至衝突。\n\n不過，只要加強溝通，中美就可以減少許多誤判，從而使關係保持一個理性、穩定的狀態。龍永圖說，儘管「世界大得很，事情複雜得很」，但中美兩國總能從複雜的利益交織當中找到共同利益。他指出，共同利益找到了，雙方就可能建立穩定、健康、可持續關係。"}, {"title": "川普取消特使赴巴 美伊談判停擺", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先...", "full_text": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先預測，美伊雙方25日將針對結束戰爭、推動停火協議進行協商，不料伊朗外長阿拉奇（AbbasAraghchi）僅與巴基斯坦官員會談後便離開伊斯蘭馬巴德，阿拉奇稱，巴基斯坦之行成果豐碩，但他對華盛頓的意圖表示懷疑。\n\n伊朗國家電視台稱，阿拉奇沒有與美國官員會面的計畫，巴基斯坦將扮演傳遞提議的管道角色。路透報導，川普 25 日決定取消美國特使魏科夫（Steve Witkoff）和女婿庫許納（Jared Kushner）的訪問計畫，因為會談涉及過多的差旅和費用，而且伊朗最新的和平提議對他來說還不夠好。川普說，「我們掌握了所有籌碼。\n\n他們（伊朗）隨時可以聯繫我們，但我們不會再為了閒聊而飛 18 個小時了。」當被問及取消行程是否意味著戰火將重燃時，川普回應說：「不，這並不意味著戰爭會再次爆發。我們還沒有考慮過這個問題。\n\n」川普並表示，在他宣布取消訪問後，伊朗提交了一份修改後的方案，但還不夠好。根據伊朗通訊社（IRNA）報導，裴澤斯基安25日與夏立夫（Shehbaz Sharif）通話時，解釋了阻礙外交進程的因素。他強調，只要美國的敵對行動和軍事壓力持續存在，「重建信任和推進對話進程將面臨巨大困難」。\n\n裴澤斯基安表示，伊朗僅要求在國際法框架內維護本國合法權利，並未提出超出此框架的任何訴求。巴基斯坦總理辦公室發布聲明稱，兩國領導人就當前地區局勢以及為促進區域和平與穩定所做努力交換意見。另外，伊朗最高領袖穆吉塔巴．哈米尼（Mojtaba Khamenei）25日晚上在社群媒體上發文，敦促「伊朗南邊鄰國」認清形勢，作出正確判斷，對「邪惡勢力」的虛假承諾保持警惕。"}, {"title": "伊朗：荷莫茲不恢復戰前狀態", "cat": "其他", "priority": 0, "summary": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日...", "full_text": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返回伊朗。真主黨一再敦促黎巴嫩退出停火談判，並警告任何協議都將缺乏全國共識，最近以色列發動的強力攻擊，進一步考驗與黎巴嫩之間脆弱的停火協議。\n\n黎巴嫩衛生部25日公佈的數據顯示，自3月2日黎以戰火重燃以來，以色列對黎巴嫩發動的攻擊已造成2496人死亡。以色列軍方稱，6名死者都是真主黨成員，包括消滅3名駕駛著裝滿武器車輛的真主黨成員，以及一名騎電動機車的真主黨成員，並在其他地點擊斃另外兩名武裝人員。另外，美軍中央司令部25日發聲明說，當天早些時候，美軍平克尼號飛彈驅逐艦出動直升機攔截一艘受到美國制裁的商船。\n\n據了解，這艘名為塞凡號（M／V Sevan）的油輪，是美國財政部24日制裁的19艘與伊朗有關的「影子艦隊」船隻之一，制裁原因是這些船隻涉嫌向海外市場運輸價值數十億美元的伊朗能源、石油和天然氣產品，包括丙烷和丁烷等。中央司令部指出，美軍持續執行進出伊朗港口船隻的封鎖。自封鎖措施實施以來，已有 37 艘船隻被迫改變航道。\n\n美伊雙方持續對荷莫茲海峽進行封鎖，已造成國際能源價格居高不下，據伊朗媒體 26日報導，伊朗伊斯蘭議會第二副議長尼克札德（Ali Nikzad）表示，伊朗最高領袖穆吉塔巴已明確下令，荷莫茲海峽不得恢復戰前狀態。"}, {"title": "全球超級央行周 利率料全數按兵不動", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "美關鍵參議員不再阻撓 華許接掌Fed最大障礙沒了", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "導】美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查， 替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙 。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員 會與全院擁有充足時間批准他的任命案。美...", "full_text": "導】美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查， 替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙 。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員 會與全院擁有充足時間批准他的任命案。美國哥倫比亞特區檢察官皮洛（Jeanine Pirro）上周表示，已要 求聯準會監察長仔細審查總部裝修超支問題後結束調查，但強調「若 事實證明有必要，也會重啟調查」。\n\n司法部撤銷對鮑爾的調查，為華許提名案在國會通過鋪平道路。北 卡羅來納州共和黨參議員、手握參院銀行委員會關鍵一票的提里斯（ Thom Tillis）26日表示，願意結束對聯準會主席提名人華許的阻撓 。共和黨在參院銀行委員會擁有13比11的多數席位，提里斯的投票非 常重要，因所有民主黨議員都拒絕在在華許21日的聽證會上，提里斯將寶貴質詢時間用於解釋翻修成本 ，而非盤問這位提名人，他表示：「你的資歷非常出色，無可挑剔。\n\n讓我們結束這項調查，我才能支持你的任命案。」皮洛保留「重新啟動調查」權利的說法引發質疑，調查究竟是真的 結束或僅是暫停？鑒於川普政府處理其他法律案件的立場反覆無常， 兩者差別對鮑爾而言十分重要。\n\n鮑爾的任期將於5月15日屆滿，稍早他曾表示，若屆時繼任者尚未 就任，將繼續代理主席。此外，鮑爾身為Fed理事的任期要到2028年1月才會結束。依慣例， 卸任主席在繼任者宣誓就職時，也會一併辭去理事，但法律並未強制 要求。\n\n若鮑爾留任理事，便可繼續作為決策單位聯邦公開市場委員會 （FOMC）投票成員，一直到美國期中選舉甚至是川普第二任期最後一 年。"}, {"title": "Fed本周開會 將以「鷹眼」緊盯通膨訊號 鮑爾可能暗示降息門檻高", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "點擊查看詳情", "full_text": ""}, {"title": "荷莫茲封閉 金融市場掀連鎖反應 波灣各國主權基金重新評估支出次序 優先聚焦國內經濟 恐衝擊全球投資交易", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "超級央行週 美英歐日料利率不變", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "緊盯通膨 Fed年底前降息 門檻很高 美國及G7央行本周舉行決策會議 預料利率不變", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "點擊查看詳情", "full_text": ""}, {"title": "荷莫茲效應 凸顯全球化未告終 油價、糧食及供應鏈危機從美中到非洲都不能倖免", "cat": "台灣產業與投資動向", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "美伊戰事未解 衝擊AI發展前景", "cat": "台灣產業與投資動向", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "動能改善 陸GDP增長 外資機構上調至4.9% 全球地緣政治風險上升之際 看好人民幣資產由「可選配置」轉向重要組成", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "點擊查看詳情", "full_text": ""}, {"title": "科技巨頭財報周登場 牽動市場波動 超級央行周 鮑爾最後談話成焦點", "cat": "其他", "priority": 1, "summary": "全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed ）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日 中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時 持平，但政策訊號將為後續利率走向提供重要線索。日銀決策...", "full_text": "全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed ）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日 中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時 持平，但政策訊號將為後續利率走向提供重要線索。日銀決策28日率先登場，市場預估將維持短期利率在0.75％不變。\n\n儘管政策本身不變，但外界普遍預測日銀可能透過會後聲明或季度報 告釋出偏鷹訊號，為最快6月升息鋪路。隨後聯準會將在台北時間30日凌晨公布利率決議，市場預估利率仍 維持在3.5％至3.75％。在燃油成本飛漲的情況下，美國開始出現延 後徵才、消費者信心走弱的跡象。\n\n分析稱，即便油價漲勢趨緩，整體 物價仍處高檔，短期內不適宜降息。芝商所FedWatch工具亦顯示，聯 準會年底仍維持現行利率的機率超過60％。值得留意的是，聯準會主席鮑爾將主持卸任前最後一場利率會議。\n\n美國司法部上周末宣布撤銷對鮑爾的刑事調查、接任人選華許的任命 程序也隨之推進，聯準會正處於世代交替的動盪期，市場格外關注鮑 爾在會後記者會釋出的政策訊號與經濟評估。中央大學經濟系教授吳大任分析指出，近期國際油價因中東局勢波 動，相較前波高點已有回落，惟對美國通膨確實帶來影響，以最新數 據來看，美國3月消費者物價指數（CPI）年增率約3.3％，未回到2％ 的設定目標，顯示通膨壓力仍未解除。在此背景下，聯準會「這次最 可能還是維持利率不變」，並持續觀察4月及後續CPI走勢，再決定下 一步動作。\n\n歐盟與英國央行則將於30日傍晚壓軸公布決策。市場預期兩者本次 會議同樣維持利率不變，但對未來政策路徑的指引將成為焦點。路透 調查顯示，超過半數經濟學家預期歐洲央行可能在6月啟動升息，以 應對中東衝突帶來的能源衝擊及通膨壓力，目前歐元區通膨已明顯高 於2％目標。\n\n英國央行則被認為今年內大致維持現行利率水準，但市 場已上修對通膨的預期。央行決策外，本周同時迎來「超級財報周」，科技與製造業龍頭企 業密集發布業績。大型科技股中，Alphabet、三星、微軟、蘋果、亞 馬遜及 Meta 都將公布季度財報。\n\n市場普遍認為 30 日將成為本周最關鍵 時點，央行決議、企業財報與多項經濟數據集中公布，市場波動可能 因多方訊號進一步放大。"}, {"title": "數位ｘ淨零的綠色整合方案", "cat": "其他", "priority": 0, "summary": "究所所長）當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台灣正處於「既要發展AI，又要落實減碳」的關鍵十字路口。近期舉行的「2026淨零城市國際峰會」中，我站在法人研發的前線觀察到：未來...", "full_text": "究所所長）當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台灣正處於「既要發展AI，又要落實減碳」的關鍵十字路口。近期舉行的「2026淨零城市國際峰會」中，我站在法人研發的前線觀察到：未來核心競爭力不在於兩者間的權衡，而在於能否掌握「數位×淨零」雙軸轉型能力，將電力消耗轉化為智慧成長動能。\n\n數位與綠色的結合，首先體現在建築空間的轉型。面對減碳最關鍵的場域，我們在設計階段便能運用能源模擬技術（如BESTAI）預測能耗，協助企業精準路徑規劃。實務上再結合AI電力感測（如Power Tab），以非侵入方式實現用電行為的可視化管理。\n\n這種從「可預測」到「可治理」的轉變，才是落實建築淨零的核心路徑。AI時代，算力已成國家競爭力指標，但隨著硬體規格升級，散熱需求也急遽攀升。當最新一代 NVIDIA晶片功耗直逼1,500W時，傳統氣冷散熱已達極限，液冷系統則伴隨高成本與漏液風險。\n\n對此，工研院開發出的「3D鋁製微流道熱虹吸散熱技術」，其提供現有機房「無痛升級」：企業更換高算力晶片時，無需改變建築結構或機房設施，散熱器於相同體積下即可穩定處理1,500W熱量，以極低成本換取頂級算力運行。針對未來晶片功耗突破2,000W的挑戰，我們也進一步部署「低壓冷媒兩相流冷板」技術。淨零轉型除了綠能總量外，電力系統是否具備足夠韌性也是關鍵，而這仰賴數位化與即時調控能力的提升。\n\n傳統電力系統強調集中式電廠與剛性輸配電網架，但在分散式與間歇式能源普及的今天，我們必須推動「微電網（Microgrid）」與「虛擬電廠（VPP）」雙管齊下。前者強化區域層級的供電韌性，後者則透過數位平台聚合分散資源，提升整體電網的調度彈性。以工研院為例，我們於南分院建置的微電網示範系統，實際整合再生能源預測與儲能調控，確保在電網不穩定甚至孤島狀態下，區域電力仍能韌性供應 。\n\n同時，我們透過「虛擬電廠平台」，有效聚合分散於各場域的再生能源、儲能與可調控負載，將原本零散、被動的用電與發電資源，轉化為可即時調度的彈性電力。另外，我們已成功將連鎖零售通路的冷凍設備化作「冷能電池」，在不影響保鮮前提下，於電網尖峰啟動數位調度，有效降低尖峰負載達5%以上。能源供應端的「脫碳」是達成2050淨零目標的終極戰場。\n\n台灣發展再生能源面臨間歇性供電挑戰，具備長時儲能特性、能跨越季節限制的「氫能」，遂成為重塑國家能源安全的關鍵戰略。目前工研院在台南沙崙建構的「氫應用示範驗證平台」，已邁向大規模產業驗證。面對2050淨零目標，我們不只是在研發技術，更是在構建一個高韌性的永續系統。\n\n台灣不僅能實踐自身的減碳承諾，更有機會在全球淨零賽道中，輸出一套以「數位×淨零」為核心的綠色整合方案，引領產業邁向高效能、低碳排且具競爭力的新時代。"}, {"title": "石油期貨價格是騙人的？", "cat": "其他", "priority": 0, "summary": "布蘭特期貨油價又回升到每桶100美元以上，但相對於中東戰爭所造成的干擾，國際油市似乎出奇樂觀，尤其是較長期的石油期貨。開戰以來，近月期貨價格已上漲43%，2027年期貨卻僅上漲17%。對於這種情況，頁岩油業者Diamondback能源公司執...", "full_text": "布蘭特期貨油價又回升到每桶100美元以上，但相對於中東戰爭所造成的干擾，國際油市似乎出奇樂觀，尤其是較長期的石油期貨。開戰以來，近月期貨價格已上漲43%，2027年期貨卻僅上漲17%。對於這種情況，頁岩油業者Diamondback能源公司執行長霍夫直言，「遠期油價其實是在騙人」。\n\n這次石油市場受到的干擾，只有1956年發生的蘇伊士運河危機差堪比擬。過去兩個月來，全球已抽用5億桶庫存石油，相當於全球總庫存量的6%。到6月時，全球庫存量可能減少10%-12%，超過以往歷次的減幅。\n\n動用庫存，無疑是證明石油市場供給緊俏，期貨價格理應上漲。但期貨價於4月初達到頂峰後，即便荷莫茲海峽依然實質關閉，使庫存量持續減少，市場卻反而出現賣壓。直覺上看，這顯示市場對於目前的停火可能演變成持久的和平相當樂觀，荷莫茲海峽不久就能重新開放。\n\n牛津能源研究所專家鮑喬夫最近的報告指出，箇中原因包含技術因素。他發現，伊朗戰爭剛爆發時，避險基金大量累積近月期貨，帶動價格大漲。1個月與6個月期貨的逆價差在2月底時僅每桶2美元，到4月初時已擴大到約35美元，之後各國釋出戰略儲油，以及美國總統川普不斷放話，迫使許多避險基金4月初時賣出期貨，以控管風險、或獲利了結。\n\n鮑喬夫警告，這種「震撼吸收器」可能不會持續，尤其是在中東戰爭再度升高之際。即便戰局仍維持現狀，但庫存持續下降將引爆另一波買氣。在最樂觀情境下，即荷莫茲海峽立刻重新開放，仍要經過好幾個月才能清理完積壓的裝運工作，之後再出清波灣貯存的石油，最後才是使關閉的油井恢復生產，這要為時數月才能完成。\n\n儘管提用庫存的速度將會減緩，但庫存仍將減少。然而，目前戰局並非如此樂觀，而且荷莫茲海峽遭到美國與伊朗的雙重封鎖。達拉斯聯邦準備銀行對美國石油業主管的最新訪調顯示，80%受訪者預期荷莫茲海峽無法在8月前恢復正常，40%的受訪者預料要拖到11月之後。\n\n而且，逾50%受訪者預期今、明兩年美國石油產量成長將相對較小。這段真空期愈久，未來就需要愈長的時間重建庫存，因此較長期的期貨價格將會上漲，才能鼓勵業者增加產量，或發生「需求毀滅」現象，才能使庫存恢復正常。我們不知道庫存究竟再降低多少，才可能在期貨市場引發新一波的恐慌性買盤。\n\n但幾乎能確定的是，石油現貨與期貨價格的差距將愈來愈大。"}, {"title": "華許不蕭規曹隨，但動作空間有限", "cat": "其他", "priority": 0, "summary": "美伊戰事持續著，但是華爾街已經對戰爭「脫敏」了，美股再創新高。美債走弱，收益率向上，債市資金對戰事還是擔心的。石油價格被美伊談判進程和社交媒體上的宣傳戰所左右，作大幅上下震盪。\n\n美元匯率貶值後再度走強，黃金白銀回吐，比特幣向好。美股迭創新...", "full_text": "美伊戰事持續著，但是華爾街已經對戰爭「脫敏」了，美股再創新高。美債走弱，收益率向上，債市資金對戰事還是擔心的。石油價格被美伊談判進程和社交媒體上的宣傳戰所左右，作大幅上下震盪。\n\n美元匯率貶值後再度走強，黃金白銀回吐，比特幣向好。美股迭創新高，那斯達克和S&P500所製造出來的周連升記錄，可以追溯到2022年。此時此刻美伊戰爭仍在進行中，石油價格比戰前高出四成，生活成本暴升嚴重侵蝕中低層收入家庭消費信心，而天然氣、化工品、化肥、氦氣、鋁等中間產品正在製造供應鏈危機，但是美股對此卻選擇視而不見。\n\n市場對戰爭開始顯得無動於衷，定價戰事不久便會結束。美股上漲，有一定的道理。美國是能源淨出口國，幾乎不從荷莫茲海峽進口石油天然氣，最近反而接到亞洲國家大量石油急單、歐洲天然氣急單，美國的能源供應不受衝擊，只是價格上漲了。\n\n其次，上市公司的盈利狀況良好，從AI巨企到大型銀行多數盈利超預期。那麼美國經濟是不是真的可以對戰爭無動於衷呢？其實市場存在著分歧。\n\n美股早已創出新高，但是債市卻沒有那麼樂觀，現在的10年期收益率仍比戰前的4%水準仍然高出30至40百分點。換言之，債市對物價前景、政策利率前景持審慎態度，對政府控制赤字的能力也不樂觀。在戰爭與能源價格上，筆者更相信債市。\n\nAAA協會統計，美國平均汽油價格每加侖4.06美元，比戰前的2.75美元上漲了接近五成，對於收入水準處於Alice Threshold（Asset Limited，Income Constrained，Employed，大陸讀者更熟悉的表述叫「斬殺線」）之下的42%美國家庭，戰爭對消費信心的衝擊是巨大的。上周，白宮提名的聯準會主席候選人華許參加了參議院銀行委員會提名聽證，司法部旋即撤銷對現任聯準會主席鮑爾的指控，為他坐上貨幣政策頭把交椅掃清了最主要的障礙。華許聽證會上民主黨議員對其火力全開，不過真正有意義的話題集中在兩點上：一、是不是白宮的傀儡；\n\n二、如何重塑聯準會。儘管川普對現任聯準會主席鮑爾的極限打壓以及暗示華許降息對經濟的重要性，華許對此一口否認，「總統從來沒有要求我承諾作出任何特定的利率政策。如果他有這類要求，我也絕不會答應，但是他從未這麼要求過」。\n\n華許與川普之間是否存在默契和有什麼默契？不得而知，不過起碼在這個問題上他可以過關。至於入主聯準會後會怎樣重塑美國貨幣當局，華許就明白表達了希望作出架構改變（regime change）的想法，有意在聯準會如何衡量通膨、如何與外界溝通上作調整。\n\n他反對前瞻性指引，也反對例會前已經燙平了的政策立場，揚言喜歡更混亂（messier）的政策討論乃至觀點交鋒。這是對葛林斯班時代以來，高透明度、按部就班式政策管理模式的一次全面修正。就市場而言，不確定性更大了。\n\n華許一直主張重新定義與財政部的關係，認為維持經濟穩定和市場穩定的短期工作應該交由財政部處理，聯準會則應堅守穩定物價和就業最大化的雙重目標，除此之外不應該「管得寬」。如果華許未來把控聯準會政策，他的政策焦點會比前幾任更狹窄、更專注於國會賦予的「雙目標」和銀行最終借貸人角色。至於他對降息和縮表的立場，反而沒有成為聽證會的焦點，畢竟短期政策受到一系列不確定性的影響。\n\n筆者的預判是華許以不變應萬變起勢，既不降息也不縮表，根據就業、物價及金融市場的動向逐漸切入。縮表是他的長期目標，並不急於推開，而降息暫時條件尚不成熟，除非出現金融動盪。從管制理念到政策意境，華許都不是「蕭規曹隨」的人物，但是目前環境下迅速出手的限制太多。\n\n本周是央行大周，美、歐、日、英央行分別召開例會，聚焦點是鮑爾 5月15日卸任前的最後一次記者會，聯準會利率不會有變，但鮑爾留下了2020年QE和與川普恩怨等歷史遺產。日本銀行看來4月未必升息，但是植田和男記者會上的言論對市場判斷5月利率形勢頗為重要。歐洲央行和英格蘭銀行估計也不會動利率，不過行長在記者會關於通膨的立場仍需留意。\n\n除此之外，關注美伊談判。資料方面，美國PEC通膨預計升至3.5%。美國和歐元區GDP資料出爐。"}, {"title": "自由廣場》國安修法防敵對動員 也要嚴守法治邊界", "cat": "其他", "priority": 0, "summary": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。\n\n草案針對以文字、聲音、影像等方式，...", "full_text": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。\n\n草案針對以文字、聲音、影像等方式，公開鼓吹、倡議或支持外國、中國、港澳或境外敵對勢力，對中華民國發動戰爭，或以非和平手段消滅中華民國主權者，可處行政罰。這個事實說明，爭點不在一般政治意見，而是敵對勢力的暴力目標能否被包進言論自由。既然牽涉言論，政府更不能只喊國安。\n\n誰來認定、如何認定、如何救濟，都必須寫清楚；若涉及網路內容處置、限制接取或命令改正，更應有明確門檻與司法監督。國安名義越大，行政權越要受檢驗，法治邊界才不會被擠壓。\n\n在野黨質疑構成要件不明、行政權過度集中，不能用一句「反國安」打發；但這項質疑也不能倒過來替鼓吹武力滅國找藉口。若把公開支持敵對政權以戰爭或非和平手段消滅台灣主權，全都塞回言論自由，實質上就是要求民主制度替自己的解體放行。\n\n成熟民主不是沒有紅線，而是紅線必須窄、準、可受檢驗。批評政府、主張政策、討論統獨，應受保障；鼓吹敵對勢力以暴力或非和平方式消滅主權，則應被排除。\n\n界線劃不好，政府會被懷疑擴權；完全不劃，國安防衛就會被敵對宣傳反覆測試。國安修法要快，更要準。\n\n政府不能拿國安換取空白授權，在野黨也不能拿言論自由拆掉國安門鎖。自由不是替滅國宣傳開後門，法治也不是給行政權開空白支票；把紅線寫窄、程序審嚴、執法攤在陽光下，才是台灣面對敵對滲透時最該守住的民主防線！"}, {"title": "自由廣場》併購案的國安盲點 外送大軍淪中共免費探路人？", "cat": "其他", "priority": 0, "summary": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？\n\n然而，在全民國防的視角，這是一場山雨欲來的國土測繪保衛戰！所稱...", "full_text": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？\n\n然而，在全民國防的視角，這是一場山雨欲來的國土測繪保衛戰！所稱全民國防，即是認知到「生活處處是防線」。一旦戰爭打的是城鎮戰，勝負關鍵就在於「巷弄地形」。\n\n國人熟悉的Google地圖，多半只拍到大馬路。但Grab引以為傲的GrabMaps卻是大數據的「活地圖」，它即將可能靠著全台十幾萬名外送員，每天趕單進出防火巷、大樓側門、地下停車場等…鑽出來的。這無形中繪製出了台灣最精密的3D立體兵要圖。\n\n這些複雜的巷弄就是我們抵抗外敵的天然掩體，怎能輕易將數據交到外人手裡？Grab地圖技術與華為的「花瓣地圖」有著密切合作，其雲端服務更包含阿里巴巴的「阿里雲」，更令人毛骨悚然。在中共《國家情報法》的緊箍咒下，只要北京當局一聲令下，中企必須無條件交出所有數據。\n\n等於讓台灣十幾萬名外送大軍，於不知不覺中，被迫成為解放軍的免費探路人！試想，若我國防高官或重要將領，深夜點了一包鹹酥雞外送，敵方透過阿里雲的大數據比對，瞬間就能精準鎖定其座標與作息。若再循著被收買的外送員，其日常鑽出的「隱蔽路線」，直接進行精準斬首，後果不堪設想。\n\n全民國防不能只是一句口號，必須落實在每個數位細節裡。當我們的手機足跡已經成為現代戰爭的導引武器，公平會、數發部與國安單位，萬萬不能再用「外資合併」的單純商業邏輯來草率審查此案。呼籲相關單位，絕不能只用「市場有沒有壟斷」的舊有經濟思維來審查此案。\n\n台灣地理情資與全民個資，是數位時代最寶貴的國防資產。如果 Grab無法提出技術證明，保證台灣數據百分之百「落地」且徹底切斷與華為、阿里雲的聯繫，政府就應展現捍衛國土安全的魄力，直接否決這項併購案！守護台灣，就從守護我們的巷弄圖資做起。\n\n別讓一份日常的外送鐵板燒，成了中共無人機長驅直入的導航路標。"}, {"title": "當政策只是回應壓力 難解醫護流失", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為...", "full_text": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為明顯。\n\n總勞動力下降 各行各業缺工缺工不只發生在護理人力，從工程師、機師到各類專業技術人員，缺工已是全面現象。當總體勞動供給下降，提高薪資與改善條件，往往只是產業間的人才再分配，而非真正增加人力。更根本的是，世代價值已經改變，新世代不再願意為高壓、長工時與高度責任承擔無限讓渡生活品質，護理工作的本質，與這樣的價值轉變之間，存在難以忽視的落差。\n\n台灣邁入超高齡社會，醫療與長照需求持續上升，但護理教育端招生不足，學成不願投入職場、留任率低，顯示供給緊縮，能提供服務的人卻愈來愈少。面對這樣的現實，如何讓護理人員在有尊嚴且合理的工作環境下留下來，同時改變醫療體系，解方或許是打掉重練，重建系統。首先，必須推動任務重分配，讓護理師從大量非核心工作中解放出來，將人力用在真正需要的地方。\n\n去年有人在公共政策網路平台倡議，要求落實三班護病比與非專業工作排除，例如要求明確把「點班（財物清點、物料盤點）與環境整理」等，定義為非護理專業，改由後勤或護理輔佐人力處理。當護理人員的雜務干擾減少，可回歸「直接照護病人」本業，這才是護理專業真正的價值。少子化難逆轉 規畫外籍人力其次，啟動國際人力引進。\n\n許多先進國家將外籍人力視為常態配置。在護理人力回歸核心工作之後，非核心工作可轉由外籍人力處理，在少子缺工的情況下，引進外籍人力無法避免，必須及早認真思考，並做出合理可行的規畫。第三，科技導入不能停留在口號。\n\n全球發展人工智慧已是時代趨勢，面對未來物聯網、巨量資料及 AI發展，加上台灣人口結構老化的不可逆現象，人工智慧不只可協助醫師，也能幫助護理師等其他醫事人員，也許目前臨床導入AI尚未成熟，應以開放包容的心態與人工智慧共存。評估重建體系 才是根本解方護理人員逃離醫院臨床工作，改善待遇與工作環境無庸置疑，但人力不足時，強制設定護病比標準，醫療機構只能透過關閉病床、減少收治量能來符合規範。當前討論在於「應該有多少人」的理想配置，但我們必須面對「實際上有多少人」。\n\n護理人力問題，從來不是單一職類問題，而是整體勞動供給結構的變化。台灣的政策討論反覆在理想與訴求間擺盪，如果政策只是回應壓力，未評估人力供給與體系承載能力，最終不僅無法改善護理人員處境，恐將使第一線更疲憊，民眾更難就醫。"}, {"title": "新四通不是政策想像 是逼近的現實", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還...", "full_text": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還是機會存乎一心。距金門僅三公里的廈門翔安國際機場今年底啟用，金廈大橋議題也受關注。\n\n議會日前下鄉考察，前往金沙鎮五龍山一帶，勘察金廈大橋預定銜接位置；眼見廈門段工程推進，預計今年底完成海上主體、明年底全線建成，預留延伸至金門的接口，但金門端還是荒草一片。對金門而言，這已不是遙遠的政策想像，而是正在逼近的現實。\n\n金門府會訪陸團為前往對岸了解翔安機場、新四通的影響，原訂四月二十七、二十八日由副縣長李文良偕議員赴陸，近期逢「鄭習會」、賴總統訪友邦史瓦帝尼生變等事件，中央對地方官員赴陸審查趨嚴。李文良及縣府一級主管赴陸申請遭駁回，遂緊急調整名單，改由副處長層級「代打」隨行。地方對金廈大橋、共用翔安機場看法兩極。\n\n金門仰賴台灣本島運油發電，成本高昂，若能透過陸橋系統引進對岸電力與天然氣可降低能源負擔，也能在霧季航班停飛、小三通中斷時，提供交通替代方案。若結合翔安機場，金門將成為兩岸與國際客往返的中轉樞紐，帶動觀光、餐飲、旅宿及租車等產業發展。反對者憂心，這不單純是交通建設，而是制度與安全選擇。\n\n值得關注的是，翔安機場啟用對金門是把雙面刃，利處是提升金門與國際接軌的效率，促進旅遊升級與產業出口，但大型客機低空起降帶來的飛安、噪音、空汙及海域汙染問題，對腹地有限、環境承載脆弱的金門將是長期且直接的壓力。廈門翔安機場牽動兩岸關係變化，對金門影響深遠，如何因應日後發展的新局、衝擊，地方政府要有協商對策，中央也應該展現態度。"}, {"title": "科技競爭的本質在於功能與使用者體驗 而非產地標籤 從「高德地圖」看新媒體時代的理性判讀", "cat": "其他", "priority": 0, "summary": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台...", "full_text": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台的資訊服務系統；\n\n近期因紅綠燈秒數顯示幾乎「零時差」，在台灣引發了資安與國安的討論，值得從資訊傳播的角度冷靜觀察。首先，交通資訊本質上多屬於開放資料範疇。全球主要導航系統，皆依賴衛星定位（ＧＰＳ、北斗系統）與公開或半公開的交通數據，再透過演算法進行整合與預測。\n\n這種技術運作邏輯，是當代資訊社會的常態。國際業者利用大數據與人工智慧，將零散資訊轉化為即時導航服務，其目的在於提升效率與便利性。因此，若僅因應用程式的「中國背景」，便直接將其視為涉及機密的安全威脅，恐過於簡化問題，也忽略了全球科技發展的共通基礎。\n\n其次，當我們使用手機地圖導航時，其實早已習慣開啟「雙向定位」機制；使用者在獲取位置服務的同時，也將自身位置資訊回傳給系統後端。這樣的模式不僅存在於「高德地圖」，同樣適用於 Google Maps或Apple Maps等國際主流平台。\n\n定位資料的收集與分析，是提供精準導航、交通預測、路況優化的基礎條件；關鍵不在於「蒐集」，而是「如何蒐集使用」、是否受到有效監管。第三，面對科技快速演進，我們應思考是否「逢中必防」？\n\n或建立更精細的風險評估機制？「高德地圖」因紅綠燈倒數顯示而受到關注，反映了其在使用體驗上的創新優勢；相較之下，既有市場主導者卻未必在細節上具備同樣表現。\n\n這提醒我們，科技競爭的本質仍在於功能與使用者體驗，而非產地標籤。再者，App生態本身具有高度流動性，今日爆紅的應用程式，有可能在短時間內即被其他更具創新、或更符合需求的產品取代。這種「議題帶動流量」的現象，正是大眾傳播與數位平台交互作用的典型案例。\n\n一款地圖App最終是否能在台灣市場立足，仍取決於其導航準確度、使用便利性與在地化程度；若無法滿足使用者需求，自然會被市場淘汰。正如過去結合地圖與遊戲機制而爆紅的寶可夢GO，也是在不斷優化中維持其生命力。\n\n最後，若關切應用程式可能涉及敏感交通資訊，核心責任仍在政府的資安治理與制度建設；包括資料來源的審核、跨境資料流的監控，以及關鍵基礎設施的防護，都是維繫公共安全的關鍵。同時，社會也應培養更成熟的媒體素養與科技理解能力；\n\n面對「匯流」帶來的資訊穿透，我們不僅需要防範風險，更應學習各國技術優勢，強化本土數位服務的競爭力。「高德地圖」爭議提醒我們，在新媒體與數位科技高度交織的時代，解讀任何單一技術，都不宜過度簡化、政治化，台灣使用者也不一定習慣對岸的設計思維。唯有在理性分析、制度保障、技術理解三者並進之下，社會才能在便利與安全之間，找到穩健而長遠的平衡。"}, {"title": "不能對美說不vs.不能對中說好", "cat": "其他", "priority": 0, "summary": "拿大多倫多）近期，針對發芽馬鈴薯標準的放寬，看似技術性問題，實則揭露更深層也更令人不安的現實：台灣正逐步陷入「對美不能說不、對中不能說好」的雙重戰略夾縫；而民生政策，正成為最先被擠壓的領域。台灣在安全與國際支持上的高度依賴，使對美合作幾乎成...", "full_text": "拿大多倫多）近期，針對發芽馬鈴薯標準的放寬，看似技術性問題，實則揭露更深層也更令人不安的現實：台灣正逐步陷入「對美不能說不、對中不能說好」的雙重戰略夾縫；而民生政策，正成為最先被擠壓的領域。台灣在安全與國際支持上的高度依賴，使對美合作幾乎成為不可動搖的政策前提。\n\n這種依附關係並非單純外交選擇，而是漸內化為政策慣性的現實。問題在於，當「不能說不」滲透到具體經貿與食品標準時，政府是否仍保有談判空間？還是只能在對方設定框架內調整本國標準？\n\n面對中國大陸，政府則採取幾乎相反策略。即便中國釋出對台十項措施，理論上可挹注台灣農業與觀光產業，政府卻以高度政治警惕回應，甚至拒絕進一步互動。這種「不能說好」的邏輯，同樣不是政策選擇，而是出於對主權、安全與政治滲透風險的整體判斷。\n\n於是，對美方要求傾向調整標準、積極配合；對中方釋出經濟利多，則高度保留甚至拒絕。台灣在兩大力量間不是單純選邊，而是同時承受兩種相反、但同樣強烈的約束。\n\n當農產品標準為配合對美貿易而調整時，社會承擔的是食安疑慮與政策信任流失；當可能為農民帶來收益的對中市場機會被政治考量阻擋時，承擔的則是產業發展受限與收入機會流失。表面上是兩條不同政策路線，實質上卻已形成對民生政策的雙重擠壓。"}, {"title": "英國也成美「菜單」 吳志中怎能不怕", "cat": "其他", "priority": 0, "summary": "外交部政務次長吳志中接受彭博專訪，面對即將舉行的川習會直言，「我們最害怕的，就是將台灣擺上習近平與川普總統談判的菜單上；我們也需避免這件事發生」。看來吳志中是清醒的，但真能喚醒賴政府，乃至依然對美國懷抱「出兵護獨」希望的眾青鳥？\n\n川習會預...", "full_text": "外交部政務次長吳志中接受彭博專訪，面對即將舉行的川習會直言，「我們最害怕的，就是將台灣擺上習近平與川普總統談判的菜單上；我們也需避免這件事發生」。看來吳志中是清醒的，但真能喚醒賴政府，乃至依然對美國懷抱「出兵護獨」希望的眾青鳥？\n\n川習會預定五月十四至十五日舉行。各界預料，會談將涵蓋多項商業交易與採購承諾。尤其是川普，必然想藉此取得北京承諾大力採購波音客機及大豆等農產品，以便成為他於美國期中選舉時赴各地助選演講的重要政績。\n\n既是美中「大交易」，即使屆時透過「川普贏學」的虛幻濾鏡可對外扭曲為「美國贏麻了」的敘事，但明眼人皆知，中方又怎可能任美方予取予求？亦即，美方也得犧牲部分籌碼。這即是吳志中面對外媒專訪時，不得不去面對的「背景板」。\n\n當一面倒的親美，甚至跪美、舔美早成賴政府基調，甚至還不讓國人疑美之時，吳志中這番談話，無疑如暮鼓晨鐘。吳志中是隨口說說，還是有所本？且不論自川普二度就任美國總統以來，一連串針對傳統盟友祭出關稅大棒或刺耳談話，單以事涉重中之重的國家主權而論，從揚言讓加拿大成為美國一州，到想要奪下丹麥所屬的格陵蘭島，就足以說明川普所謂「極限施壓」的毫無底線。\n\n這兩天，美國甚至不惜將矛頭對準鐵桿盟友英國。一名美國官員向路透披露，一封五角大廈的內部電子郵件，概述了美國因伊朗問題而懲罰北約盟友的選項，包括暫停西班牙的北約成員國資格，以及重新檢視英國對福克蘭群島主權聲索的立場，只因美國不滿部分盟友在美以伊戰爭中，不願或拒絕向美國提供進入權、駐軍權與飛越權。要知道，一九八二年的福克蘭群島主權之戰，對英國意義非凡。\n\n當時英國只剩下「日不落帝國」的餘暉，首相柴契爾夫人為了奪回遠在萬里之外的福克蘭群島，不惜傾舉國之力上演「帝國大反擊」，以傷亡上千名英軍的代價奪回福島、重振國威。但如今，美國國務院網站指出，該群島目前由英國管理，但仍由阿根廷主張擁有主權。與此同時，川普盟友、阿根廷的右翼民粹主義總統米雷伊則對前景表示樂觀。\n\n換言之，英國以帝國最後榮光奪回的福島，很可能已遭鐵桿盟友美國拿來當籌碼談資，簡直就是對英國最無情的羞辱。從美英關係演變之烈，再回看美中台三角關係，如果吳志中對川習會不感到憂心害怕，還真有失外交專業身分。只可惜，台灣有太多「裝睡的人」。"}, {"title": "台灣關係法與九二共識的保台藝術 九二共識曾讓台灣海峽有了一九四九年之後最和平的時光 以模糊定位保台，就是台灣關係法與九二共識的共同智慧 說不清但可運作的空間，維繫了美國與我們斷交後的關係", "cat": "其他", "priority": 0, "summary": "「鄭習會」之後，「九二共識」又成為兩岸關係的重要爭點。這四個字曾讓台灣海峽有了一九四九年之後最和平的時光；但民進黨執政後，「九二共識」漸被汙名化，連國民黨政治人物都不太多說。\n\n這次鄭麗文光明正大重申「九二共識」的原則，不出所料，綠營發動全...", "full_text": "「鄭習會」之後，「九二共識」又成為兩岸關係的重要爭點。這四個字曾讓台灣海峽有了一九四九年之後最和平的時光；但民進黨執政後，「九二共識」漸被汙名化，連國民黨政治人物都不太多說。\n\n這次鄭麗文光明正大重申「九二共識」的原則，不出所料，綠營發動全面攻擊。陸委會說「九二共識，其實是在幫中共意圖消滅中華民國背書」；民進黨立院黨團表示「接受九二共識就是接受一國兩制」。\n\n有趣的是，就在鄭習會當天，ＡＩＴ在社群媒體上發文，慶祝「台灣關係法」四十七周年，指出「台灣關係法與三個聯合公報及六項保證，對於維護台海的和平與穩定提供了實質幫助。」有人懷疑，這是不是美國在出招，搬出「台灣關係法」來與「九二共識」打對台，提醒「台灣關係法」才是護台定海神針！果然，民進黨大加頌讚，賴總統也「感謝美國政府依據台灣關係法以及六項保證履行對台灣的支持和承諾」（卻不提ＡＩＴ說的「三公報」）。\n\n然而，批評九二共識卻捧台灣關係法的人，可能沒搞清楚，台灣關係法和九二共識都是藉由模糊化台灣地位與兩岸關係，讓台灣在美國的「一中」原則、「不承認台灣」的國家地位下，依然有自主與和平的空間。以模糊定位來保台，就是台灣關係法與九二共識的共同智慧。誰要硬想要把兩岸定位「說清楚講明白」，而且還要在大陸、美國、台灣前共同攤牌，那就是打破這兩個定海神針奠定的和平穩定架構。\n\n先看台灣關係法。它的確對台灣的穩定提供基礎，也讓美國持續維護兩岸和平。然而，該法的前提是「美國終止與台灣之外交關係」以及「美國與中華人民共和國建立外交關係」。\n\n但在此前提下，仍要確保美台在「外交以外」的關係，同時也「關切」台海和平。而它在法理上更有意思之處，是在不承認台灣（或中華民國）作為一個「國家」時，卻用個別法律條文給台灣「類似國家地位」。例如，台灣人民可以部分適用美國的移民法，美國不在台設「大使館」卻設一個功能相近的非營利法人ＡＩＴ，同時賦予台灣駐美單位類似外國領事館之地位。\n\n台灣關係法讓美國可以給台灣「類似國家」的待遇，而且還明確規定美國將（而非「應」）提供台灣必要的防衛武力。你若硬要問：美國到底有沒有把台灣當成主權獨立的「國家」？那它只好說「沒有」！\n\n如果台灣本來就是主權獨立的國家，何須特別立法來規範？美國可沒有「日本關係法」、「英國關係法」、「中國關係法」。不過，他們不會說得很明白，通常只說「依據台灣關係法之規定」！\n\n或是像ＡＩＴ的聲明，引述「台灣關係法與三個聯合公報及六項保證」。這樣的模糊定位，才能在三個聯合公報的「一中」政策與「美國認知台灣是中國一部分」之下，找到一個空間。這個說不清但可以運作的空間，就維繫了美國與我們斷交後的關係，直到現在。\n\n你能說「模糊」之功不大嗎？九二共識不說清楚到底「一個中國」是哪個中國；台灣關係法對台灣是否為國家語焉不詳。\n\n這兩個充滿解釋空間的文件，就讓美、陸、台三方，都找到能與各自國內法制交代的說法。既然美國、大陸都享受著這個模糊空間，我們也是模糊的受益者，就讓它繼續維持健康的模糊吧。"}, {"title": "組團地下化反添風險 政府應務實檢討對陸政策 掩耳盜鈴的赴陸禁團令", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？\n\n基於陸方未開放陸客來台、且片面改變Ｍ5０3航路，以及考量觀光逆差與兩...", "full_text": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？\n\n基於陸方未開放陸客來台、且片面改變Ｍ5０3航路，以及考量觀光逆差與兩岸情勢，政府於二○二四年援引「發展觀光條例」第五十三條，以「損害國家利益」為由，於該年六月起暫停旅行業組團赴陸旅遊。然而，這所謂的赴陸禁團令實施迄今近兩年，並未阻絕台灣民眾赴陸熱潮。根據觀光署統計，二○二四年台灣赴陸人數為二七七萬，去年則增長至近三二四萬，大陸為台灣出境目的地第二名，僅次於日本。\n\n若加上由港、澳或其他國家轉機，實施禁團令以來，台灣每年赴陸人次超過四百萬。亦即，數據反映：禁團令下台灣民眾赴陸反而有增加趨勢。然而，眾所周知，赴陸禁團令實施初期，為規避監管，許多旅行業者將組團行為轉入地下，改以「考察」、「交流」或「落地成團」等名義赴陸旅遊，「地下化」造成至少三大後果：首先，消費者權益無法得到保障。\n\n地下赴陸團品質參差不齊，且往往缺乏合法的旅行業責任保險，一旦發生旅遊事故，旅客無法得到完整的保障；其次，旅行產業失序。禁團令縛住合法旅行社手腳，市場反而被不具保障的低價團與灰色操作占據；\n\n這無異是對合法旅行業者的懲罰；最後，政府無從監管。赴陸旅遊地下化，使得政府不但難以掌握切確的統計數據與赴陸動向，更容易形成涉陸政策的決策盲區。\n\n由於赴陸禁團令影響我國觀光業甚鉅，且上述問題經專家學者、業者多次反映；迄今所謂的赴陸禁團令執行上已沒有那麼嚴格，可說只剩徒具形式。也就是說，雖然政策上仍未開放組團赴陸，但政府意識到，無論是旅遊、經商，台灣每年仍有數百萬人赴陸的需求，若無完整配套的堅壁清野，不但罔顧現實，亦無益國安，更可能造成產業與民眾的雙輸；\n\n因此實務上等同已鬆綁。誠如吾人一再強調：面對大陸，台灣不但要能審時度勢，更應以辯證思維回應陸方的舉措。雖然大陸仍強調「和戰兩手」，但從各種情勢研判，穩定的台海關係，以及與台灣更多的交流合作，是目前大陸對台主旋律。\n\n因此，如何正確判讀、因勢利導，不但已是台灣的當務之急，更是台灣安全不可或缺的戰略思維。台灣應秉持開放社會應有的自信，相信我們有能力與陸交流的同時，透過透明的規範來應對風險。因而可藉此事件，從檢討名存實亡、掩耳盜鈴的赴陸禁團令開始；\n\n透過公私協力，讓政府與社會進行更多層次討論，規範出一套風險可控、務實可行、利益台灣的對陸政策！"}, {"title": "軍購今3度協商 8千億是關鍵密碼 立院可能挑燈夜戰拚送院會表決 在野準備加碼 設發價書才編預算但書", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "榮景或台灣病？政府治理應如履薄冰 天堂不撤守／專欄", "cat": "社論與評論觀點", "priority": 0, "summary": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣） 的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代， 應如履薄...", "full_text": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣） 的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代， 應如履薄冰。筆者有感於全球局勢動盪及跨境產業激烈競爭，提出以 下反思與展望：一、驕兵必敗，台股榮景下潛藏不容忽視的「台灣病」隱患。據報導，台灣因科技產業的蓬勃發展，股市總市值超過英國，台股 指數正朝4萬點邁進，一切看似蒸蒸日上。\n\n但筆者對此憂喜參半，蓋 瞬變的股票市場行情只是表面，實則一個物價與房價齊揚而基本工資 卻漲幅有限的台灣，如何稱得上幸福？《經濟學人》去年底便以「台灣病」為封面報導，形容台灣現況宛 如 1970 年代產業失衡的「荷蘭病」翻版。如今不論是金管會放寬國內 ETF對於單一個股的投資比率限制，或台電對特定企業的電價補助等 ，均屬加速產業發展失衡的短視政策。\n\n全民除緊盯股價，更應在病入 膏肓前促請執政者正視日漸嚴重的台灣病！二、全面產業升級迫在眉睫，亟需當代李國鼎、孫運璿之高瞻遠矚 的政治家。當前台灣產業情勢嚴峻，包括對外有像川普不按牌理出牌的非典型 總統，不僅無視國際法秩序，更數度誹謗稱「台灣偷走了美國的晶片 產業」，並以關稅手段迫使台灣企業赴美投資；\n\n近日他再度點名台灣 ，宣稱美國必須在短期內取得全球近半的晶片供應，否則將對晶片進 口課徵高額關稅。但事實是，台積電的成功除了當年經國政府的鼓勵與扶持外，也包 括台積電創辦人張忠謀出眾的運營能力，首創「專業積體電路製造服 務商業模式」，加上台灣工業製造的地理集中性、從事製造業的工程 師和其他技術人員供應健全（包括法律人在內）等具競爭力之因素， 加上員工及相關產業鏈不懈的努力，才有今日成績！絕非川普口中的 台灣偷竊美國晶片市場，否則美國最大半導體公司英特爾何須積極與 台積電討論合作之可能性。\n\n但對於川普汙衊式的指控，不論是台積電董事長或董事會，或賴政 府均悶不吭聲，令筆者感到困惑。台積電董事會基於公司治理、善良 管理人注意義務，本不應輕易屈服於政府（不論是台灣或美國）之意 志，而做出違背公司長遠利益之投資決定。而政府（國發基金）乃台積電大股東之一，即便賴政府本該卻無力 以官方角色替台積電爭取權益，至少應在董事會中發聲，促使董事會 決策時審慎評估，並強化社會責任措施，包含促進整體產業轉型及競 爭力提升之方案，避免可能的大西瓜效應，吸光其他企業養分，否則 對台灣經濟百害無利。\n\n釜底抽薪，此刻台灣「政治產業」亟需像李國鼎、孫運璿等有能力 、有遠見的無私政治家，為台灣產業轉型提供清晰的路徑與配套（包 括重要的法制建置）。三、兩岸良制一國，政治產業沒有時間蹉跎！筆者認為，政治產業好、必須好，百工百業才會好！\n\n拋開意識形態 ，不論對美、對陸互動才能回歸福國利民之本質。兩岸求同存異且積 極良制融合，除可降低不必要的誤會，亦能在交流中互相學習、砥礪 ，一個台灣與大陸共好的中國，絕對比劍拔弩張對立的兩岸關係來得 更好。台灣病從政治產業而來，蔓延至法律及經濟產業之中，倘及時對症 下藥，「健康快樂、國泰民安、良制一國」之理想國世界將指日可待 ；\n\n否則，前途堪慮。何去何從，端在政府和全國選民一念之間！（作 者為超國界法學教授）"}, {"title": "從荷莫茲到馬六甲 縱橫天下／專欄", "cat": "社論與評論觀點", "priority": 0, "summary": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從 荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天， 台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；\n\n在東 南亞，區域國家想的則是：如果馬六甲海峽也被封鎖，那又...", "full_text": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從 荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天， 台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；\n\n在東 南亞，區域國家想的則是：如果馬六甲海峽也被封鎖，那又會是什麼 狀況？馬六甲海峽長900公里，沿岸有印尼、泰國、馬來西亞、新加坡4國 ，是東亞到中東與歐洲最近的航路。全球海上貿易中有 22％的貨物經 過馬六甲，更是重要的能源通道，2025 年上半年，每天有 2320 萬桶石 油經過，占海上運輸石油量的29％，而每天從荷莫茲海峽經過的原油 也才2090萬桶。\n\n伊朗對荷莫茲海峽收費後也在馬六甲海峽相關國家內引起騷動。新 加坡強調自由航行權，認為應遵守國際法，不同意按照伊朗的要求付 過路費，也不願就過路費一事和伊朗談判。馬來西亞則不同調，他們 和伊朗談判，獲准讓幾艘馬國船隻通過海峽。\n\n印尼則一度考慮有樣學樣，22 日印尼財長波巴亞在一場研討會上拋 出馬六甲海峽也收費的點子，結果遭星、馬等國反對，波巴亞沒多久 就收回這個想法。其實馬六甲海峽收不收費是小事，更該攤開來看的是國際政經情勢 的大地圖。荷莫茲海峽遭到封鎖後，東南亞國家立刻感到震撼。\n\n缺油 影響到發電，也逼得許多國家不得不改採遠距上班；缺肥料更影響春 耕與糧食供給。論者謂東南亞國家受到震撼的「強度」，顯示其對中 東過於依賴，不若中國早就對能源供給想好多種備案。\n\n然而除了強度之外，更該注意的是「速度」: 何以荷莫茲海峽一被 封鎖，馬六甲海峽這邊立刻就感受到震撼？因為兩地的經濟早已整合 在一起了。通常我們把荷莫茲和馬六甲看成是兩個個別的海峽。\n\n但現在越來越 多地緣政治學者指出，從荷莫茲到馬六甲是一條連在一起的石油走廊 。油輪從荷莫茲海峽出來，向東過印度洋，最後是穿過馬六甲海峽進 到亞洲。所以新加坡是這個走廊的東端出口。\n\n這還不夠，學者指出，亞洲和海灣兩地的經濟關係日漸密切，所以 荷莫茲和馬六甲的聯繫不只是石油，還包括貿易、資金及制度化的連 結。這從幾次東協與海灣合作理事會的峰會成果就可看出。海灣國家與中國的貿易也不斷增加，2025年前9個月海灣國家的主 權基金有40％投到了亞洲。\n\n阿聯酋、沙烏地的公司與亞洲夥伴的國防 工業合作，將亞洲的科技與製造能力融入了海灣國家的工業生態。亞 洲的金融服務公司也在海灣各個金融中心擴大服務。荷莫茲到馬六甲 的海上走廊已內化成亞洲成長的基礎建設。\n\n所以學者指出，現在重點不是東南亞如何減少對中東的依賴，而是 如何與海灣國家一起有系統地分散風險，如聯合的倉儲設備、分散的 船運安排、跨國界的資本夥伴、更深化的金融合作等，讓彼此能在經 濟互賴的關係大學政治系教 授）"}, {"title": "社會觀察 接下大陸的橄欖枝", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "東升西降 壓縮賴政府國際空間", "cat": "其他", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "《社論》大陸經濟仍未擺脫「供強需弱」困境", "cat": "社論與評論觀點", "priority": 0, "summary": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個 月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預 期改善，國內需求似在恢復。\n\n然而，深入剖析...", "full_text": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個 月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預 期改善，國內需求似在恢復。\n\n然而，深入剖析數據背後的結構性特徵 ，不難發現：這一輪物價回升的基礎並不牢固，供給強、需求弱的根 本格局尚未扭轉。大陸3月PPI同比轉正，國際能源價格大漲是核心推手，這種由外部 成本衝擊驅動的價格上漲，本質上是一種「輸入性通膨」，而非國內 需求旺盛拉動的結果。值得警惕的是，PPI內部結構出現明顯分化。\n\n3月生產資料價格同比 上漲1.0％，而生活資料價格同比仍下降1.3％。這意味著價格回暖主 要集中在產業鏈上游，尚未有效傳導至終端消費品。上游原材料成本 上漲，下游需求卻依然疲弱，中下游企業的盈利空間將受到嚴重擠壓 。\n\n這種「成本推動型」的價格回升，不僅不能代表經濟全面復甦，反 而可能加劇企業經營困境。各項數據同時顯示，內生增長動力依然薄弱。從更宏觀的視角審視 ，當前居民消費呈現出「總量回暖、人均理性、結構性錯位」的複雜 態勢。\n\n清明假期（2026年4月）全國出遊人次年增6.8％，但出遊總花 費僅增長6.6％，人均消費並未出現爆發式反彈。消費者的行為模式 正在從「排場消費」轉向「悅己消費」和「深度遊」，傳統高額購物 支出減少，小眾城市旅遊、自然觀測等體驗式消費仍保持增長。實物消費領域同樣呈現出結構性特徵。\n\n近兩個月社會消費品零售總 額增速維持在2.8％～3.0％左右，實物商品特別是耐久財的需求依然 偏弱。主打性價比的電商平台和「白牌」商品的滲透率進一步提升， 而處於「腰部」的中端品牌面臨極大的去庫存壓力。高淨值人群支撐 的頂級白酒和奢侈品需求相對穩健，消費領域呈現出明顯的K型走勢 。\n\n房地產價格的低位震盪使居民資產負債表處於「收縮修復期」，在 負債端未結清、資產端未大幅增值之前，居民邊際消費傾向很難出現 跨越式提升。這種「理性的回歸」而非「報復性的噴發」，恰恰說明 了內需動能的不足。當前物價回升高度依賴外部輸入性通膨，內生需求支撐不足。\n\n持續 的物價低迷會強化企業和消費者對價格下行的預期，導致消費延遲、 投資收縮。雖然 PPI 轉正有利於打破通縮預期的負向循環，有利於企 業盈利修復，但促進物價合理回升仍需政策持續發力。首先，需要切實提振服務消費。\n\n服務消費占比提升是消費升級的客 觀規律，應通過放寬市場准入、優化消費環境、豐富消費場景等方式 ，激發服務消費潛力。其次，要增加居民收入。收入是消費的基礎， 應通過穩就業、完善社會保障、優化收入分配等方式，提升居民消費 能力和意願。\n\n再次，要穩定房地產市場。房地產是居民財富重要組成 部分，房價企穩有助修復居民資產負債表，進而提振消費信心。大陸經濟正走出通縮陰影，這固然令人欣喜。\n\n但必須清醒認識到， 本輪物價回升更多得益於外部供給衝擊，內需驅動的物價上漲動力仍 顯不足。PPI轉正主要依靠國際油價上漲的「虛火」，CPI回升也高度 依賴能源價格反彈，核心CPI平穩但缺乏向上彈性。供給強、需求弱 的困境尚未根本扭轉，政策支援對價格穩定仍十分重要。"}, {"title": "社論/從採購到投資：ART架構下的戰略轉型", "cat": "社論與評論觀點", "priority": 0, "summary": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應...", "full_text": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應鏈治理整合為整體戰略，成為當前最重要的政策課題。\n\n在過去，對美採購往往被視為貿易平衡或政治協商的延伸工具，具高度被動性。然而在 ART架構下，若政府仍停留在「以進口換取空間」的思維，將錯失將經貿壓力轉化為戰略資產的機會。關鍵在於：如何讓採購不只是支出，而是能夠累積影響力的投資行為。\n\nART為台灣產業提供了調整空間。根據現行安排，美方對台灣產品採取15%且不疊加的對等關稅，並對2,072項產品提供豁免。此外，在半導體及部分232調查項目上，台灣也獲得較優惠待遇。\n\n這些措施有助於降低出口成本壓力，但關稅優勢本身並不會自動轉化為競爭力。真正的關鍵在於企業能否將成本節省轉投入自動化、數位轉型與低碳製程。政策應由防禦轉為引導，使「低關稅」進一步轉化為「低碳與高效率」的競爭優勢，確保台灣在美國供應鏈重組中持續扮演不可替代的角色。\n\n2025年至2029年間，台灣對美採購的承諾高達848億美元。若這筆資金僅用於傳統能源與設備的進口，將難以產生長期的戰略效果。然而，若將其重新界定為「準主權投資」，則可能改變台灣在全球供應鏈中的位置。\n\n在此脈絡下，「採購股權化」的思維值得正視。其核心並非將採購預算金融操作，而是在長期採購與合作的過程中，爭取與供應安全相關的股權、治理參與或資訊權益。例如，在能源合作中，透過主權基金與國營事業協同布局，參與美國液化天然氣（LNG）接收站、出口設施或上游開發案，並爭取董事席次或觀察員地位，使台灣由單純買方轉為具影響力的長期參與者。\n\n此一轉變具有雙重意涵。一、穩定的利益連結：當台灣資本嵌入美國關鍵基礎設施，雙方將形成更穩定的利益連結，使安全關係從政治承諾延伸至經濟結構。二、提升議價能力：透過治理參與，台灣可更接近供應鏈資訊與價格形成機制，逐步提升議價能力，而非完全依賴外部市場定價。\n\n然而，這一路徑也伴隨風險。跨境基礎設施投資涉及政治審查、法規限制與市場波動，若缺乏專業管理，將可能導致資產效率不彰，甚至產生財務負擔。此外，過度集中於特定市場也可能提高地緣政治風險。\n\n因此，「股權化」必須建立在嚴謹的風險控管與多元配置原則之上，而非政策口號。在制度面上，建立具專業治理能力的主權基金，已成為必要條件。面對如此規模的採購與投資需求，若仍受限於年度預算與傳統財政架構，將難以維持策略一致性。\n\n主權基金可作為資本整合平台，將分散的採購決策轉化為長期資產配置。其治理設計應強調去政治化與專業化：由政府設定戰略方向與風險邊界，實際投資與營運則交由專業團隊負責，以降低政策受選舉周期干擾的風險，並建立國際合作夥伴的信任。最終，ART的成敗不在於協定條文本身，而在於後續的治理能力。\n\n台灣面對的不只是能源採購問題，而是如何透過經貿安排，為未來數十年的產業韌性與安全結構奠基。因此，每一項採購所延伸的資產配置、治理參與與資訊掌握程度，都應納入國家安全與經濟安全的整體評估。《台美對等貿易協定》確實為台灣打開新的國際經貿空間，但真正的挑戰才正要開始。\n\n五年 848億美元的採購承諾，究竟會成為一次性的支出，還是轉化為可累積的戰略資產，關鍵取決於政策思維能否完成從「採購」到「投資」的轉型。唯有將採購視為資本運作的一環，並以制度化方式強化治理能力，台灣才能在新的經貿格局中，由被動回應者轉為具有實質影響力的參與者，為長期發展建立更穩固的基礎。"}, {"title": "社論》中國人認同為台灣帶來的災難", "cat": "社論與評論觀點", "priority": 0, "summary": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民...", "full_text": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民主政治的政黨之爭角度，將無法理解藍白之亂的根源，應由台灣人認同與中國人認同衝突，才能正確剖析這場災難的癥結。\n\n在台灣，中國人認同是一種「想像的民族主義」，而台灣人認同則是「現實的命運共同體」。在台灣四百多年發展史上，來台的外來族群大抵具有兩種心態︰一種是從唐山渡過黑水溝而來，在台灣「篳路藍縷，以啟山林」，開拓新世界的移民心態；一種是逃難避禍而來，將台灣當成回歸母國跳板的難民心態。\n\n另有自古以來即是島嶼主人的原住民。難民關注他們想像的祖國，移民則重視落地生根，打造新的家國。這樣的差異造成對台灣定位的不同，成為內部衝突的根源。\n\n事實上，台灣四百年史，多數由外來政權統治，從荷蘭殖民南台灣，到明末鄭成功及其短命的東寧王國，後來清帝國終結了明鄭政權，但在清日甲午戰爭後，又將這個清人眼中「島不語、花不香」的島嶼與澎湖群島永久割讓於日本。日本統治台灣五十年，後因二戰敗戰，在舊金山和約正式放棄台、澎主權，但未言明台澎主權未來歸屬。因此台灣由蔣介石政權「暫時接管」，卻因蔣氏於國共內戰全面潰敗，乃率數百萬軍民逃難至此，將台灣當成反攻復國的跳板。\n\n由歷史看來，台灣不僅「自古不屬於中國」，同樣也不屬於任何東西方的殖民帝國。雖然歷經多次外來政權統治，近年的民主化與本土化，已使避難而來的中華民國獲得新的內涵，以中華民國台灣之名，成為移民者的新家園。新加坡是多種族國家，人口以華裔為主，而且曾被馬來西亞聯邦逐出，卻發展出一個小而強大的多族群國家，與台灣處境非常類似，因此新加坡的發展經驗值得台灣借鏡。\n\n新加坡前總理李顯龍曾語重心長呼籲華族社會要「落地生根」，不是「落葉歸根」，才能應對地緣政治衝突。這句話同樣是台灣移民與難民心態衝突的解方。遺憾的是，台灣雖已發展出令世人讚譽民主政治與經濟成就，與中國的專制獨裁截然不同，卻在蔣政權的大中國教育遺毒下，至今仍有部分政客的認同是中國，而習近平的「中華民族偉大復興」則深深觸動這些中國人的心靈。\n\n更不幸的是，這些「中國人」在國民黨掌權，走的是毫不掩飾的急統路線。代表性人物則是由早年的「外省人台灣獨立促進會」到投靠主張統一的國民黨的鄭麗文，在中共的力助下當上國民黨主席，從此日思夜想盼來了「鄭習會」。鄭見習之後，搖身一變成為習近平的小粉絲，回台後言必盛讚習近平的「英明偉大」。\n\n為何軍購案是藍白與綠的認同戰爭？此因具有台灣人認同才需要強化國防，防止中國的武力犯台，但是對中國人認同的政客來說，既然「兩岸都是中國人」，「中國人不打中國人」，那又何必購買武器，強化國防，成為大國博弈的棋子？換言之，鄭麗文的反軍購乃是基於兩種心態︰兩岸是一家人，中國人不打中國人。\n\n鄭麗文訪中回來，已淪為中共的宣傳工具。她不斷稱許習近平統治下的中國，已達「完全脫貧」及建成「全面小康社會」。在中國人不打中國人方面，鄭麗文更表明堅持「九二共識、反對台獨」，並且聲稱「全世界都奉行一中政策」，將一切台海緊張的責任全部推給「台獨」，完全附和中共的敘事框架。\n\n而鄭麗文對中共的武力犯台陰謀擦脂抹粉，辯稱「習主席是個重感情的人，對我們好都來不及了，怎麼還會想打我們呢？」實際上，中國人不打中國人，雖是感性的呼喚，卻從來都不是事實。試問蔣介石的國民黨與毛澤東的共產黨不也是同為中國人，而且也都堅持「一個中國」，但國共內戰之慘烈更甚於「抗日戰爭」，數百萬中國人死於蔣、毛中國人手裡，由此可見中國人不打中國的前提，就是一邊向另一邊投降。\n\n可悲的是，即使投降仍會遭到秋後算帳。另外一個統派常引用的論述是，同一種語言、文字、文化的種族必須共組一個國家，已被國際政治的現實所戳破。國際社會上，同時存在許多使用英文的國家，為何說中文就是中國人，就是屬於中國？\n\n藍營過去雖然主張統一，但仍披著中華民國的外衣，堅持「九二共識」仍有「一中各表」的空間，但這個模糊的彈性卻被紅統派的鄭麗文打破了。在鄭麗文的領導下，國民黨的未來只剩一條路可走，就是接受沒有各表空間的一中原則，呼應習近平的中華民族偉大復興的訴求，假和平之名，自我解除武裝，如此一來國民黨與中國的花瓶政黨「中國國民黨革命委員會」有何差異？鄭麗文這種中國人認同帶領的國民黨，不但本身就是一場災難，也透過杯葛政府預算與弱化國防來製造台灣的災難。"}, {"title": "社論/可教化與鞭刑之辯，反映人民憂懼社安破漏", "cat": "社論與評論觀點", "priority": 0, "summary": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。\n\n面對層出不...", "full_text": "五年前震驚全台的長榮大學馬來西亞籍女大生命案，凶嫌雖經三度判死，最近仍以無期徒刑定讞。恰於此時，台南又發生女高中生放學途中差點遭陌生男拖入草叢案；而衛福部統計更是驚人：近五年兒少性剝削被害人暴增一倍多，高達七成係運用網路犯罪。\n\n面對層出不窮的各式性侵案，從社安網到司法，都與人民的期待，距離愈來愈遠。長榮女大生命案凶手梁育誌，對被害人施以強擄、性侵、殺害、棄屍等手段，甚至案發前還曾意圖擄走同校另名女生。但司法最終仍以「可教化」、「非屬最嚴重」為由，讓他逃過死刑。\n\n馬來西亞留台校友會痛批，判決未能從受害者角度考量，「過於仁慈，難回應社會對公平正義之期待」；馬來西亞留台校友會對台灣司法的批評，其實道出許多台灣人民的心聲。因而，此案的定讞看似對一起重大性侵殺人案的蓋棺論定，實則又對破漏的社會安全防護網補上一刀。\n\n畢竟，即使不復過往「強姦殺人唯一死刑」的刑罰威嚇年代，但難道三度判死的一、二審、更一審法院法官盡皆法盲？若連如此殘忍的作案都不算最嚴重犯罪，那法律作為正義最後防線的意義何在？就在社會苦吞司法的「仁慈」判決時，台南永康又發生女高中生在放學途中差點遭陌生男子強行拖入草叢事件，幸有路人見義勇為才逃過一劫；\n\n這起案件，更因發生在校園周邊而引發高度關注及憂懼。雖然兩案並無因果關聯，卻同時為當前台灣社會肇生了不安氛圍：一方面，司法對重大性侵殺人犯的寬容讓人民質疑；另一方面，即使長榮女大生案發生已五年，社安網顯然仍有疏漏。\n\n兩相交織，當然讓「吾家有女初長成」的父母深感憂懼。更讓家長不安的是，家扶基金會發布的兒少數位安全調查顯示，網路已成「誘惑陷阱」，面對「免費限量裝備」誘餌，近三成兒少坦言會與陌生人私聊、近一成六會傳送私密照。另一方面，衛福部統計近五年兒少性剝削案件運用網路犯罪占比高達七成，通報人數五年成長達百分之一一一點八三。\n\n這種新型態兒少性剝削案，與實質性侵案僅一「網」之隔，卻更加隱匿難防。藝人黃子佼等涉嫌從「創意私房」論壇購買數千部兒少不雅影像案即是顯例，迄今仍不知有多少受害兒少只能獨自療傷。司法對實質性侵案過於「仁慈」，政府又難以杜絕潛藏的性侵案源頭，正是當前社安網的實景。\n\n這不僅是人民的感受問題，更嚴重斲傷人民對公權力與司法的信任。在這樣的氛圍下，難怪國民黨立委洪孟楷提案對性侵案、虐童案、高額詐欺案等實施鞭刑，並倡議推動公投，立即獲五十二名立委連署，反映出多數民眾的治安憂慮；相對的，民進黨立委則認為推動鞭刑恐有違反保障人身自由與人格尊嚴的疑慮，直言「人權不應該走回頭路」。\n\n從重大性侵殺人凶手該不該判死，到性侵犯該不該施以鞭刑，相關爭論其實均直指一個更深層的問題：當既有制度無法提供足夠安全保障，又無法回應人民對公平正義的期待時，面對暴增的各式性犯罪，人民就更容易傾向「治亂世用重典」。但刑罰固有嚇阻效果，仍得靠政府建構交織互補的各層社安網來治本。例如應多從被害人處境思考，加重權衡犯罪手段的殘酷；\n\n除了加強高危地區及網路巡查，更應即時建立一站全包的救助機制，減少對被害人及其家屬的二次傷害。而執政者除了夸夸其談言加害者人權，更該拿出具體行動來免除人民的憂懼。"}, {"title": "奔馳大地 翱翔天空 航向宇宙 社評／今日大陸系列八〈交通篇〉", "cat": "社論與評論觀點", "priority": 0, "summary": "點擊查看詳情", "full_text": ""}, {"title": "社論／四重壓力下 賴總統破局關鍵", "cat": "社論與評論觀點", "priority": 0, "summary": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼 被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向 對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構 性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決...", "full_text": "「鄭習會」與惠台10條提出後不久，賴總統訪問非洲友邦史瓦帝尼 被迫暫緩，民進黨政府直指中國大陸外交打壓，呼籲朝野團結一致向 對岸抗議，台海和緩氛圍逆轉。訪非受阻事件證明，兩岸對抗是結構 性矛盾。民進黨擅長利用矛盾進行政治動員，卻無法根本解決台澎金 馬安身立命的前途問題。\n\n抗中保台 執政內外交迫轉眼間賴總統上任近2年，從就職演說大談兩國互不隸屬，到後來 的祖國論、17條、併購論，再到今年初稱呼「大陸」、認同和平發展 ，以及此次「鄭習會」後低調回應，總統兩岸論述的花樣不少，挑釁 言辭也較有收斂，但情勢卻愈來愈緊張。從這次訪非受阻可以看出， 賴總統的壓力正在從4個方向同時襲來。首先是對岸的反獨政治壓力。\n\n從「鄭習會」上談「中華民族共同家 園」和「兩岸的事是家務事」，到史瓦帝尼事件後喊出「世界上早已 不存在中華民國總統」，大陸的態度非常明確：對認同「兩岸一家人 」的藍營可以有模糊空間，但對民進黨完全沒有模糊空間。換言之， 對於北京而言，即便賴總統依憲政體制就職，只要民進黨維持台獨路 線，就根本不會以「民選合法政府」對待之。此次賴總統出訪碰壁，是兩岸硬實力對決的一個側面。\n\n川普再次上 任後，賴政府一直謀畫出訪中南美，實現過境美國本土的政治目標， 華府卻不願為台灣與北京正面碰撞，川普2.0更重視美中經貿議題， 賴總統上任後保持過境美國本土「零紀錄」的尷尬。此次連專機航路 都被北京「截斷」，這絕非民進黨口中「經濟脅迫」那麼簡單，而是 北京影響力實實在在的體現。其次是台灣多數民意要求兩岸和平的壓力。\n\n訪非受阻事件後，民進 黨制式打「抗中」悲情牌，並對藍營兩岸路線、「鄭習會」發動全面 質疑。但穿透輿論喧囂感受民心溫度，老百姓對上述論述基本無感厭 倦。近期多份民調顯示，樂見「鄭習會」的民意居多，5成民意認同 兩岸談判，特別是史瓦帝尼作為全球最貧窮、最專制國家，反而會引 起民眾「為何而訪、為何外交」的反思。\n\n不可否認，多數民意願意維持兩岸分治、珍惜台灣現有制度與生活 方式，因而認同保持有威懾力的國防。但民眾同樣高度關切，備戰過 頭就變成引戰，高額國防採購滋生貪腐。儘管民進黨在國防預算上看 似理直氣壯，但民意疑慮仍然未消，尤其是民進黨完全執政8年「產 業國家隊」已淪為綠友友樂園，綠營若一棍子把嚴審預算者視為「叛 國」，遲早遭到反噬。\n\n尊重民意 開放兩岸交流第三股壓力源於民進黨內部希望「去意識形態化」的選舉壓力。眾 所周知，有別於總統層級大選，地方基層選舉時民眾「認人不認黨」 ，淡化意識形態。正因為此，「鄭習會」後大陸拋出開放觀光、直航 、農漁產的惠台10條後，綠營在中南部地方並未出現強烈排斥的聲音 ，甚至樂觀其成。\n\n同樣，黑熊學院創始人沈伯洋擬參選台北市長，綠 營內部對其「敗票」疑慮仍然瀰漫。第四股壓力源於美、日。美、日看似挺台堅定，但細看各懷鬼胎。\n\n美方對我國防預算的施壓一波高於一波，但這背後究竟是保台決心， 還是軍火商利益驅動？賴政府說不清，美國也不想說清。但另一方面 ，美國亦敦促兩岸對話，對「鄭習會」未表反對，也對賴總統構成無 形壓力。\n\n此外，日本雖關切「台海有事」，但無法容忍台灣主動操作 ，《日經》爆料卓揆高調訪日引起東京不滿，便是賴總統面臨信任危 機的冰山一角。身為元首，賴清德總統出訪受阻，絕非顏面問題，事關國家尊嚴。不過，既然賴總統代表中華民國台澎金馬2300萬人民行使職權，要彰 顯自己是「民選合法政府領導人」，就必須要尊重多數民意、獲得充 分民意授權，才會贏得各方信任。\n\n否則會愈來愈陷入不利和被動，直 至權威掃地。面對四重壓力，賴總統的抉擇事關台澎金馬前途，破局關鍵還是在 於開放兩岸自然交流互動。不久前，賴總統在核電議題上尊重多數民 意，展現務實態度。\n\n神主牌可以高高舉起，也可以輕輕放下。賴總統 應自信從容開放兩岸民間交流，勿濫用公權力阻擋或設障，讓各方「 鬆一口氣」，既是為自己好，也是為台灣好。"}];
        
        function init() {
            document.getElementById('hero-date').textContent = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });
            renderGrid('all');
        }

        function renderGrid(filter) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            document.getElementById('grid-title').textContent = filter === 'all' ? '最新' : filter;
            
            const filtered = filter === 'all' ? DATA : DATA.filter(item => item.cat === filter);
            
            filtered.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `card ${item.priority ? 'must' : ''}`;
                card.onclick = () => showFull(item);
                card.innerHTML = `
                    <div class="card-cat">${item.cat}</div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-summary">${item.summary}</div>
                    <div class="card-footer">閱讀全文 →</div>
                `;
                grid.appendChild(card);
            });
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function showFull(item) {
            const body = document.getElementById('modal-body');
            const contentHtml = item.full_text.split('\n\n').map(p => `<p>${p}</p>`).join('');
            body.innerHTML = `
                <div class="modal-cat">${item.cat}</div>
                <div class="modal-title">${item.title}</div>
                <div class="article-text">${contentHtml || '尚未擷取到全文內容'}</div>
            `;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
