<script>
const DATA = [{"title": "台股4月天 不得了 30日收月線，市場看好；隨四大CSP財報公布，牽動5月天", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股29日受到台積電出清安謀、OpenAI表現不如預期引發市場疑慮，以及阿聯退出石油輸出國組織OPEC等利空衝擊，在外資擴大賣超4 81億元與台積電領跌下，加權指數盤中一度跌破多頭防線5日線39,0 17點，所幸權后台達電及股王信驊攜手股后穎崴逆勢大漲，終場下跌 218點收39,303點，守住5日線。五一勞動台股休市，30日將收周線及4月月線，隨著連假來到，加上美國聯準會利率決策會議宣布結果，與四大雲端服務供應商（CSP）亞馬遜、谷歌、...", "full_text": "台股29日受到台積電出清安謀、OpenAI表現不如預期引發市場疑慮，以及阿聯退出石油輸出國組織OPEC等利空衝擊，在外資擴大賣超4 81億元與台積電領跌下，加權指數盤中一度跌破多頭防線5日線39,0 17點，所幸權后台達電及股王信驊攜手股后穎崴逆勢大漲，終場下跌 218點收39,303點，守住5日線。五一勞動台股休市，30日將收周線及4月月線，隨著連假來到，加上美國聯準會利率決策會議宣布結果，與四大雲端服務供應商（CSP）亞馬遜、谷歌、Meta、微軟將公告財報，使得30日台股面臨的壓力不輕，但統計4月到29日止，台股已寫下多項新紀錄：一、加權、櫃買指數各攻上 40,194 點、404.55 點，以及 4 月來各漲 7,580 點、75.02 點，四寫歷史新紀錄。二、上市、上櫃及興櫃成交量各為18.06兆元、5.25兆元、0.37兆元，合計23.68兆元，19個交易日，三市場日均值1.25兆元，五福臨門創新高。\n\n三、權值三王台積電4月大漲420元、台達電漲785元、聯發科漲1, 085元，以及股王信驊及股后穎崴各漲5,855元及3,035元，均是歷史新紀錄，五大天王齊奔高。四、4月來上市融資餘額增加792.38億元，4月來上櫃融資餘額增加 408.59億元，增加金額創單月新高，其中上櫃融資餘額29日再寫新高，達1,787億元。外資本周趁著台股奔高逢高調節，29 日賣超 481.47 億元，累計連三日賣超 1,386.42 億元；\n\n國家隊續穩盤，八大公股行庫逢低敲進65.46 億元，連三買共131.58億元，投信則買超21.28億元，累計連七買共 376.17億元。隨著4月台股爆天量大漲激情演出，法人認為，技術面來看，台股乖離率已偏高，國內外大型科技股法說會陸續登場公布財報，若沒有「驚喜」，則5月震盪機率高。唯一利空就是漲太多過去對台股一路看多的分析師蔡明翰最新看法則偏保守，他認為，目前台股唯一的利空就是漲太多，提醒投資人留意四大CSP財報公布及釋出的未來看法，不排除5月會拉回4％～5％，即約在38,000點，高點看40,500點，拉回後仍有機會挑戰歷史高點。\n\n台新投顧總經理黃文清也強調，5月台股震盪機率高，低點預估35 ,700點，高點仍上看43,000，指數震盪整理後仍有創高機會，保持看多的統一投顧董事長黎方國仍表示「沒有最高，只有更高」，不對股市預設高點。"}, {"title": "台股市值 升至全球第六", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "拜AI概念股需求強勁和台積電股價飛漲所賜，台灣股市市值水漲船高，繼4月初超越英國之後，超車加拿大，躍居全球第六大股市。美媒彙整最新數據顯示，今年來台灣上市公司總市值激增超過35％，市值達4.47兆美元（新台幣143兆）。至於加拿大股市同期僅上漲約5％，市值為4.44兆美元。", "full_text": "拜AI概念股需求強勁和台積電股價飛漲所賜，台灣股市市值水漲船高，繼4月初超越英國之後，超車加拿大，躍居全球第六大股市。美媒彙整最新數據顯示，今年來台灣上市公司總市值激增超過35％，市值達4.47兆美元（新台幣143兆）。至於加拿大股市同期僅上漲約5％，市值為4.44兆美元。\n\n惟根據證交所及櫃買中心至4月29日數據，市櫃合計總市值是新台幣138.915兆元，如以29日匯率31.557計算，達到4.40兆美元，估算今年以來成長36.16％。近二天台股走跌，市值也跟著回落，但以台股在4月27日創歷史新高40,194點、當日總市值也刷歷史新高139.74 兆元（4.43兆美元），今年台股總市值增幅達36.97％。台股氣勢如虹，晶圓代工龍頭台積電為最大功臣，台積電占台灣加權指數的權重將近45％，市值已攀升至1.8兆美元，反映全球對用於 AI技術的先進晶片需求旺盛。\n\n至於加拿大股市倚重能源、原物料和銀行類股，在大宗商品價格走軟和經濟展望轉趨疲弱下，股市漲幅相對較小。同樣的情況發生在韓國股市，AI 熱潮帶動韓國半導體類股躥升，今年來韓國上市公司總市值激增超過 45％，市值突破4兆美元大關，如今也已超越英國股市，登上全球第八大。反觀英股主要由金融、能源和礦業等傳統產業推動，英股同期漲幅僅3％。\n\n日股表現也如出一轍，AI題材和「高市交易」激勵日股迭創新高，日股日前飛越6萬點大關，刷新歷史新高紀錄。專家指出，相較於南亞與東南亞股市積弱不振，台灣、日本與韓國等亞太股市表現強勢，宛如「兩個世界」。台、韓與日股在AI與半導體產業帶動下氣勢如虹，南亞與東南亞股市受油價上漲與資本外流影響，表現相對遜色。\n\n回到台股，強勁的半導體需求、台積電業績強勁，加上金管會放寬國內股票型基金及主動式ETF對於單一個股的投資上限至25％，可望再為股市點火。分析師指出，如果AI需求保持強勁，台股將能持續受惠。不過台股漲勢依賴少數大型科技類股推動，若是投資人信心轉變，可能造成台股劇烈震盪。"}, {"title": "Arm股票 台積全出清", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "晶圓代工龍頭台積電29日公告，旗下子公司TSMC Partners Ltd.於 4月28日至29日間，全數出清持有的Arm（安謀）股票；台積電表示，此次處分股權，是基於財務投資規劃策略進行投資目標調整。市場解讀，此舉除單純財務操作外，也反映台積電在當前AI與高效能運算（HPC）競局下，對資產配置與產業角色的重新定位，避免與客戶形成潛在競合關係，維持其一貫中立的晶圓代工立場。", "full_text": "晶圓代工龍頭台積電29日公告，旗下子公司TSMC Partners Ltd.於 4月28日至29日間，全數出清持有的Arm（安謀）股票；台積電表示，此次處分股權，是基於財務投資規劃策略進行投資目標調整。市場解讀，此舉除單純財務操作外，也反映台積電在當前AI與高效能運算（HPC）競局下，對資產配置與產業角色的重新定位，避免與客戶形成潛在競合關係，維持其一貫中立的晶圓代工立場。\n\n根據公告內容，台積電此次以每股207.65美元價格，處分Arm股票 111萬784股，交易總金額約2.31億美元，預估對保留盈餘影響數約1 .74億美元，折合新台幣約54.84億元。隨著本次交易完成，台積電已全數出清Arm持股。若合併先前出售部位來看，整體投資已順利落袋為安，亦顯示台積電在資本市場操作上，掌握相對有利的出場時機，在股價高檔區間分批實現收益。\n\n台積電此筆投資報酬率相當亮眼，依照先前公告的認股價格換算，兩次出售Arm持股的每股收益分別超過4.1倍及2.34倍。半導體業界則認為，此舉與Arm戰略改變有關，隨著Arm發表AI晶片AGI CPU，將與包括英特爾、AMD 等台積電客戶直接競爭，角色逐步由 IP 供應商轉向晶片設計與平台業者，可能改變既有產業分工。對台積電而言，提前抽身有助降低潛在利益衝突，確保與各大客戶維持穩定合作關係。\n\n法人分析，台積電近年持續強化資本配置效率，在AI與先進製程擴產需求龐大下，包括2奈米、A16及先進封裝 CoWoS 等產能布局均需大量資本支出，適時實現財務投資獲利，有助充實資金動能與提升資產運用效率。同時，在全球晶圓代工競爭升溫、地緣政治與供應鏈重組壓力加劇背景下，台積電加速資源集中於核心技術與產能投資，也有助鞏固其在先進製程與AI供應鏈中的領先地位，進一步強化長期成長動能。"}, {"title": "賴總統：推動五大有感減稅新制", "source": "工商時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "5月是報稅季，兼任黨主席的總統賴清德29日表示，經濟成長所帶來稅收成果，必須轉化為人民真正有感的日常生活。他說，綜合所得稅方面，今年推動五大減稅新制，讓國家更有能力照顧人民、讓社會更加公平富足，是政府一貫的態度。他希望黨公職及行政團隊，擴大宣導及觸及，讓人民真切感受到政府在強化世代照顧、減輕人民生活負擔上的努力。", "full_text": "5月是報稅季，兼任黨主席的總統賴清德29日表示，經濟成長所帶來稅收成果，必須轉化為人民真正有感的日常生活。他說，綜合所得稅方面，今年推動五大減稅新制，讓國家更有能力照顧人民、讓社會更加公平富足，是政府一貫的態度。他希望黨公職及行政團隊，擴大宣導及觸及，讓人民真切感受到政府在強化世代照顧、減輕人民生活負擔上的努力。\n\n賴清德在中常會談話提到，從5月1日開始到6月1日止，是申報去年綜合所得稅期間。近年來，台灣經濟穩健成長，去年經濟成長率達到 8.68％，是15年來新高。這不僅是全民共同努力的成果，也展現台灣在全球經貿變局中的韌性與實力。\n\n他說，政府始終清楚，將經濟成長所帶來的稅收成果，必須轉化為人民真正有感的日常生活。去年底，執政團隊秉持「經濟果實，全民共享」的原則，通過「所得稅及貨物稅惠民措施」，透過制度性的減稅設計，將經濟成果回饋給社會。在綜合所得稅方面，賴清德說，今年推動五大減稅新制。\n\n首先，在維持排富下，每人基本生活所需費用提升至21.3萬元，長期照顧特別扣除額也提高5成到18萬元。同時，為了減輕年輕家庭育兒負擔，學齡前幼兒特別扣除額也擴大年齡，從5歲放寬到6歲以下，並提高扣除額度：第一名子女從12萬元調升為15萬元，第二名以後則提高5成至22.5萬元。在「醫藥及生育費」部分，他表示，放寬人工生殖列報規定；\n\n還有對災害的熱心公益，如去年丹娜絲風災、花蓮馬太鞍溪堰塞湖災害，個人有捐贈財團法人賑災基金會成立的募款專案金額，都可以列舉扣除。賴清德強調，無論是面對全球經貿快速變動，還是國內局勢各種挑戰，民進黨執政團隊都會秉持審慎而堅定態度，持續推動國政。讓國家更有能力照顧人民、讓社會更加公平富足，是政府一貫的態度。"}, {"title": "台股救健保 新構想浮現 政委陳時中提議 ①提撥部分證交稅挹注財源 ②補充保費改革 提高起徵門檻", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "為使健保財務永續，政府拋出「台股救健保」新構想。行政院政委陳時中昨（29）日建議提撥部分證交稅挹注健保，如撥入50%，估可確保健保約20年財務平衡；另先前補充保費改革因社會反彈作罷，他建議，可思考提高起徵門檻，從2萬元拉高至15萬元或20萬元。", "full_text": "為使健保財務永續，政府拋出「台股救健保」新構想。行政院政委陳時中昨（29）日建議提撥部分證交稅挹注健保，如撥入50%，估可確保健保約20年財務平衡；另先前補充保費改革因社會反彈作罷，他建議，可思考提高起徵門檻，從2萬元拉高至15萬元或20萬元。\n\n證交稅率為千分之 3，據財政部統計，去年全年證交稅共 2,928 億元，若 50%撥入健保，可挹注將近 1,500 億元。對於陳時中構想，政院昨日回應，讓健保財政永續是重要目標，各界都有諸多構想，相關方案也會傾聽各種意見，目前未有定案。對於證交稅挹注健保，衛福部長石崇良表示「舉雙手贊成、樂觀其成」。\n\n歐洲在台商務協會昨日舉辦「2026歐洲台灣醫療論壇」，陳時中出席發表演說。他指出，健保是我國值得自豪的成就，優勢在於單一支付者的高效率模式，但也存在單一財源的結構性問題。陳時中說，健保財務結構挑戰嚴峻，日前衛福部提出二代健保補充保費改革方案，若租金、利息與股利一年累計超過2萬元，收取2.11%補充保費，但因反彈過大而作罷，他建議起徵門檻可從2萬元，拉到15萬或20萬元。\n\n另外陳時中表示，過去半年他看到股票市場波動，就一直在思考，擴大健保費基應仿效菸捐模式，提撥部分證交稅挹注健保。他估算，若有50%挹注健保，每年可為健保帶來穩定財源，不僅確保未來約20年財務平衡，符合資本利得者應負擔更多社會責任，且不會增加投資人現有稅負，是一個值得社會共同思辨的長治久安之策。知情人士表示，陳時中主要考量健保韌性和永續，體現「量能付費」精神，過去依照所得來設定保費，再加上補充保費，例如非經常性所得收入等方式，當初石崇良提出調整補充保費，就是期盼能將資本利得比重提高，而不是單純從受薪階級身上來增加保費。\n\n知情人士說，近年台股表現亮眼，若真能進入實質討論，也許也不失為新選擇，也是另一種經濟果實、全民共享，不過這部分還涉及財稅制度，仍需周延討論。至於補充保費改革，據悉，相關議題仍在衛福部研議中，尚未定案。"}, {"title": "台灣躍全球第六大股市", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "在人工智慧（AI）概念股強勁需求、以及半導體龍頭台積電反彈的帶動下，台灣股市市值本月繼超越英國後，如今又趕過加拿大，躍升為全球第六大股市。彭博資訊彙整的數據顯示，截至4月28日收盤，台灣上市公司總市值今年來增加超過35%，達到4.47兆美元；相較之下，加拿大的總市值僅成長約5%，來到4.44兆美元。", "full_text": "在人工智慧（AI）概念股強勁需求、以及半導體龍頭台積電反彈的帶動下，台灣股市市值本月繼超越英國後，如今又趕過加拿大，躍升為全球第六大股市。彭博資訊彙整的數據顯示，截至4月28日收盤，台灣上市公司總市值今年來增加超過35%，達到4.47兆美元；相較之下，加拿大的總市值僅成長約5%，來到4.44兆美元。\n\n台積電在台灣加權指數中的權重占了將近45%，市值已膨脹至1.8兆美元。彭博資訊報導，台灣與加拿大股市發展，凸顯出指數的組成如何形塑各國股市。其中，台灣股市以科技股為主，乘著全球半導體與AI的熱潮一路走高，特別是以台積電為首的晶圓代工、封測、組裝等產業，在台股市值中占有較高權重，隨市場趨勢的引領，不斷領漲台股創高走揚，帶動市值快速激增。\n\n相較之下，加拿大基準指數以資源與金融產業為核心，在商品價格波動與經濟成長放緩下，投資回報則顯得較為平淡。雖然今年以來維持多頭格局、並屢創新高，但台股更具全球主流優勢與熱錢吸引力，因而得以「超英趕加」。依據彭博28日的資料，全球股市市值前十大，依序是美國、中國、日本、香港、印度、台灣、加拿大、南韓、英國、法國。\n\n由於AI已成為全球科技業與資本市場王道，台股乘著AI的翅膀，僅4月在全球股市市值排名就飛升二名，反映出全球資金快速轉向AI硬體基礎設施的大趨勢。"}, {"title": "韓國瑜挺軍購 國民黨鄭中央嗆開除 副主席季麟連中常會開砲 批韓賣黨求榮", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "立法院長韓國瑜多次呼籲盡速處理國防特別條例草案，並私下支持八千億元軍購版本，國民黨副主席季麟連昨天公開在中常會痛批，他不相信韓國瑜「賣黨求榮」，但如果有此事，他一定大義滅親，建議開除韓國瑜黨籍。韓則回應「老牛自知夕陽晚，靜默無聲自奮蹄」，他此生所行，無愧於國家，無愧於人民，無愧於職責，無愧於黨，亦無愧於心。季大義滅親說外界視為黨祭殺手鐧韓：老牛靜默無聲自奮蹄無愧於黨立法院審議中的國防特別條例草案，國民黨內多股力量正為軍購金額角力，季麟連...", "full_text": "立法院長韓國瑜多次呼籲盡速處理國防特別條例草案，並私下支持八千億元軍購版本，國民黨副主席季麟連昨天公開在中常會痛批，他不相信韓國瑜「賣黨求榮」，但如果有此事，他一定大義滅親，建議開除韓國瑜黨籍。韓則回應「老牛自知夕陽晚，靜默無聲自奮蹄」，他此生所行，無愧於國家，無愧於人民，無愧於職責，無愧於黨，亦無愧於心。季大義滅親說外界視為黨祭殺手鐧韓：老牛靜默無聲自奮蹄無愧於黨立法院審議中的國防特別條例草案，國民黨內多股力量正為軍購金額角力，季麟連揚言開除韓國瑜黨籍，被外界視為是鄭中央祭出的「殺手鐧」。\n\n季麟連在中常會呼籲支持國民黨團總召傅崐萁的軍購版本（三八○○億+N），並點名支持八千億軍購版本的韓國瑜和徐巧芯。季麟連指出，韓國瑜是他四十年來的革命袍澤、鐵桿兄弟，是國民黨的光榮、黃復興的驕傲，「打死我，我都不會相信國瑜兄會做出賣黨求榮的事，如果有這個事，黃復興必然挺身而出大義滅親，建議開除國瑜兄的黨籍」。季麟連此話一出，讓坐在一旁的傅崐萁看傻了眼，連忙起身要拉著季麟連的手坐下，要他別再講，但季不為所動；\n\n國民黨主席鄭麗文也尷尬看著季說，「季副主席沒那麼嚴重」。談到徐巧芯，季表示，在立委選舉和反罷時，黃復興力挺徐巧芯，所以請徐千萬三思，不要做出親痛仇快的事情。徐回應，她絕對不會做出親痛仇快的事情，一定遵守黨團的決議行事，請季副主席放心。"}, {"title": "假冒美知名航太學者 長達5年 中國工程師竊國防軟體FBI通緝", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "美國國家航太總署（NASA）近日揭露一起重大國防安全事件，一名受僱於中國航空工業集團（AVIC）的卅九歲中國籍工程師吳淞（Song Wu），在長達近五年的時間裡，涉嫌冒充美國知名航太學者，成功誘騙美國政府雇員與頂尖大學研究人員，提供可用於研發先進飛彈及武器系統的敏感國防軟體。目前美國聯邦法院已對在逃的吳淞發布逮捕令。誘騙提供用在先進飛彈敏感軟體NASA督察長辦公室（OIG）上週宣布，吳淞犯案時間從二○一七年一月持續至二一年十二月，鎖定的...", "full_text": "美國國家航太總署（NASA）近日揭露一起重大國防安全事件，一名受僱於中國航空工業集團（AVIC）的卅九歲中國籍工程師吳淞（Song Wu），在長達近五年的時間裡，涉嫌冒充美國知名航太學者，成功誘騙美國政府雇員與頂尖大學研究人員，提供可用於研發先進飛彈及武器系統的敏感國防軟體。目前美國聯邦法院已對在逃的吳淞發布逮捕令。誘騙提供用在先進飛彈敏感軟體NASA督察長辦公室（OIG）上週宣布，吳淞犯案時間從二○一七年一月持續至二一年十二月，鎖定的攻擊目標極為廣泛且敏感，不僅涵蓋NASA，還包括美國空軍、海軍、陸軍、聯邦航空總署（FAA），以及多所美國知名研究型大學。\n\n美國聯邦調查局（FBI）指出，吳淞鎖定用於航太工程與「計算流體動力學」的受管制專有軟體與原始碼。這些高度機密的技術，可直接應用於先進戰術飛彈的研發，以及各類武器系統的氣動力設計與性能評估。涉14項電匯詐欺罪每項可判20年調查人員發現，吳淞透過建立多個偽造的電子郵件帳號，偽裝成與 NASA 有合作關係的知名航太教授或研究人員，許多受害者誤以為索資者是值得信賴的學術同業，進而在不知情的情況下交付受保護的技術資料，導致部分受害者無意間違反美國嚴格的出口管制法規。\n\n中國航空工業集團專門生產民用與軍用飛機，二○二○年及二一年即被美國政府列入制裁名單。吳淞被指控的罪名包括十四項電匯詐欺罪，以及十四項嚴重身分盜竊罪；每項電匯詐欺罪最重可面臨廿年有期徒刑。"}, {"title": "累犯跟騷 竟重傷女生外婆、里長 跟騷2年下手傷人 檢方聲請預防性羈押", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "新北市蘆洲區廿八日發生震驚地方的跟蹤傷人案，四十一歲性騷擾、跟騷累犯游姓男子長達二年跟蹤十八歲李姓女高中生，當天下午四時許再度尾隨她回到社區大門，李女嚇得打電話求救，七十二歲外婆與信義里長郭騰芳先後出面制止，卻遭游嫌痛毆至頭破血流。最終在見義勇為的鄰居、路人及趕抵的警力聯手下，成功壓制游嫌，依跟騷法及重傷害等罪嫌送辦，檢方已聲請預防性羈押。鄰居、警方聯手制伏壓制送辦警方調查，當天下午四時廿五分接獲報案，蘆洲區民族路一六七巷口有民眾圍捕歹...", "full_text": "新北市蘆洲區廿八日發生震驚地方的跟蹤傷人案，四十一歲性騷擾、跟騷累犯游姓男子長達二年跟蹤十八歲李姓女高中生，當天下午四時許再度尾隨她回到社區大門，李女嚇得打電話求救，七十二歲外婆與信義里長郭騰芳先後出面制止，卻遭游嫌痛毆至頭破血流。最終在見義勇為的鄰居、路人及趕抵的警力聯手下，成功壓制游嫌，依跟騷法及重傷害等罪嫌送辦，檢方已聲請預防性羈押。鄰居、警方聯手制伏壓制送辦警方調查，當天下午四時廿五分接獲報案，蘆洲區民族路一六七巷口有民眾圍捕歹徒。\n\n被害女學生當時剛從捷運站返家，察覺又被游嫌跟蹤，嚇得打電話求救外婆，外婆下樓斥責游嫌，卻慘遭毒手打倒在地，信義里長郭騰芳聽見呼救聲，衝上去救援，也遭年輕力壯的歹徒揮拳攻擊，周遭鄰居與路人群起圍捕，與隨後趕抵的警力聯手制伏頑強抵抗的犯嫌。游男落網後態度不配合，辯稱只是想到高中看妹妹，甚至反嗆警方「這樣有犯法嗎」。被害親友批男把身障當擋箭牌被害親友痛批，游男把持有的身心障礙手冊當成施暴的擋箭牌，強烈期盼司法能嚴懲惡徒，還給他們安寧生活。\n\n蘆洲警分局表示，已將游男移送新北地檢署偵辦，警方除對其發出書面告誡並協助家屬聲請跟騷保護令。新北地檢署檢察長郭永發對此案極為重視，已指示主任檢察官與警方保持密切聯繫並提供偵辦指導，務必防範犯嫌反覆施暴的機會。"}, {"title": "中國打壓添一例 我世界咖啡冠軍被去台灣化", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "中國在國際社會矮化台灣，再添一例。台灣在世界咖啡賽制組織（World Coffee Championship簡稱WCC）所舉辦的專業咖啡競賽，長年有傑出的表現，並以「台灣選手」身份出賽。不過，WCC前晚將涉及台灣的訊息，無預警從「TAIWAN」改成「CHINESE TAIPEI」，讓台灣咖啡圈炸鍋，除反彈中國施壓，也盼能回到原貌，讓「世界以Taiwan認識」。", "full_text": "中國在國際社會矮化台灣，再添一例。台灣在世界咖啡賽制組織（World Coffee Championship簡稱WCC）所舉辦的專業咖啡競賽，長年有傑出的表現，並以「台灣選手」身份出賽。不過，WCC前晚將涉及台灣的訊息，無預警從「TAIWAN」改成「CHINESE TAIPEI」，讓台灣咖啡圈炸鍋，除反彈中國施壓，也盼能回到原貌，讓「世界以Taiwan認識」。\n\n據指出，這次比賽贊助商之一是中國的瑞幸咖啡，背後顯有中方介入。國內咖啡界人士認為，若不積極回應，被「去台灣化」效應恐擴大。我國選手林紹興本月才赴美國參加「二○二六世界盃拉花大賽」奪冠，WCC官網先前介林為「TAIWAN」競賽者，前晚已經改為「CHINESE TAIPEI」。\n\n台灣咖啡協會昨聲明，未來參與WCC競賽必須使用「CHINESE TAIPEI」，這是不可迴避的條件，並非協會自行決定或調整。"}, {"title": "高捷世運站 A5街廓公辦都更案簽約", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "台積電楠梓產業園區至少有6個先進製程廠，為滿足住宿需求，高市府於捷運世運站A5街廓推出公辦都更案，由「日勝生」獲選最優申請人，昨天簽約，將投資88.5億元，興建3棟建築，其中618間旅館級宿舍，將出租給台積電及供應鏈員工居住，預計今年11月底動工，2030年底完工。", "full_text": "台積電楠梓產業園區至少有6個先進製程廠，為滿足住宿需求，高市府於捷運世運站A5街廓推出公辦都更案，由「日勝生」獲選最優申請人，昨天簽約，將投資88.5億元，興建3棟建築，其中618間旅館級宿舍，將出租給台積電及供應鏈員工居住，預計今年11月底動工，2030年底完工。"}, {"title": "藍軍購之亂 季麟連轟韓國瑜 不信韓賣黨求榮 韓5個無愧自比老牛", "source": "聯合報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "軍購特別條例草案還在立法院協商中，國民黨立院黨團昨中午召開黨團大會，兩派意見拉扯；國民黨副主席季麟連下午在中常會中連說重話，呼籲全黨力挺黨版草案，說不相信立法院長韓國瑜「會做出賣黨求榮的事」，若有，黃復興就建請開除韓黨籍。這番發言讓黨內衝突搬上檯面。", "full_text": "軍購特別條例草案還在立法院協商中，國民黨立院黨團昨中午召開黨團大會，兩派意見拉扯；國民黨副主席季麟連下午在中常會中連說重話，呼籲全黨力挺黨版草案，說不相信立法院長韓國瑜「會做出賣黨求榮的事」，若有，黃復興就建請開除韓黨籍。這番發言讓黨內衝突搬上檯面。\n\n鄭麗文喊話院長辛苦了針對黨內的「軍購之亂」，黨主席鄭麗文緩頰表示，任何意見都可交流，非常尊重韓國瑜在立法院的角色。韓國瑜傍晚在臉書發文：「老牛自知夕陽晚，沉默無聲自奮蹄。此生所行，無愧於國家、無愧於人民、無愧於職責、無愧於黨，亦無愧於心。」黨內立委與鄭麗文都在臉書下留言紛喊「院長辛苦了」。黨團討論80分鐘沒共識對於軍購規模，除了黨版「三八○○億元加Ｎ」，國民黨立委徐巧芯另主張八千億元版本，也獲不少藍營立委支持。黨中央前晚即動員溝通，盼黨內立委支持「三八○○億元加Ｎ」黨版，但立院黨團大會討論約八十分鐘，對於預算規模究竟要「三八○○億元加Ｎ」或「八千億元」，並無共識。\n\n中廣前董事長趙少康質疑，黨團大會中，發言支持八千億版本的有十九人，支持黨版的有六人，「浪費時間不表決，是要拖什麼？」 國民黨團總召傅崐萁會後表示，昨天開放大家討論，各種意見都有，各選區感受到的氛圍不同，經討論凝聚共識後，一定會向各界報告。傅強調，國民黨是民主政黨，大家暢所欲言，最快院會在五月八日處理，仍有時間，大家繼續溝通。\n\n季麟連罕見在中常會以副主席兼黃復興黨部主委身分起身發言。他指出，黨版完全合乎法理情，既有尊嚴、彈性更有前瞻，「論軍購，沒人比我有發言權」。話鋒一轉，談到軍購條例在立法院協商，季麟連說，韓國瑜是他四十年來的革命袍澤、鐵桿兄弟，是國民黨的光榮、黃復興的驕傲，都是黃埔子弟，軍人以徹底服從命令誓死達成任務為工作目標，「打死我都不會相信韓國瑜會做出賣黨求榮的事」，如果有，黃復興必然挺身而出、大義滅親，建請開除韓國瑜黨籍。\n\n由於此話極重，鄭麗文在一旁連忙揮手安撫，傅崐萁更起身拉著季要他別再講，但季仍繼續說，徐巧芯是大家最喜歡、最期盼的未來領袖，黃復興全力相挺，所以「請徐巧芯千萬三思，不要做出親痛仇快的事」。季事後澄清對韓有信心鄭麗文隨即緩頰，指季麟連一生戎馬、感情豐沛，雖然話說得有點重，黨中央與黨團成員都有很良性溝通，大家主張雖然不同，相信大家出發點都是好的。國民黨文傳會立委尹乃菁說，季麟連是個人想法，不代表黨中央的立場。\n\n季事後也澄清，他對韓國瑜的人格操守深具信心，韓在立法院調和鼎鼐，協調朝野立委審議軍購條例，必不負國人期待。鄭麗文表示，她從未跟任何黨團成員談過態度改變，因為這（指黨版）是深思熟慮的結果，是最有利於完成對美軍購、保護台灣、守住百姓荷包、堅守財政紀律，絕對是最負責任的做法，「黨中央態度從未改變過」。"}, {"title": "台股發燒 陳時中提證交稅挹注健保 如提撥百分之五十可確保健保財務20年 民團憂「看天吃飯」", "source": "聯合報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "健保財務嚴峻，行政院政務委員陳時中昨建議仿效菸捐模式，提撥千分之三「證券交易稅」的一部分挹注健保，如有百分之五十，估算確保未來健保約廿年財務平衡。但此提議遭到財稅學者質疑，民團則擔憂此舉恐讓健保「看天吃飯」。據悉，補充保費的相關議題目前在衛福部研議中。", "full_text": "健保財務嚴峻，行政院政務委員陳時中昨建議仿效菸捐模式，提撥千分之三「證券交易稅」的一部分挹注健保，如有百分之五十，估算確保未來健保約廿年財務平衡。但此提議遭到財稅學者質疑，民團則擔憂此舉恐讓健保「看天吃飯」。據悉，補充保費的相關議題目前在衛福部研議中。\n\n知情人士透露，陳時中會提出此想法，主要是針對健保體系韌性和永續的考量而提出，目前健保體系的精神是「量能付費」，依據每個人的能力設定保費，過去是依照所得設定保費，加上補充保費多涵蓋一些，例如非經常性所得的收入等方式來做，當初衛福部長石崇良提出調整補充保費，就是期盼能夠把資本利得的比重提高一點，而不是單純從受薪階級增加保費。知情人士說，目前最新提出的構想也是在此基礎上建立，加上這幾年台股表現不錯，如果能夠進入實質討論也許不失為一項新的選擇，讓經濟果實能讓全民共享，但這部分還涉及到財稅制度，還需要更加周延的討論。歐洲在台商務協會昨舉辦「二○二六歐洲台灣健康論壇」，陳時中以「健康戰略價值：透過全民健保接軌全球創新與全生命周期韌性」專題發表演說，他指出，健保是我國成就，優勢在於單一支付者的高效率模式，但也存在單一財源的結構性問題。\n\n陳時中說，健保至今創辦逾卅年，財務結構挑戰嚴峻，收支長期存在百分之一至二缺口，導致每隔數年便會浮現財務危機。衛福部清楚健保費用收入資本利得占比過低，日前提出年度結算制度，若租金、利息與股利一年累計超過兩萬元，收取百分之二點一一補充保費，但因反彈聲浪過大而作罷。陳時中表示，歷任衛福部長調整健保費率時，常伴隨政治壓力，他在一○九年調高費率後是第一名未下台的部長，「希望創下這樣的先例，能讓未來的部長在調整費率時，能更勇敢一點」。\n\n陳時中說，健保財務不穩的根源在於保費收入主要依賴薪資所得，現行健保費率達百分之五點一七，已逼近百分之六法定上限，調升空間有限。他透露，過去半年每天關注股票市場，腦中思考著如何擴大健保費基，建議仿效菸捐模式，提撥現行千分之三證交稅的一部分挹注健保。陳時中說，若有百分之五十的證交稅挹注健保，可為健保帶來穩定財源，不僅確保未來廿年財務平衡，且符合資本利得者應負擔更多社會責任，不會增加投資人現有稅負。\n\n財政主管官員表示，為讓健保財政永續，外界有不同的建議，目前尚未定調。"}, {"title": "副主席轟韓 軍購案藍掀風暴 傳韓助推8000億 不同於黨中央3800億+N 黨內版本之爭愈演愈烈", "source": "中國時報 A01 要聞", "cat": "台灣政府與政策訊息", "priority": 1, "summary": "國防特別預算條例金額應訂多少？國民黨爆發內訌！國民黨立院黨團29日中午召開黨團大會，青壯派立委原以為「8000億」版可定案，未料黨中央逆襲致電藍委踩死「3800億＋N」，以致未達共識，擇日再議。", "full_text": "國防特別預算條例金額應訂多少？國民黨爆發內訌！國民黨立院黨團29日中午召開黨團大會，青壯派立委原以為「8000億」版可定案，未料黨中央逆襲致電藍委踩死「3800億＋N」，以致未達共識，擇日再議。\n\n隨後在國民黨中常會，軍系副主席季麟連突然發難，抨擊支持「8000億」版本的立法院長韓國瑜「若賣黨求榮，將建請開除其黨籍」，引發議論。黨主席鄭麗文事後趕緊致電韓國瑜，強調季麟連談話為個人立場，不代表黨中央態度。選區壓力大青壯派多次找韓商議國民黨團昨午邀集黨籍立委討論國防特別條例草案，由於鄭麗文前日受訪時說「先通過 8000 億元也可以」，令支持8000億元版本的藍委鬆一口氣。\n\n據透露，青壯派藍委為解黨內僵局，已多次串聯並找上韓國瑜商議，支持「8000億」版的藍營縣市首長，也致電立委爭取支持。不過，黨中央與總召傅（山昆）萁皆支持「3800億＋N」版本，他們為說服黨團立委支持，前晚透過黨務系統致電各藍委，令立委們左右為難。但傅（山昆）萁昨表示，立法院的事情，就由立法院來決定，並沒有外傳誰打電話給誰的問題。\n\n昨午約40多名藍委出席黨團大會，兩派立委各占一半。支持8000億版的立委表示，在選區較綠的地區，若以「3800億＋N」通過預算，難獲民意支持，間接影響年底地方選戰。「3800億＋N」派立委則表示，綠營在協商中堅持1.25兆，完全沒讓步，若國民黨放寬到8000億，對支持者也不好交代。\n\n另有保守派立委指，黨團當初放行中央總預算案時，未能爭取到行政院同意為軍警加薪，已令黨內支持者反彈。季麟連嗆大義滅親傅鄭忙勸阻經80分鐘討論，兩派相持不下，無法有共識。傅（山昆）萁說，距下次立院黨團協商5月6日還有時間，將繼續溝通。\n\n據了解，國民黨團將於5月5日召開黨團大會討論檢察總長人事案，屆時可能一併討論國防特別條例。緊接著，在國民黨中常會上，鄭麗文致詞後，請季麟連對國防特別條例發表看法。季指出，國防特別條例沸沸揚揚討論近1年，他一直沒有講話，因為傅（山昆）萁領導立法院黨團提出了最佳的行動方案，民進黨提出的1.25兆方案是半個世紀來最荒謬的鬧劇，非常糟糕。\n\n季麟連話鋒一轉，突然提起韓國瑜，表示 2 人是 40 年前革命袍澤、 鐵桿兄弟，「國瑜，你是黃復興的驕傲，我打死都不會相信國瑜兄會做出賣黨求榮的事。如果有這個事，黃復興必然挺身而出、大義滅親，建請開除國瑜兄的黨籍。」 季麟連的發言令在場媒體與中常委都很驚訝，傅（山昆）萁馬上起身要阻止，但季仍繼續發表意見。\n\n鄭麗文則在一旁喊「謝謝將軍」，也無法阻止季麟連繼續發言。季麟連並把矛頭指向倡議「8000億版本」的藍委徐巧芯，要求她三思，不要做出親痛仇快的事情。粉絲聲援抗議韓自比老牛、無愧鄭麗文隨後緩頰，稱「季副主席比較感情充沛一點，韓院長是『石磨心』，大家攏知影立法院院長真歹做」。\n\n季麟連的談話經直播後，引發軒然大波，立即有韓粉去黨中央抗議。徐巧芯獲知後受訪表示，她絕不會做出親痛仇快的事情，會按照黨團決議行事，並強調個人事小，但她非常反對「開除韓國瑜院長黨籍」，韓協商很辛苦，應給予尊重。韓國瑜昨傍晚在臉書以 50 字表達心境，直言「老牛自知夕陽晚，沉默無聲自奮蹄。\n\n此生所行，無愧於國家，無愧於人民，無愧於職責，無愧於黨，亦無愧於心。」韓的貼文，4小時內有8萬多人點讚，550 0餘則留言鼓勵，包括鄭麗文的留言「感謝韓院長，辛苦了。」 據了解，鄭麗文第一時間就趕緊致電韓國瑜表示，大家都是為國家好、為國民黨好，希望風波就此平息，回歸理性，多年情誼，不該受到影響。\n\n鄭強調季的談話是其個人立場，不代表國民黨中央。季麟連也透過國民黨文傳會發聲明，強調韓國瑜在立院調和鼎鼐，協調朝野立委審議，相信韓必不負國人期待，全文並未道歉。"}, {"title": "48小時緊急行動 搶救非洲行仍破功 賴訪非專機 德國、捷克也拒過境", "source": "中國時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "外媒29日報導，在三個非洲國家拒絕賴清德總統過境領空之後，台灣緊急向包括德國和捷克在內的歐洲國家提出過境請求，但遭到德國和捷克拒絕。然而，德國在台協會24日曾發文聲援台灣，「針對賴總統專機遭撤銷飛越許可一事，我們重申，一切與領空管理相關的決定，均應以安全與穩定為依歸。」 賴清德原定 4 月中旬出訪非洲邦交國史瓦帝尼，參加國王恩史瓦帝三世的登基 40 周年慶典，但在出訪前夕，總統府卻宣布暫緩，並表示塞席爾、模里西斯、馬達加斯加等非洲三國取...", "full_text": "外媒29日報導，在三個非洲國家拒絕賴清德總統過境領空之後，台灣緊急向包括德國和捷克在內的歐洲國家提出過境請求，但遭到德國和捷克拒絕。然而，德國在台協會24日曾發文聲援台灣，「針對賴總統專機遭撤銷飛越許可一事，我們重申，一切與領空管理相關的決定，均應以安全與穩定為依歸。」 賴清德原定 4 月中旬出訪非洲邦交國史瓦帝尼，參加國王恩史瓦帝三世的登基 40 周年慶典，但在出訪前夕，總統府卻宣布暫緩，並表示塞席爾、模里西斯、馬達加斯加等非洲三國取消專機飛航許可。\n\n據三位官員稱，在三個親北京的非洲國家關閉領空，切斷賴直飛史瓦帝尼的航線後，台灣緊急向包括德國和捷克在內的歐洲國家提出過境請求，但這2個歐洲國家拒絕這項提議。報導指，這起事件凸顯大陸在全球封鎖台灣領導人的影響力。台北方面表示，塞席爾、模里西斯、馬達加斯加等3國控制南部非洲最直接航線的飛行情報區，他們應北京的要求撤銷賴清德的飛越許可。\n\n此項拒絕引發台北方面48小時的緊急行動，試圖挽救賴清德的行程，而最終能否成行則取決於能否獲得歐洲的幫助。在德國方面，知情人士透露，德國總理梅爾茨已獲知此事，德國當局認為賴清德的專機若降落在法蘭克福，「恐會造成問題」。另外，北京在得知德國正在考慮台灣的請求後，致電柏林官員，施壓要求他們拒絕賴清德的過境請求。\n\n德國政府沒有回應賴清德的請求，捷克外交部則表示，「我們沒有收到任何此類請求，也沒有就此事與任何第三方進行任何接觸。」 一位官員表示，德國和捷克最終都拒絕這項提議，部分原因是台灣要求在2小時內得到答覆，他認為這項要求根本不可能實現。其他方案也被提出。\n\n據一位知情人士透露，我也曾討論賴總統過境法國印度洋屬地留尼旺島，但最終放棄，因為該法屬島嶼周圍的空域由模里西斯管轄。上一次有歐洲國家允許台灣過境是在 2014 年，當時馬英九總統途經法蘭克福前往非洲和中美洲的夥伴國家。台灣外交部拒絕對具體操作細節置評。\n\n外交部昨強調，規畫過程都有與各相關方保持溝通與協調，但針對作業細節，基於飛航安全、整體行程及任務順利推動等多重考量，不多做評論。外交部重申，本案受到阻礙的原因，是來自於北京對於馬達加斯加等3國的施壓，以取消專機的飛航許可對我國進行外交打壓。總統府21日宣布暫緩總統行程後，法國與德國駐台單位皆發文聲援。\n\n德國在台協會表示，飛越權是國際民航的基本原則，他們高度重視在《芝加哥公約》框架下，維護安全、有序且可預期的民用航空運作。"}, {"title": "《操盤心法》處AI風口上 台股不設高點", "source": "工商時報 B02 法人看市", "cat": "台灣產業與投資動向", "priority": 0, "summary": "長黃詣庭市場分析：中東戰爭看來絲毫不影響台灣的基本面。根據財政部數據顯示，2026年3月出口801億美元、月增62％，首度突破800億美元並創歷史新高；1～3月出口1,957億美元，累計年增51％。", "full_text": "長黃詣庭市場分析：中東戰爭看來絲毫不影響台灣的基本面。根據財政部數據顯示，2026年3月出口801億美元、月增62％，首度突破800億美元並創歷史新高；1～3月出口1,957億美元，累計年增51％。\n\n進口589億美元、年增38％，同樣創新高。主要受惠AI、高效能運算及雲端服務等應用需求擴增，以及新一代AI運算系統量產出貨，帶動相關產品外銷價、量同步成長。景氣燈號方面，國發會公布3月景氣對策信號為 39分，較2月41分減少2分，已經連續第4個月紅燈，去年9月以來已經連續7個月維持在32分的黃紅燈以上，台灣經濟現況火熱。\n\n台積電4/16法說會也釋出樂觀展望，全年美元營收上修至年增30％以上，資本支出維持原預期的520～560億美元不變，除了投資2奈米，也將回頭擴3奈米，因為AI、HPC、手機與車用需求強勁，台積電正執行全球產能擴張計畫，包括台南新3奈米廠預計2027上半年量產、 亞利桑那第二廠預計2027下半年量產、日本第二廠預計2028年量產。無獨有偶，金管會近期鬆綁國內股票型基金及國內股票主動式ETF 投資單一公司股票上限，由原本10％有條件放寬至最高25％，個股符合市值權重超過10％，瞬間引爆台積電的買盤，股價於4月27日創下 2,330元這具備歷史意義的高點，也同步推升指數攻上四萬點。同時美股我們也看到AMD的股價，從4月低點200.62美元漲到352美元，英特爾4月從44.98美元漲到87.1美元，美光從340.2美元漲到531美元，科技股正全面大漲，台灣處於最核心的受惠圈，下半年景氣、營運數字展望仍樂觀不變。\n\n操作建議：回到產業方向，AI相關供應鏈仍是今年最核心的產業，四大CSP業者大舉擴建AI伺服器，從台灣外銷出口持續創下新高可看出端倪，且下半年進入VR 200時代，都是台灣相關供應鏈的機會。近來AI應用日新月異，AI Agent開始從聊天工具變成執行工具。當 AI可以處理郵件、排程、寫程式、操作瀏覽器、執行工作流程，推論需求正從「偶爾問答」變成「長時間、多步驟、持續運作」。\n\n這會大幅推升token消耗、記憶體需求、儲存需求與網路傳輸需求。AI真正的瓶頸從算力擴散到HBM、DRAM、SSD，以及推升傳輸升級成光通訊產業。此外 Google、Meta、Amazon、Microsoft等大型雲端業者，正在加速發展自家客製化AI晶片（ASIC），比如Google的TPU、 以及AWS的Trainium 3，AI時代沒有人敢掉隊都持續投資。\n\n而台股在基金、ETF買盤投資下，各產業龍頭除了基本面優良，受惠資金行情的趨勢也不會改變。綜合以上，AI相關產業包含半導體、 ASIC、記憶體、CPO、散熱、CCL、PCB、高階POWER、網通、廠務以及各種相關零組件等，都有機會輪流表現，台灣正處於AI蓬勃發展的時代風口上，相關受惠的產業未來長線受惠，多頭趨勢不預設高點。"}, {"title": "卓揆：明年最低工資保證逾3萬 強調提升勞工權益 薪資將連11年調升 撥補效應 勞保基金餘額逾1.4兆", "source": "經濟日報 A04 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "明天就是勞動節，行政院長卓榮泰昨（29）日出席模範勞工表揚典禮時掛保證，明年最低工資一定突破 3萬元，他並強調，在撥補勞保基金多年後，基金餘額已超過1.4兆元，勞工可以安心。卓榮泰昨日出席全國模範勞工表揚典禮致詞時表示，政府在穩定全國民生經濟各方面，一定要把勞工基本權益往上提升。政府已連續十年政府調整最低工資，今年最低工資月薪為29,500元，時薪也達到196元。", "full_text": "明天就是勞動節，行政院長卓榮泰昨（29）日出席模範勞工表揚典禮時掛保證，明年最低工資一定突破 3萬元，他並強調，在撥補勞保基金多年後，基金餘額已超過1.4兆元，勞工可以安心。卓榮泰昨日出席全國模範勞工表揚典禮致詞時表示，政府在穩定全國民生經濟各方面，一定要把勞工基本權益往上提升。政府已連續十年政府調整最低工資，今年最低工資月薪為29,500元，時薪也達到196元。\n\n「我跟大家保證，明年一定超過3萬元！而且超過的數字，會讓洪部長（指勞動部長洪申翰）沒有壓力。」 勞動部依照慣例，會在每年第3季邀集勞資政學四方召開最低工資審議委員會，決定隔年的最低工資，賴總統先前已承諾調升，卓揆昨日在勞動節前再次掛保證，要讓勞工安心。\n\n今年最低工資月薪達29,500元，換言之，只要今年審議時再調高1.7％以上，明年最低工資月薪就能飛越30K，將是連11漲。對於勞保財務，卓榮泰說，這是勞動部非常在意的一件事，自2020年起，政府逐年編列預算支持、撥補勞保基金，至2026年將累計撥補5,170億元，未來每年還會朝此方向進行，正因有撥補政策，勞保基金餘額已經超過1.4兆元，勞工可以安心。卓榮泰說，勞保條例已將政府撥補及支付最後責任明文入法，用法律保障勞工權益，謝謝立法院朝野黨團支持，行政、立法永遠要站在一起，現在也希望能夠把行政院送到立法院中央政府總預算儘速通過，就能如期展開各項預定工作。\n\n友善職場方面，卓榮泰表示，政府一定全力支持勞動部，做好全面規劃，打造工作平權的友善生活環境。最低工資至今年已經連十漲，每月最低工資由2016年的20,008元調漲至2026年的29,500元，漲幅為47.4%；每小時最低工資也由120元調漲至196元，漲幅為63.3%。"}, {"title": "軍購案8000億VS.3800億 國民黨團大會議而未決", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院國民黨團昨召開黨團大會討論軍購案，支持八○○○億與支持黨版三八○○億＋N的立委各自表述、意見紛歧；據了解，出席藍委中，前者人數約有廿人、後者約七人，還未有定論者五人，而要選縣市長的立委多數表態「不能通過三八○○億＋N」。最後有立委提議「記名投票」，但黨團幹部隨即宣佈散會，未達成結論，擇日再議。", "full_text": "立法院國民黨團昨召開黨團大會討論軍購案，支持八○○○億與支持黨版三八○○億＋N的立委各自表述、意見紛歧；據了解，出席藍委中，前者人數約有廿人、後者約七人，還未有定論者五人，而要選縣市長的立委多數表態「不能通過三八○○億＋N」。最後有立委提議「記名投票」，但黨團幹部隨即宣佈散會，未達成結論，擇日再議。\n\n鄭動員地方黨部施壓藍委支持黨中央版本昨天開會原本是針對美方預計的第二波發價書一四○億做討論，但國民黨主席鄭麗文前晚動員地方黨部、黨職幹部和主席辦公室致電給立委，要求支持黨中央版本三八○○億＋N的版本，引發多數支持八○○○億版本的立委不滿。要選縣市長藍委多數表態不挺三八○○億據了解，昨天支持八○○○億並發言的立委有羅廷瑋、黃健豪、賴士葆、羅明才、廖偉翔、牛煦庭、洪孟楷、羅智強、柯志恩、張嘉郡等人；支持三八○○億＋N並發言的則有陳玉珍、林德福、馬文君、游顥、鄭正鈐等人。\n\n其中要選縣市長的，幾乎都有表態不能通過三八○○億＋N。牛煦庭則提出七七○○億的版本，蘇清泉也認為不錯。總召傅崐萁表示，國防雖重要，但國民黨絕不隨民進黨起舞，將嚴格把關人民血汗錢，針對中央黨部與立委徐巧芯提出的不同預算版本，將持續溝通並於凝聚共識後正式對外說明。\n\n提出八○○○億的徐巧芯表示，團結是國民黨團最在乎的，不管如何，最後版本還是團結一致投出國民黨共同的決議，但難確定何時有結果。陳玉珍則說，各選區及縣市長參選人都有表達意見，黨內未針對特定版本進行表決，仍持續討論中。不過，她始終堅定支持黨中央的「三八○○億＋N」版本。\n\n黨內立委表示，雖然前一天有不少立委被打電話，但昨天會議氣氛沒有不好，就是各自表達想法，目前支持八○○○億的比例佔六成五，挺三八○○億＋N佔三成五。由於意見分歧，昨天沒有直接表決，「通常要達到一定共識才會表決，昨天那種情況下如果真的表決會很難看，也會加劇黨內分裂」。黨內人士則說，沒結論，就是好結論，至少沒有讓三八○○億＋N 版本定案，黨中央接下來可能會繼續逼迫立委，認為自己有更多空間可以操作，但國民黨立委要面對的是社會輿論的壓力，黨中央要確定「黨意可以勝過民意」，不要為了自己的私心，讓國民黨失去民意、失去支持，最後全盤皆輸。"}, {"title": "AIT：全面性特別條例 能增強台灣嚇阻力", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "據傳國民黨主席鄭麗文與立院黨團總召傅崐萁聯手，欲將多數藍委支持的八○○○億元軍購版本拉回三八○○億＋N版本，兩人也表態支持先有發價書再編列預算的做法。對此，美國在台協會（AIT）發言人昨日表示，相信「全面性」的特別預算條例能顯著增強台灣嚇阻力，希望台灣儘速採取行動。AIT發言人回覆詢問表示，美國、台灣與區域夥伴皆深刻理解台灣面臨威脅的嚴重性。", "full_text": "據傳國民黨主席鄭麗文與立院黨團總召傅崐萁聯手，欲將多數藍委支持的八○○○億元軍購版本拉回三八○○億＋N版本，兩人也表態支持先有發價書再編列預算的做法。對此，美國在台協會（AIT）發言人昨日表示，相信「全面性」的特別預算條例能顯著增強台灣嚇阻力，希望台灣儘速採取行動。AIT發言人回覆詢問表示，美國、台灣與區域夥伴皆深刻理解台灣面臨威脅的嚴重性。\n\n在過去幾個月內，國會、智庫等皆表明支持台灣快速建構防衛能力，數名美國參議員本月十四日也已致函立法院長韓國瑜。AIT發言人強調，「全面性」的特別預算條例希望採購包括一體化防空反導系統、無人載具、無人機等，美國相信這項特別預算將能顯著增強台灣的嚇阻力，並使台灣在未來幾年更能有效發揮嚇阻力。美方已就多項防禦能力提供發價書，在一般過程中，台灣會先行通過相關預算。"}, {"title": "賴︰盼立院下週通過「不打折的國防」", "source": "自由時報 A04 政治新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院朝野黨團將於五月六日針對「國防特別條例草案」進行第四度協商。兼任民進黨主席的總統賴清德昨呼籲，盼立法院下週可通過不打折的國防，帶來不打折扣的安全、給予國軍最完整的支持。行政院提出為期八年、總額一．二五兆元的「國防特別條例草案」，國民黨團昨開會討論預算匡列額度，黨內立委對於「三八○○億元+N」及八○○○億元版本，無法達成共識。", "full_text": "立法院朝野黨團將於五月六日針對「國防特別條例草案」進行第四度協商。兼任民進黨主席的總統賴清德昨呼籲，盼立法院下週可通過不打折的國防，帶來不打折扣的安全、給予國軍最完整的支持。行政院提出為期八年、總額一．二五兆元的「國防特別條例草案」，國民黨團昨開會討論預算匡列額度，黨內立委對於「三八○○億元+N」及八○○○億元版本，無法達成共識。\n\n賴清德在民進黨中常會表示，維護主權是執政團隊的首要任務，沒有主權就沒有台灣、也不會有中華民國，強化國防應該是跨黨派、一致對外的基本共識。蔡其昌︰低於1.25兆會傷害國防賴清德說，政院版國防特別條例，獲國內外一致肯定，國防部也多次強調，草案經過專業、完整的規劃，不僅與美方多次討論，更可以促進國內產業發展，衷心盼望下週的立法院黨團協商，可以通過不打折的國防，帶來不打折扣的安全，給予國軍最完整的支持。民進黨團總召蔡其昌席間也強調，民進黨團立場就是一．二五兆元案，低於這個數字會傷害國防。\n\n國防部在溝通過程中，已把很多項目移到年度預算，國民黨僅立委陳永康出席機密專報，藍營的「空白授權」說法明顯是裝傻拖延。蔡其昌說，民進黨已把面子和裡子都做給在野黨，國民黨最終仍須面對社會壓力。軍購不僅是民進黨的事，國軍也不是只保護民進黨，而是保護所有台灣人民。\n\n賴清德主持五月份將官晉任授階典禮也指出，「以和平包裝的統一，勢必給我們的國家帶來無窮的後患」，唯有提升自我防衛實力，才能確保真正的和平；當前中國頻繁在台海周邊進行灰色地帶行動及軍事演習，並結合軍事、法律、資訊與心理層面等複合手段，企圖改變台海及區域現狀。賴說，面對挑戰，國軍必須秉持「新訓練、新思維、新裝備、新科技」，整合無人載具與各項新興戰力，全面提升多域拒止、韌性防衛能力；\n\n進而在整體防衛布局上，朝著實戰化、科技化、全民化三大方向邁進。"}, {"title": "中國繞道越南洗產地 立委要求進口農產須附第3方同位素鑑定／邊境換櫃再改標出口 一個貨櫃暴利50萬", "source": "自由時報 A07 生活新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "近年自越南進口蔬菜、乾香菇等農產品數量大增，立委邱議瑩昨指出，許多中國農產品繞道越南洗產地後輸入，更只要一．三萬台幣就可取得越南官方開立的產地證明，一貨櫃暴利達五十萬台幣，卻對台灣帶來食安風險，要求農業部應要求進口商提供第三方的同位素產地鑑定證明。農業部統計資料，我國近年大量自越南進口蔬菜，邱議瑩昨在立院經濟委員會表示，她透過在越南務農的台灣人士得知，許多自越南進口的蔬菜其實產地是中國。可能流向學校午餐帶來食安風險當地慣用一條龍洗產地模...", "full_text": "近年自越南進口蔬菜、乾香菇等農產品數量大增，立委邱議瑩昨指出，許多中國農產品繞道越南洗產地後輸入，更只要一．三萬台幣就可取得越南官方開立的產地證明，一貨櫃暴利達五十萬台幣，卻對台灣帶來食安風險，要求農業部應要求進口商提供第三方的同位素產地鑑定證明。農業部統計資料，我國近年大量自越南進口蔬菜，邱議瑩昨在立院經濟委員會表示，她透過在越南務農的台灣人士得知，許多自越南進口的蔬菜其實產地是中國。可能流向學校午餐帶來食安風險當地慣用一條龍洗產地模式，把實際產自中國的蔬菜透過邊境運往越南後，在口岸換櫃，改裝到標示越南的出口貨櫃，取得越南官方開立的產地證明與檢疫證，一貨櫃僅需花費一．三萬台幣，再轉運到台灣後，一貨櫃就可獲利達廿萬到五十萬台幣，這些洗產地的中國蔬菜可能流向團膳、學校午餐。\n\n邱議瑩更舉禁止輸台的中國香菇為例，台灣每年自越南進口的香菇量動輒數百噸，在地台商證實，越南當地香菇種植面積僅五公頃，年產量約七．五噸，但去年進口台灣的越南乾香菇竟然近三百噸，明顯非當地生產。越南干擾我建置產地鑑別技術資料庫邱議瑩也出示台商針對蔬菜進行的第三方鑑定報告，透過精準同位素鑑定，可辨別中國產與越南產，我們也應該針對越南進口、疑洗產地高風險蔬菜，強制進口商提供第三方同位素檢驗，該檢測一貨櫃成本增加一萬多元，占貿易成本比例極低。農業部長陳駿季表示，過去要建置產地鑑別技術資料庫，遭越南官方多方干擾，只能在越南政府指定地點採樣，但我國希望全產區採樣，在當地台商幫助下，才取得當地生產的香菇建立資料庫，目前針對產地證明有疑慮者，會延緩放行，但可能不足以遏止洗產地行徑。\n\n農業部：高風險項目須經專家討論陳駿季指出，將考量針對高風險項目要求提供第三方同位素檢測，但具體包括哪些項目，還要經專家討論，也會由農試所透過衛星航拍，推算越南當地農作物生產數量，若輸入我國的數量超過當地產量，會設計相關機制統一處理。若美國花生零關稅輸入，農業部規劃以濕莢收購、設乾燥中心、擴大集團產區方式鞏固國產花生優勢。陳駿季表示，台灣花生新鮮品質好、碳足跡短，不認同唱衰台灣的話，中央與地方應合作。"}, {"title": "軍購拉扯 藍中央連夜固樁 力保黨版 黨團大會前「神佛都出動 要立委選邊站」 季麟連祭黃復興約束立委", "source": "聯合報 A03 焦點", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "藍營陷入軍購版本之亂，國民黨立院黨團昨召開黨團大會，據了解，黨中央為求黨版不被翻盤，前一晚展開複式動員緊急固樁，秘書長李乾龍與各地方系統，緊急致電立委溝通，強調若「三八○○億元加Ｎ」態度改變，國民黨將全面大敗，絕對不能棄守。一名藍營立委感嘆，現在就是「神佛都出動了」，要立委選邊站；國民黨此刻必須團結，無論維持三八○○億元還是八千億元，都須拿出論述，才能說服支持者。", "full_text": "藍營陷入軍購版本之亂，國民黨立院黨團昨召開黨團大會，據了解，黨中央為求黨版不被翻盤，前一晚展開複式動員緊急固樁，秘書長李乾龍與各地方系統，緊急致電立委溝通，強調若「三八○○億元加Ｎ」態度改變，國民黨將全面大敗，絕對不能棄守。一名藍營立委感嘆，現在就是「神佛都出動了」，要立委選邊站；國民黨此刻必須團結，無論維持三八○○億元還是八千億元，都須拿出論述，才能說服支持者。\n\n國民黨副主席季麟連昨在中常會強調自己代表全體黃復興，對立法院長韓國瑜重砲抨擊，更是在黨團大會後「刻意安排的橋段」。據了解，過去力挺韓國瑜的黃復興，選在中常會借季麟連之口發話有兩層用意：一是警告朱提名的不分區立委「配合黨的紀律行事」，二是提醒立委徐巧芯，記得當初選上區域立委也是靠黃復興的大力支持。國民黨提出「三八○○億元加Ｎ」黨版後，黨內雜音不斷，從台中市長盧秀燕、前黨主席朱立倫，到「戰鬥藍」領導人趙少康都提出超過八千億元以上的主張。\n\n但大致來說，可分為「三八○○億元加Ｎ」版，包含第二批軍售的八千一百億元版，以及再加碼台美機密軍事合作案的八千七百億元版。由於三個不同版本持續拉扯，韓國瑜五月六日將四度召集協商。據了解，為避免黨版被顛覆，衝擊黨主席鄭麗文領導，黨中央前晚就全面動起來，透過李乾龍與地方黨部、議長系統，親自找藍營立委溝通，就連原定要去帛琉訪問的立委黃仁、黃建賓也被要求取消行程，就盼黨團大會能維持支持黨版立場。\n\n然而，就在韓國瑜本周一召集第三次協商之前，徐巧芯也私下邀集多名黨內立委會商，雖然徐強調會中並未討論軍購條例草案，但此舉也讓黨中央產生戒心。此外，朱立倫及趙少康方面，也透過管道與友好立委溝通，由於現任十三席不分區當初都是朱立倫提名，也成為朱重點溝通的對象。也有藍營縣市首長等重量級人士前晚打電話給立委，遊說軍購應上調至八千億元以上，強調若通過黨版，很容易被貼上反美標籤，對年底選戰不利。\n\n眼見朱立倫、趙少康、徐巧芯等人近日動作頻頻，黨中央意識到必須要有因應，「人家都在動員了，不能不處理」，不能讓黨內立委誤以為黨中央棄守。知情人士也強調，軍購不是菜市場喊價，還是要維持立場，否則很難向選民解釋，為何一開始要提「三八○○億元加Ｎ」。"}, {"title": "國民黨內訌 軍購案恐難善了 季麟連引爆火藥庫 韓、盧、朱3派浮上檯面 黨中央一打三 凸顯外部壓力不小", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜三度針對「國防特別條例」草案，召集朝野黨團協商都破局，沒想到，公親變事主。國民黨副主席季麟連29日一番劍指韓國瑜的說法，引爆黨內火藥庫。原本鴨子划水的「3顆太陽」不再隱忍，韓國瑜強調自己「5個無愧」之外，盧秀燕、朱立倫的子弟兵也跳出來反嗆，儘管季麟連事後企圖滅火，但軍購案這把火，已讓國民黨的權力之爭浮上檯面。", "full_text": "立法院長韓國瑜三度針對「國防特別條例」草案，召集朝野黨團協商都破局，沒想到，公親變事主。國民黨副主席季麟連29日一番劍指韓國瑜的說法，引爆黨內火藥庫。原本鴨子划水的「3顆太陽」不再隱忍，韓國瑜強調自己「5個無愧」之外，盧秀燕、朱立倫的子弟兵也跳出來反嗆，儘管季麟連事後企圖滅火，但軍購案這把火，已讓國民黨的權力之爭浮上檯面。\n\n國防特別條例僵局吵了幾個月，藍營各派系檯面下暗自角力，歷經多次醞釀，3月初終於提出「3800億元＋N」的黨版國防特別條例。過程中，美方透過不同管道接觸藍營重要人物，包括盧秀燕、韓國瑜與朱立倫等人，明確釋出希望軍購相關預算能盡速通過的訊號，為此議題增添外部壓力與敏感性。事實上，無論是匡列3800億元、8000億元，甚至上看9000億元的版本，國民黨內部始終不乏重量級人物支持與倡議。\n\n盧秀燕訪美前頻頻與藍委餐敘，凝聚共識，更透過媒體專訪提出8000億元至1兆元的構想；朱立倫同樣透過餐敘與黨籍立委交換意見，其子弟兵凌濤也多次對外主張應提高軍購預算規模。至於韓國瑜，雖未明確公開支持特定版本，但持續在各方之間穿梭協調，試圖尋求朝野與黨內的平衡點，外界認為韓也認同應該拉高金額；\n\n不過，黨中央仍反覆強調，「3800億元＋N」仍是當前最可行、 最具整合力的方案。然而，不同於黨中央的穩定論述，各個山頭、太陽的表態始終不同步。無論是親自發聲或透過子弟兵放話，聲量雖大卻仍零散，直到昨日黨團大會，情勢依舊混沌，各路人馬頻頻致電藍委遊說，有人力挺黨中央版本，也有地方首長陣營力促8000億元方案，使得未表明立場的其他藍委陷入兩難。\n\n未料，季麟連在中常會上的「開除黨籍說」卻引爆了怒火，黨內矛盾瞬間浮上檯面。縱然鄭麗文第一時間止血，仍難阻各派系人馬幾乎在同一時間於網路發聲。率先開火的台中市副市長鄭照新直言韓國瑜遭自己人背後捅刀，隨後凌濤、黃健豪接連發文，矛頭均指向黨中央。\n\n韓國瑜則以「無愧於國家，無愧於黨」回應，臉書立即湧進數萬「 韓粉」爆量相挺，對立氛圍迅速升溫。藍營內部分歧日益擴大，各路支持者明顯站隊，國民黨的深宮內鬥，如何收尾，已比軍購案爭議來得更加撲朔迷離。"}, {"title": "行政院版草案 已與美方多次討論 賴清德籲立院 通過不打折的國防", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "「國防特別條例」草案持續卡關，身兼民進黨主席的賴清德總統2 9日在中常會表示，行政院版的國防特別預算條例已與美方多次討論，呼籲下周的立法院黨團協商，「通過不打折的國防，帶來不打折扣的安全」。賴清德強調，沒有主權就沒有台灣、也不會有中華民國，強化國防，應該是跨黨派一致對外的基本共識。賴總統昨主持將官晉任授階典禮時強調，唯有提升自我防衛實力，才能確保真正和平，以和平包裝的統一，勢必給國家帶來無窮後患。", "full_text": "「國防特別條例」草案持續卡關，身兼民進黨主席的賴清德總統2 9日在中常會表示，行政院版的國防特別預算條例已與美方多次討論，呼籲下周的立法院黨團協商，「通過不打折的國防，帶來不打折扣的安全」。賴清德強調，沒有主權就沒有台灣、也不會有中華民國，強化國防，應該是跨黨派一致對外的基本共識。賴總統昨主持將官晉任授階典禮時強調，唯有提升自我防衛實力，才能確保真正和平，以和平包裝的統一，勢必給國家帶來無窮後患。\n\n他說，中國頻繁在台海周邊進行灰色地帶行動及軍事演習，並結合軍事、法律、資訊與心理層面等複合手段，企圖改變台海及區域現狀。賴清德強調，面對此挑戰，他要求國軍整合無人載具與各項新興戰力，全面提升「多域拒止、韌性防衛」能力；進而在整體防衛布局上，朝著「實戰化」、「科技化」、「全民化」3大方向邁進。\n\n昨民進黨中常會上，賴清德再表示，政院版的草案獲得國內外一致肯定，國防部多次強調該草案經過專業、完整規畫，不僅與美方多次討論，更可以促進國內產業發展。此外，民進黨立院黨團總召蔡其昌表示，政府現在的版本是基本款，民進黨不能接受再低的版本。他指出，國民黨至今還在說「空白授權」，明顯就是在裝傻、拖延。\n\n軍購是台灣的事，不是民進黨的事。綠委吳思瑤更痛批，軍購案是中國在指揮、「拖擋砍」策略也是中國要的，立法院長韓國瑜是不是「賣黨求榮」她無權置喙，但國民黨主席鄭麗文、立法院國民黨團總召傅（山昆）萁絕對是「賣國求榮」、「賣台求榮」。綠委陳冠廷則表示，國民黨內部路線之爭已嚴重拖延台灣國防進程，5 月 6 日協商在即，川習會也將登場，若連國防特別條例都毫無進展，國際社會將如何看待台灣的防衛決心？"}, {"title": "因應美第二批軍購 白營擬授權編預算架構", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "國民黨國防特別條例版本未有定論，民眾黨方面，黨主席黃國昌 2 9 日表示，外傳美國近期可能公布第二批軍購，民眾黨團正在研擬立法架構，設計取得發價書後，授權行政部門編列第二批軍購預算，預計下周三立法院協商前定案。黃國昌日前透露已在處理另一軍購版本，對於目前進度，以及是否會等藍營有結論後再一同討論？黃國昌指出，民眾黨支持提升自我防衛能力，對於美國政府目前已公告的軍售項目，本來就在特別條例草案中。", "full_text": "國民黨國防特別條例版本未有定論，民眾黨方面，黨主席黃國昌 2 9 日表示，外傳美國近期可能公布第二批軍購，民眾黨團正在研擬立法架構，設計取得發價書後，授權行政部門編列第二批軍購預算，預計下周三立法院協商前定案。黃國昌日前透露已在處理另一軍購版本，對於目前進度，以及是否會等藍營有結論後再一同討論？黃國昌指出，民眾黨支持提升自我防衛能力，對於美國政府目前已公告的軍售項目，本來就在特別條例草案中。\n\n他提及，從媒體訊息得知，美方第二批軍購非常可能在近期公布，為了立法上的便捷，在民眾黨團版特別條例中也有思考設計取得發價書後，授權行政部門編列第二批軍購預算的立法架構。黃國昌說，目前已開始研擬條文，由於立法院長韓國瑜下周三才召集黨團協商，所以民眾黨團可能在協商前，才會決定最後具體內容，而這項條文的草擬，與國民黨團昨天會議並無直接關聯。黃強調，現在外界比較關心數字多少，但用此態度面對軍購案太草率，因為賴清德總統、行政院長卓榮泰都說「1.25兆元不能少」，然而，根據國防部提供給立法院的文件，針對M109A7自走砲數字為137 5億元，問題是4月中旬給立院的報告只剩810億元，中間差了500億元，「請問賴清德、卓榮泰數學有問題嗎？\n\n為什麼說1塊錢都不能少，但光是報告就少了500億元？」 他批評，500 億元對大官來說好像都不是錢，「你們有沒有把人民的錢當錢？」請問這些錢要拿去做什麼？\n\n養「綠友友」嗎？還是發包給裝潢公司賣火藥、給茶葉公司賣槍枝？"}, {"title": "展現嚇阻力 AIT促速通過全面性預算", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "美國在台協會（AIT）一連3天在社群媒體發文，重申AIT處長谷立言接受本報專訪的發言重點，並由副處長梁凱雯會晤民眾黨主席黃國昌談國防特別預算，外界解讀是要敦促草案審查進度。AIT發言人29 日強調，特別預算能讓台灣在未來數年加大嚇阻力量，盼台灣盡速行動，並指出這些武器系統不僅至關重要，在全球的需求也極高，這點已在烏克蘭與中東的戰場上獲得證實。國民黨立法院黨團昨針對國防特別條例召開黨團大會，但仍未取得共識；", "full_text": "美國在台協會（AIT）一連3天在社群媒體發文，重申AIT處長谷立言接受本報專訪的發言重點，並由副處長梁凱雯會晤民眾黨主席黃國昌談國防特別預算，外界解讀是要敦促草案審查進度。AIT發言人29 日強調，特別預算能讓台灣在未來數年加大嚇阻力量，盼台灣盡速行動，並指出這些武器系統不僅至關重要，在全球的需求也極高，這點已在烏克蘭與中東的戰場上獲得證實。國民黨立法院黨團昨針對國防特別條例召開黨團大會，但仍未取得共識；\n\n黃國昌日前也透露，AIT向他遊說時，對方稱支持民進黨行政部門提的1.25兆元，不過也詢問：「民進黨那邊難道不可能做任何妥協，一定要1.25兆元嗎？」他當場回應，從目前得到的訊息，民進黨到協商仍說要1.25兆元。針對在野黨對國防特別條例的歧見，AIT發言人昨回應本報提問時表示，美國、台灣以及該區域的其他夥伴，都深刻理解台灣正面臨嚴峻的威脅，因此，美方希望看到台灣能盡速採取行動。\n\nAIT發言人指出，特別是過去幾個月來，美國國會、知名智庫及其他各界皆已對支持台灣快速提升防衛能力的努力，展現一致立場，希望台灣快速強化國防嚇阻力量，包括4月14日的美國參議員聯名信中也提及此事。AIT發言人強調，這項「全面性」的特別預算，目標在採購整合式防空與飛彈防禦系統、無人載具與無人機及其他各項能力，美國認為這些軍購將能顯著強化台灣的嚇阻能力，若通過特別預算，將使台灣在未來數年中更有效地展現嚇阻力量。不僅AIT，丹麥民主聯盟基金會、國科會轄下智庫「科技、民主與社會研究中心」（等單位昨舉辦無人機防禦系統圓桌會議，與會歐美廠商盼與台灣合作，並指台灣面對的處境，可促進反無人機系統的創新，有利於民主陣營。"}, {"title": "凍結1080萬 海委會預算 首個完成審查", "source": "中國時報 A04 政治綜合", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "延宕逾200天的115年度中央政府總預算案4月21日付委審查後，立院8個委員會隨即展開審查，最快6月三讀。立院內政委員會29日率先完成海委會預算的審查，決議凍結1080萬元，是首個完成審查的部會。民進黨內委會召委李柏毅表示，海巡署是類國防單位，希望相關預算趕快通過。", "full_text": "延宕逾200天的115年度中央政府總預算案4月21日付委審查後，立院8個委員會隨即展開審查，最快6月三讀。立院內政委員會29日率先完成海委會預算的審查，決議凍結1080萬元，是首個完成審查的部會。民進黨內委會召委李柏毅表示，海巡署是類國防單位，希望相關預算趕快通過。\n\n內委會昨天審查海委會115年度歲出預算339億5406萬5000元，審查時氣氛融洽，朝野立委所提出的減列案經協商後，改成主決議或凍結，僅部分單位的媒宣費保留送交朝野協商，整體決議凍結共計1080萬元，海委會提出書面報告始得動支，部分則須經委員會同意才可動支。此外，「海洋汙染防治基金」則是凍結15萬元。李柏毅表示，海巡署其實是類國防的單位，希望可以讓艦艇預算、 海巡弟兄的薪資等預算盡快通過，畢竟現在已經5月了，有可能會影響到艦艇的交付等。\n\n談及審查氣氛，他說，朝野對海委會預算展現高度支持，審查時很快凝聚共識，但仍有一些期待，所以決議凍結，這是為了讓海委會的業務可以做得更好。另外，立院司法及法制委員會昨在審查監察院預算案時，民進黨立委莊瑞雄詢問，去年度監察院編列的業務費遭立院刪減 96％，是否導致監察院今年度編列預算時，因擔憂預算會遭刪減而趨向保守？甚至自我限縮？\n\n監察院祕書長黃適卓回答，去年國家人權委員會預算遭刪造成重大影響，監察院跟國際組織交流也受影響，但他強調監察院會向立院極力爭取，盼預算順利通過。"}, {"title": "非核政策鬆了 歸化國籍人才擬增核能專業", "source": "中國時報 A04 政治綜合", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "民進黨非核家園政策鬆動！雖然核安會尚未完成審查台電於3月27 日送交的核三廠再運轉計畫，但內政部搶先預告修正「歸化國籍之高級專業人才認定標準」，擬增列「核能專業」，修法說明更直指是配合推動我國淨零碳排及強化我國核能專業實力等政策。內政部昨表示，增列「核能專業」是核安會的建議，以厚植我國核能技術與安全管制能量。", "full_text": "民進黨非核家園政策鬆動！雖然核安會尚未完成審查台電於3月27 日送交的核三廠再運轉計畫，但內政部搶先預告修正「歸化國籍之高級專業人才認定標準」，擬增列「核能專業」，修法說明更直指是配合推動我國淨零碳排及強化我國核能專業實力等政策。內政部昨表示，增列「核能專業」是核安會的建議，以厚植我國核能技術與安全管制能量。\n\n繼賴清德總統公開指核二、核三具重啟運轉條件後，行政院長卓榮泰於立院備詢時也說，政府現在是以第二次能源轉型為目標，多一項選擇，多一些準備，當需要時，就不會讓後人束手無策。而這些執政黨層峰相繼的發言內容，也讓外界普遍認為民進黨政府的非核家園政策鬆動。雖然核安會針對核三廠再運轉計畫的審查結果尚未出爐，內政部 2 7日率先預告「歸化國籍之高級專業人才認定標準」第2條修正草案，除在科技領域新增「量子科技」外，也在經濟領域新增「核能專業」。\n\n對此，內政部表示，配合政府留才攬才政策目標而規畫修正「歸化國籍之高級專業人才認定標準」認定標準，日前函請各中央目的事業主管機關，就認定標準的領域及細項是否新增或修正的需求表示意見，核安會回覆，為確保我國核能技術延續及未來發展，建議於認定標準的經濟領域中，新增「核能專業」，以加強延攬及留用外國高級專業人才，強化我國核能專業實力，厚植我國核能技術與安全管制能量。內政部指出，認定標準修正預告期間至6月27日，尚在蒐集民眾意見階段，未來將俟外界意見情況修正，並依相關法制程序修正發布。"}, {"title": "中研院AI比對技術 立委促引進校園", "source": "中國時報 A05 生活綜合", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "生成式AI普及應用，頻被爆出學術倫理爭議，國民黨立委柯志恩、 葛如鈞29日質詢時表示，政府是否以AI偵測工具檢查研究成果，要求盡速建立指引，避免影響學術原創性跟可信度。中研院副院長彭信坤回應，中研院內部已有AI偵測軟體，會顯示AI生成與AI改寫比例。AI 發展快速，不少學生作業、學術研究會借助 AI 查資料，針對學術研究應用倫理及數位透明度，中研院、國科會以及數發部29日赴教育及文化委員會進行專題報告。", "full_text": "生成式AI普及應用，頻被爆出學術倫理爭議，國民黨立委柯志恩、 葛如鈞29日質詢時表示，政府是否以AI偵測工具檢查研究成果，要求盡速建立指引，避免影響學術原創性跟可信度。中研院副院長彭信坤回應，中研院內部已有AI偵測軟體，會顯示AI生成與AI改寫比例。AI 發展快速，不少學生作業、學術研究會借助 AI 查資料，針對學術研究應用倫理及數位透明度，中研院、國科會以及數發部29日赴教育及文化委員會進行專題報告。\n\n中研院表示，為確保研究跟學術倫理，明定中研院人員進行研究時，不得舞弊、造假、學術論著抄襲等，並發布使用生成式AI參考指引，包括確實人工檢核、避免提供未公開或機密等個人資料，整體而言，使用AI精進學術發展與研究品質持正面看待，但須兼顧學術責任與倫理規範。葛如鈞表示，維繫AI倫理重點不應只是檢測工具，而在教育與正確使用，AI偵測工具在國際上已多次出現誤判，若過度依賴軟體監控或審查人類產出內容，恐造成本末倒置。彭信坤指出，中研院自去年起使用AI偵測軟體，研究計畫可透過中研院IP上傳檢測，系統會顯示AI生成與AI改寫比例，即便如此，也不能完全相信AI，仍須透過人工查核，注意資料準確性跟真實性。\n\n柯志恩要求國科會、中研院、數位發展部跟學校合作，將AI比對技術引進學校，讓大家可以放心使用生成式AI；同時，主管機關應建立指引，提供運用新興科技時，兼顧學術誠信與評量標準，避免影響學術原創性跟可信度。"}, {"title": "REER台高韓低 差距再擴大 緩解輸入性通膨困擾，台灣央行穩匯顧通膨，南韓貶值救出口", "source": "工商時報 A02 火線焦點", "cat": "台灣總體經濟與數據", "priority": 0, "summary": "新台幣匯率即使3月狂洩7.29角，但貶幅仍小於貿易競爭對手韓元。根據國際清算銀行（BIS）公布2月實質有效匯率指數（REER），新台幣REER略降至97.44，但韓元REER降至85.44，連59個月高於韓元，雙方差距再度擴大，為近三月來最大差距。匯銀主管認為，中東戰事以來，台韓同受輸入型通膨困擾，如以REER走向來看，我央行重點在穩匯顧通膨，南韓則仍做出貶值拚出口的政策決定。", "full_text": "新台幣匯率即使3月狂洩7.29角，但貶幅仍小於貿易競爭對手韓元。根據國際清算銀行（BIS）公布2月實質有效匯率指數（REER），新台幣REER略降至97.44，但韓元REER降至85.44，連59個月高於韓元，雙方差距再度擴大，為近三月來最大差距。匯銀主管認為，中東戰事以來，台韓同受輸入型通膨困擾，如以REER走向來看，我央行重點在穩匯顧通膨，南韓則仍做出貶值拚出口的政策決定。\n\n匯銀主管分析，台韓長期都採取出口導向的經濟成長模式，視彼此為競爭對手，但AI領域推動台廠表現，在技術與品質支撐報價能力，加上央行主要以穩定物價的通膨為考量重點，長期透過強勢穩匯，相對於韓元，未採取過度貶值的刺激出口策略。韓國則偏好價格導向的競爭方式，加上金融市場波動比台灣來得大，面對外部衝擊時，多透過韓元大幅貶值來維持出口競爭力。整體來看，REER長期呈現「台高韓低」的格局，反映的是台灣央行全力穩定匯率，韓國更願意放手讓匯率波動，以因應景氣循環。\n\n新台幣3月一度貶破32元整數大關，月貶幅2.56％，新台幣REER僅小幅下修，單月下降0.07至97.44；反觀韓元3月跌幅超過6％，韓元 REER單月下降1.54至85.44，降幅相對更大。據央行統計，3月美元指數強升2.41％。\n\n台韓REER連11個月差距在雙位數以上，新台幣REER高於韓元REER 快成為常態。匯銀主管分析， 4 月以來戰爭影響趨緩，儘管美元指數持續高檔震盪，但主要亞幣開始反彈，逐步回歸反映資金面，4月新台幣與韓元同步走揚，至29日止新台幣升值1.34％，小於韓元的3.49％，4月REER差距可能縮小。BIS統計的REER，為估算一國貨幣對一籃子外國貨幣的匯率變動指數。\n\nREER指數上揚或下滑，除貨幣本身的升貶，也受到所對應的一籃子貨幣漲跌，且反映物價變動因素相關。當REER升高，對出口占GDP 比重愈高的國家愈不利（如台韓），愈低愈有利出口報價競爭力。"}, {"title": "台股朝三好正向循環", "source": "工商時報 A06 財經生活", "cat": "台灣產業與投資動向", "priority": 0, "summary": "從量變、質變正式邁向「良性蛻變」，台灣ETF市場正站上新一輪成長拐點。面對近年ETF規模快速擴張，元大投信董事長劉宗聖指出，在主管機關推動「亞洲資產管理中心」政策加持下，台股已逐步形成「主動基金好、被動ETF好、主動式ETF也好」的正向循環，帶動主被動基金共榮發展。觀察此波 ETF 浪潮，元大投信旗下指標產品元大台灣 50（0050）規模已突破 1.6 兆元，成為市場關注焦點。", "full_text": "從量變、質變正式邁向「良性蛻變」，台灣ETF市場正站上新一輪成長拐點。面對近年ETF規模快速擴張，元大投信董事長劉宗聖指出，在主管機關推動「亞洲資產管理中心」政策加持下，台股已逐步形成「主動基金好、被動ETF好、主動式ETF也好」的正向循環，帶動主被動基金共榮發展。觀察此波 ETF 浪潮，元大投信旗下指標產品元大台灣 50（0050）規模已突破 1.6 兆元，成為市場關注焦點。\n\n劉宗聖分析，當前台股呈現「主動基金好、被動ETF好、主動式ETF也好」的三方並進格局，形成一種由基本面驅動的「有基之彈」。在企業獲利與產業競爭力支撐下，投資人信心提升，資金不再僅停留於短線操作，而是逐步轉向長期投資與分散配置。他進一步指出，市場同時也在進行結構性的「再平衡」。\n\n過去無論是美債與台股，或高股息與市值型ETF之間，資產配置曾出現明顯傾斜，但近期逐步回歸均衡，呈現約5比5的配置比例。投資人不僅在交易行為上更加理性，在資產配置上也更趨一致，市場穩定度相對提升。從投資人行為來看，也出現明顯轉變。\n\n劉宗聖指出，過去多數投資人偏向「整存零付」，即一次性投入資金、長期持有並領取配息；但新世代投資人逐步轉向「零存整付」，透過定期定額與零股方式，建立紀律性的投資習慣，穩健累積資產，這也被視為完成個人理財「第一哩路」的重要方式。在產品結構方面，劉宗聖表示，隨著全球不確定性升高，投資人已從過去「單一標的」轉向「多檔配置」，透過 ETF 進行策略搭配。\n\n目前市場產品架構多元，讓投資人能針對 AI 新經濟、軍工國防及黃金、 白銀等主題，進行更具彈性的布局，強化投資組合的韌性。針對市場關注的主動式ETF發展，劉宗聖強調，主被動之間並非零和競爭。以目前規模來看，主動基金約1.2兆元，被動ETF已超過4兆元，比例約為1比4，未來將朝向「競合與分工」發展。\n\n他指出，被動 ETF的成功，讓投資人更認同台股長期表現，進而帶動資金外溢至主動型產品，形成正向循環，推升整體市場規模持續擴大。至於市值型ETF中台積電權重偏高的議題，劉宗聖認為，台積電具備高度代表性與流動性，是市場不可忽視的核心資產，應尊重市場共識，始能充足反應台股整體走勢。展望未來，元大投信提出「ETF 2.0」三大發展方向。\n\n首先是「向外發展」，將優質ETF產品與國際市場接軌，吸引海外機構資金參與；其次是「向下紮根」，積極推廣至年輕族群，培養長期投資習慣；第三則是「向後延伸」，因應人口老化趨勢，提供更長期的資產配置工具，滿足退休與財富傳承需求。"}, {"title": "央行：房市下行 不致衝擊金融", "source": "經濟日報 A11 產業", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "中央銀行最新研究指出，房價下行風險雖不必然導致金融危機，但具備「領先指標」功能，可提前反映金融體系潛在壓力。不過台灣歷史經驗顯示，房地產並非金融風險的核心來源。近期市場傳出全台營造廠倒閉家數攀升，引發外界對房市景氣與金融穩定的關注。", "full_text": "中央銀行最新研究指出，房價下行風險雖不必然導致金融危機，但具備「領先指標」功能，可提前反映金融體系潛在壓力。不過台灣歷史經驗顯示，房地產並非金融風險的核心來源。近期市場傳出全台營造廠倒閉家數攀升，引發外界對房市景氣與金融穩定的關注。\n\n不過央行分析指出，全球經驗雖顯示房價大幅修正常與金融危機相伴，例如2008年全球金融危機，但台灣的金融體質與制度設計與國際案例存在明顯差異，使得房價修正未必演變為系統性風險。從房市現況觀察，內政部公布的全國住宅價格指數顯示，去年第3季雖連續三季下修，但指數仍維持在145.46的相對高檔水準，顯示市場屬溫和修正，尚未出現劇烈下跌情形。央行指出，台灣房市之所以具備較高韌性，首先在於金融體系結構穩健。\n\n相較於國外曾因次級房貸與證券化商品過度擴張而引發危機，台灣並未大量發展高風險房貸商品，銀行授信標準嚴謹，對貸款成數與借款人條件均有明確控管。除此之外，房貸違約率長期維持低檔，顯示整體信用風險可控，即使房價回檔，也不易引發連鎖違約效應。其次，政策調控機制發揮關鍵作用。\n\n央行與相關部會在房市過熱期間，透過選擇性信用管制、貸款成數限制及利率政策等措施，抑制投機需求並降低市場槓桿，避免風險過度累積，成為維持金融穩定的重要防線。"}, {"title": "接連超車英加 台股市值全球第6", "source": "自由時報 A02 焦點新聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "《彭博》彙編的數據顯示，台灣股市市值已超越加拿大，成為全球第六大，僅次於美國、中國、日本、香港和印度，主要因為人工智慧（AI）概念股需求強勁，以及台積電市值大爆發所致。台股本月十七日才超越英國，成為全球第七大市場；南韓則又於日前擠下英國，成為全球市值第七大股市。", "full_text": "《彭博》彙編的數據顯示，台灣股市市值已超越加拿大，成為全球第六大，僅次於美國、中國、日本、香港和印度，主要因為人工智慧（AI）概念股需求強勁，以及台積電市值大爆發所致。台股本月十七日才超越英國，成為全球第七大市場；南韓則又於日前擠下英國，成為全球市值第七大股市。\n\n今年以來台股市值已激增逾三十五％達四．四七兆美元，加拿大股市市值僅增加約五％至四．四四兆美元。台積電占台股大盤市值約四十五％，今年以來市值膨脹至逾一．八兆美元。台灣擠下加拿大成為全球市值第六大股市，凸顯指數的構成如何影響各國股市表現。\n\n台灣為以科技產業為主的市場，因為全球對半導體和AI的熱潮而受益；加拿大則以天然資源和金融業為主，由於大宗商品價格波動大且經濟成長緩慢，股市表現相對平淡。無獨有偶，拜記憶體晶片大廠三星電子和SK海力士股價大漲之賜，南韓日前也擠下英國，成為全球市值第七大股市。\n\n今年以來南韓股市市值激增逾四十五％達四．○四兆美元，英國股市市值僅增加約三％至三．九九兆美元。而在二○二四年底時，英國股市市值還是南韓的近一倍。南韓股市之所以勁揚，主要因為三星電子和 SK海力士占南韓Kospi 指數市值逾四十％，加上南韓總統李在明推動的親商政策和公司治理改革。\n\n摩根大通資產管理公司新興市場與亞太投資專家Francesco Chan表示，韓股和台股快速崛起反映全球股市的結構性再平衡，主因台韓在AI硬體占主導地位，而非戰術性的資產配置。台韓作為AI供應鏈的支柱，藉高階晶圓代工和記憶體的超級循環優勢，持續吸引結構性資本流入。"}, {"title": "立委：還稅於民 財長：先減舉債 證交稅日收24億元 稅收可望超徵", "source": "聯合報 A02 焦點", "cat": "台灣總體經濟與數據", "priority": 0, "summary": "台股頻創新高、成交量持續放大，證交稅同步水漲船高，超徵規模引發關注。國民黨立委賴士葆、羅明才昨天質詢時提出超徵稅收還稅於民以及補貼民眾的建議，財政部長莊翠雲表示，現行稅收均依規定徵收，沒有所謂「還稅於民」的概念，當稅收優於預算數時，首要考量應是減少舉債。立法院財委會昨審查財政部及其所屬單位預算，賴士葆指出，今年證交稅預算編列兩千五百億元，當初財政部是以日均成交量四二八八億元為基準，但近期台股日均量超過兆元，推估全年證交稅收入達七千五百億...", "full_text": "台股頻創新高、成交量持續放大，證交稅同步水漲船高，超徵規模引發關注。國民黨立委賴士葆、羅明才昨天質詢時提出超徵稅收還稅於民以及補貼民眾的建議，財政部長莊翠雲表示，現行稅收均依規定徵收，沒有所謂「還稅於民」的概念，當稅收優於預算數時，首要考量應是減少舉債。立法院財委會昨審查財政部及其所屬單位預算，賴士葆指出，今年證交稅預算編列兩千五百億元，當初財政部是以日均成交量四二八八億元為基準，但近期台股日均量超過兆元，推估全年證交稅收入達七千五百億元，超出預算五千億元，在證交稅收可能大幅超出預期之下，是否該考慮把「還稅於民」制度化。\n\n羅明才則說，若以前幾天台股成交量一點八兆、甚至兩兆元計算，政府一天證交稅收達四十至五十億元；若日均量一點五兆元、營業日二四五天計算，一年光證交稅就八千億元。他話鋒一轉，現在萬物飆漲變成生活日常，請財政部要規畫一下補助石油津貼。\n\n莊翠雲指出，如果稅入的執行情況有超過預算數，第一個要做的就是要減少舉債。此外，這次中東戰爭導致油氣價格波動，政府採取許多平緩與補貼措施。財政部統計，今年至四月廿八日止，台股日均成交量約一兆元。\n\n莊翠雲說，目前證交稅每日收入約廿四億元，成交量能否維持需觀察。"}, {"title": "AI強攻 台股成全球第6大市場 今年增長逾35％ 升至4.47兆美元 台積驚驚漲 撐起半邊天", "source": "中國時報 A06 財經綜合", "cat": "台灣產業與投資動向", "priority": 0, "summary": "人工智慧帶動半導體股強勢上漲，台灣股市繼4月中旬超越英國後，29日再度超越加拿大，成為全球第6大市場。台灣上市公司總市值今年以來成長逾 35％，升至 4.47 兆（美元，下同）；加拿大股市同期僅成長約 5％，總市值為4.44兆。", "full_text": "人工智慧帶動半導體股強勢上漲，台灣股市繼4月中旬超越英國後，29日再度超越加拿大，成為全球第6大市場。台灣上市公司總市值今年以來成長逾 35％，升至 4.47 兆（美元，下同）；加拿大股市同期僅成長約 5％，總市值為4.44兆。\n\n這波排名變化主要由台積電股價上漲推動。台積電至4月中在台股加權指數占比接近45％，今年以來市值擴大至約1.9兆。由於台股結構高度集中於半導體與AI供應鏈，全球投資人對先進製程及資料中心需求的預期，直接推升台灣整體市場規模。\n\n相較之下，加拿大以能源、原物料與金融類股為主，受大宗商品價格波動及經濟成長放緩影響，漲勢相對溫和。根據世界銀行資料，全球市值最高的市場仍由美國約70兆大幅領先，其後依序為中國大陸17.1兆、日本8.2 兆、香港 7.4 兆與印度 4.97 兆。台灣此次升至第 6，加拿大降至第 7；\n\n韓國則在本周超越英國，升至第 8，現為4.04兆。台股此前已在15日先行超越英國成為全球第7大市場。當時數據顯示，台股總市值升至4.14兆，略高於英國的4.09兆。\n\n隨著4月下旬半導體與AI相關類股延續漲勢，台灣在短短兩周內又進一步跨過加拿大，反映資金持續集中流向AI供應鏈核心市場。韓國股市也出現類似變化。韓股在28日以4.04兆總市值，超越英國的3.99兆成為全球第8大股市。\n\n韓股今年內飆升逾45％，英國年內僅上漲3％。回顧2024年末，英國市場規模仍為韓國近兩倍，但在三星與SK海力士等晶片股帶動下，兩者排名出現逆轉。韓股漲勢同樣集中於少數大型科技股。\n\n三星電子與SK海力士目前合計占韓綜指數總市值逾40％，兩家公司受惠於高頻寬記憶體及AI伺服器需求，成為推動韓股的關鍵，韓國綜合指數日前也在晶片股帶動下創下新高。台韓股市排名接連上升，足見 AI 題材已從個股行情擴大為區域股市與新興市場的結構性變化。《金融時報》指出，MSCI新興市場指數4 月以來上漲逾15％，不僅收復伊朗戰爭初期跌幅並創下歷史新高，且本月漲幅近半來自台積電、三星電子與SK海力士三家晶片製造商。\n\n上述三者合計占該指數近21％，顯示半導體龍頭已成為新興市場表現的核心驅動力。不過，這也引發市場對集中度的疑慮。文中稱，新興市場指數原本被視為分散美國大型科技股風險的工具，但隨著台韓晶片股權重升高，相關標的與美股的相關性也隨之增加。"}, {"title": "統一台股升級50 3天狂募逾800億元 主動式ETF新兵規模 台股史上第2大", "source": "中國時報 A06 財經綜合", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股近日突破4萬點關卡，投資市場氣氛熱絡，主動式ETF成為熱門投資標的，統一投信即將上市的統一台股升級50（00403A），29日傳出3天募資下來吸金逾800億元，創主動式ETF第2大規模；00403A預計 5月12日掛牌，投資人對兩年前解定存、抵押房子瘋買00940景象仍記憶猶新，如今台股又出現一檔未上市就暴紅的ETF，堪稱是主動式ET F巨嬰來了。全民瘋買00403A，券商第一線資深營業員表示，這檔主動式ETF不用打廣告，投資人就主...", "full_text": "台股近日突破4萬點關卡，投資市場氣氛熱絡，主動式ETF成為熱門投資標的，統一投信即將上市的統一台股升級50（00403A），29日傳出3天募資下來吸金逾800億元，創主動式ETF第2大規模；00403A預計 5月12日掛牌，投資人對兩年前解定存、抵押房子瘋買00940景象仍記憶猶新，如今台股又出現一檔未上市就暴紅的ETF，堪稱是主動式ET F巨嬰來了。全民瘋買00403A，券商第一線資深營業員表示，這檔主動式ETF不用打廣告，投資人就主動送上錢來，除了近一年主動式ETF蔚為流行外，最大的原因是「慕名而來」。\n\n資深營業員透露，統一投信旗下另一檔主動式ETF台股增長（0098 1A），成立僅短短1年股價表現強勁，從10元攀升至29日收盤價為27 .74元，資產規模擴大至逾2300億元，負責操盤的經理人在業界贏得了「瑤池金母」的封號。統一投信趁勝追擊，00403A由業界「動力哥」之稱的張哲瑋擔任經理人，券商營業員表示，不少投資人靠00981A賺了2、3倍的報酬後，現在加碼投資00403A，期望複製00981A「10元賺翻倍」的經驗。不過，券商也提醒，由於主動式ETF隨時能換股，市場傳遞訊息速度非常快，操盤經理人一舉一動消息容易走漏。\n\n舉例來說，主動式E TF要加碼某個股10億元，大戶馬上跟著買，進而推升個股淨值，加碼的10億元很快變成11億元、12億元，進而推升報酬率，更加大投資人的購買意願，資金愈堆愈高；相反地，也可能淪為大戶炒股工具，營業員也觀察，追隨主動式ETF的大戶，早已盆滿缽滿大有人在。對於00403A成主動式ETF巨嬰，統一投信表示，自募集以來受投資人、網路平台及社群媒體上熱烈討論，網路及社群媒體上募集金額是臆測，統一投信並未對外公布基金募集總金額或各基金銷售機構的銷售數字。"}, {"title": "阿聯退出OPEC 油價長線看跌 一旦荷姆茲航運恢復正常，阿聯不受石油聯盟約束，可能衝擊全球石油供應", "source": "工商時報 A09 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "阿拉伯聯合大公國（阿聯）決定退出石油輸出國家組織（OPEC），消息震撼全球油市，摩根大通等華爾街投行均認為，由於荷姆茲海峽目前仍遭封鎖，短期布蘭特油價不太可能有大幅波動，但中長線則將籠罩價格下行風險，因為一旦荷姆茲航運恢復正常，阿聯便可自由擴產，屆時全球原油供應將迎來新一輪衝擊。美國總統川普再度發文向伊朗嗆聲，市場預料戰爭短期內難以結束，國際油價升破100美元大關。布蘭特期油盤中升至每桶114.40美元，延續前七個交易日漲勢。", "full_text": "阿拉伯聯合大公國（阿聯）決定退出石油輸出國家組織（OPEC），消息震撼全球油市，摩根大通等華爾街投行均認為，由於荷姆茲海峽目前仍遭封鎖，短期布蘭特油價不太可能有大幅波動，但中長線則將籠罩價格下行風險，因為一旦荷姆茲航運恢復正常，阿聯便可自由擴產，屆時全球原油供應將迎來新一輪衝擊。美國總統川普再度發文向伊朗嗆聲，市場預料戰爭短期內難以結束，國際油價升破100美元大關。布蘭特期油盤中升至每桶114.40美元，延續前七個交易日漲勢。\n\n美國西德州期油走高至103.69美元。專家認為，阿聯決定離開OPEC，對該產油國聯盟是一記重擊，不但將削弱該產油組織及領導國沙烏地阿拉伯對石油市場的影響力，其他產油國恐怕即將步其後塵、相繼出走。根據MarketWatch報導，哈薩克與伊拉克被視為最有可能繼阿聯之後退出OPEC的兩個國家。\n\n對此，伊拉克官員稍後出面澄清，表示該國目前沒有退出該組織的計畫。能源諮詢機構Rystad Energy分析師里昂（Jorge Leon）指出，阿聯在OPEC成員中的影響力僅次於沙烏地阿拉伯，而且也是少數與沙國一樣擁有大量剩餘產能的OPEC成員，能夠影響價格並因應供應衝擊。剩餘產能是指可以迅速投入生產以應對重大危機的閒置產能。\n\n在全球每日超過400萬桶剩餘產能之中，沙國與阿聯即掌控大部分，這使兩國在市場動盪時期格外具有影響力。里昂28日發布報告指出，阿聯退出「使得支撐OPEC管理市場能力的其中一根支柱就此移除」，OPEC將因此「結構性弱化」（structura lly weaker）。摩根大通與瑞銀分析師皆預料，有朝一日荷姆茲海峽重新開通，阿聯可不受OPEC體系支配，自主擴大石油產能，油價中期走勢看跌。"}, {"title": "物價壓垮民心 川普支持率創新低", "source": "工商時報 A09 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "路透／益普索（Reuters／Ipsos）最新民調顯示，川普的民意支持率再創第二任期內新低，主要是因為伊朗戰爭導致油價飆漲，使美國人愈來愈不滿川普無法處理物價大漲和對伊朗開戰等問題。該民調在27日完成，為期四天，結果顯示只有34％受訪美國人滿意川普的執政表現，支持率低於路透／益普索在15日到20日之間完成前一次民調的36％。雖然這是川普展開第二個總統任期以來最低的支持率，但仍略高於其首個任期內最低的33％。", "full_text": "路透／益普索（Reuters／Ipsos）最新民調顯示，川普的民意支持率再創第二任期內新低，主要是因為伊朗戰爭導致油價飆漲，使美國人愈來愈不滿川普無法處理物價大漲和對伊朗開戰等問題。該民調在27日完成，為期四天，結果顯示只有34％受訪美國人滿意川普的執政表現，支持率低於路透／益普索在15日到20日之間完成前一次民調的36％。雖然這是川普展開第二個總統任期以來最低的支持率，但仍略高於其首個任期內最低的33％。\n\n川普首個任期支持率曾長時間徘徊在40％附近。值得注意是，最新民調的大多數受訪民眾看法，是在25日晚間白宮記者協會晚宴發生槍擊事件之前收集。川普原定在晚宴上發表演說，但因一名槍手試圖闖進川普所在的大廳而被取消。\n\n外界認為，這起事件會否影響民眾對川普的看法仍有待觀察。聯邦檢察官已經以企圖刺殺總統的罪名起訴被捕的槍手。川普在去年1月重返白宮之時，還有47％民眾給予正面評價，但是後來其民意支持率持續下滑。\n\n尤其美國與以色列在2月28日聯手空襲伊朗，引發伊朗戰爭以來，國際油價每桶飆破100美元，美國汽油價格也飆漲逾4成至每加侖約4 .18美元，導致川普的支持率跟著受到重創。最新民調顯示，僅22％受訪者支持川普在處理民眾生活費用問題上的表現，比率低於前一次民調的25％。物價高漲對許多美國家庭而言，構成了沉重的生活壓力，外界認為，這將不利於川普所屬共和黨，在11月舉行的國會期中選舉。\n\n儘管高達78％共和黨人表態支持川普，但仍然有41％共和黨人不滿他處理民眾生活費用問題的表現。美國目前物價高漲的主因是伊朗戰爭所導致，最新民調顯示僅34％民眾支持美國對伊朗開戰，低於前一次民調的36％，和3月中完成民調的38％。這反映出物價高漲，正不斷降低民眾對伊朗開戰的支持率。"}, {"title": "川普擬拉長封鎖 逼伊朗讓步 在談判陷入僵局下，盼透過扼殺石油出口命脈，迫使德黑蘭當局放棄核武", "source": "工商時報 A09 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "白宮證實，美國總統川普在會晤石油業高管時，討論在必要情況將持續封鎖伊朗數月，試圖透過扼殺其石油出口命脈方式，迫使德黑蘭當局在核議題讓步。另外，日本煉油商出光興產旗下一艘油輪「出光丸」（IdemitsuM aru）28日成功通過荷姆茲海峽，這是美伊衝突爆發以來首度有日本大型煉油企業油輪駛離波斯灣，且並未支付任何過路費。川普傾向無限期維持封鎖，以加大對伊朗的施壓力道，直到後者接受他的核心訴求（停止鈾濃縮並承諾不發展核武）。", "full_text": "白宮證實，美國總統川普在會晤石油業高管時，討論在必要情況將持續封鎖伊朗數月，試圖透過扼殺其石油出口命脈方式，迫使德黑蘭當局在核議題讓步。另外，日本煉油商出光興產旗下一艘油輪「出光丸」（IdemitsuM aru）28日成功通過荷姆茲海峽，這是美伊衝突爆發以來首度有日本大型煉油企業油輪駛離波斯灣，且並未支付任何過路費。川普傾向無限期維持封鎖，以加大對伊朗的施壓力道，直到後者接受他的核心訴求（停止鈾濃縮並承諾不發展核武）。\n\n他於美東時間2 8日發文表示「封鎖正將伊朗推向崩潰狀態」，29日更警告德黑蘭當局「最好聰明點」。川普發文表示：「伊朗不知道如何簽署一份非核協議，他們最好趕快聰明點。」貼文還附圖，畫面中的他身穿黑西裝、戴墨鏡，手持槍械，身後是伊朗景觀與爆炸場面，上頭寫著「我不再當好好先生！」。美國官員透露，川普近日在多場會議決定持續封鎖伊朗港口，以打壓該國經濟與石油出口。川普認為，無論是恢復空襲或退出戰爭，風險都比維持封鎖高。\n\n此決定代表戰爭進入新階段，川普雖追求快速勝利，目前卻拿不出「一擊致勝」的辦法。在談判陷入僵局下，雙方進入「無協議、無戰爭」的長期對峙局面。美國官員表示，封鎖行動已重創伊朗經濟，導致其儲油空間迅速縮減，也促使德黑蘭重新接觸華府。\n\n封鎖雖能削弱伊朗財政，美軍卻得長期部署在中東，且無法保證伊朗政權會屈服。美國部分官員認為，這場衝突最終可能無法達成核協議，也不會重新開戰。知情人士表示，伊朗27日告知斡旋國，他們需要幾天時間與最高領袖穆吉塔巴磋商，之後會再提出修正版方案，以推進與美國的和平談判。\n\n隨著封鎖壓力升高，伊朗可能加大對美方施壓，包括恢復攻擊中東能源設施或美國海軍資產，以逼迫華府在升高衝突或退讓（達成協議）之間做出選擇。"}, {"title": "習川會 台灣議題列首要", "source": "工商時報 A11 兩岸焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "美國總統川普將於5月中旬展開為期兩天的訪中行程，並與中國國家主席習近平見面，路透29日報導指出，台灣議題已被中國大陸擺在習川會晤議程上的首要位置。報導指出，川普將在5月14、15日訪問中國，而習近平已明確表示，台灣議題將是川普此行的首要議題，這與去年10月兩人在韓國會晤時，刻意迴避台灣議題的做法截然不同。報導引述上海復旦大學國際問題研究院院長吳心伯稱，台灣議題的邏輯很簡單，若美國不想與中國發生大規模戰爭，就不應該支持台灣獨立。", "full_text": "美國總統川普將於5月中旬展開為期兩天的訪中行程，並與中國國家主席習近平見面，路透29日報導指出，台灣議題已被中國大陸擺在習川會晤議程上的首要位置。報導指出，川普將在5月14、15日訪問中國，而習近平已明確表示，台灣議題將是川普此行的首要議題，這與去年10月兩人在韓國會晤時，刻意迴避台灣議題的做法截然不同。報導引述上海復旦大學國際問題研究院院長吳心伯稱，台灣議題的邏輯很簡單，若美國不想與中國發生大規模戰爭，就不應該支持台灣獨立。\n\n他觀察，川普對與中國開戰沒有興趣，為避免讓美國捲入重大衝突，川普應該明確表示，不會支持台灣獨立，也不會採取任何鼓勵與分裂主義有關的政治行動。台灣議題是否被搬上本次習川會的談判桌，一直是全球關注焦點。稍早有知情人士說，台北與華府的互動一直相當正面，但白宮無法向台灣確保哪些議題不會出現在習川會上。\n\n另一位不具名的白宮官員表示，川普期待和習近平的正面會談，同時重申川普政府在台灣議題的立場，以及「一中政策」（One China Policy）並未改變。美國的一中政策是指美國承認北京是中國唯一政權，但未明確說明台灣的法定地位。川普2月曾證實，習近平和他通話時，對美國對台軍售表達關切。\n\n川普當時說，「我正和他（習近平）討論這件事，我們談得很愉快，很快就會做出決定」。中方官媒通稿則顯示，習近平要求美方慎重處理對台軍售問題，並強調台灣問題是中美關係的核心紅線。路透報導指出，川普在第二任期開啟後的一年多時間裡，批准的對台軍售數量，遠超過前總統拜登時期。"}, {"title": "川普傳指示長期封鎖伊朗 WSJ報導 透過切斷德黑蘭政權財源 迫使在核武議題屈服 布蘭特油價衝破117美元", "source": "經濟日報 A02 話題", "cat": "國際經濟情勢", "priority": 0, "summary": "美國總統川普據傳指示幕僚準備對伊朗長期封鎖，用意在切斷德黑蘭政權財源，迫使伊朗在核武議題屈服。原油供應受阻問題短期看來無解，國際油價應聲上漲，布蘭特6月期貨一度大漲5.5%，衝破每桶117美元，連續八個交易日上揚。華爾街日報（WSJ）引述多名美國官員說法報導，川普認為，伊朗提議先開荷莫茲海峽、擱置核問題，表明非真心談判，已指示幕僚做好長期封鎖伊朗港口的準備，目標打擊德黑蘭政權金流，迫使其讓步。", "full_text": "美國總統川普據傳指示幕僚準備對伊朗長期封鎖，用意在切斷德黑蘭政權財源，迫使伊朗在核武議題屈服。原油供應受阻問題短期看來無解，國際油價應聲上漲，布蘭特6月期貨一度大漲5.5%，衝破每桶117美元，連續八個交易日上揚。華爾街日報（WSJ）引述多名美國官員說法報導，川普認為，伊朗提議先開荷莫茲海峽、擱置核問題，表明非真心談判，已指示幕僚做好長期封鎖伊朗港口的準備，目標打擊德黑蘭政權金流，迫使其讓步。\n\n川普這項決定代表戰爭進入新階段，凸顯他雖追求快速、可對外宣傳的勝利，眼前卻沒有萬全選項。澳洲國民銀行雪梨策略師卡崔爾說：「顯而易見，伊朗衝突陷入僵局，既不再有轟炸，衝突也未見解決，既沒有核武協議，荷莫茲海峽也沒有船隻通行。油價預計從現在起再獲支撐。」 知情官員透露，包括本周戰情室會議中，川普選擇透過封鎖進出伊朗港口的航運，持續施壓伊朗經濟和石油出口。他評估後認為，相較維持封鎖，其他無論是恢復轟炸或退出衝突，風險更高。封鎖顯然衝擊伊朗經濟，伊朗貨幣里亞爾29日再寫新低，一度跌至180萬兌1美元。\n\n里亞爾匯率在衝突爆發後幾周大致保持穩定，但兩天前開始走跌。專家警告，伊朗通膨可能因而飆升。在此同時，美國財政部28日警告，任何向伊朗支付費用換取通行荷莫茲海峽的金融機構，可能面臨美國制裁。\n\n同時，美國外國資產控制辦公室（OFAC）宣布，禁止直接或間接向伊朗政府或伊斯蘭革命衛隊支付荷莫茲海峽通行費，禁令適用對象包括美國個人、美國金融機構，以及由美國人擁有或控制的外國公司，外國金融機構或其他非美國人，只要涉及與被制裁或被封鎖對象的交易或活動，也將面臨重大制裁風險。OFAC還追加制裁35名協助德黑蘭規避制裁的個人與實體，並點名中國山東省的獨立民營煉油廠，俗稱「茶壺」的煉油廠，指此公司是伊朗石油重要進口與精煉業者，部分煉油廠還曾透過美國金融體系進行美元交易，並採購美國商品。川普政府先前已對五家中國民營煉油廠祭出制裁，包括24日對大連恆力石化煉油廠出手。\n\n隨著封鎖壓力升高，伊朗接下來可能加大對美方施壓，包括恢復攻擊區域能源設施，或鎖定執行封鎖任務的美國海軍資產，迫使華府在升高衝突或退讓談判之間做出選擇。美伊戰爭已持續兩個月，成為川普的政治負擔。路透28日報導，二名美國官員與一名知情人士表示，美國情報機構正研究，若川普宣布單方面勝利，伊朗將如何回應，目的是了解川普可能從這場衝突中抽身的影響。"}, {"title": "英王在美演說 暗槓川普 強調北約價值並為烏克蘭發聲隱晦表達對美國政治走向的不滿 白宮發合照標註「兩個國王」", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "英國國王查理三世28日在美國國會發表演說，重申英美同盟長久歷史，強調北約價值並為烏克蘭發聲，還談到法治與環保重要性。CNN等美國媒體說，查理就這些問題微妙反駁美國總統川普。查理與王后卡蜜拉27日抵達華府，展開四天國是訪問，是伊麗莎白二世2007年訪美以來再度有英國君主訪美，也是查理登基後首度以君主身分訪美。", "full_text": "英國國王查理三世28日在美國國會發表演說，重申英美同盟長久歷史，強調北約價值並為烏克蘭發聲，還談到法治與環保重要性。CNN等美國媒體說，查理就這些問題微妙反駁美國總統川普。查理與王后卡蜜拉27日抵達華府，展開四天國是訪問，是伊麗莎白二世2007年訪美以來再度有英國君主訪美，也是查理登基後首度以君主身分訪美。\n\n英王夫婦此行時值美國獨立250周年，似乎試圖在美伊戰爭陰影中修補英美關係。查理28日在國會發表30分鐘演說，是伊麗莎白二世1991年在美國國會聯席會議發表演說後的首例。美英關係目前處於緊張時刻，川普多次就伊朗戰爭批評英國首相施凱爾，稱對方未在伊朗戰爭中提供足夠協助。\n\n但在國會演說中查理對美國歷史成就滿是讚美，完全沒有公開譴責或批評川普政府，但隱晦表達出對美國當前政治走向的不滿，並捍衛法治和權力制衡等西方民主支柱。查理還強調，朋友之間可以有分歧，但不會永遠破壞彼此友誼。查理並呼籲大力保衛烏克蘭和其勇敢人民，以取得公正而持久的和平。\n\n這和川普近來削減援助、逼迫烏克蘭割地停戰等主張不同。查理也談到美國的「自然奇觀」，表示「我們保護大自然這一最珍貴、不可替代資產的共同責任」。相較之下，川普稱氣候變遷是「騙局」，還退出巴黎氣候協定。\n\n查理表示，世界所面臨挑戰不是單一國家可以承受，英美的夥伴關係不可或缺；為了適應未來，英國展開冷戰來最大規模的國防預算增幅。這番談話，顯然是在回應川普要求盟國增加軍費。\n\n查理還提到川普日前出席白宮記協晚宴遭遇槍擊事件，他表示，暴力永遠不會成功，不管有什麼樣的歧見，大家都必須團結一致支持民主。查理也說，美國最高法院的判決多次引用英國「大憲章」，強調「法治、穩定且易於理解的規則，以及獨立司法機構解決爭端伸張公義」，尤其是行政權受到監督和約束的基本原則。CNN報導，美利堅大學跨大西洋政策中心主任馬丁說，查理這番話，聽起來就是一個國王告訴美國總統，不要太像個國王。\n\n特別是川普政府近日來的行動，被批評者視為走向專制主義。白宮28日在川普與查理的合照圖說寫下「兩位國王」（TWO KINGS），引發外界聯想。這並非川普二度上任後第一次展露對君主制意象的興趣，去年 10 月他曾在社群媒體發布一段 AI 生成影片，影片中他頭戴王冠駕駛戰鬥機，從一群「無王」（No Kings）示威者頭頂飛過。\n\n查理演說結尾，似乎在警告川普的激烈言行恐將留下持續印記。查理引用美國總統林肯的蓋茲堡演說名句表示，「世人或許不太會記住我們說了什麼，但永遠不會忘記我們做了什麼」。"}, {"title": "上海居民遊金馬 陸委會受理", "source": "經濟日報 A08 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "在「五一」假期前夕，大陸福建省、上海市昨（29）日陸續公告，即日起上海居民可向兩地出入境管理機構申請赴金門、馬祖旅遊簽注。上海成為繼福建省後，大陸第二個正式恢復到金馬旅遊的省市。2月初國共智庫論壇後，大陸文旅部宣布將於近期恢復上海居民赴金門、馬祖旅遊。", "full_text": "在「五一」假期前夕，大陸福建省、上海市昨（29）日陸續公告，即日起上海居民可向兩地出入境管理機構申請赴金門、馬祖旅遊簽注。上海成為繼福建省後，大陸第二個正式恢復到金馬旅遊的省市。2月初國共智庫論壇後，大陸文旅部宣布將於近期恢復上海居民赴金門、馬祖旅遊。\n\n陸方昨天宣布可申辦赴金馬的旅遊簽注，等同政策正式落地。陸委會昨回應，我方小三通本就未限制中國居民身分，是對方自己限制，所以在對方正式開放後，我方會依相關規定受理申請案。上海市文旅局昨公告，即日起上海居民可透過上海市、福建省具備相關條件的旅行社報名赴金門、馬祖團隊遊和自由行，並按規定向兩地公安機關出入境管理機構申請辦理赴金門、馬祖旅遊簽注。\n\n福建省出入境管理單位昨稍早也公告，即日起在福建的上海戶籍居民可憑身分證向福建省出入境管理機構申請辦理往來台灣通行證（大通證）及赴金門、馬祖個人旅遊或團隊旅遊簽注。大陸方面2024年8、9月已分別開放福建省居民到馬祖、金門旅遊，去年光是金門就有近20萬人次陸客持旅遊簽到訪。"}, {"title": "OPEC鬧家變》阿聯退出 奈及利亞恐跟進", "source": "自由時報 A02 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "阿拉伯聯合大公國宣布，五月一日將退出石油輸出國組織（OPEC）及其他產油國盟邦（OPEC+），此舉勢必削弱相關組織對原油市場的影響力；不過消息來源與分析師認為，其他成員國應不致使 OPEC+崩解，將繼續協調原油供應政策。OPEC由十二個成員國組成，阿聯是其中第四大產油國，在加入該組織近六十年後，二十八日宣布退出，此舉將使阿布達比擺脫OPEC及其盟邦為平衡市場供需而設定的產油目標。", "full_text": "阿拉伯聯合大公國宣布，五月一日將退出石油輸出國組織（OPEC）及其他產油國盟邦（OPEC+），此舉勢必削弱相關組織對原油市場的影響力；不過消息來源與分析師認為，其他成員國應不致使 OPEC+崩解，將繼續協調原油供應政策。OPEC由十二個成員國組成，阿聯是其中第四大產油國，在加入該組織近六十年後，二十八日宣布退出，此舉將使阿布達比擺脫OPEC及其盟邦為平衡市場供需而設定的產油目標。\n\n路透報導，五名OPEC+消息來源說，阿聯的退出令人震驚，並將使OPEC+透過調整供應，以平衡市場的努力變得複雜；去年OPEC+控制全球約五十％的原油生產，失去阿聯將使該權力降至四十五％。阿聯將成為退出OPEC的最大產油國，嚴重衝擊該組織與實際領導國沙烏地阿拉伯。\n\n在二月底伊朗戰爭爆發前，阿聯日產三四○萬桶原油，約占全球供應三％。該戰爭迫使阿聯及其他波灣產油國減產並關閉部份產能。退出OPEC將使阿聯加入美國、巴西等獨立產油國行列，自由生產石油。\n\n如果荷姆茲海峽的航運恢復戰前水準，阿聯產能可達每日五百萬桶原油。阿聯與沙國一直存在產量配額的緊張關係，阿聯向來要求提高其配額。此外，在蘇丹、索馬利亞與葉門的衝突問題上，阿聯與沙國的關係日益惡化，同時與美國及以色列關係日益密切。\n\n位於華府的阿拉伯海灣國家研究所高級常駐迪萬說，「這是阿聯的獨立宣言，他們不再覺得必須受制於那些不符合自身利益的機構」。OPEC+成員身份賦予相關國家有較大的外交與國際影響力，這也是為何伊朗在與波灣國家衝突最劇烈之際，仍留在OPEC。OPEC前官員萊昂說，阿聯的退出標誌著OPEC的巨大轉變，長遠而言，將結構性削弱OPEC權力，但目前不太可能解體。\n\n國際油價續走高俄羅斯已表態留在OPEC+，哈薩克與伊拉克表示不考慮退出OPEC；分析師推測，奈及利亞情況與阿聯類似，可能跟進退群。布蘭特原油價格昨每桶上漲至一一四．三七美元，西德州中級原油每桶一○三．一八美元。"}, {"title": "川普延長海上封鎖 緊掐伊朗金脈", "source": "自由時報 A05 國際新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "在美國和伊朗的和談陷入膠著之際，美國總統川普已指示幕僚，為延長對伊朗的海上封鎖做準備，鎖定其政權的經濟命脈，力圖迫使德黑蘭在核問題上屈服。川普廿九日清晨在「真實社群」發文，強硬警告伊朗「最好趕快清醒」，並附上一張人工智慧（AI）生成的持槍合成圖，畫面中他手持槍械、背景為爆炸火光，上方寫著「NO MORE MR. NICE GUY!」（不再當好人）。觀察家指出，川普此舉凸顯美方對伊朗耐心正在消失。", "full_text": "在美國和伊朗的和談陷入膠著之際，美國總統川普已指示幕僚，為延長對伊朗的海上封鎖做準備，鎖定其政權的經濟命脈，力圖迫使德黑蘭在核問題上屈服。川普廿九日清晨在「真實社群」發文，強硬警告伊朗「最好趕快清醒」，並附上一張人工智慧（AI）生成的持槍合成圖，畫面中他手持槍械、背景為爆炸火光，上方寫著「NO MORE MR. NICE GUY!」（不再當好人）。觀察家指出，川普此舉凸顯美方對伊朗耐心正在消失。\n\n恢復轟炸或直接結束戰爭風險更高據華爾街日報廿八日報導，川普在美伊自七日停火後，多次在再度升高戰火一事上打退堂鼓，開啟外交斡旋的空間。不過，他仍然希望加強施壓，直到伊朗向他的關鍵要求屈服：解除伊朗所有核武研發工作。美國官員透露，川普在最近的會議上，包括廿七日在白宮戰情室的一場討論中，都選擇繼續對伊朗經濟和石油出口施壓；\n\n川普評估認為，既有的其他選項，如恢復轟炸行動或者直接結束戰爭，所帶來的風險都比維持對伊朗海上封鎖還高。一名美國高層官員說，目前川普樂於無限期封鎖，因為封鎖行動展現出正在擊垮伊朗的經濟，伊朗正設法找地方儲存其無法出口的石油，也促使德黑蘭與華府新一輪接觸。官員表示，川普不願放棄要求伊朗暫停濃縮鈾至少廿年、且後續相關活動須受限制。\n\n然而，持續封鎖行動也是在使戰爭繼續拖下去，而開戰以來，荷姆茲海峽航運受阻，推升美國零售汽油價格高漲，正傷害川普民調滿意度，為共和黨的期中選舉選情蒙上陰影。川普的決定代表戰爭的某種形式的新階段，但也凸顯他沒有可速戰速決的靈丹。片面結束戰爭雖可快速退場，但是伊朗上週提出的最新提案，將讓華府失去一些迫使伊朗在核問題上妥協的籌碼，並使德黑蘭得以為結束戰爭定條件；\n\n重新挑起戰火雖可進一步削弱伊朗，但也會對波斯灣能源基礎設施帶來更大破壞，提高戰爭的代價；封鎖行動限縮伊朗金脈，但美軍須更長期部署中東，且不保證德黑蘭會屈服。布魯金斯研究所副總裁兼外交政策計畫主任的伊朗問題專家馬洛尼指出，「伊朗正在盤算其承受封鎖和突破圍堵的能力，可勝過美國要避免能源危機擴大和全球經濟衰退風險」，伊朗政權「現在做好充分準備面對經濟困境」。\n\n白宮發言人凱利表示，美國已達成軍事目標，而且「有賴於對伊朗港口進行成功的封鎖」，美國在防範伊朗取得核武的談判中，掌握對該政權的最大籌碼，「總統只會接受一份能保障我國國家安全的協議」。在欠缺明確、果斷的結束戰爭途徑下，部分美國官員認為，這場戰爭最終可能既無法達成核協議，也不會重燃戰火。"}, {"title": "歐領袖反戰 與川普漸行漸遠", "source": "聯合報 A10 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "紐約時報分析，美國總統川普與德國總理梅爾茨近期因伊朗戰爭隔空交鋒，顯示要與川普保持友好並不容易。梅爾茨在伊朗戰爭期間盡力取悅川普，但本周終於失去耐心。紐時說，面對美伊戰爭帶來經濟等衝擊，外國領袖已更難繼續照以往方式討好川普；", "full_text": "紐約時報分析，美國總統川普與德國總理梅爾茨近期因伊朗戰爭隔空交鋒，顯示要與川普保持友好並不容易。梅爾茨在伊朗戰爭期間盡力取悅川普，但本周終於失去耐心。紐時說，面對美伊戰爭帶來經濟等衝擊，外國領袖已更難繼續照以往方式討好川普；\n\n他們逐漸察覺，在安撫川普和取悅本國選民之間只能擇一，且顯然不會選擇前者。梅爾茨廿七日說，美國沒明確退場策略就攻擊伊朗，如今難以脫身，伊朗還藉談判玩弄美國。川普廿八日發文回擊，稱梅爾茨認為伊朗擁有核武也沒關係，根本不知自己在講什麼。\n\n紐時指出，去年五月上任的梅爾茨投注不少心力維持與川普的友誼，屢次訪問白宮，在伊朗戰爭初期也去過，並公開奉承川普，允許美國使用德國軍事基地攻擊伊朗，並承諾停戰後派掃雷艦巡邏荷莫茲海峽。但戰爭重創德國經濟，讓梅爾茨付出政治代價。油價飆升使德國駕駛人和製造商措手不及，柏林也下調今年經濟成長預期。\n\n開戰以來，梅爾茨的「基督教民主黨」失守全國民調第一寶座，落後極右翼「德國另類選擇黨」幾個百分點。這些壓力讓梅爾茨撐不住，公開批評川普。這也暴露歐洲已失去耐心。\n\n歐洲領袖幾乎沒人支持川普開戰。英國首相施凱爾本月才說「受夠」川普，川普與教宗良十四世就戰爭問題交鋒時，長期被視為川普盟友的義大利總理梅洛尼也發聲維護教宗；分析家指出，梅洛尼發現她與川普的關係已成一種政治負擔。\n\n歐洲領袖中，最高調反戰的西班牙總理桑傑士不讓美國使用西班牙基地，雖激怒川普，卻提振自己原本低迷的政治聲望。獲得的政治利益最豐厚。"}, {"title": "逼讓步 美擬長期封伊朗港口 目標打擊政權金流 認為伊朗提議 擱置核問題 非真心談判", "source": "聯合報 A10 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "華爾街日報引述多名美國官員透露，美國總統川普認為伊朗提議先開荷莫茲海峽、擱置核問題，表明非真心談判，已指示幕僚做好長期封鎖伊朗港口的準備，目標是打擊伊朗政權金流迫使讓步。川普這項決定代表戰爭進入新階段，也凸顯他雖追求快速、可對外宣傳的勝利，眼前卻沒有萬全選項。另一方面，伊朗廿七日告訴斡旋方，正與最高領袖穆吉塔巴磋商，數日後將再提修正方案。", "full_text": "華爾街日報引述多名美國官員透露，美國總統川普認為伊朗提議先開荷莫茲海峽、擱置核問題，表明非真心談判，已指示幕僚做好長期封鎖伊朗港口的準備，目標是打擊伊朗政權金流迫使讓步。川普這項決定代表戰爭進入新階段，也凸顯他雖追求快速、可對外宣傳的勝利，眼前卻沒有萬全選項。另一方面，伊朗廿七日告訴斡旋方，正與最高領袖穆吉塔巴磋商，數日後將再提修正方案。\n\n隨著封鎖壓力升高，伊朗接下來可能加大對美方施壓，包括恢復攻擊區域能源設施，或鎖定執行封鎖任務的美國海軍資產，迫使華府在升高衝突或談判退讓間做選擇。美國官員透露，在近期多場會議中，川普決定繼續封鎖船隻進出伊朗港口、通行荷莫茲海峽。川普認為，恢復空襲或退出戰爭的風險，都高於維持封鎖。\n\n報導稱，川普廿七日告訴幕僚，伊朗提議先重啟荷莫茲海峽，並談判結束戰爭，之後再談判核問題，證明德黑蘭並非真心談判。川普廿八日還在社群平台發文說，封鎖正將伊朗推向崩潰狀態；另一方面，官員透露，川普不願放棄要求伊朗暫停濃縮鈾至少廿年，且後續相關活動需接受限制。\n\n不過，美國持續封鎖意味荷莫茲海峽不會開放，油價將居高不下，拖累川普民調，衝擊共和黨期中選舉前景。路透最新民調顯示，民眾對川普處理生活成本問題與伊朗戰事的不滿日益加深，川普支持度跌到百分之卅四，比一周前的民調下跌兩個百分點，續創第二任新低，而他第一任最低點為百分之卅三。自美國和以色列二月廿八日聯手對伊朗發動戰爭導致汽油價格飆升以來，川普支持率大幅下滑。\n\n僅百分之廿二受訪者認同他處理生活成本的方式，而油價上漲為美國家庭帶來沉重負擔，也讓川普所屬的共和黨憂心在十一月期中選舉失去國會控制權。這項線上民調是彙整全美一二六九名成年人的回覆，包括一○一四名登記選民，抽樣誤差為正負三個百分點。"}, {"title": "美祭制裁 禁向伊付通行費", "source": "聯合報 A10 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "美國財政部廿八日警告，任何向伊朗支付費用換取通行荷莫茲海峽的外國金融機構，可能面臨美國制裁。同時，美國外國資產控制辦公室（ＯＦＡＣ）追加制裁卅五名協助伊朗規避制裁的個人與實體，並再度點名中國山東省的獨立民營煉油廠是伊朗石油的重要進口與精煉業者，彭博資訊指美方此舉恐在五月川習會前加劇美中緊張關係。ＯＦＡＣ宣布，禁止直接或間接向伊朗政府或革命衛隊支付荷莫茲海峽通行費，禁令適用對象包括美國個人、美國金融機構，以及由美國人擁有或控制的外國公司。", "full_text": "美國財政部廿八日警告，任何向伊朗支付費用換取通行荷莫茲海峽的外國金融機構，可能面臨美國制裁。同時，美國外國資產控制辦公室（ＯＦＡＣ）追加制裁卅五名協助伊朗規避制裁的個人與實體，並再度點名中國山東省的獨立民營煉油廠是伊朗石油的重要進口與精煉業者，彭博資訊指美方此舉恐在五月川習會前加劇美中緊張關係。ＯＦＡＣ宣布，禁止直接或間接向伊朗政府或革命衛隊支付荷莫茲海峽通行費，禁令適用對象包括美國個人、美國金融機構，以及由美國人擁有或控制的外國公司。\n\nＯＦＡＣ並警告，外國金融機構或其他非美國人，只要涉及與被制裁或被封鎖對象的交易或活動，也將面臨重大制裁風險。美國財政部聲明表示：「金融機構應注意，財政部正動用所有可用工具與權限，準備對持續支持伊朗活動的外國金融機構祭出次級制裁。」 另一方面，ＯＦＡＣ追加制裁卅五名協助伊朗規避制裁的個人與實體，指這些被制裁對象協助伊朗轉移數百億美元資金，讓伊朗武裝部隊與革命衛隊得以透過國際金融體系，收取非法石油銷售款項、採購飛彈等武器零組件，並資助代理勢力。\n\nＯＦＡＣ並點名中國山東省的獨立民營煉油廠，俗稱「茶壺」煉油廠，指此公司是伊朗石油的重要進口與精煉業者，部分煉油廠還曾透過美國金融體系進行美元交易，並採購美國商品。雖然中國國有企業通常避開被列入黑名單業者的石油，但包括大量小型加工業者在內的民營煉油商，已成德黑蘭最重要的買家，利用折扣價格採購原油。川普政府先前已對五家中國民營煉油廠祭出制裁，包括廿四日對大連恆力石化煉油廠出手；\n\n此公司是伊朗原油與石油產品的主要買家之一。ＯＦＡＣ自去年二月以來，已對約一千名與伊朗相關的個人、船舶及飛機實施制裁，持續壓縮德黑蘭透過影子銀行、洗錢與規避制裁網絡取得資金。"}, {"title": "非戰非和 美伊角力拚誰撐更久 川普擬長期封鎖 德黑蘭不甘示弱", "source": "中國時報 AA02 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "美伊間目前正處於既非戰爭又非和平的僵局，《華爾街日報》報導，美國官員透露，美國總統川普已指示助手準備對伊朗實施長期封鎖，矛頭直指伊朗政權的財源。這是一步險棋，意在迫使德黑蘭在核問題上作出妥協。但伊朗官方媒體29日警告，若美繼續扣押與伊朗有關的船隻，將採取「前所未有的軍事行動」。", "full_text": "美伊間目前正處於既非戰爭又非和平的僵局，《華爾街日報》報導，美國官員透露，美國總統川普已指示助手準備對伊朗實施長期封鎖，矛頭直指伊朗政權的財源。這是一步險棋，意在迫使德黑蘭在核問題上作出妥協。但伊朗官方媒體29日警告，若美繼續扣押與伊朗有關的船隻，將採取「前所未有的軍事行動」。\n\n隨著和談受挫，德黑蘭與華盛頓正陷入僵局，雙方都希望撐得比對方更久。《華爾街日報》指出，美國在近期的多次會議上，包括27日在白宮戰情室的討論中，川普都選擇繼續切斷進出伊朗港口的航運，以此擠壓伊朗經濟和石油出口。因川普研判後認為，無論是恢復轟炸還是抽身而退，風險都大於維持封鎖。\n\n川普先前曾威脅要摧毀整個伊朗文明，自7日的停火協議暫時中止主要轟炸行動以來，川普已多次在最後關頭避免衝突升級，為外交斡旋留出空間；不過，川普仍希望勒緊套住伊朗政權的絞索，直到對方屈從他的核心訴求：拆除全部核設施與核項目。然而，持續封鎖也拉長了衝突戰線。\n\n荷莫茲海峽的船隻通行量已降至開戰以來的最低水平。這場衝突不僅推高了汽油價格，拖累了川普的民調支持率，更給共和黨的期中選舉前景蒙上陰影。目前，川普對無限期封鎖的策略頗為篤定。\n\n他28日在真實社群上發文稱，此舉正將伊朗推向「崩潰狀態」。一名美國高級官員表示，封鎖顯然正在壓垮伊朗經濟，滯銷的石油已令其儲油能力捉襟見肘，這也迫使伊朗政權重新主動向華盛頓拋出橄欖枝。由於缺乏清晰的破局之路，一些美國官員坦言，這場持續八周的衝突最終可能陷入既無核協議、也無新戰火的僵局。\n\n不過，伊朗問題專家、布魯金斯學會外交政策項目副總裁馬洛尼（Suzanne Maloney）表示：「伊朗的盤算是，他們承受和繞過封鎖的能力，要強過美國對避免更大的能源危機、甚至全球衰退的意願。」 另外，美方意識到德黑蘭可能暗中發力，試圖打破目前這種「不戰不和」的僵局。隨著封鎖日益收緊，伊朗可能試圖逼迫美國二選一：要麼升級衝突，要麼退讓妥協達成協議。\n\n伊朗可能恢復對地區能源設施的攻擊，或將矛頭對準執行封鎖的美國海軍資產。儘管伊朗海軍力量已被摧毀，但仍有能力與美軍擦槍走火。"}, {"title": "摩通首席CEO警告！全球政府債務持續攀升、美30年期債息逼近5％，市場恐陷流動性緊縮 戴蒙示警 債券危機將至", "source": "工商時報 A02 火線焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "華爾街最具影響力銀行家、摩根大通首席執行長戴蒙（Jamie Dim on）再度發出警告，在全球政府債務持續攀升背景下，類似2022年英國公債市場崩潰的「債券危機」終將到來。私募信貸市場品質良莠不齊，一旦信用周期逆轉，其帶來的衝擊將「比人們預想的更為嚴重」。美國30年期公債殖利率29日正再度逼近到5％左右的危險區。", "full_text": "華爾街最具影響力銀行家、摩根大通首席執行長戴蒙（Jamie Dim on）再度發出警告，在全球政府債務持續攀升背景下，類似2022年英國公債市場崩潰的「債券危機」終將到來。私募信貸市場品質良莠不齊，一旦信用周期逆轉，其帶來的衝擊將「比人們預想的更為嚴重」。美國30年期公債殖利率29日正再度逼近到5％左右的危險區。\n\n過去三年，5％一直是美國長債殖利率的天花板，每當殖利率接近該水平時，金融環境就會趨於緊縮，並導致股市重挫。然而不只是美債市場拉警報，全球債市也同樣面臨沉重賣壓，在投資者重新評估通膨走勢、央行政策與政府債券供給情況下，主要國家公債殖利率也因而攀高。CNBC 報導，戴蒙 28 日在挪威主權財富基金舉辦的投資會議上，對全球正在醞釀的金融風險表達深切憂慮。\n\n他直言，按當前全球政府債務的增長趨勢，「某種形式的債券危機將會到來。」 戴蒙所描述的債券危機，是指債券殖利率在短時間急升，導致投資者爭相拋售債券，而買家全面撤退，市場流動性瞬間枯竭，最終迫使各國央行不得不以「最後買家」身份進場干預。他特別援引2022年英國公債市場的動盪作為案例，當時英國央行就曾被迫採取緊急購債措施以穩定市場。\n\n他強調，當前風險並非單一因素，而是多重壓力疊加累積，包括地緣政治、油價、政府赤字，這些風險因素的量級都很高，「我們無法預知是哪種事件組合最終觸發問題。」 此外，戴蒙也對快速增長的私募信貸市場提出警告，指規模約1.7 至1.8兆美元的市場，雖然目前尚不足以構成系統性風險，但其內部結構令人擔憂，市場上存在超過一千家參與機構，戴蒙表示：「絕非所有機構都是出色的。因承銷標準參差不齊，且市場已長久未經歷真正的信用衰退周期，一旦情勢逆轉，衝擊將超出許多人的預期。\n\n在更廣泛的宏觀層面，戴蒙點名伊朗戰爭、全球再軍事化趨勢、基礎設施投資需求及各國財政赤字，均是潛在的通膨壓力來源。戴蒙認為，任何單一風險或許不足以引發危機，但當這些壓力以非線性的方式相互交織、產生共振時，就可能在某個未知的臨界點，觸發一場超乎預期的全球市場劇烈調整。他呼籲各國政策制定者應主動應對，而非坐等市場動盪發生後才被迫採取行動。"}, {"title": "地緣政治、通膨風險持續…首季全球黃金需求創高", "source": "工商時報 A09 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "世界黃金協會（WGC）發布最新報告指出，中東衝突引發地緣政治緊張，加上金價上漲帶動投資需求，今年第一季全球黃金需求量年增 2％，黃金需求價值飆升至1,930億美元，創歷史新高。國際金價跌跌不休，截至台北時間29日，每盎司失守4,600美元大關。金融圈主管分析，國際金價走勢疲軟，主因市場仍聚焦美伊談判結果，荷姆茲海峽無限期關閉也讓通膨風險持續惡化，促使金價持續溜滑梯。", "full_text": "世界黃金協會（WGC）發布最新報告指出，中東衝突引發地緣政治緊張，加上金價上漲帶動投資需求，今年第一季全球黃金需求量年增 2％，黃金需求價值飆升至1,930億美元，創歷史新高。國際金價跌跌不休，截至台北時間29日，每盎司失守4,600美元大關。金融圈主管分析，國際金價走勢疲軟，主因市場仍聚焦美伊談判結果，荷姆茲海峽無限期關閉也讓通膨風險持續惡化，促使金價持續溜滑梯。\n\n國際金價1月底曾創約5,595美元的歷史新高，隨後維持高位震盪；截止29日，金價已自歷史高點大幅滑落逾1,000美元，跌幅超過18％。但金融機構仍持續看好後市。\n\n法國資產管理巨頭Amundi策略主管L orenzo Portelli指出，儘管受中東局勢與伊朗戰事推升能源價格影響，通膨短線升溫壓抑金價表現，但該能源衝擊對通膨影響屬於暫時性，預期未來12個月金價仍具上行空間，目標價上看每盎司5,500美元。WGC於29日發布今年報告顯示，上季全球黃金總需求量，年增2％達 1,231噸。需求量雖僅小幅成長，但拜金價飆漲之賜，總需求價值與去年同期相比暴漲74％，來到1,930億美元的歷史新高。\n\n地緣政治緊張局勢下，全球散戶投資人受金價動能與避險魅力吸引，上季金條與金幣需求量，年增42％達474噸。WGC 印度區執行長賈恩（Sachin Jain）指出，「在當前地緣政治動盪及全球局勢混亂的情勢下，消費金條、金幣等實體黃金，進一步強化黃金的避險資產地位。」 黃金整體需求主要受到各國央行增加244噸黃金儲備所支撐。\n\n此外中國上季金條、金幣需求年增67％，達到創紀錄的 207 噸，遠高於 20 13 年第二季締造的 155 噸季度需求紀錄。至於涵蓋投資與消費的黃金總需求量，中國上季年增24％達362噸，也寫下有史來單季新高。"}, {"title": "港交所Q1營收、獲利 同期新高", "source": "工商時報 A11 兩岸焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "香港交易所29日公布2026年第一季財報，受市場交投活絡及新股上市活動回溫帶動，營收與獲利同步創下歷年同期新高。財報提到，期內首次公開募股（IPO）總集資額較去年同期大增近 6 倍，表現明顯優於市場預期。財報公布後，港交所股價走揚，收盤上漲2.99％，報4 19.8港幣。", "full_text": "香港交易所29日公布2026年第一季財報，受市場交投活絡及新股上市活動回溫帶動，營收與獲利同步創下歷年同期新高。財報提到，期內首次公開募股（IPO）總集資額較去年同期大增近 6 倍，表現明顯優於市場預期。財報公布後，港交所股價走揚，收盤上漲2.99％，報4 19.8港幣。\n\n綜合陸媒報導，財報顯示，第一季港交所收入及其他收益達82.03 億港幣，年增20％、季增12％。EBITDA（息稅折舊及攤銷前利潤）利潤率為81％，較上年同期與上季均上升3個百分點；股東應占純益51 .88億港幣，年增27％、季增20％。\n\n財報顯示，第一季整體市場平均每日成交金額達2,767億港幣，年增14％，為歷來第二高季度紀錄，僅次於2025年第三季的2,864億港幣，反映市場流動性維持高檔。互聯互通機制方面，滬股通及深股通平均每日成交金額達人民幣 3 ,241 億元，創歷來季度新高，年增 70％，顯示跨境資金參與度持續提升。港交所行政總裁陳翊庭指出，2026年首季市場延續活躍態勢，單季共20個交易日成交額突破3,000億元港幣，大陸及國際投資人參與度同步提升，帶動港股通及滬深股通交易穩健成長。\n\nIPO方面，第一季共有40家公司上市，總集資額達1,104億港幣，為 2025年同期的近六倍，並創2021年以來首季新高紀錄。此外第一季包括牧原股份、東鵬飲料及瀾起科技等企業完成上市，分別集資121億港幣、111億港幣及81億港幣，躋身全球同期大型新股之列，鞏固香港作為大陸企業主要境外集資平台地位。報導指出，港交所亮眼業績背後仍潛藏多項挑戰，包括地緣政治風險升溫，擾動全球市場加劇波動與資金外流壓力、下半年全球大型科技IPO密集登場，形成資金虹吸效應並分流本地市場流動性、美國聯準會貨幣政策走向不確定性，持續主導全球資金流向，以及A股交易所競爭加劇，上市資源流失風險上升。"}, {"title": "華許掌Fed獲參院初步通過 鮑爾最後一役…利率估不動", "source": "經濟日報 A02 話題", "cat": "國際經濟情勢", "priority": 0, "summary": "美國聯準會（Fed）台北30日凌晨2時宣布決策，各界認定利率將維持不變，而這將是主席鮑爾任內主持的最後一場決策會，因為川普提名的下屆聯準會主席人選華許29日在聯邦參議院銀行委員會贏得多數支持，為他在鮑爾任期屆滿後上任鋪平道路。華許29日在參議院銀行委員會以13比11的票數，贏得支持。這使他有望在鮑爾於5月15日任期屆滿前，獲得參議院全院表決通過。", "full_text": "美國聯準會（Fed）台北30日凌晨2時宣布決策，各界認定利率將維持不變，而這將是主席鮑爾任內主持的最後一場決策會，因為川普提名的下屆聯準會主席人選華許29日在聯邦參議院銀行委員會贏得多數支持，為他在鮑爾任期屆滿後上任鋪平道路。華許29日在參議院銀行委員會以13比11的票數，贏得支持。這使他有望在鮑爾於5月15日任期屆滿前，獲得參議院全院表決通過。\n\n華許的提名案之前遭共和黨參議員提利斯的阻撓，直到司法部於上周同意（暫時）放棄針對聯準會總部翻修預算超支案的刑事調查。在利率決策公布前，美國公布的最新經濟數據都優於市場預期；商務部29日公布，剔除飛機和軍用硬體在內的核心耐久財訂單金額，3月成長3.3%，優於2月經上修後成長1.6%，是2020年年中以來最大增幅，延續了在人工智慧（AI）支出熱潮推動下已持續一年的穩健資本投資勢頭。\n\n同日公布的3月新屋開工成長10.8%，折合年率為150萬戶，為2024年12月以來最高，也優於市場預估，代表儘管住房負擔能力擔憂持續存在，但住宅建築商仍提高了施工量。目前美國的經濟環境，是能源價格居高不下。通膨率已連續五年高於 Fed設定的2%目標，勞動市場雖然疲軟，但尚未陷入困境。\n\n這並非寬鬆政策的條件，至少目前還不是。儘管Fed官員通常將價格急漲視為暫時現象，但他們也對中東衝突若升溫可能帶來的長期影響保持戒心。"}, {"title": "亞銀：能源震撼仍在發酵", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "亞洲開發銀行（ADB）公布最新報告，下修開發中亞洲國家的經濟成長預期，並上修通膨預估值，以反映伊朗戰爭引發的能源震撼持續發酵。ADB並警告，若國際油價5月續揚且居高不下，今年通膨最高可能飆升至7.4%。ADB 29日發布報告，將開發中亞洲國家今年的成長預期下修0.4個百分點至4.7%，明年的成長預期則下調0.3個百分點至4.8%，距前一次的報告還不到三周；", "full_text": "亞洲開發銀行（ADB）公布最新報告，下修開發中亞洲國家的經濟成長預期，並上修通膨預估值，以反映伊朗戰爭引發的能源震撼持續發酵。ADB並警告，若國際油價5月續揚且居高不下，今年通膨最高可能飆升至7.4%。ADB 29日發布報告，將開發中亞洲國家今年的成長預期下修0.4個百分點至4.7%，明年的成長預期則下調0.3個百分點至4.8%，距前一次的報告還不到三周；\n\n今年通膨率預期則大幅上修1.6個百分點至5.2%，明年回落至4.1%。ADB總裁神田真人表示：「為反映（能源）危機惡化，我們藉由特別更新，修正了展望報告，將成長預期大幅下調，並上修通膨預估。」「我們所面對的情況，是全球能源與貿易網路受到系統性長期干擾，而非短期波動。」 即使敵對情勢落幕，ADB表示，荷莫茲海峽恢復安全通行尚需時日，意味貨運延遲並推高物流成本；而波斯灣地區受損的關鍵能源基礎設施，也需花費數年時間修復，將拖長對原油供應的影響。ADB指出，若衝突升級，可能帶來更嚴重的經濟後果。\n\n例如國際油價若在5月飆漲並維持高檔，開發中亞洲國家的今年的成長率預料進一步放緩至4.2%，明年減弱至4.0%，今年的通膨預期將飆增至7.4%，「各國央行應聚焦於限制市場波動，並緊盯通膨預期」。"}, {"title": "大陸稀土礦產 亮出家底 官方公布14種儲量、17種產量皆居世界第一 新發現225個油氣田 為中美談判增添底氣", "source": "經濟日報 A08 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "5月川習會前夕，大陸自然資源部昨（29）日發布最新礦產資源家底，包括稀土在內的14種礦產儲量和17種礦產產量皆居世界首位，新一輪找礦行動已發現225個大中型油氣田，包含13個億噸級油田與26個千億立方公尺氣田。官方稱這為資源自主可控奠定了堅實基礎，也象徵產業鏈主導地位持續鞏固。稀土等礦產已成為大陸反制美國科技封鎖與關稅戰的重要工具，大陸選在下個月中旬美國總統川普訪問北京前夕亮出厚實籌碼，不僅展示其掌控全球關鍵礦產供應的主導地位，更是為中...", "full_text": "5月川習會前夕，大陸自然資源部昨（29）日發布最新礦產資源家底，包括稀土在內的14種礦產儲量和17種礦產產量皆居世界首位，新一輪找礦行動已發現225個大中型油氣田，包含13個億噸級油田與26個千億立方公尺氣田。官方稱這為資源自主可控奠定了堅實基礎，也象徵產業鏈主導地位持續鞏固。稀土等礦產已成為大陸反制美國科技封鎖與關稅戰的重要工具，大陸選在下個月中旬美國總統川普訪問北京前夕亮出厚實籌碼，不僅展示其掌控全球關鍵礦產供應的主導地位，更是為中美談判增添底氣。\n\n大陸自然資源部昨天召開月度記者會，主題聚焦礦產資源，截至去年底，大陸的稀土、鎢、錫、鉬、銻、鎵、鍺、銦、螢石、石墨等 14 種礦產儲量居世界第一；2025 年全年，大陸的煤炭、釩、鈦、鋅、稀土、鎢、錫、鉬、銻、鎵、銦、金、碲等 17 種礦產產量居世界第一，其中稀土、鎢、銻、鎵、銦、碲等 11 種礦產產量占全球 50%以上。大陸將油氣作為新一輪探勘突破戰略行動的重點，累計投入資金近人民幣4,500億元，在塔里木、鄂爾多斯、渤海灣新發現大中型油氣田225個，其中有13個億噸級油田和26個千億立方公尺氣田。\n\n在礦產冶煉加工環節，大陸的優勢更突出。據發布，錳冶煉產品占全球99%，稀土冶煉產品占94%，鋁占60%，鋼鐵占53%，銅占47%。30餘種冶金產品產量居世界首位，17種產品產量占全球50%左右。\n\n大陸自然資源部表示，這標誌著大陸不僅是礦產資源生產大國，更是全球冶煉加工業的供給主導者和重要引領者，保障本國產業鏈穩定，有力促進新興產業發展。新華社指出，目前大陸礦產生產與冶煉加工規模穩居全球首位，2025年全國礦業產值約人民幣32.7兆元，占GDP比重超過23%。大陸自然資源部地質勘查管理司司長熊自力昨天表示，「十五五」時期，將進一步完善戰略性礦產資源的勘查、生產、供應、儲備與銷售統籌銜接體系。"}, {"title": "習近平握1.2兆美元經濟籌碼", "source": "經濟日報 A08 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "彭博報導，大陸在稀土供應鏈中的主導地位，使大陸領導人習近平在下月北京「川習會」前，握有價值約 1.2兆美元的經濟籌碼。彭博經濟研究最新報告指出，美國約4%的GDP（即1.2兆美元）來自使用稀土的相關產業。儘管美國部分行業或許能應對稀土供應中斷，但大多數行業並無合適的替代品，一旦供應被切斷，部分產業將不得不停產。", "full_text": "彭博報導，大陸在稀土供應鏈中的主導地位，使大陸領導人習近平在下月北京「川習會」前，握有價值約 1.2兆美元的經濟籌碼。彭博經濟研究最新報告指出，美國約4%的GDP（即1.2兆美元）來自使用稀土的相關產業。儘管美國部分行業或許能應對稀土供應中斷，但大多數行業並無合適的替代品，一旦供應被切斷，部分產業將不得不停產。\n\n報告表示，在部分情況下，稀土原料就像「黃金螺絲」，一旦供應中斷，製造商很難找到替代品，或者需要數月甚至數年的時間。而對其他行業而言，儘管可能找到替代品，成本也將顯著上升。報導指出，在中美貿易緊張局勢下，大陸至少掌握七種稀土元素的槓桿。\n\n報導中的圖表顯示，大陸在釤、釓、鋱、鏑、鎦、釔、鈧等七種稀土精煉產量中，近乎占據全球壟斷地位，前五種產量占比更接近 100％。面對川普第二任期的經貿施壓，「稀土牌」已成為大陸最具份量的反制籌碼。去年 4月川普宣布對等關稅後，大陸即宣布對前述圖表的七類中重稀土相關項目實施出口管制，對電動車、無人機等全球供應鏈造成影響，大陸10月又再度擴大管制品項。\n\n直到去年10月底，中美元首在韓國釜山會晤達成臨時貿易休戰協定，北京同意暫停部分稀土和關鍵礦產的出口管制措施，為期一年。川普計劃於5月14日至15日前往北京，與習近平舉行峰會。"}, {"title": "科技封鎖 美堵陸廠 禁晶片設備商供貨華虹 限制應材、科磊等業者出口 延緩陸7奈米擴產腳步 AI鏈集中台灣加劇", "source": "聯合報 A05 財經", "cat": "國際經濟情勢", "priority": 0, "summary": "兩位知情人士透露，美國商務部上周下令多家晶片設備公司，暫停向中國大陸第二大晶片製造商華虹半導體供貨，這也是美方遏制中國發展先進晶片採取的最新行動。半導體設備業者分析，此舉將延緩中國七奈米擴產腳步，使原本除中芯國際欲建立第二條先進製程產線的計畫受挫，ＡＩ晶片自主供應能力面臨瓶頸。半導體業者表示，在華為積極推動國產ＡＩ晶片背景下，華虹角色原被寄予分散代工風險的期待，如今設備來源受阻，短期內恐難形成有效支援。", "full_text": "兩位知情人士透露，美國商務部上周下令多家晶片設備公司，暫停向中國大陸第二大晶片製造商華虹半導體供貨，這也是美方遏制中國發展先進晶片採取的最新行動。半導體設備業者分析，此舉將延緩中國七奈米擴產腳步，使原本除中芯國際欲建立第二條先進製程產線的計畫受挫，ＡＩ晶片自主供應能力面臨瓶頸。半導體業者表示，在華為積極推動國產ＡＩ晶片背景下，華虹角色原被寄予分散代工風險的期待，如今設備來源受阻，短期內恐難形成有效支援。\n\n業界指出，中方雖將加速導入本土設備並發展成熟製程替代方案，但良率與量產效率仍具挑戰。相較之下，台灣受惠於先進製程領先優勢，台積電在全球ＡＩ晶片供應鏈的關鍵地位進一步強化，訂單集中效應可望延續。然而，隨著全球算力高度依賴台灣，地緣政治風險與供應鏈壓力同步升高，產業「單點集中」問題也更加凸顯。\n\n路透引述知情人士說法報導，美國商務部至少已去函科林研發、應用材料與科磊等美國主要晶片設備商，通知業者政府已針對運往華虹兩座工廠的設備工具與其他材料，實施新限制。美方官員認為，這兩座廠可能用於生產中國最先進的晶片。美國當局近年來持續以國安為由，限制美企向中國先進晶片製造廠出口設備，但在五月的「川習會」之前傳出此事，可能加劇美中緊張。\n\n大陸外交部發言人林劍昨在例行記者會回應，中方已多次表明在美輸陸晶片問題上的原則立場，希望美方以實際行動維護全球產供鏈的穩定暢通。受此消息影響，華虹系兩地股價昨同步走跌。大陸Ａ股華虹公司盤中一度跌百分之六點六至人民幣一二六點一一元；\n\n港股華虹半導體則下跌逾百分之六點一至一○二點九港元。路透三月報導，華虹集團已開發出可用於生產ＡＩ晶片的先進製程技術，這是北京當局推動科技自主的一項里程碑。消息人士指出，華虹旗下晶圓代工企業華力微電子正準備在上海廠導入七奈米製程。\n\n中芯國際是中國目前唯一能量產七奈米晶片的本土公司。消息人士表示，美國商務部也在防止相關設備出貨至華力微電子。報導指出，美國商務部此次鎖定的華虹兩座廠，包括六號晶圓廠（華力微電子官網顯示其採用廿八／廿二奈米技術，位於上海），以及 8a廠，但這座廠未出現在公司網站上，據稱仍在建設中。\n\n消息人士說，美國晶片設備商及其他供應商可能因此損失數十億美元銷售額，尤其是他們的供應對象是正在興建或升級以生產更先進晶片的工廠。這些限制可能拖慢中國本土晶片製造進程，但華虹仍可能改用他國或中國廠商的設備。"}, {"title": "經濟死亡螺旋 伊朗百萬人失業 物價飛漲", "source": "聯合報 A10 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "華爾街日報報導，美國與伊朗各自祭出海上封鎖手段，賭對方先撐不住。然而，伊朗經濟已陷入「死亡螺旋」，初步估計顯示，約一百萬人因戰爭直接失業；四月中旬物價和一年前相比已飆漲百分之六十七。", "full_text": "華爾街日報報導，美國與伊朗各自祭出海上封鎖手段，賭對方先撐不住。然而，伊朗經濟已陷入「死亡螺旋」，初步估計顯示，約一百萬人因戰爭直接失業；四月中旬物價和一年前相比已飆漲百分之六十七。\n\n維也納國際經濟研究所學者戈德西表示，「生活已負擔不起，伊朗正處於最脆弱時刻」。美伊談判陷入僵局，美國押注伊朗在經濟危機下讓步，伊朗則賭美國為了穩定全球市場、壓低汽油價格，先解除對伊朗港口的封鎖。初步估計顯示，伊朗約一百萬人直接失業，另有一百萬人間接受影響；\n\n相較伊朗平時約二千五百萬就業人口，衝擊相當可觀。伊朗央行數據顯示，截至四月中旬的一個月，年通膨率已達百分之六十七。多半仰賴海運進口的紅肉，即使是補貼價格，一公斤要價超過台幣二百五十元；\n\n在最低月薪約一百卅美元（約台幣四一三八元）的伊朗，多數民眾已無法負擔。伊朗政府試圖以加薪、補貼與現金紓困止血，包括提高最低工資與公務員薪資，繼續補貼麵包、燃料等必需品，並向低收入戶發放現金與米、雞肉、食用油等民生物資票券。當局也動用家庭必需品戰略儲備，並呼籲民眾節水、節電、節省天然氣，德黑蘭居民則被鼓勵少開車、改搭大眾運輸。\n\n但政府收入正迅速枯竭。封鎖前，伊朗多數石油出口，以及食品、藥品、原物料等進口，都經由荷莫茲海峽運輸。三月伊朗每日仍出口一八五萬桶原油，按國際價格計算約值一點九一億美元；\n\n如今航運紀錄顯示，伊朗難以出口石油與其他主要收入來源的商品。Kpler 石油分析師法拉克沙希表示，目前沒有證據顯示伊朗石油已突破美國封鎖，抵達中國大陸或其他買家手中。戰爭也重創伊朗基礎設施與重要產業。\n\n伊朗國營媒體估計，戰後重建費用恐達二千七百億美元（約台幣八點六兆元）；相較伊朗去年國內生產毛額約三四一○億美元（約台幣十點八兆元），重建成本相當於伊朗一整年經濟產出的八成。"}, {"title": "經濟籌碼 川習會前 陸亮出稀土家底 陸官方披露：14種儲量、17種產量居世界首位 彭博：習近平握1.2兆美元籌碼", "source": "聯合報 A11 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "川習會舉行前夕，大陸自然資源部昨發布最新礦產資源家底，大陸在包括稀土在內的十四種礦產儲量和十七種礦產產量皆居世界首位。官方稱這為資源自主可控奠定了堅實基礎，也象徵產業鏈主導地位持續鞏固。彭博昨報導，大陸在稀土供應鏈中的主導地位，使大陸領導人習近平在下月北京「川習會」前，握有價值約一點二兆美元的經濟籌碼。", "full_text": "川習會舉行前夕，大陸自然資源部昨發布最新礦產資源家底，大陸在包括稀土在內的十四種礦產儲量和十七種礦產產量皆居世界首位。官方稱這為資源自主可控奠定了堅實基礎，也象徵產業鏈主導地位持續鞏固。彭博昨報導，大陸在稀土供應鏈中的主導地位，使大陸領導人習近平在下月北京「川習會」前，握有價值約一點二兆美元的經濟籌碼。\n\n彭博經濟研究最新報告指，美國約百分之四的ＧＤＰ（即一點二兆美元）來自使用稀土的相關產業。儘管美國部分行業或許能應對稀土供應中斷，但大多數行業並無合適的替代品，一旦供應被切斷，部分產業將不得不停產。報告表示，在部分情況下，稀土原料就像「黃金螺絲」，一旦供應中斷，製造商很難找到替代品，或者需要數月甚至數年的時間。\n\n報導指，大陸至少掌握七種稀土元素的主導權。大陸在釤、釓、鋱、鏑、鎦、釔、鈧等七種稀土精煉產量中，近乎占據全球壟斷地位；前五種產量占比更接近百分之百。\n\n大陸自然資源部昨舉行記者會，據發布，截至去年底，大陸的稀土、鎢、錫、鉬、銻、鎵、鍺、銦、螢石、石墨等十四種礦產儲量居世界第一；大陸的煤炭、釩、鈦、鋅、稀土、鎢、錫、鉬、銻、鎵、銦、金、碲等十七種礦產產量居世界第一，其中稀土、鎢、銻、鎵、銦、碲等十一種礦產產量占全球百分之五十以上。其中，稀土、銻、鎵、鍺、石墨等大陸在儲量、產量上占據全球主導地位的關鍵礦產，與北京過去兩年曾祭出出口管制的物項高度重疊，更一度引發全球市場供應緊張，衝擊汽車、機器人、國防等產業，促使美國、歐盟緊急尋求替代供應。\n\n冶煉加工方面，大陸優勢更突出。錳冶煉產品占全球百分之九十九，稀土冶煉產品占百分之九十四，鋁占百分之六十。三十餘種冶金產品產量居世界首位。\n\n大陸礦產生產與冶煉加工規模居全球首位，二○二五年全國礦業產值約人民幣卅二點七兆元，占ＧＤＰ比重超過百分之廿三。大陸三月稀土磁鐵對美出口已連續五個月下降，較去年同期大減百分之卅點六。"}, {"title": "自由廣場》薪資有漲生活未必更好 五一勞動節的提問", "source": "自由時報 A12 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "五一勞動節將至，關於薪資的討論再次升溫。從統計數據來看，台灣的名目薪資並非停滯，反而呈現長期穩定上升的趨勢，最低工資也連年調整，逐步墊高整體薪資水準。然而，當這些數字回到日常生活，卻出現明顯落差，帳面上的成長，為何難以轉化為實際感受？", "full_text": "五一勞動節將至，關於薪資的討論再次升溫。從統計數據來看，台灣的名目薪資並非停滯，反而呈現長期穩定上升的趨勢，最低工資也連年調整，逐步墊高整體薪資水準。然而，當這些數字回到日常生活，卻出現明顯落差，帳面上的成長，為何難以轉化為實際感受？\n\n問題的關鍵，不在於薪資是否上升，而在於薪資成長往往追不上物價的變動。名目薪資增加，代表收入提高，但真正影響生活品質的，是扣除物價之後的實質薪資。近年來，從餐飲、租金到日常開支，生活成本持續上升，即使薪水有所調整，也往往只是填補支出，難以累積餘裕。\n\n一旦薪資與物價的差距縮小甚至消失，勞動所得的實質價值便會下降，生活也難以改善。更值得注意的是，當薪資成長相對溫和，資產價格卻呈現另一種速度。近年股價與不動產明顯上揚，資產持有者透過價格上升累積財富，其幅度往往遠高於薪資成長。\n\n所得結構因此出現轉變，從以勞動為主，逐漸走向資產決定財富的結構。這樣的變化對一般受薪階級形成雙重壓力。一方面，薪資追不上生活成本，日常開支持續增加；\n\n另一方面，資產價格上升提高了進入門檻，使原本就不易累積的資本更加遙遠。房價上升不僅代表購屋困難，也推升租金負擔；股市上漲則讓未參與市場的人，難以分享資產增值的成果。\n\n當資產增值速度長期高於薪資成長，貧富差距便逐漸擴大。擁有資產者透過市場變動累積財富，缺乏資產者則只能依賴薪資，而薪資卻難以轉化為資本。這不只是收入差距，更關係到機會的分配與未來的流動性。\n\n在這樣的背景下，五一勞動節不應只是象徵性的節日，而應成為重新檢視薪資結構與分配機制的契機。討論的焦點，不僅是是否調升最低工資，更在於如何讓薪資成長能穩定超越生活成本，並讓努力工作的人不只能維持生計，更能累積餘裕。薪資從來不只是個人收入問題，而是衡量一個社會如何看待勞動價值的指標。\n\n當勞動所得長期難以支撐生活甚至逐步被邊緣化，所影響的，不只是個別家庭，更是整體社會的穩定。五一勞動節真正的意義，或許就在於提醒我們，成長的數字之外，還需要更貼近生活的改變。"}, {"title": "大陸建立統一大市場的難點", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "中國第一季總體經濟數據出爐，十五五規劃頗有「良好開局」。G DP比去年同期增長5％，相較去年4個季度亦增長1.3％。國際貨幣基金組織因中東戰事影響，2026年全球經濟成長預測下調0.2％至3.1％；", "full_text": "中國第一季總體經濟數據出爐，十五五規劃頗有「良好開局」。G DP比去年同期增長5％，相較去年4個季度亦增長1.3％。國際貨幣基金組織因中東戰事影響，2026年全球經濟成長預測下調0.2％至3.1％；\n\n相較下中國經濟維持平穩，具備達到全年目標4.5～5.0％的底氣。全國固定資產投資同期增長1.7％，扭轉去年全年負3.8％的下行態勢。工業生產者出廠價格指數（PPI）則有修復跡象，3月份同期上漲 0.5％，是自2022年10月以來，再度達到正成長。\n\n第一季全國居民消費價格（CPI）也上升 0.9％，社會消費品零售總額較去年同期增長 2 .4％，全國居民人均可支配收入同期增長 4.9％，全國居民人均消費支出同比增長3.6％。總體而言，內需消費出現一定程度的修復，為第一季經濟增長提供支撐；但仍需檢驗內需是否已成可持續動能。\n\n經濟數據與人民生活感受仍有明顯溫差。例如，人均消費支出增長 3.6％，低於全國GDP成長5％，也低於人均可支配收入4.9％的增幅，顯示消費力道仍落後於整體經濟修復。為了做大國內市場、發揮內需潛力，2025 年 9 月習近平在《求是》 發布〈縱深推進全國統一大市場建設〉，指出幾個重點難點必須整治、處理：企業低價無序競爭亂象、政府採購招標亂象、地方招商引資亂象、推動內外貿一體化發展、補齊法規制度短板、糾治政績觀偏差。\n\n這套政策並不只是經濟問題，更牽涉中央與地方之間的政治問題；尤其在2025年提振內需效果有限、地方競爭問題待處理的背景下，中央政治局在2026年兩會後的首次會議，即審議《中國共產黨地方委員會工作條例》。明確要求地方黨委落實向中央看齊，接受中央政策目標與政治紀律約束，不得對中央決議消極應付或違背。\n\n顯示中共中央充分意識到，無論是民生消費的低價競爭，導致製造業產能過剩的內捲現象，都與各地方政府為爭取政績而展開的內部競爭有關。建設全國統一大市場的背景之一，正是外部衝擊挑戰。在美中貿易戰升溫與外部市場收縮下，中國製造業產能過剩與出口受阻的壓力更加嚴峻，使得「中國製造」對於經濟成長的邊際效益遞減。\n\n因此必須以提升內需消費、推動內循環為發展重點。相對總體經濟數據的增長，中國就業市場仍未同步改善。3月全國城鎮調查失業率升至5.4％，16歲至24歲青年失業率升至16.9％，第一季整體失業率微幅上升，顯示經濟增長與就業創造之間仍有落差。\n\n若要真正提振消費，「投資於人」應成為政策核心，應先落實城鄉居民增收計畫，穩定就業與薪資預期，再透過提振消費專項行動釋放需求。除了補貼、降價與促銷之外，更重要的是降低醫療、教育、住房、養老等剛性支出壓力，使居民可支配收入不被物價上漲形成額外的生活成本所侵蝕。換言之，建設全國統一大市場的難點，不只在於打破地方保護、整頓低價競爭，更在於能否把制度整合轉化為人民可感受的收入改善、 就業安全與生活保障；\n\n以「人民對美好生活的嚮往」為政策目標，若人民仍對未來缺乏信心，再完整的市場統一，也難以真正轉化為穩定而持續的內需。"}, {"title": "從伊朗戰爭看全球南方崛起", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "理吳芳銘近日英國政治哲學家約翰．格雷在英國《新政治家》發表〈美國帝國的終結〉，歐洲《現代外交》總編輯西迪基撰寫了〈伊朗戰爭揭示的五個殘酷真相〉，不約而同地指出了一個歷史轉折，美國對伊朗的戰爭，不只是軍事誤判，更顯示美國主導的國際秩序正在失去控制能力；與此同時，一個由能源通道瓶頸、區域國家脆弱性與全球南方角色上升所構成的新局面，正迫使國際政治回到更現實的權力競爭。帝國衰退的特徵，不一定表現為軍力不足，更常表現在即使軍力仍強，卻已無法把軍事...", "full_text": "理吳芳銘近日英國政治哲學家約翰．格雷在英國《新政治家》發表〈美國帝國的終結〉，歐洲《現代外交》總編輯西迪基撰寫了〈伊朗戰爭揭示的五個殘酷真相〉，不約而同地指出了一個歷史轉折，美國對伊朗的戰爭，不只是軍事誤判，更顯示美國主導的國際秩序正在失去控制能力；與此同時，一個由能源通道瓶頸、區域國家脆弱性與全球南方角色上升所構成的新局面，正迫使國際政治回到更現實的權力競爭。帝國衰退的特徵，不一定表現為軍力不足，更常表現在即使軍力仍強，卻已無法把軍事優勢有效轉化為政治成果。\n\n這正是〈美國帝國的終結〉一文想說的話，帝國不是在戰敗那一刻才崩解，而是在一次次看似強勢出手，最終卻留下更大混亂時開始失去正當性與威懾力。同時，兩篇文章也在不同層次上揭示著幾件事。第一，戰爭已從代理人戰爭升級為更直接的國家對抗；\n\n衝突升級的背後，代表舊有的戰略緩衝帶正在消失。第二，當戰爭走到這一步，停火便不再意味著和平，而只是下一輪部署之前的中場暫時休息，這使國際政治走向長期不穩定的狀態，即使戰爭暫停，危機也不會消失，和平也不再是穩定的常態。第三，這場戰爭也重新證明，全球化從未真正戰勝地理。\n\n不少國家與市場曾相信，供應鏈多元化、能源轉型與金融工具創新，足以稀釋戰略要衝的重要性，但當荷莫茲海峽出事，油價、航運、工業與農業原料立即全面受創，說明地理依然決定了命運，現代世界越高度互賴，反而越容易被少數地理瓶頸牽動制約。第四，美伊戰爭也清楚點出大國博弈的代價，往往由小國先承受，就像巴林、科威特、阿聯酋與卡達並沒有決定戰爭是否開打，卻因駐軍安排、能源設施與地理位置，瞬間成為前線。這使小國必須慎重思考，依附強權是否真的等於安全？\n\n還是只是把自己的生存更深地綁在別人的戰略選擇上？最後，這場戰爭或許最具歷史意味的變化，是全球南方角色的上升。巴基斯坦、中國、土耳其、埃及等國在外交斡旋中的角色，說明未來重大危機的談判桌，不再由美歐獨占，意味著美國霸權的衰退，不只是它自身犯錯的結果，也是因為世界已不再只接受單一中心來定義規則。\n\n美國或許仍將持續強大，但隨著全球南方正在從被影響者轉變為規則重整的參與者，這時，所謂的「美國帝國的終結」，未必意味美國立刻退場，而是再也無法像過去那樣，靠軍事與金融優勢便把世界拉回自己設計的軌道。從這個角度看，美伊戰爭不是一場孤立危機，而是一個時代轉身時發出的巨大聲響。"}, {"title": "《社論》由製造強國轉型為AI生態系核心", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "不同領域人工智慧（AI）應用，勢將為可見未來產業生產力成長的核心。主要以美國領軍的全球科技業，在2026年投資與人工智慧基礎設施預計將超過6,000億美元，就是明證。巨量的資本支出，幾乎保證半導體製造領先群穩坐獲利的贏家。", "full_text": "不同領域人工智慧（AI）應用，勢將為可見未來產業生產力成長的核心。主要以美國領軍的全球科技業，在2026年投資與人工智慧基礎設施預計將超過6,000億美元，就是明證。巨量的資本支出，幾乎保證半導體製造領先群穩坐獲利的贏家。\n\n「春江水暖鴨先知」，身處晶片產業浪尖的台積電與半導體工具機製造商艾司摩爾（ASML），於2 026年4月相繼上修財測，再度確認人工智慧投資仍強勁擴張。另外，資本市場所呈現的結構，也印證了人工智慧相關產業主導全球的經濟成長。2026年4月中世界排名前十大公司，有九家均與人工智慧直接相關。\n\n側身全球前十大公司的台積電，則以全球最先進製程的晶圓代工廠之姿，為其他企業巨擘供應鏈的核心。台灣雖然缺乏天然資源，但由於鏈結AI產業的發展，如今股市總市值已名列世界第七，超越許多已開發經濟體股市，成就難能可貴。隨著市場對高效能、低延遲晶片的依賴增速，進一步鞏固台灣在全球人工智慧價值鏈中的角色，不僅質變為製造重鎮，更躍升為算力供應鏈的基礎核心。\n\n也難怪2025年台灣經濟成長率創下破紀錄的8.7％，第四季成長率更是令人驚豔的兩位數，即使面對高基期，2026年台灣經濟成長率仍不看淡，相關產品出口暢旺為最重要的推手。而此高成長亦非一帆風順，多重且彼此影響的挑戰需以智慧來應對。首先資料中心與運算將大幅推升電力需求，加上台灣擅場的半導體製造本身即屬高耗能產業，若無法確保穩定且具競爭力的電力供應，將不利於產業發展。\n\n其次，半導體已成全球關鍵戰略資源，各國基於安全造成全球供應鏈重組，懷璧其罪的台灣，在國際地緣經濟風險上議題的轉圜空間愈來愈小，勢得基於生存做出抉擇。產業結構高度集中於半導體出口，雖帶來高經濟成長，但亦會放大景氣循環中對的衝擊；而無論是現有工作將被取代或是重新定義，技能轉型與人力資源升級成維繫競爭力的關鍵，對勞動市場乃至教育政策的影響不言可喻。\n\n在全球投資擴張的帶動下，半導體先進製程與高階封裝需求顯著提升，台灣在全球晶片供應鏈中的不可替代性與日俱增，結合基礎設施投資帶動伺服器、電源管理、散熱與網通設備需求，可形成具台灣綜效特色的可信賴供應鏈，提供原本處於外緣的企業，同搭這班提高附加價值市場的列車機會。隨應用層面服務商加速推動人工智慧平台化與商業化，若能結合既有製造優勢與產業數據基礎，發展智慧製造與智慧醫療等應用，將有助於提升整體產業附加價值並推動經濟結構升級。目前已有如谷歌（ Alphabet）相關國際企業，因相關產業生態的齊備、加上高素質人才而來台設點，此發展或可為未來產官界可攜手複製的重點方向。\n\n各國面對人工智慧產業帶來的機會，均由能源、產業與人才三大面向思考如何強化競爭力。雖台灣享受既有製造優勢，然亟需延伸至系統整合與應用服務，逐步化半導體單一產業的「世界冠軍」為「生態系夢幻聯隊」。是以政府應推動跨領域教育、在職訓練及國際人才引進，以應勞動市場升級轉型，此外也要在電網升級與多元能源加速布局，以將當前優勢轉化為永續且具韌性的國家競爭力。"}, {"title": "社論/外幣股利政策 推進金融市場現代化", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "priority": 0, "summary": "金管會於4月下旬宣布修正《華僑及外國人投資證券管理辦法》，開放上市櫃公司對外資股東發放以外幣計價的現金股利。這項被市場冠以「台積電條款」的新制，預計在第3季完成系統建置，並於明年配息季正式登場。此政策象徵台灣資本市場將由本幣中心轉向多幣別運作，不僅能務實提升市場效率，更是台灣金融市場與國際接軌的關鍵一步，反映出主管機關面對全球資本流動，願意從制度面減少摩擦成本的開放態度。", "full_text": "金管會於4月下旬宣布修正《華僑及外國人投資證券管理辦法》，開放上市櫃公司對外資股東發放以外幣計價的現金股利。這項被市場冠以「台積電條款」的新制，預計在第3季完成系統建置，並於明年配息季正式登場。此政策象徵台灣資本市場將由本幣中心轉向多幣別運作，不僅能務實提升市場效率，更是台灣金融市場與國際接軌的關鍵一步，反映出主管機關面對全球資本流動，願意從制度面減少摩擦成本的開放態度。\n\n外幣現金股利發放新制直接回應大型出口企業長久以來的痛點。過去，這些公司將美元營收換成新台幣發放股利，外資股東再將新台幣換回美元，雙重換匯操作徒然耗損手續費與匯差。消除這類無實質意義的交易成本，能讓外資以較低成本調動資金運用，符合金融監理的效率原則。\n\n從總體審慎監理角度來看，外資持股占台股市值近五成，每年夏季上市櫃公司除息旺季的集中換匯，往往對新台幣匯率造成季節性貶值壓力。未來新制改由公司直接以自有外幣支付，有助於穩定匯市波動，因此央行自然樂觀其成。多幣別股利發放符合倫敦、新加坡等國際金融中心慣例，有助於提升台股在國際股市的地位，進而吸引更多主權基金與退休基金進駐。\n\n新制雖追求行政效率，卻也觸及更深層的法理討論。台灣上市櫃公司募集的原始資金多為新台幣，如今依法形成的股東權益因身分別而得收受外幣現金股利，顯與新台幣的法償角色產生落差。政府權宜性質措施是否有法理支持，涉及貨幣主權在特殊經濟活動的界線與定義，因而成為學界關注焦點。\n\n妥善對待外資群體異質性，也是政府金融政策須考慮的問題。目前台灣吸引外資並未區分長期策略投資與短期套利熱錢。大型企業提供外幣現金股利，有助於外資對台灣股市進行長期策略性投資。\n\n但熱錢進出台灣市場與發放外幣現金股利較無直接關係，任何經濟風吹草動仍會使熱錢「湧進湧出」，對匯市造成壓力。外幣現金股利的「政策紅利」顯然應保留給支持產業發展的策略投資者，而非熱錢投機客。釐清外幣現金股利的稅務準則更是刻不容緩。\n\n政府相關部會尚未發布函令，規範外幣股利的扣繳匯率基準日、個人所得稅申報規則及二代健保補充保費的計費時點。公司以外幣支付股利，而稅法要求以新台幣計價，導致發放日與收匯日間的匯差歸屬爭議，不僅帶來財務規劃的不確定性，也可能影響稅負公平性。若企業現金股利仍以新台幣計算依法課稅，發放幣別則視外資投資時間另以章程訂定，如此不僅能鼓勵外資長期持有，也同時解決稅負公平性的困擾。\n\n外幣現金股利政策的效益分配可能出現不對稱問題。受益者高度集中於外資持股高的大型權值股；營收同樣來自出口卻缺乏外資青睞的中小企業，仍面臨雙重換匯困境。\n\n此外，上千萬台灣散戶投資人無法選擇外幣收息，形成「同股不同利」的對待落差。這種傾向外資投資大企業的「超國民待遇」，可能加劇資本市場的「馬太效應」，使資金向大型股票集中，長期弱化中小型股的流動性。政府推動金融國際化時，亦宜思考如何將金融便利惠及一般投資大眾，以落實普惠金融精神，照顧更多本國股東的權益。\n\n外幣股利新制展現了政府金融改革開放的決心。期許主管機關在執行股利新制初期能保持政策靈活性，積極補足稅務與法理配套，讓社會大眾能公平享有政策紅利；政府在追求資本市場效率的同時，要兼顧內外資公平對待與金融主權穩固。\n\n我們更期盼政府以此為起點，持續優化投資環境，讓台灣不僅擁有世界級產業，更能建立具備包容力與競爭力的現代化金融市場。"}, {"title": "社論》今年選舉的氣氛起風了嗎？", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "今年地方選舉，最受矚目的還是首都之戰，主要原因似乎在於，執政十年的民進黨舉棋不定。近日，沈伯洋「變髮」，竟成熱議話題，不知是否有譜了。而蔣公子，連任之路，藍營似乎不擔心。", "full_text": "今年地方選舉，最受矚目的還是首都之戰，主要原因似乎在於，執政十年的民進黨舉棋不定。近日，沈伯洋「變髮」，竟成熱議話題，不知是否有譜了。而蔣公子，連任之路，藍營似乎不擔心。\n\n看點在於，這次選舉他能否發揮溢出效果，從而為自己的更上層樓開出紅盤。另，新北一役，藍合白民調，小藍輸大藍，無人意外，問題是不聚焦市政，以反民進黨為主軸的藍白二打一穩贏嗎？藍白國會之亂兩年，加碼鄭麗文紅統路線，今年地方選舉正是檢驗。\n\n去年大罷免運動，雷聲大雨點小，親痛而仇快。一場輸贏雖難定勝負，但也不妨據以展望長期趨勢。二○二八年，看起來是兵家必爭之年，而二○二六年的結果或許是一隻風向雞。\n\n在此之前，今年選舉如何預測？國際，兩岸，形勢還在變化中，變數所在多有，光是伊朗戰爭便難定論。除了江湖郎中，沒人敢鐵口直斷。\n\n依台灣政治動態，年底地方選舉，看點仍是六都態勢，尤其是首都之役。各黨的超穩定選區，總是在期待後恢復平靜。小縣市的變化，縱有其象徵意義，但對大局影響有限。\n\n所以，誰勝誰負的判準，未必是誰贏的地方「多」，而是誰贏的地方「大」。因為，贏得的地方「大」，累積的政治能量也大，這對分析二○二八年大選，也比較具有決定性。處於民主躁動階段的台灣，似乎各種理論都不完美，跌破眼鏡的例子所在多有，用一次選舉結果預估下次選舉，被選民打臉的風險不小。\n\n二○一六年小英號啟航，二○一八年險遭韓流滅頂，二○二○年選民卻一八○度逆轉風向，至少韓院長記憶猶新。二○一四年柯文哲在北，二○一八年韓國瑜在高，都曾興起一陣旋風，帶動整體選情，重構藍綠版圖。可見，兩個南北首要之都，擁有特殊的可變性，只是量變到質變，需要天時、地利、人和。\n\n目前看來，今年的選舉，可能相對平淡。綜觀各黨截至目前為止的提名，似乎還看不到爆發型候選人。高雄市，賴瑞隆對陣柯志恩，正常情況下不易出現火花。\n\n台北市，蔣公子看好度高，但若出現非典型選戰，大衛甩石擊敗歌利亞，不是不可能的劇情。若就主觀因素而言，蔣公子較缺熱度，終究不比當年的柯、韓。故而，縱使連任無虞，恐難響起全國萬安演習的拉高層次，且看各黨領袖。\n\n賴清德如溫開水，鄭麗文像熱油。從蔡英文到賴清德，民進黨似乎走上另一個階段，超級明星傾向穩健型，政治感染力相對收斂，主要看民意的羊群效應。相反地，從韓國瑜到鄭麗文，國民黨終於出現非典型主帥，他們比較像周星馳而非周潤發，黨內都能感受到他們論述的無厘頭、超現實。\n\n這次，鄭麗文會發出不同的光芒嗎？她本人自信滿滿，不少同志惴惴不安。有人認為，二○二六也好，二○二八也好，鄭麗文可能是賴清德的貴人。\n\n這一點，且由未來的選票說明，民進黨沒有輕敵的本錢。對於鄭麗文挑戰，當然可在戰略上藐視，但務必在戰術上重視，韓流覆轍，殷鑑不遠。地方選舉在一般縣市，選民對候選人的接受度，可能還是地方議題優先。\n\n例外在於，六都選民視界，可能又高一些。如果說，小縣市選民比較在意當地建設民生，不少六都選民還會增加一種政治願景，那就是，他們的支持對象能否更上層樓，將來主掌中央部會，進而入主總統府。反過來說，這也影響政治人物的自我定位。\n\n把政治當「職業」者，大可選擇小縣市，容易永續經營家族企業。而把政治當「志業」者，必須蹲點累積能量之位，透過重量級拳賽，把自己塑造成全國性人物。尤其是六都市長，各政黨提名的候選人，若有入列國政梯隊潛力，那就可能令人眼睛一亮，因為這意味著他被送進牛棚暖身了，也令選民預知該黨的長期路線。\n\n話說回來蔣公子，這次黨內沒有對手，民調勝過盧秀燕，這意味他有「共主」地位了嗎？蔣公子，馬英九，郝龍斌，名門之後，相似度頗高。他們對「同屬一中、反獨促統」，猶抱琵琶半遮面。\n\n際此國共合作「新時代」，如此傳統型藍男，習近平「看不上」，鄭麗文「瞧不起」。內外交互作用，二○二六年的氣氛，還不知朝對誰有利的方向醞釀。講到選舉，終歸是頭家最重要。\n\n帶動全局，台北新北雙城記，中年萬安老四川，也不能太迷信黨旗飛舞。鄭麗文紅統路線，已成該黨的當下共業。須知，經濟成長迭創佳績，蔡、賴中央十年都怕頭家生膩了，努力學「習」的國民黨不怕市民思變嗎？"}, {"title": "社論/藍白合下一步，可借鏡以色列在野戰略", "source": "聯合報 A02 焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "新北市長選舉，藍白共推人選結果揭曉，由國民黨參選人李四川勝出，對決民進黨的蘇巧慧。特別的是，兩黨原本約定不公布民調，但民眾黨參選人黃國昌主動要求公布民調數字，以破解綠營內參民調的障眼法，並有風度地承諾全力輔選。這是繼嘉義市敲定由白營的張啓楷代表藍白出征後，又一個藍白整合成功的縣市；", "full_text": "新北市長選舉，藍白共推人選結果揭曉，由國民黨參選人李四川勝出，對決民進黨的蘇巧慧。特別的是，兩黨原本約定不公布民調，但民眾黨參選人黃國昌主動要求公布民調數字，以破解綠營內參民調的障眼法，並有風度地承諾全力輔選。這是繼嘉義市敲定由白營的張啓楷代表藍白出征後，又一個藍白整合成功的縣市；\n\n接下來，就剩宜蘭的吳宗憲與陳琬惠之爭，下周即可分曉。根據公布的兩份民調，李四川分別以五．五和十一．八的百分點領先蘇巧慧；黃國昌則以負三・二及正一・六百分點的比數，和蘇巧慧形成一勝一負的結局。\n\n這樣的結果，和稍早綠營民調聲稱蘇巧慧已經追平、甚至逆轉李四川的戰績，根本天差地別。甚至在某種情況下，黃國昌也有可能擊敗蘇巧慧，這和綠營近期拋出的風向球差異頗大，也是黃國昌主張公布民調的主因。無論如何，「共推候選人」只是藍白合的第一步。\n\n接下來，雙方能否說服並引導雙方支持者跟進，乃至兩黨能否提出更積極的戰略來深化合作縱深，在在都需要更開闊的視野及更縝密布局；否則，「藍白合」仍只是口號一句。合作如果只停在皮層，一旦綠營刻意製造事件撩撥分化，或者基層囿於利益歧見各自為政，藍白合就很難發揮「一加一等於二」或「大於二」的效果。\n\n李四川以豐富的黨政閱歷、腳踏實地的工程師性格，再加上略帶一點家鄉小琉球「土味」的形象，是近年政壇少見的怪客。在民眾厭倦政客的滑溜虛浮之際，如此老實木訥的人物，未必能創造太多話題和流量，卻更能贏得選民信賴。問題在，面對蘇貞昌、蘇巧慧父女的來勢洶洶及志在必得，「川伯」不能只停留在「老實」、「土味」、「會做事」這些基礎形象，必須擴大其「都市願景」的塑造能力，用自己的能力和見識來接軌新北四百多萬市民的期待，甚至和北基桃中合作攪起全台的「新政風雲」，那才是他個人參選能量的極大化。\n\n跨黨合作在台灣政治上並不是新鮮事，以前的「國親合」即是一例；民進黨在台北市長選擇支持柯文哲，也是一例。但這些合作都屬於「淺層」的策略合作，目的只為集中選票或形成棄保，使對手落敗。\n\n國親能合作，是因為同樣系出藍營；民進黨當年支持柯文哲，則是認為他屬於「泛綠」盟友，目的為扳倒藍營。如今的藍白合則是跨距較大的政黨合作，雙方曾在二○二四年有過一次不愉快的合作經驗，如今捲土重來，能避免重蹈昔日覆轍嗎？\n\n藍白兩黨不妨參考一下以色列在野黨的例子。以色列兩位前總理班奈特和拉皮德近日宣布，將各自領導的兩個政黨合併，組建成「團結黨」，目的是要在十月的大選共同拉下備受爭議的現任總理內唐亞胡。我們當然不是建議藍白合併，而是建議兩黨參考班奈特和拉皮德五年前的成功合作模式：當時班奈特的右翼政黨和拉皮德的中間政黨，聯合了多個左翼政黨組成跨黨派「改變聯盟」，成功終結了執政十二年的內唐亞胡政權，打破政府不穩定僵局。\n\n上次的聯合政府雖只維持了十八個月，卻成功凝聚了反內唐亞胡壟斷政權的民意；這次捲土重來，他們能不能再度把天怒人怨的內唐亞胡趕下台？民眾黨受柯文哲官司的拖累，目前正面臨保住戰果及開疆闢土的苦戰，此際選擇與藍營合作互補，自是明智之舉。\n\n對藍營亦然，除為這次選戰，還要放眼二○二八的大選。兩黨都必須站得更高，打更大的算盤，才會有更多的收穫。"}, {"title": "社論／莫用國安紅帽箝制人民言論", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "立法院內政委員會30日將排審《國家安全法》部分條文修正草案，其中，行政院版本擬對「鼓吹戰爭言論」增訂行政裁罰規定，引發社會高度質疑。民進黨立法院黨團表態力拚本會期完成初審，國民黨立法院黨團亦發出甲級動員令備戰。國家安全的紅線與言論自由的界限何在？", "full_text": "立法院內政委員會30日將排審《國家安全法》部分條文修正草案，其中，行政院版本擬對「鼓吹戰爭言論」增訂行政裁罰規定，引發社會高度質疑。民進黨立法院黨團表態力拚本會期完成初審，國民黨立法院黨團亦發出甲級動員令備戰。國家安全的紅線與言論自由的界限何在？\n\n再度引發爭論。國安法修法寒蟬效應賴清德總統去年主持國安高層會議，提及當前面對的五大國安及統戰威脅，並提出17項因應策略；行政院在同年底通過《國家安全法》、《陸海空軍刑法》、《陸海空軍軍官士官服役條例》、《國軍退除役官兵輔導條例》等4項修法草案。\n\n多位民進黨立委亦提出多項修法版本，包括應保護的祕密資訊從「公務上」，擴及「涉及國安或公共利益上」；主管機關應建立資安產品定期評估機制，並提出限制建議清單；另軍公教及公營機構人員犯國安相關之罪，經法院判處有期徒刑，即使只是一審有罪，尚未定讞，亦須停止領受退休給與等等。\n\n然而，本次修法最大爭議仍在於政院草案明定，任何人不得以文字、圖畫等公開鼓吹外國、大陸地區等對中華民國發動戰爭或採取非和平手段消滅中華民國主權。經內政部會商法務部、陸委會及相關機關認定違反規定者，將處10萬元以上、100萬元以下罰鍰。換言之，不經司法審判，即授權行政機關得自行認定何種言行構成違法並加以裁罰，無異於行政權的擴張。\n\n更關鍵的是何謂「公開鼓吹」？其認定標準何在？以民進黨的政治論述，接受九二共識一中原則，就等於放棄台灣主權，而放棄台灣主權所換來的和平，不是真的永續的和平。\n\n以此邏輯，呼籲接受九二共識者被貼上「中共同路人」、「代理人」標籤，倘若修法通過，勢必引發寒蟬效應，形同對異議言論的打壓。荒謬的是，當民進黨高喊「 抗中保台」，將對岸定義為敵對勢力，不斷稱戰火迫近，甚至提出攻台時間表，若依此修法邏輯，這種試圖動員社會恐懼、製造戰爭氛圍的政治操弄，是否也屬於「鼓吹戰爭」？如果裁罰標準掌握在政府手中，那就是「綠能，你不能」。\n\n此外，內政部次長馬士元日前在立法院公聽會上，直接將北京定位為法西斯納粹政權，指其對台除透過「輿論戰」、「心理戰」、「法律戰」外，還新增「錯位戰」、「侵蝕戰」，並點名敵方代理人在台灣「張牙舞爪」，強調此次修法目的是要提高敵人攻擊的成本，讓法律能威懾攻擊成本，這番話言之鑿鑿，卻拿不出實證，只是加劇社會對立。在野黨嚴審守護民主事實上，內政部已依職權及《兩岸人民關係條例》，將多名涉及武統言論的陸配網紅廢止入境許可並驅逐出境，陸委會亦主張非言論自由保障範圍。如今修法卻未正視台獨言論同樣可能被視為變相鼓吹戰爭、消滅中華民國主權，難怪被質疑選擇性執法，企圖藉由修法打壓政敵。\n\n回顧2022年民進黨政府推動《數位中介服務法》，引發侵害言論自由爭議而喊停。當時蔡英文總統強調，言論自由是《憲法》賦予人民的權利也是民主社會的基石，捍衛言論自由是民進黨堅定不移的立場。如今相關法規已隱身多項法條中的數位治理條款，現在又修法納入 《國安法》之中，使政府在面對不中聽、不想聽的言論時，擁有極大行政裁量權，令人憂心。\n\n多名法學專家示警，此次修法將「意圖危害國安」，調整為「足以生危害於國安」的抽象危險犯。簡單來說，只要行為具有造成危害的可能性就有構成犯罪之虞，無須有實際損害結果。此類立法雖有預防目的，但若缺乏嚴謹的主觀要件和客觀證據，法律將淪為當權者選擇性執法的工具。\n\n當前國際地緣政治丕變，面對中共軍力崛起，周邊國家與區域紛紛強化國防力量部署。我們亦認同應正視國家安全的重要性，並防範惡意滲透，但不能接受以國安之名擴權，特別是藉法律製造寒蟬效應、 羅織罪名。兩岸局勢兵凶戰危，任何引發戰事、甚至挑釁言行，應審慎以對。\n\n在野黨必須發揮監督功能，嚴格把關，設下清楚法律界限。倘若政府執意以「國安紅帽」箝制言論，最終被瓦解的不是敵人，而是台灣最引以為傲的民主根基。"}, {"title": "社論／世界看見中國強 台灣漠視失未來", "source": "中國時報 AA02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "大陸的巨變已不再只是數字上的增長，而是建設、科技、民生全面的躍升。高鐵縱橫、5G普及、光電與氫能引領世界，無人機與移動支付深入日常，影視娛樂、IP商品等文化軟實力，日益受到國際市場肯定，這些成就讓中國在全球舞台上展現出前所未有的力量。世界早已認知中國是強國，但台灣若仍停留在過去的舊夢，拒絕面對現實，只以抗中保台為口號，終將錯失未來的道路。", "full_text": "大陸的巨變已不再只是數字上的增長，而是建設、科技、民生全面的躍升。高鐵縱橫、5G普及、光電與氫能引領世界，無人機與移動支付深入日常，影視娛樂、IP商品等文化軟實力，日益受到國際市場肯定，這些成就讓中國在全球舞台上展現出前所未有的力量。世界早已認知中國是強國，但台灣若仍停留在過去的舊夢，拒絕面對現實，只以抗中保台為口號，終將錯失未來的道路。\n\n晉升強國世界共識自改革開放以來，中國透過市場化改革與政策扶持，逐步構建起完整的產業鏈與堅實的基礎設施體系。政府在降低准入門檻、推動外資開放、健全產權保障與信用制度的過程中，營造公平透明的競爭環境，使民營與國企能在創新中並肩成長。14億人口所形成的龐大內需市場與消費升級，進一步提供持續拉力。\n\n制度推力與市場拉力相互交織，形成強勁的「雙引擎」效應，推動中國企業在全球競爭中不斷壯大，展現出制度設計與市場規模的深厚效能。過去10年中國建設、科學與民生發展突飛猛進。從基礎設施到高科技產業，從能源轉型到社會生活改善，展現全面躍升的強國姿態。\n\n高鐵里程超過全球總量的三分之二，5G 基站遍布鄉村，光電板與動力電池技術引領世界，綠氫產能占全球50％以上，顛覆了世界能源格局。這些成就不僅是數字上的「世界第一」，更是制度設計、政策扶持、技術突破與產業鏈協同的綜合成果。無人機進入農業、物流、救援等多元場景，移動支付普及率高達86％，讓數億人首次享受現代金融服務。\n\n這些進步背後，折射出中國在科技創新、產業升級與社會治理上的深厚實力，也讓民生改善不再只是口號，而是日常的生活。更重要的是，中國的進步已經不再只是「中國的事」，而是世界的共識。國際社會早已認知中國是強國：在通信標準制定中，中國企業提交的專利占全球4成以上；\n\n在基建輸出上，中國高鐵、電網、鋼鐵技術成為發展中國家提升水準的重要支撐；在文化產業上，《流浪地球》與《三體》走向國際，科幻產業的興起成為科技硬實力的文化延伸。這些現象表明，中國的影響力已經滲透到全球產業鏈、技術標準、文化交流的方方面面。\n\n世界看待中國，不再是「崛起中的大國」，而是「已然成型的強國」。對陸偏見故步自封不過，快速崛起伴隨結構性壓力與不確定性，包括人口老化加速、地方財政負擔沉重、房地產調整尚未落底，以及科技發展在地緣政治競逐下所面臨的外部限制。成長並非沒有代價，亦存在波動與風險。\n\n對台灣而言，理性的態度不是全盤否定，也不是盲目追隨，而是在理解其優勢與限制的基礎上，建立具備彈性與韌性的策略選擇。然而，台灣的認知卻停留在全球金融危機前的舊框架，依然以為中國只是廉價製造、低端代工的代名詞。這種錯誤的認知，導致台灣在面對中國的進步時，選擇以「抗中保台」作為政治口號，卻忽略了現實的結構性變化。\n\n當中國在新能源、人工智慧、半導體、基建、文化產業上全面躍升，台灣卻用過去的眼光看待，無異於閉眼走路，終將撞上牆壁。抗中保台若只是拒絕承認中國的進步，拒絕面對世界已經形成的共識，那麼這條道路必然是死路一條。台灣需要的是清醒的認識與務實的策略。\n\n首先，要承認中國的進步是真實存在的，並且已經改變了全球格局。其次，要理解這些進步對台灣的挑戰與機遇。若能正視這些變化，便能在技術交流、產業合作、文化互動中找到新的定位。\n\n「抗拒」不僅會錯失機會，更會在國際競爭中逐漸邊緣化。認清現實、承認變化、政策務實，台灣才能在新一輪全球格局重組中，保有生存與發展的空間。"}];
const DEPTS = {"社論與評論觀點": {"icon": "📝", "short": "社論"}, "國際經濟情勢": {"icon": "🌐", "short": "國際"}, "台灣總體經濟與數據": {"icon": "📊", "short": "總經"}, "台灣產業與投資動向": {"icon": "🏭", "short": "產業"}, "台灣政府與政策訊息": {"icon": "🏛️", "short": "政策"}};
const CAT_ORDER = ["社論與評論觀點", "國際經濟情勢", "台灣總體經濟與數據", "台灣產業與投資動向", "台灣政府與政策訊息"];

(function() {
  const now = new Date();
  const roc = now.getFullYear() - 1911;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('util-date').textContent = 
    `民國${roc}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
