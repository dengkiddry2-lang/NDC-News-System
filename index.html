<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #d0011b; --black: #111111; --dark: #1a1a1a;
  --g1: #333; --g2: #555; --g3: #777; --g4: #999; --g5: #bbb; --g6: #ddd; --g7: #eeeeee; --g8: #f5f5f5;
  --white: #ffffff; --mustbg: #fff8f8;
  --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif; --wrap: 1160px;
}
body { background: var(--g8); font-family: var(--sans); color: var(--dark); line-height: 1.6; }
#utility-bar { background: var(--black); border-bottom: 2px solid var(--red); }
.util-inner { max-width: var(--wrap); margin: 0 auto; padding: 5px 20px; display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.5); }
#masthead { background: var(--white); border-bottom: 3px solid var(--black); }
.masthead-inner { max-width: var(--wrap); margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
.logo-main { font-family: var(--serif); font-size: 38px; font-weight: 900; color: var(--red); }
.logo-cn { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--black); }
.masthead-stats { display: flex; align-items: center; text-align: center; }
.stat-item { padding: 0 15px; }
.stat-num { font-family: var(--serif); font-size: 24px; font-weight: 700; }
.stat-num.red { color: var(--red); }
.stat-label { font-size: 10px; color: var(--g4); }
#section-nav { background: var(--white); border-bottom: 1px solid var(--g6); position: sticky; top: 0; z-index: 99; }
.section-nav-inner { max-width: var(--wrap); margin: 0 auto; display: flex; overflow-x: auto; }
.nav-btn { padding: 12px 15px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--g3); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; }
.nav-btn.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }
.ticker-bar { background: var(--black); display: flex; height: 32px; align-items: center; overflow: hidden; }
.ticker-tag { background: var(--red); color: white; font-size: 11px; padding: 0 10px; height: 100%; display: flex; align-items: center; }
.ticker-track { display: flex; white-space: nowrap; animation: scroll 40s linear infinite; }
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.t-item { color: rgba(255,255,255,.8); font-size: 12px; padding: 0 10px; cursor: pointer; }
.layout-wrapper { max-width: var(--wrap); margin: 20px auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 0 20px; }
.top-story { background: var(--white); padding: 25px; border: 1px solid var(--g6); cursor: pointer; position: relative; }
.ts-red-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--red); }
.ts-black-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--black); }
.ts-title { font-family: var(--serif); font-size: 24px; margin: 10px 0; }
.ts-summary { font-size: 14px; color: var(--g2); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.sub-header { font-size: 12px; font-weight: 700; color: var(--g4); margin: 15px 0 5px; }
.sub-list { background: var(--white); border: 1px solid var(--g6); }
.sub-row { display: flex; border-bottom: 1px solid #eee; cursor: pointer; padding: 10px; }
.sub-num { width: 25px; color: var(--g5); font-weight: 700; }
.sub-dot-red::after { content: '●'; color: var(--red); font-size: 10px; padding-right: 10px; }
.sub-title { font-size: 14px; font-weight: 600; font-family: var(--serif); }
.sidebar-block { background: var(--white); border: 1px solid var(--g6); border-top: 3px solid var(--black); margin-bottom: 20px; }
.sb-header { padding: 8px 12px; background: var(--g8); border-bottom: 1px solid var(--g6); }
.sb-title { font-size: 13px; font-weight: 700; }
.must-item { padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; }
.mi-title { font-size: 13px; font-family: var(--serif); font-weight: 600; }
.cat-section { margin: 40px auto; max-width: var(--wrap); padding: 0 20px; }
.cs-header { display: flex; align-items: center; border-bottom: 2px solid var(--black); padding-bottom: 5px; }
.cs-title { font-family: var(--serif); font-size: 18px; font-weight: 700; flex: 1; }
.cs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--g6); border: 1px solid var(--g6); }
.cs-card { background: var(--white); padding: 15px; cursor: pointer; }
.cs-lead { grid-column: 1 / -1; }
.cs-card-title { font-family: var(--serif); font-size: 15px; font-weight: 600; }
.sub-nav { background: var(--white); padding: 10px 20px; border-bottom: 1px solid var(--g6); position: sticky; top: 0; display: flex; align-items: center; }
.article-wrapper { max-width: 700px; margin: 40px auto; padding: 0 20px; }
.art-title { font-family: var(--serif); font-size: 28px; line-height: 1.4; margin-bottom: 20px; }
.art-body p { margin-bottom: 20px; font-size: 17px; font-family: var(--serif); }

</style>
</head>

產業高階轉型，更鞏固台灣在全球半導體無可取代領先地位，瑞昱的晶片不僅讓台灣連結國際，也讓科技發展更加迅速。\n\n他說，總統創新獎設立精神是要以多元創新回應時代挑戰、開創國家未來，不僅要表揚新方法、新突破，更要彰顯台灣人廣闊視野，及不怕困難與考驗的勇敢精神，成為創新新典範。"}, {"title": "卓揆：台股對標國際 隨時檢討改進", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股的交易制度如何改革備受關注，行政院長卓榮泰28日率行政團隊在立法院備質詢時確認，台股要對標效仿國際級市場，隨時檢討改進項目。針對外界關注台股零股交易改善，甚至對齊美股1股單位，金管會主委彭金隆也釋出最新方針。藍委在立法院質詢時，對卓榮泰、彭金隆等行政團隊進行提問，行政團隊數度表示，當前台股規模已是全球第七大，自然要學習、效仿國際級交易市場的模式。", "full_text": "台股的交易制度如何改革備受關注，行政院長卓榮泰28日率行政團隊在立法院備質詢時確認，台股要對標效仿國際級市場，隨時檢討改進項目。針對外界關注台股零股交易改善，甚至對齊美股1股單位，金管會主委彭金隆也釋出最新方針。藍委在立法院質詢時，對卓榮泰、彭金隆等行政團隊進行提問，行政團隊數度表示，當前台股規模已是全球第七大，自然要學習、效仿國際級交易市場的模式。\n\n零股交易模式的改善，是台股邁向國際級資本市場過程中，隨時要檢討的項目。全球資金前進台、韓等半導體強國，帶動台股本月市值在全球「坐七望六」，直追加拿大股市。在股市吸引全球資金、個股價位飆漲的背景下，台股後續要怎麼對齊國際趨勢、留住資金，以及保障交易零股的投資人，成為行政團隊一大課題。\n\n彭金隆表示，台股已是全球第六、七大股市，現有不少個股破千、 萬元，零股金額也不小，因此正逐步改善零股交易時間、提升撮合效率避免價差，要盡量對標整股，以公平投資人。他強調，正向推進改善零股交易模式，這方面可行性較高。不過與全面將現行千股改成一股交易不同，這涉及較多問題，還要持續研議，整體股市政策除考量投資人，也要顧及券商交易所等中介人。\n\n對零股融資等信用交易與當沖，彭金隆說，過去這方面金額小、需求不大，但基於現台股規模與個股價位，已責成兩個交易所研議。金管會並沒有否定零股信用交易方案，這本來就是台股邁向國際級資本市場，隨時要檢討的項目，對所有制度都持開放態度。"}, {"title": "植田面臨上任來最大分歧！ 日銀不升息 立場卻轉鷹", "source": "工商時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "日本央行（BOJ）28日一如預期宣布基準利率維持不變，連續三度按兵不動。但本次表決反對票增至3票，是總裁植田和男上任以來最大分歧，鷹派聲浪增強之下，市場預期6月升息的機率大增。日銀同時發布的季度展望報告，2026財年核心通膨率中值，由2.2 ％上調至2.6％；", "full_text": "日本央行（BOJ）28日一如預期宣布基準利率維持不變，連續三度按兵不動。但本次表決反對票增至3票，是總裁植田和男上任以來最大分歧，鷹派聲浪增強之下，市場預期6月升息的機率大增。日銀同時發布的季度展望報告，2026財年核心通膨率中值，由2.2 ％上調至2.6％；\n\n2027財年和2028財年核心通膨率也同步上修。2026 財年實質GDP成長率預測腰斬，自1％下修至0.5％。在最新政策聲明公布之後，日圓一度走強至158兌1美元，但日銀總裁植田和男在會後記者會上雖釋出鷹派訊號，卻未提出明確升息時間表，日圓反轉貶至159價位。\n\n日銀周二宣布短期政策利率續留在0.75％，出人意料的是，以6比 3表決結果通過，相較3月會議的8比1，反對票多出2張。這係植田總裁上任以來，內部立場最分歧的一次；也是自2016年1月之後，出現最多異議票，當年以5比4的些微差距，通過實施負利率。\n\n日銀審議委員田村直樹與中川順子，本次加入高田創的行列，主張升息1碼至1％。道富投資管理資深固定收益策略師Masahiko Loo表示：「日銀今日展現『鷹派按兵不動』（hawkishhold），9人委員會的反對票增至 3票，應看成是與控制通膨同等重要的貨幣保衛戰，意味日銀對日圓貶值加劇的忍受度愈來愈低。」 隔夜指數交換利率（OIS）顯示，日銀6月前升息的機率，已從日銀決策公布前的62％上升至66％。\n\n據路透調查，受訪經濟學家有近三分之二預期，6月底前日銀會將基準利率升至1％。日銀並發布2026財年核心通膨率中值上調至2.6％，2027財年和20 28財年核心通膨率同步上修。2026財年實質GDP成長率下修至0.5％。\n\n日銀在政策聲明提到，若中東局勢持續緊張，恐導致油價居高不下，進而引發供應鏈中斷，日本經濟展望將面臨下行風險，通膨有上行隱憂。日銀也將政策指引微調，以便未來在升息時間點上保有更大彈性，強調「鑑於基礎通膨率已接近2％，且實質利率處於低檔，日銀將依據經濟、物價及金融環境的發展，繼續調升政策利率。」"}, {"title": "百億美元算力採購恐生變 AI巨頭營收增速不如預期，廣達、緯創等警戒 OpenAI拉警報 牽動台鏈", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "生成式AI巨頭OpenAI傳出營收成長速度不如預期，並示警若狀況延續，恐難履行原訂龐大的AI資料中心建置採購合約。這意味OpenAI先前承諾的上百億美元算力採購合約可能生變，牽動廣達、緯創等主要協力廠後續訂單。相關消息傳出後，再度引發市場對科技公司 AI 產業高資本支出前景的擔憂，與 OpenAI 相關的公司股價聞訊重挫，其中，軟銀在日股股價28日收盤暴跌9.8%；", "full_text": "生成式AI巨頭OpenAI傳出營收成長速度不如預期，並示警若狀況延續，恐難履行原訂龐大的AI資料中心建置採購合約。這意味OpenAI先前承諾的上百億美元算力採購合約可能生變，牽動廣達、緯創等主要協力廠後續訂單。相關消息傳出後，再度引發市場對科技公司 AI 產業高資本支出前景的擔憂，與 OpenAI 相關的公司股價聞訊重挫，其中，軟銀在日股股價28日收盤暴跌9.8%；\n\nCoreweave、甲骨文、超微在28日美股早盤都跌逾4%。市場正高度關注是否有跡象表明，科技公司能否維持此前宣布的高額資本支出計畫。Energy Group Capital研究主管里昂斯說：「市場需要看到這一點，才能維持當前的AI敘事。」 美國財經媒體引述知情人士說法指出，隨著競爭同業Anthropic在程式設計與企業市場取得進展，加上Google的Gemini人氣上升等因素，讓ChatGPT面臨訂閱用戶退訂挑戰。OpenAI今年來已有數月銷售未能達標。此外，OpenAI的聊天機器人ChatGPT截至2025年底，未能達到每周活躍用戶10億人的目標。\n\n外媒報導指出，OpenAI財務長佛萊爾（Sarah Friar）在與公司其他高層主管的談話中表達相關憂慮，擔心如果OpenAI無法迅速提升營收，可能無法負擔未來的運算合約費用。知情人士表示，OpenAI 董事會近幾個月也加強審視公司的資料中心交易，並質疑執行長奧特曼在業務放緩之際，仍試圖取得更多運算資源的做法。對此，奧特曼與佛萊爾在聯合聲明中說：「我們在購買盡可能多的運算資源上完全一致，並每天共同努力。」兩人說，任何認為兩人意見分歧或正在縮減取得新運算資源的說法都是「荒謬的」。業界認為，OpenAI當前AI伺服器採購供應鏈中，主要由鴻海、廣達、緯創等ODM大廠分食訂單，且當前OpenAI還計畫向亞馬遜AWS、Google雲端等雲端服務大廠（CSP）採購AI算力，藉此分散原先僅向微軟Azure採購的風險，一旦OpenAI採購計畫生變，影響甚大。"}, {"title": "積情過後… 台股上演土洋對做戲碼", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "台股昨（28）日土洋對戰，二度上攻4萬點未果；在外資大賣392.9億元下，雖有投信、自營商等內資買超，仍不敵外資賣出台積電，使指數開高拉高後走低翻黑，終場下跌94點收39,521點。法人指出，台股短線漲多，與月線的乖離率已超過10%創新高，短線恐有修正空間。", "full_text": "台股昨（28）日土洋對戰，二度上攻4萬點未果；在外資大賣392.9億元下，雖有投信、自營商等內資買超，仍不敵外資賣出台積電，使指數開高拉高後走低翻黑，終場下跌94點收39,521點。法人指出，台股短線漲多，與月線的乖離率已超過10%創新高，短線恐有修正空間。\n\n不過，台股基本面看好，漲多適度修正換手，有利後續走勢。預期台股整理後，仍可站上4萬點整數大關，並向43,000點進擊。儘管昨日早盤在台積電、聯發科、鴻海等指標權值股領軍攻堅下，加權指數一度大漲 484 點，最高達 40,101 點，但隨外資大賣台積電495億元，壓低股價，跌50元收2,215元，使指數尾盤翻黑，終場小跌0.2%，成交量萎縮至1.05兆元。\n\n台股「積」情過後，千金股漲跌互見，新代、倍利科、宜鼎、高力等亮燈漲停最強勢，股后穎崴漲逾半根停板收10,135元，重回萬元大關；台光電大跌7.5%最疲軟，其他如世芯-KY、台積電、金像電、雙鴻等也都跌逾2%，整體檔數則維持45檔不變。三大法人昨賣超台股 333 億元。\n\n其中外資賣超 392.9 億元，連二賣，累計賣超 904.9 億元；投信買超 56.4 億元，連六買，累計買超354.8億元；自營商轉賣為買，買超3.5億元。\n\n八大公股行庫則買超29.7億元。綜合凱基投顧董事長朱晏民、富邦投顧董事長陳奕光、台新投顧總經理黃文清等指出，昨日台股早盤開高，不過短線正乖離已大，加上日KD指標出現背離，使市場賣壓湧現，行情震盪拉回收小黑。展望後市，昨日指數拉回平盤附近後，量能快速獲得控制，且收盤點位仍守穩短期均線，因此暫時以技術性修正看待，只要27日跳空缺口下緣38,989點沒有失守，仍將維持指數震盪偏多看法。\n\n在投資布局方面，對短線漲幅過大個股，建議不宜追高，可持續關注半導體多頭題材產業，如設備、先進封裝及記憶體等，可伺機偏多操作；而高股息殖利率族群，因時序步入股東會與除權息旺季，也可多加留意。"}, {"title": "大師論壇5/12登場 富邦金首席經濟學家觀察，台灣已具算力優勢，應提高創新力，保持領先地位 羅瑋：AI落地醫療生技領域", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 1, "summary": "美伊衝突2月28日爆發後，隨著很大一部分石油和天然氣供應中斷，恐將導致通貨膨脹攀升與全球成長放緩。而近幾年台灣半導體產業受惠AI趨勢崛起，展望未來，富邦金控首席經濟學家羅瑋指出，台灣目前已在算力具有優勢，若能提高創新力，將AI落地到醫療及生技等領域，就有機會保持領先地位。經濟日報、兆豐金控將於5月12日共同主辦「2026大師論壇」，邀請2025年諾貝爾經濟學獎得主郝伊特（Peter Howitt）來台，他將以「創造性破壞與經濟成長」為題...", "full_text": "美伊衝突2月28日爆發後，隨著很大一部分石油和天然氣供應中斷，恐將導致通貨膨脹攀升與全球成長放緩。而近幾年台灣半導體產業受惠AI趨勢崛起，展望未來，富邦金控首席經濟學家羅瑋指出，台灣目前已在算力具有優勢，若能提高創新力，將AI落地到醫療及生技等領域，就有機會保持領先地位。經濟日報、兆豐金控將於5月12日共同主辦「2026大師論壇」，邀請2025年諾貝爾經濟學獎得主郝伊特（Peter Howitt）來台，他將以「創造性破壞與經濟成長」為題發表演講，並與國內專家座談，座談主題是「台灣創新經濟的未來」，羅瑋是與談人之一。\n\n本論壇由台新新光金控、富邦金控、富蘭克林華美投信、亞洲大學協辦。羅瑋分析，今年有五大事件值得關注，第一，若美伊戰爭能在4月底、5月初告一段落，對全球經濟影響相對較小，若變成延長戰，油價居高不下，屆時供應鏈韌性會受到影響。當全球經濟明顯放慢，對台灣出口亦會有影響，目前預估這些衝擊會在今年第4季浮現。\n\n第二，當戰爭告一段落，美國總統川普的注意力又會重新回到對等關稅談判，尤其台美貿易順差大幅增加，被美列入第一波啟動「301條款」調查的16個主要貿易夥伴名單，與60國強迫勞動產品調查清單上，要格外小心。第三，因能源價格上漲，各國通膨蠢蠢欲動，像是日本、歐洲央行等貨幣政策，市場原本預期今年維持不變，如今可能出現調整，而美國聯準會主席提名人華許在聽證會上表示，將捍衛聯準會獨立性，也值得後續關注。第四，人工智慧AI的發展，今年2月市場掀起一波AI會取代人類工作的恐慌，人們擔心不少產業會受到AI衝擊，當AI的正面跟負面效應同時浮現，哪一方會強勢影響經濟，值得留意。\n\n第五，美國太空探索科技公司（SpaceX）、OpenAI與Anthropic三家巨頭，預計今年首次公開發行（IPO），屆時將牽動金融市場資金流動，造成金融市場動盪。羅瑋也提到，AI發展有三個階段：算力、電力與場景應用，台灣若要持續在世界占有一席之地，除了已經吃到的算力紅利外，也要加緊開發新能源以及提高創新力，將AI落地到醫療及生技等領域。"}, {"title": "貿易署修法 檢舉洗產地改發獎金 可領罰鍰2成、一年上限180萬", "source": "自由時報 A01 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 1, "summary": "為打擊「洗產地」，經濟部昨預告修正「出進口人產地標示不實案件檢舉處理及獎勵辦法」，將原本僅發放獎狀或獎座，改為發放現金獎勵，檢舉人最高可分得實收罰鍰二十％，一年上限一八○萬元，同時新增檢舉人保護機制，提升民眾檢舉意願。經濟部貿易署表示，過去對檢舉人多以精神性獎勵為主，但部分業者透過更換標示、重新包裝或簡單加工等，將進口貨品偽標為「台灣製」再出口等洗產地行為，為擴大查處違規，以獎勵機制提高檢舉誘因。根據草案，檢舉經查證屬實且處分確定者，依...", "full_text": "為打擊「洗產地」，經濟部昨預告修正「出進口人產地標示不實案件檢舉處理及獎勵辦法」，將原本僅發放獎狀或獎座，改為發放現金獎勵，檢舉人最高可分得實收罰鍰二十％，一年上限一八○萬元，同時新增檢舉人保護機制，提升民眾檢舉意願。經濟部貿易署表示，過去對檢舉人多以精神性獎勵為主，但部分業者透過更換標示、重新包裝或簡單加工等，將進口貨品偽標為「台灣製」再出口等洗產地行為，為擴大查處違規，以獎勵機制提高檢舉誘因。根據草案，檢舉經查證屬實且處分確定者，依實收罰鍰二十％發給檢舉人獎金。\n\n檢舉人同年度領取的檢舉獎金總額，不得超過一八○萬元；同一案件二人以上聯名檢舉者，獎金平均發給。新制強化檢舉人保護機制，明定檢舉人的檢舉資料以密件保存，並禁止第三人閱覽或抄錄，以保障檢舉人權益。\n\n透過「獎金、保護」並進，可提升民眾檢舉意願，也對違規業者有更具威嚇力的監督網絡。"}, {"title": "藍白合民調出爐 新北市長 李四川對決蘇巧慧", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "藍白兩黨新北市長民調昨天公佈，由國民黨參選人李四川勝出，將對決民進黨參選人蘇巧慧。李四川說，民調勝出就是責任的開始，他誠惶誠恐，必須全力以赴。被問到是否延攬民眾黨主席黃國昌加入競選團隊？", "full_text": "藍白兩黨新北市長民調昨天公佈，由國民黨參選人李四川勝出，將對決民進黨參選人蘇巧慧。李四川說，民調勝出就是責任的開始，他誠惶誠恐，必須全力以赴。被問到是否延攬民眾黨主席黃國昌加入競選團隊？\n\n李表示，黃一定是他最好的戰友，假設他當選，人才一定是共治。蘇大方祝賀：會爭取為市民做事機會蘇巧慧表示，非常恭喜對方初選圓滿順利，她會繼續與有活力、有創意又有執行力的團隊，爭取為新北市民做更多事的機會。黃國昌說，恭喜川伯，他將全力輔選。\n\n新北市長侯友宜說，對李四川有信心，會全力輔選。國、眾兩黨公布兩家民調結果的數據，李四川對蘇巧慧分別為卅四％比廿八．五％、卅六．三％比廿四．五％，李均勝蘇。黃國昌對蘇巧慧則是廿八．一％比卅一．三％、廿八．三％比廿六．七％。\n\n綜合結果，由李四川勝出征戰新北市長。國民黨、民眾黨三月簽訂政黨合作協議，新北市長民調採對比式，手機、市話「三七分」，各佔三六○通、八四○通，昨公布結果。李允諾人才共治黃國昌喊全力輔選李四川表示，「國昌主席一定是我最好的戰友」，假設年底他當選，對於民眾黨所有的人才，他一定是人才共治，而且會努力來延攬。\n\n李四川強調，民調勝出就是責任的開始，他誠惶誠恐，必須全力以赴。感謝黃國昌為了大局，展現出一個政黨的領袖的氣質，他由衷的敬佩，會全力來落實藍白兩黨間的協議合作。"}, {"title": "1分之差 新光三越拿下北車商場經營權 微風廣場質疑評選程序將提異議", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "四鐵共構的台北車站每天疏運約六十萬人次，北車商場年營業額高達四十億，周邊更有多件重大開發案，商機滿滿。微風集團經營台北車站商場七月到期，八家業者搶標，昨天台鐵公告新光三越奪下經營權，微風廣場則是以一分之差落為次優申請人；微風廣場不服，將提出異議。", "full_text": "四鐵共構的台北車站每天疏運約六十萬人次，北車商場年營業額高達四十億，周邊更有多件重大開發案，商機滿滿。微風集團經營台北車站商場七月到期，八家業者搶標，昨天台鐵公告新光三越奪下經營權，微風廣場則是以一分之差落為次優申請人；微風廣場不服，將提出異議。\n\n年商機逾40億 8家通過審查業者搶標目前台北車站商場由微風經營，合約將在今年七月廿四日到期，台鐵公司今年一月十五日公告招商、三月廿日投標截止。契約期間十五年，可優先續約八年，投資金額不低於新台幣七．六五億元。台鐵預估，北車商場年營業額達四十億元，未來希望超過五十億元。\n\n這次招商吸引九家業者投標，通過資格審查為微風廣場、新光三越、統一集團、澎坊、台灣捷爾東商業開發環球購物中心合作聯盟（JR 東日本）、潤泰、新東陽、誠品等八業者。台鐵公司四月廿二日召開「台北車站大樓 G+2、G+1、U-1層增建、改建、修建及營運移轉案」甄審委員會，九名委員中有一名未出席，八家業者進行簡報及現場甄審委員詢答後，採序位法評比，序位合計值越低越優，其中新光三越序位合計值廿三，為最優申請人。至於序位合計值次低則是得到廿四分的微風廣場及JR東日本，相比之下微風廣場得到較多序位一，因此被評定為次優申請人，也就是說微風廣場以一分之差落榜。\n\n微風不滿消息走漏評委資格也有疑義微風廣場不滿開標結果將提出異議。微風廣場指出，評選結果於正式公告前即在市場流通，恐影響資訊一致性與程序公正性；另評審委員資格適格性及利益迴避程序是否確實依規範執行，有待主管機關說明。"}, {"title": "畏罪泅泳偷渡中國 金門前警員發監前夕 「潛」逃被逮", "source": "自由時報 A01 焦點新聞", "cat": "國際經濟情勢", "priority": 1, "summary": "金門前警員盧崢因案發監執行前夕，竟帶著浮潛設備及手持式推進器，企圖以泅泳方式，從金門烈嶼鄉貴山海域畏罪「潛」逃至中國，被海巡署監偵科技設備全程鎖定就逮。金門地檢署表示，盧男企圖泅泳偷渡出境，顯有逃亡規避審判及執行事實，地檢署接獲通報，立即將盧男拘提到案，訊問後於昨發監執行。海巡署監偵科技設備全程鎖定逮人海巡署金門巡防區表示，二十六日晚間十一點左右，對海面動態目標實施監控，在烈嶼鄉貴山海域偵獲疑似有不明人士泅泳。", "full_text": "金門前警員盧崢因案發監執行前夕，竟帶著浮潛設備及手持式推進器，企圖以泅泳方式，從金門烈嶼鄉貴山海域畏罪「潛」逃至中國，被海巡署監偵科技設備全程鎖定就逮。金門地檢署表示，盧男企圖泅泳偷渡出境，顯有逃亡規避審判及執行事實，地檢署接獲通報，立即將盧男拘提到案，訊問後於昨發監執行。海巡署監偵科技設備全程鎖定逮人海巡署金門巡防區表示，二十六日晚間十一點左右，對海面動態目標實施監控，在烈嶼鄉貴山海域偵獲疑似有不明人士泅泳。\n\n立即指揮岸巡隊及巡防艇，進行岸、海聯合搜查圍捕；大約在二十七日凌晨○點五分，巡防艇在貴山西北方○．八浬（禁止水域線內○．六浬）截獲本國籍男子盧崢，以手持式推進器企圖利用浮潛設備自金門岸際準備泅渡到中國，立即將其逮捕並帶回調查，報請金門地檢署偵辦。金門地檢署指出，盧男除因詐欺案被金門地方法院判決有期徒刑七年六月，目前上訴二審中，他另有違反個人資料保護法案件被判刑確定，四月廿八日將先發監執行，未料，盧男畏罪偷渡，顯有逃亡規避審判及執行的事實。\n\n地檢署接獲海巡署通報，為免盧男趁隙脫逃，隨即依刑事訴訟法核發拘票，交由海巡將盧男拘提到案，發監執行。盧崢曾是金門縣警局金城分局金城派出所警員，因涉及竊盜、詐欺及違反個資法等案件於二○二五年三月請辭，縣警局今年三月因盧員違反個資法定讞，依法將盧免職。"}, {"title": "雲林憂「滅農」 美花生將零關稅進口 農業部長：以價值戰取代價格戰", "source": "聯合報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "根據台美對等貿易協定（ＡＲＴ），美國花生將可零關稅進口，花生農憂心可能大舉入侵。農業部長陳駿季昨天說，我國花生進口大多來自印度、巴西及阿根廷，美國花生同樣要跟這些對手競爭，國內也應該趁此機會進行產業轉型，農業部一定會支持農民與產業。雲林產量近九成縣長批簡直噩耗雲林縣去年種植花生面積一點一萬餘公頃，產量占全台近九成。", "full_text": "根據台美對等貿易協定（ＡＲＴ），美國花生將可零關稅進口，花生農憂心可能大舉入侵。農業部長陳駿季昨天說，我國花生進口大多來自印度、巴西及阿根廷，美國花生同樣要跟這些對手競爭，國內也應該趁此機會進行產業轉型，農業部一定會支持農民與產業。雲林產量近九成縣長批簡直噩耗雲林縣去年種植花生面積一點一萬餘公頃，產量占全台近九成。\n\n縣長張麗善說，聽到美國花生將零關稅、豁免特別防衛條款（ＳＳＧ）進口，簡直是噩耗，國家犧牲農民權益形同「滅農」，消費者如何區分進口或國產？農業部次長胡忠一曾任農糧署長，應了解農民辛勞，卻說要輔導農民轉作，內行人說外行話，根本頭痛醫頭、腳痛醫腳。張麗善認為，政府不該將輔導農民轉作當成解方，產業理應均衡和多元，不可能把市場集中單一品項，否則可能出現產銷失衡；\n\n她再三呼籲，對美談判過程不能犧牲農民權益及農產品價格，現在整個農業生產及農產品都受到嚴重衝擊，「農民可以改行嗎？能改作什麼？不該因為零關稅進口衝擊農民生計」、「感覺台灣政府照顧的是美國農民，難道台灣農民好欺負？」雲林縣國民黨立委張嘉郡說，馬鈴薯爭議還說不清楚，現在又放寬花生進口，不知還有哪些農產品會再受影響？立法院會昨天繼續施政總質詢，陳駿季表示，我國花生進口大多來自印度、巴西及阿根廷，美國花生進口前年僅七十五噸，至於去年也只有六十八噸，儘管美國花生進口台灣零關稅，未來也還是要跟這些對手相互競爭。陳駿季說，農業部持續關注可能的長期影響，因此也提出濕莢收購等多項方案，「我們不希望花生農這麼辛苦地把花生曬在稻穀上，所以應該趁這個機會進行有效的產業轉型，透過產業轉型和集團栽培，農民只要負責種植，後面的加工跟冷鏈部分就是由集團栽培經營」。\n\n媒體詢問，美國花生比較便宜，可能出現價格落差？陳駿季表示，早期市場貿易以價格為主，但從國內角度來看，農業部要用「價值的戰爭」取代「價格的戰爭」，讓台灣花生具有品牌及安全性，希望透過價值讓消費者肯定。陳駿季：以行銷確保國內品牌優勢陳駿季還說，農業部也將透過行銷確保國內品牌優勢，台灣人還是比較喜歡台灣花生的香氣，「我們會持續讓台灣花生，成為國內的唯一選擇」。\n\n他強調，「農業部一定是支持農民與產業」。雲林縣民進黨立委劉建國表示，早在三月二日就已邀請陳駿季與農糧署長姚士源與雲林花生合作社及花生農座談，當天取得共識，政府會全面支持花生產業，協助升級。"}, {"title": "藍白整合 李四川勝出 參選新北市長 民調結果揭曉 黃國昌允全力輔選 李承諾推「人才共治」", "source": "聯合報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "新北市長選舉，藍白共推人選結果昨天揭曉，國民黨新北市長參選人李四川勝出，將對決民進黨新北市長參選人蘇巧慧。李四川表示，將落實人才共治，延攬民眾黨優秀人才進入團隊；民眾黨參選人黃國昌承諾全力輔選，攜手讓新北市更好。", "full_text": "新北市長選舉，藍白共推人選結果昨天揭曉，國民黨新北市長參選人李四川勝出，將對決民進黨新北市長參選人蘇巧慧。李四川表示，將落實人才共治，延攬民眾黨優秀人才進入團隊；民眾黨參選人黃國昌承諾全力輔選，攜手讓新北市更好。\n\n蘇巧慧說，恭喜對方初選圓滿順利，她會和有活力、有創意又有執行力的團隊，繼續爭取為新北市民服務的機會。藍白兩黨日前協調共推新北最強人選，據了解，本次兩家民調公司各做約一二○○份，民調方式手機與市話「七比三」對比，且年齡採配額制，讓民調數據更貼近現實。經五天民調，李四川、黃國昌昨共同出席記者會，國民黨副主席李乾龍、民眾黨秘書長周榆修也同台。\n\n根據兩家民調公司結果，Ａ民調顯示，李四川以百分之卅四勝過蘇巧慧的百分之廿八點五；黃國昌則以百分之廿八點一略輸蘇的百分之卅一點三。B民調顯示，李四川以百分之卅六點三勝過蘇巧慧百分之廿四點五，黃國昌也以百分之廿八點三勝過蘇巧慧百分之廿六點七。\n\n黃國昌提議對外公布民調與會人士說，黃國昌稱「這是有史以來地方選舉最嚴謹的民調」，不僅有年齡配額且納入手機，可信度高，民調顯示李四川領先蘇巧慧，黃提議應對外公布，破解綠營內參民調。在場藍營高層驚訝反問，「確定要公布嗎？」 李四川表示，民調勝出就是責任開始，感到誠惶誠恐，必須全力以赴；\n\n感謝黃國昌以大局為重，展現政黨領袖的氣質，讓他由衷敬佩。他會納入黃國昌提出對新北市民有利的政見，也會延攬願意為新北打拚的民眾黨人才，共推「人才共治」；同時全力輔選民眾黨新北市議員參選人，讓藍白在新北市議會席次極大化。\n\n黃國昌說，新北市長選舉受到關注，必須讓支持者清楚知道競爭過程。他恭喜李四川勝出，不僅延續市長侯友宜的優良市政，未來一定可以讓新北市更好；他和民眾黨一定全力輔選李四川，讓新北市、台灣民主有更好的未來。\n\n對於是否邀請黃國昌加入團隊？李四川說，黃國昌年底一定是全國輔選，對於民眾黨所提名的議員或縣市長，「黃國昌一定是我最好的戰友」。被問到是否轉戰彰化縣長？\n\n黃國昌則回應「空穴來風」。"}, {"title": "美國花生零關稅叩關 每公斤去殼價 美約47元 國產約150元 農業部估衝擊3成花生農", "source": "中國時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "依據台美貿易協議（ART），台灣放寬美牛、美豬、馬鈴薯等進口條件後，美國花生挾其「零關稅、豁免特別防衛措施」等待遇，亦將叩關來台，令國內花生防線有潰堤之虞。農業部次長胡忠一28日表示，美國去殼花生每公斤約47元，國產去殼花生每公斤為150至160元，僅占國內價格的30％，若單看價格，確可能衝擊國內約3成花生農。但胡忠一強調，台灣花生農非常有競爭力，政府已提前布局，絕不讓花生農受影響。", "full_text": "依據台美貿易協議（ART），台灣放寬美牛、美豬、馬鈴薯等進口條件後，美國花生挾其「零關稅、豁免特別防衛措施」等待遇，亦將叩關來台，令國內花生防線有潰堤之虞。農業部次長胡忠一28日表示，美國去殼花生每公斤約47元，國產去殼花生每公斤為150至160元，僅占國內價格的30％，若單看價格，確可能衝擊國內約3成花生農。但胡忠一強調，台灣花生農非常有競爭力，政府已提前布局，絕不讓花生農受影響。\n\n美國聯邦最高法院雖裁決川普政府的對等關稅措施違憲，但台美雙方政府對已簽署的台美貿易協議，仍肯定其價值並將履行，美國農產品大舉攻台恐無法避免，花生即為其一。花生農擔心，過去憑藉「關稅配額數量」、特別防衛措施（SSG）等築起的花生防線，將無法阻擋美國花生攻台。推動轉型集團栽培、溼莢收購農業部長陳駿季28日在立法院會備詢前受訪表示，農業部已經做過分析，美國花生在前年只進口75噸，去年也只有68噸，而我國進口花生多來自印度、阿根廷及巴西，所以美國花生零關稅進來之後，競爭對手是印度、阿根廷、巴西。\n\n況且，農業部說，美國進口花生在台灣市場占比不到1％，且多以加工品型態進入，例如花生醬、調味花生等，而未來可能大舉進口的去殼花生，同樣會用於花生醬、花生粉加工。強化價值台產口感香氣有優勢陳駿季說，農業部會持續關注可能的長期影響，與花生農座談，並提出方案，包括溼莢收購，不希望花生農把花生曬在道路上，應該趁此機會推動有效的產業轉型，讓農民只負責種植，後續加工與冷鏈則由集團栽培與經營。此外，也希望透過行銷國內品牌，確保國內優勢，畢竟台灣人比較喜歡台灣花生的香氣，農業部會持續讓台灣花生成為國內的唯一選擇。\n\n至於美國進口花生與本土花生的價差，陳駿季說，早期市場貿易以價格為主，可是從國內角度來看，希望能以價值來取代價格戰爭，透過價值來贏得消費者的肯定。退場輔導協助轉作甘藷、毛豆胡忠一在農業部召開記者會表示，若不計算關稅、權利金等，美國去殼花生每公斤約47元，而國產去殼花生約150至160元，因此若全面開放，且價格持續呈現落差，確實可能影響約2至3成國內農民。為此政府已提前布局，農業部推出300億元農安基金，包括協助花生產業轉型，首先在品種上持續改良，其次推動機械化乾燥，改善過去路邊曝曬造成的品質與衛生疑慮，並透過「集團產區」模式，導入產銷履歷與一條龍管理，提升品質與品牌辨識度。\n\n胡忠一補充，花生農若有意退場，農業部將協助其轉作目前出口強勢的作物，例如甘藷、毛豆等，其中甘藷訂單約需要1萬2千公頃，但國內僅有約9000公頃。毛豆則需要1萬公頃，但目前僅有7000多公頃，同時也會與花生主要產區的雲林及彰化縣合作，共同合作輔導農民，並開發高附加價值的產品。胡忠一強調，台灣花生年產量約占消費量7成，仍有約1萬噸缺口需仰賴進口補足，國內勞動力老化，不排除花生缺額還會持續上升，因此該政策也是為因應國內產業轉變，但無論如何，農業部都將努力提升國產價值，讓消費者可清楚辨識並選擇支持本土產品。"}, {"title": "須有美方正式發價書 鄭麗文表態 軍購預算8千億也可以", "source": "中國時報 A01 要聞", "cat": "台灣政府與政策訊息", "priority": 1, "summary": "國防特別預算條例草案仍在立法院卡關，據了解，立法院國民黨團今（29）日舉行黨團大會，討論藍委徐巧芯提出的8000億元版本。國民黨主席鄭麗文昨表態，「先通過8000億也可以」，令青壯派藍委鬆了口氣。但鄭麗文強調，要有美方的正式發價書，才能編列預算。", "full_text": "國防特別預算條例草案仍在立法院卡關，據了解，立法院國民黨團今（29）日舉行黨團大會，討論藍委徐巧芯提出的8000億元版本。國民黨主席鄭麗文昨表態，「先通過8000億也可以」，令青壯派藍委鬆了口氣。但鄭麗文強調，要有美方的正式發價書，才能編列預算。\n\n鄭並說，若民進黨仍期待通過1.25兆版本，「就死了這條心，絕無可能。」 立法院長韓國瑜27日主持朝野協商時，徐巧芯提出8000億版本，黨團總召傅（山昆）萁認為，金額既有變動，需經黨團大會通過，因此當日沒有結論。國民黨團昨發開會通知，今午12時舉行黨團大會，研商「重大法案軍購案」，並特別備註「未到場立委，視同支持黨團決議」。\n\n黨團幹部昨低調表示，會在黨團凝聚共識後，作出結論。黨中央對新提案態度備受關注，鄭麗文昨接受專訪時直言，不可能同意空白背書、空白授權，民進黨應該務實，國防特別條例若堅持1 .25兆元版本，協商一定破局，若期待國民黨空白授權，「就死了這條心，這絕無可能。」 鄭麗文說，因為加了第二波軍購約140億美元，黨內才有了8000億元版本，但不管第二波軍購多少錢，至今毫無官方數字，在野只能透過媒體報導來推算。\n\n她重申，只要發價書來，立法院開始審查，絕不拖延，才是最快處理軍購的路線。鄭麗文再說，特別條例先匡列8000億，可先就已有美方發價書的3 500億元編列預算，後面第二批軍購要來，就再加編預算。至於前中廣董事長趙少康所提出來的凍結建議，鄭麗文則表示，條例與預算不同，「不需要凍結，沒有凍結問題」。\n\n鄭麗文也直言，至今第二波軍購沒有來，是因為美國總統川普要訪問大陸，美方軍售停頓，她質疑最後這140億美元會來嗎？或是多匡列的錢會被民進黨拿去亂花？鄭首度明確表示「現在要先通過8000億也可以」、「不知道大家為什麼要糾結數字」，但她強調要分階段編列預算，一定要有美國正式通過發價書，預算才能編，隨便編給民進黨是不可能的。\n\n鄭麗文補充表示，藍白的態度一致，至於商購或投資台灣做無人機，則可以討論，不過要有具體內容。據了解，鄭麗文表態後，令支持 8000 億版本的青壯派藍委大鬆一口氣。不具名藍委透露，如此「黨內阻力」就會更少，樂觀看待今日黨團大會的討論。\n\n至於條文該如何修正，該藍委則表示仍在斟酌用字，但核心概念就如同鄭麗文所說，沒有正式發價書，就不可以送預算到立法院審查。"}, {"title": "承諾年底當選 將延攬民眾黨人才 在野新北市長參選人李四川勝出", "source": "中國時報 A01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "國民黨、民眾黨28日宣布，藍白共推國民黨李四川為新北市長參選人。李四川表示，誠惶誠恐、全力以赴，並承諾若年底勝選，一定努力延攬民眾黨人才。民進黨新北市長參選人蘇巧慧昨日表示，非常恭喜藍白初選圓滿順利，她會繼續與有活力、有創意又有執行力的團隊，一起努力爭取為新北市民做更多事的機會。", "full_text": "國民黨、民眾黨28日宣布，藍白共推國民黨李四川為新北市長參選人。李四川表示，誠惶誠恐、全力以赴，並承諾若年底勝選，一定努力延攬民眾黨人才。民進黨新北市長參選人蘇巧慧昨日表示，非常恭喜藍白初選圓滿順利，她會繼續與有活力、有創意又有執行力的團隊，一起努力爭取為新北市民做更多事的機會。\n\n國民黨、民眾黨日前簽訂政黨合作協議，兩黨在新北市共推候選人。初選民調作業由2家公司執行，進行5天的對比式民調作業，以民進黨參選人蘇巧慧為對比目標。昨日下午宣布結果，A公司民調顯示李四川以34.0％勝過蘇巧慧的28.5％，黃國昌則以28.1％小輸蘇巧慧的 31.3％；\n\nB公司民調結果為李四川以36.3％贏過蘇巧慧的24.5％，黃國昌28.3％甚至小贏蘇巧慧的26.7％。兩黨原本說好不公布民調數字，但昨日決定公開。黃國昌說明，是他主動向李提出此建議，因為新北受到全國高度關注，雙方支持者需要知道競爭過程。\n\n黃國昌說，相信在李四川帶領下，一定可以讓新北更好，且過去這段時間深深感受到，台灣民主可透過理性對話、政見闡述，彼此互相砥礪跟學習，變得更成熟與更好，而不是只有抹黑謾罵、仇恨式動員。黃國昌提及，接下來民眾黨除繼續努力將6名新北市議員參選人都送進市議會外，他也說過，若最佳男主角不是他，民眾黨一定全力輔選，盼攜手合作讓新北更好。李四川則感謝黃國昌以大局為重，展現政黨領袖氣質，而民調勝出就是責任的開始，「我是誠惶誠恐，但必須全力以赴」，並承諾此段時間黃國昌提出的所有政見，他都會納入。\n\n李四川更喊話，「藍白人才一定共治」，對於民眾黨的人才，只要是願意為新北打拚，他一定會努力爭取、延攬，且議會也絕對要合作，對於民眾黨提出的議員參選人，他將比照為國民黨參選人同樣輔選，盼在議會獲得席次最大化。至於未來會不會邀黃國昌加入競選團隊，或是勝選後邀對方擔任小內閣？李四川回答，黃國昌現在是民眾黨的黨主席，年底一定是全國輔選白營的所有議員或縣市首長，「所以一定是我最好的戰友」。\n\n黃國昌則說，「川伯怎麼決定，我們怎麼配合。」未來競總將變白營6名小雞的聯合競總，且也會成為李四川的後援會。"}, {"title": "拚經濟 陸擴大內需穩能源 增強貨幣政策前瞻性 穩定房地產市場 推動科技自立", "source": "中國時報 AA01 要聞", "cat": "國際經濟情勢", "priority": 1, "summary": "中共中央政治局28日召開會議，分析研究當前經濟形勢和經濟工作，中共總書記習近平主持會議。會議表示，要挖掘內需潛力，增強貨幣政策針對性、穩定房地產市場；面對外部挑戰，要推動科技自立，提高能源安全保障，強調要以「更大力度和更實舉措抓好經濟工作」。", "full_text": "中共中央政治局28日召開會議，分析研究當前經濟形勢和經濟工作，中共總書記習近平主持會議。會議表示，要挖掘內需潛力，增強貨幣政策針對性、穩定房地產市場；面對外部挑戰，要推動科技自立，提高能源安全保障，強調要以「更大力度和更實舉措抓好經濟工作」。\n\n會議表示，要堅持穩中求進工作總基調，更好統籌國內國際兩個大局，統籌發展和安全，深化改革開放，推動科技自立自強、產業鏈自主可控，精準有效實施更加積極的財政政策和適度寬鬆的貨幣政策，持續擴大內需。著力穩就業、穩企業、穩市場、穩預期，增強經濟發展內生動力，進一步做強國內大循環，做優國內國際雙循環。會議強調，要增強貨幣政策前瞻性靈活性針對性，保持流動性充裕。\n\n保持人民幣匯率在合理均衡水準上的基本穩定。此外，要推動消費升級，保持製造業合理比重，深入整治「內捲式」競爭。全面實施「人工智慧+」行動，發展智慧經濟新形態。\n\n同時進一步深化國資國企改革。系統應對外部衝擊挑戰，提高能源資源安全保障水準。會議亦強調要有效防範化解重點領域風險，包括努力穩定房地產市場，以及有序化解地方政府債務風險。\n\n民生方面，會議要求強化就業優先政策導向，並加強教育、醫療、托育等民生建設，穩定生豬等農產品價格，完善常態化幫扶機制等。大陸《證券時報》指出，對比去年4月、7月的中共中央政治局會議，以及去年12月的中央經濟工作會議，此次會議對下階段宏觀政策定調新增「精準有效」表述要求。中信證券首席經濟學家明明分析，在精準有效的要求下，中國人民銀行或將加大對結構性貨幣政策的支持力度。"}, {"title": "社論／民意挺鄭習會 開放交流莫遲疑", "source": "中國時報 AA01 要聞", "cat": "社論與評論觀點", "priority": 1, "summary": "賴清德總統出訪史瓦帝尼計畫臨時取消，綠營高分貝指責對岸打壓，意圖稀釋鄭習會與惠台 10條效應，但未能掀起輿論風浪，只是一日新聞。民意的反應說明風向變了，抗中民粹退潮，兩岸應重回建設性軌道。風向變了抗中牌打不響依據台灣政治文化與民意取向，政治人物「說什麼」固然重要，「沒說什麼」更有意味。", "full_text": "賴清德總統出訪史瓦帝尼計畫臨時取消，綠營高分貝指責對岸打壓，意圖稀釋鄭習會與惠台 10條效應，但未能掀起輿論風浪，只是一日新聞。民意的反應說明風向變了，抗中民粹退潮，兩岸應重回建設性軌道。風向變了抗中牌打不響依據台灣政治文化與民意取向，政治人物「說什麼」固然重要，「沒說什麼」更有意味。\n\n鄭麗文訪陸前，各方不是擔憂，就是看衰，連藍營表態都十分謹慎，表達祝福時語帶保留、欲言又止。但鄭習會順利舉行、大陸公布10條措施後，藍營無論地方諸侯，民意代表或意見領袖，都予以肯定和支持，綠營固然批判，但只有同溫層效應，未引起反鄭風潮，更無反中聲浪。其後賴總統出訪史瓦帝尼受阻事件，更能探出民意風向的改變。\n\n綠營可能評估，認為訴求「中國打壓」，可以改變鄭習會後輿論氛圍，大陸外交部稱「世上早已不存在中華民國總統」，更讓綠營見獵心喜，但民意並未一面倒認同綠營的抗中論述，參選2026的綠營地方候選人，對這些話題也都興趣缺缺。民進黨團就史瓦帝尼事件提案譴責對岸，在立法院交付朝野協商後，似已船過水無痕，綠營側翼曾要求賴政府反制，但行政院並未採納。更具指標意義的是，陸委會雖然否決金門縣副縣長赴廈門考察「新四通」申請，但該團並未取消，並順利啟程，就在同一天，延宕已久的上海觀光業者踩線團抵達金門，兩岸雙向互動「小門」似已打開。\n\n賴政府對鄭習會、史瓦帝尼事件的表態調門雖高，但行為克制，綠營在地方層面的跟進亦有限，這背後的現象值得深思：首先可以看到，支持兩岸和平的民意於「鄭習會」後更鞏固和深化，綠營抗中牌打不響本身就是變化；其次可以發現，賴政府對兩岸交流民意不再「硬擋」，前後說辭有所軟化，閣揆卓榮泰的發言便是例證。鄭習會結束之初，卓榮泰在立法院表示，對岸10條各項需要公權力介入，需「小兩會」來談，大陸設定的對話前提與條件要拿掉，且恢復後就要長期執行。\n\n一個星期後，卓榮泰表示，台灣歡迎健康有序、對等尊嚴的交流與協商，大門永遠敞開，政府已做好準備。待雙方態度對等友善、內容公開明確，並具長期合作誠意時，將主動邀請對岸協商，討論商務、旅遊、農漁合作等議題。各進一步回應民意期待從卓榮泰前後兩次主要發言，可以看出民進黨政府的兩層構思：第一，由閣揆回應兩岸事務，而非賴總統本人，似有保持彈性靈活，維持兩岸交流在「行政事務」（而非外交）的定位；\n\n第二，卓揆發言的立場基本沒有太大變化，但姿態放軟，且主動提及商務、旅遊、農漁合作的具體方向，這既是呼應業界和民意，也是向大陸釋出訊號。大陸端出惠台10條後，透過民航小兩會管道主動致函，又派出上海踩線團赴金門，這套「組合拳」令台灣民意有感，也給民進黨政府造成壓力。民進黨政府不再以「交流即統戰」這類偏激言論抗中，陸委會也鬆口兩岸航線交由市場機制處理，這都是令人欣慰和值得期待的跡象。\n\n恢復交流的關鍵在於落實，落實的關鍵在於兩岸官方願擱置爭議、相向而行。例如大陸透過民航小兩會致函台方，是否可以成為在當前兩岸政治分歧難解的狀況下，以函電往來取代溝通協商的替代模式？同理，金門縣參訪團赴陸考察「新四通」、廈門新機場，未來可否常態化並由陸委會或海基會人員以顧問身分加入？\n\n主流民意要和平、要交流、要開放，兩岸執政者面對的絕非「各退一步」的問題，而是如何「各進一步」，抓住民意轉變的有利契機，不再為政治鬥嘴而蹉跎。大陸應以一貫的戰略定力和自信，汲取「以協商求共識」的智慧，民進黨政府則應拿出以小事大的智慧，從民航、觀光等議題著手，才對得起兩岸民意的期盼。"}, {"title": "證交所 深耕新創生態圈 攜手國發會參與東京2026新創盛會，嶄露創新實力、產業競爭力", "source": "工商時報 B05 上市櫃3 集中市場", "cat": "台灣產業與投資動向", "priority": 0, "summary": "臺灣證券交易所攜手國發會新創旗艦品牌「Startup Island TAIW AN（SIT）」，26日至28日赴日展開「2026Taiwan AI Tech Week」 系列活動，參與亞洲指標性新創盛會「SusHi Tech Tokyo」，展會期間臺灣館匯聚20多家新創企業，在國際舞台嶄露臺灣創新實力與產業競爭力。此次為證交所第三次參與，落實持續深耕新創生態圈之布局。證交所參與「Unicorn Summit」及 SusHiTech舞台活...", "full_text": "臺灣證券交易所攜手國發會新創旗艦品牌「Startup Island TAIW AN（SIT）」，26日至28日赴日展開「2026Taiwan AI Tech Week」 系列活動，參與亞洲指標性新創盛會「SusHi Tech Tokyo」，展會期間臺灣館匯聚20多家新創企業，在國際舞台嶄露臺灣創新實力與產業競爭力。此次為證交所第三次參與，落實持續深耕新創生態圈之布局。證交所參與「Unicorn Summit」及 SusHiTech舞台活動，發表專題演講，說明臺灣資本市場市值全球排名第六的堅實實力，上市市場獲得外資機構法人青睞，也是股票型ETF之主要投資標的，帶動長期穩健持股。\n\nSustainable High City Tech 由東京都政府主導，作為日本對接國際的亞洲最大規模新創盛事，透過展覽、論壇與交流機制，推動跨國合作與產業連結，展現跨越傳統產業框架的決心。證交所表示，日本為亞洲重要的創新與資本市場，也是臺灣新創企業拓展海外布局的關鍵據點，活動中聚集全球投資機構與投資人、大型企業、新創團隊等，不僅提升臺灣新創產業整體形象及交流機會外，同步強化創新板之國際能見度。證交所說明臺灣創新板上市機制，鼓勵海內外創新企業善用臺灣上市市場籌資，透過證交所提供之多元資源，吸引優秀人才、挹注成長動能、提升企業於國際供應體系中的評級，以加速國際化布局。\n\n同時，證交所與國發會共同推動「AI新十大建設」，此次透過國際新創交流平台，展現臺灣在AI與創新應用領域的發展動能，並凸顯資本市場在支持產業升級與企業成長過程中的關鍵角色。「Unicorn Summit」現場雲集來自臺灣、日本及韓國的高潛力新創團隊，涵蓋 AI、數位科技、雲端服務、生技醫療等熱門前瞻產業，交流氣氛熱烈，為孕育下一代亞洲獨角獸奠定深厚的合作基礎。目前證交所已有主要營運地在日本的IKKA-KY來台上市，從事汽車及電動車精密零組件研發與製造，體現臺灣資本市場對國際性企業之吸引力，隨臺日產業交流深化，可望更多日本企業以股份轉換或設立控股公司等方式來台上市，共築具國際影響力之「亞洲納斯達克」。\n\n證交所指出，展望未來，除近期陸續將有多家包含智慧醫療、綠能、智慧交通等國家政策重點產業之企業即將上市外，證交所將持續以「亞洲創新籌資平台」為核心定位，攜手SIT及新創社群夥伴，引進具前瞻發展潛力之優質企業於創新板掛牌，厚植創新產業聚落，透過資本市場的助力，將未來獨角獸之潛力轉化為具體成長動能與競爭優勢，形塑臺灣未來護國群山。"}, {"title": "大南方新矽谷 秀初步成果 蕭美琴：政府推動AI新十大建設，希望在既有產業基礎上，布局下一階段競爭力", "source": "工商時報 A06 財經生活", "cat": "台灣產業與投資動向", "priority": 0, "summary": "「大南方新矽谷推動方案」端出初步成果！副總統蕭美琴28日表示，大南方新矽谷方案鏈結南部各科學園區與產業廊帶，面對AI全球變局挑戰，成為重要發動引擎。而首屆「AI IMPACT」大南方成果，則展示AI走出實驗室，跨入城市治理，AI將創新應用落地生根。", "full_text": "「大南方新矽谷推動方案」端出初步成果！副總統蕭美琴28日表示，大南方新矽谷方案鏈結南部各科學園區與產業廊帶，面對AI全球變局挑戰，成為重要發動引擎。而首屆「AI IMPACT」大南方成果，則展示AI走出實驗室，跨入城市治理，AI將創新應用落地生根。\n\n蕭美琴是出席「主權AI-全光網路智慧城市應用發布會及第1屆AII MPACT大南方成果展」開幕時指出，台灣在全球科技供應鏈中扮演關鍵角色，也讓這股創新能量扎根在台灣土地上。賴總統提出的「均衡台灣」，就是希望在台灣轉型升級過程中，讓每個城市都能夠找到屬於自己戰略位置。她指出，政府推動「大南方新矽谷推動方案」，以台南沙崙智慧綠能科學城為核心，串聯嘉義、台南、高雄及屏東等南部科學園區與產業廊帶，這不僅是地方建設，更是台灣面對全球AI競爭的重要國家級布局。\n\n尤其近年沙崙快速發展，已成為南部產業創新與科技應用重要引擎，政府將以「大南方矽谷」為起點，推動創新應用落地生根，帶動區域與產業整體升級。面對全球AI競賽，她說，未來競爭不能只停留在硬體製造優勢，必須進一步掌握關鍵技術、基礎設施與應用場域。政府推動AI新十大建設，希望在既有產業基礎上，布局台灣下一階段競爭力，包括矽光子、量子運算、智慧機器人等，讓百工百業都能夠自AI中受惠，達到均衡台灣與AI普及化目標。\n\n至於全光網路通訊，她說，這項技術具備低延遲、大容量及高韌性特色，同時具有改變電力消耗模式潛力。在全球面臨新的算力建設及能源需求壓力之際，若能透過全光網路通訊驗證提出新解方，將有機會成為改變產業格局的關鍵突破（Game Changer）。蕭美琴並說，發展 AI 不只需要晶片，更需要完整算力、資料、網路與應用整合能力。\n\n在全光網路通訊領域，台灣已與日本已建立重要產業夥伴關係，台灣具備系統整合優勢與基礎，而日本在光學與通訊技術方面擁有深厚實力，雙方透過優勢互補，共同打造下一世代智慧應用與產業生態系，攜手開拓國際市場，成為台灣持續向前的重要動能。"}, {"title": "吳誠文：台灣邁向全光網路、AI應用新階段", "source": "工商時報 A06 財經生活", "cat": "台灣產業與投資動向", "priority": 0, "summary": "國科會「大南方新矽谷推動方案」已有初步成果，28日舉辦「主權 AI-臺日全光網路智慧城市應用發布會」暨「第一屆AI Impact：智慧城市與大南方成果展示」，主委吳誠文表示，這代表台灣邁向全光網路、AI應用與智慧城市整合發展新階段。吳誠文指出，AI Impact 是要展示智慧城市的各種應用，也邀請了很多廠商與政府合作，雖然有一些成果，但還無法全力展開，因為還有很多工作要啟動，希望立法院未來在一、兩個月能把預算定案，讓下半年成果能夠大幅度...", "full_text": "國科會「大南方新矽谷推動方案」已有初步成果，28日舉辦「主權 AI-臺日全光網路智慧城市應用發布會」暨「第一屆AI Impact：智慧城市與大南方成果展示」，主委吳誠文表示，這代表台灣邁向全光網路、AI應用與智慧城市整合發展新階段。吳誠文指出，AI Impact 是要展示智慧城市的各種應用，也邀請了很多廠商與政府合作，雖然有一些成果，但還無法全力展開，因為還有很多工作要啟動，希望立法院未來在一、兩個月能把預算定案，讓下半年成果能夠大幅度擴散，並展現真正的成果。對於全光網路智慧城市應用，吳誠文表示，全光網路與主權AI發展密切相關，台灣與日本的電信及網路通訊設備業者已逐步形成合作團隊。\n\n至於全光網路所需的矽光子晶圓製造及光學共封裝（CPO）技術，台灣已具備相當優質的產業基礎，與歐美日各國技術與產業實力可做互補性的整合，有望吸引國際關鍵企業參與合作，並成為整體生態系的夥伴。吳誠文認為，未來矽光子產業鏈的市場將涵蓋資料中心、邊緣運算系統、機器人、自主移動載具等多元應用領域，全面串聯產業能量。台南沙崙逐步發展為台灣AI產業生態系的重要核心節點，不論智慧城市創新應用或基礎建設，一定要持續努力推動深化。\n\n基礎建設部分，他提到，國科會在南科建設了算力中心，也是發展高速量子運算的重要基地，將來會結合全光網路，希望把台灣相對應的供應鏈建設、組織起來成為台灣隊，跟日本的產業互相搭配結合。吳誠文強調，不管矽光子或全光網路設備產業鏈，光通訊應用要結合資料中心算力設備連線全光網路，加上中華電光纖到府已經完善，推動智慧城市能從AI資料中心運算，協助政府直接服務到民眾，讓所有民眾食衣住行育樂及產業能連結在一起，是智慧城市很重要的機制與目標。"}, {"title": "自由日日shoot》軍購條例先等鄭訪中 現又等川習會？府問國民黨：下個藉口是什麼", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜前天就「國防特別條例草案」第三度召開朝野黨團協商，僅討論一小時就決定延後到五月六日再協商。對此，總統府發言人郭雅慧昨表示，確實是不宜再拖了，之前是說等中國國民黨去完中國回來、現在又說要等「川習會」後再討論，下一個藉口、下一個理由又會是什麼呢？軍購條例在立法院卡關，國民黨對軍購預算上限匡列到八○○○億元仍無共識，協商進度是否延至「川習會」備受關注。", "full_text": "立法院長韓國瑜前天就「國防特別條例草案」第三度召開朝野黨團協商，僅討論一小時就決定延後到五月六日再協商。對此，總統府發言人郭雅慧昨表示，確實是不宜再拖了，之前是說等中國國民黨去完中國回來、現在又說要等「川習會」後再討論，下一個藉口、下一個理由又會是什麼呢？軍購條例在立法院卡關，國民黨對軍購預算上限匡列到八○○○億元仍無共識，協商進度是否延至「川習會」備受關注。\n\n郭雅慧昨受訪回應，國防特別條例再度被延宕，同時間中國在台灣西南海域持續騷擾，國際也非常關注台灣是否在乎自我防衛能力，再加上近七成台灣民意支持強化國防，因此我們非常希望國會不分黨派，共同為國防強化盡一份心力，讓國防特別條例儘速過關。先開黨團大會討論金額？林楚茵：藍營鬼扯的藉口民進黨立委林楚茵直言，國民黨團聲稱須先召開黨團大會討論金額，根本是鬼扯的藉口，相關軍購金額從「三五○○億＋N」、到八○○○億元、九○○○億元，藍營內部早已討論多次，不應藉此再度拖延。\n\n若軍購預算在「川習會」後才過關，林楚茵分析，這將嚴重影響國際社會對台灣的看法，美國或其他友邦恐怕會認為，台灣軍購是在看習近平的臉色，進而傳遞台灣是中國一部分的錯誤訊息。鄭稱有發價書才能編預算國防部：機密專報已說明對於國民黨主席鄭麗文昨表態不反對八○○○億元版本，並以美方發價書做為編列預算的條件。國防部回應，一．二五兆元國防特別條例，過去已在立法院機密專報中詳盡說明全部規劃、案項，以及對整體戰力需求的必要及周延性，呼籲朝野立委支持，理性看待。\n\n民進黨團書記長范雲表示，行政院版八年一．二五兆元計畫包含軍購、台灣之盾及非紅供應鏈等項目，鄭麗文及國民黨立委徐巧芯應具體說明要刪減哪些內容，「為什麼認為不急或不重要？」 行政院長卓榮泰則提醒，若國會因外在因素刻意拖延，恐對整體國防政策產生不當聯想；軍購特別預算如同三塊拼圖，包括要形成台灣之盾、引入高科技擊殺鏈，最重要的是國防相關產業的自主發展，三顆好球才能夠遏制對方，缺一不可。"}, {"title": "鄭麗文：有發價書 就不反對8000億軍購", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院長韓國瑜針對國防特別條例草案已三度召集朝野協商，仍無法達成共識，朝野黨團將於五月六日進行第四次協商。國民黨主席鄭麗文昨接受節目專訪，首度表態「不反對八○○○億元軍購」。她說，現在要通過八○○○億元可以，但一樣要美國給台灣發價書，預算才能編；", "full_text": "立法院長韓國瑜針對國防特別條例草案已三度召集朝野協商，仍無法達成共識，朝野黨團將於五月六日進行第四次協商。國民黨主席鄭麗文昨接受節目專訪，首度表態「不反對八○○○億元軍購」。她說，現在要通過八○○○億元可以，但一樣要美國給台灣發價書，預算才能編；\n\n鄭呼籲民進黨要務實，如果堅持一定要一．二五兆元，朝野協商一定破局。指綠營若堅持1.25兆協商必破局主持人詢問，軍購的「水位」會不會影響未來訪美？鄭麗文表示不會，「因為鄭習會比那個（指軍購）重要太多了」。\n\n鄭表示，一．二五兆元軍購大部分都是空白支票，國民黨不可能空白授權，尤其民進黨毫無信用又貪贓舞弊，「所以期待我們空白授權通過一．二五兆元，就死了這條心吧，這絕無可能」。鄭呼籲民進黨要務實，如果堅持一定要一．二五兆元，朝野協商一定破局。鄭說明，為什麼國民黨的版本要「＋N」？\n\n因為大家一直說還有一四○億美元的第二筆對美軍購，加了所以有八、九○○○億元版本，「你就知道這個數字是不確定的」，因為沒有來自官方的數字，變成是我們自己猜或看報導，那到底要選擇哪一個數字？很多人說這一四○億美元，美國國會馬上會通過，發價書就來了，很好啊，那就更不用焦慮了！如果它馬上來，不會來不及，「因為我們已經答應了＋N」，立法院就開始審查，絕不會拖延。\n\n鄭麗文說，這幾個月美方都說一四○億美元要來卻都沒來，「因為川普要訪問大陸，所以是美國那一邊停頓，和我們也沒有關係」。如果不會來，多匡出來的這四、五千億元，會不會被民進黨拿去亂花？鄭麗文說，現在國防特別條例就要通過八○○○億元也可以，但是一樣要美國正式通過給我們發價書，預算才能編，所以通過三八○○億元還是通過八○○○億元是一樣的。\n\n現在藍白的態度一致，差別就在於，國民黨有很多人說先編八○○○億元，但後面美國若沒有要賣我們，編了錢擺在那？主持人追問：「所以妳不反對八○○○億元？」鄭說，「我不反對」，但國民黨分階段的原因就在這裡，因為沒看到項目、數字要怎麼編？\n\n民進黨不負責、不給你看，這是我們的困難。"}, {"title": "國民黨團今討論軍購金額 下週協商亮底牌", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院廿七日三度協商國防特別條例，由於對最後金額沒共識，立法院長韓國瑜宣佈五月六日繼續協商。據了解，國民黨團已經擬訂新的軍購版本，根據美方第二波發價書的數字、項目及通過的條件有新的進展，需要經過黨團大會討論，形成共識才能再度端上協商桌。在國民黨立委徐巧芯提出八千億金額後，由於國民黨團總召傅崐萁考量黨團尚未討論細節，待今天黨團大會針對美方第二波發價書約一四○億美元，討論疊加後的總金額後，再與民眾黨團協商達成共識，才會在朝野協商確認金額。", "full_text": "立法院廿七日三度協商國防特別條例，由於對最後金額沒共識，立法院長韓國瑜宣佈五月六日繼續協商。據了解，國民黨團已經擬訂新的軍購版本，根據美方第二波發價書的數字、項目及通過的條件有新的進展，需要經過黨團大會討論，形成共識才能再度端上協商桌。在國民黨立委徐巧芯提出八千億金額後，由於國民黨團總召傅崐萁考量黨團尚未討論細節，待今天黨團大會針對美方第二波發價書約一四○億美元，討論疊加後的總金額後，再與民眾黨團協商達成共識，才會在朝野協商確認金額。\n\n雖然多數國民黨立委都贊成軍購要增加到八○○○億美元，不過黨內如外交及國防委員會召委馬文君等人，認為過去民進黨有許多軍購和商購方面的舞弊貪污，希望在確定增加預算之前，能夠對於軍購項目和金額有更清楚的了解，確認真的會買到該項目的武器，才能夠真的把金額疊加上去。黨內人士表示，國民黨不會拖延軍購，而且立法院長韓國瑜對這件事也非常慎重，但仍要給黨內、藍白有空間討論和協商，軍購的共識有望在五月七日前，也就是「川習會」的前一週獲得確認；但該人士也說，除非這段時間「川習會」的前置作業，也就是各方的工作項目有變化，否則不會延後處理軍購。\n\n不過也有黨內人士認為，黨主席鄭麗文雖然不反對八○○○億元軍購，但一直對外說美國第二波發價書會不會來，也是在對美方喊話，如果真的要賣台灣，要在野黨通過，就要給具體的承諾和數字，不要最後因為「川習會」拖延，甩鍋到國民黨身上。該人士也說，黨內很多人質疑，如果不通過美方滿意的軍購數字，會不會對鄭麗文的訪美造成影響？但鄭可不這樣想，她認為「鄭習會」的成果遠勝於通過軍購，所以軍購對她來說並非美國可以拿來威脅的條件，反而是美方能不能給她比陸方更好的待遇或拜會層級，還有能不能給予確定的發價書，才是軍購考量的重點。"}, {"title": "拒當凱子 通過1.25兆軍購？鄭麗文：死這條心 「AIT壓力大 我也能理解」 鄭籲別糾結數字 白營酸綠友友下個8年吃軍火", "source": "聯合報 A04 要聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "軍購特別條例草案仍待朝野協商，賴政府希望在野支持一點二五兆元的行政院版本。國民黨主席鄭麗文昨表示，美方有發價書的部分會趕快處理，其他不可能空白背書，期待國民黨空白授權通過一點二五兆元，「死了這條心，絕無可能」。美國在台協會（ＡＩＴ）代理處長梁凱雯日前與民眾黨主席黃國昌會面。", "full_text": "軍購特別條例草案仍待朝野協商，賴政府希望在野支持一點二五兆元的行政院版本。國民黨主席鄭麗文昨表示，美方有發價書的部分會趕快處理，其他不可能空白背書，期待國民黨空白授權通過一點二五兆元，「死了這條心，絕無可能」。美國在台協會（ＡＩＴ）代理處長梁凱雯日前與民眾黨主席黃國昌會面。\n\n黃國昌事後證實此事，他說ＡＩＴ來拜會就是想遊說民眾黨，「他們之前採取的立場，基本上是支持民進黨政府所提的一點二五兆元」，他很有耐心地解釋民眾黨立場，對方也當場詢問：「民進黨那邊，難道不可能做任何妥協，一定要一點二五兆元嗎？」 民眾黨秘書長周榆修批評，民進黨政府編列特別預算規避監督，難保綠友友「上一個八年吃太陽能，下一個八年要吃軍火」。民進黨立委林楚茵則回批，這是刻意假借美方名義混淆視聽。\n\n她說，美方一貫立場是支持台灣「全面性」提升自我防衛能力，也支持行政院提出的一點二五兆元國防特別預算，在野黨營造「美方也希望打折」錯誤資訊，實際上只是替自己拖延軍購、阻礙台灣提升自我防衛能力找藉口。立法院長韓國瑜五月六日將再召集第四次朝野協商，國民黨今將舉行黨團大會討論預算金額。鄭麗文昨接受網路專訪時說，軍購有所謂八千億元、九千億元版本，數字不確定的原因在於沒有官方的數字，國民黨「三八○○億+Ｎ」意思是，若有第二批發價書來，立法院程序絕不拖延，這是最務實、最快的路線，而且對人民負責，裡面絕對不會有冤枉錢、不會變成凱子。\n\n鄭麗文指出，國民黨版軍購特別條例草案規定未來預算還會再審，第二批來了可再加編，分階段編就不需要凍結；有人說要先編第二批一百四十億美元，但因美國總統川普要訪陸，美方停頓了，若最後不來，多框列的這四、五千億元，讓人質疑會不會被民進黨拿去亂花？鄭麗文解釋，現在通過三八○○億元或八千億元是一樣的，都要美國正式通過給發價書預算才能編，不知大家為何要去糾結數字；\n\n她已和美方及外國說明很多次，他們都能理解，「ＡＩＴ的壓力較大，我也可以理解」，問題是一點二五兆元絕不可能，至於商購或投資台灣做無人機，可以討論，但要有具體內容。國民黨立委牛煦庭說，藍營內部本就要協調、因應狀況調整，最後要用哪個方案作為基礎，要經黨團大會嚴謹程序討論定案。"}, {"title": "川習會後再談軍購？府指在野找藉口", "source": "聯合報 A04 要聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院朝野黨團前天第三度協商軍購特別條例草案，最終仍無共識。總統府發言人郭雅慧昨質疑在野黨，「下一個藉口、理由是什麼？」行政院長卓榮泰說，軍購特別預算有「三塊拼圖」，缺一不可，籲請國會讓特別條例草案早點通過。", "full_text": "立法院朝野黨團前天第三度協商軍購特別條例草案，最終仍無共識。總統府發言人郭雅慧昨質疑在野黨，「下一個藉口、理由是什麼？」行政院長卓榮泰說，軍購特別預算有「三塊拼圖」，缺一不可，籲請國會讓特別條例草案早點通過。\n\n行政院版一點二五兆元軍購特別條例草案持續在立法院卡關，傳出在野陣營恐等到「川習會」後再處理。郭雅慧表示，「確實是不宜再拖了」，之前是說等國民黨去完中國回來才要過關，不過，去也去了、回來也回來了，現在又說是要等「川習會」後再討論，「下一個藉口、下一個理由又會是什麼？」 郭雅慧說，前天立法院協商過程中，國防特別條例草案再度被延宕，同時間，中國在台灣西南海域持續騷擾。\n\n她說，一方面，因中國騷擾還在持續，「我們一定要強化自我防衛能力」；二方面，國際上也非常關注台灣態度，是不是對於自我防衛能力在乎；第三，在台灣有近七成民意也支持強化國防，「因此我們非常希望國會不分黨派，大家共同為了國防強化能夠盡一分心力，讓國防特別條例盡速過關」。\n\n卓榮泰昨赴立院備詢表示，若因外在因素刻意拖延，會造成對此事的「不當想像」，希望朝野各政黨能夠積極因應。卓揆說，軍購特別預算有三塊拼圖，缺一不可，也就是形成台灣之盾、引入高科技擊殺鏈，最重要地是國防相關產業的自主發展，「三顆好球才能夠遏制對方，缺一不可」。卓榮泰表示，行政院版是依國家需求、財政能力，與對方國個別的誠意，完成這樣的內容，國軍、國防部經深入研究、分析跟所需，希望美國在內的國家，能夠按照時程，提供我國必要國防自主能力及國防先進武器。"}, {"title": "提升原民職安 民團籲政府補助", "source": "聯合報 A07 民生", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "昨天是國際工殤日。據原民會調查，僅近五成有工作經驗的原住民族收過工作安全與職災預防宣導資料，不到六成上工前接受過職安教育訓練，因不少原民是臨時、日薪工，上一天課就少一天工資。工傷協會、基隆市原住民生活互助協會昨天到行政院前抗議，呼籲政府補助原住民勞工上職安訓練課程期間的工資損失、交通成本。", "full_text": "昨天是國際工殤日。據原民會調查，僅近五成有工作經驗的原住民族收過工作安全與職災預防宣導資料，不到六成上工前接受過職安教育訓練，因不少原民是臨時、日薪工，上一天課就少一天工資。工傷協會、基隆市原住民生活互助協會昨天到行政院前抗議，呼籲政府補助原住民勞工上職安訓練課程期間的工資損失、交通成本。\n\n工傷協會指出，原住民集中在營建、製造、技藝、機械操作與基層勞力等高風險工作。據原民會「一一三年第一次原住民就業狀況調查」，原住民族從事營建工程業為百分之十七點八九，參加勞保或勞職災保險者雖有百分之八十三點四七，仍有部分勞工被排除在保障外。工傷協會批評，政府嘴上說重視職災預防，卻連最基本的職安教育都未落實，僅百分之五十九點四二的原住民，上工前接受過職安相關課程。\n\n沒有上課的最大原因，百分之五十七點六未收到課程訊息，百分之廿點八一不知道有參加義務。基隆市原住民族生活互助協會理事長拔耐茹妮．老王說，在高風險的營建工程業、層層轉包制度下，很多最底層勞工都沒有加入職災保險，若發生職災，連最基本保障都沒有，政府應針對高風險產業、臨時工、派遣工、承攬工與無固定雇主者進行專案清查。勞動部回應，未來將要求營造作業勞工應受過「台灣職安卡」訓練，才能進入工地作業。\n\n勞工經雇主指派到外部單位參與安全衛生教育訓練，訓練費用應由雇主支應，並宜給公假，若工資未全額給付，勞工可向勞工局申訴。"}, {"title": "台商課稅依兩岸條例認定 藍批雙標 質疑大陸收入不列海外所得 陸配參政用國籍法處理 卓揆：稅與選舉各有所規", "source": "中國時報 A04 綜合新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "新任中選會主委游盈隆日前表示，除非修憲，否則現階段用《國籍法》處理陸配參政權實屬牽強，且具高度爭議，藍委廖先翔28日質詢時也提到，若行政院把大陸地區視為「中華人民共和國」，為何在對岸工作的台灣人無法以國外收入課稅？閣揆卓榮泰則回答，「稅的部分另有稅的規定，選舉有選舉的規定。」 現行規定在大陸經商、就業所得，須併入台灣的「綜合所得稅」，採累進稅率課徵；", "full_text": "新任中選會主委游盈隆日前表示，除非修憲，否則現階段用《國籍法》處理陸配參政權實屬牽強，且具高度爭議，藍委廖先翔28日質詢時也提到，若行政院把大陸地區視為「中華人民共和國」，為何在對岸工作的台灣人無法以國外收入課稅？閣揆卓榮泰則回答，「稅的部分另有稅的規定，選舉有選舉的規定。」 現行規定在大陸經商、就業所得，須併入台灣的「綜合所得稅」，採累進稅率課徵；\n\n但若是「海外所得」，達100萬元才必須申報，且享有750萬元免稅額，繳稅金額可能大幅降低。廖先翔昨日質詢時先表明，「雖然我不認同（以《國籍法》處理陸配參政問題）」，但依行政院及卓揆的見解，陸配前白委李貞秀沒有放棄中華人民共和國的國籍，所以違反《國籍法》第20條規定，「如果我方將大陸地區視為中華人民共和國，台灣人在對岸無論是就業或經商，其個人所得稅是否可以比照《所得基本稅額條例》第12條的國外收入加以課稅？」 財政部長莊翠雲回應，相關法規對課稅有明確規定，大陸地區收入就是依照《兩岸人民關係條例》的規定；\n\n不過，廖先翔繼續質疑，依照卓揆之前在李貞秀立委資格個案上的法律見解，若我方把大陸地區視為中華人民共和國、外國，為何台灣人民在「外國」的所得，沒辦法依照《所得基本稅額條例》第12條「非中華民國來源所得」來課稅？卓榮泰則表示，雙方政治情勢複雜性是歷史造成，政府正一步一步釐清事實，像李貞秀女士的案例不僅涉及《國籍法》，在《兩岸人民關係條例》中，她也未達「入籍10年」的規定，同時違反《國籍法》、《兩岸人民關係條例》。「法律見解應該一致吧？」廖先翔追問，參政權在《兩岸人民關係條例》同樣有規範，但如果參政權也能適用《國籍法》，為何繳稅卻不能依照《所得基本稅額條例》？卓榮泰僅回答：「稅的部分另有稅的規定，選舉有選舉的規定。」 廖先翔強調，兩岸關係當然是特別的，不過，當卓揆決定把一件事情從《兩岸人民關係條例》中抽出，就會造成很多其他的問題，就像如果把對岸當作國外，為什麼不能比照海外所得來課稅？\n\n這是要去思考的一個法律問題。"}, {"title": "券商不限用途借貸 額度告急 市場憂行情反轉，券商指時空背景不同，台股仍有高點可期，投資人無須過度擔憂", "source": "工商時報 A04 綜合要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "光、鄭郁平、楊淨淳、陳彩玲綜合報導證券新聞中心／台北報導台股行情熱爆，傳部分券商辦理「不限定用途款項借貸」額度用罄暫停受理，由於曾出現額度用完後台股反轉的情況，引發市場熱議。群益證券總經理李文柱對此表示，時空背景不同，台股還有高點可期，投資人無須過度擔憂。金管會開放投資人可將股票、ETF等商品，質押給券商辦理不限定用途款項借貸，利率低於融資且申請便利，吸引資金積極進場，也推升券商利息收入明顯成長。", "full_text": "光、鄭郁平、楊淨淳、陳彩玲綜合報導證券新聞中心／台北報導台股行情熱爆，傳部分券商辦理「不限定用途款項借貸」額度用罄暫停受理，由於曾出現額度用完後台股反轉的情況，引發市場熱議。群益證券總經理李文柱對此表示，時空背景不同，台股還有高點可期，投資人無須過度擔憂。金管會開放投資人可將股票、ETF等商品，質押給券商辦理不限定用途款項借貸，利率低於融資且申請便利，吸引資金積極進場，也推升券商利息收入明顯成長。\n\n隨著台股強攻40,000點，近期券商不限定用途款項借貸額度再度告急。市場傳出國泰證、華南永昌證、統一證、第一金證及兆豐證券的額度用完。最新數據顯示，此借貸項目的餘額高達1,602.44萬張，為史上次高，以60日均價的6成計，投資人從券商端借出6,628億元資金創紀錄，市場大開槓桿。\n\n實務面亦同步發燙。券商營業員透露，最近洽詢不限用途借貸投資人非常多，連才開戶的新股民，也會詢問不限用途借貸的事項。大型券商主管表示，暫無額度用罄的風險，不過，投資人大量使用不限用途借貸，「餘額確實開始變緊」，想談更優渥利率條件較困難。\n\n各券商因應措施呈現分歧。統一證券暫時停止線上申貸，採線下逐案審核；華南永昌證券已額滿關閉，傳出一年半到期，不接受借新還舊及展延，半年到期後，6月1日起調高利率，賣出款項額度不保留等限制。\n\n第一金證券即將額滿，台新證券仍有額度且利率不變。兆豐證券則回應，有關台積電額度已滿，主因風控機制規範單一標的總融通額度；凱基、群益金鼎及永豐金證券則尚未限制。\n\n中信證券線上申請關閉，主要是達到當日上限，投資人可聯繫營業員進行申請，由於隔日線上申請不限用途借貸又會再重新開放，非完全關閉。值得注意的是，群益證曾在2023年底推出「群益鈔優貸」不限用途款項借貸專案，三個月不限用途款項借貸餘額成長百億元，當時（2 024年7月）傳出不限用途借貸額度用罄，隨後台股反轉向下，7月中下旬出現一波回檔股災，市場擔憂額度用完是否預示台股過熱、行情反轉的前兆。李文柱認為，當時AI需求尚未完全落地，現在AI應用遍地開花，晶圓代工龍頭台積電獲利持續衝高，本益比維持在合理水準，基本面支撐下，台股仍有高點可期。"}, {"title": "TISA租稅優惠拚全民適用 金管會推動個人投資儲蓄帳戶主委彭金隆：與財部規劃不限職業別 範圍會更廣", "source": "經濟日報 A04 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "金管會推動台灣個人投資儲蓄帳戶（TISA），正與財政部研商提供租稅優惠。立委建議將勞退自提導入TISA，金管會主委彭金隆昨（28）日表示，現正規劃不僅限於勞工，範圍會更廣、全民都可適用。行政院長卓榮泰昨日率領各部會首長赴立法院備詢。", "full_text": "金管會推動台灣個人投資儲蓄帳戶（TISA），正與財政部研商提供租稅優惠。立委建議將勞退自提導入TISA，金管會主委彭金隆昨（28）日表示，現正規劃不僅限於勞工，範圍會更廣、全民都可適用。行政院長卓榮泰昨日率領各部會首長赴立法院備詢。\n\n民進黨立委沈發惠質詢提及，現行 TISA沒有租稅優惠，若要擴大規模，可考慮將雇主提撥退休金及勞退自提機制導入TISA。彭金隆答詢表示，勞退新制本就有自提，只是無法自選導入TISA，這部分只限勞工，但可助力退休金第三支柱建置。針對TISA租稅優惠，後續與財政部規劃內容是針對全民，不限職業別，範圍會更廣，盼民眾能全面適用改良的TISA制度。\n\n彭金隆表示，尊重財政部租稅考量，過去卓揆已指示金管會、財政部研議租稅優惠，感謝財政部在過程中提供非常多專業見解，政府會儘快來做。沈發惠建議，可從證交所、櫃買中心、公營事業等先推動導入TISA，帶動民間企業讓員工投入開設TISA帳戶。卓榮泰回應，如果法制上沒有疑義，雙方也都同意這個方式，往這個方向去做，確實可發揮帶頭作用。\n\n金管會日前表示，已與財政部展開跨部會協商，溝通順暢，討論範圍不設限，無論是朝標準扣除額調整，或設立特別扣除額機制，均在評估之列，尚未設定單一方案或時程。先前也曾傳出，較具共識方向是參考勞退自提6％免稅作法，自提時不計入年度綜所稅，不過由於TISA非勞退專戶，可享有的免稅額度不會像勞退自提那麼高。國民黨立委廖先翔質詢則關注零股交易，彭金隆提到，台灣過去大多以千股為交易方式，零股交易時間已陸續縮短，讓撮合時間更有效率，避免價差。\n\n很多個股價值已高過百元、千元甚至萬元，零股金額也滿大，金管會盡量維持對所有投資人公平，因此正在優化制度。對於立委關注零股是否開放金融槓桿、當沖，彭金隆說，台灣股市已達一定規模，金管會也責成交易所針對這部分繼續研究，並未完全否定，對所有制度都持開放態度。"}, {"title": "阿聯退OPEC 原油市場添變數 為符合國家利益並回應全球市場需求所做出選擇；美伊談判方面，傳川普不接受伊朗提案", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "在美伊戰火導致全球能源危機之際，阿拉伯聯合大公國28日宣布將於5月1日退出石油輸出國組織（OPEC），此舉象徵其能源政策的重要轉變。阿聯政府表示，決策是基於全面檢討產量政策與未來產能後，為符合國家利益並回應全球市場需求所做出的選擇。阿聯是OPEC第三大產油國，產量僅次於沙烏地阿拉伯與伊拉克。", "full_text": "在美伊戰火導致全球能源危機之際，阿拉伯聯合大公國28日宣布將於5月1日退出石油輸出國組織（OPEC），此舉象徵其能源政策的重要轉變。阿聯政府表示，決策是基於全面檢討產量政策與未來產能後，為符合國家利益並回應全球市場需求所做出的選擇。阿聯是OPEC第三大產油國，產量僅次於沙烏地阿拉伯與伊拉克。\n\n此次退出可能影響OPEC內部協調與全球原油供應格局，市場後續反應備受關注。受荷姆茲解除封鎖遙遙無期影響，西德州原油6月期貨價28日盤中大漲逾4％至每桶100.82美元，重返100美元大關。布蘭特6月期油上漲3.63％至每桶112.16美元。\n\n在中東最新局勢方面，川普美東時間28日在自家社群平台Truth S ocial發文表示，伊朗剛剛通知美國，他們正處於「崩潰狀態」，伊朗希望美國能盡快開放荷姆茲海峽，他們也正設法處理自身領導層局勢。外媒引述消息報導，針對伊朗近日提出「先重啟荷姆茲海峽與結束戰事，後續再進行核談判」的提案，美國總統川普感到不滿意、傾向不接受此方案，國務卿盧比歐也批評此舉僅是拖延戰術，千萬不能讓伊朗得逞。川普27日上午已與國安幕僚討論該提案，雖然他並未直接否決，但據官員透露，川普質疑伊朗沒誠意進行談判，也不願接受他的核心訴求，也就是停止鈾濃縮並承諾不發展核武。\n\n美國官員表示，美國將持續與伊朗協商，白宮未來幾天將提出回應。盧比歐27日接受福斯新聞訪問時表示：「伊朗非常擅長談判，他們只是在爭取更多時間。我們必須確保雙方達成的任何交易或協議，都能阻止他們在任何時候朝核武發展。」 根據伊朗透過巴基斯坦轉交給美國的提案，在戰爭結束與波斯灣航運爭端獲得解決前，先不討論伊朗核計畫問題。但川普對此提案十分不滿，因他希望談判一開始就處理核問題，貿然解除封鎖與結束戰爭將喪失籌碼，難以迫使伊朗讓步。白宮表示，美國對於「自己的底線」一直講得很清楚。\n\n伊朗外長阿拉奇（Abbas Araqchi）27日飛往莫斯科與俄羅斯總統普丁會面，他將首輪談判失敗歸咎於「華府要求太過分」。普丁重申對伊朗的支持，並表示「俄羅斯將盡一切努力促成和平」。"}, {"title": "阿聯下月退出OPEC", "source": "經濟日報 A02 話題", "cat": "國際經濟情勢", "priority": 0, "summary": "阿拉伯聯合大公國28日宣布，5月1日起將退出已加入60年的石油輸出國組織（OPEC），及包含俄羅斯等盟友在內的OPEC+，向該國長期戰略和經濟計畫看齊，這對這個石油生產國集團而言是一大打擊。阿聯能源部在聲明中指出，退出OPEC將有助於阿聯加強回應瞬息萬變的需求，該國將逐步提高石油產量。能源部長馬茲魯伊受訪時表示，伊朗戰爭干擾全球能源市場，為阿聯創造退出OPEC的良機，阿聯相信戰爭引發的短缺，需要各國靈活回應市場需求，不受集體決策過程束縛...", "full_text": "阿拉伯聯合大公國28日宣布，5月1日起將退出已加入60年的石油輸出國組織（OPEC），及包含俄羅斯等盟友在內的OPEC+，向該國長期戰略和經濟計畫看齊，這對這個石油生產國集團而言是一大打擊。阿聯能源部在聲明中指出，退出OPEC將有助於阿聯加強回應瞬息萬變的需求，該國將逐步提高石油產量。能源部長馬茲魯伊受訪時表示，伊朗戰爭干擾全球能源市場，為阿聯創造退出OPEC的良機，阿聯相信戰爭引發的短缺，需要各國靈活回應市場需求，不受集體決策過程束縛。\n\n馬茲魯伊說：「我們是在花費許多時間詳細評估所有策略後，做出這項決定…我們認為現在是做出這項決定的好時機，因為此舉不會嚴重影響市場：目前市場供給短缺。」 阿聯退出OPEC可能引發混亂並削弱該集團，但對美國總統川普而言是一大勝利，川普曾指控 OPEC藉由哄抬油價向全世界「敲竹槓」。"}, {"title": "川普：伊朗瀕崩潰 盼開放荷姆茲海峽", "source": "自由時報 A06 國際新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "伊朗向美國提出的新版停火協議中，建議重啟關鍵能源航道荷姆茲海峽，換取長期停戰並解除海上封鎖。美國有線電視新聞網（CNN）引述知情人士報導，美國總統川普示意不太可能接受該協議。然而，川普廿八日又在「真實社群」發文指稱，「伊朗剛才通知我們，他們現在已經處於『崩潰狀態』。", "full_text": "伊朗向美國提出的新版停火協議中，建議重啟關鍵能源航道荷姆茲海峽，換取長期停戰並解除海上封鎖。美國有線電視新聞網（CNN）引述知情人士報導，美國總統川普示意不太可能接受該協議。然而，川普廿八日又在「真實社群」發文指稱，「伊朗剛才通知我們，他們現在已經處於『崩潰狀態』。\n\n他們希望我們能盡快『開放荷姆茲海峽』，讓他們處理內部的領導危機。」川普說：「我相信他們最後會處理好！」 伊朗提議停火展延更長一段時間，或同意永久停戰，待荷姆茲海峽重啟，並結束海上封鎖後，再討論核協議議題。\n\n質疑提案者是否有實權美國國務卿魯比歐透露，伊朗的協議「比預想的更好」，問題在於美方對於提交方案者是否具備實權抱持疑問，並強調「任何達成的協議和共識，絕對要能防止對方發展核武」。CNN報導，依據川普廿七日與國安高層開會商討伊朗協議時展現的態度，不太可能接受德黑蘭的最新提案。在未能解決伊朗濃縮活動及近武器級濃縮鈾庫存便重啟海峽，意味著捨棄談判的關鍵籌碼。\n\n然而，仍無法斷言川普下一步會做出何種決策。"}, {"title": "安理會交鋒未歇 中日釣魚台海域再爆對峙", "source": "聯合報 A10 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "中國大陸和日本廿七日才在聯合國安理會就東海與南海議題交鋒，中方昨日表示日本漁船進入釣魚台領海，對其採取管控並警告驅離，日方也指中國海警船連續兩天進入釣魚台周邊日本領海，雙方船艦持續對峙。新華社昨晚發布，中國海警局發言人姜略表示，四月廿八日，日本「鶴丸」號漁船非法進入釣魚台領海，中國海警艦艇依法對其採取必要管控措施並警告驅離。他重申釣魚台及其附屬島嶼是中國固有領土，敦促日方立即停止一切侵權挑釁行徑，中國海警將持續在釣魚台海域維權執法。", "full_text": "中國大陸和日本廿七日才在聯合國安理會就東海與南海議題交鋒，中方昨日表示日本漁船進入釣魚台領海，對其採取管控並警告驅離，日方也指中國海警船連續兩天進入釣魚台周邊日本領海，雙方船艦持續對峙。新華社昨晚發布，中國海警局發言人姜略表示，四月廿八日，日本「鶴丸」號漁船非法進入釣魚台領海，中國海警艦艇依法對其採取必要管控措施並警告驅離。他重申釣魚台及其附屬島嶼是中國固有領土，敦促日方立即停止一切侵權挑釁行徑，中國海警將持續在釣魚台海域維權執法。\n\n日本共同社報導，日本第十一管區海上保安總部（那霸）廿八日指，廿七日駛入尖閣諸島（釣魚台）周邊日本領海的二艘中國海警局船隻繼續留在領海內。這是中國公務船連續兩天駛入釣魚台周邊領海，也是今年第八天。第十一管區表示，兩艘船均搭載機關炮。\n\n中國海警船一邊宣揚主張，一邊試圖靠近日本漁船，日方巡邏船要求其駛離領海。在領海外側的毗連區還發現搭載機關炮的另外二艘中方船隻。包括毗連區在內，釣魚台周邊已連續一六五天發現中國公務船。\n\n中日雙方甫因東海、南海主權議題在國際場合交鋒。日本外務副大臣國光文乃廿七日在聯合國安理會海上安全問題高級別公開辯論會表達對東海與南海局勢的關切，重申日本反對任何以武力改變現狀、妨礙航行及飛越自由的企圖。中國常駐聯合國副代表孫磊則當場駁斥，除了稱東海與南海局勢保持整體穩定，還指日本護衛艦「雷」號近日穿越台海是「蓄意挑釁」。\n\n大陸外交部發言人林劍昨還稱，日方近期在軍事安全領域危險冒進和試探，挑釁動作頻頻。"}, {"title": "油市震撼 阿聯下月退出OPEC 擬增產石油 趁美伊戰爭導致油氣飆漲時滿足能源市場需求 將重挫沙國領導的油國組織", "source": "聯合報 A11 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "阿拉伯聯合大公國政府廿八日表示，計畫下個月退出石油輸出國家組織（ＯＰＥＣ），退出後將持續採取「負責任」行動，根據需求和市況以有節制方式逐步提高石油產量。阿聯官員曾多次提出退出該組織想法，並抱怨其配額制度以不公平方式限制阿聯石油出口。根據阿聯官方通訊社發布的聲明，這項退出決定是基於該國的「長期經濟願景」。", "full_text": "阿拉伯聯合大公國政府廿八日表示，計畫下個月退出石油輸出國家組織（ＯＰＥＣ），退出後將持續採取「負責任」行動，根據需求和市況以有節制方式逐步提高石油產量。阿聯官員曾多次提出退出該組織想法，並抱怨其配額制度以不公平方式限制阿聯石油出口。根據阿聯官方通訊社發布的聲明，這項退出決定是基於該國的「長期經濟願景」。\n\n聲明指出，阿聯決定退出這個加入數十年的組織，希望在美伊戰爭導致地緣政治局勢緊張、油氣價格飆升時期，滿足能源市場需求。聲明還表示，阿聯相信，全球能源需求將在中長期「持續成長」。在美伊戰爭引發歷史性能源衝擊、動盪全球經濟之際，阿聯這項舉動，將對油國組織及其實際領導者沙烏地阿拉伯造成重大打擊。\n\n但美國總統川普可能樂見，川普曾指控油國組織藉由哄抬油價，對全世界「敲竹槓」。阿聯與沙國近來關係緊張，兩國爭奪經濟、地緣政治和地區影響力，競爭日益激烈。沙國希望成為區域投資與商業中心，直接挑戰阿聯杜拜作為中東商業、金融和觀光樞紐地位。\n\n兩國在油國組織內也因石油產量配額問題發生分歧。阿聯希望增加石油輸出，沙國則試圖控制產量維持高油價。根據國際能源署統計，美伊開戰前，阿聯石油日產量約三百六十萬桶，約占油國組織總產量的百分之十二。\n\n路透報導，挪威睿諮得能源顧問公司分析師萊昂表示，「阿聯退出是油國組織的重大轉變。阿聯以及沙國是少數擁有實質備用產能的成員，這正是該組織影響市場的關鍵機制」。卡內基俄羅斯歐亞中心研究員瓦庫連科說，阿聯一直計畫將石油產量提高三成，但在油國組織限制下很難做到，「現在可能是宣布這一決定損害最小的時機，油價處於高檔，而由於荷莫茲海峽關閉，市場出現供應短缺。\n\n在海峽重新開放後，各國將補充自二月以來消耗的石油儲備，需求會維持在高水平，因此價格也會保持高位」。他表示，沒有阿聯，油國組織將大幅削弱，伊朗與伊拉克等其他產油國都沒有可觀的備用產能，「這些產能主要是由阿聯和沙國提供」。"}, {"title": "閒置儲油空間最多再撐22天 不想被迫減產 伊朗原油突圍 拚用鐵路輸陸", "source": "聯合報 A11 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "美國持續封鎖伊朗港口，伊朗石油難以運出，儲油空間快速縮減。航運追蹤機構 Kpler廿七日評估，伊朗未使用閒置儲油容量最多僅能再撐廿二天。伊朗已經開始採取極端措施維持開採避免減產，除了將原油暫存在海上油輪，更動用狀況不佳或停用的儲油槽，且考慮透過高成本的鐵路運油到中國大陸。", "full_text": "美國持續封鎖伊朗港口，伊朗石油難以運出，儲油空間快速縮減。航運追蹤機構 Kpler廿七日評估，伊朗未使用閒置儲油容量最多僅能再撐廿二天。伊朗已經開始採取極端措施維持開採避免減產，除了將原油暫存在海上油輪，更動用狀況不佳或停用的儲油槽，且考慮透過高成本的鐵路運油到中國大陸。\n\n美國持續封鎖伊朗港口，使伊朗原油難以出口，空油輪也無法進港裝載，導致國內儲油空間快速縮減。彭博引述Kpler報告指出，伊朗未使用的原油儲存容量只足以再撐十二至廿二天，石油日產量可能被迫在五月中旬前減少一百五十萬桶。根據Kpler，儘管伊朗石油產量前景嚴峻，伊朗可能要三至四個月後才會感受海上封鎖造成的財務壓力。\n\n報告指出，伊朗原油運往主要買家中國通常需約二個月，買方結算款項又需約二個月，因此封鎖對伊朗收入的衝擊會延後浮現。Kpler表示，伊朗近期出貨量已降至每日約五十六萬七千桶，而三月平均出口量約為每日一八五萬桶。Kpler目前也未發現有油輪成功規避美國封鎖；\n\n自四月十三日封鎖生效以來，伊朗原油裝船量已暴跌約七成。華爾街日報報導，為避免部分油田被迫停產，伊朗除了把原油暫存在油輪，也開始採取過去少見的應急手段，包括在南部石油重鎮阿瓦士與阿薩盧耶使用貨櫃，以及存放在狀況不佳、已停用的舊儲油槽。伊朗石油出口商工會發言人侯賽尼表示，伊朗正嘗試改由鐵路把石油運往中國。\n\n不過，鐵路運輸成本較高、效率較低，獲利遠不如海運，因此多數石油出口商不會採用。伊朗鐵路可連接中國義烏和西安，路線雖然比海運航程短，但仍需數周時間。中國大陸常駐聯合國代表傅聰廿七日在安理會說，荷莫茲海峽是重要的國際貨物和能源貿易通道，維護該地區穩定和暢通符合國際社會共同利益。\n\n海峽受阻根源在於美國和以色列對伊朗發動非法軍事行動，美國還在達成臨時停火安排的情況下加碼軍事部署，採取定向封鎖行動，是危險和不負責任行為。"}, {"title": "伊朗提先開放海峽 川普不滿意", "source": "聯合報 A11 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "美伊談判陷入僵局，外傳伊朗提議先開放荷莫茲海峽，暫時擱置核問題。紐約時報引述多名官員報導，美國總統川普廿七日在白宮戰情室主持伊朗問題會議，川普在會中表明不滿意伊朗新提案，部分官員提出再封鎖伊朗兩個月。伊朗一再拒絕美國提出的暫停核計畫並交出濃縮鈾儲備。", "full_text": "美伊談判陷入僵局，外傳伊朗提議先開放荷莫茲海峽，暫時擱置核問題。紐約時報引述多名官員報導，美國總統川普廿七日在白宮戰情室主持伊朗問題會議，川普在會中表明不滿意伊朗新提案，部分官員提出再封鎖伊朗兩個月。伊朗一再拒絕美國提出的暫停核計畫並交出濃縮鈾儲備。\n\n目前尚不清楚川普為何不滿伊朗新提案，他多次強調伊朗不能擁有核武。一名美國官員也表示，接受該提案可能會讓川普看起來未能取得勝利。白宮發言人李維特廿七日證實收到伊朗新提案，並強調美方將維持一貫紅線，但她並未具體說明紅線為何。\n\n紐時報導指出，伊朗重開海峽方案在美國政府內部引發激辯，焦點在於美伊誰握有更多談判籌碼、誰更能承受關閉荷莫茲海峽帶來的經濟壓力。延後核談判可望加速達成協議，緩解全球能源與金融市場壓力，但這等於顯示這場戰爭未能迫使伊朗在濃縮鈾問題上讓步。重開海峽談判同樣充滿風險，美方封鎖意在切斷伊朗石油出口迫使其妥協，而伊朗攻擊船隻已實質切斷能源運輸，伊朗官員並堅稱任何開放海峽的協議都應允許他們對船隻收過路費。\n\n美國官員說，川普政府內部正在討論美方是否仍握有足夠經濟籌碼，以及還需要採取哪些進一步軍事行動才能迫使伊朗讓步。部分官員認為，若再持續封鎖二個月，將重創伊朗能源產業，迫使伊朗為避免油井停產受損與高額維修成本而妥協。但也有人質疑，伊朗立場已更趨強硬，持續封鎖反而會鞏固伊朗軍方權力，目前最好的做法是先達成開放海峽協議。"}, {"title": "先解封、後談核 川普不滿 恐再封鎖荷莫茲2月 堅持伊朗不能擁有核武 稱伊通知已處於崩潰狀態 盼美快開放海峽", "source": "中國時報 AA02 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "伊朗向美國提出三階段新談判方案，主張「先解封、後談核」。《紐約時報》27日報導說，美國總統川普對此提議並不滿意，他一再堅持伊朗不能擁有核武。國務卿盧比歐也批評，伊朗仍要在荷莫茲海峽收通行費，所謂開放荷莫茲實為控制海峽。", "full_text": "伊朗向美國提出三階段新談判方案，主張「先解封、後談核」。《紐約時報》27日報導說，美國總統川普對此提議並不滿意，他一再堅持伊朗不能擁有核武。國務卿盧比歐也批評，伊朗仍要在荷莫茲海峽收通行費，所謂開放荷莫茲實為控制海峽。\n\n另外，川普28日在真實社群網站上發文指出，剛收到伊朗通知，指他們已處於崩潰狀態，希望美國盡快開放荷莫茲海峽，他們正在努力解決領導的問題。伊朗上周末提出三階段談判架構，即首先討論終止戰爭，再談荷莫茲海峽議題，最後才處理核爭議。川普及其國安團隊27日開會討論伊朗的提議。\n\n一名美國官員告訴路透，川普不滿意該方案，因為未涉及伊朗核計畫。《紐約時報》說，推遲核談判本可以是一種盡快達成協議、緩解全球能源和金融市場壓力的方式，但一名美國官員表示，若接受該方案，可能會讓川普看起來未能取得勝利。伊朗的提議還要求美解除海上封鎖。\n\n然而伊朗官員堅稱，任何開放荷莫茲海峽的協議，都應允許他們續對過往船隻徵稅收費。盧比歐在接受福斯新聞專訪時說，美方「不能容忍」伊朗決定誰可以使用荷莫茲並收取通行費。「如果他們（伊朗）所說的開放海峽的意思是『是的，海峽是開放的，但前提是你要與伊朗協調、獲得我們的許可，否則我們就炸你，而且你要付錢給我們』…（那）是完全不可接受的。」 《紐約時報》報導，針對是否接受伊朗所提的開放荷莫茲海峽方案，美國政府內部展開激烈討論，爭論焦點在於哪方擁有更多籌碼，及在水道關閉所帶來的經濟壓力下，哪方更有能力承受。部分美國官員認為，若美國的海上封鎖再維持兩個月，將對德黑蘭能源產業造成嚴重的長期損害，最終伊朗會為了避免這種長期問題而達成協議。但也有官員認為上述看法有誤，指出伊朗立場已趨強硬，而且伊斯蘭革命衛隊（IRGC）對權力的掌控反而更加穩固了。\n\n美國如果不恢復軍事行動，幾乎沒有理由相信伊朗立場會改變。若要進一步施壓，川普需要授權對民用基礎設施發動攻擊。伊朗政府發言人28日表示，伊朗早就料到美國會進行封鎖，並將這種情況納入應對方案。\n\n他說，伊朗政府主要戰略是善加利用自身地理位置，發揮伊朗北、東、西部走廊的作用。"}, {"title": "Fed會議登場 鮑爾最後一舞 升息看法聚焦 市場普遍預期利率不變，是否續留理事會、通膨上升會否升息成觀察重點", "source": "工商時報 A02 火線焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "全球經濟前景不明之中，美國聯準會（Fed）台灣時間29日（美國時間28日）展開為期兩天的貨幣政策會議，在普遍預期Fed繼續按兵不動下，外界除聚焦美國通膨上升會否讓Fed選擇升息，也關注Fed主席鮑爾會否留任Fed理事會成員。這將是鮑爾在任內主持的最後一次會議，因為其任期即將在5月15 日屆滿，為八年的任期劃下句點。美國參院預計 30 日對任命華許（K evin Warsh）為新 Fed 主席的程序進行表決，由於司法部撤銷對鮑爾的刑事調查...", "full_text": "全球經濟前景不明之中，美國聯準會（Fed）台灣時間29日（美國時間28日）展開為期兩天的貨幣政策會議，在普遍預期Fed繼續按兵不動下，外界除聚焦美國通膨上升會否讓Fed選擇升息，也關注Fed主席鮑爾會否留任Fed理事會成員。這將是鮑爾在任內主持的最後一次會議，因為其任期即將在5月15 日屆滿，為八年的任期劃下句點。美國參院預計 30 日對任命華許（K evin Warsh）為新 Fed 主席的程序進行表決，由於司法部撤銷對鮑爾的刑事調查，為華許接替鮑爾清除政治障礙。\n\n市場普遍預期Fed按兵不動，將基準利率維持在3.5％到3.75％區間不變。外界對Fed政策決議和鮑爾主持會後記者會的觀察焦點之一：若美國通膨升溫，今年稍晚升息會否成為Fed選項。因為目前能源價格依然居高不下，伊朗戰爭陷入僵局，經濟和貨幣政策前景不明的情況可能會持續下去。\n\n外界關心的另一焦點，是華許如外界預期成為下一屆 Fed 主席後，鮑爾是否繼續留在 Fed 擔任理事會成員。過去Fed主席在任期屆滿後，幾乎不再擔任理事而離開。由於川普政府對鮑爾百般施壓和羞辱，並以Fed總部整修成本超支問題，對其展開刑事調查，令鮑爾無法忍受，揚言要等到調查以透明、明確方式，徹底和真正結束後才會離開理事會。\n\n若鮑爾離開理事會，川普可任命新人選去填補空缺，從而增加對 F ed決策的影響力。若鮑爾繼續留任，除了能繼續發揮其影響力外，在其理事任期於2028年1月結束前，理事會沒有空缺可讓川普安排自己人。目前Fed高層政策立場偏向中立和鷹派。\n\n像理事庫克（Lisa Cook），以及包括明尼亞波里斯、芝加哥、里奇蒙、波士頓、聖路易斯與達拉斯等地區的聯準銀行總裁都屬於鷹派。立場中性的包括鮑爾、副主席傑佛遜（Philip Jefferson）、理事巴爾（Michael Barr）以及包括紐約、費城與舊金山等地區的聯準銀行總裁。屬於鴿派的僅三位，即主張年底前降息三次、負責金融監管的聯準會副主席鮑曼（Michelle Bowman），主張降息三到四次的理事米蘭（Stephen Miran），以及主持降息的理事沃勒（Christopher Wall er）。"}, {"title": "美陷停滯性通膨…戴利歐籲華許勿倉促降息", "source": "工商時報 A02 火線焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "全球最大對沖基金橋水創辦人戴利歐（Ray Dalio）27日警告，美國經濟已跌進停滯性通膨環境，若即將接掌聯準會（Fed）主席的華許（Kevin Warsh）在此時降息，將是錯誤決策。戴利歐在接受美國財經媒體CNBC專訪時指出，美國通膨壓力依舊，加上經濟成長放緩，在這樣的環境背景下，聯準會官員需要保持謹慎。他表示，美國確實處於停滯性通膨時期，通膨遠遠高於目標。", "full_text": "全球最大對沖基金橋水創辦人戴利歐（Ray Dalio）27日警告，美國經濟已跌進停滯性通膨環境，若即將接掌聯準會（Fed）主席的華許（Kevin Warsh）在此時降息，將是錯誤決策。戴利歐在接受美國財經媒體CNBC專訪時指出，美國通膨壓力依舊，加上經濟成長放緩，在這樣的環境背景下，聯準會官員需要保持謹慎。他表示，美國確實處於停滯性通膨時期，通膨遠遠高於目標。\n\n在這個關鍵時刻，若華許選擇降息，可能損害外界對聯準會的信心。戴利歐認為，此時調降利率將削弱聯準會的信譽，其他國家的貨幣政策也未顯示出降息趨勢，當前的經濟訊號不傾向降息。據芝商所FedWatch工具顯示，交易員押注聯準會在本周例會篤定按兵不動，而且今年底前利率都可能保持不變。\n\n美國司法部日前撤銷對聯準會主席鮑爾的刑事調查，為華許接掌聯準會鋪平道路。美國總統川普已明確表示，他希望華許上任後能快速降息。然現實中，華許想要降息仍面臨多重難關，包括油價大漲推高通膨與政治獨立性引發外界質疑，且不是華許一人說了算，還需另11名決策官員投票，其中大多數都認為降息時機未到。\n\n華許日前在提名確認聽證會矢言維持聯準會獨立性，對未來利率走向著墨不多。美銀證券美國經濟學家巴維在寫給客戶的報告中指出，「華許描繪的展望更偏向按兵不動，而不是降息。」 此外，美國3月通膨躥升至3.3％的2年新高紀錄，大幅高於聯準會 2％的目標，讓聯準會更難降息。"}, {"title": "日銀鷹派按兵不動 植田重申升息立場", "source": "工商時報 A02 火線焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "日本央行（日銀）28日決議維持利率不變，但三名委員主張應升息 1碼，顯示部分官員擔憂中東衝突帶來的通膨壓力。日銀總裁植田和男（Kazuo Ueda）在會後記者會重申，儘管美伊衝突加劇經濟不確定性，但他的立場是未來仍可能進一步升息。值得注意的是，植田表示：「若通膨上行風險明顯顯現或持續升高，且經濟下行或嚴重衰退風險依然有限，我們就有可能升息。」他強調，日銀已做好升息的準備，以避免能源價格衝擊進一步推升整體通膨，但前提是「美伊衝突造成的經濟...", "full_text": "日本央行（日銀）28日決議維持利率不變，但三名委員主張應升息 1碼，顯示部分官員擔憂中東衝突帶來的通膨壓力。日銀總裁植田和男（Kazuo Ueda）在會後記者會重申，儘管美伊衝突加劇經濟不確定性，但他的立場是未來仍可能進一步升息。值得注意的是，植田表示：「若通膨上行風險明顯顯現或持續升高，且經濟下行或嚴重衰退風險依然有限，我們就有可能升息。」他強調，日銀已做好升息的準備，以避免能源價格衝擊進一步推升整體通膨，但前提是「美伊衝突造成的經濟放緩僅屬溫和程度。」 日銀決策委員會以6比3的票數決定將利率維持在0.75％，3票反對票為2016年1月以來最多。這使得經濟學家將日銀此次決策形容為「 鷹派按兵不動」（hawkish hold），同時推升市場對最快6月升息的預期。\n\n根據路透調查顯示，有近三分之二的經濟學家預期，日銀6月下次例會將把基準利率上調1碼至1％。此外，日銀也上調通膨預測，以反映美伊戰爭引發的油價飆升影響，並下調短期經濟成長預期。對此植田表示，雖然有三位委員擔心通膨可能加速升溫，但多數委員認為沒有必要立刻採取行動。\n\n但也有分析指出，植田和男在記者會上的語氣偏向中性。三菱日聯銀行（MUFG）分析師哈德曼（Lee Hardman）便表示，植田並未釋出強烈訊號，表明下次會議就會升息。植田重申，日銀需要更多時間來評估中東衝突的影響，下次利率決策將取決於地緣政治風險後續發展。\n\n他表示：「我希望進一步觀察中東局勢發展，及其對日本經濟與通膨的影響。」 植田並未透露下次升息的時間，但同時強調，日銀十分清楚目前利率仍低於中性水平（既不刺激也不限制經濟成長）。美伊衝突加劇日銀逐步將利率升至中性水平的難度，市場普遍認為日銀中性利率約在1.5％左右。\n\n本周是全球超級央行周，日銀會議率先登場，宣布利率按兵不動，原因是中東戰爭導致經濟前景不明。接下來陸續有歐央、英央以及美國聯準會在內的多家央行都將公布利貨幣決策。"}, {"title": "金融圈看超級央行周：能源價格主導美國雙率動向", "source": "工商時報 A02 火線焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "全球「超級央行周」登場。永豐金控研究團隊預估，美伊戰爭談判的不確定性，令利率與油價保持高檔，預期美國聯準會FOMC會議結果將呈現「中性偏鷹」。在通膨壓力猶存、AI供應鏈撐起台灣基本面背景下，我國央行今年利率持續按兵不動的機率較高。", "full_text": "全球「超級央行周」登場。永豐金控研究團隊預估，美伊戰爭談判的不確定性，令利率與油價保持高檔，預期美國聯準會FOMC會議結果將呈現「中性偏鷹」。在通膨壓力猶存、AI供應鏈撐起台灣基本面背景下，我國央行今年利率持續按兵不動的機率較高。\n\n金融圈主管認為，除緊盯美國聯準會等主要央行的貨幣政策走向外，更聚焦中東戰爭帶來的通膨升溫風險。永豐金最新分析指出，展望未來地緣政治前景，能源價格持續主導美元雙率，預估美元指數區間將介於97～99.5之間，美國10年期公債殖利率區間為4.1％～4.4％。台股28日盤中再度突破4萬點大關，但收盤未能站穩，熱錢啟動獲利了結匯出潮，新台幣匯率盤中最低觸及31.586元、重貶逾1角。\n\n匯銀主管表示，本周「超級央行周」，各國決策將牽動國際股匯走勢，市場屏息以待，國內匯市因外資逢高獲利了結、腳底抹油連兩天落跑，新台幣匯率盤中急貶逾 1 角、重返 31.5 字頭價位，終場貶值5.1分，收在31.518元，終止連兩升並寫下近一周新低，市場交投熱絡，總成交量高達26.395億美元。匯銀主管分析，台股近「關」情卻，連兩天盤中觸及4萬點大關，部分外資居高思危、搶先獲利了結，加上美伊談判停滯，市場態度偏觀望。根據證交所統計，外資連兩天賣超台股，27日拋售逾500億元後， 28日再大賣近400億元，連續兩天累計賣超規模超過900億元，成為台股無法順利站穩4萬大關的關鍵主因。"}, {"title": "AI晶片狂潮助攻 韓股市值 超英居全球第八", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "AI狂潮帶動韓國半導體類股狂飆，大幅推升韓國股市市值，韓股市值現已超越英國，躍居全球第八大股市，緊追在台灣之後。今年來韓國上市公司總市值激增超過45％，市值突破4兆美元大關，達4.04兆美元。相較之下，英國股市同期漲幅僅有 3％，市值為 3. 99 兆美元。", "full_text": "AI狂潮帶動韓國半導體類股狂飆，大幅推升韓國股市市值，韓股市值現已超越英國，躍居全球第八大股市，緊追在台灣之後。今年來韓國上市公司總市值激增超過45％，市值突破4兆美元大關，達4.04兆美元。相較之下，英國股市同期漲幅僅有 3％，市值為 3. 99 兆美元。\n\n值得一提的是，英國股市規模在 2024 年底時約為韓國股市的兩倍。韓股漲勢凌厲凸顯全球對AI相關企業的興趣，推動韓國前兩大企業三星電子和SK海力士股價飛漲。這兩家半導體巨擘占韓國指標Kospi 指數市值超過40％。\n\n除了AI助攻外，韓國總統李在明的親商政策和企業治理改革，也給予股市有力支撐，推動股價上漲。韓股走勢與台股如出一轍，台股在 4 月稍早超越英國，躋身全球第七大股市。台股市值目前達 4.48 兆美元，正逼近加拿大。\n\n台股的漲勢拜台積電所賜，單單台積電市值便占台股總市值45％。摩根大通資產管理公司新興市場與亞太投資專家Francesco Chan表示，韓股和台股快速崛起反映全球股市結構性再平衡，由台韓在AI硬體的領導優勢推動，而非戰術上的資產配置。台韓身為AI供應鏈的支柱，憑藉高階晶圓代工和記憶體超級循環優勢，持續吸引結構性資本流入。\n\n韓股28日盤中一度升破6,700點，改寫盤中新高紀錄，終場收高0. 4％，報6,641.02點，刷新收盤新高紀錄。高盛看好韓股後市，預期韓股將站上8,000點。英國富時100指數今年來僅上漲3％，表現明顯遜於受AI推動的股市。\n\n英股的漲勢主要由金融、能源和礦業等傳統產業推動。雖然台韓股市市值超越英國，但經濟規模仍明顯小於歐洲主要國家。根據國際貨幣基金（IMF）預測，今年韓國GDP估計達1.9兆美元，台灣9,770億美元，而德國、英國和法國預估皆在3兆美元以上。"}, {"title": "定調未來經濟工作，持續擴大內需、穩定房市 中共中央政治局會議 實施適度寬鬆貨幣政策", "source": "工商時報 A10 大陸財經", "cat": "國際經濟情勢", "priority": 0, "summary": "中共中央政治局 28 日舉行會議，分析當前經濟形勢並定調接下來的經濟工作。會議強調，要用好用足宏觀政策，精準有效實施更加積極的財政政策和適度寬鬆的貨幣政策，要增強貨幣政策的前瞻性、靈活性、針對性，保持流動性充裕。分析指出，對比去年4月、7月的中央政治局會議，以及去年12月的中央經濟工作會議，此次會議對下階段宏觀政策定調新增「精準有效」的表述要求，整體部署兼顧當下穩增長與長遠轉型發展，節奏穩健，方向清晰。", "full_text": "中共中央政治局 28 日舉行會議，分析當前經濟形勢並定調接下來的經濟工作。會議強調，要用好用足宏觀政策，精準有效實施更加積極的財政政策和適度寬鬆的貨幣政策，要增強貨幣政策的前瞻性、靈活性、針對性，保持流動性充裕。分析指出，對比去年4月、7月的中央政治局會議，以及去年12月的中央經濟工作會議，此次會議對下階段宏觀政策定調新增「精準有效」的表述要求，整體部署兼顧當下穩增長與長遠轉型發展，節奏穩健，方向清晰。\n\n中共中央政治局會議通常每月召開一次，其中4月、7月、12月的主題與經濟相關，針對開年、下半年與下一年度經濟情勢進行定調，並對經濟工作做出部署。對於今年開年表現，會議表示，經濟起步有力，主要指標好於預期，彰顯強大韌性和活力。但會議也提到，中國大陸正面臨一些困難與挑戰，經濟持續穩中向好的基礎仍需進一步鞏固。\n\n要增強信心，以更大力度和更實措施抓好經濟工作。財政與貨幣政策方面，會議表示，要持續優化財政支出結構，兜牢基層「三保」（保基本民生、保工資、保運轉）底線。要增強貨幣政策前瞻性、靈活性、針對性，保持流動性充裕。\n\n匯率方面，要維持人民幣匯率在合理均衡水準上的基本穩定。其他宏觀政策部分，會議表示，要更好統籌國內國際兩個大局，堅定不移深化改革開放，推動科技自立自強、產業鏈自主可控。要持續擴大內需、優化供給，著力穩就業、穩企業、穩市場、穩預期，增強經濟發展內生動力，進一步做強國內大循環，做優國內國際雙循環，努力實現「十五五」良好開局。\n\n會議還提到，要加速建立現代化產業體系，維持製造業合理比重，深入整治「內捲式」競爭。要全面實施「人工智能+」行動，發展智能經濟新形態。同時努力穩定房地產市場，紮實推動城市更新，並有序化解地方政府債務風險。\n\n中信證券首席經濟學家明明表示，在「精準有效」的要求下，中國人民銀行或將加強對結構性貨幣政策的支持。鑑於「保持流動性充裕」的表述在近期多個重要場合出現頻率較高，未來預期流動性將維持寬鬆狀態。招聯首席經濟學家董希淼指出，整體政策基調未變，但政策工具的使用將更加講究方法和時機。\n\n如果未來經濟數據超預期下滑，人行可能即時啟用全面降準降息，如果市場運行平穩，則會更多運用結構性貨幣政策工具，加強對重點領域和薄弱環節的精準滴灌。"}, {"title": "傳人行邀銀行喝咖啡 加強放款力度", "source": "工商時報 A10 大陸財經", "cat": "國際經濟情勢", "priority": 0, "summary": "為因應經濟風險升溫並維持信貸動能，中國人民銀行近期傳出邀請部分商業銀行「喝咖啡」，明確指示4月須加大放款力度，以確保單月貸款餘額維持月增趨勢。路透引述知情人士指出，中國人行此舉旨在內需疲弱與地緣政治不確定性升高之際，強化金融體系對經濟的支撐作用。報導稱，市場指出，人行罕見地要求銀行擴大信貸投放，顯示決策層對經濟前景的關注升高。", "full_text": "為因應經濟風險升溫並維持信貸動能，中國人民銀行近期傳出邀請部分商業銀行「喝咖啡」，明確指示4月須加大放款力度，以確保單月貸款餘額維持月增趨勢。路透引述知情人士指出，中國人行此舉旨在內需疲弱與地緣政治不確定性升高之際，強化金融體系對經濟的支撐作用。報導稱，市場指出，人行罕見地要求銀行擴大信貸投放，顯示決策層對經濟前景的關注升高。\n\n由於美伊戰局撲朔迷離，中國同時面臨內需疲軟與房地產債務問題，經濟復甦基礎仍顯脆弱。分析人士預期，4月信貸數據通常偏弱，主因為該月向來是傳統放款淡季，加上銀行通常於第一季「開門紅」期間提前透支放款額度，導致後續月份基期偏低。消息人士表示，官方此舉反映出對經濟復甦不均與有效融資需求疲弱的擔憂。\n\n透過引導金融機構維持合理放款節奏，避免信貸出現明顯收縮，讓金融體系持續助力「穩增長」。數據顯示，大陸3月新增貸款低於預期，反映企業與民眾對未來收入與前景轉趨保守，信貸需求偏弱。據路透調查，大陸第一季GDP增速雖受出口帶動略有回溫，但隨著外部需求可能受壓，加上地緣政治衝擊企業獲利，今年經濟成長動能恐趨降溫。\n\n報導稱，政策方面，北京已將2026年財政赤字目標設定在約GDP的 4％，並加大發債力度支撐經濟。由於融資需求仍顯不足，部分銀行為達成放貸增長目標，轉向透過大量買入票據來「補足」缺口。在此影響之下，銀行對票據的配置需求持續噴發，帶動票據利率延續上周跌勢，6個月期票據利率已經跌破0.6％關卡，最新成交價落在 0.58％至 0.59％附近；\n\n至於 5 月到期的短期票據，利率更是慘跌至 0.01％的「地板價」。"}, {"title": "為維護保戶權益…投資型保單增兩大禁令", "source": "工商時報 A11 金融市場1", "cat": "國際經濟情勢", "priority": 0, "summary": "為維護保戶權益，金管會28日宣布，投資型保單新增兩大禁令，一是投資型保險投資標的不得包含具損失吸收能力債券（TLAC債券）；二是類全委投資型保單若是透過債券基金、主動式ETF、國內外ETF、 指數型基金（不在交易所掛牌的指數基金）投資「非投等債或新興市場債」將設有兩上限，分別是合計投資上限為20％、非投等債上限1 0％。保險局副局長蔡火炎說明，考量TLAC債券跟一般債券有風險差異性，現行證券商及信託業均不得接受非專業投資人委託投資TLA...", "full_text": "為維護保戶權益，金管會28日宣布，投資型保單新增兩大禁令，一是投資型保險投資標的不得包含具損失吸收能力債券（TLAC債券）；二是類全委投資型保單若是透過債券基金、主動式ETF、國內外ETF、 指數型基金（不在交易所掛牌的指數基金）投資「非投等債或新興市場債」將設有兩上限，分別是合計投資上限為20％、非投等債上限1 0％。保險局副局長蔡火炎說明，考量TLAC債券跟一般債券有風險差異性，現行證券商及信託業均不得接受非專業投資人委託投資TLAC債券，為使各業監理法令為一致性，因此明定投資型保險連結投資標的不得包含TLAC債券。\n\n目前無投資型保單連結TLAC債券，因此此項規定暫無業者受到影響。為強化投資型保險商品風險控管，除現行納管的債券型基金外，也將以投資非投資等級債券及新興市場債券為訴求的主動式ETF，以及境內外指數股票型基金與指數型基金，一併納入限額管理。依規定，類全委投資型保單連結前述高風險債券相關基金的投資比重合計不得逾20％，其中，投資於非投資等級債券基金的比重不得超過10％；\n\n一般投資型保單，不得連結相關標的。蔡火炎指出，目前並無保單銷售及商品設計受到此規範影響，先前投信投顧公會有建議提高投資比率上限，金管會評估後認為，投資型保單仍應以長期穩健的投資標的為主，因此維持現行20％與10％的規範，若民眾有想買以非投資等級債券或新興市場債券為主題的基金，也可直接透過基金市場投資。"}, {"title": "布蘭特油價站回110美元 外媒：川普不滿意伊朗新的提案 雙方談判仍陷僵局", "source": "經濟日報 A02 話題", "cat": "國際經濟情勢", "priority": 0, "summary": "國際油價續漲，布蘭特 28 日站回每桶 110 美元之上，因美伊談判仍陷僵局，外媒報導川普不滿意伊朗的新提案，認為德黑蘭當局不願接受美國的關鍵要求，包括停止核濃縮並承諾永不發展核武。川普 28日發文宣稱，伊朗通知美國他們處於崩潰狀態，希望美方儘快開啟荷莫茲海峽。根據彭博資訊報價，布蘭特原油期貨28日盤中上漲2.5%至每桶111.25美元，本周累計漲幅近6%。", "full_text": "國際油價續漲，布蘭特 28 日站回每桶 110 美元之上，因美伊談判仍陷僵局，外媒報導川普不滿意伊朗的新提案，認為德黑蘭當局不願接受美國的關鍵要求，包括停止核濃縮並承諾永不發展核武。川普 28日發文宣稱，伊朗通知美國他們處於崩潰狀態，希望美方儘快開啟荷莫茲海峽。根據彭博資訊報價，布蘭特原油期貨28日盤中上漲2.5%至每桶111.25美元，本周累計漲幅近6%。\n\n西德州中級原油期貨則上漲3.3%，報每桶99.6美元。荷蘭合作銀行（Rabobank）能源策略師施密特說：「最新提出的伊朗方案似乎難以取得突破，美國接受的可能性極低。油市必須面對現實：封鎖僵局難有迅速解決辦法。」 美國國務卿魯比歐表示，伊朗似乎仍希望保留對荷莫茲海峽的控制權，這對美國來說是不可接受的。他在 27日播出的福斯新聞採訪中表達了此一觀點。紐時報導則說，伊朗重開海峽方案在美國政府內部引發激辯，焦點在於美伊誰握有更多談判籌碼、誰更能承受關閉荷莫茲海峽帶來的經濟壓力。\n\n美國官員說，川普政府內部正在討論美方是否仍握有足夠經濟籌碼，以及還需要採取哪些進一步軍事行動才能迫使伊朗讓步。部分官員認為，若再持續封鎖二個月，將重創伊朗能源產業，迫使伊朗為避免油井停產受損與高額維修成本而妥協。但也有人質疑，伊朗立場已更趨強硬，持續封鎖反而會鞏固伊朗軍方權力，目前最好的做法是先達成開放海峽協議。\n\n美國官員還認為，伊朗談判代表尚未獲得領導層授權在核問題讓步，使得妥協與和平協議難以推進。美國政府評估認為，在這個背景下，若不恢復軍事行動，幾乎沒有理由認為伊朗立場會轉變。目前荷莫茲仍處於實質運輸受阻的情況。\n\n但船舶追蹤數據顯示，一艘由阿聯ADNOC管理的液化天然氣（LNG）運輸船，已穿越荷莫茲海峽並接近印度。若經證實，這將是自伊朗戰爭爆發以來，首艘成功穿越荷莫茲海峽的 LNG船。另據知情人士透露，沙烏地阿拉伯國家石油公司（Saudi Aramco）因其主要出口設施在2月底受損，導致供應中斷，下個月將繼續暫停液化石油氣（LPG）的裝運。"}, {"title": "日銀利率不動 決策有異見 九人委員會 三人主張升息1", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "日本銀行（央行）28日維持基準利率不變，但九人決策委員會中有三人提出異議，主張升息 1碼，分歧的投票結果加上總裁植田和男暗示，若經濟成長放緩幅度適中近期將會升息，使6月升息的機率大增。日圓匯率在平盤附近波動，為1美元兌159.57日圓。日銀在結束兩天會議後，一如市場預期宣布基準利率維持在0.75%不變。", "full_text": "日本銀行（央行）28日維持基準利率不變，但九人決策委員會中有三人提出異議，主張升息 1碼，分歧的投票結果加上總裁植田和男暗示，若經濟成長放緩幅度適中近期將會升息，使6月升息的機率大增。日圓匯率在平盤附近波動，為1美元兌159.57日圓。日銀在結束兩天會議後，一如市場預期宣布基準利率維持在0.75%不變。\n\n根據彭博資訊先前訪調的51位經濟學家，80%預測此次會議將按兵不動，以反映伊朗戰爭的不確定性，及其引發的能源價格飆升使經濟前景蒙上陰影，致使央行暫且採觀望態度。然而，在這次投票中有三位委員持反對意見，6比3的投票結果，是植田和男擔任日銀總裁以來的最大分歧，凸顯日銀採行緊縮政策的壓力日漸增大。投票反對利率不變的委員是：中川順子、高田創、田村直樹，他們主張應升息1碼，將利率調升至1%。\n\n新加坡銀行Lombard Odier策略師李浩敏（Homin Lee，音譯）表示，這種分歧「強化了6月升息的展望」。植田和男在會後記者會表示，央行決定暫時維持利率不變，以便有更多時間評估伊朗衝突的影響，並仔細觀察目前仍被視為由供應衝擊引發的暫時性通膨。但他強調，只要伊朗戰爭造成的經濟放緩幅度適中，央行隨時準備升息，以防止能源衝擊引發更廣泛的通膨。\n\n他並表示：「如果通膨風險成為現實或顯著升高，我們可能會調高利率，前提是下行經濟風險或經濟急劇惡化的風險受到限制。」 根據隔夜交換市場定價，交易人士認為日銀在6月16日會議升息的機率為74%。彭博的調查也顯示，有57%的觀察家預測日銀屆時將採取行動。\n\n日銀在同日發布季度展望報告，將本會計年度的核心通膨率預估值上調至2.8%，高於市場預期，同時將今年經濟成長率預估值從1%下修至0.5%。日銀強調，有必要密切關注中東局勢與油價發展。在未爆發伊朗戰爭之前，市場原本預期日銀本次會議幾乎確定會升息，但美伊衝突在 2月底爆發並持續至今，打亂了原先的預期。\n\n許多經濟學家已轉而預測日銀將延至6月才會升息。"}, {"title": "碼 6月升息機率大增 日圓在平盤附近波動", "source": "EPC彙整", "cat": "國際經濟情勢", "priority": 0, "summary": "日本銀行（央行）28日維持基準利率不變，但九人決策委員會中有三人提出異議，主張升息 1碼，分歧的投票結果加上總裁植田和男暗示，若經濟成長放緩幅度適中近期將會升息，使6月升息的機率大增。日圓匯率在平盤附近波動，為1美元兌159.57日圓。日銀在結束兩天會議後，一如市場預期宣布基準利率維持在0.75%不變。", "full_text": "日本銀行（央行）28日維持基準利率不變，但九人決策委員會中有三人提出異議，主張升息 1碼，分歧的投票結果加上總裁植田和男暗示，若經濟成長放緩幅度適中近期將會升息，使6月升息的機率大增。日圓匯率在平盤附近波動，為1美元兌159.57日圓。日銀在結束兩天會議後，一如市場預期宣布基準利率維持在0.75%不變。\n\n根據彭博資訊先前訪調的51位經濟學家，80%預測此次會議將按兵不動，以反映伊朗戰爭的不確定性，及其引發的能源價格飆升使經濟前景蒙上陰影，致使央行暫且採觀望態度。然而，在這次投票中有三位委員持反對意見，6比3的投票結果，是植田和男擔任日銀總裁以來的最大分歧，凸顯日銀採行緊縮政策的壓力日漸增大。投票反對利率不變的委員是：中川順子、高田創、田村直樹，他們主張應升息1碼，將利率調升至1%。\n\n新加坡銀行Lombard Odier策略師李浩敏（Homin Lee，音譯）表示，這種分歧「強化了6月升息的展望」。植田和男在會後記者會表示，央行決定暫時維持利率不變，以便有更多時間評估伊朗衝突的影響，並仔細觀察目前仍被視為由供應衝擊引發的暫時性通膨。但他強調，只要伊朗戰爭造成的經濟放緩幅度適中，央行隨時準備升息，以防止能源衝擊引發更廣泛的通膨。\n\n他並表示：「如果通膨風險成為現實或顯著升高，我們可能會調高利率，前提是下行經濟風險或經濟急劇惡化的風險受到限制。」 根據隔夜交換市場定價，交易人士認為日銀在6月16日會議升息的機率為74%。彭博的調查也顯示，有57%的觀察家預測日銀屆時將採取行動。\n\n日銀在同日發布季度展望報告，將本會計年度的核心通膨率預估值上調至2.8%，高於市場預期，同時將今年經濟成長率預估值從1%下修至0.5%。日銀強調，有必要密切關注中東局勢與油價發展。在未爆發伊朗戰爭之前，市場原本預期日銀本次會議幾乎確定會升息，但美伊衝突在 2月底爆發並持續至今，打亂了原先的預期。\n\n許多經濟學家已轉而預測日銀將延至6月才會升息。"}, {"title": "超越英國 躍居全球第八 韓股市值飆升 緊追台股", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "南韓股市在人工智慧（AI）類股帶動下，今年市值已飆升超過45%，達到4.04兆美元，超越英國，成為全球第八大股票市場，緊追在第七名的台股之後。彭博資訊彙編的資料顯示，今年南韓上市公司的總市值已飆升超過45%，達到4.04兆美元；而英國股市市值只上升約3%，至3.99兆美元。", "full_text": "南韓股市在人工智慧（AI）類股帶動下，今年市值已飆升超過45%，達到4.04兆美元，超越英國，成為全球第八大股票市場，緊追在第七名的台股之後。彭博資訊彙編的資料顯示，今年南韓上市公司的總市值已飆升超過45%，達到4.04兆美元；而英國股市市值只上升約3%，至3.99兆美元。\n\n不過是短短一年多前，2024年底的英國股市規模還是南韓的兩倍左右。南韓股市市值飆升，凸顯出全球資金正轉向AI相關的企業，這也帶動了南韓兩大上市公司，三星電子、SK海力士的股價上漲。這兩家記憶體大廠目前合計占韓股大盤KOSPI總市值的40%以上。\n\n除了AI題材，南韓總統李在明推動公司治理改革與親市場政策，亦有助南韓股市上市公司提升股價。摩根資產管理新興市場及亞太股票投資策略專家陳智灝說：「韓國與台灣的迅速崛起，反映出全球股市正在進行結構性的再平衡，驅動力來自於他們在AI硬體領域的領導地位，而非戰術性的資產配置。」「做為AI供應鏈的支柱，這些經濟體在高階晶圓代工與記憶體領域擁有『超級周期』優勢，正吸引持續性的、結構性的資金流入。」 目前，華爾街策略師依然看好南韓股市，理由是AI需求帶動獲利上修，同時估值也甚具吸引力。高盛集團現已將KOSPI指數目標值調高至8,000點，相較於28日收盤的6,641.02點，仍有20%的上漲空間。南韓股市的漲勢類似於台股，後者市值在本月稍早也超越英國，成為全球第七大股市。\n\n台股市值現在約為 4.48兆美元，步步逼近加拿大股市。今年英國股市的富時100指數的漲幅，與MSCI全球指數相差不大，但遠落後於AI熱潮受惠的市場大幅漲勢。英股做為歐洲最大的股票市場，仍以金融、民生消費以及能源、礦業等傳統產業為主。\n\n儘管亞洲晶片強國的股市市值大幅攀升，但這些國家的經濟規模仍遠小於主要歐洲國家。"}, {"title": "習近平:更大力度抓好經濟 政治局會議 總書記定調發展方向 推動科技自立自強、關注房地產市場等", "source": "經濟日報 A09 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "中共總書記習近平昨（28）日在中央政治局會議中定調，將「更大力度」和「更實舉措」抓好經濟工作，推動科技自立自強、產業鏈自主可控，並關注房地產市場、地方債務及資本市場信心議題。大陸今年第1季GDP成長5%，落在官方設定的「4.5%至5%」全年目標區間的上限。會議認為，今年以來大陸經濟起步有力，主要指標優於預期，彰顯強大韌性和活力。", "full_text": "中共總書記習近平昨（28）日在中央政治局會議中定調，將「更大力度」和「更實舉措」抓好經濟工作，推動科技自立自強、產業鏈自主可控，並關注房地產市場、地方債務及資本市場信心議題。大陸今年第1季GDP成長5%，落在官方設定的「4.5%至5%」全年目標區間的上限。會議認為，今年以來大陸經濟起步有力，主要指標優於預期，彰顯強大韌性和活力。\n\n同時，也面臨一些困難和挑戰，經濟持續穩中向好的基礎還需進一步鞏固。一財網報導，招聯首席經濟學家董希淼分析，面對第1季經濟良好開局但穩固基礎仍需鞏固的局面，當前工作的重點是用好用足前期已經推出的政策，確保政策紅利充分釋放。擴大內需方面，會議指出，要擴大優質商品和服務供給，推動消費升級。\n\n實施服務業擴能提質行動。加強水網、新型電網、算力網、新一代通信網、城市地下管網、物流網等規劃建設。推動條件成熟的重大工程項目開工。\n\n產業發展方面，要保持製造業合理比重。推進全國統一大市場建設，整治內捲式競爭。全面實施「人工智能+」行動，發展智能經濟新形態，完善人工智能治理。\n\n進一步深化國資國企改革。面對中東局勢衝擊全球能源供給。本次會議特別點出，要系統應對外部衝擊挑戰，提高能源資源安全保障水平，以高質量發展的確定性應對各種不確定性。\n\n針對防範化解重點領域風險，會議點名房地產市場、地方政府債務風險、拖欠企業帳款等問題。並要推動中小金融機構改革，穩定和增強資本市場信心。分析認為，會議表述變化不大，政策上保持延續，後續關注外部衝擊對經濟帶來的壓力，若第 2 季出口增長轉負，政策支持力度有望加碼。"}, {"title": "人行引導擴大信貸投放", "source": "經濟日報 A09 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "大陸信貸動能轉弱之際，政策面出現動作。市場消息稱，中國人民銀行（大陸央行）近期罕見要求部分銀行在 4月擴大貸款投放、確保貸款餘額維持月增，顯示在外部風險升溫與內需偏弱背景下，北京當局正加強引導信貸節奏，以穩定經濟支撐力道。路透報導，消息人士透露，人行近期召集部分銀行召開信貸形勢分析會議，關注近期信貸投放節奏，並要求銀行確保4月貸款餘額按月維持正成長，以維持金融對實體經濟的支持力度。", "full_text": "大陸信貸動能轉弱之際，政策面出現動作。市場消息稱，中國人民銀行（大陸央行）近期罕見要求部分銀行在 4月擴大貸款投放、確保貸款餘額維持月增，顯示在外部風險升溫與內需偏弱背景下，北京當局正加強引導信貸節奏，以穩定經濟支撐力道。路透報導，消息人士透露，人行近期召集部分銀行召開信貸形勢分析會議，關注近期信貸投放節奏，並要求銀行確保4月貸款餘額按月維持正成長，以維持金融對實體經濟的支持力度。\n\n報導稱，人行專門召開會議要求銀行擴大信貸的情況較為罕見，此舉正值市場對中東衝突衝擊經濟的疑慮升溫之際，加上大陸國內面臨消費疲弱與房地產債務危機問題。分析人士預期，4月信貸數據將走弱，因該月通常為貸款需求「淡季」。銀行一般在第1季配合傳統放貸節奏提前投放貸款，導致後續月分數據相對偏弱。\n\n消息人士指出，監管部門此舉反映其對經濟復甦不均衡及有效融資需求不足的關注，並希望透過引導金融機構維持合理放貸節奏，避免信貸明顯收縮，維持金融對穩定經濟增長的支撐作用。"}, {"title": "紐時︰伊戰衝擊中國出口、內需更虛", "source": "自由時報 A02 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "《紐約時報》報導，伊朗戰爭引發的能源價格上漲正拖累中國經濟，使早已疲軟的消費支出進一步放緩，並衝擊關鍵出口產業。法國外貿銀行亞太首席經濟學家艾雷蘿預測，中國今年四．五％的經濟成長目標恐難達成。報導指出，汽車銷售與生產是新近疲軟的最明確跡象之一，也是經濟困境的先行指標。", "full_text": "《紐約時報》報導，伊朗戰爭引發的能源價格上漲正拖累中國經濟，使早已疲軟的消費支出進一步放緩，並衝擊關鍵出口產業。法國外貿銀行亞太首席經濟學家艾雷蘿預測，中國今年四．五％的經濟成長目標恐難達成。報導指出，汽車銷售與生產是新近疲軟的最明確跡象之一，也是經濟困境的先行指標。\n\n汽車是中國家庭僅次於房地產的第二大消費品類，該產業帶動鋼鐵、玻璃與其他材料的需求。4月汽車產量年減27％中國乘用車市場信息聯席會數據顯示，四月前十九天，中國汽車零售銷售量年減二十六％，燃油車更暴跌近四十％。銷售量銳減導致累積大量的滯銷車輛，進而引發減產；\n\n四月前兩週，中國汽車產量年減二十七％，降幅劇烈。3月零售額僅年增1.7％報導表示，表面看來，中國經濟仍具韌性，但深入分析便能發現潛藏的脆弱。中國官方近日公布，今年前三月經濟成長五．三％，但成長動能主要集中在一、二月，三月零售額急遽放緩，僅年增一．七％。\n\n庫存積壓恐續拖累經濟中國物流與採購聯合會指出，滯銷品庫存持續累積。北京大學經濟學家佩蒂斯指出，庫存積壓可能進一步拖累中國未來的經濟成長。另，三月中國工業企業利潤年增十五．八％，可能為經濟提供一定程度的緩衝；\n\n但大部分成長是來自化工與能源企業，相關業者在戰爭爆發之前，以低價囤積了大量石油與天然氣，如今在油價飆漲之際，獲取了可觀收益。報導指出，上週中國廣西數以千計的失業工人走上街頭，每天舉行抗議活動，他們要求四月二十日突然關閉的幾家玩具廠支付拖欠的工資與賠償金。全球輸油要道荷姆茲海峽航運受阻，導致由石油與天然氣提煉的塑料原料成本飆漲，造成相關工廠倒閉，中國玩具產業已承受美國關稅政策、海外競爭以及成本上漲的壓力，中東衝突使該局面雪上加霜，玩具業倒成一片。"}, {"title": "外壓升溫 習近平定調 擴大內需增信心 召開政治局會議以內循環抗風險 強化能源安全 整治內捲、實施「人工智能+」", "source": "聯合報 A10 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "中共總書記習近平昨主持召開中央政治局會議，分析研究當前經濟形勢和經濟工作。在中東戰事衝擊全球能源供給下，會議強調要系統應對外部衝擊挑戰，提高能源資源安全保障水準，以高質量發展的確定性應對各種不確定性。就當前大陸經濟，會議認為今年以來經濟「起步有力，主要指標好於預期」，但同時承認「持續穩中向好的基礎還需進一步鞏固」，要增強信心，以「更大力度和更實舉措」抓好經濟工作。", "full_text": "中共總書記習近平昨主持召開中央政治局會議，分析研究當前經濟形勢和經濟工作。在中東戰事衝擊全球能源供給下，會議強調要系統應對外部衝擊挑戰，提高能源資源安全保障水準，以高質量發展的確定性應對各種不確定性。就當前大陸經濟，會議認為今年以來經濟「起步有力，主要指標好於預期」，但同時承認「持續穩中向好的基礎還需進一步鞏固」，要增強信心，以「更大力度和更實舉措」抓好經濟工作。\n\n新華社報導，會議表示，要堅持穩中求進工作總基調，加快構建新發展格局，更好統籌國內國際兩個大局，統籌發展和安全，堅定不移深化改革開放，推動科技自立自強、產業鏈自主可控，精準有效實施更加積極的財政政策和適度寬鬆的貨幣政策，持續擴大內需、優化供給，著力穩就業、穩企業、穩市場、穩預期，增強經濟發展內生動力，進一步做強國內大循環，做優國內國際雙循環，努力實現「十五五」良好開局。針對貨幣政策，會議提到，要用好用足宏觀政策，增強貨幣政策前瞻性靈活性針對性，保持流動性充裕；保持人民幣匯率在合理水平上的基本穩定。\n\n要深入挖掘內需潛力，擴大優質商品和服務供給，推動消費升級。會議強調，要加快建設現代化產業體系，保持製造業合理比重。推進全國統一大市場建設，深入整治「內捲式」競爭。\n\n全面實施「人工智能+」行動，發展智慧經濟新形態，完善人工智慧治理。此外，要有效防範化解重點領域風險。努力穩定房地產市場。\n\n有序化解地方政府債務風險。推動中小金融機構改革，穩定和增強資本市場信心。香港經濟日報報導，荷蘭國際集團（ＩＮＧ）大中華區首席經濟學家宋林解讀，此次會議未釋放政策轉向訊息，亦未宣布新的刺激措施，內需仍是重點目標。\n\n保銀投資總裁張智威指，由於外部環境不確定及能源價格高漲，預計第二季經濟動能將放緩，會議提及保持市場流動性寬鬆，顯示現階段官方傾向依靠貨幣政策來緩解經濟困境，財政政策仍未體現明顯的寬鬆訊號。他研判，若第二季出口增速轉負，政府將加碼政策。大陸今年第一季ＧＤＰ增長達百分之五，優於預期，但三月社會消費品零售總額年增僅百分之一點七，遜於預期的百分之二點三，顯示內需消費仍待提振。"}, {"title": "日央行維持利率 上調通膨預期", "source": "中國時報 A06 財經綜合", "cat": "國際經濟情勢", "priority": 0, "summary": "日本銀行（央行）28日會後宣布維持政策利率在0.75％不變，符合市場預期；但在中東局勢影響下，上調通膨預期並下修經濟成長展望，反映戰爭帶來的供給面衝擊。另一方面，橋水基金創辦人達利歐警告，全球逐步進入停滯性通膨，新Fed主席不宜貿然降息。", "full_text": "日本銀行（央行）28日會後宣布維持政策利率在0.75％不變，符合市場預期；但在中東局勢影響下，上調通膨預期並下修經濟成長展望，反映戰爭帶來的供給面衝擊。另一方面，橋水基金創辦人達利歐警告，全球逐步進入停滯性通膨，新Fed主席不宜貿然降息。\n\n此次決議以6比3表決通過，3人主張升息1碼，認為中東緊張局勢已顯著推升物價上行風險。日銀同步將2026財年的經濟成長預測由1％下修至0.5％，核心通膨預期則由1.9％大幅上調至2.8％，明顯高於政策的2％目標。日銀指出，原油價格上漲傳導至整體物價，同時企業持續將薪資成本轉嫁至終端售價，可能進一步推高通膨壓力。\n\n日銀並警告，中東危機導致的貿易條件惡化，將壓縮企業利潤與家庭實質所得，拖累經濟復甦動能。牛津經濟研究院日本經濟主管長井滋人分析，日本今年可能出現「輕微停滯性通膨」，即成長停滯與通膨並存的局面。數據顯示，日本2025年第4季經濟僅勉強避免技術性衰退，季度經濟成長0.3％、年增1.3％；\n\n近期通膨亦出現回升跡象， 3月年增率升至1.8％，為5個月來首度加速。日銀總裁植田和男在記者會釋出偏鷹訊號，稱當前「物價上行風險大於經濟下行風險」，企業漲價意願顯著增強，通膨預期仍有上修可能。他指出，若供應衝擊進一步影響潛在通膨，有升息必要，但中東不確定性削弱政策前景的可預測性，不會僅因短期風險倉促行動。\n\n全球政策層面，橋水基金創辦人達利歐27日也在CNBC的訪問中提出警示。達利歐認為，全球經濟現已邁入「停滯性通膨」，通膨壓力與成長放緩並存，政策應保持審慎。若聯準會新任主席華許在此時選擇降息，將削弱聯準會的聲譽與政策公信力。\n\n他指出，觀察全球主要經濟體，多數央行仍傾向維持現行利率，短期內並不具備降息條件。芝商所FedWatch工具亦顯示，投資人普遍預期聯準會年內維持利率不變。"}, {"title": "為軍購卡TPASS 政府豈敢稱照顧民生", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "作為搭車通勤的民眾，筆者想請問行政院：這次 TPASS 經費被卡事件，是否我們不同意你花一點二五兆元買武器，你就不發我們一百元交通補貼？TPASS 2.0常客優惠回饋金連續三個月未能發放，原本規定回饋金應於次月廿五日入帳，但今年一至三月全數落空，影響人次已逾廿六萬，金額累計超過二千七百萬元。對多數上班族來說，這筆錢或許不大，卻是已被納入日常支出的「固定補貼」。", "full_text": "作為搭車通勤的民眾，筆者想請問行政院：這次 TPASS 經費被卡事件，是否我們不同意你花一點二五兆元買武器，你就不發我們一百元交通補貼？TPASS 2.0常客優惠回饋金連續三個月未能發放，原本規定回饋金應於次月廿五日入帳，但今年一至三月全數落空，影響人次已逾廿六萬，金額累計超過二千七百萬元。對多數上班族來說，這筆錢或許不大，卻是已被納入日常支出的「固定補貼」。\n\n如今突然消失，等同變相提高通勤成本。只要花二千七百萬元，就能夠讓每月約八到九萬通勤族，平均每個月減輕一百多元交通費，為何做不到？立法院已就總預算完成相關程序，但回饋金仍未發放，不能再怪在野黨，民眾多次抗議，要政府給說法，卻只有交通部公路局透過文字回應：「TPASS預算執行依據行政院政策指示辦理。」對於何時補發、如何補發，至今沒有明確答案。請問行政院是在卡什麼？是不是用卡經費逼人民接受你們那張沒有發價書的軍購合約？\n\n我們不知道要買什麼的軍購，預算卻要花一兆多，而廣大通勤族的車票錢只需要花二千七百萬，這才是真正的「四萬塊換一塊」！以前在罵的「四萬塊換一塊」是舊台幣換新台幣，是抑制惡性通貨膨脹的緊急措施，是在特定經濟條件下為穩定社會所做的制度選擇。但今天這個新「四萬塊換一塊」，是逼你同意他花四萬元買武器，否則民生的一塊錢就不給你！\n\n預算可以協商，但生活無法暫停。二千七百萬元補貼約三個月共廿六萬人次，平均每人每月約一百多元，如果連這樣規模有限、但影響直接的補貼，都做不到穩定發放，那麼執政黨再怎麼說要「照顧民生」，恐怕難以說服數萬名每天在路上的通勤朋友。"}, {"title": "社會觀察 高德不是最後一個", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "輯楊方儒10年來，中製APP在台營運持續被阻，擠牙膏跟補破網式的數位監管政策，讓微信、抖音、愛奇藝、小紅書陸續中招，高德地圖也肯定不會是最後一個。以移動互聯網為主要引擎的Web2時代，世界本來就只有中美兩張大牌桌。在2010到2020年的移動互聯網大局中，中國就已遙遙領先，B AT的百度、騰訊、阿里巴巴全都跑在前頭，加上字節跳動、小米、O PPO、VIVO順利出海，還有中國手遊的高黏著度，如今面對中製APP侵台，我們業內人士也不需要特地...", "full_text": "輯楊方儒10年來，中製APP在台營運持續被阻，擠牙膏跟補破網式的數位監管政策，讓微信、抖音、愛奇藝、小紅書陸續中招，高德地圖也肯定不會是最後一個。以移動互聯網為主要引擎的Web2時代，世界本來就只有中美兩張大牌桌。在2010到2020年的移動互聯網大局中，中國就已遙遙領先，B AT的百度、騰訊、阿里巴巴全都跑在前頭，加上字節跳動、小米、O PPO、VIVO順利出海，還有中國手遊的高黏著度，如今面對中製APP侵台，我們業內人士也不需要特地覆盤了。\n\n關鍵在於，台灣在Web2產業完全空白，你我每分每秒黏在手機上使用的APP，絕大多數都是舶來品，失語只是後遺症而已。台灣人本來就不愛用國貨，被Meta與Google兩家公司宰制也只是剛好，就連美國人自己都不用的脆，台灣用戶的使用時長與流量，竟攀上世界第一，再次證明台灣成了Web2的最佳殖民地。如今「AI新十大建設」準備上路，中央部會如要打造地圖國家隊，肯定要比高德地圖更厲害，找來比林志玲跟張凌赫更受喜愛的藝人，來錄製語音導航包。\n\n繁體中文的LLM大語言模型，「台版ChatGPT」與主權AI，蒸餾起來至少也要贏過DeepSeek。至於一輩子都不可能打贏的抖音與小紅書，也不需再以小粉紅內容審查來考量，該封就封。「數位中介服務法」草案仍冰封在立法院，但要監管境外網路業者，政府還是有很多行政手段。\n\n例如因詐騙疑慮及資安問題，小紅書已遭停止解析，一年期限屆滿後是否持續封殺，肯定沒有太多懸念。工具性APP如eToro，還有不受控的加密貨幣交易所，本來也就沒有言論自由的問題，只要違反證交法與虛擬資產服務法，一紙公文就可以讓台灣網路資訊中心（TWNIC）停止解析，官員們肯定都樂得輕鬆。歐盟以用戶規模與使用時長，作為APP監管的衡量基準。\n\n台灣各主管機關頭痛醫頭腳痛醫腳，等到輿論炸鍋跟立委開炮，才去下載與研究應對之道，境外業者不來喝茶也不讀不回，確實是全球罕見的監管方式。畢竟交通部長官沒用過滴滴與高德地圖，金管會長官沒用過幣安與支付寶，經濟部長官沒用過美團與拼多多，NCC與數發部長官肯定也沒看過快手與B站！政策治理永遠沒有定見與方向，網路新創無力挑戰大題目與打造生態，這大概就是台灣Web2與Web3的弔詭終局了。"}, {"title": "《社論》由數據治理開啟金融服務創新契機", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "被譽為亞洲最具影響力的金融科技年會之一，Money20/20 Asia 2 026日前在曼谷舉行，而今年的重點之一就是數據應用如何導入金融服務創新。從泰國央行、到英國金融科技獨角獸Revolut等，都提出數據治理在金融服務的剛性需求，主要有以下應用，值得台灣借鏡。首先是數據公共基礎網路建置。", "full_text": "被譽為亞洲最具影響力的金融科技年會之一，Money20/20 Asia 2 026日前在曼谷舉行，而今年的重點之一就是數據應用如何導入金融服務創新。從泰國央行、到英國金融科技獨角獸Revolut等，都提出數據治理在金融服務的剛性需求，主要有以下應用，值得台灣借鏡。首先是數據公共基礎網路建置。\n\n泰國中央銀行官員提出「數位身分證、支付、數據」三階段數據公共基礎建置。對小微企業來說，取得數位身分證結合行動支付是改變交易型態的第一步。過去賣椰子的小農常需要幾天時間才能拿到貨款；\n\n但在數位身分證下，小農可透過行動支付即時取得帳款。近年泰國央行更積極推動「數據高速公路」（ trusted data highway），由政府出面整合電商、電信與金融服務，以幫助小微企業透過即時銷售數據取得信貸融資。其次是數據驅動個人化金融服務。\n\n英國金融科技獨角獸Revolut新加坡高管就直言，未來所有金融機構都應該是數據公司，能直接研發客製化專屬用戶服務。例如Revolut在今年4月推出AIR（AI Revolut），乃是有效訓練自己高達7,000萬用戶數據資料的成果，AIR可以幫用戶直接操作金融服務，例如規劃旅遊預算、查詢交易紀錄等。第三是以數據拓展金融服務之跨產業連結，有以下實務。\n\n一是銷售與服務智能（sales and serviceintelligence），例如AI理財服務，就可以由「一對一」提高至「一對多」，理專服務的人數將大幅增加。二是行銷智能（marketing intelligence），也就是過去金融機構習慣的「跨售」，只是在數據與AI應用下，跨售範圍將不限於傳統銀行、證券、保險等金融商品，包括閃購、外賣等也在服務之列。三是風險智能（riskintelligence），包括詐欺預防與風險辨識等，可由行為分析結合AI科技，即時辨識風險性交易。\n\n對於台灣在發展以數據驅動的金融創新歷程中，以上這三種路徑可以並行不悖，且台灣也有初步成果。不過由他山之石可反思我國的創新變革之道。首先是如何回歸交易數據或整合多元數據，以回應中小微企業的即時融資需求。\n\n過去內政部也曾推動數位身份證，但在資安風險考量下暫停，而決定另闢管道。例如近年企業導入區塊鏈技術在供應鏈金融服務，由中心廠與區塊鏈科技公司合作，將所有對中小微企業之採購、發貨、驗收、立帳、發票等數據上鏈到供應鏈金融平台。當中小微企業有貸款需求時，銀行或中小企業信保基金可上鏈查證，有效縮短過去銀行向中心廠「照會」時間，可由45天縮短到5天以內；\n\n銀行也能藉數據洞察風險客戶，並「一網打盡」優質客戶。此外，政府也可鼓勵電信公司導入安全認證機制，結合電商平台銷售數字，以照顧更多小微企業的信貸融資需求。由政策面鼓勵大型中心廠、金融機構、電信公司與電商平台出面主導供應鏈金融，取代由中央主導的數位身分認證與數據整合，應更能兼顧多元、普惠、與風險區隔效益。\n\n其次是如何有效發展AI客製化模型，以升級數據智能服務。目前台灣金融機構已開始和科技公司合作，透過大語言模型訓練，發展AI客製化服務。而今年4月，金管會指導成立的金融科技產業聯盟也開始推動「金融大語言模型專案」，以建構主權AI並落實在地金融監理。\n\n不過，一般公私協作的數據服務應著重在公共議題上，如金融防詐之即時偵查與通報；個別金融機構的客製化專屬服務，仍應獨自升級，以兼顧客戶資料保全與精準推薦，如此才能邁向下一階段的服務升級，也就是連結金融服務的跨產業生態系建構，並由此發展風險智能、金融與非金融商品跨售之智能服務。總結來說，從金融服務升級到數據服務，目的在落實即時安全且精準客製的普惠金融。\n\n數據背後的人本與產業洞察才是創新引擎。"}, {"title": "社論/台股創高下的失衡與隱憂", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "priority": 0, "summary": "近期台股在AI浪潮與半導體權值股領軍下屢創新高，衝上4萬點，單日成交量頻頻突破兆元，市場氛圍沸騰。然而，在指數攀升背後，若將視角拉回整體經濟結構與金融體系功能，隱憂卻逐漸浮現。當前股市榮景是否已與實體經濟出現落差？", "full_text": "近期台股在AI浪潮與半導體權值股領軍下屢創新高，衝上4萬點，單日成交量頻頻突破兆元，市場氛圍沸騰。然而，在指數攀升背後，若將視角拉回整體經濟結構與金融體系功能，隱憂卻逐漸浮現。當前股市榮景是否已與實體經濟出現落差？\n\n兆元天量象徵健康換手，還是短線投機升溫警訊？這不僅是投資問題，更是產業政策與金融監理不容迴避的課題。不可否認，本波漲勢具基本面支撐。\n\n以台積電為首的半導體先進製程與封裝，在全球 AI供應鏈扮演關鍵角色，帶動設備、IC設計、新材料等族群擴張。企業獲利創高，加上市場對高效能運算需求的預期，共同推升股價。然而，這波紅利能否外溢成為更廣泛的產業升級與就業改善，而非停留在少數龍頭與資本市場層面，仍待觀察。\n\n首先浮現的隱憂，是產業與市場高度單極化。台灣出口高度依賴半導體與資通訊產品，對美貿易依存度加深。少數權值股上漲，即足以推升指數與成交規模。\n\n兆元量能未必代表全面狂熱，更可能是資金集中；而集中意味風險同步放大。一旦全球AI投資趨緩或美國景氣反轉，衝擊將迅速擴散。\n\n從金融發展觀點看，股市核心功能在於價格發現與資本配置。理想狀態下，資金應流向具長期競爭力與創新潛力的企業，促進產業升級與生產性投資。然而，若呈現單極飆漲、指數由少數權值股主導，中小企業估值長期受壓，價格訊號恐失真，資本配置效率下降。\n\n當市場過度依賴單一題材，金融體系對多元產業的支持能力便會削弱，形成資本過度集中的結構偏誤。此外，短線交易熱絡亦須警惕。當沖占比偏高、題材輪動快速、社群帶動投機頻繁，雖提升流動性，卻未必有助金融深化。\n\n若市場過度交易導向而非投資導向，將使券商收益、散戶行為與市場文化短期化。此類現象往往伴隨波動放大與風險累積：價格上漲時流動性充沛，一旦反轉則迅速乾涸，形成順景氣擴張、逆景氣收縮的循環。若融資餘額升高，更可能在修正時加劇去槓桿壓力，衝擊金融穩定。\n\n更值得警惕的是實體經濟的「K型分化」。當科技股享受評價重估時，多數傳統產業未與股市同步升溫：機械業受資本支出放緩衝擊；食品業遭原料波動與通路競爭夾擊；\n\n石化與車用零組件則在產能過剩與轉型壓力中掙扎。這些產業吸納大量就業人口，卻未能在資本市場共享紅利。若從中位數薪資與非科技營收觀察，實體經濟與股市間的落差正持續擴大。\n\n成交量放大並不等於泡沫，關鍵在資金結構與交易屬性。若量能來自獲利改善與長期資金配置，屬結構行情；若融資攀升、當沖居高、題材輪動頻繁，投機成分即提高。\n\n短線交易文化若成為主流，股市支持產業長期投資與創新功能則弱化，逐漸偏離服務實體經濟初衷。面對單極傾斜格局，政府不能缺席。經濟部應推出具體且具實效之產業政策，加速機械、石化、食品、紡織與車輛零組件等產業轉型與升級，協助中小企業取得長期資金與技術支援，提升供應鏈韌性與市場多元化，避免過度依賴單一技術浪潮。\n\n同時，金管會須確保市場穩定與韌性。面對兆元量能常態化趨勢，審慎管理融資槓桿風險，強化資訊揭露與預警機制，並透過制度設計鼓勵長期資金停留，例如優化長期持有稅制、深化公司治理評鑑、引導退休基金與保險資金支持具升級潛力企業。金融深化不應只追逐成交金額，而應體現在資本配置效率與風險承擔能力的提升。\n\n股市創高並非問題，關鍵在制度與產業結構能否同步升級。若金融體系無法維持價格發現公信力與配置多元性，單極上漲終將隱含脆弱與隱憂。唯有推動產業均衡發展、維持市場紀律與金融韌性，台股榮景才能轉化為整體經濟的長期實力，而非資金情緒推動的短暫盛宴。"}, {"title": "社論》中華民國 從政府到國家", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "北京技術封殺賴總統出訪邦交國，外交部林部長則擔任特使成功達陣。北京國台辦大言不慚：「台灣沒有總統」。國民黨文傳會稍一回嘴：中華民國的總統當然存在，中國外交部立即糾正：世界上早已不存在所謂「中華民國總統」，任何人以這種身分招搖撞騙，只會自取其辱。", "full_text": "北京技術封殺賴總統出訪邦交國，外交部林部長則擔任特使成功達陣。北京國台辦大言不慚：「台灣沒有總統」。國民黨文傳會稍一回嘴：中華民國的總統當然存在，中國外交部立即糾正：世界上早已不存在所謂「中華民國總統」，任何人以這種身分招搖撞騙，只會自取其辱。\n\n國民黨，也就不接這個話題了。鄭麗文改變話題：有位布朗大學教授認為，她應該得諾貝爾和平獎。但她忘了，如果得獎，習近平應該同框。\n\n問題是，習近平可能認為：她配嗎！台灣，當然有「總統」，而且是二千三百萬人定期選舉產生的國家元首。其實，北京豈只不承認民進黨總統，包括國民黨總統也只是「先生」而已。\n\n不必懷疑，它根本也不承認中華民國（政府）的存在：中華民國（政府）已於一九四九年消滅，以中華民國（政府，即兩個中國、一國兩府）之名拒絕統一也是台獨。凡此主張並非始於民進黨執政，只是老藍男寧可以「一中各表」自欺欺人，到了「鄭躺平」才大方承認，「九二共識」就是「同表一中」！我國現任總統，不論是哪一黨，都不會增加也不會減少其含金量，他是依「憲法增修條文」，經民主選舉產生的「總統」。\n\n「中華民國憲法」，一九四六年制定於南京，其中的「總統」係由「國民大會」選舉產生，選區涵蓋「秋海棠中華民國」。「增修條文」，一九九一年制定於台北，「總統」則由中華民國自由地區全體人民直接選舉產生，也就是「蕃薯中華民國」。顯然，「中華民國總統」的同樣稱呼，蔣中正、蔣經國與陳水扁、馬英九、蔡英文、賴清德，兩組的性質大不相同，李登輝則橫跨了橋的兩頭。\n\n台灣有總統，中華民國有總統，但這種總統是什麼樣的存在狀態，台灣人、中華民國國民自己要搞清楚，否則很容易被歪樓到一中憲法、同屬一中，把自己搞成不存在。一九七一年的光復節，聯大通過二七五八號決議：承認中華人民共和國政府的代表為中國在聯合國組織的唯一合法代表。此後，從南京到台北的「國民大會」，不斷選舉兩蔣據以宣稱「法統」（中國代表權），正式失去聯合國的支持。\n\n從此，承認「中華民國政府」的邦交國山崩地裂。民進黨執政，邦交國繼續「回歸祖國」，只是蔣氏大潰敗的餘音罷了。一九七九年「美匪建交」，這個走山運動接近完成了。\n\n剩下的垃圾時間，是等待蔣氏王朝結束的一九八八年。李登輝主導，國、民兩黨合作，後蔣時代的寧靜革命，造成與以往截然不同的政治景觀。終於，兩蔣的「法統」，萬年國代最後走到終點，一九九二年立委在台灣全面改選。\n\n一九九六年「中華民國總統」開始由台灣人民直選產生。候選人及選舉人，都僅限於台澎金馬的合格公民。一個較少被注意到的質變在於，兩蔣堅持代表中國的「中華民國」，從原本的「（中國）政府」蛻變成「（台灣）國家」，後來民進黨執政，也承認「中華民國」是現階段台灣這個「國家」的名稱，但依其統治範圍、選民基礎，只代表台灣（台澎金馬）、二千三百萬人。\n\n亦即，只有「台灣代表權」，與代表中國的中華人民共和國政府互不相關。在中共統治的「流氓中國」操作下，國際對台灣這個「國家」迄未「法理承認」，但對在台灣名為中華民國的這個「國家」，採取「事實承認」的態度，且朝「法理承認」的方向演進中。一九九二年，第二屆立委在台灣集會，一如「台灣前途決議文」所宣示：台灣是主權獨立國家，其主權領域僅及台澎金馬與其附屬島嶼，依目前憲法稱為中華民國。\n\n易言之，兩蔣時代與中華人民共和國政府互爭中國代表權的中華民國政府實質上已「國家化」了，不再是兩蔣時期國共內戰框架下的「兩個中國政府」之一。習近平，鄭麗文，國共想逆勢而為，讓時間沿著逆時針方向回到從前，國際社會尤其是民主國家可不奉陪。這次，北京高舉自我感覺的「一中原則」，支使非洲三國封殺「中華民國總統」出訪邦交國，在國際主流場域所得到的不是附和，而是抨擊。\n\n美國參眾議員群起抨擊中國霸凌台灣，共和黨參議員匡希恆（John Curtis）說的好：中國施壓各國孤立台灣的作為，再次提醒我們，威權體制不僅在國內限縮自由，亦試圖向外擴張控制力。越來越多人看清了，「台灣」沒有問題，問題出在「流氓中國」。於是，「中華民國總統」雖沒抵達史瓦帝尼現場，卻證明了民主台灣這個國家及其民選總統的存在。"}, {"title": "社論/馬鈴薯與軍購之間，賴總統忘了選擇人民", "source": "聯合報 A02 焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "立法院長韓國瑜近日召集朝野就軍購特別預算三度協商，仍告破局。其間，國民黨立委退讓到同意八千億元的規模，但國防部長顧立雄仍堅持要照政院原案一・二五兆元通過，雙方差距甚遠。為了迎合美國，賴政府極盡卑屈；", "full_text": "立法院長韓國瑜近日召集朝野就軍購特別預算三度協商，仍告破局。其間，國民黨立委退讓到同意八千億元的規模，但國防部長顧立雄仍堅持要照政院原案一・二五兆元通過，雙方差距甚遠。為了迎合美國，賴政府極盡卑屈；\n\n但對於攸關國人健康的食品進口，台美對等貿易協定卻簽下棄守條款，將原本馬鈴薯發芽即整批退運的規定改為放寬進口，由加工業者自行剔除。在馬鈴薯與軍購之間，賴政府完全忘了選擇人民。賴總統最近出訪史瓦帝尼受阻，美國原可扮演調停角色，卻未伸援手。\n\n在此之前，我國缺席世貿組織部長會議，主要是主辦國喀麥隆將台灣列為中國一省，我方求助美日無果。中共打壓從未間斷，但兩岸達成政治默契，即可同時加入ＷＴＯ；但廿多年後，賴政府卻因名稱被拒於門外？\n\n何以陳水扁和蔡英文執政時能出訪史瓦帝尼、參與世貿會議，到了賴清德就走不通？爬梳前後因果便知，中共在國際間固不容「中華民國」，但出重手打擊的是台獨。人民不反對對美軍購，但要求合理價格及確實交貨，不容有人上下其手；\n\n這點賴政府覺得很難嗎？馬鈴薯之亂掀起「吃毒愛國」的反智論戰，連同賴總統被中共「釘在地上」走不出去，都引發強烈的社會挫折感。大陸反台獨武嚇打壓台灣，令人反感；\n\n但美國利用台獨需要靠山而剝削台灣，難道不令人憤慨？對美軍購算是「交保護費」，買發芽馬鈴薯卻是「殘害國民」，賴政府兩者統統都要，這選擇不會太奇怪嗎？為開放美國萊豬，蔡政府宣稱「反萊豬會鎖死台灣無法加入ＣＰＴＰＰ」；\n\n但從行政院副總談判代表顏慧欣臨逝前的辭呈，可知政府對加入ＣＰＴＰＰ只是「消極敷衍」。民進黨政府早知申入案繞不過大陸，卻以「美日支持」來哄騙人民。為了這個政治謊言，民進黨政府犧牲食安、產業鏈，到如今簽下連軍事預算權都被美國約制的ＡＲＴ，以及不知交付期的軍購合約。\n\n抗中保台未能彰顯台灣主權和生存空間，代價卻是台美關係從互惠傾斜到被剝削出血。從申入ＣＰＴＰＰ的敷衍、卓揆訪日吞辱、賴總統坐困台北，到馬鈴薯之亂，一連串外交爆雷，都揭穿賴政府「攜手理念相同友盟走向世界」的外交路線，其實是謊言堆砌的大內宣。而這外表華麗的「友盟關係」，其實是建立在台海戰爭敘事上，並不是為了台灣的和平，也不是為了台灣的人民。\n\n蔡政府時代，還見國際社會為我生存空間發聲；但川普上台將民主同盟推向中國，「挺台盟友」變成特定美國議員和特定智庫，他們大談台海兵凶戰危。這些「友台人士」，不少是軍火商代言人，推銷台海開戰預言。\n\n最具代表性的，就是「二○二七中共攻台」論，最近因武器未準時交付，美方人士便更改話術，稱「未來任何一天都可能開戰」，須持續備戰。川普為賣大豆小麥，和習近平大套交情；另方面為牽制中國，把台灣框入戰爭敘事。\n\n賴政府卻配合這套劇本，情勒人民吃發芽馬鈴薯，台灣人需要活得如此卑微嗎？十年前，馬習以九二共識基礎站上國際舞台對話和平；台灣若沿那條路走下去，在兩岸和解中爭取國際空間，應該比今天預支國民所得大買軍火、犧牲國民健康吃毒馬鈴薯活得更有尊嚴吧？\n\n賴政府批中共談判無信用，拒絕對話；但台美談判結果又如何？台灣把國防外交經貿都交付美國，並未增加多少底氣，卻把國民健康悄悄簽約出賣給毒馬鈴薯，這是多凶狠的主政心態？"}, {"title": "社論／兩岸現狀難維持 主動協商掌變局", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "1993年4月27日台灣的海基會董事長辜振甫和大陸的海協會會長汪道涵，在新加坡舉行了歷史性的會面，象徵兩岸關係邁入和平發展的新里程。33年後的這一天，立法院長韓國瑜表示即使挑燈夜戰，也要完成對美軍購預算的黨團協商，而且此與近月來美國華府數個智庫接連訪台，以及國會議員聯名致函韓國瑜施加壓力有關。美國對台軍售高調到像是「戰鼓頻催」，難道台灣只能處於「兩岸終須一戰」的「 現狀」？", "full_text": "1993年4月27日台灣的海基會董事長辜振甫和大陸的海協會會長汪道涵，在新加坡舉行了歷史性的會面，象徵兩岸關係邁入和平發展的新里程。33年後的這一天，立法院長韓國瑜表示即使挑燈夜戰，也要完成對美軍購預算的黨團協商，而且此與近月來美國華府數個智庫接連訪台，以及國會議員聯名致函韓國瑜施加壓力有關。美國對台軍售高調到像是「戰鼓頻催」，難道台灣只能處於「兩岸終須一戰」的「 現狀」？\n\n美積極遊說激化兩岸本月22日美國華府「戰略暨國際研究中心」（CSIS）訪問團拜會韓院長，據陪同接見訪賓的民進黨立委王定宇轉述，一位曾任美國國防部高階官員的團員當面發出警告，軍購的預算必須於「川習會」前通過，「否則台灣將付出慘痛的代價」。這種近乎威脅台灣民眾必須吞下鉅額軍購的話，確實讓人聽來刺耳。所謂「台灣將付出慘痛的代價」之說，從美國在台協會谷立言處長接受本報專訪時表示，嚇阻力才是維護和平最佳途徑，以及賴總統一再強調對美軍購的需要，是因台灣唯有靠實力才能得到和平，可理解均是指中共很可能即將以武力犯台。\n\n只不過，美方有人要求須於5月中「川習會」前通過預算，顯然是為川普增加與習近平談判時的籌碼。然而，國民黨主席鄭麗文訪陸帶回習近平遞出的「橄欖枝」，除表明兩岸關係的問題是「冰凍三尺非一日之寒」，妥善解決則需「久久為功」外，更隨即宣布 10 項促進交流與惠台的措施。同時，習近平在「鄭習會」中也表示了對台政策的基本原則未變，只要台灣仍站在反對台獨和堅持九二共識的立場上，兩岸間就能朝向和平發展的道路邁進。\n\n事實上，兩岸和平發展才是《中華民國憲法》暨其增修條文為兩岸關係所建構的「現狀」。但現今台灣為何須對美國鉅額軍購以強化自我防衛力量？為何美國民間智庫人員會以語帶威脅的口吻，向韓院長強勢促銷美國製造的武器？\n\n而我國《遊說法》第7條第2項明定，「外國政府、法人、團體及自然人不得就國防、外交及大陸事務涉及國家安全或國家機密者進行遊說」，為何美國人可以不受《遊說法》的規範？這3個「為何」，其實正凸顯了台灣在賴總統執政下的「現狀」。美國為維繫其為全球霸主的地位，對中國大陸採取抑制其實力成長的戰略，本質上以「冷和平」來形容應較「新冷戰」更為貼切。\n\n然而，賴總統4月10日在臉書紀念《台灣關係法》簽署生效47周年的發文中，卻以台灣「更身處第一島鏈的關鍵位置」之冷戰思維，表現出為了美國利益可與中共一戰的「忠心」。接下橄欖枝無須一戰賴總統為台獨化中華民國而「抗中」，有美國可倚靠則是抗中的底氣，付出不能殺價的鉅額軍購則是該繳的「保護費」。可是，台灣民眾真的只能處於兩岸終須一戰的「現狀」嗎？\n\n民主文教基金會於本月 23日發布一項主題為「現狀如今難維持、主動出擊掌變局」的民調，第一個問題探詢在國際局勢快速變化下，台灣已經很難繼續「維持現狀」，是否同意必須在「改變」和「不改變」之間做選擇？結果合併「非常同意」和「還算同意」者有55.2％，「不太同意」和「非常不同意」者則共有12.8％，32％為「未表態」。而TVBS日前一項「鄭習會後相關議題」的民調結果，各有33％受訪者「非常支持」和「還算支持」兩岸政府重新進行協商談判及加強兩岸交流往來，而「不太支持」和「非常不支持」者合計未達2成。\n\n在前項民主文教基金會的民調中，也有一題顯示有61.6％的受訪者同意，與其坐待對岸決定台灣的命運，不如自己提出「最有保障的制度條件」及主動參與談判。台灣民眾大多已被民進黨教育而認為，只要不改中華民國國號就是「維持現狀」，故不認為賴政府推進「新兩國論」而「倚美抗中」，實際上已大幅改變原要維持的現狀。「鄭習會」為台灣帶來重返兩岸和平發展的契機，而民調也顯示高度支持兩岸交流與協商，賴政府何不順勢擊出習近平投來的惠台好球？\n\n難道期待「終須一戰」已是賴政府的抉擇？"}];

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildNav() {
  const bar = document.getElementById('section-nav-inner');
  CAT_ORDER.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.cat = cat;
    btn.textContent = DEPTS[cat] ? DEPTS[cat].short : cat;
    btn.onclick = () => openCatView(cat);
    bar.appendChild(btn);
  });
  document.getElementById('must-stat-btn').onclick = () => openCatView('must');
}

function buildTicker() {
  const items = DATA.filter(i => i.priority === 1);
  const bar = document.getElementById('ticker-bar');
  if (!items.length) { bar.style.display = 'none'; return; }
  const track = document.getElementById('ticker-track');
  const html = items.map(item => `<span class="t-item" onclick="openArticle(${DATA.indexOf(item)})">${esc(item.title)}</span><span class="t-sep">／</span>`).join('');
  track.innerHTML = html + html;
}

function buildTopStory() {
  const wrap = document.getElementById('top-story-wrap');
  const top = DATA.find(i => i.priority === 1) || DATA[0];
  if (!top) return;
  const idx = DATA.indexOf(top);
  wrap.innerHTML = `
    <div class="top-story" onclick="openArticle(${idx})">
      <div class="${top.priority===1?'ts-red-bar':'ts-black-bar'}"></div>
      <div class="ts-meta">
        <span class="ts-cat">${esc(top.cat)}</span>
        ${top.priority===1?'<span class="ts-badge">頭版要聞</span>':''}
      </div>
      <h2 class="ts-title">${esc(top.title)}</h2>
      <p class="ts-summary">${esc(top.summary)}</p>
      <div class="ts-footer"><span class="ts-src">${esc(top.source)}</span><span class="ts-more">閱讀全文 →</span></div>
    </div>`;
}

function buildSubNews() {
  const wrap = document.getElementById('sub-news-wrap');
  const items = DATA.slice(1, 8);
  if (!items.length) return;
  const rows = items.map((item, i) => `
    <div class="sub-row ${item.priority===1?'sub-must':''}" onclick="openArticle(${DATA.indexOf(item)})">
      ${item.priority===1?'<div class="sub-dot-red"></div>':'<div class="sub-num">'+(i+1)+'</div>'}

        <div class="sub-cat">${esc(item.cat)}</div>
        <div class="sub-title">${esc(item.title)}</div>
        <div class="sub-src">${esc(item.source)}</div>
      </div>
    </div>`).join('');
  wrap.innerHTML = `<div class="sub-header">更多要聞</div><div class="sub-list">${rows}</div>`;
}

  const list = document.getElementById('must-list');
  const items = DATA.filter(i => i.priority === 1);
  if (!items.length) { document.getElementById('must-block').style.display='none'; return; }
  items.slice(0,8).forEach(item => {
    const el = document.createElement('div');
    el.className = 'must-item';
    el.innerHTML = `<div class="mi-cat">${esc(item.cat)}</div><div class="mi-title">${esc(item.title)}</div><div class="mi-src">${esc(item.source)}</div>`;
    el.onclick = () => openArticle(DATA.indexOf(item));
    list.appendChild(el);
  });
}

  const wrap = document.getElementById('cat-overview');
  CAT_ORDER.forEach(cat => {
    const items = DATA.filter(i => i.cat===cat);
    if (!items.length) return;
    const must = items.filter(i => i.priority===1).length;
    const el = document.createElement('div');
    el.className = 'co-row';
    el.innerHTML = `<span class="co-name">${esc((DEPTS[cat].icon||'')+' '+DEPTS[cat].short)}</span>
      <span class="co-right"><span class="co-cnt">${items.length}</span>${must?`<span class="co-must">${must}必看</span>`:''}</span>`;
    el.onclick = () => openCatView(cat);
    wrap.appendChild(el);
  });
}

    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.innerHTML = `<div class="cs-header"><span class="cs-icon">${DEPTS[cat].icon}</span><span class="cs-title">${esc(cat)}</span>
      <button class="cs-more" onclick="openCatView('${cat}')">查看全部 →</button></div><div class="cs-grid"></div>`;
    const grid = sec.querySelector('.cs-grid');
    items.slice(0,6).forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'cs-card ' + (item.priority===1?'cs-must ':'') + (i===0?'cs-lead':'');
      card.innerHTML = `${item.priority===1?'<div class="cs-red-stripe"></div>':''}
        <div class="cs-card-cat">${esc(item.cat)}</div><div class="cs-card-title">${esc(item.title)}</div>
        ${i===0?`<div class="cs-card-summary">${esc(item.summary)}</div>`:''}<div class="cs-card-src">${esc(item.source)}</div>`;
      card.onclick = () => openArticle(DATA.indexOf(item));
      grid.appendChild(card);
    });
    container.appendChild(sec);
  });
}

function openCatView(cat) {
  const isMust = cat==='must';
  const items = isMust ? DATA.filter(i=>i.priority===1) : DATA.filter(i=>i.cat===cat);
  document.getElementById('cat-view-title').textContent = isMust ? '頭版要聞' : cat;
  const list = document.getElementById('cat-list');
  list.innerHTML = items.map(item => `
    <div class="list-row ${item.priority===1?'list-must':''}" onclick="openArticle(${DATA.indexOf(item)})">
      <div class="lr-inner">
        ${item.priority===1?'<div class="lr-red-bar"></div>':''}
        <div class="lr-meta"><span class="lr-cat">${esc(item.cat)}</span>${item.priority===1?'<span class="lr-must-tag">頭版</span>':''}</div>
        <div class="lr-title">${esc(item.title)}</div>
        <div class="lr-summary">${esc(item.summary)}</div>
        <div class="lr-footer"><span class="lr-src">${esc(item.source)}</span><span class="lr-cta">閱讀全文 →</span></div>
      </div>
    </div>`).join('');
  showView('cat-view');
}

function openArticle(idx) {
  const item = DATA[idx];
  const dept = DEPTS[item.cat] || {};
  document.getElementById('art-cat-label').textContent = (dept.icon||'') + ' ' + item.cat;
  document.getElementById('art-nav-cat').textContent = item.cat;
  document.getElementById('art-title').textContent = item.title;
  document.getElementById('art-source').textContent = '來源：' + item.source;
  document.getElementById('art-summary').textContent = item.summary;
  document.getElementById('art-body').innerHTML = (item.full_text || '尚未擷取到內文內容').split('\n\n').map(p => `<p>${esc(p.trim())}</p>`).join('');
  showView('article-view');
}

function showView(id) {
  ['home-view','cat-view','article-view'].forEach(v => document.getElementById(v).style.display = v===id?'block':'none');
  ['masthead','section-nav','utility-bar'].forEach(v => document.getElementById(v).style.display = id==='home-view'?'block':'none');
  window.scrollTo(0,0);
}
function goHome() { showView('home-view'); }

(function() {
  buildNav(); buildTicker(); buildTopStory(); buildSubNews(); buildMustList(); buildCatOverview(); buildAllSections();
})();
</script>
</body>
</html>
