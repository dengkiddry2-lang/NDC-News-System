<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國發會經濟規劃科 · 每日新聞重點</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --white: #ffffff;
  --border: #e5e3de;
  --border-hover: #cbc8c1;
  --text-p: #18171a;
  --text-s: #5c5a57;
  --text-m: #9e9c98;
  --accent: #1d4ed8;
  --accent-light: #eef2ff;
  --must-border: #f87171;
  --must-bg: #fef2f2;
  --must-tag: #b91c1c;
  --must-tag-bg: #fee2e2;
  --watch-border: #fbbf24;
  --watch-bg: #fffbeb;
  --watch-tag: #92400e;
  --watch-tag-bg: #fef3c7;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 8px;
}
body {
  background: var(--bg);
  color: var(--text-p);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  line-height: 1.65;
}

/* Header */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.header-brand { display: flex; flex-direction: column; gap: 2px; }
.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px; font-weight: 600; letter-spacing: 0.04em;
}
.header-sub { font-size: 11px; color: var(--text-m); letter-spacing: 0.05em; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.header-date { font-size: 13px; color: var(--text-s); font-weight: 500; margin-right: 4px; }

.btn {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 15px; border-radius: 6px;
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--text-p); color: white; border-color: var(--text-p); }
.btn-primary:hover { opacity: 0.85; }
.btn-primary.success { background: #16a34a; border-color: #16a34a; }
.btn-ghost { background: transparent; color: var(--text-s); }
.btn-ghost:hover { border-color: var(--border-hover); color: var(--text-p); }

/* Main */
.main { padding: 24px 40px; max-width: 960px; margin: 0 auto; }

.legend {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px; font-size: 12px; color: var(--text-m);
}
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.leg-dot.must { background: #ef4444; }
.leg-dot.watch { background: #f59e0b; }
.leg-dot.normal { background: #d1d5db; }

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 22px;
}
.tab-btn {
  padding: 9px 20px; border: none; background: transparent;
  font-size: 13px; font-family: inherit; color: var(--text-m);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s; font-weight: 500;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-p); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Card list */
.news-list { display: flex; flex-direction: column; gap: 8px; }

.news-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 4px solid #d1d5db;
  border-radius: var(--radius);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.news-card:hover { box-shadow: var(--shadow-md); }
.news-card.priority-must { border-left-color: var(--must-border); background: var(--must-bg); }
.news-card.priority-watch { border-left-color: var(--watch-border); background: var(--watch-bg); }

.card-top {
  padding: 14px 18px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
}
.card-top:hover .card-title { color: var(--accent); }

.prio-col { flex-shrink: 0; padding-top: 2px; }
.prio-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  padding: 2px 8px; border-radius: 3px; white-space: nowrap;
}
.prio-badge.must { background: var(--must-tag-bg); color: var(--must-tag); }
.prio-badge.watch { background: var(--watch-tag-bg); color: var(--watch-tag); }
.prio-badge.normal { background: var(--bg); color: var(--text-m); border: 1px solid var(--border); }

.card-info { flex: 1; min-width: 0; }
.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; font-weight: 600; line-height: 1.55;
  color: var(--text-p); margin-bottom: 4px;
  transition: color 0.15s;
}
.card-lead { font-size: 12px; color: var(--text-s); margin-bottom: 7px; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.src-tag {
  font-size: 11px; color: var(--text-m);
  background: var(--bg); padding: 1px 7px;
  border-radius: 3px; border: 1px solid var(--border);
}
.related-badge { font-size: 11px; color: var(--text-m); }

.toggle-icon {
  font-size: 18px; color: var(--text-m); flex-shrink: 0;
  transition: transform 0.25s, color 0.15s;
  align-self: flex-start; padding-top: 1px; line-height: 1;
}
.news-card.open .toggle-icon { transform: rotate(90deg); color: var(--accent); }

/* Expand */
.card-expand { display: none; border-top: 1px solid var(--border); }
.news-card.open .card-expand { display: block; }

.inner-tabs {
  display: flex;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 18px;
}
.inner-tab {
  padding: 8px 14px; border: none; background: transparent;
  font-size: 12px; font-family: inherit; color: var(--text-m);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all 0.15s; font-weight: 500;
}
.inner-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.inner-tab:hover:not(.active) { color: var(--text-p); }

.inner-panel { display: none; padding: 18px 20px; }
.inner-panel.active { display: block; animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:translateY(0); } }

/* 新聞重點 */
.summary-block {
  font-size: 14px; color: var(--text-s); line-height: 1.9;
  font-family: 'Noto Serif TC', serif;
  border-left: 3px solid var(--accent);
  padding-left: 14px;
  outline: none; white-space: pre-wrap;
}
.summary-block:focus { background: #fffef9; border-radius: 0 4px 4px 0; }
.summary-empty {
  font-size: 13px; color: var(--text-m); font-style: italic;
  padding: 12px 14px; background: var(--bg);
  border-radius: 6px; border: 1px dashed var(--border);
}

/* 全文 */
.fulltext-body {
  font-size: 13.5px; color: var(--text-s); line-height: 1.95;
  font-family: 'Noto Serif TC', serif; white-space: pre-wrap;
  outline: none;
}
.fulltext-body:focus { background: #fffef9; padding: 4px; margin: -4px; border-radius: 4px; }
.fulltext-paste {
  width: 100%; min-height: 100px; padding: 12px;
  border: 1px dashed var(--border); border-radius: 6px;
  font-family: 'Noto Serif TC', serif; font-size: 13.5px;
  color: var(--text-s); background: var(--bg);
  resize: vertical; outline: none; line-height: 1.9;
}
.fulltext-paste:focus { border-color: var(--accent); background: white; }
.fulltext-hint { font-size: 12px; color: var(--text-m); margin-bottom: 10px; font-style: italic; }

/* 相關報導 */
.related-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 0; border-bottom: 1px dashed var(--border);
  font-size: 13px; color: var(--text-s);
}
.related-row:last-child { border-bottom: none; }
.related-bullet { color: var(--text-m); flex-shrink: 0; margin-top: 1px; }
.related-src { font-size: 11px; color: var(--text-m); flex-shrink: 0; }

.empty-state {
  text-align: center; padding: 50px; color: var(--text-m); font-size: 14px;
}

/* Print */
@media print {
  .header { position: static; box-shadow: none; }
  .btn, .tabs, .inner-tabs, .fulltext-paste, .fulltext-hint { display: none !important; }
  .news-card { break-inside: avoid; }
  .card-expand { display: block !important; }
  .inner-panel { display: block !important; padding: 12px 18px; }
  .inner-panel + .inner-panel { border-top: 1px solid var(--border); }
}
@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .main { padding: 14px 16px; }
  .header-date { display: none; }
}
</style>
</head>

<header class="header">

  </div>
  <div class="header-actions">

  <div class="news-list" id="news-list"></div>
</main>

機 從美中到非洲都不能倖免\n美國與以色列於2月28日對伊朗展開聯合軍事打擊，雙方雖斷斷續續宣布停火2周，但荷莫茲海峽船舶數量仍\n未顯著恢復，油價、糧食及供應鏈危機也持續延燒，讓能源自主的美國飽受國內油價上漲之苦，反映出「全球化\n已死」雖在後冷戰時期不斷迴盪於耳，但全球化不會告終。\n油價飆漲 逾半美國人有感\n美國總統川普再度上任後，地緣政治的變動、貿易政策不確定性創新高，以及美國創下 1930年代以來最高水平\n的關稅，國際企業經營更具挑戰，貿易成本更高，也讓外界預測全球化將在後冷戰時期告終。\n但曾任教哈佛大學的卡拉貝爾博士4月10日投書華盛頓郵報，指出伊朗衝突反倒凸顯全球經濟整合的程度前所\n未見之高。全球商品市場，特別是石油、天然氣及化學肥料等關鍵大宗商品市場依舊高度整合，即使美中等經濟\n巨人也無法免於價格與供應鏈的衝擊。\n早在1970年代，美國就努力降低依賴進口石油帶來的脆弱性。到了2010年代末期，美國因投資開採頁岩油、液\n化天然氣及生產乙醇，成為能源淨出口國，而俄國2022年攻打烏克蘭與歐盟限制進口俄國石油，進一步降低美\n國對單一供應商的依賴。\n即使美國能源產量充足，仍無法擺脫荷莫茲航運中斷帶來的能源價格與供應鏈衝擊。據美國能源資訊署統計，其\n國內原油消費仍有近 3 分之 1 依賴進口。隨著能源價格飆漲，美國本土生產原油多為輕質原油，僅適合提煉汽油，\n用於生產柴油、航空燃油等其他石油產品的效率較低，仍需進口重質原油及相關成品。\n這讓美國國內油價受到全球供需與交易員預期心態的衝擊，飽受國際油價飆漲之苦。據益普索與路透 3月20日\n的美國民調中，55%的受訪者說汽油價格上漲對其家庭財務狀況造成一定程度影響；其中，21%的受訪者說受很大\n供應鏈中斷 恐釀長期通膨\n美國哈佛大學教授馬丁4月8日也投書紐約時報，表示眼下是水稻等糧食作物耕種季節，而尿素、氨等化肥原料\n短缺代表可能減產與漲價。新冠肺炎期間的經驗顯示，這類供應鏈中斷引發長期的通膨飆漲，衍生抵押貸款利率\n上升、財政危機到政治動盪等一系列副作用。\n中低收入國家將首當其衝。食品與能源價格上漲在美國等富裕國家是經濟壓力與政治動盪；但在其他國家可能是\n生死關頭。在非洲之角，進口化肥短缺更加深部分國家本已有的糧食危機。\n這證明全球能源、大宗商品及供應鏈仍高度相互依存，無論全球化是否失敗，國與國的互賴仍是當前現實。\n避開荷莫茲 中東拚新建設\n此外，中東國家正投注於後荷莫茲時代的韌性建設，興建新基礎設施以避開荷莫茲海峽。如沙烏地阿拉伯紅海港\n與擴建後的東西輸油管線，避開荷莫茲連接波斯灣與紅海；阿聯東海岸富查伊拉港與管線則連接波灣產油國與印", "summary": "荷莫茲效應 凸顯全球化未告終 油價、糧食及供應鏈危機 從美中到非洲都不能倖免", "priority": "watch", "lead": "供給端成本壓力，制約民間消費（C）空間", "related_count": 0}, {"main_title": "美伊戰事未解 衝擊AI發展前景", "related_titles": [], "sources": ["聯合報 A09 全球瞭望"], "full_text": "美伊戰事未解 衝擊 AI 發展前景\n因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建\n設。但美伊衝突將中東各國捲入，AI數據中心也成攻擊目標，加上能源價格上漲、原物料供應等危機，AI泡沫\n化又再度成為熱議題。\n伊朗報復攻擊AI設施\n隨著美國與以色列2月28日聯手軍事打擊伊朗，麻省理工學院研究員克德羅斯基3月20日告訴時代雜誌，由於\n能源與資訊網路高度相互依存，而衝突結局又未知，圍繞AI而生的系統性經濟風險讓人憂心。\n由於 AI 數據中心成為伊朗報復攻擊目標，華府智庫戰略暨國際研究中心（CSIS）主任梅塔 3 月 11 日告訴 CNBC，\n管理AI基礎設施的企業可能制定因應方案，或考慮將數據中心移往風險較低的地區，或利用飛彈防禦、反無人\n機科技加強數據中心安全。\n跨國金融服務控股公司Hilco Global地緣政治部門執行董事墨菲說，「若波灣地緣政治風險不斷攀升，考量北\n歐、印度與東南亞的電力供應、監管機制及安全狀況更具預測性，企業可能會加速這些地區的建設」。\n雖然中東一向以廉價能源吸引科技企業的青睞；克德羅斯基認為，許多AI數據中心依賴天然氣供電，而波灣地\n區的天然氣設施卻成為攻擊目標，修復設施又耗時數個月，導致全球天然氣價格上漲。\n以歐洲天然氣價格主要基準之一的荷蘭天然氣交易中心（Dutch TTF）價格為例，2月25日價格為每百萬英制熱\n量單位10.75美元，3月19日漲至最高20.9美元，4月14日仍有15.03美元。\n儘管多數的數據中心仍位於美國，而美國又生產且出口天然氣，所受衝擊較低，不至於立即面臨成本上漲；但克\n德羅斯基說，其他數據中心的工作轉移至美國，而美國積累的工作量已非常龐大，無法負荷新任務將導致整個系\n美國政治與公共政策雜誌「美國展望」4月13日也指出，亞洲許多工業設施靠卡達與波灣地區供應的天然氣運\n作，而其供應已在戰爭期間耗盡。\n雖然台積電與南韓晶片製造商SK海力士均表示目前仍不受影響，拜登時期官員賈奎茲卻說，晶片製造商因與天\n然氣供應商簽署長期協議，故受市場日常波動影響較小。但合約屆期後若仍維持高價，製造商將支付更多能源與\n半導體雖主要產自東亞與東南亞，許多原料卻來自中東，成為另一項問題。「美國展望」說，波灣國家化石燃料\n儲量豐富，而化石燃料又是生產半導體的關鍵。各企業斥資數千億美元建構數據中心之際，一旦生產中斷，不僅\n對消費性與商用電子產品的供應產生壓力，還可能嚴重阻礙AI算力成長。", "summary": "因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建", "priority": "watch", "lead": "民間投資（I）上行動能，支撐 GDP 成長", "related_count": 0}, {"main_title": "聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨", "related_titles": [], "sources": ["工商時報 A01 要聞"], "full_text": "曉，投資人關注資本支出是否轉化為獲利成長\n2 聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨 工商時報 A01 要聞\n3 台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～ 工商時報 A01 要聞\n4 白宮記協晚宴 驚傳槍響 經濟日報 A01 要聞\n5 取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收 經濟日報 A01 要聞\n6 創業之星選秀 快來報名 創投產業推手跨境跨域整合實 經濟日報 A01 要聞\n力，催動創新生態系升級 開發資本助新創搶AI先機\n7 川普出席 白宮記協晚宴傳槍響 自由時報 A01 焦點新聞\n8 錄影「突圍」史國晚宴》 中華民國台灣是主權國家 賴： 自由時報 A01 焦點新聞\n2300萬台灣人有權走向世界\n9 春雨助攻 高雄農業旱情解除 自由時報 A01 焦點新聞\n10 10公克大麻 萬元賣牌友 販二級毒品不承認 重判11年 自由時報 A01 焦點新聞\n11 孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤 聯合報 A01 要聞\n12 供電吃緊 德國再掀重啟核能辯論 車諾比核災滿40周年 聯合報 A01 要聞\n梅爾茨指全面廢核電是戰略錯誤\n13 獨家專訪／促台速通過國防特別條例 釋出強化自我防衛 中國時報 A01 要聞\n信號 谷立言：嚇阻力 維護和平最佳途徑\n14 又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教 中國時報 A01 要聞\n02-本會相關新聞(13)\n1 台積鉅額交易 創2,285元新高 總成交金額逾1.37億元 工商時報 B05 集中市場 期貨\n2 國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年 工商時報 A06 綜合要聞\n每案最高補貼3,000萬元、大專院校則為500萬元\n3 AI中央廚房補助計畫地方美食IP化策略 讓特色料理變 工商時報 A06 綜合要聞\n4 Q1信義房價指數房價有撐短期難大跌 工商時報 A10 產業‧科技\n5 台積先進製程 神速擴產 法人推估今年底2、3奈米月產 經濟日報 A03 話題\n能上看28萬片 遠超預期 可望憑藉技術優勢「贏者全\n6 考量用電需求… 經部：強化資料中心審議機制 經濟日報 A05 焦點\n7 經長挺高雄設算力園區 經濟日報 A05 焦點\n8 環評總體檢 啟動雞尾酒療法 經濟日報 A05 焦點\n9 失能長照險混搭 保障互補 兩者理賠標準不同 雙重防護 經濟日報 A11 保險\n補足缺口 業者推出多元保單 協助小資族解決痛點\n10 淨零承諾 企業的能源硬仗 經濟日報 A13 經營管理\n11 廚餘養豬明年退場 營養午餐清運費恐大漲 自由時報 A06 生活新聞\n12 ＜財經週報-本週熱點＞ 景氣燈號有望連4紅 首季拚雙 自由時報 A09 財經週報\n13 時評 台灣淪先禁國家 中國時報 A10 時論廣場", "summary": "曉，投資人關注資本支出是否轉化為獲利成長", "priority": "normal", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "白宮記協晚宴 驚傳槍響", "related_titles": [], "sources": ["經濟日報 A01 要聞"], "full_text": "又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31 歲教師闖安檢站開火遭逮\n美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出 槍響，引發恐慌。在隨扈與安全人員迅速掩\n護下，川普與副總統范斯 等高層緊急撤離。隨後一名31歲、來自加州的槍手落網，他擁有電腦 碩士學位，揚\n言以「政府官員」為槍擊目標。川普返抵白宮後召開記 者會，他對槍手未多加批評，也否認事件與伊朗有關，\n他呼籲國民「 和平解決分歧」。\n白宮記協成立於1914年，該協會1921年開始舉行年度晚宴，是媒體 與政府官員加強溝通的社交活動，總\n統出席並發表演說一度成為慣例 。半世紀以來，晚宴都在華府希爾頓飯店舉行，而該地也是川普的偶 像、美國\n前總統雷根1981年遇刺重傷之地。現任白宮記者協會主席姜 偉嘉（Weijia Jiang），因全程冷靜沉著而備受讚\n譽。她是CBS華裔 資深白宮記者，出生於大陸廈門，2歲時全家移民美國。\n川普自嘲 總統是最危險職業\n這已是川普近2年來第3度遇刺未遂。他在劫後對記者表示，嫌犯是 「精神有問題的人」，並希望類似事\n件不再發生。他神情鎮定，甚至 開玩笑說自己「研究過暗殺」，沒那麼容易崩潰，還提到歷史上約有 5.8％的\n美國總統曾遭槍擊，直言「想不到還有比總統更危險的職業 」。\n美東時間25日晚間約8時30分。當時華府希爾頓飯店的宴會廳內約 有2600人，春季豌豆搭配布拉塔起司\n的前菜剛上桌，賓客正在交談寒 暄。川普與第一夫人梅蘭妮亞、范斯及姜偉嘉同坐台上。突如其來的 槍聲打破\n熱鬧氣氛，川普事後回憶，他第一時間還以為是「托盤掉了 」，而梅蘭妮亞則明顯察覺情況有異，神情驚慌。\n槍手被制伏後，川普一度希望晚宴繼續，但遭特勤人員拒絕。他略 帶遺憾地說，原本準備了一篇「史上最\n不得體的演說」，卻無緣登台 ，並承諾將在30天內重辦晚宴。\n根據調查，該名31歲男子艾倫（Cole Thomas Allen）是孤狼犯案 。他先在飯店側門、安檢較為鬆散處，\n組裝「長型」武器後，隨即衝 過一處大廳安檢站，身上攜帶霰彈槍、手槍及多把刀具。執法人員迅 速攔截並與\n其駁火，一名特勤幹員受傷但無大礙，嫌犯未中彈，最終 被壓制上銬。\n孤狼犯案 2024捐款給賀錦麗\n多家美媒指出，嫌犯艾倫曾是加州托倫斯市C2教育機構的「明星教 師」，2024年獲得「月度最佳教師」\n稱號。另外，根據聯邦選舉委員 會的紀錄，嫌犯2024年捐款25美元（台幣約787元）給當時競選總統 的民主\n根據艾倫的領英（LinkedIn）個人資料，他2017年畢業於加州理工 學院，獲機械工程學士學位，去年更獲\n得加州州立大學多明格斯山分 校電腦科學碩士學位。在加州理工學院就讀期間，因研發輪椅緊急煞 車原型，而\n他自稱是電子遊戲開發者，且似乎在Steam遊戲平台上，以1.99美 元價格發布一款名為《Bohrdom》的獨\n紐約郵報報導，槍手開槍前10分鐘，向家人發送反川普宣言。自稱 「友好的聯邦刺客」。「我不是被炸死\n的學生，也不是挨餓的孩童， 更不是被本屆政府中眾多罪犯虐待的少女。當『別人』遭受壓迫時， 以德報怨並\n非基督徒的行為，而是壓迫者的共謀。」「我再也不願讓 一個戀童癖、強暴犯和叛徒的罪行沾染我的雙手，」\n艾倫寫道，顯然 指的是川普。\n哥倫比亞特區聯邦檢察長皮洛表示，嫌犯被控使用槍枝及持危險武 器襲擊執法人員等2項罪名，不排除追\n加罪名，預計27日提審。", "summary": "美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出 槍響，引發恐慌。在隨扈與安全人員迅速掩", "priority": "normal", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "伊朗：荷莫茲不恢復戰前狀態", "related_titles": [], "sources": ["中國時報 AA02 焦點新聞"], "full_text": "伊朗：荷莫茲不恢復戰前狀態\n美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令\n停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。\n另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返回伊朗。\n真主黨一再敦促黎巴嫩退出停火談判，並警告任何協議都將缺乏全國共識，最近以色列發動的強力攻擊，進一步\n考驗與黎巴嫩之間脆弱的停火協議。黎巴嫩衛生部25日公佈的數據顯示，自3月2日黎以戰火重燃以來，以色\n列對黎巴嫩發動的攻擊已造成2496人死亡。\n以色列軍方稱，6名死者都是真主黨成員，包括消滅3名駕駛著裝滿武器車輛的真主黨成員，以及一名騎電動機\n車的真主黨成員，並在其他地點擊斃另外兩名武裝人員。\n另外，美軍中央司令部25日發聲明說，當天早些時候，美軍平克尼號飛彈驅逐艦出動直升機攔截一艘受到美國\n制裁的商船。據了解，這艘名為塞凡號（M／V Sevan）的油輪，是美國財政部24日制裁的19艘與伊朗有關的\n「影子艦隊」船隻之一，制裁原因是這些船隻涉嫌向海外市場運輸價值數十億美元的伊朗能源、石油和天然氣產\n品，包括丙烷和丁烷等。\n中央司令部指出，美軍持續執行進出伊朗港口船隻的封鎖。自封鎖措施實施以來，已有 37 艘船隻被迫改變航道。\n美伊雙方持續對荷莫茲海峽進行封鎖，已造成國際能源價格居高不下，據伊朗媒體 26日報導，伊朗伊斯蘭議會\n第二副議長尼克札德（Ali Nikzad）表示，伊朗最高領袖穆吉塔巴已明確下令，荷莫茲海峽不得恢復戰前狀態。", "summary": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令", "priority": "normal", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "全球超級央行周 利率料全數按兵不動", "related_titles": [], "sources": ["工商時報 A02 火線焦點"], "full_text": "26-04-27 作者:【陳穎芃、楊淨淳／綜合外電\n全球超級央行周及美股超級財報周來臨，在美伊和談陷入膠著下， 市場更期待「科技七雄（Magnificent 7）」\n表現，與台股關連性高 的微軟、Google、AWS（亞馬遜）、Meta等重量級四大CSP（雲端服務 供應商）及蘋果\n將發布財報，加上台廠也有多家重量級AI相關概念股 法說會同時於本周登場，相關概念股持續吸引成為市場焦\n金融市場迎來極度關鍵的一周，30日堪稱壓軸日，因美國聯準會（ Fed）、日銀、英央及歐央於28至30\n日陸續公布利率決策，五大央行 均可望按兵不動，惟日銀可能因美伊戰爭與通膨壓力，釋放6月升息 的鷹派訊\n號。但最受矚的是，重大財報也都集中在這一天，谷歌、微 軟、亞馬遜、Meta將發布季報。\n台北時間30日，Alphabet預計公布財報，估每股盈餘（EPS）約2. 83美元、營收約1,070億美元，年增\n約11％，Google Cloud成長率可 望近50％。同日還有亞馬遜，預估EPS約2.11美元、營收1,772億美元 ，\n年增14％；AWS雲端業務預計成長25％。\nMeta方面，市場估EPS達7.51美元、營收555億美元，年增31％。微 軟同日壓軸，預估EPS約4.04美元、\n營收814億美元，雙雙年增逾15％ ；Azure雲端業務成長約38％，仍為AI變現核心。蘋果預定5月1日公 布\n財報，預估EPS為1.96美元、營收1,093億美元。\n投資人關注焦點已從「是否擴張」轉向「投資是否帶來實質回報」 ，科技業能否證明高額資本支出轉化為\n營收與獲利成長，是本季關鍵 檢驗。\n台新投顧總經理黃文清說，市場對美科技股營收展望正向，有望帶 動台系供應鏈成長，美股雖第一季為產\n業淡季，營收多數呈現季減， 但AI相關科技股營收持續上修，營運動能強，觀察標普500成份股第 一季盈餘\n年增14.4％，科技股成長46.4％，表現最亮麗，預期科技股 仍為主要成長動力，第二、三季也將維持強勁成長\n趨勢。本周也有多 家中大型電子股舉辦第一季財報法說，預估相關電子股今年獲利普遍 呈現雙位數成長。\n四大CSP廠相關概念股中，台股的上下游供應鏈有多家廠商入列， 且囊括晶圓代工、封測、IP矽智材／\nASIC、載板、散熱、AI伺服器等 相關族群。檢視近期盤面，已有多檔個股獲得資金領先卡位，包括台 積電、\n日月光控投、台達電、緯穎、世芯-KY、創意、聯發科、欣興 、金像電、奇鋐、雙鴻、愛普*、智原、川湖等，", "summary": "26-04-27 作者:【陳穎芃、楊淨淳／綜合外電", "priority": "normal", "lead": "貨幣政策路徑，影響台美利差與資金流向", "related_count": 0}, {"main_title": "超級央行週 美英歐日料利率不變", "related_titles": [], "sources": ["自由時報 A02 焦點新聞"], "full_text": "超級央行週 美英歐日料利率不變\n戰爭局勢不明 彭博經濟學家預期 Q4前Fed將按兵不動\n彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策\n會議後，預料將維持借貸成本不變，同時密切關注伊朗戰爭引發的高能源成本是否加劇通膨。\n這些央行做出的最終決定，可能意味著全球貨幣政策官員再次重申他們準備好採取行動的決心。這種態度與二○\n二二年上次能源危機初期普遍存在的樂觀態度截然不同，當時許多決策官員認為，通膨飆升只是暫時的。\n儘管國內情況對所有央行至關重要，但全球能源供應的重要水道荷姆茲海峽局勢，也可能在一定程度上左右其貨\n幣政策的走向。美國總統川普取消高級特使飛往巴基斯坦展開和談的計畫，伊朗則表示只要受到威脅就不會進行\n談判，因此重啟和平談判的努力陷入停滯狀態。\n彭博經濟學家Estelle Ou表示：「未來一週，Fed、歐洲央行、英格蘭銀行、日本銀行和加拿大央行，可能會維\n持利率不變，因為美伊緊張局勢持續且動盪。我們預計Fed將維持利率不變直至第四季，而歐洲央行和英格蘭銀\n行則保留升息的選擇權。」\n日本銀行將率先於廿八日開會，上週發言的官員傾向於本月暫緩升息，多數經濟學家預期下一次升息可能在六月。\n經濟學家和投資人預期，Fed在廿九日會後將維持利率在三．五％至三．七五％區間不變，連三次按兵不動，主\n因中東衝突帶動能源價格飆升，導致通膨壓力攀升，而美國就業市場與經濟仍展現韌性；加拿大央行也將在廿九\n日會後維持利率二．二五％不變。\n歐洲央行和英格蘭銀行將於三十日會後公布利率決策，預料都將維持利率不變，分別為二％與三．七五％。", "summary": "彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策", "priority": "normal", "lead": "貨幣政策路徑，影響台美利差與資金流向", "related_count": 0}]}, "總體數據": {"icon": "📊", "label": "Macro Data", "items": [{"main_title": "美超級財報周 點火AI台鏈 四大CSP及蘋果季報將揭曉，投資人關注資本支出是否轉化為獲利成長", "related_titles": [], "sources": ["工商時報 A01 要聞"], "full_text": "編 新聞議題 報導媒體\n01-頭版新聞(14)\n1 美超級財報周 點火AI台鏈 四大CSP及蘋果季報將揭 工商時報 A01 要聞\n曉，投資人關注資本支出是否轉化為獲利成長\n2 聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨 工商時報 A01 要聞\n3 台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～ 工商時報 A01 要聞\n4 白宮記協晚宴 驚傳槍響 經濟日報 A01 要聞\n5 取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收 經濟日報 A01 要聞\n6 創業之星選秀 快來報名 創投產業推手跨境跨域整合實 經濟日報 A01 要聞\n力，催動創新生態系升級 開發資本助新創搶AI先機\n7 川普出席 白宮記協晚宴傳槍響 自由時報 A01 焦點新聞\n8 錄影「突圍」史國晚宴》 中華民國台灣是主權國家 賴： 自由時報 A01 焦點新聞\n2300萬台灣人有權走向世界\n9 春雨助攻 高雄農業旱情解除 自由時報 A01 焦點新聞\n10 10公克大麻 萬元賣牌友 販二級毒品不承認 重判11年 自由時報 A01 焦點新聞\n11 孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤 聯合報 A01 要聞\n12 供電吃緊 德國再掀重啟核能辯論 車諾比核災滿40周年 聯合報 A01 要聞\n梅爾茨指全面廢核電是戰略錯誤\n13 獨家專訪／促台速通過國防特別條例 釋出強化自我防衛 中國時報 A01 要聞\n信號 谷立言：嚇阻力 維護和平最佳途徑\n14 又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教 中國時報 A01 要聞\n02-本會相關新聞(13)\n1 台積鉅額交易 創2,285元新高 總成交金額逾1.37億元 工商時報 B05 集中市場 期貨\n2 國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年 工商時報 A06 綜合要聞\n每案最高補貼3,000萬元、大專院校則為500萬元\n3 AI中央廚房補助計畫地方美食IP化策略 讓特色料理變 工商時報 A06 綜合要聞\n4 Q1信義房價指數房價有撐短期難大跌 工商時報 A10 產業‧科技\n5 台積先進製程 神速擴產 法人推估今年底2、3奈米月產 者全拿」\n台積電先進製程嚴重供不應求，正快馬加鞭擴產。供應鏈傳出，台積電當紅的3奈米台灣廠區原訂今年底月產能\n15萬片，如今可望增至18萬片，比預期多兩成；2奈米去年底量產後，今年底月產能就會衝高至近10萬片。\n對於相關消息，台積電表示，不評論市場傳聞。法人推算，台積電今年底2奈米與3奈米月產能合計將達近28\n萬片，遠高於市場預期，凸顯AI、高速運算（HPC）需求強勁，台積電先進製程神速擴產，憑藉技術領先優勢\n「贏者全拿」，領先取得這波AI與高速運算熱潮帶來的龐大商機。\n市場原本預期，台積電去年底3奈米月產能約12萬至13萬片，今年頂多擴至15萬片。由於客戶需求遠出乎預\n期，供應鏈傳出，台積電全力衝刺3奈米新產能布建，今年底月產能將達18萬片左右，比預期多二成，年增率\n台積日前在法說會提到，就過去而言，該公司不會在一個製程技術達到目標產能後再額外增加產能，但其首要責\n任是提供客戶最先進的技術和必要產能，為滿足 AI 應用強勁需求，正擴大資本投資，以增加 3 奈米產能。另外，\n台積電也調度台灣廠區資源，持續轉換5奈米設備，來支援3奈米產能。\n台積電正在南科新增一座3奈米廠，預計明年上半年進入量產；美國亞利桑那州第二座晶圓廠也將採用 3奈米製\n程，目前該晶圓廠已完成興建，規劃明年下半年開始量產。日本熊本第二座晶圓廠同樣將採用 3奈米製程，預計\n於2028年進入量產。相關供應鏈透露，台積電亞利桑那州二廠大約今年第3季就會開始進機台。\n台積電曾提到，2奈米製程已於去年第4季以優異良率表現進入量產，在對智慧手機、高速運算與AI應用的強\n勁需求支持下，該製程正同時在新竹及高雄的數期晶圓廠中量產。在其持續強化的策略下，會再推出 N2P與A16\n製程，並預期2奈米家族將成為公司另一個大規模且有長期需求的製程技術。\n台積電去年底2奈米每月投片量約落在3萬至4萬片之間，若如上述消息所言，今年底相關月產能將達近10萬\n片，等於產能在一年之內增加約1.4倍至2.1倍。", "summary": "台積先進製程 神速擴產 法人推估今年底 2、3 奈米月產能上看 28 萬片 遠超預期 可望憑", "priority": "normal", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}]}, "政策規畫": {"icon": "🏢", "label": "Policy", "items": [{"main_title": "台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～6GW設置容量", "related_titles": [], "sources": ["工商時報 A01 要聞"], "full_text": "t專案ASIC傳捷報 供應鏈嗨 工商時報 A01 要聞\n3 台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～ 工商時報 A01 要聞\n4 白宮記協晚宴 驚傳槍響 經濟日報 A01 要聞\n5 取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收 經濟日報 A01 要聞\n6 創業之星選秀 快來報名 創投產業推手跨境跨域整合實 經濟日報 A01 要聞\n力，催動創新生態系升級 開發資本助新創搶AI先機\n7 川普出席 白宮記協晚宴傳槍響 自由時報 A01 焦點新聞\n8 錄影「突圍」史國晚宴》 中華民國台灣是主權國家 賴： 自由時報 A01 焦點新聞\n2300萬台灣人有權走向世界\n9 春雨助攻 高雄農業旱情解除 自由時報 A01 焦點新聞\n10 10公克大麻 萬元賣牌友 販二級毒品不承認 重判11年 自由時報 A01 焦點新聞\n11 孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤 聯合報 A01 要聞\n12 供電吃緊 德國再掀重啟核能辯論 車諾比核災滿40周年 聯合報 A01 要聞\n梅爾茨指全面廢核電是戰略錯誤\n13 獨家專訪／促台速通過國防特別條例 釋出強化自我防衛 中國時報 A01 要聞\n信號 谷立言：嚇阻力 維護和平最佳途徑\n14 又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教 中國時報 A01 要聞\n02-本會相關新聞(13)\n1 台積鉅額交易 創2,285元新高 總成交金額逾1.37億元 工商時報 B05 集中市場 期貨\n2 國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年 工商時報 A06 綜合要聞\n每案最高補貼3,000萬元、大專院校則為500萬元\n3 AI中央廚房補助計畫地方美食IP化策略 讓特色料理變 工商時報 A06 綜合要聞\n4 Q1信義房價指數房價有撐短期難大跌 工商時報 A10 產業‧科技\n5 台積先進製程 神速擴產 法人推估今年底2、3奈米月產 經濟日報 A03 話題\n能上看28萬片 遠超預期 可望憑藉技術優勢「贏者全\n6 考量用電需求… 經部：強化資料中心審議機制 經濟日報 A05 焦點\n7 經長挺高雄設算力園區 經濟日報 A05 焦點\n8 環評總體檢 啟動雞尾酒療法 經濟日報 A05 焦點\n9 失能長照險混搭 保障互補 兩者理賠標準不同 雙重防護 經濟日報 A11 保險\n補足缺口 業者推出多元保單 協助小資族解決痛點\n10 淨零承諾 企業的能源硬仗 經濟日報 A13 經營管理\n11 廚餘養豬明年退場 營養午餐清運費恐大漲 自由時報 A06 生活新聞\n12 ＜財經週報-本週熱點＞ 景氣燈號有望連4紅 首季拚雙 自由時報 A09 財經週報\n13 時評 台灣淪先禁國家 中國時報 A10 時論廣場", "summary": "力，催動創新生態系升級 開發資本助新創搶AI先機", "priority": "watch", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "經長挺高雄設算力園區", "related_titles": [], "sources": ["經濟日報 A05 焦點"], "full_text": "經長挺高雄設算力園區\n立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，\n到高雄較為適合，要往接近電源地方設置。\n民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。\n他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區，讓民間加速 AI算力中心興建，他詢問\n龔明鑫回答，大型AI算力中心設置，到高雄比較適合，往接近電源地方設置。他並強調，經濟部會鼓勵、並支\n持高雄有國家算力園區，作為示範。\n賴瑞隆詢問，高雄有電力，如果在高雄設置國家算力園區，經濟部有哪些地方可以協助？龔明鑫表示，AI算力\n中心仍需要電網支持，台電需要把電網準備好。\n官員表示，因AI用電量龐大，密度高，台電建議愈接近電源愈好，以避免排擠原有用戶。而南部地區電力供應", "summary": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，", "priority": "watch", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "淨零承諾 企業的能源硬仗", "related_titles": [], "sources": ["經濟日報 A13 經營管理"], "full_text": "淨零承諾 企業的能源硬仗\n合會計師事務所氣候變遷、永續發展與ESG諮詢服務負責人暨執業會計師）\n自《京都議定書》以來，全球淨零目標已從先進國家的強制減碳責任，逐步演進為全體國家共同參與的氣候行動。\n《巴黎協定》奠定全球減碳框架，明確設定將全球升溫控制在2℃以內，並努力限制於1.5℃的共同目標。2023\n年聯合國氣候變遷大會（COP28）首度進行全球盤點，呼籲各國加強國家自定貢獻（NDC），並於2030年前展現\n目前，全球已有140多個國家提出「2050淨零排放」的宣示與行動。台灣也順應此趨勢，於2021年世界地球日\n由蔡前總統正式宣示「2050淨零轉型」為國家目標；政府於2024年底重新檢視目標，設定至2035年國家溫室\n氣體淨排放量較2005年減少38±2%。\n在國家淨零政策的引導下，企業部門扮演著關鍵角色。以元大台灣50ETF成分股中的非金融業為例，這些大型上\n市公司涵蓋電子、半導體、鋼鐵、石化及航運等關鍵產業，為台灣經濟發展的主力。其營運模式與減碳策略不僅\n影響企業自身營運，更對國家碳排結構及經濟轉型具有指標性意義。\n以出口主力與經濟支柱為核心的電子代工與半導體產業，除了承擔自身減碳責任外，也須配合國際品牌客戶要求，\n降低整體供應鏈碳排放；工業部門如石化與鋼鐵的業者，則提出製程最佳化、能源轉換與碳捕捉、再利用與封存\n技術（CCUS）的碳中和路徑；而航運業等運輸型產業則主要透過提升燃油效率、推動船舶節能與據點管理等措施\n整體而言，台灣主要產業中的大型企業皆已承諾長期減碳，並就淨零路徑與行動策略做出規劃。\n然而，企業淨零目標的實現仍高度依賴能源結構的轉型；能源供應穩定性、再生能源比例提升與配套政策措施，\n將決定企業淨零轉型的可行性與持續性，也進一步影響台灣產業在全球低碳經濟中維持競爭力的能力。\n對台灣跨國企業而言，淨零轉型也意味著他們必須同時迎接國內與國外營運所在地的轉型相關挑戰。\n根據《2025年國家溫室氣體排放清冊報告》，台灣約九成碳排放來自能源使用；而中研院預估，為實現 2050淨\n零目標所需要的能源轉換與電氣化等措施將使全國電力需求自2024年的2,885.64億度攀升至約5,000億度。\n然而，現行能源結構中，火力發電供應約八成的用電需求，其中燃氣與燃煤比例約各半；因此，如何在電力成長\n需求下推動發電去碳化，成為台灣邁向淨零的首要挑戰。\n考量燃氣發電的碳排係數大幅低於燃煤發電，目前能源署策略以「以氣換煤」為主軸，計畫於 2024至2033年間\n逐步將燃煤機組汰換為燃氣機組，使燃氣占比達50%，並將燃煤機組改作緊急備援電力。", "summary": "合會計師事務所氣候變遷、永續發展與ESG諮詢服務負責人暨執業會計師）", "priority": "watch", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "數位ｘ淨零的綠色整合方案", "related_titles": [], "sources": ["經濟日報 A04 焦點"], "full_text": "數位ｘ淨零的綠色整合方案\n當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台\n灣正處於「既要發展AI，又要落實減碳」的關鍵十字路口。近期舉行的「2026淨零城市國際峰會」中，我站在\n法人研發的前線觀察到：未來核心競爭力不在於兩者間的權衡，而在於能否掌握「數位×淨零」雙軸轉型能力，\n將電力消耗轉化為智慧成長動能。\n數位與綠色的結合，首先體現在建築空間的轉型。面對減碳最關鍵的場域，我們在設計階段便能運用能源模擬技\n術（如BESTAI）預測能耗，協助企業精準路徑規劃。實務上再結合AI電力感測（如Power Tab），以非侵入方\n式實現用電行為的可視化管理。這種從「可預測」到「可治理」的轉變，才是落實建築淨零的核心路徑。\nAI時代，算力已成國家競爭力指標，但隨著硬體規格升級，散熱需求也急遽攀升。當最新一代 NVIDIA晶片功耗\n直逼1,500W時，傳統氣冷散熱已達極限，液冷系統則伴隨高成本與漏液風險。對此，工研院開發出的「3D鋁製\n微流道熱虹吸散熱技術」，其提供現有機房「無痛升級」：企業更換高算力晶片時，無需改變建築結構或機房設\n施，散熱器於相同體積下即可穩定處理1,500W熱量，以極低成本換取頂級算力運行。針對未來晶片功耗突破\n2,000W的挑戰，我們也進一步部署「低壓冷媒兩相流冷板」技術。\n淨零轉型除了綠能總量外，電力系統是否具備足夠韌性也是關鍵，而這仰賴數位化與即時調控能力的提升。傳統\n電力系統強調集中式電廠與剛性輸配電網架，但在分散式與間歇式能源普及的今天，我們必須推動「微電網\n（Microgrid）」與「虛擬電廠（VPP）」雙管齊下。前者強化區域層級的供電韌性，後者則透過數位平台聚合分\n散資源，提升整體電網的調度彈性。以工研院為例，我們於南分院建置的微電網示範系統，實際整合再生能源預\n測與儲能調控，確保在電網不穩定甚至孤島狀態下，區域電力仍能韌性供應 。\n同時，我們透過「虛擬電廠平台」，有效聚合分散於各場域的再生能源、儲能與可調控負載，將原本零散、被動\n的用電與發電資源，轉化為可即時調度的彈性電力。另外，我們已成功將連鎖零售通路的冷凍設備化作「冷能電\n池」，在不影響保鮮前提下，於電網尖峰啟動數位調度，有效降低尖峰負載達5%以上。\n能源供應端的「脫碳」是達成2050淨零目標的終極戰場。台灣發展再生能源面臨間歇性供電挑戰，具備長時儲\n能特性、能跨越季節限制的「氫能」，遂成為重塑國家能源安全的關鍵戰略。目前工研院在台南沙崙建構的「氫\n應用示範驗證平台」，已邁向大規模產業驗證。\n面對2050淨零目標，我們不只是在研發技術，更是在構建一個高韌性的永續系統。台灣不僅能實踐自身的減碳\n承諾，更有機會在全球淨零賽道中，輸出一套以「數位×淨零」為核心的綠色整合方案，引領產業邁向高效能、\n低碳排且具競爭力的新時代。", "summary": "當生成式AI以狂飆之勢重新定義全球產業時，電力需求劇增成為隱形挑戰 。在2050淨零排放倒數壓力下，台", "priority": "watch", "lead": "一般經濟資訊，建議持續觀察後續數據", "related_count": 0}, {"main_title": "台灣國是會議》司徒文呼籲立院通過增加國防預算", "related_titles": [], "sources": ["自由時報 A03 焦點新聞"], "full_text": "03-國內要聞(27)\n1 台灣國是會議》司徒文呼籲立院通過增加國防預算 自由時報 A03 焦點新聞\n l_text": "無人機納國防特別預算 嚇阻力最快速\n立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移\n出，編入一般年度預算， 但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無 人機這類裝備，\n台灣可以非常迅速地建立許多這類相對應的能力，要 提供最快的嚇阻力量，最好的方法是將其納入國防特別預\n問：在野黨希望將商購及委製部分移為年度預算編列，華府會對此 感到失望嗎？\n答：我認為，台灣業者會非常失望。如果商購與委製移為一般年度 預算編列，資金到位的時間將會拉長，\n許多大型常規系統需要數年才 能建成並交付給台灣。\n像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能 力，如果你的目標是盡快提供最快的嚇\n阻力量，我認為最好的方法是 將其納入國防特別預算。一旦預算通過，台灣就可以立即生產。\n如同美國印太司令帕帕羅所說，這類系統在嚇阻方面至關重要，亦 如在伊朗衝突和烏克蘭衝突中所見，大\n規模生產的無人機系統對台灣 的安全具有舉足輕重的作用。因此，我們希望整套預算案能同時並進 、向前推進。\n這不僅有利於台灣的安全，也有利於我們共同建構新的 產業合作關係。\n問：國民黨擔心商購及委製的招標恐有不透明之處，易有弊端，因 此主張特別預算應該拆分處理，您的看\n答：我有聽說這種講法。任何政府進行採購都應該有監督機制審查 ，例如，台灣要買救護車或新的發電設\n備，都會進行公開招標，採購 無人機也相同。這對產業界是參與公開採購的機會，政府應有相關監 督機制，解\n決採購流程中的疑慮。\n我與台中市盧秀燕市長會面時也談到，國民黨內部愈來愈多的人了 解其中的巨大機會，對台中市的企業而\n言，漢翔科技就是領先的無人 機系統整合商之一。因此，這將惠及民進黨和國民黨兩黨執政縣市。\n所以，我希望雙方能找到共同點，將此視為台灣所有企業蓬勃發展 、為台灣安全做出貢獻的契機。從我們\n的角度來看，尤其對台灣的安 全而言，大規模生產無人系統是非常重要。", "summary": "立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移", "priority": "normal", "lead": "政府支出（G）結構調整，牽動公共投資預期", "related_count": 0}, {"main_title": "台日產業政策鏈結 聚焦5領域合作", "related_titles": [], "sources": ["自由時報 A02 焦點新聞"], "full_text": "兆豐、一銀成長最多 彰銀也揚升4.25%\n9 台日產業政策鏈結 聚焦5領域合作 自由時報 A02 焦點新聞\n10 打敗大盤 台股熱 主動式ETF規模狂飆 擁有主動選股優 聯合報 A06 話題\n勢 第一季整體規模達2982億元、季增72%\n11 金管會祭台積電條款 台股今拚4萬點 法人：慎防震盪 中國時報 A05 財經綜合\n12 財經會客室 跨境支付 讓世界更易走進台灣 中國時報 A07 生活理財\n13 數位帳戶十年 走入打詐死胡同 交易額度下降 嚴審開戶 中國時報 A07 生活理財\n14 純網銀助攻 延續數位帳戶熱潮 中國時報 A07 生活理財\n05-國際要聞(6)\n1 川普取消特使：伊朗想談可打電話 工商時報 A02 火線焦點\n2 和談未明 川普：伊朗不擁核才能協議 美代表團取消赴巴 聯合報 A10 國際\n基斯坦 伊朗外長又重返巴國：不在施壓下談判\n3 美伊各認占上風 談判卡關 聯合報 A10 國際\n4 陸前談判代表：中美有分歧 也尋共同利益 聯合報 A11 兩岸\n5 川普取消特使赴巴 美伊談判停擺 中國時報 AA02 焦點新聞\n6 伊朗：荷莫茲不恢復戰前狀態 中國時報 AA02 焦點新聞\n06-國際財經(10)\n1 全球超級央行周 利率料全數按兵不動 工商時報 A02 火線焦點\n2 美關鍵參議員不再阻撓 華許接掌Fed最大障礙沒了 工商時報 A02 火線焦點\n3 Fed本周開會 將以「鷹眼」緊盯通膨訊號 鮑爾可能暗示 經濟日報 A02 話題\n4 荷莫茲封閉 金融市場掀連鎖反應 波灣各國主權基金重新 經濟日報 A06 國際\n評估支出次序 優先聚焦國內經濟 恐衝擊全球投資交易\n5 超級央行週 美英歐日料利率不變 自由時報 A02 焦點新聞\n6 緊盯通膨 Fed年底前降息 門檻很高 美國及G7央行本周 聯合報 A06 話題\n舉行決策會議 預料利率不變\n7 荷莫茲效應 凸顯全球化未告終 油價、糧食及供應鏈危機 聯合報 A09 全球瞭望\n從美中到非洲都不能倖免\n8 美伊戰事未解 衝擊AI發展前景 聯合報 A0 const CATS = Object.keys(DATA);
let currentTab = 'all';
const pasteStore = {};
const PRIO_LABEL = { must: '必看', watch: '關注', normal: '一般' };

// Tabs
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  el.appendChild(mkTab('全部', 'all', true));
  CATS.forEach(cat => {
    const d = DATA[cat];
    const mustN = d.items.filter(i => i.priority === 'must').length;
    const label = d.icon + ' ' + cat + (mustN ? ' ⚑' + mustN : '');
    el.appendChild(mkTab(label, cat, false));
  });
}
function mkTab(label, id, active) {
  const b = document.createElement('button');
  b.className = 'tab-btn' + (active ? ' active' : '');
  b.dataset.id = id;
  b.textContent = label;
  b.onclick = () => switchTab(id);
  return b;
}
function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  renderList();
}

// List
function renderList() {
  const list = document.getElementById('news-list');
  list.innerHTML = '';
  const targets = currentTab === 'all' ? CATS : [currentTab];
  let n = 0;
  targets.forEach(cat => {
    DATA[cat].items.forEach(item => {
      list.appendChild(makeCard(item, cat));
      n++;
    });
  });
  if (!n) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.textContent = '目前無相關新聞資料';
    list.appendChild(e);
  }
}

// Card
function makeCard(item, cat) {
  const card = document.createElement('div');
  card.className = 'news-card priority-' + item.priority;
  const srcHtml = item.sources.map(s => '<span class="src-tag">' + s + '</span>').join('');
  const relN = item.related_count || 0;
  card.innerHTML =
    '<div class="card-top">' +
      '<div class="prio-col"><span class="prio-badge ' + item.priority + '">' + PRIO_LABEL[item.priority] + '</span></div>' +
      '<div class="card-info">' +
        '<div class="card-title">' + item.main_title + '</div>' +
        '<div class="card-lead">→ ' + item.lead + '</div>' +
        '<div class="card-meta">' + srcHtml + (relN ? '<span class="related-badge">＋' + relN + ' 則相關</span>' : '') + '</div>' +
      '</div>' +
      '<span class="toggle-icon">›</span>' +
    '</div>' +
    '<div class="card-expand"></div>';

  card.querySelector('.card-top').addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    if (!isOpen) buildExpand(card, item);
    card.classList.toggle('open');
  });
  return card;
}

// Build expand panel (lazy)
function buildExpand(card, item) {
  const expand = card.querySelector('.card-expand');
  if (expand.dataset.ready) return;
  expand.dataset.ready = '1';

  const tabBar = document.createElement('div');
  tabBar.className = 'inner-tabs';
  expand.appendChild(tabBar);

  const panels = [];

  function addInnerTab(label, active) {
    const t = document.createElement('button');
    t.className = 'inner-tab' + (active ? ' active' : '');
    t.textContent = label;
    const idx = panels.length;
    t.onclick = () => {
      tabBar.querySelectorAll('.inner-tab').forEach((x, i) => x.classList.toggle('active', i === idx));
      panels.forEach((p, i) => p.classList.toggle('active', i === idx));
    };
    tabBar.appendChild(t);
    const p = document.createElement('div');
    p.className = 'inner-panel' + (active ? ' active' : '');
    expand.appendChild(p);
    panels.push(p);
    return p;
  }

  // Panel 1: 新聞重點
  const p1 = addInnerTab('新聞重點', true);
  if (item.summary) {
    const div = document.createElement('div');
    div.className = 'summary-block';
    div.contentEditable = 'true';
    div.textContent = item.summary;
    p1.appendChild(div);
  } else {
    p1.innerHTML = '<div class="summary-empty">⚠️ 自動抓取失敗，請切換至「新聞全文」手動貼入</div>';
  }

  // Panel 2: 新聞全文
  const p2 = addInnerTab('新聞全文', false);
  const storeKey = item.main_title;
  if (item.full_text) {
    const div = document.createElement('div');
    div.className = 'fulltext-body';
    div.contentEditable = 'true';
    div.textContent = item.full_text;
    div.addEventListener('input', e => { pasteStore[storeKey] = e.target.innerText; });
    p2.appendChild(div);
  } else {
    const saved = pasteStore[storeKey] || '';
    p2.innerHTML = '<div class="fulltext-hint">📋 未能自動擷取，請手動貼入：</div>' +
      '<textarea class="fulltext-paste" placeholder="在此貼入《' + item.main_title + '》全文...">' + saved + '</textarea>';
    p2.querySelector('textarea').addEventListener('input', e => { pasteStore[storeKey] = e.target.value; });
  }

  // Panel 3: 相關報導（有才顯示）
  if (item.related_titles && item.related_titles.length > 0) {
    const p3 = addInnerTab('相關報導 (' + item.related_titles.length + ')', false);
    item.related_titles.forEach(r => {
      const row = document.createElement('div');
      row.className = 'related-row';
      const t = typeof r === 'object' ? r.title : r;
      const s = typeof r === 'object' ? r.source : '';
      row.innerHTML =
        '<span class="related-bullet">▸</span>' +
        '<span style="flex:1">' + t + '</span>' +
        (s ? '<span class="related-src">' + s + '</span>' : '');
      p3.appendChild(row);
    });
  }
}

  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const dateStr = roc + '.' + mm + '.' + dd;
  const sep1 = '════════════════════════════════════';
  const sep2 = '──────────────────────────────';

  let text = '【' + dateStr + ' 經濟規劃科 · 每日新聞重點】\n' + sep1 + '\n\n';
  const targets = currentTab === 'all' ? CATS : [currentTab];
  targets.forEach(cat => {
    const d = DATA[cat];
    text += d.icon + ' ' + cat + '\n' + sep2 + '\n';
    d.items.forEach(item => {
      text += '▌ [' + PRIO_LABEL[item.priority] + '] ' + item.main_title + '\n';
      text += '   來源：' + item.sources.join('、') + '\n';
      text += '   → ' + item.lead + '\n';
      if (item.summary) text += '   重點：' + item.summary + '\n';
      if (item.related_titles && item.related_titles.length > 0) {
        const rel = item.related_titles.map(r => typeof r === 'object' ? r.title : r);
        text += '   相關：' + rel.join('；') + '\n';
      }
      text += '\n';
    });
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.classList.add('success');
    btn.innerHTML = '✓ 已複製';
    setTimeout(() => {
      btn.classList.remove('success');
      btn.innerHTML = '📋 複製今日摘要';
    }, 2000);
  });
});

// 日期（民國年）
const now = new Date();
const roc = now.getFullYear() - 1911;
document.getElementById('date-label').textContent =
  '民國 ' + roc + ' 年 ' + (now.getMonth() + 1) + ' 月 ' + now.getDate() + ' 日';

renderTabs();
renderList();
</script>
</body>
</html>
