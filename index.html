u4e0d\u53ea\u767c\u751f\u5728\u8b77\u7406\u4eba\u529b\uff0c\u5f9e\u5de5\u7a0b\u5e2b\u3001\u6a5f\u5e2b\u5230\u5404\u985e\u5c08\u696d\u6280\u8853\u4eba\u54e1\uff0c\u7f3a\u5de5\u5df2\u662f\u5168\u9762\u73fe\u8c61\u3002\u7576\u7e3d\u9ad4\u52de\u52d5\u4f9b\u7d66\u4e0b\u964d\uff0c\u63d0\n\u9ad8\u85aa\u8cc7\u8207\u6539\u5584\u689d\u4ef6\uff0c\u5f80\u5f80\u53ea\u662f\u7522\u696d\u9593\u7684\u4eba\u624d\u518d\u5206\u914d\uff0c\u800c\u975e\u771f\u6b63\u589e\u52a0\u4eba\u529b\u3002\n\u66f4\u6839\u672c\u7684\u662f\uff0c\u4e16\u4ee3\u50f9\u503c\u5df2\u7d93\u6539\u8b8a\uff0c\u65b0\u4e16\u4ee3\u4e0d\u518d\u9858\u610f\u70ba\u9ad8\u58d3\u3001\u9577\u5de5\u6642\u8207\u9ad8\u5ea6\u8cac\u4efb\u627f\u64d4\u7121\u9650\u8b93\u6e21\u751f\u6d3b\u54c1\u8cea\uff0c\u8b77\u7406\u5de5\u4f5c\n\u7684\u672c\u8cea\uff0c\u8207\u9019\u6a23\u7684\u50f9\u503c\u8f49\u8b8a\u4e4b\u9593\uff0c\u5b58\u5728\u96e3\u4ee5\u5ffd\u8996\u7684\u843d\u5dee\u3002\u53f0\u7063\u9081\u5165\u8d85\u9ad8\u9f61\u793e\u6703\uff0c\u91ab\u7642\u8207\u9577\u7167\u9700\u6c42\u6301\u7e8c\u4e0a\u5347\uff0c\u4f46\u8b77\n\u7406\u6559\u80b2\u7aef\u62db\u751f\u4e0d\u8db3\uff0c\u5b78\u6210\u4e0d\u9858\u6295\u5165\u8077\u5834\u3001\u7559\u4efb\u7387\u4f4e\uff0c\u986f\u793a\u4f9b\u7d66\u7dca\u7e2e\uff0c\u80fd\u63d0\u4f9b\u670d\u52d9\u7684\u4eba\u537b\u6108\u4f86\u6108\u5c11\u3002\n\u9762\u5c0d\u9019\u6a23\u7684\u73fe\u5be6\uff0c\u5982\u4f55\u8b93\u8b77\u7406\u4eba\u54e1\u5728\u6709\u5c0a\u56b4\u4e14\u5408\u7406\u7684\u5de5\u4f5c\u74b0\u5883\u4e0b\u7559\u4e0b\u4f86\uff0c\u540c\u6642\u6539\u8b8a\u91ab\u7642\u9ad4\u7cfb\uff0c\u89e3\u65b9\u6216\u8a31\u662f\u6253\u6389\u91cd\n\u7df4\uff0c\u91cd\u5efa\u7cfb\u7d71\u3002\n\u9996\u5148\uff0c\u5fc5\u9808\u63a8\u52d5\u4efb\u52d9\u91cd\u5206\u914d\uff0c\u8b93\u8b77\u7406\u5e2b\u5f9e\u5927\u91cf\u975e\u6838\u5fc3\u5de5\u4f5c\u4e2d\u89e3\u653e\u51fa\u4f86\uff0c\u5c07\u4eba\u529b\u7528\u5728\u771f\u6b63\u9700\u8981\u7684\u5730\u65b9\u3002\n\u53bb\u5e74\u6709\u4eba\u5728\u516c\u5171\u653f\u7b56\u7db2\u8def\u5e73\u53f0\u5021\u8b70\uff0c\u8981\u6c42\u843d\u5be6\u4e09\u73ed\u8b77\u75c5\u6bd4\u8207\u975e\u5c08\u696d\u5de5\u4f5c\u6392\u9664\uff0c\u4f8b\u5982\u8981\u6c42\u660e\u78ba\u628a\u300c\u9ede\u73ed\uff08\u8ca1\u7269\u6e05\u9ede\u3001\n\u7269\u6599\u76e4\u9ede\uff09\u8207\u74b0\u5883\u6574\u7406\u300d\u7b49\uff0c\u5b9a\u7fa9\u70ba\u975e\u8b77\u7406\u5c08\u696d\uff0c\u6539\u7531\u5f8c\u52e4\u6216\u8b77\u7406\u8f14\u4f50\u4eba\u529b\u8655\u7406\u3002\u7576\u8b77\u7406\u4eba\u54e1\u7684\u96dc\u52d9\u5e72\u64fe\u6e1b\u5c11\uff0c\n\u53ef\u56de\u6b78\u300c\u76f4\u63a5\u7167\u8b77\u75c5\u4eba\u300d\u672c\u696d\uff0c\u9019\u624d\u662f\u8b77\u7406\u5c08\u696d\u771f\u6b63\u7684\u50f9\u503c\u3002\n\u5c11\u5b50\u5316\u96e3\u9006\u8f49 \u898f\u756b\u5916\u7c4d\u4eba\u529b\n\u5176\u6b21\uff0c\u555f\u52d5\u570b\u969b\u4eba\u529b\u5f15\u9032\u3002\u8a31\u591a\u5148\u9032\u570b\u5bb6\u5c07\u5916\u7c4d\u4eba\u529b\u8996\u70ba\u5e38\u614b\u914d\u7f6e\u3002\u5728\u8b77\u7406\u4eba\u529b\u56de\u6b78\u6838\u5fc3\u5de5\u4f5c\u4e4b\u5f8c\uff0c\u975e\u6838\u5fc3\u5de5\u4f5c\n\u53ef\u8f49\u7531\u5916\u7c4d\u4eba\u529b\u8655\u7406\uff0c\u5728\u5c11\u5b50\u7f3a\u5de5\u7684\u60c5\u6cc1\u4e0b\uff0c\u5f15\u9032\u5916\u7c4d\u4eba\u529b\u7121\u6cd5\u907f\u514d\uff0c\u5fc5\u9808\u53ca\u65e9\u8a8d\u771f\u601d\u8003\uff0c\u4e26\u505a\u51fa\u5408\u7406\u53ef\u884c\u7684\u898f\n\u756b\u3002\n\u7b2c\u4e09\uff0c\u79d1\u6280\u5c0e\u5165\u4e0d\u80fd\u505c\u7559\u5728\u53e3\u865f\u3002\u5168\u7403\u767c\u5c55\u4eba\u5de5\u667a\u6167\u5df2\u662f\u6642\u4ee3\u8da8\u52e2\uff0c\u9762\u5c0d\u672a\u4f86\u7269\u806f\u7db2\u3001\u5de8\u91cf\u8cc7\u6599\u53ca AI\u767c\u5c55\uff0c\u52a0\n\u4e0a\u53f0\u7063\u4eba\u53e3\u7d50\u69cb\u8001\u5316\u7684\u4e0d\u53ef\u9006\u73fe\u8c61\uff0c\u4eba\u5de5\u667a\u6167\u4e0d\u53ea\u53ef\u5354\u52a9\u91ab\u5e2b\uff0c\u4e5f\u80fd\u5e6b\u52a9\u8b77\u7406\u5e2b\u7b49\u5176\u4ed6\u91ab\u4e8b\u4eba\u54e1\uff0c\u4e5f\u8a31\u76ee\u524d\u81e8\u5e8a\n\u5c0e\u5165AI\u5c1a\u672a\u6210\u719f\uff0c\u61c9\u4ee5\u958b\u653e\u5305\u5bb9\u7684\u5fc3\u614b\u8207\u4eba\u5de5\u667a\u6167\u5171\u5b58\u3002\n\u8a55\u4f30\u91cd\u5efa\u9ad4\u7cfb \u624d\u662f\u6839\u672c\u89e3\u65b9\n\u8b77\u7406\u4eba\u54e1\u9003\u96e2\u91ab\u9662\u81e8\u5e8a\u5de5\u4f5c\uff0c\u6539\u5584\u5f85\u9047\u8207\u5de5\u4f5c\u74b0\u5883\u7121\u5eb8\u7f6e\u7591\uff0c\u4f46\u4eba\u529b\u4e0d\u8db3\u6642\uff0c\u5f37\u5236\u8a2d\u5b9a\u8b77\u75c5\u6bd4\u6a19\u6e96\uff0c\u91ab\u7642\u6a5f\u69cb\u53ea\n\u80fd\u900f\u904e\u95dc\u9589\u75c5\u5e8a\u3001\u6e1b\u5c11\u6536\u6cbb\u91cf\u80fd\u4f86\u7b26\u5408\u898f\u7bc4\u3002\u7576\u524d\u8a0e\u8ad6\u5728\u65bc\u300c\u61c9\u8a72\u6709\u591a\u5c11\u4eba\u300d\u7684\u7406\u60f3\u914d\u7f6e\uff0c\u4f46\u6211\u5011\u5fc5\u9808\u9762\u5c0d\u300c\u5be6\n\u969b\u4e0a\u6709\u591a\u5c11\u4eba\u300d\u3002\n\u8b77\u7406\u4eba\u529b\u554f\u984c\uff0c\u5f9e\u4f86\u4e0d\u662f\u55ae\u4e00\u8077\u985e\u554f\u984c\uff0c\u800c\u662f\u6574\u9ad4\u52de\u52d5\u4f9b\u7d66\u7d50\u69cb\u7684\u8b8a\u5316\u3002\u53f0\u7063\u7684\u653f\u7b56\u8a0e\u8ad6\u53cd\u8986\u5728\u7406\u60f3\u8207\u8a34\u6c42\u9593\u64fa\n\u76ea\uff0c\u5982\u679c\u653f\u7b56\u53ea\u662f\u56de\u61c9\u58d3\u529b\uff0c\u672a\u8a55\u4f30\u4eba\u529b\u4f9b\u7d66\u8207\u9ad4\u7cfb\u627f\u8f09\u80fd\u529b\uff0c\u6700\u7d42\u4e0d\u50c5\u7121\u6cd5\u6539\u5584\u8b77\u7406\u4eba\u54e1\u8655\u5883\uff0c\u6050\u5c07\u4f7f\u7b2c\u4e00\u7dda\n\u66f4\u75b2\u618a\uff0c\u6c11\u773e\u66f4\u96e3\u5c31\u91ab\u3002\n\uff08\u4f5c\u8005\u9673\u67cf\u540c\u70ba\u8ca1\u5718\u6cd5\u4eba\u539a\u751f\u57fa\u91d1\u6703\u57f7\u884c\u9577\uff09", "summary": "\u53f0\u7063\u8b77\u7406\u4eba\u529b\u77ed\u7f3a\u4e26\u975e\u65b0\u8b70\u984c\uff0c\u65e9\u5728\u5341\u591a\u5e74\u524d\u5c31\u5df2\u73fe\u8b66\u8a0a\u3002\u76f4\u81f3\u4eca\u65e5\uff0c\u6025\u8a3a\u58c5\u585e\u3001\u75c5\u623f\u95dc\u9589\u8207\u6392\u5e8a\u56f0\u96e3\u4e0d\u6e1b\u53cd\u589e\uff0c", "priority": "normal", "lead": "\u653f\u5e9c\u652f\u51fa\uff08G\uff09\u7d50\u69cb\u8abf\u6574\uff0c\u727d\u52d5\u516c\u5171\u6295\u8cc7\u9810\u671f", "related_count": 0}, {"main_title": "\u65b0\u56db\u901a\u4e0d\u662f\u653f\u7b56\u60f3\u50cf \u662f\u903c\u8fd1\u7684\u73fe\u5be6", "related_titles": [], "sources": ["\u806f\u5408\u5831 A13 \u5317\u90e8\u751f\u6d3b\u5708"], "full_text": "\u5927\u9678\u65e5\u524d\u516c\u5e03\u5c0d\u53f0\u5341\u5927\u63aa\u65bd\uff0c\u5305\u542b\u652f\u63f4\u91d1\u9580\u5171\u7528\u5ec8\u9580\u7fd4\u5b89\u65b0\u6a5f\u5834\u3001\u63a8\u52d5\u65b0\u56db\u901a\u653f\u7b56\uff0c\u91d1\u9580\u5e9c\u6703\u4eca\u5929\u6b32\u7d44\u5718\u8d74\u5ec8\u9580\n\u8003\u5bdf\uff0c\u5728\u5169\u5cb8\u654f\u611f\u6c1b\u570d\u4e0b\u884c\u7a0b\u5145\u6eff\u8b8a\u6578\u3002\u91d1\u5ec8\u662f\u5171\u540c\u751f\u6d3b\u5708\uff0c\u300c\u642d\u8239\u53bb\u5ec8\u9580\u300d\u662f\u91d1\u9580\u4eba\u65e5\u5e38\uff0c\u5c0f\u4e09\u901a\u4e8c\u5341\u4e94\u5e74\u4f86\n\u7a69\u5b9a\u904b\u4f5c\uff0c\u986f\u793a\u5730\u65b9\u4ea4\u6d41\u97cc\u6027\uff0c\u5169\u5cb8\u4ea4\u6d41\u662f\u5a01\u8105\u9084\u662f\u6a5f\u6703\u5b58\u4e4e\u4e00\u5fc3\u3002\n\u8ddd\u91d1\u9580\u50c5\u4e09\u516c\u91cc\u7684\u5ec8\u9580\u7fd4\u5b89\u570b\u969b\u6a5f\u5834\u4eca\u5e74\u5e95\u555f\u7528\uff0c\u91d1\u5ec8\u5927\u6a4b\u8b70\u984c\u4e5f\u53d7\u95dc\u6ce8\u3002\u8b70\u6703\u65e5\u524d\u4e0b\u9109\u8003\u5bdf\uff0c\u524d\u5f80\u91d1\u6c99\u93ae\u4e94\u9f8d\n\u5c71\u4e00\u5e36\uff0c\u52d8\u5bdf\u91d1\u5ec8\u5927\u6a4b\u9810\u5b9a\u929c\u63a5\u4f4d\u7f6e\uff1b\u773c\u898b\u5ec8\u9580\u6bb5\u5de5\u7a0b\u63a8\u9032\uff0c\u9810\u8a08\u4eca\u5e74\u5e95\u5b8c\u6210\u6d77\u4e0a\u4e3b\u9ad4\u3001\u660e\u5e74\u5e95\u5168\u7dda\u5efa\u6210\uff0c\u9810\u7559\n\u5ef6\u4f38\u81f3\u91d1\u9580\u7684\u63a5\u53e3\uff0c\u4f46\u91d1\u9580\u7aef\u9084\u662f\u8352\u8349\u4e00\u7247\u3002\n\u5c0d\u91d1\u9580\u800c\u8a00\uff0c\u9019\u5df2\u4e0d\u662f\u9059\u9060\u7684\u653f\u7b56\u60f3\u50cf\uff0c\u800c\u662f\u6b63\u5728\u903c\u8fd1\u7684\u73fe\u5be6\u3002\u91d1\u9580\u5e9c\u6703\u8a2a\u9678\u5718\u70ba\u524d\u5f80\u5c0d\u5cb8\u4e86\u89e3\u7fd4\u5b89\u6a5f\u5834\u3001\u65b0\u56db\n\u901a\u7684\u5f71\u97ff\uff0c\u539f\u8a02\u56db\u6708\u4e8c\u5341\u4e03\u3001\u4e8c\u5341\u516b\u65e5\u7531\u526f\u7e23\u9577\u674e\u6587\u826f\u5055\u8b70\u54e1\u8d74\u9678\uff0c\u8fd1\u671f\u9022\u300c\u912d\u7fd2\u6703\u300d\u3001\u8cf4\u7e3d\u7d71\u8a2a\u53cb\u90a6\u53f2\u74e6\u5e1d\u5c3c\n\u751f\u8b8a\u7b49\u4e8b\u4ef6\uff0c\u4e2d\u592e\u5c0d\u5730\u65b9\u5b98\u54e1\u8d74\u9678\u5be9\u67e5\u8da8\u56b4\u3002\u674e\u6587\u826f\u53ca\u7e23\u5e9c\u4e00\u7d1a\u4e3b\u7ba1\u8d74\u9678\u7533\u8acb\u906d\u99c1\u56de\uff0c\u9042\u7dca\u6025\u8abf\u6574\u540d\u55ae\uff0c\u6539\u7531\u526f\n\u8655\u9577\u5c64\u7d1a\u300c\u4ee3\u6253\u300d\u96a8\u884c\u3002\n\u5730\u65b9\u5c0d\u91d1\u5ec8\u5927\u6a4b\u3001\u5171\u7528\u7fd4\u5b89\u6a5f\u5834\u770b\u6cd5\u5169\u6975\u3002\u91d1\u9580\u4ef0\u8cf4\u53f0\u7063\u672c\u5cf6\u904b\u6cb9\u767c\u96fb\uff0c\u6210\u672c\u9ad8\u6602\uff0c\u82e5\u80fd\u900f\u904e\u9678\u6a4b\u7cfb\u7d71\u5f15\u9032\u5c0d\u5cb8\n\u96fb\u529b\u8207\u5929\u7136\u6c23\u53ef\u964d\u4f4e\u80fd\u6e90\u8ca0\u64d4\uff0c\u4e5f\u80fd\u5728\u9727\u5b63\u822a\u73ed\u505c\u98db\u3001\u5c0f\u4e09\u901a\u4e2d\u65b7\u6642\uff0c\u63d0\u4f9b\u4ea4\u901a\u66ff\u4ee3\u65b9\u6848\u3002\u82e5\u7d50\u5408\u7fd4\u5b89\u6a5f\u5834\uff0c\u91d1\n\u9580\u5c07\u6210\u70ba\u5169\u5cb8\u8207\u570b\u969b\u5ba2\u5f80\u8fd4\u7684\u4e2d\u8f49\u6a1e\u7d10\uff0c\u5e36\u52d5\u89c0\u5149\u3001\u9910\u98f2\u3001\u65c5\u5bbf\u53ca\u79df\u8eca\u7b49\u7522\u696d\u767c\u5c55\u3002\u53cd\u5c0d\u8005\u6182\u5fc3\uff0c\u9019\u4e0d\u55ae\u7d14\u662f\u4ea4\n\u901a\u5efa\u8a2d\uff0c\u800c\u662f\u5236\u5ea6\u8207\u5b89\u5168\u9078\u64c7\u3002\n\u503c\u5f97\u95dc\u6ce8\u7684\u662f\uff0c\u7fd4\u5b89\u6a5f\u5834\u555f\u7528\u5c0d\u91d1\u9580\u662f\u628a\u96d9\u9762\u5203\uff0c\u5229\u8655\u662f\u63d0\u5347\u91d1\u9580\u8207\u570b\u969b\u63a5\u8ecc\u7684\u6548\u7387\uff0c\u4fc3\u9032\u65c5\u904a\u5347\u7d1a\u8207\u7522\u696d\u51fa\u53e3\uff0c\n\u4f46\u5927\u578b\u5ba2\u6a5f\u4f4e\u7a7a\u8d77\u964d\u5e36\u4f86\u7684\u98db\u5b89\u3001\u566a\u97f3\u3001\u7a7a\u6c59\u53ca\u6d77\u57df\u6c59\u67d3\u554f\u984c\uff0c\u5c0d\u8179\u5730\u6709\u9650\u3001\u74b0\u5883\u627f\u8f09\u8106\u5f31\u7684\u91d1\u9580\u5c07\u662f\u9577\u671f\u4e14\u76f4\n\u63a5\u7684\u58d3\u529b\u3002\n\u5ec8\u9580\u7fd4\u5b89\u6a5f\u5834\u727d\u52d5\u5169\u5cb8\u95dc\u4fc2\u8b8a\u5316\uff0c\u5c0d\u91d1\u9580\u5f71\u97ff\u6df1\u9060\uff0c\u5982\u4f55\u56e0\u61c9\u65e5\u5f8c\u767c\u5c55\u7684\u65b0\u5c40\u3001\u885d\u64ca\uff0c\u5730\u65b9\u653f\u5e9c\u8981\u6709\u5354\u5546\u5c0d\u7b56\uff0c\n\u4e2d\u592e\u4e5f\u61c9\u8a72\u5c55\u73fe\u614b\u5ea6\u3002", "summary": "\u5927\u9678\u65e5\u524d\u516c\u5e03\u5c0d\u53f0\u5341\u5927\u63aa\u65bd\uff0c\u5305\u542b\u652f\u63f4\u91d1\u9580\u5171\u7528\u5ec8\u9580\u7fd4\u5b89\u65b0\u6a5f\u5834\u3001\u63a8\u52d5\u65b0\u56db\u901a\u653f\u7b56\uff0c\u91d1\u9580\u5e9c\u6703\u4eca\u5929\u6b32\u7d44\u5718\u8d74\u5ec8\u9580", "priority": "normal", "lead": "\u653f\u5e9c\u652f\u51fa\uff08G\uff09\u7d50\u69cb\u8abf\u6574\uff0c\u727d\u52d5\u516c\u5171\u6295\u8cc7\u9810\u671f", "related_count": 0}, {"main_title": "\u7d44\u5718\u5730\u4e0b\u5316\u53cd\u6dfb\u98a8\u96aa \u653f\u5e9c\u61c9\u52d9\u5be6\u6aa2\u8a0e\u5c0d\u9678\u653f\u7b56 \u63a9\u8033\u76dc\u9234\u7684\u8d74\u9678\u7981\u5718\u4ee4", "related_titles": [], "sources": ["\u806f\u5408\u5831 A15 \u6c11\u610f"], "full_text": "\u65e5\u524d\u53f0\u7063\u65c5\u904a\u5718\u8d74\u7518\u8085\u65c5\u904a\uff0c\u56e0\u8eca\u8f1b\u7ffb\u8986\u5c0e\u81f4\u4e86\u4e0d\u5e78\u7684\u6b7b\u50b7\u4e8b\u6545\u3002\u65b0\u805e\u66dd\u5149\u5f8c\uff0c\u9664\u4e86\u4ee4\u4eba\u96e3\u904e\u907a\u61be\uff0c\u66f4\u5f15\u767c\u543e\u4eba\n\u601d\u8003\uff1a\u53f0\u7063\u73fe\u884c\u7684\u8d74\u9678\u7981\u5718\u4ee4\u662f\u5426\u9084\u6709\u5fc5\u8981\uff1f\u751a\u81f3\u5c0d\u9678\u653f\u7b56\u662f\u5426\u61c9\u66f4\u52d9\u5be6\u5f48\u6027\uff1f\n\u57fa\u65bc\u9678\u65b9\u672a\u958b\u653e\u9678\u5ba2\u4f86\u53f0\u3001\u4e14\u7247\u9762\u6539\u8b8a\uff2d5\uff103\u822a\u8def\uff0c\u4ee5\u53ca\u8003\u91cf\u89c0\u5149\u9006\u5dee\u8207\u5169\u5cb8\u60c5\u52e2\uff0c\u653f\u5e9c\u65bc\u4e8c\u25cb\u4e8c\u56db\u5e74\u63f4\u5f15\n\u300c\u767c\u5c55\u89c0\u5149\u689d\u4f8b\u300d\u7b2c\u4e94\u5341\u4e09\u689d\uff0c\u4ee5\u300c\u640d\u5bb3\u570b\u5bb6\u5229\u76ca\u300d\u70ba\u7531\uff0c\u65bc\u8a72\u5e74\u516d\u6708\u8d77\u66ab\u505c\u65c5\u884c\u696d\u7d44\u5718\u8d74\u9678\u65c5\u904a\u3002\n\u7136\u800c\uff0c\u9019\u6240\u8b02\u7684\u8d74\u9678\u7981\u5718\u4ee4\u5be6\u65bd\u8fc4\u4eca\u8fd1\u5169\u5e74\uff0c\u4e26\u672a\u963b\u7d55\u53f0\u7063\u6c11\u773e\u8d74\u9678\u71b1\u6f6e\u3002\u6839\u64da\u89c0\u5149\u7f72\u7d71\u8a08\uff0c\u4e8c\u25cb\u4e8c\u56db\u5e74\u53f0\u7063\u8d74\n\u9678\u4eba\u6578\u70ba\u4e8c\u4e03\u4e03\u842c\uff0c\u53bb\u5e74\u5247\u589e\u9577\u81f3\u8fd1\u4e09\u4e8c\u56db\u842c\uff0c\u5927\u9678\u70ba\u53f0\u7063\u51fa\u5883\u76ee\u7684\u5730\u7b2c\u4e8c\u540d\uff0c\u50c5\u6b21\u65bc\u65e5\u672c\u3002\u82e5\u52a0\u4e0a\u7531\u6e2f\u3001\u6fb3\u6216\n\u5176\u4ed6\u570b\u5bb6\u8f49\u6a5f\uff0c\u5be6\u65bd\u7981\u5718\u4ee4\u4ee5\u4f86\uff0c\u53f0\u7063\u6bcf\u5e74\u8d74\u9678\u4eba\u6b21\u8d85\u904e\u56db\u767e\u842c\u3002\u4ea6\u5373\uff0c\u6578\u64da\u53cd\u6620\uff1a\u7981\u5718\u4ee4\u4e0b\u53f0\u7063\u6c11\u773e\u8d74\u9678\u53cd\u800c\n\u6709\u589e\u52a0\u8da8\u52e2\u3002\n\u7136\u800c\uff0c\u773e\u6240\u5468\u77e5\uff0c\u8d74\u9678\u7981\u5718\u4ee4\u5be6\u65bd\u521d\u671f\uff0c\u70ba\u898f\u907f\u76e3\u7ba1\uff0c\u8a31\u591a\u65c5\u884c\u696d\u8005\u5c07\u7d44\u5718\u884c\u70ba\u8f49\u5165\u5730\u4e0b\uff0c\u6539\u4ee5\u300c\u8003\u5bdf\u300d\u3001\u300c\u4ea4\n\u6d41\u300d\u6216\u300c\u843d\u5730\u6210\u5718\u300d\u7b49\u540d\u7fa9\u8d74\u9678\u65c5\u904a\uff0c\u300c\u5730\u4e0b\u5316\u300d\u9020\u6210\u81f3\u5c11\u4e09\u5927\u5f8c\u679c\uff1a\n\u9996\u5148\uff0c\u6d88\u8cbb\u8005\u6b0a\u76ca\u7121\u6cd5\u5f97\u5230\u4fdd\u969c\u3002\u5730\u4e0b\u8d74\u9678\u5718\u54c1\u8cea\u53c3\u5dee\u4e0d\u9f4a\uff0c\u4e14\u5f80\u5f80\u7f3a\u4e4f\u5408\u6cd5\u7684\u65c5\u884c\u696d\u8cac\u4efb\u4fdd\u96aa\uff0c\u4e00\u65e6\u767c\u751f\u65c5\u904a\n\u4e8b\u6545\uff0c\u65c5\u5ba2\u7121\u6cd5\u5f97\u5230\u5b8c\u6574\u7684\u4fdd\u969c\uff1b\u5176\u6b21\uff0c\u65c5\u884c\u7522\u696d\u5931\u5e8f\u3002\u7981\u5718\u4ee4\u7e1b\u4f4f\u5408\u6cd5\u65c5\u884c\u793e\u624b\u8173\uff0c\u5e02\u5834\u53cd\u800c\u88ab\u4e0d\u5177\u4fdd\u969c\u7684\u4f4e\n\u50f9\u5718\u8207\u7070\u8272\u64cd\u4f5c\u5360\u64da\uff1b\u9019\u7121\u7570\u662f\u5c0d\u5408\u6cd5\u65c5\u884c\u696d\u8005\u7684\u61f2\u7f70\uff1b\u6700\u5f8c\uff0c\u653f\u5e9c\u7121\u5f9e\u76e3\u7ba1\u3002\u8d74\u9678\u65c5\u904a\u5730\u4e0b\u5316\uff0c\u4f7f\u5f97\u653f\u5e9c\u4e0d\u4f46\n\u96e3\u4ee5\u638c\u63e1\u5207\u78ba\u7684\u7d71\u8a08\u6578\u64da\u8207\u8d74\u9678\u52d5\u5411\uff0c\u66f4\u5bb9\u6613\u5f62\u6210\u6d89\u9678\u653f\u7b56\u7684\u6c7a\u7b56\u76f2\u5340\u3002\n\u7531\u65bc\u8d74\u9678\u7981\u5718\u4ee4\u5f71\u97ff\u6211\u570b\u89c0\u5149\u696d\u751a\u9245\uff0c\u4e14\u4e0a\u8ff0\u554f\u984c\u7d93\u5c08\u5bb6\u5b78\u8005\u3001\u696d\u8005\u591a\u6b21\u53cd\u6620\uff1b\u8fc4\u4eca\u6240\u8b02\u7684\u8d74\u9678\u7981\u5718\u4ee4\u57f7\u884c\u4e0a\u5df2\n\u6c92\u6709\u90a3\u9ebc\u56b4\u683c\uff0c\u53ef\u8aaa\u53ea\u5269\u5f92\u5177\u5f62\u5f0f\u3002\u4e5f\u5c31\u662f\u8aaa\uff0c\u96d6\u7136\u653f\u7b56\u4e0a\u4ecd\u672a\u958b\u653e\u7d44\u5718\u8d74\u9678\uff0c\u4f46\u653f\u5e9c\u610f\u8b58\u5230\uff0c\u7121\u8ad6\u662f\u65c5\u904a\u3001\u7d93\n\u5546\uff0c\u53f0\u7063\u6bcf\u5e74\u4ecd\u6709\u6578\u767e\u842c\u4eba\u8d74\u9678\u7684\u9700\u6c42\uff0c\u82e5\u7121\u5b8c\u6574\u914d\u5957\u7684\u5805\u58c1\u6e05\u91ce\uff0c\u4e0d\u4f46\u7f54\u9867\u73fe\u5be6\uff0c\u4ea6\u7121\u76ca\u570b\u5b89\uff0c\u66f4\u53ef\u80fd\u9020\u6210\u7522\n\u696d\u8207\u6c11\u773e\u7684\u96d9\u8f38\uff1b\u56e0\u6b64\u5be6\u52d9\u4e0a\u7b49\u540c\u5df2\u9b06\u7d81\u3002\n\u8aa0\u5982\u543e\u4eba\u4e00\u518d\u5f37\u8abf\uff1a\u9762\u5c0d\u5927\u9678\uff0c\u53f0\u7063\u4e0d\u4f46\u8981\u80fd\u5be9\u6642\u5ea6\u52e2\uff0c\u66f4\u61c9\u4ee5\u8faf\u8b49\u601d\u7dad\u56de\u61c9\u9678\u65b9\u7684\u8209\u63aa\u3002\u96d6\u7136\u5927\u9678\u4ecd\u5f37\u8abf\u300c\u548c\n\u6230\u5169\u624b\u300d\uff0c\u4f46\u5f9e\u5404\u7a2e\u60c5\u52e2\u7814\u5224\uff0c\u7a69\u5b9a\u7684\u53f0\u6d77\u95dc\u4fc2\uff0c\u4ee5\u53ca\u8207\u53f0\u7063\u66f4\u591a\u7684\u4ea4\u6d41\u5408\u4f5c\uff0c\u662f\u76ee\u524d\u5927\u9678\u5c0d\u53f0\u4e3b\u65cb\u5f8b\u3002\u56e0\u6b64\uff0c\n\u5982\u4f55\u6b63\u78ba\u5224\u8b80\u3001\u56e0\u52e2\u5229\u5c0e\uff0c\u4e0d\u4f46\u5df2\u662f\u53f0\u7063\u7684\u7576\u52d9\u4e4b\u6025\uff0c\u66f4\u662f\u53f0\u7063\u5b89\u5168\u4e0d\u53ef\u6216\u7f3a\u7684\u6230\u7565\u601d\u7dad\u3002\n\u53f0\u7063\u61c9\u79c9\u6301\u958b\u653e\u793e\u6703\u61c9\u6709\u7684\u81ea\u4fe1\uff0c\u76f8\u4fe1\u6211\u5011\u6709\u80fd\u529b\u8207\u9678\u4ea4\u6d41\u7684\u540c\u6642\uff0c\u900f\u904e\u900f\u660e\u7684\u898f\u7bc4\u4f86\u61c9\u5c0d\u98a8\u96aa\u3002\u56e0\u800c\u53ef\u85c9\u6b64\u4e8b\n\u4ef6\uff0c\u5f9e\u6aa2\u8a0e\u540d\u5b58\u5be6\u4ea1\u3001\u63a9\u8033\u76dc\u9234\u7684\u8d74\u9678\u7981\u5718\u4ee4\u958b\u59cb\uff1b\u900f\u904e\u516c\u79c1\u5354\u529b\uff0c\u8b93\u653f\u5e9c\u8207\u793e\u6703\u9032\u884c\u66f4\u591a\u5c64\u6b21\u8a0e\u8ad6\uff0c\u898f\u7bc4\u51fa\u4e00\n\u5957\u98a8\u96aa\u53ef\u63a7\u3001\u52d9\u5be6\u53ef\u884c\u3001\u5229\u76ca\u53f0\u7063\u7684\u5c0d\u9678\u653f\u7b56\uff01", "summary": "\u65e5\u524d\u53f0\u7063\u65c5\u904a\u5718\u8d74\u7518\u8085\u65c5\u904a\uff0c\u56e0\u8eca\u8f1b\u7ffb\u8986\u5c0e\u81f4\u4e86\u4e0d\u5e78\u7684\u6b7b\u50b7\u4e8b\u6545\u3002\u65b0\u805e\u66dd\u5149\u5f8c\uff0c\u9664\u4e86\u4ee4\u4eba\u96e3\u904e\u907a\u61be\uff0c\u66f4\u5f15\u767c\u543e\u4eba", "priority": "normal", "lead": "\u653f\u5e9c\u652f\u51fa\uff08G\uff09\u7d50\u69cb\u8abf\u6574\uff0c\u727d\u52d5\u516c\u5171\u6295\u8cc7\u9810\u671f", "related_count": 0}, {"main_title": "\u8ecd\u8cfc\u4eca3\u5ea6\u5354\u5546 8\u5343\u5104\u662f\u95dc\u9375\u5bc6\u78bc \u7acb\u9662\u53ef\u80fd\u6311\u71c8\u591c\u6230\u62da\u9001\u9662\u6703\u8868\u6c7a \u5728\u91ce\u6e96\u5099\u52a0\u78bc \u8a2d\u767c\u50f9\u66f8\u624d\u7de8\u9810\u7b97\u4f46\u66f8", "related_titles": [], "sources": ["\u4e2d\u570b\u6642\u5831 A02 \u7126\u9ede\u65b0\u805e"], "full_text": "\u8335\uff0f\u53f0\u5317\u5831\u5c0e\u3011\n\u91dd\u5c0d\u300c\u570b\u9632\u7279\u5225\u689d\u4f8b\u300d\u8349\u6848\uff0c\u7acb\u6cd5\u9662\u9577\u97d3\u570b\u745c\u4eca\uff0827\uff09\u65e5\u4e0b\u5348\u5c07\u53ec \u96c6\u671d\u91ce\u9ee8\u5718\u9032\u884c\u7b2c3\u6b21\u5354\u5546\uff0c\u4e26\u5df2\u544a\u77e5\u300c\u52a0\n\u73ed\u8655\u7406\u300d\uff0c\u7121\u8ad6\u6709\u7121\u5171\u8b58 \uff0c\u5c07\u5b8c\u6210\u5354\u5546\u7a0b\u5e8f\u9001\u4ea4\u9662\u6703\u8868\u6c7a\u3002\u64da\u4e86\u89e3\uff0c\u85cd\u71df\u5df2\u6709\u591a\u7a2e\u91d1\u984d\u7b56\u7565\uff0c \u4f46\u4e0d\u8f15\u6613\u51fa\u624b\uff0c\n\u5982\u679c\u57f7\u653f\u9ee8\u9858\u610f\u9000\u4e00\u6b65\uff0c\u4e0d\u8981\u5805\u63011.25\u5146\u5143\uff0c\u5728\u91ce\u9ee8 \u5df2\u6e96\u5099\u52a0\u78bc\u4e0a\u770b\u81f38000\u5104\u5143\uff0c\u4e26\u5217\u9700\u6709\u767c\u50f9\u66f8\u59cb\u5f97\u7de8\u5217\n\u7684\u4f46\u66f8\u3002\u6c11\u773e \u9ee8\u4e3b\u5e2d\u9ec3\u570b\u660c\u6628\u8aaa\uff0c\u9858\u610f\u8207\u570b\u6c11\u9ee8\u91dd\u5c0d\u65b0\u7248\u672c\u597d\u597d\u8a0e\u8ad6\uff0c\u4f46\u7da0\u71df\u4ecd\u5805 \u63011.25\u5146\u5143\uff0c\u7d55\u4e0d\u6253\u6298\u3002\n\u64da\u4e86\u89e3\uff0c\u76ee\u524d\u85cd\u71df\u6709\u5169\u500b\u65b9\u6848\uff0c\u4e00\u662f\u9ee8\u5167\u6709\u4eba\u89ba\u5f97\u7b2c\u4e8c\u6ce2\u8ecd\u8cfc\u6c92\u6709 \u90a3\u9ebc\u5feb\uff0c\u4e3b\u8981\u662f\u300c\u5ddd\u7fd2\u6703\u300d\u5728\u5373\u548c\u7f8e\u570b\n\u8ecd\u706b\u5546\u91cf\u80fd\u7121\u6cd5\u8ca0\u8377\uff0c\u56e0\u6b64\u4e0d \u6025\u8457\u9810\u5321\u7b2c\u4e8c\u6ce2\u8ecd\u8cfc\u9810\u7b97\uff0c\u53ea\u8981\u8868\u660e\u7acb\u5834\uff0c\u6709\u767c\u50f9\u66f8\u5c31\u6703\u52a0\u7de8\u9810\u7b97\u5c31 \u597d\u3002\n\u53e6\u4e00\u65b9\u6848\u70ba\uff0c\u9810\u5148\u5321\u5217\u8cb7\u7f8e\u570b\u7684\u4fe1\u4efb\u3002\u7531\u65bc\u97d3\u570b\u745c\u58d3\u529b\u5927\uff0c\u5e0c\u671b\u8d95 \u5feb\u7d50\u675f\u8ecd\u8cfc\u6230\u5834\uff0c\u56e0\u6b64\u85cd\u767d\u78ba\u5be6\u8a0e\u8ad6\u904e\uff0c\n\u5018\u82e5\u7da0\u71df\u8abf\u964d\u91d1\u984d\uff0c\u5728\u91ce\u4e5f \u9858\u610f\u8abf\u9ad8\u81f38000\u5104\u5143\u3002\u4e0d\u904e\u5f9e\u4e0a\u5468\u5354\u5546\u6c23\u6c1b\uff0c\u82e5\u7da0\u71df\u4e0d\u9000\u8b93\uff0c\u7b2c\u4e8c\u65b9 \u6848\u6050\u7121\u6cd5\u63a8\n\u9032\u3002\n\u85cd\u59d4\u5f90\u5de7\u82af\u8868\u793a\uff0c\u97d3\u570b\u745c\u8acb\u4ed6\u5011\u628a\u4eca\u665a\u884c\u7a0b\u5148\u6392\u958b\uff0c\u96d6\u7136\u53ea\u6709\u5c11\u5c11 \u689d\u6587\uff0c\u4f46\u78ba\u5be6\u53ef\u80fd\u8981\u6311\u71c8\u591c\u6230\u3002\u5979\u547c\u7c72\uff0c\n\u5354\u5546\u904e\u7a0b\u4e2d\uff0c\u5e0c\u671b\u5404\u653f\u9ee8\u79c9 \u6301\u6499\u7bc0\u570b\u5bb6\u9810\u7b97\u3001\u5be9\u614e\u4f7f\u7528\u7d0d\u7a05\u9322\uff0c\u4ee5\u53ca\u8a8d\u540c\u5efa\u8ecd\u7684\u91cd\u8981\u6027\uff0c\u800c\u5728\u5c0d \u53f0\u8ecd\u552e\u90e8\u5206\uff0c\n\u5176\u5be6\u570b\u6c11\u9ee8\u76f8\u7576\u6709\u5171\u8b58\uff0c\u6240\u4ee5\u5728\u6b64\u524d\u63d0\u4e4b\u4e0b\uff0c\u6216\u8a31\u5354\u5546 \u904e\u7a0b\u6703\u82b1\u4e9b\u6642\u9593\uff0c\u4f46\u4e5f\u5e0c\u671b\u80fd\u6709\u521d\u6b65\u597d\u7d50\u679c\u3002\n\u9ec3\u570b\u660c\u6307\u51fa\uff0c\u5982\u679c\u56e0\u70ba\u6642\u7a0b\u975e\u5e38\u8d95\uff0c\u9700\u8981\u7acb\u6cd5\u9662\u5148\u6388\u6b0a\u884c\u653f\u90e8\u9580\u7de8 \u5217\u7f8e\u570b\u81f3\u4eca\u9084\u6c92\u5ba3\u5e03\u7684\u7b2c\u4e8c\u6279\u8ecd\u8cfc\u7684\u8a71\uff0c\n\u7acb\u6cd5\u689d\u6587\u6280\u8853\u8981\u5982\u4f55\u8a2d\u8a08\uff0c \u6c11\u773e\u9ee8\u4e5f\u958b\u59cb\u9032\u884c\u76f8\u95dc\u7814\u8b70\u5de5\u4f5c\u3002\n\u81f3\u65bc\u5916\u50b3\u97d3\u570b\u745c\u8207\u591a\u6578\u85cd\u59d4\u8981\u652f\u63018000\u5104\u5143\u7248\u672c\uff0c\u4e14\u7248\u672c\u8207\u8aaa\u5e16\u90fd \u5df2\u7d93\u6e96\u5099\u597d\uff1f\u9ec3\u570b\u660c\u8aaa\uff0c\u5982\u679c\u570b\u6c11\u9ee8\u7248\n\u672c\u8207\u8aaa\u5e16\u90fd\u6e96\u5099\u597d\uff0c\u5c31\u300c\u8d95\u5feb \u62ff\u51fa\u4f86\u8a0e\u8ad6\uff0c\u6c11\u773e\u9ee8\u958b\u5927\u9580\u8d70\u5927\u8def\uff0c\u9858\u610f\u91dd\u5c0d\u65b0\u7248\u672c\uff0c\u5750\u4e0b\u4f86\u597d\u597d\u8a0e \u8ad6\u3002\u300d\u4f46\u76ee\n\u524d\u6c92\u770b\u5230\u6240\u8b02\u7248\u672c\uff0c\u4e14\u570b\u6c11\u9ee8\u4e5f\u7a31\u610f\u898b\u5206\u6b67\u3001\u9084\u5728\u6536\u650f\u4e2d \u3002\n\u6c11\u9032\u9ee8\u7acb\u6cd5\u9662\u9ee8\u5718\u5e79\u4e8b\u9577\u838a\u745e\u96c4\u5f37\u8abf\uff0c\u9ee8\u5718\u7acb\u5834\u4e00\u8cab\u4e14\u660e\u78ba\uff0c\u5373\u300c \u4e00\u5207\u4ee5\u570b\u5bb6\u5b89\u5168\u70ba\u6700\u9ad8\u539f\u5247\u300d\uff0c\u5c0d\u65bc\u80fd\n\u5920\u63d0\u5347\u570b\u8ecd\u6230\u529b\u3001\u5f37\u5316\u570b\u9632\u9ad4 \u7cfb\u7684\u5167\u5bb9\uff0c\u9ee8\u5718\u6703\u5168\u529b\u652f\u6301\uff0c\u4f46\u5c0d\u65bc\u6b62\u65bc\u53e3\u865f\u3001\u898f\u756b\u96f6\u6563\uff0c\u5207\u5272\u3001\u6253 \u6298\uff0c\u751a\u81f3\u53ef\n\u80fd\u5f71\u97ff\u6574\u9ad4\u570b\u9632\u5e03\u5c40\u7684\u63d0\u6848\uff0c\u6c11\u9032\u9ee8\u5718\u5bf8\u6b65\u4e0d\u8b93\u3002\n\u7da0\u59d4\u9673\u51a0\u5ef7\u6307\u51fa\uff0c\u4e2d\u6771\u6230\u4e8b\u4f7f\u53f0\u7063\u5728\u8ecd\u8cfc\u7522\u7dda\u9762\u81e8\u8207\u4e2d\u6771\u76df\u53cb\u7af6\u722d \u512a\u5148\u9806\u5e8f\u7684\u58d3\u529b\uff0c\u547c\u7c72\u7acb\u6cd5\u9662\u76e1\u901f\u5be9\u8b70\n\u300c\u570b\u9632\u7279\u5225\u689d\u4f8b\u300d\u3002", "summary": "\u91dd\u5c0d\u300c\u570b\u9632\u7279\u5225\u689d\u4f8b\u300d\u8349\u6848\uff0c\u7acb\u6cd5\u9662\u9577\u97d3\u570b\u745c\u4eca\uff0827\uff09\u65e5\u4e0b\u5348\u5c07\u53ec \u96c6\u671d\u91ce\u9ee8\u5718\u9032\u884c\u7b2c3\u6b21\u5354\u5546\uff0c\u4e26\u5df2\u544a\u77e5\u300c\u52a0", "priority": "normal", "lead": "\u653f\u5e9c\u652f\u51fa\uff08G\uff09\u7d50\u69cb\u8abf\u6574\uff0c\u727d\u52d5\u516c\u5171\u6295\u8cc7\u9810\u671f", "related_count": 0}]}};
const CATS = Object.keys(DATA);
let currentTab = 'all';
const pasteStore = {};
const PRIO_LABEL = { must: '必看', watch: '關注', normal: '一般' };

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  el.appendChild(mkTab('全部', 'all', true));
  CATS.forEach(cat => {
    const d = DATA[cat];
    const mustN = d.items.filter(i => i.priority === 'must').length;
    const label = d.icon + ' ' + cat + (mustN ? ' ⚑' + mustN : '');
    el.appendChild(mkTab(label, cat, false));
  });
}
function mkTab(label, id, active) {
  const b = document.createElement('button');
  b.className = 'tab-btn' + (active ? ' active' : '');
  b.dataset.id = id;
  b.textContent = label;
  b.onclick = () => switchTab(id);
  return b;
}
function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  renderList();
}

function renderList() {
  const list = document.getElementById('news-list');
  list.innerHTML = '';
  const targets = currentTab === 'all' ? CATS : [currentTab];
  let n = 0;
  targets.forEach(cat => {
    DATA[cat].items.forEach(item => {
      list.appendChild(makeCard(item, cat));
      n++;
    });
  });
  if (!n) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.textContent = '目前無相關新聞資料';
    list.appendChild(e);
  }
}

function makeCard(item, cat) {
  const card = document.createElement('div');
  card.className = 'news-card priority-' + item.priority;
  const srcHtml = item.sources.map(s => '<span class="src-tag">' + s + '</span>').join('');
  const relN = item.related_count || 0;
  card.innerHTML =
    '<div class="card-top">' +
      '<div class="prio-col"><span class="prio-badge ' + item.priority + '">' + PRIO_LABEL[item.priority] + '</span></div>' +
      '<div class="card-info">' +
        '<div class="card-title">' + item.main_title + '</div>' +
        '<div class="card-lead">→ ' + item.lead + '</div>' +
        '<div class="card-meta">' + srcHtml + (relN ? '<span class="related-badge">＋' + relN + ' 則相關</span>' : '') + '</div>' +
      '</div>' +
      '<span class="toggle-icon">›</span>' +
    '</div>' +
    '<div class="card-expand"></div>';

  card.querySelector('.card-top').addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    if (!isOpen) buildExpand(card, item);
    card.classList.toggle('open');
  });
  return card;
}

function buildExpand(card, item) {
  const expand = card.querySelector('.card-expand');
  if (expand.dataset.ready) return;
  expand.dataset.ready = '1';

  const tabBar = document.createElement('div');
  tabBar.className = 'inner-tabs';
  expand.appendChild(tabBar);

  const panels = [];

  function addInnerTab(label, active) {
    const t = document.createElement('button');
    t.className = 'inner-tab' + (active ? ' active' : '');
    t.textContent = label;
    const idx = panels.length;
    t.onclick = () => {
      tabBar.querySelectorAll('.inner-tab').forEach((x, i) => x.classList.toggle('active', i === idx));
      panels.forEach((p, i) => p.classList.toggle('active', i === idx));
    };
    tabBar.appendChild(t);
    const p = document.createElement('div');
    p.className = 'inner-panel' + (active ? ' active' : '');
    expand.appendChild(p);
    panels.push(p);
    return p;
  }

  // Panel 1: 新聞重點
  const p1 = addInnerTab('新訊重點', true);
  if (item.summary) {
    const div = document.createElement('div');
    div.className = 'summary-block';
    div.contentEditable = 'true';
    div.textContent = item.summary;
    p1.appendChild(div);
  } else {
    p1.innerHTML = '<div class="summary-empty">⚠️ 自動抓取失敗，請切換至「新訊全文」手動貼入</div>';
  }

  // Panel 2: 新聞全文
  const p2 = addInnerTab('新訊全文', false);
  const storeKey = item.main_title;
  if (item.full_text) {
    const div = document.createElement('div');
    div.className = 'fulltext-body';
    div.contentEditable = 'true';
    div.textContent = item.full_text;
    div.addEventListener('input', e => { pasteStore[storeKey] = e.target.innerText; });
    p2.appendChild(div);
  } else {
    const saved = pasteStore[storeKey] || '';
    p2.innerHTML = '<div class="fulltext-hint">?? 未能自動擷取，請手動貼入：</div>' +
      '<textarea class="fulltext-paste" placeholder="在此貼入《' + item.main_title + '》全文...">' + saved + '</textarea>';
    p2.querySelector('textarea').addEventListener('input', e => { pasteStore[storeKey] = e.target.value; });
  }

  // Panel 3: 相關報導
  if (item.related_titles && item.related_titles.length > 0) {
    const p3 = addInnerTab('相關報導 (' + item.related_titles.length + ')', false);
    item.related_titles.forEach(r => {
      const row = document.createElement('div');
      row.className = 'related-row';
      const t = typeof r === 'object' ? r.title : r;
      const s = typeof r === 'object' ? r.source : '';
      row.innerHTML =
        '<span class="related-bullet">▸</span>' +
        '<span style="flex:1">' + t + '</span>' +
        (s ? '<span class="related-src">' + s + '</span>' : '');
      p3.appendChild(row);
    });
  }
}

document.getElementById('btn-copy').addEventListener('click', () => {
  const now = new Date();
  const roc = now.getFullYear() - 1911;
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const dateStr = roc + '.' + mm + '.' + dd;
  const sep1 = '════════════════════════════════════';
  const sep2 = '──────────────────────────────';

  let text = '【' + dateStr + ' 經濟規劃科 シ 每日新訊重點】
' + sep1 + '

';
  const targets = currentTab === 'all' ? CATS : [currentTab];
  targets.forEach(cat => {
    const d = DATA[cat];
    text += d.icon + ' ' + cat + '
' + sep2 + '
';
    d.items.forEach(item => {
      text += '▌ [' + PRIO_LABEL[item.priority] + '] ' + item.main_title + '
';
      text += '   來源：' + item.sources.join('、') + '
';
      text += '   → ' + item.lead + '
';
      if (item.summary) text += '   重點：' + item.summary + '
';
      if (item.related_titles && item.related_titles.length > 0) {
        const rel = item.related_titles.map(r => typeof r === 'object' ? r.title : r);
        text += '   相關：' + rel.join('；') + '
';
      }
      text += '
';
    });
    text += '
';
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.classList.add('success');
    btn.innerHTML = '✓ 已複製';
    setTimeout(() => {
      btn.classList.remove('success');
      btn.innerHTML = '?? 複製今日摘要';
    }, 2000);
  });
});

const now = new Date();
const roc = now.getFullYear() - 1911;
document.getElementById('date-label').textContent =
  '民國 ' + roc + ' 年 ' + (now.getMonth() + 1) + ' 月 ' + now.getDate() + ' 日';

renderTabs();
renderList();
</script>
</body>
