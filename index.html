<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新聞情報儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e8e6e1;
    --border-hover: #c8c5be;
    --text-primary: #1a1917;
    --text-secondary: #6b6860;
    --text-muted: #a09e99;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --tag-bg: #f0efeb;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background-color: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Layout */
  .main {
    padding: 32px 40px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px;
    width: fit-content;
  }
  .tab-btn {
    padding: 8px 20px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .tab-btn:hover { background: var(--bg); color: var(--text-primary); }
  .tab-btn.active {
    background: var(--text-primary);
    color: white;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* News Card */
  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .news-card:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
  }
  .news-card.open {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }

  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cat-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 9px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .related-count {
    font-size: 11px;
    color: var(--text-muted);
  }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text-primary);
  }

  .source-row {
    padding: 0 20px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .source-tag {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .expand-btn {
    width: 100%;
    border: none;
    border-top: 1px solid var(--border);
    background: transparent;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .expand-btn:hover { background: var(--bg); }
  .expand-icon {
    font-size: 14px;
    transition: transform 0.25s ease;
    color: var(--text-muted);
  }
  .open .expand-icon { transform: rotate(180deg); }

  /* Expanded panel */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    animation: slideDown 0.22s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .open .card-detail { display: block; }

  .related-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .related-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .related-item {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
    line-height: 1.5;
  }
  .related-item:last-child { border-bottom: none; }

  .analysis-section {
    padding: 18px 20px;
    background: #fafaf8;
  }
  .analysis-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .analysis-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .analysis-text {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.85;
    font-family: 'Noto Serif TC', serif;
    outline: none;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* All tab grid = 4 columns */
  .grid.all-view {
    grid-template-columns: repeat(4, 1fr);
  }

  @media (max-width: 1200px) {
    .grid.all-view { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 24px; }
  }
  @media (max-width: 640px) {
    .grid, .grid.all-view { grid-template-columns: 1fr; }
    .header { padding: 16px 20px; }
    .main { padding: 16px; }
  }
</style>
</head>

<header class="header">

const CATS = Object.keys(DATA);
let currentTab = 'all';

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn active';
  allBtn.textContent = '全部';
  allBtn.dataset.tab = 'all';
  allBtn.onclick = () => switchTab('all');
  tabs.appendChild(allBtn);

  CATS.forEach(cat => {
    const d = DATA[cat];
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.tab = cat;
    btn.textContent = d.icon + ' ' + cat + ' (' + d.items.length + ')';
    btn.onclick = () => switchTab(cat);
    tabs.appendChild(btn);
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  grid.className = currentTab === 'all' ? 'grid all-view' : 'grid';

  const targets = currentTab === 'all' ? CATS : [currentTab];
  let total = 0;

  targets.forEach(cat => {
    const d = DATA[cat];
    d.items.forEach(item => {
      grid.appendChild(makeCard(item, cat, d));
      total++;
    });
  });

  if (total === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '目前無相關新聞資料';
    grid.appendChild(empty);
  }
}

function makeCard(item, cat, dept) {
  const card = document.createElement('div');
  card.className = 'news-card';

  const hasRelated = item.related_titles && item.related_titles.length > 0;

  const sourcesHtml = item.sources.map(s =>
    `<span class="source-tag">${s}</span>`
  ).join('');

  const relatedSection = hasRelated ? `
    <div class="related-section">
      <div class="related-label">相關報導 (${item.related_titles.length})</div>
      ${item.related_titles.map(t => `<div class="related-item">${t}</div>`).join('')}
    </div>
  ` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="card-meta">
        <span class="cat-tag">${dept.icon} ${cat}</span>
        ${hasRelated ? `<span class="related-count">+${item.related_titles.length} 則相關</span>` : ''}
      </div>
      <div class="card-title">${item.main_title}</div>
    </div>
    <div class="source-row">${sourcesHtml}</div>
    <button class="expand-btn">
      <span>展開分析與彙整</span>
      <span class="expand-icon">▾</span>
    </button>
    <div class="card-detail">
      ${relatedSection}
      <div class="analysis-section">
        <div class="analysis-label">判讀摘要</div>
        <div class="analysis-text" contenteditable="true">${item.analysis}</div>
      </div>
    </div>
  `;

  card.querySelector('.expand-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    card.classList.toggle('open');
  });

  card.addEventListener('click', () => {
    card.classList.toggle('open');
  });

  return card;
}

// Date display
const now = new Date();
document.getElementById('date-label').textContent =
  now.getFullYear() + '/' +
  String(now.getMonth()+1).padStart(2,'0') + '/' +
  String(now.getDate()).padStart(2,'0');

renderTabs();
renderCards();
