員和兩位知情人士報導，伊朗向美國提出新方案，主張先重開荷莫茲海峽（下稱海峽）、結束戰爭，至於核問題之後再談。伊朗外長阿拉奇近來巡訪巴基斯坦、阿曼及俄羅斯。", "full_text": "美國和以色列二月底對伊朗開戰，目前三方停火中。美國政治新聞網站Axios廿六日引述一位美國官員和兩位知情人士報導，伊朗向美國提出新方案，主張先重開荷莫茲海峽（下稱海峽）、結束戰爭，至於核問題之後再談。伊朗外長阿拉奇近來巡訪巴基斯坦、阿曼及俄羅斯。\n\n他廿七日在莫斯科和俄國總統普亭會面。根據俄國官媒塔斯社報導，兩人討論俄國對俄伊戰略關係的承諾。普亭在會中重申對伊朗的支持，「我們看到伊朗人民為了他們的獨立與主權而戰是多麼英勇」。\n\n他還說，收到伊朗新任最高領袖穆吉塔巴要阿拉奇轉達給他的訊息。伊朗領導高層間對擁有核武的讓步幅度仍分歧。上述新方案試圖繞過此一問題，以更快達成和平協議，提議先解決海峽危機和美國對伊朗港口的海上封鎖。\n\n阿拉奇廿五日在巴基斯坦伊斯蘭馬巴德向居間的巴基斯坦、埃及、土耳其和卡達透露，美國要求伊朗暫停提煉濃縮鈾至少十年，並將現有的濃縮鈾庫存移往境外。根據新方案，目前的美伊停火將進一步延長，或美伊願同意「永久終戰」；核談判則待海峽重新開放且美軍解除封鎖後才將展開。\n\n根據該報導，白宮已收到新方案，但尚不清楚是否願進一步討論。美國總統川普預計廿七日與國安及外交策略團隊在白宮戰情室開會來討論目前陷入僵局的美伊談判，以及後續因應措施。另根據伊朗官媒法斯通訊社報導，阿拉奇透過巴基斯坦向美國轉達伊朗畫下的「紅線」，即核問題和海峽。\n\n對此，白宮發言人韋爾斯廿六日表示，這涉及敏感的外交議題，美國不透過媒體談判；正如總統所言，美國握有籌碼；絕不允許伊朗擁核的協議」。\n\n紐約時報同日分析，德黑蘭與華府正處於一種「不戰不和」的僵局，雙方都在比誰撐得久。"}, {"title": "3巨頭的美、陸、俄占一半 台灣名列22 地緣風險增 全球軍費飆至2.89兆美元", "source": "中國時報 A03 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "全球安全情勢日益嚴峻，瑞典智庫「斯德哥爾摩國際和平研究所」 （SIPRI）26日發布報告指出，2025年全球軍費攀升至2.89兆美元，比2024年實際成長2.9％。美國軍費仍居全球首位，但開支減少，主要被歐洲和亞洲的增幅抵消。台灣則名列第22位，年增14％至182億美元、約新台幣5770億元，此一顯著增長也反映台海局勢日益緊張。", "full_text": "全球安全情勢日益嚴峻，瑞典智庫「斯德哥爾摩國際和平研究所」 （SIPRI）26日發布報告指出，2025年全球軍費攀升至2.89兆美元，比2024年實際成長2.9％。美國軍費仍居全球首位，但開支減少，主要被歐洲和亞洲的增幅抵消。台灣則名列第22位，年增14％至182億美元、約新台幣5770億元，此一顯著增長也反映台海局勢日益緊張。\n\n根據SIPRI最新數據顯示，軍費最高三巨頭，分別是美國、中國和俄羅斯，總計支出1.48兆美元，占全球總額51％。美國軍費為9540億美元，比2024年減少7.5％，主因是沒有批准向烏克蘭提供新的軍事援助。相較之下，華府在過去3年中，向基輔承諾的援助總額，就高達1270億美元。\n\n報告認為，美國軍費呈下降趨勢只是暫時現象，因為美國國會已批准2026年超過1兆美元的國防開支。一旦美國總統川普的預算案獲得通過，2027年的數字可能增至1.5兆美元。至於亞洲和大洋洲，軍費則高達6810億美元，比2024年成長8.5％，是該地區自2009年以來最大的年度增幅。\n\nSIPRI研究員史卡拉札托指出，中國在過去30年，每年都在增加軍費，預計2025年的支出將達到3360億美元。史卡拉札托也說，「或許更有趣的是其他一些國家，例如韓國、日本和台灣，對威脅認知的反應。」報告指出，日本支出增加9.7％，達622億美元，GDP占比1.4％，是自1958年以來的最高比例。\n\n此外，日本2016至2025年的軍事支出增加61％，全球支出占比為2.2％。由於解放軍在台灣周邊加強軍演，台灣軍費預計成長14％，達到1 82億美元，占GDP的2.1％，全球支出占比為0.6％，為自1988年以來最大年度增幅。數據也顯示，台灣2016至2025年的軍事支出增加了6 1％。\n\nSIPRI研究員達席爾瓦表示，美國在亞洲和大洋洲的盟友，例如澳洲、日本和菲律賓，都在增加軍費，這不僅是因為長期存在的地區緊張局勢，也因為對美國支持力度的不確定性日益加劇，「與大洋洲一樣，美國在亞洲的盟友也面臨壓力」。"}, {"title": "市場料利率連三凍，通膨預期也將上調，反映油價飆升... 日銀升息預期 推延至6月", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "全球開啟超級央行周，打頭陣的日本央行（日銀）自27日起召開為期兩天的政策會議。隨著中東戰爭造成能源成本上漲，決策官員們將討論在通膨壓力之下是否考慮升息，不過外界預料日銀本次將採取觀望態度，先評估中東衝突對經濟的影響，最快可能於6月調升利率。受到市場預期日本利率不動，日本10年期公債續跌，推升殖利率走高至2.476％，再度逼近30年高點。", "full_text": "全球開啟超級央行周，打頭陣的日本央行（日銀）自27日起召開為期兩天的政策會議。隨著中東戰爭造成能源成本上漲，決策官員們將討論在通膨壓力之下是否考慮升息，不過外界預料日銀本次將採取觀望態度，先評估中東衝突對經濟的影響，最快可能於6月調升利率。受到市場預期日本利率不動，日本10年期公債續跌，推升殖利率走高至2.476％，再度逼近30年高點。\n\n至於日圓方面，受到伊朗釋出願意與美國達成停火協議的訊號，美元承壓，支撐日圓兌美元走強0.1 2％，報159.18日圓。市場人士預料，日銀28日發布最新經濟展望時，會將自今年4月起的本財年通膨預期從先前估的1.9％向上調整，俾以反映戰爭引發的原油等產品價格飆升。由九名成員組成的政策委員會若一如外界預料、將短期政策利率持平於0.75％，將是連續三次利率不變，凸顯該央行的謹慎態度。\n\n日銀在去年12月升息1碼至0.75％，創下該國利率1995年以來的30 年新高水位。因戰爭引發成本大漲所造成的通膨，勢必對日銀構成挑戰，因為提高政策利率有助於抑制通膨，但也會抑制經濟成長。該央行的目標是希望透過薪資成長和內需來實現2％通膨目標。\n\n下一次升息時間點是市場關注重點，專家預料可能落在6月。日銀總裁植田和男會後記者會釋出的訊號也會成為觀察指標。中東情勢不明，美伊談判陷入僵局，使得先前一直準備再次升息的日銀先暫緩貨幣緊縮腳步。\n\n植田4月中曾表示，日本的金融環境「極其寬鬆」，實際利率仍然「相當低」。針對日圓近期貶值，日本金融當局一直對此保持警戒。日財相片山皋月甫於24日再次發布干預匯率的口頭警告，強調若有必要將採取「 果斷行動」。\n\n本周美、加、歐、英等主要央行都將召開決策會議，市場預料官員傾向先觀察戰爭造成的衝擊，利率政策應會與日本一樣按兵不動。"}, {"title": "印尼削減採礦配額 國際鎳價攀至2年高點", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "國際鎳價27日攀抵近兩年高點，原因是主要生產國印尼削減採礦配額，加上金屬加工所需的硫磺短缺，導致該電池金屬供應前景趨於緊張。倫敦金屬交易所（LME）鎳價27日盤中攀升2.5％至每公噸19,495美元，創2024年6月以來最高。銅價持平於每公噸13,317美元，錫價下跌0.6％至50,055美元。", "full_text": "國際鎳價27日攀抵近兩年高點，原因是主要生產國印尼削減採礦配額，加上金屬加工所需的硫磺短缺，導致該電池金屬供應前景趨於緊張。倫敦金屬交易所（LME）鎳價27日盤中攀升2.5％至每公噸19,495美元，創2024年6月以來最高。銅價持平於每公噸13,317美元，錫價下跌0.6％至50,055美元。\n\n自美伊衝突爆發以來，鎳期貨價格已經大漲約10％。這場戰爭導致硫磺價格飆升，加劇市場對全球礦業活動受阻的擔憂。硫磺是油氣精煉過程的副產品，也是化肥與金屬加工的重要原料。\n\n自2月28日美伊戰事爆發、伊朗封鎖荷姆茲海峽以來，硫磺就一直滯留在波斯灣無法運出。根據美國地質調查局（USGS）數據顯示，該地區硫磺產量約占全球總產量的四分之一。印尼今年設定的鎳礦產量配額（RKAB）為2.6億～2.7億公噸。\n\n但印尼鎳礦冶煉協會（FINI）推估，市場對鎳的需求高達3.4億～ 3.5億公噸，顯示供給與需求之間存在明顯差距。受惠於中國大量投資冶煉廠，印尼目前占全球鎳產量的一半以上。印尼鎳礦開採早已承受極大壓力，因該國削減產量配額以提振該工業金屬價格。\n\n生產配額本意在於管理資源與遵守環保規定，卻限制下游冶煉廠所能取得的礦石量。金瑞期貨公司（Jinrui Futures）近日發布報告指出：「市場對鎳的情緒仍偏向正面，交易商正等待更多利多因素，例如混合氫氧化鎳鈷（MHP）產量大幅下滑。」 外媒引述消息報導，伊朗當局已向美國提出重啟荷姆茲海峽並結束戰爭的新提案，希望先跳過濃縮鈾問題以突破談判僵局。\n\n這令市場期待這場延燒數月的戰爭可能出現轉機，使得基本金屬27日漲跌互見。"}, {"title": "打破中國壟斷！美拓點大馬生產重稀土", "source": "工商時報 A08 國際經濟", "cat": "國際經濟情勢", "priority": 0, "summary": "美國五角大廈爭取稀土元素的行動，已經延伸到了馬來西亞的小港口城市關丹。在這裡，澳洲稀土生產商萊納斯（Lynas Rare Earths）已開始生產重稀土，這是一種難以獲得的稀土類型，該領域目前由中國主導。根據該業者表示，這是 30 年來此類稀土首次在中國以外的地區的產出。", "full_text": "美國五角大廈爭取稀土元素的行動，已經延伸到了馬來西亞的小港口城市關丹。在這裡，澳洲稀土生產商萊納斯（Lynas Rare Earths）已開始生產重稀土，這是一種難以獲得的稀土類型，該領域目前由中國主導。根據該業者表示，這是 30 年來此類稀土首次在中國以外的地區的產出。\n\n由於萊納斯作為美國國防部供應商，在馬國稀土產能有助於美方降低對中國供應的依賴。該公司執行長拉卡茲（Amanda Lacaze）說：「過去20年裡，中國以外沒有人生產分離式重稀土（separated h eavy rare earth）。」根據該公司營運長Pol Le Roux的說法，其實相隔時間長達30年。\n\n該澳洲稀土業者，過去十多年來在關丹擁有一家精煉廠。但該廠只生產較為常見的輕稀土，而將重稀土出售給中國進行加工。不過去年因應中美貿易衝突升溫，北京當局切斷重稀土元素出口，導致美歐車廠被迫停工，西方國家試圖開發稀土供應來源，以抵擋中國的壟斷地位，萊納斯就是其中一家美國五角大廈倚重的供應商。\n\n它在關丹興建一座新的重稀土加工設施來因應歐美國家的需求。萊納斯自從上月起，已開始生產氧化釤（samarium oxide），此為一種難以取得的稀土，主要應用於軍事領域，製造噴射戰鬥機和飛彈的耐熱磁體。目前萊納斯和美國MP Materials是西方兩家領先的稀土生產商，不過川普政府希望有更多供應商。\n\n今年2月，美國國際發展金融公司（ U.S. International Development Finance Corporation）向Serra Verde提供了5.65億美元貸款，後者在巴西經營著一座擁有大量重稀土儲量的礦山。"}, {"title": "無畏戰爭陰霾 美企逆勢賺 標普500已公布財報的企業，整體獲利優於市場預期，EPS年增率有望連六季逾13％", "source": "工商時報 A09 國際產業", "cat": "國際經濟情勢", "priority": 0, "summary": "在戰爭與消費低迷的雙重夾擊，本來預料前景不明的美國大型企業卻有機會逆勢大賺！標普500成份企業目前已有逾四分之一公布第一季財報，整體獲利遠優市場預期。華爾街日報報導，中東戰爭爆發以來，經濟學家紛紛下修經濟成長預測，然而矛盾的是，美國的大型企業營收與利潤卻在飆升，根據倫敦證券交易所集團（LSEG）估算，每股盈餘（EPS）年增率預計將連續六季超過13％。", "full_text": "在戰爭與消費低迷的雙重夾擊，本來預料前景不明的美國大型企業卻有機會逆勢大賺！標普500成份企業目前已有逾四分之一公布第一季財報，整體獲利遠優市場預期。華爾街日報報導，中東戰爭爆發以來，經濟學家紛紛下修經濟成長預測，然而矛盾的是，美國的大型企業營收與利潤卻在飆升，根據倫敦證券交易所集團（LSEG）估算，每股盈餘（EPS）年增率預計將連續六季超過13％。\n\n對多數標普500企業而言，獲利率正在改善。獲利與營收增長之間的差距仍低於2024年底的高點，這顯示除了裁員、提高生產力等手段外，獲利增長的背後確實存在實質擴張。從LSEG估算成長來看，美企獲利的狀況相當良好，此外獲利成長的板塊也相當多元，不再侷限於科技業與金融業，原物料產業表現同樣優於大盤，能源業雖因衝突導致獲利與營收則較去年下滑，但因能源價格波動與潛在的石油短缺，前景依然看好。\n\n消費性產業表現則明顯弱於大盤，民生消費品EPS成長僅3.4％，非民生消費品則僅有2.4％，長期作為美國經濟引擎的消費動能受到抑制，頂端消費者與一般消費者的支出呈現兩極表現。這從航空旅遊表現可見端倪。美國聯合航空表示，其第一季獲利年增8成，經濟艙銷售年增7％，頭等艙等高級座位年增14％。\n\n信用卡公司美國運通也表示，整體消費支出似乎強勁。該公司執行長史奎利（Stephen Squeri）指出，2026第一季持卡人支出增長9％，創三年新高，其中奢侈品零售支出增長18％，航空旅遊支出增長8 ％，45歲以下的年輕高階客群支出依然強勁。對此，安永首席經濟學家達科認為，在當前K型經濟下，富人持續揮霍，一般人則卻手頭拮据。\n\n他說道：「平均而言，企業獲利看好，經濟數據看起來也不錯，但當你仔細審視是誰從中獲益時，會發現兩極分化的現象。」 他表示，規模較小的公司容易受到關稅、能源價格乃至AI的衝擊，反之大公司更能應對衝擊。"}, {"title": "原料成本增 巴斯夫再漲價 調漲多項塑膠添加劑價格，幅度最高達25%", "source": "工商時報 A09 國際產業", "cat": "國際經濟情勢", "priority": 0, "summary": "受中東衝突影響，德國化工巨頭巴斯夫（BASF）27日在官網宣布，將再度調漲多項塑膠添加劑的全球價格，調漲幅度最高達到 25％。其漲價理由是中東軍事衝突因素，逼使其作出伊朗戰爭自 2 月底爆發以來第二次漲價。其官網在台北時間27日下午約3點左右發出公告，宣佈將其全球組合中，抗氧化劑、加工穩定劑和光穩定劑等供塑膠應用的產品價格，要進一步調漲最高25％，而且是立即生效。", "full_text": "受中東衝突影響，德國化工巨頭巴斯夫（BASF）27日在官網宣布，將再度調漲多項塑膠添加劑的全球價格，調漲幅度最高達到 25％。其漲價理由是中東軍事衝突因素，逼使其作出伊朗戰爭自 2 月底爆發以來第二次漲價。其官網在台北時間27日下午約3點左右發出公告，宣佈將其全球組合中，抗氧化劑、加工穩定劑和光穩定劑等供塑膠應用的產品價格，要進一步調漲最高25％，而且是立即生效。\n\n這次大幅漲價的理由，是為了因應中東地區的軍事衝突，導致原物料價格、能源與物流等成本大幅增加所帶來的困境。巴斯夫上一次調漲產品價格的時間點是 3 月 4 日，當時在公告中表示在其全球範圍內，全系列的抗氧化劑、加工助劑和光穩定劑產品，要調漲最高20％售價。根據公告，新價格也是立即生效，部分地區會根據合約安排，去逐步採取調漲後的新價格。\n\n巴斯夫3月的漲價理由，也是戰爭造成原料、能源與物流等成本上升，增加其在全球市場上承受的營運壓力，尤其是在塑膠應用領域所面對的壓力最明顯。當時外界認為巴斯夫調漲價格後，將影響全球的各類塑膠製造商，並可能加劇塑膠產業要面對原物料成本上升的挑戰。巴斯夫3月漲價的時間點，距離伊朗戰爭爆發相隔約四天，但布蘭特油價每桶已飆漲近12％。\n\n戰爭持續到現在，油價已漲破100美元大關，跟戰前相較已累漲逾 45％，因此巴斯夫不但在4月快結束前再次漲價，而且調漲幅度較3月初還要大。外界認為，巴斯夫自2月底以來的兩次漲價，其實是延續其今年初以來的全球定價策略。其2月初在中國大陸以外的亞太地區、中東和非洲，把每公噸甲苯二異氰酸酯（TDI）價格調漲200美元。\n\n2月底又針對東協地區，把每公噸二苯基甲烷二異氰酸酯（MDI）價格調漲20 0美元。"}, {"title": "陸主權評級展望 穆迪升至穩定", "source": "工商時報 A10 大陸財經", "cat": "國際經濟情勢", "priority": 0, "summary": "國際評級機構穆迪（Moody’s）27日公布最新報告，將中國大陸的主權信用評級展望從「負面」調整為「穩定」，並維持「A1」評級。大陸財政部對此決定表示讚賞。路透報導，穆迪表示，雖然大陸仍面臨內外部挑戰，但經濟持續增長和債務的有效管理，支持評級展望趨穩。", "full_text": "國際評級機構穆迪（Moody’s）27日公布最新報告，將中國大陸的主權信用評級展望從「負面」調整為「穩定」，並維持「A1」評級。大陸財政部對此決定表示讚賞。路透報導，穆迪表示，雖然大陸仍面臨內外部挑戰，但經濟持續增長和債務的有效管理，支持評級展望趨穩。\n\n穆迪指出，大陸官方有望持續化解地區和地方政府債務風險，儘管仍將面臨財政壓力，且在可預見的未來政府債務負擔料繼續上升，但下行風險可控。穆迪在2023年12月5日將大陸主權信用評級展望從「穩定」下調至「負面」，並維持A1評級。當時下調的原因，主要是憂慮房市危機進一步影響地方政府債務和國有企業健康狀況。\n\n去年 5 月，穆迪維持其負面展望。至於另外兩家國際信評機構未做最新調整。標普2025年8月維持大陸長期主權信用評級為A＋，展望為「穩定」。\n\n標普當時指出，未來幾年大陸經濟增長將趨穩，且地方政府財政壓力料將緩解。惠譽202 5年4月公布的報告中，將大陸主權信用評級從「A＋」下調至「A」，展望為「穩定」，理由是預期大陸公共財政持續轉弱及公共債務迅速增加。對於穆迪上調展望，大陸財政部官網27日透過答記者問形式回應，指出此一調整體現了其高度認可大陸宏觀經濟和財政實力在外部衝擊下展現出的強大韌性、以及大陸經濟高質量發展的新動能和新進展。\n\n大陸財政部並稱，2026年是「十五五規劃」的開局之年，今年第一季大陸經濟實現高達5％的快速增長，超出市場預期。在全球經貿環境急劇變化、地緣政治風險持續上升的背景下，大陸透過實施一攬子宏觀經濟調控政策，加強政策協同配合，充分彰顯超大規模市場、完備供應鏈體系和較強出口競爭力的優勢，這也是支撐主權信用的基石。"}, {"title": "印尼礦區減供 助漲鎳價", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "國際鎳價27日盤中攀升至近兩年來最高水準，因主要生產國印尼削減採礦配額，加上全球硫磺短缺，使這種電池金屬的供應前景趨緊。倫敦金屬交易所的鎳期貨價格27日盤中一度上漲1.8%至每噸19,350美元，為2024年6月以來最高；銅價上漲0.1%至每噸13,325美元，而錫下跌0.4%至每噸50,150美元。", "full_text": "國際鎳價27日盤中攀升至近兩年來最高水準，因主要生產國印尼削減採礦配額，加上全球硫磺短缺，使這種電池金屬的供應前景趨緊。倫敦金屬交易所的鎳期貨價格27日盤中一度上漲1.8%至每噸19,350美元，為2024年6月以來最高；銅價上漲0.1%至每噸13,325美元，而錫下跌0.4%至每噸50,150美元。\n\n鎳期貨自伊朗戰爭爆發以來已上漲約10%。這場戰爭導致硫磺價格飆升，加劇市場對全球礦業活動可能受阻的擔憂。在金屬產業，透過硫磺生產的硫酸，被用於「浸出法」，這是一種利用溶劑將固體礦石中的目標金屬溶解並分離的濕法冶金技術，可溶出銅、鎳等金屬，例如非洲的銅浸出冶煉，以及印尼的MHP（混合氫氧化鎳鈷）就是利用濕法冶煉（HPAL）從紅土鎳礦中提取的一種中間產品，主要用於三元鋰電池正極材料。\n\n其他基本金屬走勢則漲跌互見，因交易人士正在評估戰爭結束的可能性，稍早有報導指出，伊朗已向美國提出重啟荷莫茲海峽並結束戰爭的新提案，內容包括延後核武談判。印尼的鎳礦開採原本就已經承受壓力，因該國削減產量配額以提振這種工業金屬的價格。"}, {"title": "伊朗戰爭干擾PCB供應鏈 化工龍頭巴斯夫出手 塑膠添加劑最高上調25% 南韓製造商評估跟進", "source": "經濟日報 A06 國際", "cat": "國際經濟情勢", "priority": 0, "summary": "伊朗戰爭不僅直接擾亂印刷電路板（PCB）供應鏈，導致科技公司成本上升，也迫使化工龍頭巴斯夫（BASF）宣布調漲塑膠添加劑價格，漲幅最高達到25%。路透報導，伊朗在4月初攻擊沙烏地阿拉伯的朱拜爾（Jubail）石化園區，迫使高純度聚苯醚（PPE）樹脂的生產線停擺。PPE是製造PCB基板的關鍵原料之一。", "full_text": "伊朗戰爭不僅直接擾亂印刷電路板（PCB）供應鏈，導致科技公司成本上升，也迫使化工龍頭巴斯夫（BASF）宣布調漲塑膠添加劑價格，漲幅最高達到25%。路透報導，伊朗在4月初攻擊沙烏地阿拉伯的朱拜爾（Jubail）石化園區，迫使高純度聚苯醚（PPE）樹脂的生產線停擺。PPE是製造PCB基板的關鍵原料之一。\n\n一名知情人士透露，負責運營朱拜爾園區的沙烏地基礎工業公司（SABIC），掌握了全球約70%的高純度PPE樹脂供應，至今生產仍未恢復，導致全球市場PPE極為短缺。PCB廣泛應用於各類電子裝置，從智慧手機、電腦到人工智慧（AI）伺服器，都不可或缺。而業界先前已因記憶體晶片價格飆升苦不堪言，如今這波動盪對電子製造商可謂雪上加霜。\n\n三名業界消息人士向路透表示，由於AI伺服器市場需求激增，PCB價格自去年底就開始攀升，而今年3月來，業界更是搶購囤積原料，造成需求急速上升。高盛分析師在近期報告指出，4月PCB價格較3月大漲40%。由於預期未來數年供不應求，雲端服務業者也願接受更進一步的價格調漲。\n\n根據電子業市場研究公司Prismark最新報告，全球PCB產業預計將於2026年成長12.5%，規模達到958億美元。南韓PCB製造商大德電子的高階主管告訴路透，已開始和客戶討論是否漲價。該公司客戶包含三星電子、SK海力士、超微。\n\n另外，巴斯夫27日宣布，將進一步調漲抗氧化劑、加工穩定劑和光穩定劑等塑膠添加劑產品的價格，這將是該公司繼3月宣布調漲價格來，再宣布價格調漲。該公司表示，這波漲價是為了因應中東地區軍事衝突所導致的、原物料價格以及能源和物流成本的大幅上漲。"}, {"title": "大陸信評展望 上調 穆迪從「負面」調整為「穩定」 維持A1評級 財部按讚", "source": "經濟日報 A08 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "國際評級機構穆迪（Moody’s）昨（27）日將中國大陸主權信用評級展望從「負面」調整為「穩定」，並維持「A1」評級。大陸財政部隨即回應對此決定表示讚賞。路透報導，穆迪表示，儘管中國大陸面臨國內和外部挑戰，但持續增長和有效債務管理支持評級展望趨穩。", "full_text": "國際評級機構穆迪（Moody’s）昨（27）日將中國大陸主權信用評級展望從「負面」調整為「穩定」，並維持「A1」評級。大陸財政部隨即回應對此決定表示讚賞。路透報導，穆迪表示，儘管中國大陸面臨國內和外部挑戰，但持續增長和有效債務管理支持評級展望趨穩。\n\n該機構預計，政策制定者將以可控方式推進地區和地方政府債務化解進程。雖然大陸財政壓力將持續，政府債務負擔在可預見未來將繼續上升，但下行風險可控。大陸財政部有關負責人表示，「這次評級體現了穆迪高度認可中國宏觀經濟和財政實力在外部衝擊下展現出的強大韌性、以及中國經濟高質量發展的新動能和新進展。」 該負責人稱，過去五年，大陸GDP累計增量超過人民幣35兆元，相當於再造一個「長三角」的經濟體量。即便歷經多重風險挑戰，「十四五」期間中國經濟仍保持年均 5.4%的增速，對世界經濟增長的貢獻率穩定在 30%左右。穆迪在2023年12月5日將中國大陸主權信用評級展望從「穩定」下調至「負面」，並維持A1評級，主要基於對大陸房地產危機導致的地方政府債務和國有企業健康狀況的擔憂。\n\n去年 5 月，穆迪維持對中國大陸的負面展望。去年8月7日，標普發布報告，決定維持中國大陸主權信用評級「A+」和展望「穩定」不變。當時大陸財政部同樣表示很高興看到這一決定。\n\n惠譽在2024年4月調整中國大陸主權信用評級展望時，維持「A+」評級不變，但將展望從「穩定」調為「負面」，並維持至今，當時主要基於對以下因素的擔憂：政府債務持續上升；財政赤字高企；內需疲軟（消費低迷、投資下滑）；\n\n通縮壓力固化風險；房地產行業下行拖累經濟增長。"}, {"title": "工業利潤增速 四年來最高", "source": "經濟日報 A08 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "大陸國家統計局公布，今年1至3月，全國規模以上工業企業實現利潤總額達人民幣1兆6,960億元，較去年同期增長15.5%，增速創逾4年最高。分析師指出，數據亮眼歸功於新動能和反內捲政策的帶動，以及需求端改善，但美伊衝突影響的影響可能尚未顯現，預計第2季經濟將面臨挑戰。在主要行業中，計算機、通信和其他電子設備製造業以及有色金屬冶煉和壓延加工業，今年首季利潤均大增 1.2倍，化學原料和化學製品製造業也增長 54.5%。", "full_text": "大陸國家統計局公布，今年1至3月，全國規模以上工業企業實現利潤總額達人民幣1兆6,960億元，較去年同期增長15.5%，增速創逾4年最高。分析師指出，數據亮眼歸功於新動能和反內捲政策的帶動，以及需求端改善，但美伊衝突影響的影響可能尚未顯現，預計第2季經濟將面臨挑戰。在主要行業中，計算機、通信和其他電子設備製造業以及有色金屬冶煉和壓延加工業，今年首季利潤均大增 1.2倍，化學原料和化學製品製造業也增長 54.5%。\n\n不過汽車製造業則是下降 17.7%，非金屬礦物製品業下降 42.6%，黑色金屬冶煉和壓延加工業更由盈轉虧。今年首季，規模以上工業企業中，國有控股企業實現利潤總額年比增長10.1%；股份制企業實現利潤總額增長20.9%；\n\n外商及港澳台投資企業實現利潤總額增長1.2%；私營企業實現利潤總額增長25.4%。大陸國家統計局工業司首席統計師于衛寧表示，總體看，第1季規模以上工業企業利潤較快增長。\n\n但也要看到，近期外部環境不確定因素較多，國內供強需弱的矛盾仍有待化解。"}, {"title": "AI與能源 亞股2個平行時空 印尼、菲律賓因油價受衝擊 台日韓受惠AI市場狂熱", "source": "聯合報 A03 焦點", "cat": "國際經濟情勢", "priority": 0, "summary": "亞洲金融市場近來表現，彷彿活在兩個平行時空。在南亞與東南亞，高油價加重貿易收支負擔，導致印度、印尼及菲律賓股市重挫。而在東亞，市場對晶片業和人工智慧（ＡＩ）產業的狂熱，推動日本、南韓和台灣股市屢創新高，完全不把中東戰爭放在眼裡。", "full_text": "亞洲金融市場近來表現，彷彿活在兩個平行時空。在南亞與東南亞，高油價加重貿易收支負擔，導致印度、印尼及菲律賓股市重挫。而在東亞，市場對晶片業和人工智慧（ＡＩ）產業的狂熱，推動日本、南韓和台灣股市屢創新高，完全不把中東戰爭放在眼裡。\n\n這樣的分歧，凸顯全球市場兩條並行發展邏輯。投資人懲罰容易受高能源成本衝擊的經濟體，卻認為只要能參與未來成長關鍵的產業，便可以無視短期的地緣政治風險。由於美伊和談進展緩慢，荷莫茲海峽控制權懸而未決，能源長期中斷的風險更加劇亞洲市場的分歧。\n\n彭博行業研究策略師陳明康說：「南亞表現遜於偏重科技業的北亞，主因在於缺乏ＡＩ題材。南韓、台灣及日本同樣仰賴石油。這可能是一個結構性問題，南亞或許需要主動出擊去解決，尋求更緊密切入區域科技供應鏈途徑。」 伊朗戰爭二月底爆發時，高油價衝擊依賴進口能源的亞洲經濟體，各地市場都出現拋售。但隨著戰事拉長，投資人開始感到疲乏，並轉向戰前交易模式，重新買進ＡＩ相關類股。東亞市場已大致收復衝突發生以來的跌幅。\n\n台灣加權指數自開戰以來上漲近百分之十，在主要市場中表現最佳；南韓綜合指數上漲約百分之四；日經指數廿七日收盤首次突破六萬點大關，再創新高；\n\n中國滬深三百指數也走高。其他地區表現則相對疲軟。印度五十指數下跌約百分之五，明晟東協指數下跌約百分之七，菲律賓和印尼的基準指數跌幅均超過百分之十。\n\n東亞市場展現韌性，主因在於市場由切入全球半導體供應鏈的企業主導，這正是ＡＩ熱潮骨幹。台灣台積電、南韓三星電子和ＳＫ海力士等公司受惠於需求飆漲，且目前看來這股需求相對不受地緣政治風險影響。相較之下，南亞和東南亞正設法應付高油價引發的通膨，不僅侵蝕經常帳收支，也導致匯率走弱，這些壓力縮減決策者的因應空間。\n\n由於缺乏類似的科技題材來吸引資金流入，這些地區市場表現持續落後。匯率表現也呈現類似的態勢。人民幣和台幣相對穩定，印度與部分東南亞國家的貨幣則持續承受貶值壓力。\n\n野村控股亞洲區首席經濟學家瓦爾瑪表示，分歧原因有三。一是印度和東南亞受能源衝擊程度較大，緩衝空間比東亞少；二是東亞的財政狀況較為穩健；\n\n三是ＡＩ熱潮支撐東亞的成長和市場，卻並未為印度和東南亞帶來太多助力。"}, {"title": "歐擬產業投資新法 陸要反制", "source": "聯合報 A10 兩岸", "cat": "國際經濟情勢", "priority": 0, "summary": "歐盟執委會日前提出「產業加速法」立法提案，針對電動車、電池、太陽能與關鍵原物料首次引入強制技術轉讓、外資持股限制、歐盟本地成分要求等嚴厲條款。大陸商務部昨回應，該法案構成了嚴重的投資壁壘和制度性歧視，並警告如執意推動而損害陸企利益，大陸將不得不進行反制。歐盟上述法案被業界廣泛解讀為針對中國大陸產品的「減速器」或「剎車片」，因法案主要針對電池、電動車、太陽能光電、關鍵原材料等戰略產業，在市場、投資、供應鏈與規則層面，對大陸企業衝擊顯著。", "full_text": "歐盟執委會日前提出「產業加速法」立法提案，針對電動車、電池、太陽能與關鍵原物料首次引入強制技術轉讓、外資持股限制、歐盟本地成分要求等嚴厲條款。大陸商務部昨回應，該法案構成了嚴重的投資壁壘和制度性歧視，並警告如執意推動而損害陸企利益，大陸將不得不進行反制。歐盟上述法案被業界廣泛解讀為針對中國大陸產品的「減速器」或「剎車片」，因法案主要針對電池、電動車、太陽能光電、關鍵原材料等戰略產業，在市場、投資、供應鏈與規則層面，對大陸企業衝擊顯著。\n\n特別是全球產能占比超過四成的企業（不少是陸企）投資超過一億歐元項目，需滿足外資持股小於一半、本地員工大於一半、強制技術轉移等條款。大陸商務部昨聲明指，該部已於四月廿四日向歐盟執委會正式提交對上述法案的意見，表達嚴正關切。大陸認為法案對外商投資電池、電動汽車、太陽能光電、關鍵原材料四大新興戰略行業設置了諸多限制性要求，並在公共採購和公共支持政策中設置「歐盟原產」的排他性條款，構成了嚴重的投資壁壘和制度性歧視。\n\n大陸指控歐方涉嫌違反最惠國待遇等基本原則，違反中歐領導人關於妥處摩擦分歧的重要共識，更將拖累歐盟綠色轉型進程，給多邊貿易規則帶來新衝擊。大陸官方建議歐方刪除法案中對外國投資者的歧視性要求、本地含量要求、強制轉讓智慧財產權和技術要求、公共採購限制政策等內容。"}, {"title": "備戰貿易協議 美陸經濟角力升溫", "source": "中國時報 AA02 焦點新聞", "cat": "國際經濟情勢", "priority": 0, "summary": "陸美預定5月進行「川習會」時，路透分析指出，儘管北京沒有公開批評川普在伊朗戰爭中的政策，希望兩國領導人舉行積極會晤，但北京已於這段貿易戰休戰期間採取行動，擴大針對華盛頓的經濟施壓。作為陸美達成更持久、更廣泛貿易協議準備。去年10月以來，大陸陸續頒布法律，懲罰將供應鏈轉移出大陸的外國實體、收緊稀土許可制度、禁止在國家資助的資料中心使用外國人工智慧晶片、禁止大陸公司使用美國和以色列的網路安全軟體，並且正在考慮限制太陽能製造設備出口至美國。", "full_text": "陸美預定5月進行「川習會」時，路透分析指出，儘管北京沒有公開批評川普在伊朗戰爭中的政策，希望兩國領導人舉行積極會晤，但北京已於這段貿易戰休戰期間採取行動，擴大針對華盛頓的經濟施壓。作為陸美達成更持久、更廣泛貿易協議準備。去年10月以來，大陸陸續頒布法律，懲罰將供應鏈轉移出大陸的外國實體、收緊稀土許可制度、禁止在國家資助的資料中心使用外國人工智慧晶片、禁止大陸公司使用美國和以色列的網路安全軟體，並且正在考慮限制太陽能製造設備出口至美國。\n\n專家表示，這不僅僅是被動的以牙還牙，大陸正在利用貿易休戰建構一系列擁有經濟影響力的工具。策緯諮詢公司（Trivium China）地緣政治分析師馬祖爾表示：「中方希望達成更持久、更廣泛的停火協議，但這很大程度上是『汝欲和平，必先備戰』的邏輯。」 這項將於今年11月到期的貿易停火協議，部分源自北京去年威脅限制對美國出口稀土。\n\n分析指出，這些管制措施在幾周內導致美國汽車供應鏈短缺，促使川普與習近平在韓國會晤。此後，大陸採取了幾項潛在報復措施，用於打擊將生產轉移到國外或限制其原材料進口的行為。今年4月，大陸國務院總理李強簽署兩項法規，賦予當局權力調查被指控歧視大陸產業鏈和供應鏈、和對大陸實體行使所謂「不當域外管轄」的外國公司、政府和個人。\n\n當局可以拒絕違規者入境、驅逐出境並沒收其資產。華盛頓方面也施加壓力，於3月份對大陸過剩的工業產能和使用強迫勞動問題展開貿易調查，還對半導體和晶片製造設備實施出口限制，減緩大陸生產尖端晶片能力。隨著美國逐步減少對大陸關鍵礦產的依賴，大陸也競相尋找新的限制點。\n\n馬祖爾表示：「中方將會加大力度，找出弱點所在，他們會不斷嘗試各種方法，看看哪些奏效。」"}, {"title": "自由廣場》精神暴力界線不清 教師與家長無所適從", "source": "自由時報 A14 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "衛福部預告修正《兒童及少年權益保障法》，將「精神暴力」及「其他不當對待」納入禁止行為，並配套行政裁罰機制。強化兒少保障固然正當，但本次草案概念界定不明、制度設計失衡，與其倉促推動，建議不如撤回重議。從法律層面看，「精神暴力」屬典型不確定法律概念，其內涵以「心理顯著不適」與「意圖施加支配」為核心標準，但基準過於抽象，欠缺具體操作依據。", "full_text": "衛福部預告修正《兒童及少年權益保障法》，將「精神暴力」及「其他不當對待」納入禁止行為，並配套行政裁罰機制。強化兒少保障固然正當，但本次草案概念界定不明、制度設計失衡，與其倉促推動，建議不如撤回重議。從法律層面看，「精神暴力」屬典型不確定法律概念，其內涵以「心理顯著不適」與「意圖施加支配」為核心標準，但基準過於抽象，欠缺具體操作依據。\n\n若未明確行為強度、持續期間、語言內容及損害關聯性，勢必導致認定因人而異，使行為人難以預先判斷是否合法。對教師而言，課堂管理本包含糾正、要求與適度壓力，例如要求學生起立反省、調整座位，或因違規增加作業，原屬維持秩序的基本手段。然而新制之下，若僅因學生主觀感受不佳，即可能被解讀為貶抑或孤立，引發申訴風險。\n\n當具規範性的教學行為皆可能遭事後追責，教師恐趨向降低介入、避免衝突，反而弱化教學功能。此一困境也將延伸至家庭。親職教育本包含即時情緒反應與價值引導，若家長因子女拒寫作業而責備，或以較嚴厲語氣提醒，皆可能被放大為威嚇或貶低。\n\n當親子互動隨時可能轉化為行政裁罰風險，家長勢必降低管教強度，甚至避免衝突以求自保。目前教育部已有法制對正當管教設有界線與免責空間；若衛福部另以不同標準評價相同行為，將產生法規適用競合，甚至可能違反「一事不二罰」原則，造成程序重疊與判斷歧異，使第一線人員無所適從。\n\n兒少保障與教養權並非對立，關鍵在於法律必須清楚、可操作且一致。立法應區分持續性心理虐待與偶發性管教行為，明定合理管教除外條款，並整合教育與社福體系的判定標準。若無法劃清界線，最終被侵蝕的，將不只是教學權威與親職角色，而是社會對規範運作的基本信任。"}, {"title": "風險時代台灣永續轉型新契機 永續發展攸關國家競爭", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "永續創新學院院長方元沂日前受邀參與「地球解方二○二六年會」，深刻感受台灣對永續議題的關注已進入新階段。今年年會集結產官學研與青年團隊，聚焦淨零轉型、循環經濟、地方創生、永續金融、氣候科技、永續教育等，展現跨界合作能量。這也說明，永續發展已不再只是環保倡議，而是攸關國家競爭力、產業升級與社會韌性的核心戰略。", "full_text": "永續創新學院院長方元沂日前受邀參與「地球解方二○二六年會」，深刻感受台灣對永續議題的關注已進入新階段。今年年會集結產官學研與青年團隊，聚焦淨零轉型、循環經濟、地方創生、永續金融、氣候科技、永續教育等，展現跨界合作能量。這也說明，永續發展已不再只是環保倡議，而是攸關國家競爭力、產業升級與社會韌性的核心戰略。\n\n世界經濟論壇今年發布的全球風險報告指出，未來兩年最受關注的風險，集中在地緣政治衝突、經濟對抗、假資訊、社會兩極化、網路安全等立即性威脅。然而，若拉長至十年期視角，極端氣候、生物多樣性流失、汙染、資源短缺、地球系統失衡等環境風險，仍穩居核心位置。短期世界看似被衝突與震盪主導，但長期世界仍由永續發展決定。\n\n近年全球政經情勢快速變化，尤其川普第二任期後，美國政策可能更偏向產業保護、能源自主與地緣競爭，全球供應鏈與國際秩序將持續碎片化。在此氛圍下，各國更重視通膨、就業、安全、產業回流等短期議題，氣候變遷與社會包容等長期目標，容易被放在次要順位。然若忽略長期問題，最終仍將以更高成本回到經濟體系本身。\n\n極端氣候造成的災損、能源波動、糧食壓力與公共健康負擔，都將直接影響企業經營和國家財政。對台灣而言，全球風險往往被進一步放大。台灣是出口導向經濟體，也是全球高科技供應鏈的重要樞紐，同時位處地緣政治敏感區域，因此面對的是複合型風險。\n\n首先是供應鏈與國際市場風險，全球市場分裂、科技管制及區域衝突，都可能影響產業布局。其次是少子化、高齡化與人才競爭，將對未來勞動力與創新能力形成壓力。再者，台灣能源高度仰賴進口，面對極端氣候、旱災或颱風，能源安全與氣候調適已成產業競爭力的一部分。\n\n此外，假訊息、網路攻擊、社會對立，也會影響投資信心與治理效能。這些挑戰的共同特徵，在於它們不是單點危機，而是系統性風險。氣候問題會連動糧食、水資源、保險及公共財政；\n\n人口問題會影響教育、年金和地方發展；科技問題則牽動就業、治理與資訊信任。因此，未來治理不能只靠單一政策或短期補貼，而必須追求經濟、社會、環境三者平衡且互相支持的發展模式。\n\n面對長期挑戰，教育與人才培育尤其關鍵。台灣應將永續發展教育視為國家競爭力工程，從小培養永續素養；到了大學階段，進一步培養綠色金融、碳管理、循環經濟、ＡＩ治理、永續供應鏈等跨域能力，並結合產業與地方社會，成為永續人才基地。\n\n此外，近年國際社會提出的「內在發展目標」（IDGs）概念，也值得台灣重視；其核心精神是，推動永續發展的瓶頸往往不是缺乏技術，而是缺乏內在能力；包括長期思維、系統思考、跨界合作、情緒穩定、行動勇氣。\n\n換言之，永續發展不只是外在制度與科技轉型，更是領導者與社會的內在成熟。對台灣政策制定者與企業經營者而言，當前最重要的任務，是從風險中找到發展契機。企業應從追求最低成本，轉向重視供應鏈韌性、資安能力與人才投資；\n\n政府則需建立長期跨域整合的政策規畫機制。對台灣而言，決定未來競爭力的不只是眼前風浪，還有在變局中堅持長遠價值的能力。"}, {"title": "高德地圖爭議：當國安警告變成免費廣告 風險分級比禁用更可行", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "「高德地圖」在台灣引發爭議，表面上是「紅綠燈倒數秒數過於精準」，實際上涉及導航軟體、位置資料、跨境傳輸、不同法制環境下的風險評價。數位發展部表示，高德地圖依資通安全管理法屬於「危害國家資通安全產品」，政府機關不得使用，並將公布資安評測結果；同時指出，紅綠燈倒數功能並未與台灣號誌系統介接，而是透過資料分析與演算法推估。", "full_text": "「高德地圖」在台灣引發爭議，表面上是「紅綠燈倒數秒數過於精準」，實際上涉及導航軟體、位置資料、跨境傳輸、不同法制環境下的風險評價。數位發展部表示，高德地圖依資通安全管理法屬於「危害國家資通安全產品」，政府機關不得使用，並將公布資安評測結果；同時指出，紅綠燈倒數功能並未與台灣號誌系統介接，而是透過資料分析與演算法推估。\n\n若該功能係依歷史車流與號誌周期進行預測，則本身不涉及對交通控制系統的未經授權存取。將此類技術能力直接等同於「系統滲透」，容易使風險判斷失焦，亦不利於政策討論的精確性。導航服務普遍會處理定位資訊、移動軌跡與搜尋紀錄，差異不在於是否蒐集，重點是資料儲存位置與法律管轄。\n\n高德地圖相關資料可能回傳至大陸境內伺服器，而依中共「國家情報法」第七條及第十四條，訂立了企業與個人對國家情報工作的配合義務，使企業在特定條件下須提供資料協助。因此，高德地圖的風險較適合理解為「制度性風險」而非單一資安漏洞。即使未發現惡意程式或後門，資料若長期處於特定法制環境，仍可能在符合法律程序下被調取並加以分析。\n\n對一般使用者而言，其影響未必立即顯現；但對軍警、公務機關及關鍵基礎設施人員，其位置資訊可能具有較高敏感性。政府禁止公部門使用，在現行法制下具有一定基礎。\n\n資通安全管理法主要規範公務機關與特定非公務機關之資安義務，並透過「危害國家資通安全產品」概念，要求機關避免使用具風險之軟體。此類措施屬內部風險控管，並非對市場或言論之全面限制。然該法並未禁止民眾使用相關軟體，政府能採取的手段仍以風險提示與政策宣導為主。\n\n若以「全面禁用」或「全面禁絕」作為表述，容易產生法律效果與實際落差。應用程式之取得不限於官方商店，使用者仍可透過ＶＰＮ、境外帳號或側載方式下載。在技術上難以完全阻斷、法律上亦無強制處罰的情況下，單以禁止做為主要政策工具，其效果有限。\n\n在未完整公開技術評測與風險分析前，政府即以高度概括的國安語言對外說明，容易使部分使用者理解為政治表態，而非基於具體技術與制度分析的風險判斷；此等爭議反而可能提升社會對該產品的關注度，形成與政策目標相背離的資訊擴散效果。從治理設計角度觀察，較具可行性的方向在於風險分級，而非全面禁止。\n\n對公務機關及軍警單位，可採明確禁用與稽核機制；對關鍵基礎設施與特定產業，可建立使用指引與風險評估標準；對一般使用者，則以資料權限控管、替代工具建議、風險揭露為主。\n\n透過分層處理，較能回應不同使用情境下的風險差異。高德地圖爭議揭示的並非個別應用程式問題，而是跨境資料流動下，法律管轄、資料主權、技術便利性之間的制度張力。若政策仍停留在是否禁止的二分思考，卻未能說明風險來源與制度差異，不僅難以影響使用行為，也可能削弱資安治理的說服力。"}, {"title": "ＡＩ與未來的三種世界", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "（台北市）因海量投資ＡＩ，Meta、微軟大縮編，合計影響二點三萬個職位。不僅如此，含這兩家在內的七家美國科技大廠，從二○二二至二○二五年因為投資ＡＩ相關基礎設施，如資料中心等，合計千億乃至逾兆美元。它們因節約了人力而移轉支出於新的投資。", "full_text": "（台北市）因海量投資ＡＩ，Meta、微軟大縮編，合計影響二點三萬個職位。不僅如此，含這兩家在內的七家美國科技大廠，從二○二二至二○二五年因為投資ＡＩ相關基礎設施，如資料中心等，合計千億乃至逾兆美元。它們因節約了人力而移轉支出於新的投資。\n\n於是在過去三年、也就是ChatGPT問世以來，幾乎沒有增聘新的人手。ＡＩ相關大廠的投資是一回事，但引進ＡＩ用於生產或服務的企業多嗎？會減少相關工作的人力需求嗎？\n\n據ＩＭＦ的預警，確實；兩年前它曾預測「未來兩年影響全球四成工作」，今年初又說「在已開發經濟體中，有大約六成工作將受到ＡＩ衝擊，且大量基層入門職位可能消失」。若依照美國普查局的統計，又是另一番風景。\n\n其調查顯示，美國科技、特別是ＡＩ重鎮舊金山，也只有二成五的公司，每日在部分工作過程規則性地使用ＡＩ，就美國整體來說更低。英格蘭銀行的 Ivan Yotzov與同僚，偕同美、英、澳與日本公司研究發現，過去三年來ＡＩ對就業的影響「幾乎等於零」。但在相同時期，號稱比較容易遭ＡＩ取代的電腦與軟體員工人數，在美國整體反而增加一成二，房地產與營建業則分別增加七成五、將近百分之百。\n\n年初，澳洲Macquaire大學與英德美三國銀行聯合發表大規模研究，發現這四國有四分之三的公司使用ＡＩ，但有八成六表示ＡＩ「在過去三年對勞動生產力並無影響」。《富比世》報導ＭＩＴ媒體實驗室的研究結論，指出「ＡＩ試點計畫的失敗已成常態，九成五的企業ＡＩ倡議顯示零回報」。另就北美和歐洲一千多家企業的調查顯示，有四成二企業在去年放棄了大部分的ＡＩ計畫，二○二四年卻僅有一成七比率。\n\nＡＩ大廠投資於研發與產業鏈建設，是希望其他領域的企業在使用他們的產品後，能聘用較少的人、獲取較多的利潤，也就是提高生產力。但自ChatGPT問世以來，這番景象僅見於少數領域，如軟體編碼與客服，未來呢？《經濟學人》則提供了長期與短期兩個極端的看法。\n\n看長遠，新技術全面發生作用「需要時間，才能將其衝擊力全盤發揮。生成式ＡＩ的年代還只是嬰兒期」；電力在一八八○年代就有，但「生產力因而提高，又花了四十五至五十年」；\n\n看短期，資本盲目競爭而產生浪費，自古有之，現在仍有可能出現「ＡＩ繁榮、暴漲、爆發、急速成長，這是常見的炒作、過度宣傳、造勢、吹捧、投資過度的循環，最後就是崩盤。這不是世界末日，卻帶來痛苦。」 也許還有第三種極端圖像，亦即薩伊定律（Says Law）的變形實現。\n\n生產者自動催生了對其產品或服務的需求，但此時的需求並非百業百工生產過程中對ＡＩ的需要，而是停留在ＡＩ產品，結合於電腦、手機、網路的個人消費面及習慣；加上躍躍欲出、問世多時的多種穿戴電子產品，致使當前已存在、手機結合網路而產生的隱私、著作權、深偽、假新聞、不實資訊、沉迷，及跨國詐騙、洗錢與犯罪等問題，將因ＡＩ的進入而全面加重。"}, {"title": "從出訪失敗 看新南向政策困境 名家專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "教授/林建甫賴總統原訂出訪史瓦帝尼，卻在出發前夕臨時取消，官方理由是第三國飛航許可遭受外力干擾。這起事件表面上是一次外交挫折，實際上卻揭示台灣對外空間的結構性限制。在國際現實中，台灣的行動自由並非完全掌握於己，而是深受區域權力結構牽動，這正是檢視新南向政策成敗的關鍵切口。", "full_text": "教授/林建甫賴總統原訂出訪史瓦帝尼，卻在出發前夕臨時取消，官方理由是第三國飛航許可遭受外力干擾。這起事件表面上是一次外交挫折，實際上卻揭示台灣對外空間的結構性限制。在國際現實中，台灣的行動自由並非完全掌握於己，而是深受區域權力結構牽動，這正是檢視新南向政策成敗的關鍵切口。\n\n新南向政策推動逾十年，近期「新南向政策資訊平台」停止營運，象徵政策轉入常態化，也反映其推動力道與戰略定位正面臨調整。其初衷在於降低對單一市場依賴，但實際成果呈現明顯落差。從經濟面觀察，台灣對東協與南亞出口確實成長，台商投資亦持續增加，在越南與泰國形成產業聚落；\n\n然而，成長高度集中於電子零組件與少數國家，產業與區域分布失衡，「去風險化」停留在表面，未能完成結構重塑。更深層的問題在於制度性缺口。RCEP生效後，東亞整合加速，台灣卻被排除在外，使企業在關稅與規則上處於劣勢。\n\n當競爭對手享有制度紅利時，台灣即便南向布局，仍難取得對等條件。長期而言，這不僅侵蝕利潤，更可能促使供應鏈外移，削弱本土產業的附加價值，同時加劇高科技與傳統產業之間的失衡。「分散風險」最終恐淪為風險位移，而非真正化解。\n\n外交層面的局限同樣明顯。新南向雖強化教育、醫療與文化交流，卻未能轉化為制度性合作或外交突破。在中國影響力擴大的情況下，東南亞國家多採務實平衡，不願選邊。\n\n台灣若僅依賴價值訴求與政治動員，難以突破現實約束。因此，問題不在新南向本身，而在於其與整體戰略的脫節。當兩岸關係緊繃，台灣的經貿與外交空間自然受限。\n\n此次賴總統出訪受阻，正是這種結構壓力的具體呈現。單純以對抗作為主軸，或許能凝聚內部，卻難以轉化為外部支持；對多數國家而言，穩定與可預測性更具吸引力。\n\n更值得注意的是，近期「鄭習會」釋出的訊號顯示，北京方面並非全然關閉對話空間，反而在特定時點釋出一定程度的善意。這類互動雖未必意味政策根本轉向，但至少提供了一種可能性：兩岸並非只能走向對抗，也可以透過制度化對話降低誤判風險。對台灣而言，若一味陷於「抗中保台」的單一敘事，不僅壓縮政策彈性，也可能錯失調整戰略的窗口。\n\n相較之下，以和平為前提，重建互信基礎，尋求經濟合作與分工，反而更符合長期利益。兩岸若能在競爭中維持合作，在分歧中尋求共識，並共同參與全球市場，「兩岸共賺世界的錢」才是最好的發展路徑。未來的關鍵在於從「政策延伸」走向「戰略重構」。\n\n首先，產業政策需真正落實多元化，透過稅制與制度調整，讓傳統產業具備轉型與國際競爭能力。其次，應積極尋求替代性的經貿合作模式，如深化雙邊協議或參與功能性經濟架構，以部分突破區域整合的排他性。更重要的是，兩岸關係需回到務實穩定的軌道，在降低衝突風險的同時，為經濟與外交創造必要的戰略緩衝。\n\n孟子回答齊宣王「交鄰國有道乎」的提問時，提出「以大事小以仁，以小事大以智」的策略。台灣要認清局勢，若僅依賴對抗思維，往往付出高昂代價。真正可行的路徑，是在安全與發展之間取得平衡，在原則與現實之間建立可操作的空間。\n\n新南向政策的下一步，不應只是擴大投入，而是重新定位其在整體國家戰略中的角色。若無法正視制度缺口與戰略失衡，再多的政策延伸，像「榮邦經貿辦事處」，終究難以扭轉邊緣化的趨勢。"}, {"title": "綠營玩殘綠能產業 資深媒體人專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "路透社日前報導，美以伊衝突導致石油和天然氣價格上漲，在規避風險的考量下，再生能源成為新寵。業者表示，自2月28日美以伊爆發衝突以來，家庭用戶對太陽能的需求增加了1倍以上，而4月歐洲太陽能的銷售是去年同期的10倍；法廣則報導，中國大陸太陽能設備與零組件的出口數量與金額雙雙寫下歷史新高。", "full_text": "路透社日前報導，美以伊衝突導致石油和天然氣價格上漲，在規避風險的考量下，再生能源成為新寵。業者表示，自2月28日美以伊爆發衝突以來，家庭用戶對太陽能的需求增加了1倍以上，而4月歐洲太陽能的銷售是去年同期的10倍；法廣則報導，中國大陸太陽能設備與零組件的出口數量與金額雙雙寫下歷史新高。\n\n對照國際再生能源的蓬勃發展，台灣的綠電卻令人唏噓。100％法國國營、歐洲最大電力公司之一的法國電力集團，今年 4 月確認撤出台灣。事實上，這些年已陸續有包括德國的安能和萊茵再生能源、英國的全球公司、西班牙的伊比德羅拉和貝富新能源等多家國際再生能源大廠退出台灣的離岸風電市場。\n\n另外還有多家國際能源投資機構正在評估撤出或出售資產，也有開發商已停止推進計畫。經濟部長龔明鑫仍強自鎮定表示，還是「有非常多廠商向經濟部表達參與的意願」。然而，這麼多家國際再生能源巨頭紛紛用腳投票，就是重要警訊。\n\n光電的部分，問題也很多。2025 年光電板新增裝置容量創新低，進展緩慢。目前光電裝置容量為 15.68GW，距離民進黨政府訂的目標20 GW，還有一段不小的距離，然後賴政府又提出2030年太陽光電31GW的目標，做不到就把時間往後拉，然後再往上加一點，這就是民進黨政府慣用的伎倆，不斷提出新目標，企圖覆蓋之前跳票的事實。\n\n然而，目前台灣的光電設置密度為每平方公里0.43MW，已是全球第 2高，政府必須嚴肅面對台灣發展光電是否存在物理性極限，或至少有結構性瓶頸的問題，因為剩下還沒開發的地方大都難度很高，成本也高，對投資者而言，恐怕吸引力有限。2016年蔡英文總統上任後，「山也光電板、海也光電板」，然而，儘管如此，綠電占比仍偏低，2025年底為13％，離政府的目標20％還很遠，恐怕到賴清德這一任期結束都難以達標。民進黨政府發展綠電卻未能在電網和儲能同步提升，這是台灣發展綠電的一大敗筆。\n\n再生能源具間歇性，因此一定要搭配儲能。此外，如果電網壅塞，發了電也送不出去，這些都是政府必須加快腳步要做的事。當然，更重要的是要重拾民眾和產業對再生能源的信心，因為「綠電」在台灣已幾乎成為「黑金」的代名詞，社會評價崩落，業者埋怨光電遭到汙名化。\n\n然而，要怪就只能怪民進黨政府的綠電政策魯莽草率，甚至放縱不法，搞得台灣山河破碎還天天擔心電力不夠，硬要廠商降載配合，改用柴油機發電，搞得空品更為惡劣，當然會讓越來越多人聞綠電而色變、百般反對。綠電沒有不好，只是被綠營玩壞了！賴政府接手這個爛攤子，首要任務是面對現實，盤點包括風光在內的各種發電量，理性務實提出發展目標，循序漸進，不要再吹牛，更不要再掩耳盜鈴了。\n\n台灣能源政策已被耽誤了10年，此時此刻，撥亂反正是賴清德的責任，更是台灣擺脫能源桎梏極為有限的機會之窗！"}, {"title": "谷立言的表態 台灣的籌碼", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "中心兼任助理教授何志勇美國在台協會（AIT）處長谷立言接受《中國時報》專訪，重申美國政府對台政策，包括延續「一中政策」，並期盼立法院盡速通過全面性的「國防特別條例」。谷立言的發言代表了川普政府的正式立場，這也解釋了原本在軍購案上立場分歧的朝野，為何開始出現尋求共識的動向。不過27日立法院長韓國瑜第三度針對「國防特別條例」草案舉行協商，因朝野意見分歧，不到1小時就宣布散會。", "full_text": "中心兼任助理教授何志勇美國在台協會（AIT）處長谷立言接受《中國時報》專訪，重申美國政府對台政策，包括延續「一中政策」，並期盼立法院盡速通過全面性的「國防特別條例」。谷立言的發言代表了川普政府的正式立場，這也解釋了原本在軍購案上立場分歧的朝野，為何開始出現尋求共識的動向。不過27日立法院長韓國瑜第三度針對「國防特別條例」草案舉行協商，因朝野意見分歧，不到1小時就宣布散會。\n\n國際政治很現實，也很殘酷。美國是目前全世界唯一對台出售武器的國家；再加上美國長期在台海採取「戰略模糊」，意味著若共軍犯台，美國未必會出兵防衛台灣。\n\n如今，隨著冷戰地緣政治死灰復燃，台灣是否強化國防，遂成為國內輿論的核心爭點。近年民進黨執政後，台灣不再維持與美、中之間的戰略等距關係，而選擇單押美國，導致對美依賴日益加深，甚至逐漸陷入近乎被予取予求的局面。相較之下，馬政府時期仍曾拒絕以開放含瘦肉精美豬進口，換取美方對免簽待遇的暗示，展現一定程度的政策自主性。\n\n但事實上，最終美國仍給予台灣免簽的待遇。當川普政府施壓要求台灣半導體產業赴美設廠時，國內開始出現疑問：一旦失去「護國神山」，台灣對美國而言，還剩下多少戰略價值？在此結構下，對美軍購逐漸成為一種「治標不治本」的循環，即一方面藉此維繫與美國的「夥伴」關係，另一方面若遇共軍犯台而美國未即時出兵，至少確保台灣具備基本的自我防衛能力。\n\n賴清德總統就職之初，試圖以擦邊球操作「中華民國與中華人民共和國互不隸屬」的論述，履新不久的AIT處長谷立言隨即多次重申「 一中政策」不變，並強調維持現狀。此後，賴總統明顯收斂。同樣地，民進黨長期推動「非核家園」，已衝擊台灣的能源安全，谷立言釋出美國可協助引進新核能的訊號後，賴政府也不得不調整立場，重啟核電。\n\n此次專訪，谷立言的表態凸顯兩個值得正視的面向。第一，川普面臨國內通膨壓力與海外戰事拖累，民調持續探底，又須迎戰期中選舉，在此情勢下，期待美國出兵協防台灣恐不切實際；強化國防、自我防衛才是正辦。\n\n但備戰不等於求戰，軍購也應回歸台灣自身需求。第二，晶片是台灣對美談判的關鍵籌碼。若以台灣利益為優先，就不該將我半導體優勢拱手讓出。\n\n這本就是民進黨政府可以自主調整的政策方向；亡羊補牢，猶未為晚，在野黨未必反對，民氣亦可用。健康的台美夥伴關係不只在國防，關鍵在於台灣是否守得住籌碼，並未雨綢繆，推動多元產業發展。"}, {"title": "社會觀察 美伊拉鋸戰的警示", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "教授莊奕琦美伊戰爭持續近兩個月後，真正值得關注的是這場戰爭將以什麼方式收尾，以及它會把多大的代價轉嫁到區域與全球。到目前為止，戰局已從高強度軍事打擊，轉入「停火延長、封鎖持續、談判停滯」的僵局狀態，這表示戰爭沒有真正結束，只是從猛烈交火轉為更長期的政治、經濟與戰略拉鋸。這場戰爭的可能結局：第一種是「有限停火、長期對峙」。", "full_text": "教授莊奕琦美伊戰爭持續近兩個月後，真正值得關注的是這場戰爭將以什麼方式收尾，以及它會把多大的代價轉嫁到區域與全球。到目前為止，戰局已從高強度軍事打擊，轉入「停火延長、封鎖持續、談判停滯」的僵局狀態，這表示戰爭沒有真正結束，只是從猛烈交火轉為更長期的政治、經濟與戰略拉鋸。這場戰爭的可能結局：第一種是「有限停火、長期對峙」。\n\n也就是說，雙方避免再回到最激烈的轟炸階段，但封鎖、威懾、零星打擊、 代理人施壓與談判破裂將反覆出現，戰爭形式轉為低強度卻高不確定性的長期消耗。第二種可能的結局，是美國取得軍事的可觀成果，卻未能換來穩定的政治秩序。換言之，美國即使摧毀了目標，也未必能消除威脅。\n\n第三種也是最危險的結局，是戰火再次外溢為更廣泛的中東危機。真主黨和胡塞武裝與以色列的交火都已說明，這場戰爭不是單純的雙邊衝突，而是可能沿著代理人網絡、海上航道與盟友體系不斷擴大的複合型戰爭。這場戰爭最直接的外溢效應，是能源與航運安全惡化，其後果會經由油價、物流與金融市場，直接轉化為全球通膨壓力與產業經營成本，迅速傳導為全球市場的系統性風險。\n\n另一個不容忽視的外溢效應，是美國戰略注意力被重新拉回中東，這對原本強調印太重心的戰略布局勢必形成牽制，從而影響區域的穩定。在全球化時代，遠方戰爭可以很快變成本地風險。對台灣的啟示：一、能源安全須有制度性安排，包括更充足的戰略儲備、更多元的進口來源、對航運風險的情境規畫，以及維持產業與民生穩定的機制，以建立足夠韌性。\n\n二、供應鏈安全不能只談科技，也必須納入能源、物流與保險成本。對台灣來說，國際局勢一旦惡化，風險不只是原料來得慢，而是整個交貨體系、成本結構與企業資金安排都會受到衝擊。三、現代衝突已不只是傳統戰場的勝負，而是軍事打擊、代理人戰爭、封鎖、經濟壓力與談判僵局交織的長期博弈。\n\n這提醒台灣，國家安全不只是防衛能力，也包括危機溝通、金融穩定、民生物資調節與社會承壓能力。總之，美伊戰爭最可能的走向，不是其中一方徹底勝利，而是某種形式的「不完全停火」與「長期震盪」。戰場或許降溫，風險卻不會消失，這場戰爭仍可能在任何一次誤判後重新升高，它帶給台灣的提醒也非常清楚，最可靠的安全是先讓自己撐得住：台灣仍能穩定、自主而有秩序地運作。"}, {"title": "《社論》央行且戰且走 政策步步為營", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "美伊戰事前景未卜，但能源價格確定走揚，並推升各式各樣產品價格上漲，非短時間就能消化，物價問題成為牽動全球央行貨幣政策的核心變數。本周是超級央行周，日銀、英央、歐央、加央及美國聯準會（Fed）等全球五大央行陸續公布利率決策，均可望按兵不動，國際金融市場對Fed的降息預期淡化。3月份台灣央行理監事會，提供的訊號也偏向緊縮，台北金融市場亦有研判存在著升息空間的觀點，同樣地，按兵不動仍是最終給出的答案。", "full_text": "美伊戰事前景未卜，但能源價格確定走揚，並推升各式各樣產品價格上漲，非短時間就能消化，物價問題成為牽動全球央行貨幣政策的核心變數。本周是超級央行周，日銀、英央、歐央、加央及美國聯準會（Fed）等全球五大央行陸續公布利率決策，均可望按兵不動，國際金融市場對Fed的降息預期淡化。3月份台灣央行理監事會，提供的訊號也偏向緊縮，台北金融市場亦有研判存在著升息空間的觀點，同樣地，按兵不動仍是最終給出的答案。\n\n不論是降息翻轉為升息的轉折，或者升息條件俱足卻寧可一動不如一靜，都顯示決策者的升息之門雖未關上，也很難打開，而周邊持續釋放出是否升息的聲浪，創造更多的討論空間，也凸顯此時物價持續上揚的難題，恐非升息一聲令下即可迎刃而解。回到3月底的央行理監事會議上。當時楊金龍總裁對貨幣政策的談話重點，首先強調核心關鍵還是通膨預期是否成形，對於通膨形式的描述，他則提醒應提防會以輸入性通膨的形式出現，考慮透過匯率手段，遏止這種情況的發生。\n\n之後前往立法院備詢時再補充說，值此油價波動與通膨預期升溫之際，央行雖未排除升息可能，但整體態度偏向觀望。國發會引用的央行說法指出，從全年度觀察，假設油價每桶為85美元，估算國內消費者物價指數（CPI）年增率為1.8％，油價如進一步升至100美元，通膨年增率約為1.9％，相較於2％的物價增幅警戒線，上述的基準情境中，物價尚未出現失控跡象，貨幣政策自然不需急轉彎。因此，央行的步步為營，應非單純的擔心今年物價走勢會失控，雖然通膨的確是央行最關心的經濟變數，也是目前各界討論的焦點所在，但實況都在可預期與掌控的範圍之內。\n\n央行之所以提高警覺，應該是在調控的手段上，他必須付出什麼樣的代價，和可能出現的政策效果。全球其他央行面臨的情境，和台灣央行並無顯著差異。大家都面臨著蠢蠢欲動的物價持續性上漲，重點是，此波通膨壓力並非來自需求面過熱，而是地緣政治推升能源價格，並進而帶動的輸入性通膨；\n\n而其會否延續、可能維持多久的時間，都具有高度的不確定性。數年前俄烏戰爭爆發以來，全球已領教過輸入型通膨的威力，並非全然無此方面的經驗，美伊衝突帶來的一樣是供給面的衝擊，特色是，難以單純透過升息予以壓抑，簡言之，來自油價所引發的成本推升效果，把利率往上調並非對症下藥，相反的，還可能要對經濟成長造成額外的壓力。與其他各國相較，台灣有一大不同之處在於，我們有一個被強力控管中的房地產市場。\n\n央行上次會議開了個小口，讓房市紓壓，應是擔心或觀察到過度監理，導致房地產疲弱程度超乎預期，若放鬆管制後再來個利率上調，政策效果打折之外，也要擔心房市硬著陸的風險提高，和對內需市場的衝擊。前有狼、後有虎，或許就是央行難直接運用貨幣政策處理問題的原因，只能以短支長、見招拆招，盡最大可能的保持住政策彈性。具體作法上，可看到透過匯率穩定機制，減緩輸入型通膨衝擊，並緊盯市場是否出現「第二輪通膨」，即企業成本轉嫁、勞工要求加薪，於供給面之外的另一股推升物價形成循環的新力量。\n\n楊金龍總裁說，第二季是他決定貨幣政策的重要觀察點，或可解讀為，在此之前，央行傾向以穩定匯率和跨部會的物價平穩措施，對應時局，如真到要動用利率政策這一步，七傷拳一出，只怕屆時局勢之複雜，已遠超過貨幣政策所能處理的範圍。"}, {"title": "社論/台積成為台灣的經濟和地緣槓桿", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "priority": 0, "summary": "金管會近期調整台股基金與主動式ETF對單一個股的持股上限，從一成提高到兩成五，外界直接解讀為專為台積電量身打造的政策，因為在台股所有成分股中，只有台積電的市值占比超過一成的門檻。此舉理論上可為市場釋出近2,000億元的潛在資金，讓基金經理人能更充分地跟上台積電帶動的AI行情。這項政策調整的邏輯不難理解，主動式基金如果無法增持占大盤四成多權重的個股，等同於被鎖住了手腳，長期績效必然和被動式ETF脫節，投資人的權益也因此受損。", "full_text": "金管會近期調整台股基金與主動式ETF對單一個股的持股上限，從一成提高到兩成五，外界直接解讀為專為台積電量身打造的政策，因為在台股所有成分股中，只有台積電的市值占比超過一成的門檻。此舉理論上可為市場釋出近2,000億元的潛在資金，讓基金經理人能更充分地跟上台積電帶動的AI行情。這項政策調整的邏輯不難理解，主動式基金如果無法增持占大盤四成多權重的個股，等同於被鎖住了手腳，長期績效必然和被動式ETF脫節，投資人的權益也因此受損。\n\n不過，這裡有一個值得深思的問題。台積電在台股的比重如此之高，以至於整個金融監理體系都需要因應它而調整，這究竟是台灣的優勢，還是潛在的脆弱性？今年4月中旬，台積電公布了2026年第1季財報，單季營收突破新台幣1.1兆元，年增幅超過三成五，毛利率更飆至66.2%，每股盈餘22元，都創下歷史新高。\n\n董事長魏哲家在法說會上一句話令市場印象深刻，他說AI需求的瓶頸不是電力，而是晶片供給，台積電現在最頭痛的是如何填補供需之間的缺口。這番話，既是財報說明，也是對整個世界的宣示。一家晶圓代工廠的法說會，為何能讓全球科技股屏息凝神？\n\n這個問題本身就說明了台積電在當今世界的地位，早已超越商業範疇，成為地緣政治棋局上最重要的籌碼之一。台積電的成功從來不是偶然，它的核心競爭力，來自於一套極其精密的商業哲學，把客戶利益放在公司利益之前，讓每一個沒有自建工廠的晶片設計公司，都能把台積電視為自家的生產線。這種「為你服務就是我的核心」的經營邏輯，吸引了輝達、蘋果、AMD等科技巨頭，形成一個幾乎無可取代的生態圈。\n\n加上台積電獨特的折舊策略，先進製程量產初期定高價回收成本，折舊攤完後大降價讓對手窒息，這套機制讓三星與英特爾始終追不上，也讓台積電在每一個技術世代都能維持領先身位。正因如此，當美中科技戰愈演愈烈，半導體成為國家安全的核心議題，台積電便從一家企業，搖身成為各方爭奪的戰略資產。美國要求台積電赴亞利桑那設廠，日本熊本的JASM廠也已經投入運作，台積電的國際布局從被動應對，逐漸演變成主動的地緣經營。\n\n台、美之間的合作，本質上是品牌與製造的高度互補，美國掌握設計、軟體與市場，台灣提供最精密的製造能力，雙方共享AI時代的果實。台、日聯盟則建立在另一種互補上，日本擁有頂尖的半導體設備與材料，台灣擁有無可匹敵的製造執行力，熊本JASM的意義不只是一座廠房，而是台日兩國在產業安全上的相互嵌合。台積電的強大是台灣最好的防盾，讓全世界都不得不在台灣的安危上有所考量，這就是所謂的「矽盾」概念。\n\n另一種觀點則警告，過度依賴單一企業、單一產業，不僅讓台灣的資本市場波動性偏高，在地緣風險真正發生時，也可能成為弱點而非保障。這兩種觀點都有其道理，但都不完整。台積電的存在固然給了台灣難以替代的戰略籌碼，但「籌碼」本身並不等於安全，更不等於主動權。\n\n台灣需要做的，是在台積電的光環之下，積極拓展其他產業的厚度，讓半導體供應鏈的上下游、AI應用服務、乃至更多元的製造能力，都能成為台灣在國際舞台上的新支柱。台積電用幾十年的時間，把「為客戶而服務」這個信念做到了極致，讓自己成為全球最不可或缺的技術夥伴。台灣作為一個國家，也應該思考同樣的問題，我們能提供給世界什麼，是對方無法輕易取代的？\n\n台積電給了一個極為成功的答案，但這個答案，不能也不應該只有一個。"}, {"title": "社論》二次西進─危害台灣的壞主意", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "台灣與中國的兩個「中國黨」首領本月十日「鄭習會」之後，北京當局加緊對付台灣的工作。經貿十項措施之外，軍機軍艦脅迫不斷，外加海警船編隊襲擾金門海岸。最令國人反感的，它施壓第三國阻撓賴清德總統出訪非洲友邦史瓦帝尼，宣稱「台灣沒有總統」，既踐踏國際飛航安全與秩序，也是「再次對台灣的恐嚇行為」。", "full_text": "台灣與中國的兩個「中國黨」首領本月十日「鄭習會」之後，北京當局加緊對付台灣的工作。經貿十項措施之外，軍機軍艦脅迫不斷，外加海警船編隊襲擾金門海岸。最令國人反感的，它施壓第三國阻撓賴清德總統出訪非洲友邦史瓦帝尼，宣稱「台灣沒有總統」，既踐踏國際飛航安全與秩序，也是「再次對台灣的恐嚇行為」。\n\n同時，台灣內部若干政媒商大肆蠢動，與其唱和。眼中只有自身短期利益者，無視整體利益及中國以經促統伎倆，以商逼政，要求政府配合十項措施。對中國打壓賴總統出訪，立委賴士葆沒有指責中國的膽子，反批「政府不能以此政治操作」。\n\n尤有甚者，瞎捧中國而名列「十一傻」的呂禮詩登解放軍船艦，聲稱「祖國強大了，台灣更安全！」自曝敵我不分的錯亂；還有人配合中國今年第一季經濟成長似乎回溫，喊出台灣產業要「二次西進」。\n\n從統計數字看，中國今年第一季國內生產毛額（GDP）成長五％，是近五季最高，官方因此宣稱「國民經濟實現良好開局，發展韌性和活力進一步彰顯」。這一斷言，國際經濟專家普遍不認同，指中國經濟要擺脫通貨緊縮困境仍言之過早，四月份製造業經理人採購指數（PMI）恐將重返通縮，而進行中的中東戰爭雖帶來能源價格震撼，也無助中國掙脫陰霾。換言之，第一季經濟成長有如黃鐵礦，被誤認為黃金，但假的真不了，而有「愚人金（fool’s gold）」之稱，官方說法與人民感受差距頗大。\n\n就經濟常識看，不難判定現實。在構成GDP的四大項中，第一季整體數字優於預期，主要是政府主導的基本建設及公共投資強勁，但民間投資依然疲弱，外貿順差縮小，民間消費也欲振乏力。通貨緊縮的定義，是產能遠多於需求，中國曾多年以投資大幅擴充產能，以房地產等金錢遊戲助長熱潮，也帶動了民間消費。\n\n但是，川普第一任期起的經貿戰、武漢肺炎疫情北京處置不當、金錢遊戲泡沫爆破，把中國經濟打回原形。威權政府需要經濟成長維持統治正當性。因而，政府一直是維持經濟成長主力，表現於公共投資，過多的產能近年還向各國傾銷。\n\n同時，整體經濟成長縱使再疲弱，官方統計也常人為調整，以致如去年 GDP成長五％，精準達成北京預設的「五％左右」目標，堪稱「經濟奇蹟」；經濟學博士的故總理李克強曾質疑、財經界普遍詰問，當局都不改其行。金錢遊戲時人聲鼎沸，一旦泡沫爆破痛苦不堪，調整恢復費時費力，日本經濟失落三十年就是殷鑑。\n\n在中國，家庭資產六、七成集中於房地產，近年泡沫破滅之後，紙上財富縮水，民間消費欲振乏力，產業內捲，上班族躺平。官方雖祭出各式補貼，都屬短期應急之計，未從根本著手，也常透支未來需求；購車、買家電等國家補貼均草草收場，既未能有效提振消費，也無以改善內捲、外捲困境。\n\n近期外賣平台的補貼大戰，「○元奶茶」、「二點九元漢堡」等削價促銷，卻導致外賣商家淨利下滑，平台深陷虧損，外送員疲於奔命，消費者也未蒙其益，被稱通縮壓力下的內捲式競爭，即屬近例。中國現今經濟困境，主要在民間消費不振導致的內需疲弱，民間消費支出佔GDP比重長期維持約四成左右，遠低於先進國家的六至七成水準。第一季的內需對 GDP 貢獻提升，主要來自政府部門挹注，民間可支配所得雖然提高，一般百姓寧可儲蓄以因應未知的經濟大環境，仍不願消費；\n\n構成內需的工業生產、零售額和固定資產投資也都持續放緩，內需仍是整體經濟最薄弱的環節。此時，中東局勢可能壓抑全球對中國商品需求，內外雙重壓力罩頂，各國都擔心通貨膨脹之勢，反而不利中國擺脫通縮困境。中國通縮困局難解，此時倡言台灣產業二次西進，不僅跳進通貨緊縮深淵，違反經驗教訓及趨勢，也不合常識常理。\n\n就趨勢說，國際企業以共產中國「企業也姓黨」、通貨緊縮及地緣政治經濟因素，正大舉出走。台灣於一九九○年代不顧李登輝「戒急用忍」苦口婆心，大膽西進，助成中國經濟崛起，繼之以軍事崛起，耀武揚威，如今飽受脅迫，實為「自作自受」。所幸台灣產業近年隨國際趨勢，大量撤出，走向科技創新與國際布局，整體經濟因上進而大好，也印證了「離中國越遠越好」。\n\n此時再談西進，實與國際趨勢背離，第二度自投羅網；如此愚不可及的主張，除了見利忘義、包藏禍心者外，在台灣也沒市場。"}, {"title": "社論/當賴清德走不出去，林佳龍也躲躲閃閃", "source": "聯合報 A02 焦點\\", "cat": "社論與評論觀點", "priority": 0, "summary": "賴清德總統出訪非洲友邦史瓦帝尼受阻，改派外交部長林佳龍為總統特使代表出訪。相對於賴總統原定出訪前的高調張揚，林佳龍此行卻是保密到家，直到輾轉抵達後才由史國政府公開。林佳龍落地後在臉書貼文強調，台灣不會被威權勢力困住，一定會走向世界。", "full_text": "賴清德總統出訪非洲友邦史瓦帝尼受阻，改派外交部長林佳龍為總統特使代表出訪。相對於賴總統原定出訪前的高調張揚，林佳龍此行卻是保密到家，直到輾轉抵達後才由史國政府公開。林佳龍落地後在臉書貼文強調，台灣不會被威權勢力困住，一定會走向世界。\n\n然而，元首外交重挫，就是林佳龍和國安會秘書長吳釗燮失職；困住台灣、讓台灣走不出去的，除了中共，還有賴政府。賴清德還沒跨出國門，就鑼鼓喧天、大肆聲張，把外交當大內宣工具。\n\n外交部誇耀非洲十一國四十餘名政要熱烈歡迎賴總統首訪非洲；林佳龍還得意洋洋說，賴總統出訪「讓中共氣炸了」。賴政府更高調向中國大陸叫陣，放話要在史王慶典向非洲各國政要與部族領袖闡述台灣路線與台灣能力，破除北京「一中論述」，展現面向全球南方的戰略溝通與布局。\n\n連美國都無力撼動中國大陸在全球南方的領頭羊地位，賴政府倒是很想蚍蜉撼樹。外交首長昩於國際關係現實，國安首長昩於全球戰略情勢，但直到賴清德被困住，才暴露林佳龍和吳釗燮處在狀況外這麼嚴重。在美國尋求與中國大陸對話、國際社會也向中國大陸尋求避險之際，賴清德卻要把抗中烽火燒到非洲；\n\n如今坐困島內，未來出訪更難。雖然賴清德也撿到槍，大力反擊國共「鄭習會」，呼籲朝野「應更加清楚辨識中國的真實樣貌」，但「川習會」即將登場，賴清德怎麼不敢把這句話送給川普？賴總統出訪受阻，美、日、歐及友邦紛紛發聲相挺。\n\n但在現實的國際社會，這些聲援只能送暖，除供賴政府再做一波大內宣外，對於打開我國國際空間，特別是總統出訪，幫助有限。因為問題不僅出在中共打壓與國際現實，也出在賴政府的抗中路線掛帥、國安外交誤判，以及大內宣操作過頭。台灣外交受挫，美國表達了不樂見北京相關威嚇行為；\n\n但賴清德在美國同樣碰壁，川普為避免破壞「川習會」，不准賴清德過境美國本土。賴清德預訂出訪史瓦帝尼前，林佳龍就被問到這個尷尬問題，林佳龍還強調美國歡迎賴總統，未來循例過境，時機成熟將對外說明。但去年賴清德才因無法過境紐約，乾脆中南美洲也不去了；\n\n原來重點是過境，內宣是目的，邦誼只算附屬，真不知置友邦於何地？林佳龍為國人編織賴清德過境美國的未來成就；但比起賴清德過境美國，台灣會不會成為川普大交易的籌碼，更值得關切。\n\n外交部政務次長吳志中坦言害怕台灣被擺上「川習會」的菜單，擔心川普可能在台灣議題上讓步。賴清德不准人民疑美，但現在連賴政府官員疑美都自然流露了。林佳龍把出訪轉內宣，卻操作過頭耗損外交，不是偶然，因為這正是賴政府的典型操作。\n\n行政院長卓榮泰赴日看棒球，綠營按捺不住大內宣衝動，高調誇稱是公務行程、外交突破，必定會見日本政要，讓日方不滿，甚至覺得「被背叛」。卓榮泰收割了大內宣的政治利益，卻壞了台灣外交信用，除影響台日在敏感議題上的合作，也可能關閉了未來各種出訪模式的大門。外交必須互利互惠，雙方關係才能深厚長久，不能為了內宣而消費外交，更不能剝削對方來取悅選民。\n\n國人都期待政府有效拓展國際空間，更不樂見元首外交受挫。但在朝野對中共打壓表達譴責或遺憾之際，賴政府更應反省抗中路線，檢討外交國安團隊責任，認清外交不是為內宣服務，否則不僅賴清德走不出國門，林佳龍出去也只能躲躲閃閃。"}, {"title": "社論/「拉積盤」當政績 投資人承受風險", "source": "聯合報 A03 焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "台股在台積電帶動下頻頻改寫高點，「拉積盤」已從市場術語，逐漸成為觀察台灣經濟的一個縮影。加權指數昨天盤中衝破四萬點，看似榮景再現，但若拆解盤面結構，這樣的上漲高度集中於少數企業，特別是台積電「一枝獨秀」，與多數產業實際景氣之間，已出現明顯落差。政府一向將台股走勢視為重要的經濟表現之一，甚至當作政績指標，尤其年底將舉行選舉，政策做多股市也被視為助攻選情的必要手段。", "full_text": "台股在台積電帶動下頻頻改寫高點，「拉積盤」已從市場術語，逐漸成為觀察台灣經濟的一個縮影。加權指數昨天盤中衝破四萬點，看似榮景再現，但若拆解盤面結構，這樣的上漲高度集中於少數企業，特別是台積電「一枝獨秀」，與多數產業實際景氣之間，已出現明顯落差。政府一向將台股走勢視為重要的經濟表現之一，甚至當作政績指標，尤其年底將舉行選舉，政策做多股市也被視為助攻選情的必要手段。\n\n然而，回到實體經濟觀察，傳統產業面臨成本壓力與轉型困境，內需動能有限，多數民眾未必能公平享有經濟成長的成果。當經濟表現過度看中股市指數，且上漲集中於少數企業時，這樣的「政績」本身就帶有結構性的偏差。更何況，當市場已出現資金過度集中與結構失衡的情況，政策面卻未積極回應相關風險。\n\n包括當沖降稅的一再延長、金管會近期放寬主動式ＥＴＦ持股限制等措施，仍持續引導資金流入股市，甚至進一步集中於權值股。政府卻沒思考，除了擴大資金參與，要如何確保市場結構的健全。當市場資金集中於少數權值股，且資金槓桿愈來愈高時，風險其實正在累積。\n\n當前台股之所以能對通膨與利率等總體變數反應遲鈍，並非風險消失，而是被產業題材與資金動能暫時掩蓋。一旦資金環境出現變化，或核心權值股出現修正，過度集中的結構將使市場波動被放大，承受風險的，很可能正是被引導進場的多數投資人。因此，當「拉積盤」成為市場常態，政府若持續以指數表現作為經濟亮點，卻未同步強化產業結構與市場韌性，等同默許資金往單一方向集中。\n\n真正需要被檢視的，不是台股能否再創新高，而是這樣的上漲，是否建立在一個健康且可持續的基礎之上。股市可以是經濟的櫥窗，但不能只是櫥窗。當櫥窗愈來愈亮，內部裝潢結構卻愈來愈失衡時，這樣的榮景終究只是表象。\n\n如果政策仍停留在「讓指數好看」，而忽略讓結構更穩，那麼「拉積盤」所創造的，不會是政績，而可能是下一個需要被善後的風險。"}, {"title": "社論／日本有事 台灣須務實避險", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "日本海上自衛隊「雷」號驅逐艦17日通過台海，此雖非頭一遭，但大陸認為，日本特意在《馬關條約》締約日航行台海，是對中國人民感情的極大傷害，挑釁意味十足。日本首相高市早苗在國會言明「台灣有事」事涉日本生存事態，符合集體自衛權行使，北京將日艦航經台海視為「台灣有事」說的延續，採取反制海自行動，共軍飛彈驅逐艦「包頭艦」及「黃岡號」護衛艦通過奄美大島與橫當島之間海域，朝東北方航向太平洋。北京藉此表態台灣為「核心利益中的核心」，堅決反對外部干預，是...", "full_text": "日本海上自衛隊「雷」號驅逐艦17日通過台海，此雖非頭一遭，但大陸認為，日本特意在《馬關條約》締約日航行台海，是對中國人民感情的極大傷害，挑釁意味十足。日本首相高市早苗在國會言明「台灣有事」事涉日本生存事態，符合集體自衛權行使，北京將日艦航經台海視為「台灣有事」說的延續，採取反制海自行動，共軍飛彈驅逐艦「包頭艦」及「黃岡號」護衛艦通過奄美大島與橫當島之間海域，朝東北方航向太平洋。北京藉此表態台灣為「核心利益中的核心」，堅決反對外部干預，是「不可逾越的紅線」。\n\n日艦航經台海大陸反制中日的對立逐漸升高，且異於過去，不僅以經濟為反制措施，大陸的對日施壓擴大到安保領域，不僅對日本防衛相關企業強化出口管制，更對上海近海的東海與黃海上空5處空域發布警告民航飛機可能面臨危險的航行通告，為期40天，暗示將實施針對日本的軍演。日本防衛研究所中國研究室室長增田雅之認為，航行通告作為威懾手段的操作，從對象空域來看，意在向美、日及台灣傳遞軍事上進入快速應對態勢的訊號。此次中日交惡因台灣問題而起，北京堅持高市須撤回言論，但高市態度強硬，拒絕北京的要求，雙方無妥協餘地，中日關係陷入1972年 9月建交以來最嚴峻的僵局，亦成為東亞安全的新火種。\n\n然而，賴清德政府將高市的「台灣有事」說視為挺台海安全，與台灣共同「抗中」，為台日關係升溫的象徵，殊不知台灣在中日緊張中被拖入險境，平添台海不可控之變數。在中日安全困境加劇之際，高市調動反中的民族主義情緒，助勢「 高市旋風」，在眾議院大選中獲得壓倒性勝利，順勢推動「再軍事化」，揚棄限制具殺傷力武器出口的「防衛裝備移轉三原則」，取消救援、運輸、警戒、監控及掃雷「5類限制」，走向整機、成套、長週期軍備出口，強調「通過強化同盟國及志同道合國家的威懾力與應對能力，營造對日本有利的安全保障環境」，動心起念將修憲排上政治議程，打破戰後以來堅守的和平主義。在參議院仍處少數的政治現實下，高市一時間難以實現修憲，但透過「再軍事化」的諸項政策，日本逐步背離戰後和平主義，憲法中的「放棄戰爭」形同具文。\n\n高市認為，此改變在「日益嚴峻的安全情勢下」無可避免。相較於「早苗經濟學」，高市更執著於軍事。高市積極「再軍事化」固然存在川普主義因素，面對美國不再捍衛全球秩序的現實，日本須為自身安全與防衛尋找可行的替代方案，但此轉變使中日關係難以改善。\n\n日本再軍事化高市激進北京將日本「再軍事化」定位為「新型軍國主義」，呼籲日本「在軍事安全領域恪守承諾、慎重行事，不要在錯誤的道路上越走越遠」，但高市內閣不為所動，並稱日本變革安保政策旨在保障日本的安全，並進一步促進區域的和平與穩定。韓國外交部亦表示，日本的防衛政策「理應在遵循和平憲法精神的同時，為區域和平與穩定作出貢獻」，反對高市貿然修改「放棄戰爭」的憲法第9條，走上「戰爭國家」。高市試圖以力量建構和平，與川普聲氣相通，在美中博弈的國際政治格局中站邊美國，不似韓國、東協與歐盟在兩者間保持動態平衡，在維繫與美國的傳統安全同盟或聯盟時，仍尋求與中國交往，透過對話管控分歧、避免衝突，安全與經濟兩頭兼顧。\n\n追隨川普的高市須注視即將登場的「川習會」，若美中階段性緩解競爭，關係趨向穩定，將對高市的「抗中」構成外交轉向的壓力。面對日本「再軍事化」牽動的東亞安全秩序重構，賴政府在親日心態作祟下，缺乏風險意識，偏廢兩岸關係，拒大陸藉「鄭習會」對台釋放的和平訊號，拘泥於政治意識形態刻意貶抑大陸，不見務實的避險操作，使台灣步入中日交惡的戰略風險中而不自知。高市以台灣說事，雖為首相在國會的發言留下紀錄，但仍非具約束力的內閣統一見解，更缺乏相關配套的安保法制支撐，存在人亡政息的不確定性。\n\n賴政府莫一味仰望高市，無視民意對兩岸關係春暖花開的期待。"}];
const DEPTS = {"社論與評論觀點": {"icon": "📝", "short": "社論"}, "國際經濟情勢": {"icon": "🌐", "short": "國際"}, "台灣總體經濟與數據": {"icon": "📊", "short": "總經"}, "台灣產業與投資動向": {"icon": "🏭", "short": "產業"}, "台灣政府與政策訊息": {"icon": "🏛️", "short": "政策"}};

const HIGHLIGHTS = [{"label": "今日必看", "value": "16 則", "cat": ""}, {"label": "社論", "value": "15 則・1 必看", "cat": "社論與評論觀點"}, {"label": "國際", "value": "28 則・8 必看", "cat": "國際經濟情勢"}, {"label": "總經", "value": "1 則・1 必看", "cat": "台灣總體經濟與數據"}, {"label": "產業", "value": "29 則・6 必看", "cat": "台灣產業與投資動向"}, {"label": "政策", "value": "9 則", "cat": "台灣政府與政策訊息"}];

// ESC helper
function esc(s){
  let r = String(s||'');
  r = r.split('&').join('&amp;');
  r = r.split('<').join('&lt;');
  r = r.split('>').join('&gt;');
  r = r.split('"').join('&quot;');
  return r;
}

// ── GLOBAL NAV TABS ──
function buildGnavTabs(){
  const bar = document.getElementById('gnav-tabs');
  bar.innerHTML = '';
  const tabs = [{'label':'概覽','cat':'all'}].concat(
    CAT_ORDER.map(c=>({'label': DEPTS[c]?DEPTS[c].short:c, 'cat': c}))
  );
  tabs.forEach(t=>{
    const btn = document.createElement('button');
    btn.className = 'gnav-tab';
    btn.textContent = t.label;
    btn.dataset.cat = t.cat;
    btn.onclick = ()=>{
      if(t.cat==='all') goHome();
      else openCatView(t.cat);
    };
    bar.appendChild(btn);
  });
  setActiveTab('all');
}

function setActiveTab(cat){
  document.querySelectorAll('.gnav-tab').forEach(b=>{
    b.classList.toggle('active', b.dataset.cat===cat);
  });
}

// ── HIGHLIGHTS STRIP ──
function buildHighlights(){
  const scroll = document.getElementById('highlights-scroll');
  scroll.innerHTML = '';
  HIGHLIGHTS.forEach(h=>{
    const card = document.createElement('div');
    card.className = 'highlight-card' + (h.cat===''?' highlight-must':'');
    card.innerHTML = '<div class="hl-label">'+esc(h.label)+'</div><div class="hl-value">'+esc(h.value)+'</div>';
    card.onclick = ()=>{
      if(h.cat==='') openCatView('must');
      else openCatView(h.cat);
    };
    scroll.appendChild(card);
  });
}

// ── CATEGORY BRICKS (home) ──
function makeBrick(item, idx, isMustZone){
  const dataIdx = DATA.indexOf(item);
  const dept = DEPTS[item.cat] || {};
  const isFull = idx === 0;
  const isLight = !isMustZone && !isFull && idx % 5 === 3;
  const brick = document.createElement('div');
  brick.className = 'brick'
    + (isFull ? ' brick-full' : '')
    + (isMustZone ? ' brick-must-zone' : '')
    + (isLight ? ' brick-light' : ' brick-dark');
  let inner = '';
  if(isMustZone) inner += '<div class="brick-must-bar"></div>';
  inner += '<div class="brick-eyebrow">'+(dept.icon||'')+' '+esc(item.cat)+'</div>';
  inner += '<div class="brick-title">'+esc(item.title)+'</div>';
  inner += '<div class="brick-summary">'+esc(item.summary)+'</div>';
  inner += '<div class="brick-meta"><span class="brick-source">'+esc(item.source)+'</span>'
    + (isMustZone?'<span class="badge-must">必看</span>':'')+'</div>';
  inner += '<div class="brick-cta">閱讀全文 ›</div>';
  brick.innerHTML = inner;
  brick.onclick = ()=>openArticle(dataIdx);
  return brick;
}

function renderBricks(cat){
  const mustGrid = document.getElementById('must-grid');
  const allGrid = document.getElementById('brick-grid');
  const mustSec = document.getElementById('must-section');
  const allSec = allGrid ? allGrid.closest('.all-section') : null;
  if(mustGrid) mustGrid.innerHTML = '';
  if(allGrid) allGrid.innerHTML = '';

  const allItems = (cat&&cat!=='all') ? DATA.filter(i=>i.cat===cat) : DATA;
  const mustItems = allItems.filter(i=>i.priority===1);
  const restItems = allItems.filter(i=>i.priority!==1);

  // 今日必看區
  if(mustSec) mustSec.style.display = mustItems.length ? 'block' : 'none';
  if(mustGrid) mustItems.forEach((item,idx)=>mustGrid.appendChild(makeBrick(item,idx,true)));

  // 全部新聞區
  if(allSec) allSec.style.display = restItems.length ? 'block' : 'none';
  if(allGrid){
    if(!restItems.length && !mustItems.length)
      allGrid.innerHTML='<div class="empty-brick">目前無資料</div>';
    else
      restItems.forEach((item,idx)=>allGrid.appendChild(makeBrick(item,idx,false)));
  }
  // 重新觀察新渲染的 brick
  if(typeof observeBricks === 'function') observeBricks();
}


// ── CATEGORY VIEW ──
function openCatView(cat){
  const isMust = cat==='must';
  const items = isMust ? DATA.filter(i=>i.priority===1) : DATA.filter(i=>i.cat===cat);
  const title = isMust ? '必看情報' : cat;
  document.getElementById('cat-view-title').textContent = title;
  const list = document.getElementById('cat-news-list');
  list.innerHTML = '';
  items.forEach(item=>{
    const dataIdx = DATA.indexOf(item);
    const row = document.createElement('div');
    row.className = 'news-row' + (item.priority===1?' news-row-must':'');
    row.innerHTML =
      '<div class="news-row-inner">' +
        (item.priority===1?'<div class="row-must-bar"></div>':'') +
        '<div class="row-cat">'+(DEPTS[item.cat]?DEPTS[item.cat].icon:'')+' '+esc(item.cat)+'</div>'+
        '<h3 class="row-title">'+esc(item.title)+'</h3>'+
        '<p class="row-summary">'+esc(item.summary)+'</p>'+
        '<div class="row-footer">'+
          '<span class="row-source">'+esc(item.source)+'</span>'+
          '<span class="row-cta">閱讀全文 ›</span>'+
        '</div>'+
      '</div>';
    row.onclick=()=>openArticle(dataIdx);
    list.appendChild(row);
  });
  showView('cat-view');
  setActiveTab(isMust?'all':cat);
}
function closeCatView(){ goHome(); }

// ── ARTICLE VIEW ──
function openArticle(idx){
  const item = DATA[idx];
  const cat = DEPTS[item.cat]?(DEPTS[item.cat].icon+' '+item.cat):item.cat;
  document.getElementById('art-cat').textContent = cat;
  document.getElementById('art-nav-cat').textContent = cat;
  document.getElementById('art-title').textContent = item.title;
  document.getElementById('art-source').textContent = '來源：' + item.source;
  document.getElementById('art-summary').textContent = item.summary;
  document.getElementById('art-summary-block').style.display = item.summary ? 'block' : 'none';
  const rawText = item.full_text || '尚未擷取到內文內容';
  const paras = rawText.split('\n\n').map(p=>'<p>'+esc(p.trim())+'</p>').join('');
  document.getElementById('art-body').innerHTML = paras;

  // back button context
  const fromCat = currentView === 'cat-view';
  document.getElementById('art-back-btn').onclick = fromCat
    ? ()=>{ showView('cat-view'); }
    : ()=>closeArticle();

  showView('article-view');
  history.pushState({view:'article', idx}, '');
}
function closeArticle(){
  if(currentView==='article-view'){
    const prev = history.state;
    if(prev && prev.view==='cat-view') showView('cat-view');
    else goHome();
  }
}

// ── VIEW MANAGER ──
window.currentView = 'home-view';
let currentView = window.currentView;
function showView(id){
  ['home-view','cat-view','article-view'].forEach(v=>{
    document.getElementById(v).style.display = v===id ? 'block' : 'none';
  });
  currentView = id; window.currentView = id;
  window.scrollTo(0,0);
  document.body.style.overflow = '';
}
function goHome(){
  showView('home-view');
  setActiveTab('all');
}

window.addEventListener('popstate', e=>{
  if(currentView==='article-view') closeArticle();
  else if(currentView==='cat-view') goHome();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){
  if(currentView==='article-view') closeArticle();
  else if(currentView==='cat-view') goHome();
} });

// ── INIT ──
buildGnavTabs();
buildHighlights();
renderBricks('all');
showView('home-view');

// ── SCROLL REVEAL ──
(function() {
  var revealObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var d = parseInt(entry.target.dataset.delay || 0);
        setTimeout(function() { entry.target.classList.add('brick-revealed'); }, d * 90);
        revealObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

  window.observeBricks = function() {
    document.querySelectorAll('.brick:not(.brick-revealed)').forEach(function(b, i) {
      b.dataset.delay = i % 2;
      revealObs.observe(b);
    });
    document.querySelectorAll('.highlight-card:not(.brick-revealed)').forEach(function(c, i) {
      c.dataset.delay = i;
      revealObs.observe(c);
    });
  };
  window.observeBricks();

  // ── HERO PARALLAX ──
  var heroEl = document.querySelector('.hero-block');
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        if (heroEl && window.currentView === 'home-view') {
          var sy = window.scrollY;
          heroEl.style.transform = 'translateY(' + (sy * 0.22) + 'px)';
        }
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();

</script>
