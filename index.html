        <script>
            const DATA = [{"title": "美超級財報周 點火AI台鏈 四大CSP及蘋果季報將揭曉，投資人關注資本支出是否轉化為獲利成長", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "報導】全球超級央行周及美股超級財報周來臨，在美伊和談陷入膠著下， 市場更期待「科技七雄（Magnificent 7）」表現，與台股關連性高 的微軟、Google、AWS（亞馬遜）、Meta等重量級四大CSP（雲端服務 供應商）及蘋果將發布財報，加上台廠也有多家重量級AI相關概念股 法說會同時於本周...", "full_text": "報導】全球超級央行周及美股超級財報周來臨，在美伊和談陷入膠著下， 市場更期待「科技七雄（Magnificent 7）」\n表現，與台股關連性高 的微軟、Google、AWS（亞馬遜）、Meta等重量級四大CSP（雲端服務 供應商）及蘋果將發布財報，加上台廠也有多家重量級AI相關概念股 法說會同時於本周登場，相關概念股持續吸引成為市場焦點。金融市場迎來極度關鍵的一周，30日堪稱壓軸日，因美國聯準會（ Fed）、日銀、英央及歐央於28至30日陸續公布利率決策，五大央行 均可望按兵不動，惟日銀可能因美伊戰爭與通膨壓力，釋放6月升息 的鷹派訊號。但最受矚的是，重大財報也都集中在這一天，谷歌、微 軟、亞馬遜、Meta將發布季報。\n\n台北時間30日，Alphabet預計公布財報，估每股盈餘（EPS）約2. 83美元、營收約1,070億美元，年增約11％，Google Cloud成長率可 望近50％。同日還有亞馬遜，預估EPS約2.11美元、營收1,772億美元 ，年增14％；AWS雲端業務預計成長25％。\n\nMeta方面，市場估EPS達7.51美元、營收555億美元，年增31％。微 軟同日壓軸，預估EPS約4.04美元、營收814億美元，雙雙年增逾15％ ；Azure雲端業務成長約38％，仍為AI變現核心。\n\n蘋果預定5月1日公 布財報，預估EPS為1.96美元、營收1,093億美元。投資人關注焦點已從「是否擴張」轉向「投資是否帶來實質回報」 ，科技業能否證明高額資本支出轉化為營收與獲利成長，是本季關鍵 檢驗。台新投顧總經理黃文清說，市場對美科技股營收展望正向，有望帶 動台系供應鏈成長，美股雖第一季為產業淡季，營收多數呈現季減， 但AI相關科技股營收持續上修，營運動能強，觀察標普500成份股第 一季盈餘年增14.4％，科技股成長46.4％，表現最亮麗，預期科技股 仍為主要成長動力，第二、三季也將維持強勁成長趨勢。\n\n本周也有多 家中大型電子股舉辦第一季財報法說，預估相關電子股今年獲利普遍 呈現雙位數成長。四大CSP廠相關概念股中，台股的上下游供應鏈有多家廠商入列， 且囊括晶圓代工、封測、IP矽智材／ASIC、載板、散熱、AI伺服器等 相關族群。檢視近期盤面，已有多檔個股獲得資金領先卡位，包括台 積電、日月光控投、台達電、緯穎、世芯-KY、創意、聯發科、欣興 、金像電、奇鋐、雙鴻、愛普*、智原、川湖等，股價表現強勢。\n\n回到目錄"}, {"title": "聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式 發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新 里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後 段設計服務；供應鏈透露，聯發科增購FT（Final Test）與SLT（系 統級測試...", "full_text": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式 發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新 里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後 段設計服務；\n\n供應鏈透露，聯發科增購FT（Final Test）與SLT（系 統級測試）機台，並持續拉高CoWoS需求，京元電子、精測、鴻勁等 供應鏈將同步受惠。Google新一代TPU 8架構分為TPU 8t（訓練）與TPU 8i（推論）， 聯發科切入訓練端核心設計，並採用台積電 N3P 製程與 CoWoS-S 先進封 裝技術共同打造 AI ASIC，顯示其技術能力已可支援高階 AI 模型訓練 需求。Marvell（邁威爾科技）近期傳出將加入ASIC競局，供應鏈指出， 目前尚未在TPU供應鏈中觀察到明確布局。\n\n隨設計難度提升，未來可 能出現Consign die（委託提供晶粒）商業模式，市場競爭將由單純 搶單轉向分工合作；Marvell亦可能切入LPU、NIC等其他AI加速領域 ，而非直接參與TPU專案。聯發科憑藉SerDes（序列化／反序列化器）、高速介面與系統整合 能力，在先進製程節點成功切入訓練晶片設計，市場地位快速提升。\n\n執行長蔡力行預期，今年ASIC業務將創造超過10億美元營收。法人分 析，Google TPU投片量持續上修，2027年有望達千萬顆規模，無論由 聯發科或博通分食，均可帶動顯著營收貢獻。供應鏈指出，AI訓練晶片因採用先進製程與高複雜度封裝，測試強 度大幅提升，京元電、精測深耕高效能運算（HPC）與AI晶片測試， 將直接受惠TPU放量；\n\n鴻勁則提供測試設備，隨晶片單價提升，測試 環節重要性提高，SLT有望成為標準流程。聯發科逐步建立「雲＋邊」雙軌布局，競爭優勢浮現。ASIC 業者分 析，未來 AI 晶片將朝 chiplet（小晶片）與異質整合發展，對CoWoS與 SoIC等先進封裝依賴度持續提高，帶動台積電產能利用率維持高檔， 並擴大封裝設備與材料需求。\n\n聯發科切入訓練晶片，不僅提升產品價 值，也推升台灣半導體供應鏈整體技術層級。回到目錄"}, {"title": "台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～6GW設置容量", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟 經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將 併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除 ，決開放作為開發風場海域，預估3-4期至少遠超過4GW設置容量可以 釋出選商，今年底或明（2027）年初展...", "full_text": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟 經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將 併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除 ，決開放作為開發風場海域，預估3-4期至少遠超過4GW設置容量可以 釋出選商，今年底或明（2027）年初展開選商相關作業。另3-3期選商機制也傳出好消息，經濟部27日將發出開會通知，本 周再召開實體及線上溝通會議，針對ESG定義、獎勵機制電業執照的 作法，行政契約意見等三方面，釋出善意作出更彈性處置及溝通說明 ，預計半年備標期時程不變，今年底前會完成3-3期選商，經部預估 至少逾五家開發商有興趣。\n\n3-1期、3-2期獲選業者，不少外商未履約且解約撤出台灣市場，合 計未執行包括科里歐海鼎二、法商EDF及台亞蔚藍海、力麗集團海峽 二，3-2期未簽約的科理歐海鼎一、德能英華威集團德帥風場，以及 二階被解約的海峽一風場，合計至少2.2GW風場空間未開發可釋出併 入3-4期招商。知情人士透露，倘若業者布置密度更高，風機更大型 化，可設置容量不排除上看3G。另交通部3月27日公告，刪除台中兩岸直航I點及其航道，供作離岸 風場開發海域。\n\n據悉，航港局2024年曾委託海大調查，經由兩岸直航 台中段（I航道）進出使用率僅約4％，行政院召開多次跨部會協調， 決取消I點及其航道。據業者估計，可釋出空間約4至6GW。官員也說 ，此海域水深不深，不少業者趨之若鶩，已有人展開環評規劃。\n\n此外，能源署決對3-3期選商釋出更大彈性及善意，近日內再度召 開實體及線上會議，針對公協會提出意見正式回覆，幫業者釐清國外 總部質疑，以利備標。其中公協會最在意獎勵機制，20+N（N最長5年）是否抵觸電業法。原本《電業法》賦予電業執照最長可展延10年至30年的營運空間，業 者擔心3-3期計算基礎若改為20+N+10，恐橫生枝節，影響金融機構融 資到位意願。\n\n回到目錄"}, {"title": "白宮記協晚宴 驚傳槍響", "source": "經濟日報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 1, "summary": "美國總統川普在美東時間25日晚間出席白宮記者協會晚宴時，現場驚傳槍響，引發現場恐慌。川普與第一夫人梅蘭妮亞遭緊急撤離，嫌犯也旋即遭逮捕並起訴。川普之後召開記者會表示，自己「狀況良好」，嫌犯可能是「孤狼」犯案，背後原因仍在調查中。在華府希爾頓飯店舉行的白宮記者協會晚宴，約2,600名賓客參與，包括...", "full_text": "美國總統川普在美東時間25日晚間出席白宮記者協會晚宴時，現場驚傳槍響，引發現場恐慌。川普與第一夫人梅蘭妮亞遭緊急撤離，嫌犯也旋即遭逮捕並起訴。川普之後召開記者會表示，自己「狀況良好」，嫌犯可能是「孤狼」犯案，背後原因仍在調查中。\n\n在華府希爾頓飯店舉行的白宮記者協會晚宴，約2,600名賓客參與，包括美國頂尖媒體高層、總編輯與知名電視主播。在晚間8時30分過後，前菜剛送上，主要安檢區附近就傳出槍響，與會人士陷入恐慌，趴倒在地並躲到桌下，特勤局人員連忙撤離川普、梅蘭妮亞及副總統范斯。國安人員稍後表示，嫌犯身懷大量武裝衝向安檢點，朝特勤局幹員開槍。\n\n這名槍手隨後被制伏在地，被搜出一把霰 彈槍、手槍、及好幾把小刀。槍手為來自加州的31歲男教師艾倫（Cole Allen），犯案動機不明。川普稍後召開記者會，盛讚安檢人員處理迅速而勇敢，還說他原本希望返回宴會廳完成演說。\n\n回到目錄"}, {"title": "取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收到伊朗新提案", "source": "經濟日報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 1, "summary": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫與女婿庫許納原定25日前往巴基斯坦首都伊斯蘭馬巴德，與伊朗代...", "full_text": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫與女婿庫許納原定25日前往巴基斯坦首都伊斯蘭馬巴德，與伊朗代表團會談，但在伊朗外長阿拉奇25日離開巴基斯坦後，川普同日在社群媒體發文表示，「我才剛取消我的代表團到伊斯蘭馬巴德與伊朗人會面的行程，浪費太多時間在旅途，工作也太多，他們的『領導階層』內部激烈內鬥，沒有人知道誰在主導，連他們自己都不清楚」。\n\n他之後接受媒體採訪時說，「沒理由在那邊（伊斯蘭馬巴德）等兩天，讓人花16、17個小時在旅程上，我們不打算那樣做。如果他們（伊朗）想談，可以打通電話來」，但這未必代表美國會重啟戰爭。他也說，在他取消行程的不到10分鐘後，美國就收到一份新文件，內容比原先好很多。\n\n伊朗國營電視台則指出，阿拉奇並未安排與美方會晤。阿拉奇也在社群媒體發文表示，巴基斯坦之行「收穫豐碩」，已提出「永久結束戰爭的可行架構」，但質疑「美國是否真心渴望外交」。伊朗政府的聲明表示，伊朗總統裴澤斯基安透過電話告知巴基斯坦總理夏立夫，德黑蘭不會在封鎖的威脅下展開「被施壓的協商」，美國應先解除海上封鎖，雙方才能開始奠定和解的基礎。\n\n美軍25日在阿拉伯海攔截一艘遭制裁的船舶，伊朗也繼續以小型砲艇組成的「蚊子船隊」威脅商船，荷莫茲海峽通行量依然接近零。回到目錄"}, {"title": "創業之星選秀 快來報名 創投產業推手跨境跨域整合實力，催動創新生態系升級 開發資本助新創搶AI先機", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "中華開發資本表示，AI正在重塑製造、移動、醫療、金融等各大產業競爭格局的核心動能，身為台灣創投產業推手之一，中華開發資本將持續以跨境跨域的整合實力，積極陪伴具前瞻視野的新創團隊、協助台灣創新生態系加速升級，在全球AI競賽中搶占先機。經濟日報於2017年起舉辦「創業之星選秀大賽」，為創業者與投資者之間...", "full_text": "中華開發資本表示，AI正在重塑製造、移動、醫療、金融等各大產業競爭格局的核心動能，身為台灣創投產業推手之一，中華開發資本將持續以跨境跨域的整合實力，積極陪伴具前瞻視野的新創團隊、協助台灣創新生態系加速升級，在全球AI競賽中搶占先機。經濟日報於2017年起舉辦「創業之星選秀大賽」，為創業者與投資者之間搭起平台，藉由媒體傳播的力量，讓優質團隊更廣為人知，並且找到更多的資源協助。今年賽事由經濟日報主辦，合作單位為台大創創中心、鴻海科技集團，協辦單位為中華開發資本、彰化銀行、國泰金控、日月光集團、臺灣企銀、宏匯集團、台新銀行、t.Hub內科創新育成基地。\n\n中華開發資本指出，全球AI產業正站在關鍵轉折點，中華開發資本不僅搭配母公司凱基金控資源，透過參與金融科技產業聯盟投資交流工作圈，統籌布局台灣創新科技母基金，以鏈結全球頂尖創投、強化金融科技與創新科技生態系，也規劃推出CDIB Capital AI Industrial and Mobility Fund，聚焦AI於工業產業與移動創新場景的應用發展，攜手產業夥伴加速AI技術於實體經濟中的商業化進程。中華開發資本表示，台灣長期深耕半導體、ICT與精密製造，在系統整合的關鍵環節累積全球領先實力，這不只是代工優勢的延伸，而是全新的「架構共創價值」，也是台灣新創在國際競局中，最獨特的差異化起點。面對地緣政治與供應鏈重組壓力，促使國際資本積極尋找合規且具備產業執行力的亞洲夥伴，台灣資本與台灣新創正共同站在這一結構性機遇的交匯點上，能深耕垂直場景、累積專屬資料並建立應用壁壘的新創團隊，將在這波產業變革中占據更有利的位置。\n\n中華開發資本認為，創業者應以市場需求為核心，將AI技術創新落實於真實應用場景，並以堅實的公司治理與透明管理機制，建立永續成長的基礎。未來，中華開發資本將持續深化投資布局、擴展全球網絡、強化策略合作，以完整的支持體系陪伴新創企業從早期育成到國際擴展，攜手打造台灣成為全球AI創新與產業升級的重要樞紐。本屆賽事即日起至5月15日（五）23：59截止報名，一律採線上報名，報名資訊細節請掃描QR Code，或上活動官網：https://money.udn.com/ACT/innovation/index.html。\n\n回到目錄"}, {"title": "川普出席 白宮記協晚宴傳槍響", "source": "自由時報 A01 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 1, "summary": "美國總統川普與第一夫人梅蘭妮亞25日晚間出席白宮記者協會晚宴時，一名槍手闖入華盛頓希爾頓飯店宴會廳外的安檢站，與警方爆發槍戰，特勤人員隨即掩護川普夫婦與內閣首長等要員緊急撤離，現場數百名政要與賓客驚恐躲避。從事電玩開發的31歲槍手已遭當局逮捕。回到目錄...", "full_text": "美國總統川普與第一夫人梅蘭妮亞25日晚間出席白宮記者協會晚宴時，一名槍手闖入華盛頓希爾頓飯店宴會廳外的安檢站，與警方爆發槍戰，特勤人員隨即掩護川普夫婦與內閣首長等要員緊急撤離，現場數百名政要與賓客驚恐躲避。從事電玩開發的31歲槍手已遭當局逮捕。回到目錄"}, {"title": "錄影「突圍」史國晚宴》 中華民國台灣是主權國家 賴：2300萬台灣人有權走向世界", "source": "自由時報 A01 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "賴清德總統原定上週啟程訪問非洲邦交國史瓦帝尼王國，卻因中國強行介入受阻。賴總統昨以錄影方式，在史國的重要外賓晚宴致詞強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻的努力，台灣會持續強化實力，穩健走向國際。影片播映 三度獲得...", "full_text": "賴清德總統原定上週啟程訪問非洲邦交國史瓦帝尼王國，卻因中國強行介入受阻。賴總統昨以錄影方式，在史國的重要外賓晚宴致詞強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻的努力，台灣會持續強化實力，穩健走向國際。影片播映 三度獲得熱烈掌聲賴清德總統以全英語預錄影片為史瓦帝尼在國際會議中心舉辦的重要外賓晚宴致詞，慶賀恩史瓦帝三世國王登基四十週年，並紀念史王五十八歲華誕、史瓦帝尼王國獨立五十八週年，以及中華民國台灣與史瓦帝尼建交五十八週年「三個五十八」的歷史里程碑。\n\n據與會僑胞轉述，現場約一千五百位貴賓在場，播映過程三度獲得熱烈掌聲。賴清德強調，中華民國台灣是主權國家，是世界的台灣，二千三百萬台灣人有權走向世界，我們面對的外部壓力越是強烈，我們越要有勇氣與決心。我們會持續強化實力，穩健走向國際，任何國家都沒有權利、也不應該阻擋我們為世界做出貢獻的努力。\n\n賴說，對台灣而言，史瓦帝尼人民就像是家人，我們會繼續一起克服各項挑戰，攜手穩健前行。回到目錄"}, {"title": "春雨助攻 高雄農業旱情解除", "source": "自由時報 A01 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導〕台南地區蓄水量高於百年大旱 農水署：仍須謹慎我國中南部直到今年四月初水情吃緊，隨春雨連續助攻，農業部農田水利署昨表示，高雄地區農業旱象已完全解除，台南地區水情仍須謹慎，但隨近年推動農田水利軟硬體建設與清淤，曾文與烏山頭水庫蓄水量仍比二○二一年、二○二三年同期多逾三分之一。農水建設與清淤 提升蓄水...", "full_text": "導〕台南地區蓄水量高於百年大旱 農水署：仍須謹慎我國中南部直到今年四月初水情吃緊，隨春雨連續助攻，農業部農田水利署昨表示，高雄地區農業旱象已完全解除，台南地區水情仍須謹慎，但隨近年推動農田水利軟硬體建設與清淤，曾文與烏山頭水庫蓄水量仍比二○二一年、二○二三年同期多逾三分之一。農水建設與清淤 提升蓄水量依經濟部水利署各水庫有效蓄水率顯示，目前烏山頭水庫達五十八．七％，曾文水庫為十五．六％；牡丹水庫五十三．一％。\n\n高屏溪攔河堰進流量之前最低為七．二每秒立方公尺（CMS），目前已穩定回升到十六．五CMS。目前已進入汛期，農田水利署已完成全國超過三萬九千處農田水利設施初複檢與改善，清淤總長度達四三四公里、量體逾十萬立方公尺，農田水利署署長蔡昇甫表示，春雨降雨集中在高雄集水區，隨該區一期作抽穗期將於四月底結束，高雄農業水情旱象已解除，台南地區則因近年著重清淤加大庫容量以及農田水利設施的建設和修繕、提早調控水資源等，雖這波春雨進帳不大，但曾文與烏山頭水庫蓄水量比幾年前百年大旱時多了不少。蔡昇甫表示，依國內外長期氣象預測顯示，今年下半年將轉為聖嬰年，若颱風挾帶狂風豪雨襲台，將會透過近年引進的智慧科技防洪，如在農田水利渠道關鍵節點結合遠端攝影監控，結合氣象雷達迴波圖等運算後，可決定水閘門開關時機。\n\n蔡昇甫指出，豪雨也常引起土砂災害並影響水流，改變速度之快已非人工可掌握，經由系統運算可大幅縮短判斷時間，透過科技導入，大幅減少災害搶修與復原的時間，過去導水路若被沖毀，通常須花卅天以上時間修復，現在只要十天，大幅增加防災韌性。回到目錄"}, {"title": "10公克大麻 萬元賣牌友 販二級毒品不承認 重判11年", "source": "自由時報 A01 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導〕在新竹縣竹北市某賭場玩德州撲克的劉姓男子，以一萬元代價賣十公克大麻給牌友張姓男子，事後否認販毒，但張男坦承在賭場向劉男買大麻，雙方一手交錢一手交貨，新竹地方法院痛批劉男助長毒品流通、將使他人更受毒品之害，依販賣二級毒品罪重判劉男有期徒刑十一年。法官痛批助長毒品流通 將使他人更受毒品之害法官調查，...", "full_text": "導〕在新竹縣竹北市某賭場玩德州撲克的劉姓男子，以一萬元代價賣十公克大麻給牌友張姓男子，事後否認販毒，但張男坦承在賭場向劉男買大麻，雙方一手交錢一手交貨，新竹地方法院痛批劉男助長毒品流通、將使他人更受毒品之害，依販賣二級毒品罪重判劉男有期徒刑十一年。法官痛批助長毒品流通 將使他人更受毒品之害法官調查，前年二月十九日下午，劉男與張男聯繫，約定以一萬元的價格販賣大麻十公克，當晚在新竹縣竹北市交付大麻，並向張男收取一萬元而完成交易。張男作證說，他在賭場以一萬元向劉男買十公克大麻，一手交錢一手交貨。\n\n法官認為，政府對毒品嚴格查緝，販毒又屬重罪，若無利可圖，一般持有毒品者，當不致輕易將毒品交付他人，何況市面上毒品價格不貲、物稀價昂，也無公定價格，販毒者若無利可圖，不可能不賺利益轉售。儘管劉男否認販賣毒品，然法官認為他與張男僅係打牌認識的朋友，而本案交易大麻數量達十公克，價值不菲，自然沒有無償或不賺取利益將大麻交給張男的動機及理由，應認劉男主觀上具有從中牟利之營利意圖，甚為明確。因此劉男所辯，無非是臨訟狡辯之詞，無可採信。\n\n法官審酌認為，劉男販賣二級毒品罪，助長毒品流通、將使他人更受毒品之害，且販賣大麻數量為十公克，犯罪所生危害程度重大。考量劉男自始否認犯行，犯後態度不佳，依販賣二級毒品罪重判有期徒刑十一年。回到目錄"}, {"title": "孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤人員中彈", "source": "聯合報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "合報導美國總統川普廿五日首度以總統身分出席在華府希爾頓飯店舉辦的「白宮記者協會晚宴」，一名男子持槍闖越宴會廳附近的安全哨，開槍擊中一名特勤人員後被制伏逮捕。川普夫婦立即被護送離開，現場官員及出席賓客都沒有受傷。川普於美東時間廿五日晚間約八時十五分與第一夫人梅蘭妮亞一同進場上台；約莫八時卅五分左右...", "full_text": "合報導美國總統川普廿五日首度以總統身分出席在華府希爾頓飯店舉辦的「白宮記者協會晚宴」，一名男子持槍闖越宴會廳附近的安全哨，開槍擊中一名特勤人員後被制伏逮捕。川普夫婦立即被護送離開，現場官員及出席賓客都沒有受傷。川普於美東時間廿五日晚間約八時十五分與第一夫人梅蘭妮亞一同進場上台；\n\n約莫八時卅五分左右，川普正在台上與人談話之際，突然耳聞槍響，特勤人員隨即護送川普和梅蘭妮亞離開。川普稍晚發文稱讚特勤和執法人員表現非常出色，指他們快速行動，也很勇敢；川普說，槍手已被捕。\n\n執法官員證實，槍手為來自加州托倫斯的卅一歲男教師艾倫（Cole Allen）；他持槍闖過安全哨朝宴會廳方向衝去，開火後遭到維安人員制伏逮捕。一名特勤人員中彈，幸好身穿防彈衣並無大礙，送醫觀察幾小時後已出院。\n\n川普以為槍聲是盤子掉落川普隨後在白宮舉行記者會表示，他一開始聽到槍聲，以為是盤子掉落。他說，中槍的特勤人員是在「非常近的距離遭到一把威力很強的武器射擊，但防彈背心發揮作用」。他表示已與該名特勤人員通話，稱對方狀況良好、精神振奮，「他的士氣很高，我們也告訴他，我們愛他、尊敬他，他是一個非常自豪的人。\n\n」\n川普表示，這起事件凸顯白宮興建大型宴會廳的必要性。他也呼籲保持和平，並稱讚媒體對事件的報導「相當負責任」。川普過去曾將媒體稱為「人民公敵」，但這回他語氣相當克制，表示在此次事件後，大家感受到「一股巨大的愛與凝聚力」。\n\n川普表示，在記協晚宴槍擊發生前，他原本的演說會嚴厲批評媒體，但現在將會收斂。他說：「我們談的是憲法中的言論自由，這才是重點。不只是白宮記者，這其實是基於我們憲法中的言論自由。\n\n」他說會在卅天內再辦一次白宮記協晚宴，且會「辦得更大更好也更完善」。川普表示，他研究過暗殺事件，人們會鎖定那些產生「最大影響力」的人，並提到遇刺的美國總統林肯。他表示，被鎖定的通常是「大人物」，「我不太願意這麼說，但某種程度上我感到榮幸」，他表示為國家做了很多事，但有些人對此並不滿意。\n\n川普：槍手應終生關在監獄川普說，沒人告訴他總統是這麼危險的工作，開玩笑說，如果國務卿魯比歐告訴他這份工作這麼危險，他就不會參選了。他表示，槍手應該是單獨犯案的「孤狼」，並認為槍手應該終生被關在監獄。川普還說，「你永遠不知道」這起事件是否可能與伊朗戰爭有關，「這不會阻礙我贏得伊朗戰爭」。\n\n被問及是否認為自己是嫌犯攻擊目標，川普說，「我想是的」。司法部代理部長白朗奇表示，槍手「意圖襲擊政府官員，很可能包括總統本人」。他表示，槍手幾年前購得作案槍支，並在晚宴舉辦前一兩天入住該飯店，調查人員已從嫌犯的電子設備中收集到一些訊息，搜索他在加州的住處並詢問一些認識他的人，調查作案動機。\n\n回到目錄"}, {"title": "供電吃緊 德國再掀重啟核能辯論 車諾比核災滿40周年梅爾茨指全面廢核電是戰略錯誤", "source": "聯合報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "車諾比核災滿四十周年，這次災變激發德國反核運動，於二○二三年全面廢核電，如今卻面臨供電壓力，國會近日就核能發展方向辯論。極右翼另類選擇黨主張重啟已關閉的核電廠，綠黨則反對任何核能回歸；執政聯盟目前未規畫重啟核電，但總理梅爾茨稍早曾說，全面廢核電是嚴重戰略錯誤，導致當前德國能源成本居高不下。一九八...", "full_text": "車諾比核災滿四十周年，這次災變激發德國反核運動，於二○二三年全面廢核電，如今卻面臨供電壓力，國會近日就核能發展方向辯論。極右翼另類選擇黨主張重啟已關閉的核電廠，綠黨則反對任何核能回歸；執政聯盟目前未規畫重啟核電，但總理梅爾茨稍早曾說，全面廢核電是嚴重戰略錯誤，導致當前德國能源成本居高不下。\n\n一九八六年四月廿六日，當時仍屬前蘇聯的烏克蘭車諾比核電廠發生爆炸，造成全球史上最嚴重核災。輻射塵擴散鄰近國家，形塑德國日後反核運動基礎。二○一一年日本福島核災後，時任總理梅克爾拍板加速廢核，在二○二三年關閉德國最後一座核電廠。\n\n然而，隨著俄烏戰爭引發能源供應緊張，德國能源價格居高不下影響工業競爭力，核能是否應重新被納入能源選項，再度成為政治焦點。中央社報導，根據德國聯邦議會官網公開紀錄，國會第二大黨另類選擇黨廿二日率先提出動議，要求成立專家委員會，評估重啟已關閉的核電廠，並主張立即停止多座核電廠的拆除作業，要求地方政府撤銷退役許可。隔日，綠黨則提出「車諾比四十周年」動議，要求聯邦政府不得重啟核能發展。\n\n綠黨同時主張降低核能供應鏈風險，要求政府在歐盟層級推動降低對俄羅斯核燃料與技術依賴，並阻斷俄羅斯國營核能企業與德國林根燃料元件工廠合作計畫。針對是否重啟傳統核電廠，執政陣營態度保留。不過，總理梅爾茨今年初曾表示，當前德國能源成本居高不下，應該歸咎於前總理梅克爾以及其後堅持完全廢核的聯合政府。\n\n他說，俄烏戰爭後能源供應已有變化，三年前「應該讓德國最後幾座核電廠繼續運轉，至少還能維持當時的發電能力」。完全非核後，梅爾茨說，「我們現在正以全世界最昂貴的方式進行能源轉型。我不知道還有哪個國家像德國這樣，把能源轉型搞得如此艱難、如此昂貴。\n\n我們給自己設定一個目標，現在不得不修正，因為我們根本沒有足夠發電能力」。梅爾茨說，為了彌補這一損失，政府計畫推動新建燃氣發電廠作為備用電源。梅爾茨上任後將核融合納入德國國家發展戰略核心，去年十月，官方宣布「核融合行動計畫」，規畫二○二九年前投入廿億歐元（約台幣七百四十億元），目標成為全球第一個實現核融合商轉發電國家。\n\n但技術複雜，商轉遙遙無期。回到目錄"}, {"title": "獨家專訪／促台速通過國防特別條例 釋出強化自我防衛信號 谷立言：嚇阻力 維護和平最佳途徑", "source": "中國時報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業， 向國際社會釋出台灣願意強化自我防...", "full_text": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商， 美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接 受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預 算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業， 向國際社會釋出台灣願意強化自我防衛的重要信號，這對台灣的國防 與產業發展都有莫大助益。近月來華府數個智庫接連訪台，美國議員並聯合致函立法院長韓國 瑜，重點皆在關切1.25兆元國防特別預算條例早日立法，谷立言也為 此頻頻拜會在野人士，說明美方立場，盼能化解在野疑慮；他認為， 目前立法院的討論已經很接近他們希望達成的結果，國防特別預算條 例越快通過越好。\n\n以下為谷立言接受《中國時報》專訪重點：立院目前討論 已很接近期待結果問：韓院長為了通過國防特別預算條例，很積極召集朝野協商，但 尚未達成最後結論，台灣是否有迫切需要通過這項特別條例？答：我們非常感謝韓院長所做的努力。如你們所知，美國堅定支持 台灣的自我防衛能力。\n\n鑑於當前的區域安全形勢，我們與台灣一樣都 迫切希望確保嚇阻力，因為我們相信，這是維護和平的最佳途徑。我們歡迎國防部編列的特別預算條例草案，這將為台灣軍隊提供嚇 阻衝突所需的裝備和能力。我們注意到立法院有兩種立場，一種是以 特別預算來支付美國去年12月宣布的軍售案；\n\n另一種則是支持國防部 所有需求的綜合方案。我認為兩者並不矛盾，事實上，兩者都需盡快 進行。美方已針對多項防衛能力提供發價書，但由於立院尚未通過預算， 美國只好延長發價書最後期限，以便給予立法院更多時間完成相關工 作。\n\n在立院通過特別預算前，要先通過特別條例草案，因此希望立院 盡快通過特別條例。展現採購意願 爭取與武器商合作台灣通過「全面性」特別預算條例非常重要，這不僅向國際社會發 出非常重要的信號，且對於確保台灣能夠獲得其所要求的全部防禦能 力也至關重要。例如，我們已經宣布了一些系統，包括海馬士火箭和 M109自走砲系統，都是非常重要的系統；\n\n國防部的特別預算中，還希 望採購包括一體化防空反導系統、無人載具、無人機等。正如在中東 或烏克蘭戰場上所看到的情形，世界各地對這些系統的需求非常高， 無論是民間企業或是美國政府都在進行資源競爭。如果台灣能通過特別條例，這是向這些武器設備商發出信號，表明 台灣有採購的意願。\n\n但這並不意味著台灣必須在簽訂合約前支付款項 。我曾與一些美國大型國防科技公司的執行長交談過，許多人非常渴 望在台灣投資、建立供應鏈合作夥伴關係、開設辦事處，但他們都在 觀望台灣是否有購買這些裝備的意願。因此，如果台灣能夠通過全面 性的國防特別預算條例，這是向業界發出信號，即他們應該開始與台 灣合作，共同投資這些項目，這對台灣產業也很重要。\n\n直言越快通過越好 無具體期限問：有智庫學者警告，立法院若於5月7日前無法通過此特別條例， 將影響美方協助台灣意願？答：我覺得沒有具體的日期。但如美國印太司令帕帕羅、戰爭部印 太安全事務助理部長盧（John Noh）在眾議院軍事委員會聽證會上所 述，他們都強調台灣盡快為其國防提供資金的重要性。\n\n如帕帕羅所說 ，我們正處於關鍵時刻，如果進行正確的投資，就能利用嚇阻力維護 和平。如果不這麼做，等於將來要面對一場準備不足的衝突，台灣將 陷入脆弱的困境。從華府的角度看，台灣越早表明自我防衛的意願，對所有人來說就 越安全，因為台灣面臨威脅的嚴重性，令美、台及該地區其他國家都 深有體會。\n\n因此，我們希望台灣盡快採取行動，似乎沒有必要再做更 多辯論。不過立法院的討論已經很接近我們希望達成的結果，國防特 別預算條例越快通過越好。回到目錄"}, {"title": "又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教師闖安檢站開火遭逮", "source": "中國時報 A01 要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出 槍響，引發恐慌。在隨扈與安全人員迅速掩護下，川普與副總統范斯 等高層緊急撤離。隨後一名31歲、來自加州的槍手落網，他擁有電腦 碩士學位，揚言以「政府官員」為槍擊目標。川普返抵白宮後召開記 者會，他對槍手未多加批評，也否認事件與伊朗有關...", "full_text": "美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出 槍響，引發恐慌。在隨扈與安全人員迅速掩護下，川普與副總統范斯 等高層緊急撤離。隨後一名31歲、來自加州的槍手落網，他擁有電腦 碩士學位，揚言以「政府官員」為槍擊目標。\n\n川普返抵白宮後召開記 者會，他對槍手未多加批評，也否認事件與伊朗有關，他呼籲國民「 和平解決分歧」。白宮記協成立於1914年，該協會1921年開始舉行年度晚宴，是媒體 與政府官員加強溝通的社交活動，總統出席並發表演說一度成為慣例 。半世紀以來，晚宴都在華府希爾頓飯店舉行，而該地也是川普的偶 像、美國前總統雷根1981年遇刺重傷之地。\n\n現任白宮記者協會主席姜 偉嘉（Weijia Jiang），因全程冷靜沉著而備受讚譽。她是CBS華裔 資深白宮記者，出生於大陸廈門，2歲時全家移民美國。川普自嘲 總統是最危險職業這已是川普近2年來第3度遇刺未遂。\n\n他在劫後對記者表示，嫌犯是 「精神有問題的人」，並希望類似事件不再發生。他神情鎮定，甚至 開玩笑說自己「研究過暗殺」，沒那麼容易崩潰，還提到歷史上約有 5.8％的美國總統曾遭槍擊，直言「想不到還有比總統更危險的職業 」。美東時間25日晚間約8時30分。\n\n當時華府希爾頓飯店的宴會廳內約 有2600人，春季豌豆搭配布拉塔起司的前菜剛上桌，賓客正在交談寒 暄。川普與第一夫人梅蘭妮亞、范斯及姜偉嘉同坐台上。突如其來的 槍聲打破熱鬧氣氛，川普事後回憶，他第一時間還以為是「托盤掉了 」，而梅蘭妮亞則明顯察覺情況有異，神情驚慌。\n\n槍手被制伏後，川普一度希望晚宴繼續，但遭特勤人員拒絕。他略 帶遺憾地說，原本準備了一篇「史上最不得體的演說」，卻無緣登台 ，並承諾將在30天內重辦晚宴。根據調查，該名31歲男子艾倫（Cole Thomas Allen）是孤狼犯案 。\n\n他先在飯店側門、安檢較為鬆散處，組裝「長型」武器後，隨即衝 過一處大廳安檢站，身上攜帶霰彈槍、手槍及多把刀具。執法人員迅 速攔截並與其駁火，一名特勤幹員受傷但無大礙，嫌犯未中彈，最終 被壓制上銬。孤狼犯案 2024捐款給賀錦麗多家美媒指出，嫌犯艾倫曾是加州托倫斯市C2教育機構的「明星教 師」，2024年獲得「月度最佳教師」\n稱號。\n\n另外，根據聯邦選舉委員 會的紀錄，嫌犯2024年捐款25美元（台幣約787元）給當時競選總統 的民主黨前副總統賀錦麗。根據艾倫的領英（LinkedIn）個人資料，他2017年畢業於加州理工 學院，獲機械工程學士學位，去年更獲得加州州立大學多明格斯山分 校電腦科學碩士學位。在加州理工學院就讀期間，因研發輪椅緊急煞 車原型，而登上當地新聞報導。\n\n他自稱是電子遊戲開發者，且似乎在Steam遊戲平台上，以1.99美 元價格發布一款名為《Bohrdom》的獨立遊戲。紐約郵報報導，槍手開槍前10分鐘，向家人發送反川普宣言。自稱 「友好的聯邦刺客」。\n\n「我不是被炸死的學生，也不是挨餓的孩童， 更不是被本屆政府中眾多罪犯虐待的少女。當『別人』遭受壓迫時， 以德報怨並非基督徒的行為，而是壓迫者的共謀。」「我再也不願讓 一個戀童癖、強暴犯和叛徒的罪行沾染我的雙手，」\n艾倫寫道，顯然 指的是川普。\n\n哥倫比亞特區聯邦檢察長皮洛表示，嫌犯被控使用槍枝及持危險武 器襲擊執法人員等2項罪名，不排除追加罪名，預計27日提審。回到目錄"}, {"title": "台積鉅額交易 創2,285元新高 總成交金額逾1.37億元", "source": "工商時報 B05 集中市場 期貨", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "／台北報導】護國神山台積電（2330）有政策加持，股價沒有最高只有更高！儘 管24日股價收在2,185元大漲105元漲幅5.05％，股價創歷史新高，惟 鉅額交易仍透過配對交易成交60張於2,285元，相當於當天的漲停價 ，總成交金額為1.37億餘元。台積電鉅額交易為股價引路，以台積電每漲1檔（5元）...", "full_text": "／台北報導】護國神山台積電（2330）有政策加持，股價沒有最高只有更高！儘 管24日股價收在2,185元大漲105元漲幅5.05％，股價創歷史新高，惟 鉅額交易仍透過配對交易成交60張於2,285元，相當於當天的漲停價 ，總成交金額為1.37億餘元。台積電鉅額交易為股價引路，以台積電每漲1檔（5元）貢獻指數超 過40點來看，台積電鉅額交易價格2,285元，對指數潛在貢獻超過80 0點，指數將輕易越過39K，並將向40K邁進。\n\n台積電24日鉅額交易共15筆，合計成交2,901張498股，總成交金額 為63.05億元，平均每股價格為2,173.03元，略低於當天收盤價2,18 5元。不過，仍有60張成交在漲停價2,285元，比收盤多出100元，另成交 1,692張498股在平盤價2,185元，總成交金額為36.98億元。回到目錄"}, {"title": "國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年每案最高補貼3,000萬元、大專院校則為500萬元", "source": "工商時報 A06 綜合要聞", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "報導】為打造台灣成為AI之島，國科會提出大南方新矽谷推動方案，希望 提升AI應用落地，布局2040年「處處有AI」的願景，為此，國科會攜 手經濟部商業發展署，針對智慧商業服務領域的 AI 中央廚房補助再次 祭出徵案，業者每年每案最高補貼3,000萬元、大專院校500萬元補助 ，計畫期程為兩年。台南沙...", "full_text": "報導】為打造台灣成為AI之島，國科會提出大南方新矽谷推動方案，希望 提升AI應用落地，布局2040年「處處有AI」的願景，為此，國科會攜 手經濟部商業發展署，針對智慧商業服務領域的 AI 中央廚房補助再次 祭出徵案，業者每年每案最高補貼3,000萬元、大專院校500萬元補助 ，計畫期程為兩年。台南沙崙智慧綠能科學城資安大樓、AI創新應用大樓啟用，加上A I雲端算力中心、智慧機器人研究中心等研發聚落逐步成形，已有不 少研發人才相繼進駐，大南方新矽谷推動辦公室先前也預估，未來一 至兩年外食人口將成長到萬人。為推動全民智慧生活圈願景，國科會以大南方（嘉義、台南、高雄 或屏東）為AI應用示範場域，先前智慧雨林創生計畫已鎖定智慧餐飲 。\n\n而後也宣示以AI中央廚房解決沙崙智慧科學城周邊用餐需求，去年 12月啟動徵案。依計畫，此案將聚焦在「中央廚房」與「智慧餐廚」場域轉型與擴 散，由「商業服務業者、資訊服務業者、大專校院」跨域合作。根據推動機制，商業服務業者依實務痛點提出需求，整合資服業者 AI技術解方及學研團隊技術加值能量，落實場域實地驗證與應用擴散 ，藉此強化技術落地實戰性，並建構具備規模化潛力的智慧餐飲生態 系。\n\n產業需求面，商業服務業者整合「中央廚房」與「智慧餐廚」，建 構一站式供餐服務體系。針對產業核心痛點導入AI智慧化應用，深度 優化生產流程，落實品質標準化控管。計畫也說明，提升整體營運效能的同時，將有效緩解餐飲業人力短 缺的壓力。\n\n此外，透過智慧餐廚系統標準化模組，可達成多據點的快速複製與 規模化布局。技術導入上則是資訊服務業者、系統整合商或設備製造商提出可落 地的AI解決方案，針對業者需求進行技術評估、模型開發與系統整合 ，推動AI技術商品化與產業化應用，加速智慧化轉型落地。而大專院校參與則助力人才共育，計畫透過大專院校組成跨域研究 團隊，媒合具相關專長師生參與專案開發與測試，強化實務應用與問 題解決能力，同時培育AI應用實作人才，推動產學研協作與創新發展 。\n\n回到目錄"}, {"title": "AI中央廚房補助計畫地方美食IP化策略 讓特色料理變成數位資產", "source": "工商時報 A06 綜合要聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "報導】大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線 製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問 題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產 。這次計畫三大核心策略中，產線製程智慧化，主要以AIoT技術建立 智慧化中央廚房模組，實現烹煮、包裝與檢測...", "full_text": "報導】大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線 製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問 題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產 。這次計畫三大核心策略中，產線製程智慧化，主要以AIoT技術建立 智慧化中央廚房模組，實現烹煮、包裝與檢測等關鍵環節自動化作業 。國科會期望，藉由感測監控與數據分析，將傳統經驗轉化為可視化 數據，確保中央廚房食品安全與品質一致，提升整體生產效率與穩定 性。\n\n智慧餐廚模組化則是透過美食參數數據化，在終端場域透過智慧化 餐廚模組完成製作、烹調或復熱與擺盤，提供消費者現做感體驗，同 時降低對專業廚師依賴，打造可複製、可快速擴展的商業模式。而地方美食IP化，主要希望將地方特色料理轉為數位資產，如建立 數位IP食譜，運用AI將職人烹飪經驗「數據化」，涵蓋時間、溫度、 投料時機等關鍵變因，形成可跨地域轉移的數位資產。也可以透過AI風味優化演算法進行製程即時調控，針對產線波動進 行動態補償，確保跨區生產成品風味具高度一致性，甚至可進行規模 化製作，由在地走向多元通路供應。\n\n回到目錄"}, {"title": "Q1信義房價指數房價有撐短期難大跌", "source": "工商時報 A10 產業‧科技", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "報導】房市冷，房價下修壓力持續。根據最新發布的信義房價指數，今年 第一季房價指數167.53，季增2.6％、年減0.53％，自2024年第四季 的歷史高點下修約1.1％，過去四季以來有三季指數年增率為負，顯 示房價自高點轉折向下盤整。不過房產業者也點出，近期台股熱絡、 通膨隱憂與賣方普遍惜售心態，房...", "full_text": "報導】房市冷，房價下修壓力持續。根據最新發布的信義房價指數，今年 第一季房價指數167.53，季增2.6％、年減0.53％，自2024年第四季 的歷史高點下修約1.1％，過去四季以來有三季指數年增率為負，顯 示房價自高點轉折向下盤整。不過房產業者也點出，近期台股熱絡、 通膨隱憂與賣方普遍惜售心態，房價下修力道有限，呈現盤整趨勢。\n\n信義房價指數顯示，2021年第四季至2022年第三季間是近年房價漲 勢最強勁的階段，年增率均在14％以上；2024年漲勢再起，四個季度 年增率也都超過10％。不過隨著央行推出第七波信用管制，市場交易 大幅降溫，房價指數在2024年第四季創下歷史高點169.46後，隨即向 下緩跌。\n\n經過約一年半的市場交易急凍、買盤接手力道轉弱之後，今年第一 季房價走勢呈現「北強、中南弱」的趨勢，七大都會區與上季相較， 雙北、桃園、新竹房價均有1％以上的漲幅，但高雄下跌1.1％，台南 跌幅更達2.9％；與去年同期相較，除台北市還能維持4％以上漲幅， 其餘六都房價均為年減，尤以中南部跌勢明顯，跌幅均超過3％，其 中台南下跌7.68％、台中4.69％較高。以各地房價來看，台北市獨強，第一季標準房價每坪82.6萬元，創 下歷史新高，新北連續三季守穩在5字頭之上，桃園也守穩在3字頭之 上，新竹則是已連續第五季跌破4字頭，台中、台南、高雄跌幅明顯 ，自高點起算，一年多單價也都下修了每坪2萬～3萬元。\n\n信義房價企研室專案經理曾敬德表示，房價經過修正盤整約一年多 ，雖然交易量能低落，今年以來由於股市旺、賣方對於降價求售壓力 有限，房價仍有相當支撐，短期難見大幅下跌，北部都會區因為剛需 穩定，回落幅度不大，過去漲幅較明顯的中南部則有較明顯修正。回到目錄"}, {"title": "台積先進製程 神速擴產 法人推估今年底2、3奈米月產能上看28萬片 遠超預期 可望憑藉技術優勢「贏者全拿」", "source": "經濟日報 A03 話題", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台積電先進製程嚴重供不應求，正快馬加鞭擴產。供應鏈傳出，台積電當紅的3奈米台灣廠區原訂今年底月產能15萬片，如今可望增至18萬片，比預期多兩成；2奈米去年底量產後，今年底月產能就會衝高至近10萬片。對於相關消息，台積電表示，不評論市場傳聞。法人推算，台積電今年底2奈米與3奈米月產能合計將達近28...", "full_text": "台積電先進製程嚴重供不應求，正快馬加鞭擴產。供應鏈傳出，台積電當紅的3奈米台灣廠區原訂今年底月產能15萬片，如今可望增至18萬片，比預期多兩成；2奈米去年底量產後，今年底月產能就會衝高至近10萬片。\n\n對於相關消息，台積電表示，不評論市場傳聞。法人推算，台積電今年底2奈米與3奈米月產能合計將達近28萬片，遠高於市場預期，凸顯AI、高速運算（HPC）需求強勁，台積電先進製程神速擴產，憑藉技術領先優勢「贏者全拿」，領先取得這波AI與高速運算熱潮帶來的龐大商機。市場原本預期，台積電去年底3奈米月產能約12萬至13萬片，今年頂多擴至15萬片。\n\n由於客戶需求遠出乎預期，供應鏈傳出，台積電全力衝刺3奈米新產能布建，今年底月產能將達18萬片左右，比預期多二成，年增率超過四成。台積日前在法說會提到，就過去而言，該公司不會在一個製程技術達到目標產能後再額外增加產能，但其首要責任是提供客戶最先進的技術和必要產能，為滿足 AI 應用強勁需求，正擴大資本投資，以增加 3 奈米產能。另外，台積電也調度台灣廠區資源，持續轉換5奈米設備，來支援3奈米產能。\n\n台積電正在南科新增一座3奈米廠，預計明年上半年進入量產；美國亞利桑那州第二座晶圓廠也將採用 3奈米製程，目前該晶圓廠已完成興建，規劃明年下半年開始量產。日本熊本第二座晶圓廠同樣將採用 3奈米製程，預計於2028年進入量產。\n\n相關供應鏈透露，台積電亞利桑那州二廠大約今年第3季就會開始進機台。台積電曾提到，2奈米製程已於去年第4季以優異良率表現進入量產，在對智慧手機、高速運算與AI應用的強勁需求支持下，該製程正同時在新竹及高雄的數期晶圓廠中量產。在其持續強化的策略下，會再推出 N2P與A16製程，並預期2奈米家族將成為公司另一個大規模且有長期需求的製程技術。\n\n台積電去年底2奈米每月投片量約落在3萬至4萬片之間，若如上述消息所言，今年底相關月產能將達近10萬片，等於產能在一年之內增加約1.4倍至2.1倍。回到目錄"}, {"title": "考量用電需求… 經部：強化資料中心審議機制", "source": "經濟日報 A05 焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "因應AI時代來臨，企業積極建置AI算力中心，據經濟部產發署掌握，資料中心估計在2030年前蓬勃發展，用電預估會增加1GW（百萬瓩），主要位在西部主要都會及產業廊帶。因短期間AI算力中心用電爆量，經濟部官員坦言，應思考如何管控，進一步強化資料中心整體規劃與審議機制。產發署表示，近年隨AI應用快速發展，...", "full_text": "因應AI時代來臨，企業積極建置AI算力中心，據經濟部產發署掌握，資料中心估計在2030年前蓬勃發展，用電預估會增加1GW（百萬瓩），主要位在西部主要都會及產業廊帶。因短期間AI算力中心用電爆量，經濟部官員坦言，應思考如何管控，進一步強化資料中心整體規劃與審議機制。產發署表示，近年隨AI應用快速發展，及數位服務需求持續成長，國內外業者皆積極評估並布局在台資料中心建設。\n\n從投資建置資料中心業者來看，除國際雲端服務商外，也包括本土AI算力服務業者、電信業者，及政府部門與科研機構，例如氣象署、國家實驗研究院國網中心等，均陸續推動相關算力與資料中心建置計畫。就產發署了解，2030年資料中心及AI算力中心達到1GW，同時包含支撐企業上雲、儲存、備援及數位服務需求的雲端資料中心，及因應AI訓練、推論及高效能運算需求之AI資料中心。隨產業AI應用普及，後者投資比重已有明顯提升。\n\n至於區位分布，產發署表示，考量電力供應、土地資源、網路連結、產業聚落及客戶需求等因素，目前相關資料中心布局主要集中於西部主要都會及產業廊帶。經濟部官員坦言，AI資料中心成為重要數位基礎建設，政府在支持產業發展前提下，須進一步強化資料中心整體規劃與審議機制，從產業發展需求、資源條件、能源效率及環境永續等面向，審慎檢視相關投資案，引導投資布局符合國家整體發展方向，並確保資源合理配置。官員表示，AI算力中心建置首先牽涉電力需求，第二牽涉到能源效率，第三也牽涉到產業發展需求，經濟部會站在產業發展需求角度建立控管機制，並展開全國算力產業布局，包括產發署、台電及能源署等單位，共同思考強化資料中心整體規劃與審議機制。\n\n截至目前，能源署2026年起，調整對AIDC管制作為。能源署修法納管新建、或擴建5MW（千瓩）大型資料中心與主機代管資料中心，於建廠前提出能源使用先期規畫並送審查。其次，要求超大型資料中心（提供雲端服務業者）能源使用效率（PUE）不超過1.3、主機代管資料中心PUE不超過1.4。\n\n另外，台電因北部電網容量不足且用電密集，早自 2023年8月起「桃園以北」不核供超過 5MW的資料中心（IDC）用電申請。回到目錄"}, {"title": "經長挺高雄設算力園區", "source": "經濟日報 A05 焦點", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區...", "full_text": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區，讓民間加速 AI算力中心興建，他詢問經濟部是否支持？\n\n龔明鑫回答，大型AI算力中心設置，到高雄比較適合，往接近電源地方設置。他並強調，經濟部會鼓勵、並支持高雄有國家算力園區，作為示範。賴瑞隆詢問，高雄有電力，如果在高雄設置國家算力園區，經濟部有哪些地方可以協助？\n\n龔明鑫表示，AI算力中心仍需要電網支持，台電需要把電網準備好。官員表示，因AI用電量龐大，密度高，台電建議愈接近電源愈好，以避免排擠原有用戶。而南部地區電力供應也較充足。\n\n回到目錄"}, {"title": "環評總體檢 啟動雞尾酒療法", "source": "經濟日報 A05 焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "環境部日前公布環評總體檢初步結果，將啟動「雞尾酒療法」建立客觀可信賴的環評機制，將著重強化目的事業主管機關、AI輔助審查、資訊公開三面向。另外，針對「專職環評」的顧問公司也會啟動評鑑，讓顧問公司不再「套公式送環評」。環境部長彭啓明坦言，環評修法較為困難，先致力改善「不需修法」的部分。環境部環保司...", "full_text": "環境部日前公布環評總體檢初步結果，將啟動「雞尾酒療法」建立客觀可信賴的環評機制，將著重強化目的事業主管機關、AI輔助審查、資訊公開三面向。另外，針對「專職環評」的顧問公司也會啟動評鑑，讓顧問公司不再「套公式送環評」。環境部長彭啓明坦言，環評修法較為困難，先致力改善「不需修法」的部分。\n\n環境部環保司司長徐淑芷表示，我國環評制度與國外不同，在此次總體檢中，有部分針對否決權討論，開發單位與業者希望不要有否決權，但環團、甚至部分目的事業主管機關則希望保留，因涉及修法，現階段較為困難，環評總體檢結果會以在不修法情況下，評估精進作為。徐淑芷表示，各界除希望資訊可更公開，也希望賦予目的事業主管機關更多責任，不是全部都交由環評來處理；同時，大家都認為政策環評是非常重要的一環，重大政策應辦理政策環評，先凝聚共識，讓後續環評個案有大方向可依循。\n\n環境部環評書件查詢網站3月改版上線後，徐淑芷指出，目前正在將過去90年代到現在的資料都串接起來，期盼內容可對民眾參與更友善，從過去只能透過網頁版才能查詢或登記旁聽，現在透過手機版就可以。環評直播上則已導入AI，有即時的文字雲，也利用AI將發言轉為即時字幕。彭啓明也親自點名，希望在環評書件系統上可建立預先將民眾意見登錄，並開放給開發單位直接回應，這項新的互動系統預計將在 11月完成上線。\n\n至於外界反映環評書件品質問題，徐淑芷表示，很多開發業者撰寫的環評報告書品質需要把關，甚至有人建議應交由第三方撰寫，但她強調，很多顧問公司把報告書寫得好、讓案子可以通過，但未來開發單位執行在顧問公司在環評書件中的承諾事項時恐會遇到困難。回到目錄"}, {"title": "失能長照險混搭 保障互補 兩者理賠標準不同 雙重防護補足缺口 業者推出多元保單 協助小資族解決痛點", "source": "經濟日報 A11 保險", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台灣正式邁入超高齡社會，隨之而來的是沉重的照護壓力，國發會推估2026年，扶老比約30.81，將近每三位青壯年就需扶養一位老人，推估到2040年，扶老比就會高達50.98，每二位青壯年就需扶養一位老人。面對未來沉重壓力，壽險公司近年紛紛推出多種長照保險，但許多民眾不了解若已投保失能險，是否還需規劃長...", "full_text": "台灣正式邁入超高齡社會，隨之而來的是沉重的照護壓力，國發會推估2026年，扶老比約30.81，將近每三位青壯年就需扶養一位老人，推估到2040年，扶老比就會高達50.98，每二位青壯年就需扶養一位老人。面對未來沉重壓力，壽險公司近年紛紛推出多種長照保險，但許多民眾不了解若已投保失能險，是否還需規劃長照險？事實上，兩者理賠標準不同，風險防禦具互補性。\n\n金管會雖然規定於2024年7月1日起停售「疾病失能險」，只剩「意外失能險」可售，但過去曾買過涵蓋疾病和意外造成的失能險，保障效力仍在，不少民眾認為，是否買過這類失能險，就不需要長照險呢？兩者最大的差別在於「判定標準」，雖然都針對失去生活能力提供保障，但是理賠判定的標準完全不同，壽險業者認為，在風險規避的邏輯中，兩者並非替代關係，而是互補關係。從理賠標準來看，失能險是依據「失能等級表」（1至11級）判定，通常針對肢體缺失、關節缺失、臟器功能衰竭、感官功能喪失等生理狀態進行一次性給付，其優點是只要符合等級即可理賠，不必判斷是否需要他人長期照顧。\n\n相比之下，長照險則是針對「生理功能障礙」或「認知功能障礙」進行動態判定，主要採用「巴氏量表（Barthel Index）」或「臨床失智量表（CDR）」，例如，被保險人必須符合「進食、移位、如廁、更衣、沐浴、平地行動」這六項中的三項（含）以上出現障礙，或依臨床失智量表被評估達中度（含）以上者，才符合長照險理賠的條件，填補了部分四肢健全，但因病造成行動困難、無法自理生活或失智症患者的保障缺口。因應未來可能發生的長照風險，壽險業者針對不同預算與需求者推出多元長照保單。新光人壽近期推出的「Go依靠」長照險，主打保費親民，協助年輕及預算有限的小資族群長照防護網，以 30 歲男性為例，若投保 20 年期、保額1萬元，年繳保費僅數千元，並提供最高12次的分期保險金給付，精準切中小資族填補長照保障缺口的痛點。\n\n南山人壽推出的「溢路相守2」則提供平準與降階兩種費率選擇，分期保險金更導入「抗通膨」設計，按給付次數單利2%增加，最高給付15次。另外，國泰人壽的「安心守護A型」外溢型長照險則進一步提供「實物給付」選擇，保戶可以選擇長照分期保險金或申請專業的長照分期服務，將保險從金錢給付延伸至實際的照護資源支援。回到目錄"}, {"title": "淨零承諾 企業的能源硬仗", "source": "經濟日報 A13 經營管理", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "合會計師事務所氣候變遷、永續發展與ESG諮詢服務負責人暨執業會計師）自《京都議定書》以來，全球淨零目標已從先進國家的強制減碳責任，逐步演進為全體國家共同參與的氣候行動。《巴黎協定》奠定全球減碳框架，明確設定將全球升溫控制在2℃以內，並努力限制於1.5℃的共同目標。2023年聯合國氣候變遷大會（COP...", "full_text": "合會計師事務所氣候變遷、永續發展與ESG諮詢服務負責人暨執業會計師）自《京都議定書》以來，全球淨零目標已從先進國家的強制減碳責任，逐步演進為全體國家共同參與的氣候行動。《巴黎協定》奠定全球減碳框架，明確設定將全球升溫控制在2℃以內，並努力限制於1.5℃的共同目標。2023年聯合國氣候變遷大會（COP28）首度進行全球盤點，呼籲各國加強國家自定貢獻（NDC），並於2030年前展現更具體的減碳成果。\n\n國際趨勢 落實減碳目前，全球已有140多個國家提出「2050淨零排放」的宣示與行動。台灣也順應此趨勢，於2021年世界地球日由蔡前總統正式宣示「2050淨零轉型」為國家目標；政府於2024年底重新檢視目標，設定至2035年國家溫室氣體淨排放量較2005年減少38±2%。\n\n在國家淨零政策的引導下，企業部門扮演著關鍵角色。以元大台灣50ETF成分股中的非金融業為例，這些大型上市公司涵蓋電子、半導體、鋼鐵、石化及航運等關鍵產業，為台灣經濟發展的主力。其營運模式與減碳策略不僅影響企業自身營運，更對國家碳排結構及經濟轉型具有指標性意義。\n\n以出口主力與經濟支柱為核心的電子代工與半導體產業，除了承擔自身減碳責任外，也須配合國際品牌客戶要求，降低整體供應鏈碳排放；工業部門如石化與鋼鐵的業者，則提出製程最佳化、能源轉換與碳捕捉、再利用與封存技術（CCUS）的碳中和路徑；而航運業等運輸型產業則主要透過提升燃油效率、推動船舶節能與據點管理等措施落實減碳策略。\n\n整體而言，台灣主要產業中的大型企業皆已承諾長期減碳，並就淨零路徑與行動策略做出規劃。然而，企業淨零目標的實現仍高度依賴能源結構的轉型；能源供應穩定性、再生能源比例提升與配套政策措施，將決定企業淨零轉型的可行性與持續性，也進一步影響台灣產業在全球低碳經濟中維持競爭力的能力。\n\n結構轉型 決勝關鍵對台灣跨國企業而言，淨零轉型也意味著他們必須同時迎接國內與國外營運所在地的轉型相關挑戰。根據《2025年國家溫室氣體排放清冊報告》，台灣約九成碳排放來自能源使用；而中研院預估，為實現 2050淨零目標所需要的能源轉換與電氣化等措施將使全國電力需求自2024年的2,885.64億度攀升至約5,000億度。\n\n然而，現行能源結構中，火力發電供應約八成的用電需求，其中燃氣與燃煤比例約各半；因此，如何在電力成長需求下推動發電去碳化，成為台灣邁向淨零的首要挑戰。考量燃氣發電的碳排係數大幅低於燃煤發電，目前能源署策略以「以氣換煤」為主軸，計畫於 2024至2033年間逐步將燃煤機組汰換為燃氣機組，使燃氣占比達50%，並將燃煤機組改作緊急備援電力。\n\n不過，台灣的天然氣高度仰賴進口，燃氣供應持續受國際能源市場波動影響，將為能源供應增添不確定性。因此，長期仍必須加速低碳與再生能源技術的研發與導入。回到目錄"}, {"title": "廚餘養豬明年退場 營養午餐清運費恐大漲", "source": "自由時報 A06 生活新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "楊綿傑／台北報導〕廚餘養豬將於明年元旦起全面退場，且下學期起各縣市都推動學校午餐免費，中華民國餐盒食品商業同業公會全聯會指出，預期廚餘處理費明年起將大幅增加，呼籲廚餘處理費應和學校午餐費脫鉤，確保食材品質。教育部表示，持續推動「取用適量、珍惜食物」觀念，也與農業部及環境部合作，強化在地食材運用，協助...", "full_text": "楊綿傑／台北報導〕廚餘養豬將於明年元旦起全面退場，且下學期起各縣市都推動學校午餐免費，中華民國餐盒食品商業同業公會全聯會指出，預期廚餘處理費明年起將大幅增加，呼籲廚餘處理費應和學校午餐費脫鉤，確保食材品質。教育部表示，持續推動「取用適量、珍惜食物」觀念，也與農業部及環境部合作，強化在地食材運用，協助學校觀察剩食情形並調整供餐模式。團膳籲廚餘處理費和餐費脫鉤為提高生物防治安全，農業部推動明年元旦起廚餘養豬全面退場，今年則鼓勵廚餘養豬戶轉型，環境部評估明年仍每天有三百卅噸廚餘無法多元利用，只能焚化掩埋處理，其中廚餘多來自學校午餐剩食，餐盒公會全聯會理事長陳明信憂明年廚餘處理清運費用恐提高，甚至翻倍成長，但各縣市學校午餐招標時，多將午餐和清運處理費用合併，隨清運處理費用高漲下，可能擠壓食材費用。\n\n環境部鼓勵清運業轉為乙級或丙級環境部環境管理署署長顏旭明說明，目前廚餘大部分轉為生質能或堆肥，但因相關設施仍要擴充，預估二○二七年才可全數轉為多元化利用，明年無法多元利用的廚餘將送焚化爐，除注意廚餘和其他垃圾處理配比外，也會鼓勵協助運送廚餘到養豬戶的業者轉為乙級或丙級清運業者，各縣市政府也會鼓勵清運業者擴大量能，清潔隊也會投入處理。顏旭明表示，環境部每兩週會和各縣市政府開會，隨時注意廚餘清運狀況，地方政府也會協助監控注意清運費用。教部：學校應持續落實源頭減量針對學校午餐，教育部說明，環境部已訂有「校園廚餘管理及處理原則」，提供各縣市參考運用，地方政府應建立教育單位與環保單位橫向溝通管道，並協調廚餘去化作業方式，教育單位除依環保單位分類及排出方式辦理外，將持續落實源頭減量。\n\n回到目錄"}, {"title": "＜財經週報-本週熱點＞ 景氣燈號有望連4紅 首季拚雙位數成長", "source": "自由時報 A09 財經週報", "cat": "台灣總體經濟與人口數據", "label": "MACRO & DATA", "priority": 0, "summary": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會先前公布的數據，2月景氣燈號綜合判斷分數升至40分，創下20...", "full_text": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會先前公布的數據，2月景氣燈號綜合判斷分數升至40分，創下2024年5月以來、近22個月新高。\n\n其中，工業及服務業加班工時轉為紅燈，貢獻2分；製造業營業氣候測驗點則因春節工作天數減少轉為黃藍燈，減少1分，其餘指標維持不變，使整體景氣續呈熱絡格局。儘管 2 月底中東衝突升溫推升國際油價，為後續景氣增添變數，但在政府穩定油價機制啟動，以及出口動能強勁、股市續創新高支撐下，預期3月景氣燈號仍有機會維持紅燈表現。\n\n另一方面，主計總處將公布第一季國民所得概估。依據2月最新預測，今年經濟成長率由3.54%大幅上修至7.71%，當時預估今年四季經濟成長率分別為11.46%、9.3%、7.76%、3.09%。其中，第一季可望因基期因素有雙位數的成長，之後逐季下滑。\n\n3月出口發威 第一季GDP挑戰去年12.65%高牆3月雖然中東戰事爆發，不過受惠於AI需求應用持續擴張以及部分廠商提前拉貨效應發酵，財政部日前公布3月出口達801.8億元，創歷年單月新高，第一季出口規模1,957.4億美元，亦刷新歷史紀錄，並比主計總處預估值多了148億美元。在出口表現大幅優於預期，內需市場也維持穩定下，第一季GDP成長率可望站穩雙位數水準；至於是否能挑戰去年第四季12.65%、創下38年新高的紀錄，仍有待後續數據揭曉。\n\n回到目錄"}, {"title": "時評 台灣淪先禁國家", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "大陸導航APP「高德地圖」近期在台灣竄紅，引發政府與民間高度 關注。數位發展部23日將高德地圖定調為「危害國家資通安全產品」 ，並宣布政府機關禁止使用；國防部亦下令「全軍禁止使用」，卻引 發網友一片罵聲，調侃台灣已成為「先禁國家」。根據《政府採購法》及行政院國家資通安全會報發布的限制公告， 政府...", "full_text": "大陸導航APP「高德地圖」近期在台灣竄紅，引發政府與民間高度 關注。數位發展部23日將高德地圖定調為「危害國家資通安全產品」 ，並宣布政府機關禁止使用；國防部亦下令「全軍禁止使用」，卻引 發網友一片罵聲，調侃台灣已成為「先禁國家」。\n\n根據《政府採購法》及行政院國家資通安全會報發布的限制公告， 政府各級機關無論是公務用或個人用的資通訊產品，均不得使用大陸 廠牌，且不得安裝非公務用軟體，包括華為、大疆等19家大陸廠牌的 電腦、無人機等，甚至連觸控筆都包括在內。換言之，高德地圖來台 被禁只是早晚的事。只是去年12月，政府即以小紅書涉詐騙，實施限制接取1年，雖然 近期以小紅書平台作為詐騙管道的案件確實下降，月平均件數為18. 3；\n\n但相較月均1萬4千多件的詐騙報案數據，其影響微乎其微，政府 拿小紅書開刀，阻詐成效無異於大炮打小鳥，更別說詐騙平台大戶「 脆」或FB依舊老神在在。這回高德地圖掀波，跟當初禁小紅書一樣，反而促成台灣瞬間下載 量暴增，不少網友使用後才知多項功能如此實用。更有趣的是，國發 會說有信心和數發部一起做出比高德更好的APP，忘了數發部砸錢開 發「網路詐騙通報查詢網」花了多長時間，還走了一位部長的經驗， 如今國發會再開支票，能否兌現，有待檢驗。\n\n現今「資安等於國安」，隨著科技及AI進步，確實替大家生活帶來 許多方便，但同時也容易失去隱私。政府若只為「反中」意識形態， 一味先禁再說，恐怕會讓國內的數位發展「畫地自限」。回到目錄"}, {"title": "台灣國是會議》司徒文呼籲立院通過增加國防預算", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對美國及其在亞洲的民主鄰國的更廣泛安全利益，具有至關重要的地緣...", "full_text": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對美國及其在亞洲的民主鄰國的更廣泛安全利益，具有至關重要的地緣戰略意義。因此，台美的安全和經濟利益、共同價值觀以及台美的未來都息息相關。\n\n針對台美關係，司徒文表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，其「美國優先」經濟政策優先於傳統安全聯盟，致使台美關係緊張；許多台美民眾憂心，川普會成為不可靠的盟友。司徒文指出，截至今年三月，川普在台灣問題上仍保持模糊立場，一方面強調台海和平必要性，另一方面又表示是否入侵台灣「取決於習近平」，並拒絕明確表態是否會保衛台灣，這使得美國的安全承諾變得撲朔迷離。\n\n司徒文說，川普也要求台灣增加國防支出，他個人認同此觀點，樂見總統賴清德正朝此方向努力；川普也將美國對台灣國防承諾視作一份保單，曾說「台灣應該為我們的國防付費」。司徒文也點出，川普對台言論與政策引起國防支出的自相矛盾與延誤問題，儘管美國向台灣運送武器的進程持續延誤，台灣立法院對國防預算也存在分歧，但美國卻對台灣施加巨大壓力，要求台灣大幅增加國防預算。\n\n針對疑美論，司徒文則引述葛來儀與藍立雅去年在德國馬歇爾基金會撰文內容指出，「台灣民眾對美國歷來好感度正在下降」，疑美論正變得愈來愈根深蒂固，若任其惡化，恐損害美國利益。司徒文也認為，台灣半導體在海外擴大生產，致使台灣戰略重要性削弱的可能性微乎其微。司徒文總結指出，美國民調一直顯示，美國民眾普遍支持台灣的國防，近期美國跨黨派議員訪台時也曾強調，美國兩黨對台一致支持，呼籲立法院通過支持增加預算，以抵抗中國威脅；\n\n他相信，台灣與美國、日本、民主國家的關係，對台灣的未來仍然相當重要。回到目錄"}, {"title": "又要普發現金？》藍再提稅收超徵修法 強調「還稅於民」制度化", "source": "自由時報 A04 政治新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國民黨團於廿四日院會又提出相關修法，逕付二讀，交付黨團協商。對...", "full_text": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國民黨團於廿四日院會又提出相關修法，逕付二讀，交付黨團協商。對此，國民黨團人士表示，過去都是一次性的發放，目前在野黨推動的是把「還稅於民」制度化，讓未來只要稅收明顯超徵，就有一套明確、透明的機制，把多收的錢回饋給全民，這是建立可長可久的民生保障制度。\n\n國民黨團人士指出，行政院的態度始終比較保守，甚至可以說是抗拒。因為一旦制度化，就代表財政的運用要受到規範，不能再由行政部門自由裁量。現在的情況是，錢什麼時候發、發多少，幾乎完全由行政院決定，這其實就是把權力集中在少數人手上。\n\n國民黨團人士強調，他們不是為了短期討好，而是要建立一個公平原則：稅收來自人民，當政府多收了，就應該在合理門檻下回到人民手中，而不是變成政府可以任意運用、甚至擴張支出的工具。國民黨團廿四日於院會提案指出，鑑於自二○二一年起，全國賦稅收入實際金額皆超過該年度預算預估三千億元以上。為明確化政府超徵預算的運用，爰擬具「預算法增訂第八十一條之一條文草案」，明定超徵稅收的優先用途與分配順序，以制度解決亂象。\n\n國民黨團並提議抽出此案逕付二讀，由於朝野無異議，逕付二讀，交付黨團協商。提案稱，「全年實徵淨額達到當年度預算編列數一一五％時，應優先弭平當年度歲入歲出之差短；如有賸餘，應辦理普發現金。\n\n」提案說明，稅收是人民交給政府處理公眾事務的資金。如果政府的預算執行完畢後還有顯著賸餘，這部分「多收的錢」在法理上應該回饋給國人。因此，稅收超徵達一定數額，應將一定的比例普發現金。\n\n回到目錄"}, {"title": "藍又要普發現金？》綠：擋預算又要發錢 讓國家失能", "source": "自由時報 A04 政治新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推「普發現金」討好民眾，邏輯自相矛盾；兼任民進黨發言人的立委李...", "full_text": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推「普發現金」討好民眾，邏輯自相矛盾；兼任民進黨發言人的立委李坤城也批評，在野黨不要只想做「無本生意」，呼籲趕快通過今年度中央政府總預算，不能又要馬兒好、又要馬兒不吃草。\n\n公民監督國會聯盟執行長張宏林質疑，地方政府稅收有盈餘，是不是也要比照普發？這些相關修法都是要拖垮中央財政、拖垮台灣，現在國民黨整個朝向不想執政，或認為無法執政的狀態，要拖著台灣一起去死，這才是最恐怖的。籲在野黨不要只想做「無本生意」\n立法院財政委員會去年三月初初審通過「預算法增訂第八十一條之一條文草案」，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但朝野、行政部門無共識，全案保留送院會協商，擱置至今；\n\n立法院國民黨團廿四日院會又提出相關修法，逕付二讀，交付黨團協商。莊瑞雄指出，所謂超徵稅收本就來自景氣波動與預測誤差，並非穩定財源，依法應優先用於減少赤字、償還債務與預留風險準備，而不是被寫成達標就發的固定公式，一手擋預算、一手要發錢，這不是監督，是讓國家失能。「今天發現金很爽，明天沒錢做事更痛！\n\n」莊瑞雄說，過去政府採取普發現金措施，是在整體情勢評估及國會壓力交織下的政策選擇；若強行入法常態化，將壓縮國防、社福與重大建設等必要支出，讓政府失去財政調度彈性。莊直言，預算不是紅包，是建設國家的未來，民進黨團支持在必要情況下紓困，但反對將短期討好制度化，將在後續協商中嚴格把關，守住國家財政紀律。\n\n李坤城也說明，如果有歲計賸餘，代表民進黨政府帶領國家拚經濟有成績，並不是政府「超收」人民的稅金，希望國民黨立委搞清楚。在野黨先前修改「財政收支劃分法」，已弱化中央政府的財政因應能力，如果有歲計賸餘，希望讓國家能有「子彈」面對國際情勢，呼籲在野黨趕快通過今年度總預算。回到目錄"}, {"title": "兒托法訂定20項子法／教團反對監管雲 石崇良：不能隨時調閱", "source": "自由時報 A06 生活新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "／台北報導〕「兒童托育服務法」日前三讀通過，衛福部將訂定約廿項子法，其中包括監管雲相關規範。但教保團體擔憂，托育機構將孩子生活影像上傳至監管雲恐侵害孩子個資及隱私，昨呼籲子法應落實避免全面監控、需有家長書面同意、有限度與制度調閱等原則；衛福部長石崇良則強調，相關影像非永久保存，也非隨時可以調閱，不會...", "full_text": "／台北報導〕「兒童托育服務法」日前三讀通過，衛福部將訂定約廿項子法，其中包括監管雲相關規範。但教保團體擔憂，托育機構將孩子生活影像上傳至監管雲恐侵害孩子個資及隱私，昨呼籲子法應落實避免全面監控、需有家長書面同意、有限度與制度調閱等原則；衛福部長石崇良則強調，相關影像非永久保存，也非隨時可以調閱，不會有隱私洩漏問題。\n\n全面上傳恐危害孩子隱私、個資昨日廿個教保相關團體集結於立法院訴求「反雲端」，指控上傳監視器影像至雲端將違反兒童權利公約（CRC）、隱私權，且資料可能外洩，存在資安疑慮，訴求捍衛托育專業及勞動尊嚴，但也強調絕非「反監視器」。「聲稱上傳到監管雲是輔助管理，根本謊言！」中華民國兒童教保聯合總會總會長蔣叔融表示，托育中心早在二○二○年就已經透過監視器管理，若擔憂影像遺失可要求機構增購設備因應，托嬰中心是教育環境，人員需要信任、孩子需要愛，不是設置幾百支監視器就叫做保障，也不能因一起個案就懲罰全台近二○○○家托育中心人員。\n\n中華民國幼教聯合總會總會長葉若蕎則認為，未來托嬰中心孩子脫光光、換尿布都會被拍到，全面上傳恐危害孩子的隱私權及個資，AI時代雲端很容易遭駭，建議政府考量資安風險，與社會更多對話。衛福部長石崇良則表示，過去曾發生一些兒少保護爭議事件，調查過程中發現影像資料遺失，因此「兒托法」規劃監管雲等相關方式，衛福部會與相關團體討論執行細節，並透過子法規範。石：異地備援 不會永久存放石崇良強調，監管雲是「異地備援」概念，重點在於存放，而非直接使用，且監管雲資料過一段時間後就會刪除，並不會永久存放，更不會隨時可以調閱，不會有隱私洩漏問題。\n\n回到目錄"}, {"title": "專家：軍購不能成「無菜單料理」", "source": "聯合報 A02 焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "立法院今天將再度協商軍購特別條例草案，民眾黨昨舉辦國防論壇，中華戰略學會資深研究員張競說，行政部門並未向國人充分說明具體項目、採購邏輯、交付時程及風險控管，相關程序已經嚴重失衡，這是不負責任的國防規畫，軍購不能成為「無菜單料理」，並要求立委閉著眼睛埋單。海軍前上校黃征輝說，台灣建軍方向應該「質精量少...", "full_text": "立法院今天將再度協商軍購特別條例草案，民眾黨昨舉辦國防論壇，中華戰略學會資深研究員張競說，行政部門並未向國人充分說明具體項目、採購邏輯、交付時程及風險控管，相關程序已經嚴重失衡，這是不負責任的國防規畫，軍購不能成為「無菜單料理」，並要求立委閉著眼睛埋單。海軍前上校黃征輝說，台灣建軍方向應該「質精量少」，將更多資源投入無人載台、ＡＩ控制與分散式作戰能力，國防預算必須花在真正能夠提升戰時存活率與嚇阻效果的方向。張競表示，行政部門將一點二五兆元軍購包裝成國家安全急迫需求，卻沒充分說明，相關程序失衡，這不是負責任的國防規畫，不應硬把國會推向「無料理菜單」與「無菜單料理」之間，並要求立委閉著眼睛埋單。\n\n台灣討論軍購時，應冷靜評估採購內容、交付期程、供應鏈風險及實際戰力效益。國防專家施孝瑋指出，台灣要買的不是政治符號，而是能降低戰爭風險、提升防衛能力、並確保第一線官兵能活下來、打得贏的裝備與制度。回到目錄"}, {"title": "軍購協商 韓國瑜：今挑燈夜戰 額度爭議大 藍指民進黨團死守1.25兆 如何協商", "source": "聯合報 A02 焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "／台北報導立法院長韓國瑜今天將再召集朝野黨團協商軍購特別條例草案，韓已表明不惜挑燈夜戰，也要有結論。不過，國民黨立委指出，黨內意見仍待最終整合，大家對金額也還沒有一個特定想法；還有國民黨立委表示，民進黨團死守一點二五兆元，大家怎麼協商？朝野今再協商軍購特別條例草案，特別預算額度是最大爭執點。國民...", "full_text": "／台北報導立法院長韓國瑜今天將再召集朝野黨團協商軍購特別條例草案，韓已表明不惜挑燈夜戰，也要有結論。不過，國民黨立委指出，黨內意見仍待最終整合，大家對金額也還沒有一個特定想法；還有國民黨立委表示，民進黨團死守一點二五兆元，大家怎麼協商？\n\n朝野今再協商軍購特別條例草案，特別預算額度是最大爭執點。國民黨強調，對外軍售大家有共識，希望各黨團間今天也能有共識。民眾黨主席黃國昌表示，如何買武器比編多少錢買更重要。\n\n民進黨籍外交及國防委員會召委陳冠廷說，隨著美伊戰爭延燒，美軍彈藥庫存快速消耗，應速審軍購條例草案，確保台灣在產線排序中占有優先位子。國民黨籍外交及國防委員會召委馬文君說，今天應該會有最後的意見討論，也希望會有結果，但還要跟民眾黨團配合。藍白方向其實差不多，焦點在於編列方式；\n\n國民黨對第一階段、亦即有發價書的部分一定全力支持，第二階段還要再看情況。「確實就是要挑燈夜戰。」國民黨立委徐巧芯表示，希望不同政黨間能有共識，當然這不是簡單的事，但可以感受到韓國瑜的努力；\n\n國民黨秉持撙節國家預算、審慎使用納稅錢、國防建軍重要性等原則，在對外軍事銷售相當有共識，國民黨都會支持，儘管和行政院版本有差異，她也希望今天協商有初步的好結果。黃國昌指出，大家討論軍購議題時，常把問題簡化為要花多少錢，民眾黨向來支持對美軍購，但錢要花在刀口上，因此更加重視要買哪些東西。他也說，如果國民黨團有相關版本，就趕快拿出來討論，民眾黨團願意坐下來好好討論。\n\n回到目錄"}, {"title": "灰色地帶操作 削弱旅客保障", "source": "聯合報 A07 民生", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "陳宛茜／連線報導禁團令未解除，上有對策下有對策，不少民眾仍以「化整為零」方式出行，透過自行訂票、當地參團，拼湊出近似傳統旅行團的行程。多名受訪者指出，制度限制讓過程變得更繁瑣，且削弱了應有的保障。而國人出國赴大陸人次居第二，僅次日本，顯示市場需求依然強勁。台中一名公司會計邱小姐，近日與友人前往中...", "full_text": "陳宛茜／連線報導禁團令未解除，上有對策下有對策，不少民眾仍以「化整為零」方式出行，透過自行訂票、當地參團，拼湊出近似傳統旅行團的行程。多名受訪者指出，制度限制讓過程變得更繁瑣，且削弱了應有的保障。而國人出國赴大陸人次居第二，僅次日本，顯示市場需求依然強勁。\n\n台中一名公司會計邱小姐，近日與友人前往中國大陸橫店追星，她表示，整趟行程必須自行訂機票，再到當地報名旅行團或購買套裝行程，她說，以往跟團不僅行程一次到位，還能享有團體機票優惠，如「十六人送一人」，價格相對便宜，如今不僅票價上漲，還得自行處理繁瑣細節。然而，在這種「名為自由行、實為跟團」的操作下，風險與灰色地帶也隨之浮現。廖姓旅行業者指出，旅行社目前只能以「機加酒」名義販售產品，甚至刻意不明列行程內容，「但其實裡面還是包含行程」。\n\n但無法投保「團體旅遊責任險」，一旦旅客在旅途中發生意外，原本應由旅行社負擔的責任保障將無法落實，只能改以團體平安險或由旅客自行加保，權益相對不足。劉姓導遊則直言，政府口頭禁止組團，但民眾仍照樣前往，政策與現實脫節，「徒然限制沒有意義」，反而影響整體旅遊品質。台灣海峽兩岸旅行發展協會理事長蕭博仁表示，過去尚未實施禁團令時，旅行社可以自由招攬客源、自由組團，禁團令實施後，政府要求旅行社要遵守「行政命令」，不得組團、不發布廣告招攬。\n\n但他說，若有旅客親友或是企業社團、工商協會自行組團，並請旅行社協助安排考察、訪問行程，「總不能讓我們不開門做生意吧」。最後呈現的結果與過去禁團令實施前並無差異，台灣旅客仍可出團赴陸旅遊。目前團客約占赴陸旅行的三成。\n\n至於保險部分，蕭博仁表示，過去旅行社會主動協助保旅遊責任險，但目前礙於禁團令的規定，需由旅客自行保旅行平安險，該保險不管是個人或團體都能保，但旅行社因有聯保機制，投保旅責險比較便宜，相較之下，旅客自己買的旅平險會貴約一千多元。回到目錄"}, {"title": "「合法做不了、違規又不敢明做」 多輸局面 赴陸變形團政府續埋沙堆？", "source": "聯合報 A07 民生", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台灣人赴陸旅遊人數一再攀升，可見禁團令早就名存實亡，走向地下化的「變形團」不但打臉政府威信，也讓消費者權益保障處於灰色地帶，日前陸方提出惠台政策，較不觸及政治敏感的觀光，政府若再拒接球，兩岸觀光恐再陷入多輸局面。禁團令禁止台灣旅行社組團赴陸，然而，近年旅展上前往中國大陸的「參訪團」、「考察團」，不僅...", "full_text": "台灣人赴陸旅遊人數一再攀升，可見禁團令早就名存實亡，走向地下化的「變形團」不但打臉政府威信，也讓消費者權益保障處於灰色地帶，日前陸方提出惠台政策，較不觸及政治敏感的觀光，政府若再拒接球，兩岸觀光恐再陷入多輸局面。禁團令禁止台灣旅行社組團赴陸，然而，近年旅展上前往中國大陸的「參訪團」、「考察團」，不僅在旅展上熱賣，甚至連價格不菲的高端行程也吸引了不少詢問。市場需求增溫，許多旅行社只能在法律邊緣尋找生存空間，以各種名義或轉介方式協助旅客成行，變形成實質上的「地下團」市場。\n\n旅行業者一方面需遵守政策規範，另一方面又面對市場需求與營運壓力，形成「合法做不了、違規又不敢明做」的兩難。更嚴重的是旅客權益的流失。過去就有業者指出，在禁團令實施前，台灣旅客若赴陸旅遊發生糾紛，行程爭議、服務品質不符，甚至醫療事故等，仍可透過台灣旅行社進行申訴與求償，相關責任歸屬與處理機制相對明確。\n\n然而禁團令上路後，旅客一旦在中國大陸發生問題，往往只能直接與當地旅行社交涉，缺乏熟悉的法律與行政管道，權益保障明顯弱化，原本應由制度提供的保障機制，反而被排除在外。近期陸方釋出訊號，有意開放上海及福建居民赴台自由行，被視為兩岸觀光可能「破冰」的契機，但民進黨政府仍以「陸方善意未必為善意」為由，未正面回應相關提議。兩岸因為地理及文化相近，長期以來就是國人出國旅行的熱門地點，政府以政治力阻礙兩岸往來，但事實上需求依舊強勁，反而讓市場轉入地下。\n\n面對政策與市場脫節的現實，賴政府還能頭埋在沙堆裡多久？回到目錄"}, {"title": "2024年3月原已要解禁 賴當選後生變… 禁團令一禁6年 旅行業氣煞", "source": "聯合報 A07 民生", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導台灣團甘肅車禍，釀一死十二傷，讓人想起三年前台灣旅客在新疆，一死三傷的車禍慘劇，事發不久，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年二○二四年三月一日解除，許多業者樂觀以為會迎來報復性旅遊，沒想到隔年二月又急踩煞車，禁團令政策一變再變。由於兩岸關係不佳，大陸早在二○一九年八月即停止自由行陸客...", "full_text": "導台灣團甘肅車禍，釀一死十二傷，讓人想起三年前台灣旅客在新疆，一死三傷的車禍慘劇，事發不久，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年二○二四年三月一日解除，許多業者樂觀以為會迎來報復性旅遊，沒想到隔年二月又急踩煞車，禁團令政策一變再變。由於兩岸關係不佳，大陸早在二○一九年八月即停止自由行陸客來台旅遊。二○二○年初為防堵新冠肺炎疫情，政府禁止旅行社組團赴大陸旅遊，也禁止大陸人士來台，陸客團隨之中斷。\n\n二○二三年十月下旬，一團廿多名台灣民眾赴新疆旅遊，發生交通意外，造成一死三傷，此事也引發禁團令未解，陸團險走灰色地帶的討論。同年十一月初，時任交通部長王國材宣布，赴中國旅遊禁團令將在隔年春節前宣布解除，春節後三月一日起可組團到大陸及接待大陸旅遊團，旅行業者可提早準備。國內約有四千家旅行社業者以兩岸業務為主，高居國內旅行社九成，許多業者樂觀以為會迎來報復性旅遊，招兵買馬，大舉揪團。\n\n隔年一月十三日，總統選舉賴清德勝出，禁團令又悄悄生變，交通部觀光署在春節連假前一天，以中國大陸未開放陸客來台且片面改變Ｍ五○三航路，宣布即日起停止招攬大陸團。禁團令一出，很多旅行社業者氣得跳腳，因為已經收客，旅遊糾紛不知如何化解。業者氣罵，之前是防疫特別條例，現在是用什麼條例，不准旅行社業者組團？\n\n禁團令持續至今，兩岸隔空喊話，都要對方先釋出善意，卻不願意坐下來談，陸客來台人數也從二○一五年最高峰的四百一十八萬人次，掉到去年剩六十三萬人次，少了陸客，觀光署訂的來台旅客人數目標，年年跳票，觀光署祭出諸多振興方案，效果有限。回到目錄"}, {"title": "甘肅翻車 國台辦：全力協助 死者家屬抵當地 3人留院5月1日全團返台", "source": "聯合報 A07 民生", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台胞甘肅旅行團一行卅人，因在「甘南州風景區」搭乘遊園電動車時發生翻覆意外，造成一死十二傷，死傷名單中包含兩名中部高階警官。目前，死者家屬已經抵達，在當地台商協會和台辦協助下，配合當地公安部門辦理後事中；而傷者也大多進行了初步緊急醫療。預計全團人員會在五月一日返回台灣。大陸國台辦發言人朱鳳蓮昨天表...", "full_text": "台胞甘肅旅行團一行卅人，因在「甘南州風景區」搭乘遊園電動車時發生翻覆意外，造成一死十二傷，死傷名單中包含兩名中部高階警官。目前，死者家屬已經抵達，在當地台商協會和台辦協助下，配合當地公安部門辦理後事中；而傷者也大多進行了初步緊急醫療。\n\n預計全團人員會在五月一日返回台灣。大陸國台辦發言人朱鳳蓮昨天表示，四月廿四日十六時許，甘肅省甘南州夏河縣甘加鎮八角城景區內，一輛載有十三名台胞的旅遊觀光車發生側翻，造成一名台胞重傷，二名台胞輕傷，十名台胞輕微擦傷。重傷台胞經搶救無效，於當晚死亡。\n\n朱鳳蓮表示，事故發生後，當地有關部門組織一切力量全力救治傷患，妥善做好善後工作，目前十二名受傷患者中三人留院繼續治療，九人離院返回酒店。有關部門正在依法依規調查事故原因。回到目錄"}, {"title": "徒具形式 禁團令 旅遊業者：剩政治宣示意義 赴陸人數年年增 去年已達疫前8成 李奇嶽：市場需求難逆轉 不如實質納管", "source": "聯合報 A07 民生", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "苗栗警分局龍騰派出所潘姓所長和妻子、妻弟同赴中國大陸甘肅省旅遊，搭乘的電動車翻車，釀一死十二傷，觀光署稱這是由旅行社辦理「旅客親友自組團體」，此事故也讓赴陸禁團令模糊地帶的「變形團」現象再次浮上檯面。中華優質旅遊發展協會理事長李奇嶽指出，禁團令的存在恐僅剩政治宣示意義而已，呼籲政府不如將台灣團實質納...", "full_text": "苗栗警分局龍騰派出所潘姓所長和妻子、妻弟同赴中國大陸甘肅省旅遊，搭乘的電動車翻車，釀一死十二傷，觀光署稱這是由旅行社辦理「旅客親友自組團體」，此事故也讓赴陸禁團令模糊地帶的「變形團」現象再次浮上檯面。中華優質旅遊發展協會理事長李奇嶽指出，禁團令的存在恐僅剩政治宣示意義而已，呼籲政府不如將台灣團實質納管，讓旅遊更有保障。儘管日前陸方宣布推動上海、福建居民赴台自由行，但仍未全面開放。\n\n而台灣雖未管制赴陸自由行，「禁團令」\n卻從疫情前延續至今，還未鬆綁。但根據觀光署統計，疫情過後，台灣民眾赴大陸旅遊人次逐年攀升，二○二三年有一七六萬人次、二○二四年二七七萬人次，二○二五年更高達三二三萬人次，已達疫前二○一九年台灣旅客赴陸四○四萬人次的八成。李奇嶽直言，台灣在有禁團令管制下，卻仍有這麼龐大的赴陸旅遊人數，不但將長期存在赴陸禁團令模糊地帶的「變形團」現象推上檯面，也凸顯兩個問題，第一，禁團令是否只是名義上的管制，實際上根本擋不住赴陸旅遊人潮；\n\n第二，禁團令的存在恐僅剩政治宣示意義而已。李奇嶽指出，親友自己組團交給旅行社辦理，沒有違反禁團令，而禁團令規定旅行社不可公開招募，讓旅行社從公開招募轉為私下招募，「明明可以在餐桌上吃飯，卻逼著旅行社躲在角落偷吃」，這不僅對旅行業不公平，也容易讓散客產生旅遊糾紛。李奇嶽認為，禁團令已經淪為徒具形式的規範，在難以逆轉市場強勁需求下，與其堅持繼續實施禁團令，不如納入陽光下監管，讓旅遊更有保障，也讓散客透過合法旅行社組團，獲得更完整保障，將台灣團實質納管。\n\n觀光署表示，親友組團適用旅行社的定型化契約，至於台灣還有多少像苗栗警這種親友組團在大陸，觀光署沒有這類的統計數據。針對旅責險的理賠金額，旅途中，旅客若發生車禍、遊艇翻覆、溺水、食物中毒等意外事件而受傷或死亡，可請領隊協助送醫或報警。依照規定，旅行社應為旅行團投保責任險，最低投保金額及範圍，每一旅客及隨團服務人員意外死亡最低為新台幣二五○萬元，最高為新台幣五○○萬元。\n\n觀光署表示，已要求業者安排善後；台北市旅行商業同業公會則說，將全面協助旅客及旅行業者後續事宜。回到目錄"}, {"title": "石崇良：安樂死有疑慮 不考慮推動 安寧照護「8成在醫院」 健保擬加碼給付鼓勵在宅安寧", "source": "聯合報 A12 司法", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導台灣安寧療護發展多年，臨終病人死亡品質居亞洲第一，然「在宅善終」（Home Hospice Care）接受度仍偏低，目前每年安寧服務約十萬人次，其中二萬人選擇居家安寧，其餘八成集中在醫院。為提高在家善終的可近性，健保擬透過加成給付，鼓勵醫療院所參與在宅安寧。據統計，癌症病患在死亡前一年接受安寧照護...", "full_text": "導台灣安寧療護發展多年，臨終病人死亡品質居亞洲第一，然「在宅善終」（Home Hospice Care）接受度仍偏低，目前每年安寧服務約十萬人次，其中二萬人選擇居家安寧，其餘八成集中在醫院。為提高在家善終的可近性，健保擬透過加成給付，鼓勵醫療院所參與在宅安寧。據統計，癌症病患在死亡前一年接受安寧照護的比率達百分之六十五，非癌症患者僅百分之三十五，衛福部長石崇良表示，最近幾年「安樂死」倡議呼聲不小，一般認為，可能與現行制度未能達到尊嚴善終的目標有關，這代表安寧照護領域仍有努力及檢討空間，若安寧品質良好，民眾就不會追求更激烈的「安樂死」手段。\n\n石崇良指出，安樂死不僅是醫療問題，更涉及法律、倫理與社會價值，可分為「被動」與「主動」兩類，所謂被動安樂死，指停止或不進行延命治療，讓疾病自然進程結束。主動安樂死，則涉及以醫療手段主動結束生命，性質完全不同，台灣社會雖逐漸開放，但對此仍存在高度分歧，現階段不考慮主動安樂死。此外，安樂死涉及「協助自殺」，依台灣現行法律，協助他人自殺仍屬刑事犯罪，若未來真要推動安樂死制度，勢必需先處理刑法層面問題。\n\n衛福部醫事司長劉越萍指出，在安樂死等倡議仍有法律「加工死亡」等刑法的疑慮，社會未達共識下，仍將以提升安寧緩和醫療品質為主，讓民眾尊嚴善終。「優先建構安寧照護網絡，而非推動生命終結法制化。」劉越萍說，關鍵在於提升安寧品質，並肯定支持第一線醫療人員臨床實務上的付出。\n\n如果臨終病人能夠大幅減少痛苦，一一完成未竟心願，相信就可大幅降低極少數個案的「安樂死」極端需求。石崇良說，現行安寧照護主要分為住院安寧、安寧共照、居家安寧等三大類，其中以住院與共照模式占多數，顯示國人仍習慣在醫院接受臨終照護。但在地終老為長照最終目標，有必要提高居家安寧服務的可及性，為此，將提高居家安寧訪視費用，採論質計酬。\n\n衛福部健保署主秘劉林義表示，去年推出安寧緩和療護品質評核加成獎勵方案，已有一百家醫院提出申請，專家將於五月起至年底實際訪評在宅安寧的訪視頻率及次數、相關人員組成，以及如何讓家屬安心等細節，評估結果為優良醫事機構，則可獲得加成獎勵。「在宅安寧係讓長者在家走完人生最後一哩路，這是未來趨勢，也是安寧緩和的推動重點。」劉林義說，多數長者希望在熟悉的家中度過人生的最後時刻，再者，健保資源有限，在宅安寧也可降低醫療支出。\n\n健保署將制訂各項配套措施，讓安寧長輩病情緊急時，鄰近醫療團隊可盡速到宅協助，讓家屬無後顧之憂。回到目錄"}, {"title": "制度補強 為失智者阻詐 民間促立法 台灣失智症協會擬定失智症基本法草案 盼患者面對財務法律問題不再孤立無援", "source": "聯合報 A12 司法", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "失智患者為詐騙高風險族群，隨著罹病人口增加，台灣失智症協會擬定民間版「失智症基本法」（ＴＡＤＡ）草案，希望從制度面補強漏洞，透過衛福部、經濟部、法務部等跨部會合作，建立更完整的保護體系，讓失智者在面對財務與法律問題時，不再孤立無援。台灣失智症協會理事長徐文俊指出，日本於二○二三年正式通過「促進實現共...", "full_text": "失智患者為詐騙高風險族群，隨著罹病人口增加，台灣失智症協會擬定民間版「失智症基本法」（ＴＡＤＡ）草案，希望從制度面補強漏洞，透過衛福部、經濟部、法務部等跨部會合作，建立更完整的保護體系，讓失智者在面對財務與法律問題時，不再孤立無援。台灣失智症協會理事長徐文俊指出，日本於二○二三年正式通過「促進實現共生社會之失智症基本法」，建立首相層級之跨部會統籌機制，明確將失智者定位為權利主體，納入失智者及家庭參與政策決策，強化政策之制度化與執行力。我國發展背景與日本相近，現階段已具備邁向法制化之條件，實有必要加速推動專法制定。\n\n台灣失智症協會提出「失智症基本法」草案，強調國際上多數先進國家均已立法強化失智症治理架構，呼籲政府將失智症政策治理提升至行政院層級，強化部會的協調與整合效能，進一步完善對失智家庭的權益保障。台灣失智症協會秘書長陳筠靜表示，除了醫療及長照服務，失智患者也需經濟及法律等專業領域，以防範失智詐騙為例，該草案提出建立防止失智者遭受「財務剝削」等制度設計，涵蓋詐騙防制核心。另強調「支持性決策」\n機制，協助失智者在面臨財務與重大決策上，能在他人支持下做出符合自身利益的選擇。\n\n草案也要求金融機構提供合理調整與必要協助，降低失智者在金融交易的風險。「失智者並非完全沒有判斷能力，而是需要更多支持。」陳筠靜說，許多失智者仍具備基本決策能力，但在實際操作上，因需要多重步驟與複雜資訊，容易成為詐騙集團鎖定對象。\n\n例如，在購買手機、處理銀行業務，若缺乏適當陪伴與諮詢管道，受騙風險明顯較高。為此，「失智症基本法」草案強調，應透過社福體系建立支持網絡，提供諮詢服務、陪同決策，甚至跨機構協作，失智者在面對財務與法律問題時，結合警政、金融機構、社政、衛政與民間資源等力量，共同介入，降低遭詐風險。在「失智症基本法」條文中規定金融機構需針對高風險族群設計警示機制，延長確認流程，或是導入第三方見證制度。\n\n在司法實務上，則強化老年人對於財務剝削案件的辨識與處理；在教育與宣導層面，積極提升社會對失智詐騙的警覺。相較於日本已上路的失智症基本法，台灣民團版本雖未逐條明訂國民責任，但已將相關精神納入整體架構，強調政府、企業與社會共同參與，打造「共生共榮」的友善環境。\n\n陳筠靜說，ＴＡＤＡ版的核心是建立一個跨部會整合的制度，有效串聯金融防詐、社福支持與法律保障等，全面保護失智長者，提升生活品質。回到目錄"}, {"title": "充滿變數 申請卡關 金門今赴廈考察降級 副縣長遭駁回縣府緊急調整名單", "source": "聯合報 A13 北部生活圈", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "金門縣議會定期會上，有議員提議府會應儘速組團赴廈門，實地了解翔安機場，及新四通與金門未來對接情況，訪陸行程訂在今明兩天，卻一路卡關充滿變數，隨行官員從副縣長、處長一路降到副處長。大陸方面接待規格也可能適度「降級」，實質交流效果勢必受影響。議員陳泱瑚本月十六日質詢時指出，大陸明確釋出「支援金門共用廈門...", "full_text": "金門縣議會定期會上，有議員提議府會應儘速組團赴廈門，實地了解翔安機場，及新四通與金門未來對接情況，訪陸行程訂在今明兩天，卻一路卡關充滿變數，隨行官員從副縣長、處長一路降到副處長。大陸方面接待規格也可能適度「降級」，實質交流效果勢必受影響。議員陳泱瑚本月十六日質詢時指出，大陸明確釋出「支援金門共用廈門新機場」，及新四通（通水、通電、通氣、通橋）政策訊號，縣府不能只坐在辦公室紙上談兵，應主動出擊，由縣府邀集議會組團赴廈門考察，掌握第一手資訊。\n\n據了解，縣府在隔天即啟動行政程序，將副縣長李文良及縣府、議會一級主管赴陸名單送交移民署申請，希望趕在二十七日順利成行。不過，近期逢「鄭習會」、賴總統出訪友邦生變等事件衝擊，兩岸政治氛圍轉趨敏感，中央對地方官員赴陸審查明顯趨嚴。直到二十四日，李文良及縣府一級主管赴陸申請全遭駁回。\n\n縣府當天下午緊急調整名單，改由副處長層級官員「代打」隨行，盼維持行程不變，十職等以下不需要送陸委會，由縣府自行決定，但中央還是提醒，希望相關人員要遵守相關規定。地方人士說，府會此次考察主軸是翔安機場與新四通後續如何與金門銜接，向廈門方提出考察需求時，陸方也認為時間過於倉促，建議延後至五一長假結束後再安排，但因議會已敲定時程，縣府只能硬著頭皮推進。地方觀察在兩岸局勢高度敏感下，公務員夾在地方與中央，進退維谷；\n\n金門身處兩岸最前線，也如同地方官員處境，動輒得咎。回到目錄"}, {"title": "司徒文促台增國防預算 吳志中籲結盟美日嚇阻", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內 為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民 眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台 灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中國威脅。外交部次長吳志中則說，台灣需要鏈結美、日等友盟國家嚇...", "full_text": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內 為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民 眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台 灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中國威脅。外交部次長吳志中則說，台灣需要鏈結美、日等友盟國家嚇阻戰事發 生。第14屆「海內外台灣國是會議」昨登場，邀請日本前防衛副大臣參 議員中山泰秀、AIT前處長司徒文，以及外交部次長吳志中等人，就 美日台三邊關係進行專題演講。\n\n司徒文表示，台美因共同價值觀團結，皆是民主國家，珍惜獨立、 自由、法治與人權，但除了共享價值觀外，共同利益至關重要，而台 灣位於亞太地區第一島鏈中心，這意味著台灣對美國及其在亞洲的民 主鄰國的更廣泛的安全利益具有至關重要的地緣戰略意義。因此，雙 邊的安全和經濟利益、共同價值觀，以及未來都息息相關。司徒文表示，川普確實為美台關係帶來更大不確定性，川普反覆無 常，政策經常發生突然且難以預測的變化，他並提到，川普種種發言 與表態都增加了台灣民眾對美國的不信任，如果任由「疑美論」惡化 ，可能會損害美國的利益。\n\n對於川普要求台灣增加國防支出，他個人認同此觀點，也樂見賴清 德總統朝此方向努力。他相信，台灣與美國、日本及各民主國家的關 係，對台灣的未來仍然相當重要吳志中認為，2004年台灣推動防衛性公投時，被國際質疑是企圖改 變現狀、是麻煩製造者，但如今「中國才是麻煩製造者」的國際敘事 已然成形，面對中國等獨裁政權的崛起，台灣不僅要準備好強大的國 防實力，更需要鏈結美、日等友盟國家，以國防及外交來嚇阻戰事發 生。回到目錄"}, {"title": "支持國防不等於放棄監督 應考量實際防衛需求 專家：特別軍購不能成為無菜單料理", "source": "中國時報 A02 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "「國防特別條例」草案協商數度破局，立法院長韓國瑜今（27）日 將再召集朝野黨團協商。中華戰略學會資深研究員張競表示，行政部 門將 1.25 兆元的特別條例包裝成國安急迫需求，卻未充分說明具體項 目、採購邏輯、交付時程與風險控管，把國會推向「無料理菜單」與 「無菜單料理」間，要求立委閉著眼睛埋單，台灣...", "full_text": "「國防特別條例」草案協商數度破局，立法院長韓國瑜今（27）日 將再召集朝野黨團協商。中華戰略學會資深研究員張競表示，行政部 門將 1.25 兆元的特別條例包裝成國安急迫需求，卻未充分說明具體項 目、採購邏輯、交付時程與風險控管，把國會推向「無料理菜單」與 「無菜單料理」間，要求立委閉著眼睛埋單，台灣社會不應輕易倉促 背書。民眾黨昨舉辦「從軍購到戰力：國防建軍決策與監督機制檢視」論 壇。\n\n前海軍上校黃征輝表示，台灣建軍方向應該「質精量少」，並將 更多資源投入無人載台、AI控制與分散式作戰能力，未來戰場關鍵不 在傳統大型平台堆疊，而在無人化、AI化與可持續作戰能力，預算須 花在能提升戰時存活率、嚇阻效果上。黃征輝認為，若台灣要談強化國防，就不能只談買什麼武器，更要 談如何建構戰場經營、民防準備與全民防衛體系，讓每一分國防預算 都能對應到實際防衛需求，而不是被既有軍種框架與政治口號綁架。張競批評，行政部門將1.25兆元特別軍購包裝成國家安全急迫需求 ，卻未充分向國會與人民說明具體項目等，反而透過外媒披露後才倉 促推動，程序上已嚴重失衡，這是不負責任的國防規畫。\n\n張競說，社會不能被「不買就是不愛台灣、不支持國防」情緒勒索 ，美國對外軍售本質是為了鞏固其國安利益、強化美國國防工業，因 此台灣應冷靜評估採購內容、交付期程、供應鏈風險與實際戰力效益 ，並非在資訊不透明的情況下倉促背書。國防部前視察盧德允強調，軍購清單不應該只符合美國軍工複合體 利益，更必須符合台灣防衛利益，若武器交付後無法有效強化防衛能 力，反而削弱有限資源配置，也未必符合美維持第一島鏈穩定的國家 利益，部分裝備如M109A7自走砲、海馬士、M1A2T戰車，都應被重新 放在未來戰爭型態中檢驗，而不是用過去戰爭的想像來編列未來數年 國防預算。回到目錄"}, {"title": "軍購民調 年輕族群態度保留", "source": "中國時報 A02 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "朝野協商「國防特別條例」草案已進入深水區。根據國防安全研究 院所做軍購特別預算民意調查，支持者雖占62％多數，但其強度與穩 定性仍存在差異；其中，18至39歲的年輕族群，「有點支持」的比例 較高，約43％至45％，然而，在「非常支持」的比例卻偏低，僅為1 4％與19％，且無反應比例相對較高，顯示該族...", "full_text": "朝野協商「國防特別條例」草案已進入深水區。根據國防安全研究 院所做軍購特別預算民意調查，支持者雖占62％多數，但其強度與穩 定性仍存在差異；其中，18至39歲的年輕族群，「有點支持」的比例 較高，約43％至45％，然而，在「非常支持」的比例卻偏低，僅為1 4％與19％，且無反應比例相對較高，顯示該族群的態度較為保留， 支持強度不足。\n\n這份由國防院副研究員李冠成日前發表的「軍購預算溝通的分眾挑 戰與精準傳遞策略」文章提及，民調結果顯示，整體而言，軍購特別 預算具備多數支持基礎，但分析顯示，支持並不等同於態度穩定。相 當比例的受訪者雖表示「有點支持」，然而「非常支持」的比例在部 分族群中仍偏低，且未表態比例亦不容忽視，顯示當前民意結構中， 仍存在一定程度的保留與觀望。報告指出，年輕族群呈現典型的「低強度支持」特徵，意味著該族 群對政策並非明確反對，但也尚未形成穩定且可被動員的支持基礎。\n\n李冠成認為。此一結果顯示，資訊接觸的結構性落差影響部分族群是 否接觸到相關訊息，而訊息框架與受眾認知之間的落差，則進一步影 響其對政策內容的理解。中華戰略學會資深研究員張競表示，對於偶發性與短期性政策議題 ，由於民意如流水，相關數字經常呈現巨幅變化，嚴重落差讓民意調 查專家完全無法正確解讀與精準判斷，特別是針對年輕役齡範圍內群 體民意調查結果，確實會存在嚴重落差。\n\n不過，張競強調，儘管此項 民調分類有爭議，卻忠實顯現出執政團隊與國安高層，在年輕世代眼 中形象嚴重崩壞之無情真相。回到目錄"}, {"title": "通過國防特別條例 有助鄭訪美氛圍 谷立言肯定親美友日和陸路線 稱嚇阻與對話並重 可維護區域安全", "source": "中國時報 A03 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "訪】國民黨主席鄭麗文計畫於6月訪美，卻有人認為，若國防特別預算 條例草案無法在立法院通過，恐不利於鄭麗文的華府行。美國在台協 會（AIT）處長谷立言接受本報專訪時表示，尚未收到鄭訪美細節， 不對假設性的安排，發表評論，但若國防特別預算條例盡快通過，會 在她訪美之前營造正面的氛圍。谷立言肯定鄭麗文提出...", "full_text": "訪】國民黨主席鄭麗文計畫於6月訪美，卻有人認為，若國防特別預算 條例草案無法在立法院通過，恐不利於鄭麗文的華府行。美國在台協 會（AIT）處長谷立言接受本報專訪時表示，尚未收到鄭訪美細節， 不對假設性的安排，發表評論，但若國防特別預算條例盡快通過，會 在她訪美之前營造正面的氛圍。谷立言肯定鄭麗文提出「親美友日和陸」的路線，這是受台灣民眾 及國際所歡迎，他並提醒還要加上2D策略，即嚇阻（deterrence）與 對話（dialogue），將有助維護區域安全。\n\n谷立言接受專訪重點如下 ：問：您與鄭主席見了面，是否有談及「鄭習會」？答：我不會透露我們私下談話的細節，她確實分享了她此行的經驗 與印象。問：您認為民進黨有能力與北京開始對話嗎？\n\n又或是北京應該率先 伸出友誼的手進行對話？答：沒錯。我們認為北京應主動提出不設前提的對話提案。\n\n賴總統 已經多次表示願意與北京對話。我們認為北京應該與台灣所有政黨， 特別是民選領導人進行對話，以消除誤解，促進雙方合作。問：鄭習會後，北京提出「10項對台措施」，您如何評價這對兩岸 關係的影響？\n\n答：整體來說，我們支持兩岸交流。但是，我們不希望看到以分裂 台灣社會或削弱台灣社會為目的的行動。中國提出這10點方案，釋出 善意，但幾天後，他們卻妨礙了賴總統出訪非洲的行程，這項舉動不 僅嚴重損害區域和平與安全，也嚴重違反國際航空法規。\n\n我認為這傳 遞出非常令人困惑的訊息，中國並沒有放棄對台灣施加脅迫，無論是 外交、經濟或軍事脅迫。所以，我們認為中國要贏得台灣人民信任的 最佳方法，是先與台灣社會各界對話，其次是減少對台灣的脅迫或恐 嚇行為。問：鄭麗文認為國民黨立場是美中不選邊站，您是否同意或有何建 議？\n\n答：首先我要表達一個基本事實，美國與國民黨有近百年情誼。在 我擔任美國駐成都總領事期間，參觀許多在重慶和昆明的紀念二戰美 軍與國民黨軍隊合作的場所。我覺得有趣的是，美國空軍與台灣空軍的飛行中隊歷史，可以追溯 到美國志願軍「飛虎隊」。\n\n最近我陪同台北出生的太空人林琪兒訪問 台中時，林父就是在台中清泉崗基地服役，我們一起參觀曾經是美軍 俱樂部的美村綜合服務園區，展現了當年美台在台中建立的友誼。由 此可見，美國與國民黨的友誼歷史悠久。近期國民黨有「親美友日和陸」政策，這樣的政治框架無論是對台 灣人或從國際的角度來看，都是非常好。\n\n而且，國民黨一直奉行嚇阻 與對話並重的「2D」政策，這也是非常明智的做法。台灣無需在嚇阻與對話、和平與戰爭之間做出抉擇。如果台灣和國 民黨繼續保持平衡嚇阻與對話並重的傳統政策方向，將有助於促進對 話，並維護區域安全。\n\n我認為，解決兩岸分歧只有三種途徑：對話、脅迫和衝突。如果台 灣擁有足夠的自衛能力，就可以排除「衝突」的武力選項。如果台灣 擁有足夠的社會經濟韌性，就可以消除「脅迫」的威脅。\n\n這樣一來， 「對話」\n必然能成為解決兩岸分歧的唯一途徑。問：如果特別條例在鄭麗文訪美前還沒通過，有人說鄭麗文將無法 確保能與華府高層官員會面。這是可能發生的情況嗎？\n\n答：我們還沒收到她要訪美的細節，我就不對這個假設性的安排發 表評論。不過，如果國防特別條例盡快通過，會在她訪美之前營造正 面的氛圍。問：鄭麗文是否可獲得如同台中市長盧秀燕市長日前訪問華府的相 同待遇？\n\n答：我認為，無論是國會、智庫或美國其他機構，都非常珍惜與台 灣各政黨代表交流的機會。同時，我也認為，各方普遍關注台灣的安 全問題，只要國防特別條例能在短期內取得正面成果，就能為對話營 造非常有利的氛圍。回到目錄"}, {"title": "無人機納國防特別預算 嚇阻力最快速", "source": "中國時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算， 但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無 人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，要 提供最快的嚇阻力量，最好的方法是將其納入國防特別預...", "full_text": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點 是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算， 但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無 人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，要 提供最快的嚇阻力量，最好的方法是將其納入國防特別預算。問：在野黨希望將商購及委製部分移為年度預算編列，華府會對此 感到失望嗎？答：我認為，台灣業者會非常失望。\n\n如果商購與委製移為一般年度 預算編列，資金到位的時間將會拉長，許多大型常規系統需要數年才 能建成並交付給台灣。像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能 力，如果你的目標是盡快提供最快的嚇阻力量，我認為最好的方法是 將其納入國防特別預算。一旦預算通過，台灣就可以立即生產。\n\n如同美國印太司令帕帕羅所說，這類系統在嚇阻方面至關重要，亦 如在伊朗衝突和烏克蘭衝突中所見，大規模生產的無人機系統對台灣 的安全具有舉足輕重的作用。因此，我們希望整套預算案能同時並進 、向前推進。這不僅有利於台灣的安全，也有利於我們共同建構新的 產業合作關係。\n\n問：國民黨擔心商購及委製的招標恐有不透明之處，易有弊端，因 此主張特別預算應該拆分處理，您的看法如何？答：我有聽說這種講法。任何政府進行採購都應該有監督機制審查 ，例如，台灣要買救護車或新的發電設備，都會進行公開招標，採購 無人機也相同。\n\n這對產業界是參與公開採購的機會，政府應有相關監 督機制，解決採購流程中的疑慮。我與台中市盧秀燕市長會面時也談到，國民黨內部愈來愈多的人了 解其中的巨大機會，對台中市的企業而言，漢翔科技就是領先的無人 機系統整合商之一。因此，這將惠及民進黨和國民黨兩黨執政縣市。\n\n所以，我希望雙方能找到共同點，將此視為台灣所有企業蓬勃發展 、為台灣安全做出貢獻的契機。從我們的角度來看，尤其對台灣的安 全而言，大規模生產無人系統是非常重要。回到目錄"}, {"title": "翻轉經濟學人「地球上最危險的地方」看法 谷立言稱台是最重要的地方之一", "source": "中國時報 A03 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "訪】《經濟學人》（The Economist）曾於封面報導台灣是「地球上最 危險的地方」，此後國際均據此論述兩岸關係。美國在台協會（AIT ）處長谷立言卻認為，台灣應該是「最重要的地方之一」，台灣是美 國第四大貿易夥伴，重要性已無庸置疑，且各國普遍認為，避免台海 衝突非常重要。問：《經濟學人》曾報導...", "full_text": "訪】《經濟學人》（The Economist）曾於封面報導台灣是「地球上最 危險的地方」，此後國際均據此論述兩岸關係。美國在台協會（AIT ）處長谷立言卻認為，台灣應該是「最重要的地方之一」，台灣是美 國第四大貿易夥伴，重要性已無庸置疑，且各國普遍認為，避免台海 衝突非常重要。問：《經濟學人》曾報導，台海是地球上最危險的地方，您派駐於 此，也如此認為嗎？\n\n答：我會說台灣是世界上最重要的地方之一，尤其對美國而言，台 灣是美國第四大貿易夥伴，在關鍵技術領域，美國和台灣是同一團隊 ，台灣對世界的重要性無庸置疑。我認為，人們普遍認識到，台海衝 突的後果將對世界造成毀滅性打擊。有人估計，損失可能高達全球G DP的10％，甚至超過二戰造成的損失。\n\n雖然大部分損失將發生在台灣 和中國之間，但它會影響到世界。因此，我認為各國普遍認為，避免 台海衝突至關重要。與 5 年前我被派駐來台北時相比，我們在這一領域確實取得了長足 的進步。\n\n事實上，衝突的可能性已降低。一方面，是因為台灣本身在 軍事改革及社會韌性上投入了大量資源。另一方面，也是因為台灣與美國及眾多盟友攜手合作，重新平衡區 域安全環境。\n\n所以我認為，只要我們一方面繼續加大投入，另一方面 也積極開展外交活動，無論是美中之間，還是台北與北京之間，這兩 方面努力都能確保我們繼續享有和平，從而釋放台灣在區域內的繁榮 潛力。問：據報導，川普總統在 2 月與大陸國家主席習近平通話時，談到 對台軍售，請問這是否違反「六項保證」\n中的第二點，美國在制定軍 售前是否會與中華人民共和國事前諮商？答：那些報導出來後，白宮也被問到相同問題，他們非常明確地表 示，包括《台灣關係法》、三個公報和「六項保證」的美台政策，與 過去46年皆相同，我們的政策始終如一。\n\n白宮也表示，我們政策的架構，即保持美中關係穩定與美台夥伴關 係牢固，並不矛盾。我非常贊同這一觀點，我也認為，美中兩國，尤 其是在領導人層面，保持暢通的溝通，符合台灣的安全利益和兩岸和 平的利益。問：川習會前或會後，美方是否會對台灣做簡報？\n\n答：我不會評論我們的溝通細節。但我可以肯定地說，美國和台灣 在各個層面都保持著非常密切和持續的溝通，溝通管道非常暢通。回到目錄"}, {"title": "看好無人機產業 雙方致力履行ART條款 谷立言：台美進入經濟合作黃金年代", "source": "中國時報 A03 焦點新聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "訪】美國在台協會（AIT）處長谷立言接受專訪指出，美、台雙方都看 到台美對等貿易協議（ART）的價值，因此支持繼續推進，ART提供一 個有利雙方經貿合作的良好架構，台美可說是進入經濟合作的黃金年 代。問：美國最高法院已判決川普總統無權依據《國際緊急經濟權力法 》（IEEPA）實施對等關稅，但在台灣方...", "full_text": "訪】美國在台協會（AIT）處長谷立言接受專訪指出，美、台雙方都看 到台美對等貿易協議（ART）的價值，因此支持繼續推進，ART提供一 個有利雙方經貿合作的良好架構，台美可說是進入經濟合作的黃金年 代。問：美國最高法院已判決川普總統無權依據《國際緊急經濟權力法 》（IEEPA）實施對等關稅，但在台灣方面，行政院說ART不受影響， 最近台美是否還會再開會，討論後續工作？答：台美都非常致力於落實ART，就如同雙方在2月時達成的共識。\n\n當然，由於美國最高法院的裁決，美國需要對相關法律權限做調整， 但是貿易代表葛里爾與行政院副院長鄭麗君都明確表示，雙方致力履 行ART所有條款。我認為雙方都很歡迎ART，台灣在市場准入方面，與 日、韓等競爭對手享有相同待遇，美國也消除長期在台灣的貿易壁壘 ，台灣消費者可以更低價格、更方便地購買美國產品，因此我認為， 雙方都看到維持這項協議的價值，非常期待能重新投入工作。我確實認為，台美經濟關係正進入新的黃金年代，無論是在投資、 科技、產業鏈和供應鏈合作領域。\n\n所以ART提供很好的架構，令台美 在AI、無人機、機器人等合作奠定基礎，我們可以將在半導體領域的 合作經驗，複製到這些新領域。問：自美國進口的馬鈴薯若發芽，該如何處理，台灣有很大的爭議 ，您有何建議？答：我們對台灣農業部動植物防疫檢疫署和有關部門的處理很有信 心，我們保持密切聯繫，相信他們可以解決問題。\n\n問：「選擇美國」投資高峰會將於5月初在馬里蘭州舉行，您將率 團參加，這個團是否與台灣承諾對美投資5000億美元有關？答：我會率團赴SelectUSA高峰會。屆時將有許多台灣無人機企業 代表參加，鑑於美國、台灣乃至全球無人機市場的不斷擴張，雙方擁 有巨大合作機會。\n\n在無人機領域，已有一些美國公司來台投資，美國 並已透過工研院認證了台灣的無人機供應鏈，以便台灣的無人機可以 銷往美國。我與台中市長盧秀燕會面、探討台灣經濟發展機會時，一致認為無 人機與無人載具可以成為台灣的下一個半導體產業，我認為這是非常 好的比喻，未來市場潛力無限，美台產業互補。台灣去年參加「選擇美國」投資高峰會的訪團，有132家企業、18 0人參加，是最大的團體，今年代表團規模也與去年相當，顯示很多 台灣企業看到在美國的機會。\n\n你提到台美簽署的投資備忘錄，企業對美直接投資2500億美元外， 台灣政府再提供2500億美元的信保，搭配這些措施，過去無法開拓美 國市場的台灣中小企業就可前進美國市場，這無疑是利多。我們也很 高興台灣考慮在美國建立類似新竹的工業園區或科技園區，這可為台 灣中小企業帶來新發展機會，幫助他們成為全球性企業。這是擴張美國與台灣經濟合作的契機，不僅是AI與半導體產業，我 們也希望吸引更多傳統產業，例如工具機產業、機器人產業和無人機 產業。\n\n因此，我們會帶領台灣業者分團前往美國，探討這些領域的合作， 我想稱此次行程為「繁榮之旅」，因為它將為台灣企業帶來繁榮，使 他們能夠進入全球最大的消費市場，並擁有充沛能源供應和經濟機會 。這也將為美國社會帶來繁榮，使他們能夠受益於台灣企業帶來的高 薪科技工作。無論是在AI領域，或在先進工具機領域。\n\n美台在供應鏈 安全、下一代衛星研發，或其他先進技術方面也高度契合，將為雙邊 人民帶來巨大的機會。回到目錄"}, {"title": "中選會今復活 藍白各推公投 安樂死受矚目 國民黨鎖定鞭刑 民眾黨提善終法草案 外界預期挑戰敏感生死議題", "source": "中國時報 A04 生活綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "豪／台北報導】為因應年底選舉，行政院長卓榮泰日前任命4位中選會委員，包括 主委游盈隆，以及委員李禮仲、蘇嘉宏、蘇子喬，而4人也將於今（ 27日）舉辦交接典禮，象徵中選會已達法定人數可召開委員會議。但 除了公職人員選舉外，藍白皆有意在年底提出公投，國民黨團日前公 布要推鞭刑公投，而民眾黨團則還在討論階...", "full_text": "豪／台北報導】為因應年底選舉，行政院長卓榮泰日前任命4位中選會委員，包括 主委游盈隆，以及委員李禮仲、蘇嘉宏、蘇子喬，而4人也將於今（ 27日）舉辦交接典禮，象徵中選會已達法定人數可召開委員會議。但 除了公職人員選舉外，藍白皆有意在年底提出公投，國民黨團日前公 布要推鞭刑公投，而民眾黨團則還在討論階段，安樂死公投被列入考 慮。藍白於去年修正通過《公投法》恢復公投綁大選後，雙方已有共識 要在今年底各推一項公投。\n\n國民黨團宣布要推動「鞭刑公投」，欲針 對性侵、虐童及詐欺等 3 類民眾極度反感的犯罪，增加鞭刑刑罰以制 裁重大罪犯。民眾黨近期積極舉辦各項公聽會，黨內也同步進行內部民調，盼設 定公投題目，據悉，討論項目包括安樂死、交通議題等，但目前尚未 正式定案。在飽受癌症所苦的前主播傅達仁遠赴瑞士結束生命後，安樂死議題 備受討論。\n\n民眾黨創黨主席柯文哲2024年「生與死」政見記者會中， 除了找後來被列不分區立委的陳昭姿談代理孕母外，也邀傅達仁兒子 傅俊豪談尊嚴善終議題，並允諾將代孕、安樂死列入政見。但安樂死涉及人權問題極為敏感，儘管藍綠白在立院都有提案，卻 遲無新進度。陳昭姿表示，民眾黨先前為安樂死做過民調，結果顯示 獲8、9成民眾支持，參與公聽會的外部專家、學者意見也很堅定，所 以黨團已於日前提「尊嚴善終法」草案並付委審查；\n\n儘管黨內目前尚 未拍板公投題目，但若最終決議推動安樂死公投，那便可進一步強化 民意基礎。曾在上屆連署過《尊嚴善終法》草案的藍委洪孟楷指出，非常樂見 安樂死議題舉行公投，因為當民代至今都會接到陳情，希望立院能推 動相關法案；過去有些人會用宗教或道德角度箝制此議題，導致行政 、立法都躊躇不敢推進，希望在不分黨派、沒有政治利益的考量下， 讓民眾可勇於決定自己希望的生活及社會環境。\n\n去年提《安樂死法》草案的綠委陳冠廷說，安樂死議題需要較嚴謹 的討論及社會對話，才能形成比較穩定的輿論意向，未來立法後也才 更具社會共識，這不是一個會期、一年就會有結論，希望盡量全面性 、廣泛性讓更多人參與討論。回到目錄"}, {"title": "8成安寧患者死在醫院 提倡在家善終 獎勵加碼至30%", "source": "中國時報 A04 生活綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台灣正式邁入超高齡社會，如何「死得其所」成為政策挑戰。據統 計，癌症、慢性病等使用安寧療護的患者，高達8成最後都是「死在 醫院」，僅2成得以在家走完最後一哩路。為提高居家安寧照護品質 ，衛福部預計今年提高給付獎勵最高30％，盼鼓勵醫護投入居家安寧 ，讓民眾更願意選擇在家善終。台灣安寧緩和醫學學會...", "full_text": "台灣正式邁入超高齡社會，如何「死得其所」成為政策挑戰。據統 計，癌症、慢性病等使用安寧療護的患者，高達8成最後都是「死在 醫院」，僅2成得以在家走完最後一哩路。為提高居家安寧照護品質 ，衛福部預計今年提高給付獎勵最高30％，盼鼓勵醫護投入居家安寧 ，讓民眾更願意選擇在家善終。\n\n台灣安寧緩和醫學學會26日舉辦「臨終醫療與善終倫理的公共對話 研討會」。衛福部長石崇良指出，根據健保署統計，每年約10萬人使 用安寧緩和服務，高達8成都是在醫院住院時使用，僅約2成是返家進 行居家安寧，仍有進步空間。石崇良表示，希望推動臨終病患居家安寧，終結末期與衰弱病患「 家裡、急診、病房」的旋轉門效應。\n\n今年將推動「論值計酬」方案， 在既有的安寧療護給付基礎上，將安寧團隊實地訪視成果分成良、優 、特優三等級，依序給予 10％、20％、30％的加成，且須有 6 成是給 安寧療護的團隊。預計今年底辦理評核結果評定會議，據以發放獎勵 金。安樂死議題未解，近年更有「斷食」爭議。\n\n台灣安寧緩和醫學學會 理事長程劭儀表示，斷食是以主動加速死亡進程為目標，已非自然死 ，不符善終定義。理論上，斷絕食物與水分必須由病人自主決定，對 晚期與末期病人調整營養和水分，都是希望支持舒適度和生活品質， 不宜強迫飲食，也不應勉強斷絕食物與水分。程劭儀指出，台灣深受「不能餓死」觀念影響，家屬常將點滴視為 「沒有放棄治療」的生命線，導致醫療決策更為複雜，有的醫師還會 過度輸液，一天給3到5包的生理食鹽水。\n\n國內4家醫學中心共同研究發現，一天給1瓶點滴（約250到500毫升 ）的病人，「善終分數」比不給水分的病人好；這點在國際上也有共 識，在台日韓37家安寧病房約2000人的研究中，一天給1瓶點滴的患 者，善終情況最舒適。醫學會將參考這項結果，出版末期病人人工水 分營養臨床準則。\n\n回到目錄"}, {"title": "官方看法 加工死有違醫生使命 衛福部不支持多數決", "source": "中國時報 A04 生活綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "北報導】藍白皆有意在年底提出公投，白營討論議題包括多年來充滿爭議的 安樂死。衛福部指出，世界醫師會（WMA）明確反對安樂死及醫師協 助自殺，無論動機如何，均與醫師專業使命相違。從事安寧緩和醫療的醫師也表示，安樂死又稱協助自殺，若合法化 ，等同容許人們的自主權大於生命權，也難保不會出現提前「下訂」 器...", "full_text": "北報導】藍白皆有意在年底提出公投，白營討論議題包括多年來充滿爭議的 安樂死。衛福部指出，世界醫師會（WMA）明確反對安樂死及醫師協 助自殺，無論動機如何，均與醫師專業使命相違。從事安寧緩和醫療的醫師也表示，安樂死又稱協助自殺，若合法化 ，等同容許人們的自主權大於生命權，也難保不會出現提前「下訂」 器官的對價關係，這是很嚴肅、複雜的議題。\n\n安樂死透過醫師處方，由他人協助或自行服用藥品終止生命。衛福 部認為，這與醫療專業「救人」的核心價值有所牴觸，亦可能影響醫 病關係信任基礎，國際醫學倫理主流未支持安樂死合法化。衛福部長石崇良表示，安樂死也就是協助結束生命的「加工死」， 涉及《刑法》，必須推動除罪化才能進行，但能否執行安樂死，目前 國內外意見都還很分歧。\n\n多年來國內推動安寧緩和醫療，希望讓臨終 病患在自我意識選擇下有尊嚴的善終，屬於「自然死」。萬芳醫院安寧病房主任張家崙指出，安樂死不是解決痛苦，而是結 束生命，等於容許人們的自主權大到可以決定自己的生死。他提出質 疑，怎麼判斷病人的選擇是病態或理性？\n\n即便是理性的，也可能受外 在因素影響，例如付不出醫藥費的人，可能因不想拖累家人而選擇安 樂死。張家崙也擔心，不排除會有人向準備安樂死的人「下訂」器官，產 生對價關係。民眾必須認清安樂死是加工死亡，這是非常嚴肅、複雜 的議題，若沒辦法管理好就會被濫用，產生違背道德、人性的事件。\n\n相關討論還不夠成熟，他不贊同貿然公投。衛福部表示，依我國現行法制，生命終結涉及刑事責任與醫療行為 界線，相關議題應透過專業審議、社會對話與立法程序逐步形成共識 ，而非簡化為多數決處理。回到目錄"}, {"title": "抗議監管雲 教團嗆石部長家先裝", "source": "中國時報 A04 生活綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "北報導】《兒童托育服務法》三讀通過，但因其中的「監管雲」涉及強制上 傳影像至雲端行為，引發家長、教師團體憂心過度侵犯隱私權。相關 團體26日赴立院前抗議，強調保護孩子應該是加強營造愛的環境、提 升教保人員培育，而不是廣設監視器、影像上傳雲端，並嗆聲衛福部 長石崇良先在家裝監視器供人調閱。石崇良回應，...", "full_text": "北報導】《兒童托育服務法》三讀通過，但因其中的「監管雲」涉及強制上 傳影像至雲端行為，引發家長、教師團體憂心過度侵犯隱私權。相關 團體26日赴立院前抗議，強調保護孩子應該是加強營造愛的環境、提 升教保人員培育，而不是廣設監視器、影像上傳雲端，並嗆聲衛福部 長石崇良先在家裝監視器供人調閱。石崇良回應，調閱影像須經過一 定法律程序，並非隨時可取閱。\n\n教團指出，不反對制定法規保護孩子，反對的是侵犯隱私權的政策 。現行制度下托育機構本就設有監視器，也會依法保留影像30日，若 有調閱需求也必定配合，無法理解為何還需要另外上傳至雲端，此舉 完全無助於提升幼童安全，反倒可能成為影像外流、隱私裸奔的危機 。家長團體認為，監管雲將儲存孩子換尿布、脫光光的影像，而這些 影像流向即便是家長也一無所知，難保未來不會有影像外流，當這些 監管雲影像外流被孩子看見時，作為家長要怎麼向孩子交代。\n\n教團呼籲，衛福部在後續子法訂定過程務必秉持三大原則，第一， 隱私必須保障，避免全面即時監控；第二，家長必須同意，影像上傳 與調閱必須以家長書面同意為前提；第三，調閱必須有限度，調閱者 限於事業主管機關或司法人員，僅在具體事證或調查需要時方可調閱 。\n\n倘若政府不願改善錯誤決定，不排除號召全國托育機構罷工抗議。石崇良昨回應，設立「監管雲」目的是避免機構的本地監視資料因 時間洗除或遺失，導致關鍵證據消失而無法進行調查。對於外界所憂 心的影像被濫用甚至流出，他解釋，影像並不是直接使用，主要目的 在於「備存」，且必須透過一定的法律程序才可以調閱，並非可以隨 時取閱的資料，因此不會有隱私洩露的問題，且就如同行車紀錄器或 閉路電視監視系統一樣，經過一段時間後，影像還是會被刪除，不會 永久留存。\n\n回到目錄"}, {"title": "變形團興起 禁團令剩政治宣示", "source": "中國時報 A05 財經綜合", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台灣民眾赴陸旅遊表面上有「禁團令」，實務上已成虛設，24 日有 台灣旅遊團在甘肅發生車禍，曝光禁團令後，由「地下團」再演化為 「變形團」的生態。業者直言，地下團模式讓旅客較沒保障，變形團 則幾乎與旅遊團一樣，禁團令只剩政治宣示作用，檯面下有太多操作 空間。台灣旅客赴大陸旅遊於民國107年達到巔峰，有...", "full_text": "台灣民眾赴陸旅遊表面上有「禁團令」，實務上已成虛設，24 日有 台灣旅遊團在甘肅發生車禍，曝光禁團令後，由「地下團」再演化為 「變形團」的生態。業者直言，地下團模式讓旅客較沒保障，變形團 則幾乎與旅遊團一樣，禁團令只剩政治宣示作用，檯面下有太多操作 空間。台灣旅客赴大陸旅遊於民國107年達到巔峰，有417.2萬人赴陸，1 08年略減為404.3萬人次。\n\n新冠肺炎疫情之後，即便有禁團令擋路， 112至114年的旅客量仍分別達176.1萬人次、277萬人次、323.7萬人 次。疫情解封後，旅客和業者盼不到赴陸禁團令解除，地下團模式開始 興起，也就是旅客表面上不找旅行社參團，而是找旅行社購買機票、 住宿，以自由行名義前往大陸後，所有人在機場集合成團，參加當地 地接社規畫的行程。不過，地下團並非由台灣的旅行社出團，旅客雖能自行購買旅遊平 安險，卻少了最高500萬元的旅行業責任保險，112年有台灣旅客在新 疆參加旅遊團遇車禍亡，就因為是參加地下團而難以索賠。\n\n後續旅行業者以交流、參訪團等名義出團，生意大好。此次甘肅車 禍，交通部觀光署加碼自爆「旅客親友自組團體」的潛規則。台灣海峽兩岸旅行發展協會理事長蕭博仁指出，禁團令限制旅行業 者不得主動攬客，但對於旅客間呼朋引伴，包括親友出遊、公協會參 訪、社團聯誼等，自己找上旅行社報名，則不違反禁令，還可安排導 遊、領隊，遇上糾紛、急難救助也有旅行社協助，實務上與過去的旅 行團一樣。\n\n蕭博仁說，地下團沒有保旅責險，但旅客自己上門、由旅行社代辦 的模式（變形團），則有完整保險機制，日前甘肅車禍的情況就屬於 此類，更足見禁團令名存實亡、早該廢除。回到目錄"}, {"title": "假網購無卡提款詐騙 暴增4倍 僅需序號或掃二維碼就可秒領 立委籲調降額度 警盼禁網銀截圖降外洩風險", "source": "中國時報 A06 社會綜合／專輯", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "報導】金融機構「無卡提款」功能，成為「假網購」詐騙集團新招。台北 市刑警大隊指出，詐團近期透過通訊軟體視訊截圖，取得被害人無卡 提款的二維碼，傳送給埋伏在提款機前的車手盜取現金，北市3月無 卡提領詐騙有95件，較2月的24件，暴增4倍。警方將與銀行等金融機 構協調，對金融APP螢幕截圖功能設限，降低...", "full_text": "報導】金融機構「無卡提款」功能，成為「假網購」詐騙集團新招。台北 市刑警大隊指出，詐團近期透過通訊軟體視訊截圖，取得被害人無卡 提款的二維碼，傳送給埋伏在提款機前的車手盜取現金，北市3月無 卡提領詐騙有95件，較2月的24件，暴增4倍。警方將與銀行等金融機 構協調，對金融APP螢幕截圖功能設限，降低二維碼外洩風險。\n\n無卡提款無需實體金融卡，透過銀行APP預約後，至提款機輸入序 號或掃描QR Code即可領現，無卡提款的序號與密碼就等同實體提款 卡。近期詐團利用無卡提款功能行騙，也引發立委關注，建議銀行降 低無卡提款限額，並建立異常提款延遲機制。據統計，北市自 114 年 9 月至 115 年 3 月，涉及無卡提款的詐騙案 449 件，大多始於網購平台與臉書社團，詐團扮演的假買家或假賣家，會 謊稱「因交易造成帳戶異常或被凍結」，要求被害人立刻操作無卡提 款功能，並提供「提款序號及密碼」，被害人一旦交出，車手約莫1 0至15分鐘內，就能成功盜領。\n\n此外，詐團也會利用LINE的視訊功能，要求被害人啟動「派對模式 」，被害人進入該模式後，手機畫面會同步分享給歹徒，當被害人打 開銀行APP顯示無卡提款的二維碼時，歹徒就會立刻截圖，傳給在提 款機旁待命的車手，若是遇到像郵局這類具有保護模式的APP，不能 透過視訊顯示二維碼或截圖，詐團也會改變話術，直接騙無卡提款的 序號及密碼。警方調查，無卡提款車手鮮少外籍人士，大多是本國籍，在詐團屬 於較核心的地位，深得集團信任。以往巡邏員警只要看見有人拿出多 張提款卡，便會加強盤查，無卡提款的車手身上沒有實體提款卡，作 案地點也不受限，打亂原本警方針對「提款熱點」的巡邏部署，增加 查緝難度。\n\n另外，整合多家銀行與電子支付的TWQR支付碼，同樣被詐團鎖定盜 刷。警方指出，將協調郵局、銀行與電支業者，推動在網銀 APP 的無 卡提款或電支頁面設定限制，防止螢幕截圖，避免被害人將重要畫面 傳送給詐團。回到目錄"}, {"title": "未理賠可退保費 金管會要查 憂心健康險變儲蓄險，將偏", "source": "工商時報 A05 綜合要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "北報導】壽險公司推出的防癌險設有「未理賠可退保費」機制被金管會盯上 。金管會保險局上周五發函給全體壽險公司，要全面清查「現行市售 含無理賠可退回保險費設計的保險商品」，限期本周內回覆。為鼓勵保戶維持健康，許多壽險公司推出的健康險商品，會設計「 未理賠的保戶回饋」機制，究竟是哪種回饋機制踩到金管會的監...", "full_text": "北報導】壽險公司推出的防癌險設有「未理賠可退保費」機制被金管會盯上 。金管會保險局上周五發函給全體壽險公司，要全面清查「現行市售 含無理賠可退回保險費設計的保險商品」，限期本周內回覆。為鼓勵保戶維持健康，許多壽險公司推出的健康險商品，會設計「 未理賠的保戶回饋」機制，究竟是哪種回饋機制踩到金管會的監理紅 線？\n\n引起業界熱議。對此，保險局26日回應，壽險商品的「無理賠回饋」通常採用「提 高保障額度」或「折抵保費」，若商品設計成生存保險金，將偏離無 理賠回饋的本質，且已產生銷售誤導，至於市場上到底還有哪幾公司 在銷售，保險局正在普查、進行了解中。據了解，市場現有幾種回饋機制，通常是保戶累積一定期間內未申 請理賠，保險金額會增加額度，舉例而言，當保單在一定時間內（如 3年，常見1～6年內）未申請理賠，保險公司會增加下次理賠的保險 金額，如增加20％，常見為10％至60％不等。\n\n過去業界也有部分保單的回饋設計是隨時間增加而遞增，保險金額 最高可以增至100％。例如，無理賠紀錄期間滿2年，增額比率為10％ ；無理賠紀錄期間滿3年，增額比率為20％；\n\n無理賠紀錄期間滿4年， 增額比率為 30％，依此類推。若保險公司約定「無理賠期間滿 3 年， 增額 20％」，原本當次保險金額為 10,000 元，增額後變為12,000元。近來有多家壽險業者推出「無理賠可退回保費」設計的防癌險商品 ，其機制設計成，只要保戶維持健康「無理賠紀錄」，滿期可領回比 年繳應繳保險費總額略高一些的保險費。\n\n壽險業者說明，壽險公司給予保戶的無理賠回饋機制十分常見，一 般是設計在醫療險商品上，鼓勵保戶維持健康，希望在合理範圍內不 要過度頻繁就醫，但保險局本波盯上的是具有未理賠退保費機制的癌 症險，屬於一性次的商品。但也有壽險業者認為，目前市場上這類的商品為數不少，保險局普 查過後，是否要求業者停售或調整商品機制，成為業界關注焦點。回到目錄"}, {"title": "專家解析 防癌險強化被保險人保障 非退還現金", "source": "工商時報 A05 綜合要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "金管會保險局對防癌險「未理賠退保費」機制產生疑慮，專家解析 ，最關鍵主因是，避免保險商品性質從保障轉向儲蓄；且健康險的保 險金邏輯上應屬替「被保險人」承擔可能的風險、並作為醫療費用的 損失補償，但若商品設計成「無理賠回饋金」給付給「要保人」，兩 者不見得是同一人（例如：父母幫子女投保），也牽涉到受益...", "full_text": "金管會保險局對防癌險「未理賠退保費」機制產生疑慮，專家解析 ，最關鍵主因是，避免保險商品性質從保障轉向儲蓄；且健康險的保 險金邏輯上應屬替「被保險人」承擔可能的風險、並作為醫療費用的 損失補償，但若商品設計成「無理賠回饋金」給付給「要保人」，兩 者不見得是同一人（例如：父母幫子女投保），也牽涉到受益人權益 。壽險專家認為，防癌險的保費是根據「預期會有一定比率的人理賠 」來精算定價的。\n\n若是加入了退費設計，等於隱性提高了保費成本， 只是容易被包裝成「健康就有獎勵」的話術進行銷售；長期下來可能 產生的問題包括商品訂價失真、保費不斷調漲（因為退費導致公司實 際成本上升）。更深一層探討，近年來主管機關希望將壽險商品從國人熱中的儲蓄 性質導向保障，因此，還本型保單（繳費期滿退回部分或全部保費） 在台灣受到嚴格的精算規範與費率限制。\n\n業者若把相同概念包裝在「 健康險」外殼下，等於繞過了對儲蓄型商品的監理要求，形成監理套 利。不過，國人對於「未理賠可拿回保險費」這樣的機制接受度頗高， 也是這類商品大行其道、持續推出熱銷的主要原因。綜合來看，商品設有鼓勵保戶健康的回饋機制，本身不必然是錯誤 的，同時也符合讓保險功能「從事後填補走向事前預防」的理念，一 般多用在多次給付型醫療健康險，在癌症險上做類似的設計是否妥適 則需再做討論。\n\n專家分析，癌症多半不是控制就可以預防的，商品設計鼓勵國人維 持良好的健康習慣、降低罹病及就醫需求立意良善，問題出在它讓健 康險變得更像儲蓄險，且退費對象和設算保費的基礎都有所扭曲，就 值得商榷。因此，保險局未來應不至於全面禁止回饋機制，而是在理解業界狀 態下，要求回歸「強化被保險人保障」\n的設計邏輯，例如無理賠可以 增加下一年保障額度或保費折抵等，而非是直接退還現金。回到目錄"}, {"title": "國銀激戰 富豪財管規模近2.4兆", "source": "工商時報 A05 綜合要聞", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "富豪財管激戰，加上國銀搶攻亞洲資產管理中心高雄專區，根據金 管會公布最新財管2.0業務，統計至今年3月底，已核准21家銀行辦理 高資產業務，還有六家已送件申請，累積高資產客戶數達23,206人、 資產管理規模（AUM）更已接近2.4兆元、達2兆3,999億元，人數、規 模年增率分別達71.97％、5...", "full_text": "富豪財管激戰，加上國銀搶攻亞洲資產管理中心高雄專區，根據金 管會公布最新財管2.0業務，統計至今年3月底，已核准21家銀行辦理 高資產業務，還有六家已送件申請，累積高資產客戶數達23,206人、 資產管理規模（AUM）更已接近2.4兆元、達2兆3,999億元，人數、規 模年增率分別達71.97％、55.16％，觀察多家銀行蓄勢待發，預計今 年規模可望順利突破3兆元，甚至挑戰3.5兆元。金管會主委彭金隆日前指出，台灣邁向亞資中心管理樞紐的關鍵， 包含擁有非常充沛的民間財富與資金、國人擁有非常強大的投資意願 跟投資動力，也已進一步研擬專法中，未來希望參考其他國家的成功 做法，一起整合，並分析其中有哪些適合台灣的部分，將包含商品面 、人才面等。富豪財管快速成長也驗證台灣民間財富與資金的充沛，並擁有強大 投資意願。\n\n金管會為力拚亞資中心，加速放行國銀開辦財管 2.0 業務 。銀行局副局長張嘉魁表示，截至 3 月底已開辦有 21 家，目前有六家 新申請案，觀察高資產業務較去年同期大幅成長，主要是更多銀行加 入，各銀行內部在人才培訓、商品研發設計、系統建置、內部規範制 度等方面都日漸成熟，對人數、業務量的成長都有很大幫助。金管會觀察，截至3月底整體高資產客戶AUM資產配置組合以存款為 主、占比達42.1％，基金占17％、債券占14.5％、保險占12.1％、境 外結構型商品占7.9％。\n\n其中，存款比重持續降低，主要是金融市場 投資氣氛轉佳，因此看好未來投資及資本市場，富豪理財增加配置至 其他部位。證期局統計，目前有 10 家券商開辦財管 2.0，至 3 月底累計戶數達 1 ,840 人，累計交易金額約 4,958 億元，年增率達51.82％、68.18％。證期局副局長黃仲豪說明，近一年券商積極推廣加上全球股債市表現 佳所以複委託量大，複委託投資海外交易量占86％，累計交易金額4 ,238億元。\n\n回到目錄"}, {"title": "台灣消費的寒冬", "source": "工商時報 D08 全球財經周報 經濟教室", "cat": "社論與評論觀點", "label": "EDITORIALS & OPINIONS", "priority": 0, "summary": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。這些年我們常會看到，經營許久的豆花店歇業，賣燈飾的小舖乏人 問津，很有口碑的咖啡館打烊，老字號的飯店吹熄燈號，這些故事天 天在街頭上演，有人認為這是數位轉型的結果，其實這...", "full_text": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。\n\n這些年我們常會看到，經營許久的豆花店歇業，賣燈飾的小舖乏人 問津，很有口碑的咖啡館打烊，老字號的飯店吹熄燈號，這些故事天 天在街頭上演，有人認為這是數位轉型的結果，其實這是消費走下坡 的徵兆。最近政府官員總以經濟成長、人均 GDP 超越日、韓而感到驕傲，不 少人都說股市熱絡會有財富效果，然而，去年民間消費低迷，哪來什 麼財富效果？依國民所得統計，1980年代民間消費平均每年成長9％ ，1990年代仍有7％，去年只有1.5％，股市大漲並沒有讓消費得到擴 張。\n\n財富集中日益嚴重去年經濟成長率8.7％，代表大家都更有錢了，何以消費弱到這步 田地？原因就在財富集中日益嚴重。當一億元為一人擁有，他一年再 怎麼花，終究花不完的，就算花個三千萬，還賸七千萬，消費能量怎 能不低？\n\n但當這一億分給一千人，每個人分到十萬後都會花光，一毛 不剩。同樣一億，一個人擁有與一千人擁有所創造的消費力道，哪個 大？不言可喻。\n\n辛棄疾說「千年田換八百主，一人口插幾張匙？」說的就是這個道 理，一個人再怎麼豪飲夜宴，再怎麼購買名車、買黃金珠寶，終究有 限，這就是何以有錢人消費傾向低，窮人消費傾向高的原因。多數人有個迷思，以為消費成長得靠有錢人，錯了，民間消費成長 的關鍵在於日常的小額消費，新車售價雖逾百萬，一年銷售不過7,6 00億，金飾珠寶有錢人最愛，一年不及400億，這些消費看似澎湃， 卻比不上小小一個便當。\n\n真的嗎？我們假設台灣有2,000萬人每天吃一個110元的便當，一年 下來便當的消費就高達8,000多億，比起汽車、珠寶黃金的消費多多 了。此外，依財政部統計，國人在咖啡館裡喝咖啡及買咖啡豆，去年 也花了300多億元，化妝品一年的消費更逾500億。\n\n這樣看來，吃便當 、喝咖啡、買化妝品這日常開銷比起買名車、買黃金珠寶對民間消費 的貢獻更大。日常開銷動能 走下坡然而，當國內有七成的人領不到平均薪資，工作貧窮日趨普遍，人 們就得省吃儉用，少吃一個便當，少喝一杯咖啡，少買一些化妝品， 看似小小的撙節，卻在無聲無息中窒息了消費動能。咖啡館、精品店 、書店、餐廳、文具店生意一落千丈，豈偶然哉？\n\n1980～2000年的台 灣沒有今天這麼有錢，可是消費活力遠勝於今天，原因就在於那個年 代GDP果實人人能分享。隨著資本經濟洗牌，贏者圈愈來愈小，貧富 差距愈來愈大，如此就算經濟成長、人均GDP睥睨全球，民間消費也 難以振衰起蔽。最後，拿民間消費占GDP比率與各國比一下，2000年台灣55％，低 於美國，而高於日、韓，消費是推升GDP的重要動能，去年台灣民間 消費占GDP比率降至43％，非僅不如日、韓、美，也拖累經濟成長。\n\n二十多年來到底發生什麼事，台灣消費動能何以一降再降，值得深思 。小檔案■依財政部營利事業銷售資料，2025年全新汽車零售額7,6 70億元。其他化妝品零售536億，香水及香粉零售6億。\n\n金銀飾零售2 45億、珠寶零售83億、金（銀）條及金（銀）塊及金（銀）幣金（銀 ）錠零售額30億。小檔案■辛棄疾：「千年田換八百主，一人口插幾張匙？」明詩： 「任君蓋下千間舍，一身能臥幾張床？\n\n」\n皆在說明一個人只有一張口 、一個身子，再怎麼消費，終究有限，萬貫家財集於一人之身，既無 處可消費，最後皆成為儲蓄，無法推升GDP。回到目錄"}, {"title": "3月信保融資金額 五年半次高", "source": "工商時報 A09 金融市場", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "今年雖有諸多不確定性，但主要機構預估今年國內景氣仍亮眼，企 業投資需求帶動資金潮，且 3 月因季底因素，及關稅不確定性及戰爭 等隱憂影響，企業融資需求大幅升溫。信保基金統計，3月承保金額 1,456.12億元，協助取得融資金額大增至1,740.62億元，終止連二月 下滑，且創2020年8月來逾五年半...", "full_text": "今年雖有諸多不確定性，但主要機構預估今年國內景氣仍亮眼，企 業投資需求帶動資金潮，且 3 月因季底因素，及關稅不確定性及戰爭 等隱憂影響，企業融資需求大幅升溫。信保基金統計，3月承保金額 1,456.12億元，協助取得融資金額大增至1,740.62億元，終止連二月 下滑，且創2020年8月來逾五年半次高水準，已連37個月單月均破千 億元。根據信保基金統計，去年融資金額1兆7,933億元，刷新史上最高紀 錄，今年融資金額不墜，第一季累計高達4,521.41億元，超越去年同 期3,835.21億元，創下史上同期新高紀錄，且年增幅達17.9％。\n\n銀行高層認為，今年國內景氣持續亮眼，包括主計處及央行等機構 都上修全年經濟成長率，中小廠商受到帶動，投資融資需求延續下， 信保每月融資金額仍會在相對高點。信保基金今年融資金額目標為 1.34 兆元，觀察信保統計，目前信保 融資金額每月至少都在 1,500 億元上下，以此估算，第三季應能提前 達成目標，全年再刷新史上新高機率大。信保強調，仍會配合政府推 行相關政策及專案而有所調整。\n\n銀行主管指出，3月是季底資金需求高峰期，又有關稅及戰爭等因 素，影響進口成本上揚，導致整體信保融資金額增加，4月影響逐步 趨緩，但廠商融資需求持續，整體金額應是持平，預期仍維持高檔表 現。銀行主管分析，國內出口超旺，3 月已經拉出連 29 紅，今年成長氣 勢可望持續，但仍須留意後續關稅影響，傳產接單仍不穩定。另外， 美伊戰爭雖利空鈍化，但打亂資本市場布局，是否對全球通膨帶來壓 力仍待觀察，將是今年投資動能變數。\n\n回到目錄"}, {"title": "國人信用卡月費 十年增幅逾3成", "source": "工商時報 A09 金融市場", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "根據聯徵中心統計，國人2026年1月平均每戶應繳信用卡費為3.85 萬元，相較2025年1月增加3.49％；與10年前相比，2016年1月平均每 戶應繳金額為2.88萬元，也代表近十年國人單月信用卡費增幅超過3 成、達33.68％。信用卡簽帳金額年年創高。據聯徵中心最新資料顯示，今年1月國 人平...", "full_text": "根據聯徵中心統計，國人2026年1月平均每戶應繳信用卡費為3.85 萬元，相較2025年1月增加3.49％；與10年前相比，2016年1月平均每 戶應繳金額為2.88萬元，也代表近十年國人單月信用卡費增幅超過3 成、達33.68％。信用卡簽帳金額年年創高。\n\n據聯徵中心最新資料顯示，今年1月國 人平均每戶持有信用卡張數4.56張，應繳帳款排除呆帳後，平均每戶 應繳金額為3.85萬元。1月以40歲到49歲族群平均應繳卡費4.9萬元最多，其次是50歲到5 9歲族群4.51萬元、30歲到39歲族群 4.49 萬元；持卡數亦為 40 歲到 49 歲族群最多、平均每戶持有 5.55 張，其次是 30 歲到 39 歲族群 5.26 張、50歲到59歲族群5.08張，儘管50歲到59歲族群持卡數低於30歲到39歲 族群，刷卡額卻較高，顯示其消費力更強。\n\n1月女性平均每戶應繳卡費4.12萬元，高於男性的3.96萬元；而女 性平均每戶持卡張數4.96張，僅略高於男性的4.52張，意味著男性對 於卡片忠誠度更高，刷卡火力更集中於特定幾張卡。此外，觀察2025年全年刷卡情形，單月平均每戶應繳卡費最高峰落 在8月及9月，分別為4.44萬元及4.03萬元，推測應與旅遊旺季消費需 求攀升有關，其中8月4.44萬元更超越2024年7月的4.1萬元，改寫歷年新高紀錄；\n\n年初1月、2月及年末10月、11月、12月平均每戶應繳卡 費則皆落在3.7～4萬元間，應與歲末年終節慶送禮、聚餐需求攀升有 關。回到目錄"}, {"title": "亞資中心業務 拚全台落地 金管會7月起開放部分項目全國適用 市場看好家族辦公室、境外私募基金銷售先放行", "source": "經濟日報 A02 話題", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "試辦近一年後，亞洲資產管理中心高雄專區將「走出高雄」。金管會已完成業者意見調查，規劃 7月起開放部分業務全國適用，市場看好家族辦公室、境外私募基金銷售兩大業務最先放行，全台資產管理市場將迎來新一波結構性開放，商機再起。金管會對亞資中心的政策路徑採「試辦、檢討、調整、落地」，目前已進入檢討收斂階段，預...", "full_text": "試辦近一年後，亞洲資產管理中心高雄專區將「走出高雄」。金管會已完成業者意見調查，規劃 7月起開放部分業務全國適用，市場看好家族辦公室、境外私募基金銷售兩大業務最先放行，全台資產管理市場將迎來新一波結構性開放，商機再起。金管會對亞資中心的政策路徑採「試辦、檢討、調整、落地」，目前已進入檢討收斂階段，預計 6月底前拍板、7月正式上路，要從「區域試驗」走向「全台落地」。\n\n市場預期，低風險、具需求的業務將優先落地。家辦與境外私募基金銷售，被視為最具成熟度與擴張性的兩大項目，銀行與投信投顧已有合作模式，可快速複製至全台。從實際成效來看，家辦已成專區核心動能。\n\n據金管會統計，從去年7月高雄專區試辦以來，到2月底共21家銀行進駐，總管理資產（AUM）突破3,700億元，其中家辦累計127組、受託資產超過500億元，顯示高資產客群需求強勁。業者指出，若家辦業務不再限高雄開戶，將可直接承接全台家族企業需求，不僅擴大服務半徑，也有助銀行提升財管手續費與資產規模，形成雙贏。另一亮點是境外基金銷售模式。\n\n透過銀行與投信投顧合作，引進未具證投信基金性質的境外基金，發展多通路銷售，不僅滿足高資產客戶多元配置需求，也被視為未來跨境財管的重要引擎。相較之下，融資業務仍待觀察。包括自行質借、金融資產組合融資（Lombard Lending）及保單、保費融資等，因風險控管與市場爭議較高，且部分業者剛起步，短期內仍可能留在專區內持續驗證。\n\n政策下一步將強化境外資產整合。金管會規劃整併OBU、OSU、OIU三大境外中心，成為OAMU（境外資產管理平台），打造一站式境外資產管理平台，並擬放寬境外私募基金的99人募集限制，提升市場規模與彈性。據金管會到4月中統計，已有56家業者進駐、二家審核中，另有六家銀行申請高資產財管執照，整體高雄專區版圖上看64家，跨銀行、壽險、券商與投信投顧，財管生態鏈逐步成形。\n\n市場指出，從低風險業務率先全台落地，台灣資產管理市場也將從區域試點，邁向全面開放的新階段。回到目錄"}, {"title": "公股銀放款中小企業 衝高 金額突破5.8兆元 年增2.4%兆豐、一銀成長最多 彰銀也揚升4.25%", "source": "經濟日報 A10 金融", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "截至今年2月底，國銀對中小企業放款餘額達10兆9,324億元，其中，前六大放款餘額皆由公股銀行包辦。合計八大公股銀行對中小企業放款餘額已突破 5.8 兆元，與去年同期相比年增 2.47%，從餘額年增率來看，兆豐銀、一銀分別年增6.45%及5.92%最多；臺銀、華銀、土銀則較去年同期相比略有衰退。...", "full_text": "截至今年2月底，國銀對中小企業放款餘額達10兆9,324億元，其中，前六大放款餘額皆由公股銀行包辦。合計八大公股銀行對中小企業放款餘額已突破 5.8 兆元，與去年同期相比年增 2.47%，從餘額年增率來看，兆豐銀、一銀分別年增6.45%及5.92%最多；臺銀、華銀、土銀則較去年同期相比略有衰退。\n\n根據金管會統計，截至今年2月底止，公股銀行對中小企業放款餘額當中，第一銀行放款餘額突破兆元大關、來到1兆152億元最高，其次是合庫銀行8,569億元、台灣企銀8,205億元緊追在後，華南銀行、兆豐銀行分別以7,587億元、7,429億元位居第四、第五名。合計八大公股銀行對中小企業放款餘額已突破 5兆8,881億元，占整體國銀比重超過五成。若以放款餘額與去年同期相比，兆豐銀行對中小企業放款餘額年增6.45%最多，其次是第一銀行年增5.92%，彰化銀行也年增4.25%；\n\n至於臺銀、華銀、土銀則較去年同期略有衰退，分別年減2.03%、1.73%及0.97%。針對中小企業放款餘額年減的主因，土銀表示，主要是因建築貸款受政府控管不動產授信政策影響，及建築貸款完工還款所致；華銀則表示，近年拓展中小企業新戶，以均衡資產及獲利結構為主軸，目前仍在調整過程，致中小企業放款餘額較去年同期略為減少。\n\n兆豐銀行指出，整體資金需求主要反映總體經濟環境變化，受惠於人工智慧應用持續發展，相關供應鏈及周邊產業資金需求相對穩定，另外，美伊戰爭情勢已從區域衝突升級為全球能源與供應鏈的系統性風險，因航程延長、運費飆漲造成高油耗與進出口依賴度高的產業成本及資金周轉壓力，相關產業放款需求也增加。第一銀行則指出，中小企業新增放款又以製造業最為突出，受惠全球景氣回溫，營運資金、周轉性融資需求增加，同時部分企業配合政策性貸款與補助方案，提升整體融資意願；放款減少較多的產業則是住宿及餐飲業，主要是因疫情期間申辦的紓困貸款陸續到期並完成清償所致。\n\n合庫銀行也說，中小企業放款增加較多的產業分別為電力供應業及不動產開發業；減少較多的產業則是短期住宿業、水產品批發業，增減原因主要是受到產業市場變化、景氣循環等因素影響。台企銀則以電力供應業（離岸風電為大宗）與AI應用相關產業表現最為突出。\n\n回到目錄"}, {"title": "台日產業政策鏈結 聚焦5領域合作", "source": "自由時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "label": "GOVERNMENT & POLICY", "priority": 0, "summary": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯學的局勢下，台日基於戰略同盟所擘劃的國家級產業政策鏈結，換言...", "full_text": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯學的局勢下，台日基於戰略同盟所擘劃的國家級產業政策鏈結，換言之，台日合作已從民間企業自發行為，上升到國家產業政策的高度。產發署說明，該計畫鼓勵台日企業投入具前瞻性、創新性及應用潛力的研發合作專案，聚焦五大領域，一是智慧科技，包括光電及半導體技術、人工智慧、物聯網、第五／第六代行動及衛星通訊技術、資安與數位應用服務等；\n\n二是智慧製造，涵蓋高階自動化、工業機器人技術、先進製程整合等；三是材料與生物科技，包括奈米材料、高機能材料、綠色化學、生技醫藥、光電融合材料、重要礦物等；四是自主移動載具，包括無人機、無人車、服務型機器人等；\n\n五是綠能科技，包括儲能系統、再生能源、節能減碳設備技術與服務等。產發署說，為確保計畫品質與雙邊合作實效，技術審查著重四大面向，一是計畫整體可行性與執行能力，二是技術瓶頸突破性、預期成果成熟度與未來商品化應用潛力及國際市場需求的對接性，三是台日雙邊互補與互利的合作效益，四是符合本次徵案的五大重點補助領域。產發署補充，這項計畫申請時程自公告日起至今年六月三十日止，申請標的僅適用於企業尚未開發的研發計畫；\n\n合作的日本廠商資格須是在日本當地有營業登記的企業，並已向日本政府提出與本計畫合作相關的申請補助。回到目錄"}, {"title": "打敗大盤 台股熱 主動式ETF規模狂飆 擁有主動選股優勢 第一季整體規模達2982億元、季增72%", "source": "聯合報 A06 話題", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "台灣主動式ＥＴＦ（指數股票型基金）市場急速壯大，短短一年已成為資本市場最受矚目的新興力量。市場人士評估，依照台股表現，主動式ＥＴＦ規模本月有機會突破三千五百億元，相較去年底翻倍。根據投信投顧公會統計，截至今年三月底，國內主動式ＥＴＦ整體規模達二九八二億元，較去年底的一七三○億元已經暴增逾千億元，季增...", "full_text": "台灣主動式ＥＴＦ（指數股票型基金）市場急速壯大，短短一年已成為資本市場最受矚目的新興力量。市場人士評估，依照台股表現，主動式ＥＴＦ規模本月有機會突破三千五百億元，相較去年底翻倍。根據投信投顧公會統計，截至今年三月底，國內主動式ＥＴＦ整體規模達二九八二億元，較去年底的一七三○億元已經暴增逾千億元，季增幅高達七成二；\n\n而四月受惠台股上揚，市場規模最大、國內首檔主動式ＥＴＦ主動統一台股增長（00981A），截至四月中已達一二九六億元，加上後續募集的ＥＴＦ，券商分析，整體規模本月有機會突破三千五百億元，上半年則上看五千億元。投信業者指出，主動式台股ＥＴＦ今年以來績效普遍亮眼，原因在於台股行情結構性分化明顯。光通訊、ＡＩ測試、散熱等少數強勢族群漲幅動輒五成以上，其他族群卻相對平淡，這種「強者極強」的行情，正是主動選股最能發揮之處。\n\n相較於被動式ＥＴＦ須依固定時程調整成分股，主動式ＥＴＦ的經理人得以視盤勢隨時調整持股結構，將資金集中布局最強勢的標的，不必等待季度審核才能換股。在台股今年這種贏家集中、輸家明顯的市場環境下，選股彈性的價值被充分放大，也讓主動式ＥＴＦ的平均報酬率得以大幅領先大盤。此外，業者表示，被動式ＥＴＦ依指數規則配置，本就力求貼近市場表現，走勢相對穩定、成本也較低。\n\n簡單來說，被動式ＥＴＦ是「跟著市場走」，主動式ＥＴＦ則是「由人來做決策」，投資人需在報酬潛力與穩定性之間取捨。據悉，統一投信旗下台股主動式ＥＴＦ「統一台股升級50（00403A）」上周三到五完成募集，共募得七八四億元，預計五月十二日掛牌；業界估算，隨著00403A掛牌，加計其他商品持續擴張，主動式ＥＴＦ整體規模突破五千億元大關指日可待。\n\n去年五月首檔主動式ＥＴＦ商品掛牌，至年底累計規模已達一七三○億元；今年起增速再度加快，短短一季即再增逾千億元，受益人數從不到九十三萬人躍升至一三五萬人，顯示這波熱潮已從早期嚐鮮族擴散至更廣泛的投資人群。從亞太視野來看，台灣主動式ＥＴＦ的成長速度同樣引人矚目。\n\n彭博資訊與晨星統計，截至今年三月底，亞太地區ＥＴＦ市場規模達二點三五兆美元，台灣整體ＥＴＦ規模為二五六○億美元，其中主動式ＥＴＦ僅八十億美元，約占總規模百分之三。相較南韓六三○億美元，占比近百分之廿五，台灣主動式ＥＴＦ占總規模的比重仍有成長空間。回到目錄"}, {"title": "金管會祭台積電條款 台股今拚4萬點 法人：慎防震盪", "source": "中國時報 A05 財經綜合", "cat": "台灣產業與投資動向", "label": "INDUSTRY & INVESTMENT", "priority": 0, "summary": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股 價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬 點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬 點「一定會到」，但根據過往經驗，近關情怯恐難避免，屆時中小個 股震盪幅度勢必加大，仍須慎防殺盤。金管會放寬...", "full_text": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股 價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬 點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬 點「一定會到」，但根據過往經驗，近關情怯恐難避免，屆時中小個 股震盪幅度勢必加大，仍須慎防殺盤。\n\n金管會放寬股票型基金、主動式ETF對台積電持股上限，帶動24日 台積電股價以2190元及2185元創下盤中及收盤新天價，推升台股盤中 攻上38989.94點新高，終場勁揚1218.25點，創下史上第5大單日漲點 ，以38932.4點作收，再創收盤新高，接下來將直取4萬點。法人指出，美伊戰事還在打，美國總統川普每天講的也都不一樣， 但市場對此利空似乎已經鈍化，台股更在AI題材加持下，持續走自己 的路，美股24日多數收紅，那斯達克和標準普爾500指數再度改寫歷 史新高，外在環境都營造台股持續走高的能量。富邦投顧董事長陳奕光指出，金管會放寬股票基金、主動式ETF對 台積電持股上限，可望帶動台積電股價走高，加上台積電權值高，將 帶動台股挑戰4萬點大關，甚至更高；\n\n而美股4大指數近期創新高，台 股會有比價效應，只要前波高點35579點未跌破，仍屬偏多格局。永豐投顧則說，外資持續加碼，內資受主動式ETF持續加碼買入， 融資融券同步增加，多頭氣勢充足，而台股在上周五成功收復上影線 站上歷史新高後，可先觀察能否站穩38900點，若能成功站穩，上攻 空間就可打開。也有法人認為，在台積領軍下，台股出現「漲不停」的大多頭行情 ，但居高思危的壓力並非沒有，以台股上周五大漲 1218.25 點來看， 台積電、台達電、聯發科三檔就貢獻了 1020的漲點，同時卻有 1224檔 股票下跌，有84檔股價還創月新低，顯示極不均衡。\n\n法人指出，大盤乖離率過高，且因短時間內急速暴漲，市場浮現「 擦鞋童理論」疑慮，當開戶人數、交易人數屢創新高，貪婪情緒升溫 ，隨時都可能反轉下殺，就像上周四出現衝高後急殺，高低點價差1 757點，這種震盪隨台股愈近4萬點，愈有可能頻繁發生。回到目錄"}, {"title": "財經會客室 跨境支付 讓世界更易走進台灣", "source": "中國時報 A07 生活理財", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "良口述、記者黃琮淵整理／】財金公司正式啟動「TWQR Inbound服務」，宣告我國QR Code共通 支付標準TWQR不僅已整合國內銀行、電支機構二大支付體系，也與日 本、新加坡國際錢包攜手合作，啟動「全球支付 匯聚台灣」的全新 扉頁，讓世界更容易走進台灣，行動支付跨境合作再展歷史新頁。根據觀光署...", "full_text": "良口述、記者黃琮淵整理／】財金公司正式啟動「TWQR Inbound服務」，宣告我國QR Code共通 支付標準TWQR不僅已整合國內銀行、電支機構二大支付體系，也與日 本、新加坡國際錢包攜手合作，啟動「全球支付 匯聚台灣」的全新 扉頁，讓世界更容易走進台灣，行動支付跨境合作再展歷史新頁。根據觀光署統計，去年來台旅客總人數已達到857萬人次，較前年 成長了9％，其中台、日、星三國地理位置鄰近，不僅是重要的經貿 合作夥伴，民間的交流互動更是無比密切，日本更是來台旅客數量最 多的國家。藉由共同推動「TWQR」行動支付服務，不僅是台日星金融 合作的一大躍進，更具重大的指標意義，台灣可以藉由支付網絡來連 結世界。\n\n過去國際旅客來台，常面臨換匯不便、小額支付困難的問題，從今 天起將徹底改變，未來國際旅客來台，不再需要苦惱換匯、找零，只 需要掃碼，說走就走，隨時都可以來台灣，感受台灣的美麗與活力；這不只是單純支付功能的開通，更是台灣、日本、新加坡等鄰近國家 ，數位金融服務合作的重要里程碑，透過高度友善的跨境支付服務， 讓觀光旅遊就像在家鄉消費一樣，方便、快速、無差別。在日本市占率超過6成、用戶數突破7300萬的行動支付龍頭PayPay 將率先導入，屆時廣大的日本用戶來台，可以直接在全台逾40萬家標 示「TWQR」的商店掃碼支付。\n\n緊接著，新加坡國家級支付網路NETS也 將接力上線，支援超過1100萬的星國用戶來台使用，為我國商家帶來 了極為可觀的「新客」與商機。「TWQR Inbound 服務」的啟用，象徵我國行動支付正式邁向「跨 境雙向支付時代」，國際旅客來台觀光旅遊，不再需要苦惱換匯、找 零問題，直接使用原本慣用的國外行動支付錢包，就可以在全台標示 有「TWQR」商店消費購物，從四大超商、百貨公司、免稅商店、珍珠 奶茶、在地商圈到夜市小吃，彈指間就可以完成掃碼支付，不僅大幅 提升商家收款的便利性，更能進一步帶動商業經濟嶄新動能，也讓每 一位來到台灣的旅客，都能像在自己國家一樣方便消費。而外國旅客趴趴走、隨意掃碼「購」的指標店家將自本月份陸續上 線，包括四大超商、台北101、微風等百貨公司；\n\n昇恆昌、采盟等免 稅商店；最台味的寧夏夜市、九份老街、迪化街、及柯達大飯店與六 福村樂園等觀光景點；以及江記華隆、如邑堂、林信一福堂、山田咖 啡店等在地美食，從吃到買都能無縫接軌，未來也將有更多店家陸續 導入，為國際旅客建構一個高度友善的觀光環境，讓外國旅客在台灣 付款方便、快速、SOEASY。\n\n財金公司會在主管機關指導，銀行公會、電支公會的協力推動下， 將持續優化與日本、新加坡的雙向支付體驗，並積極拓展東南亞、港 澳等地區的交流合作，讓台灣與鄰近國家的支付夥伴們共同建構安全 、友善、便利的跨境支付網絡，逐步實現讓民眾出境「一碼掃通」、 讓國外旅客入境照碼全收。回到目錄"}, {"title": "數位帳戶十年 走入打詐死胡同 交易額度下降 嚴審開戶市場飽和", "source": "中國時報 A07 生活理財", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "講到「數位帳戶」你一定不陌生，從台新銀行民國105年發表數位 品牌Richart迄今，數位帳戶在台發展已整整十年，網路世代習慣線 上解決生活大小事，都讓數位帳戶成為年輕族群開戶首選。不過在詐 騙案件盛行，政府要求銀行配合打詐的壓力下，這幾年數位帳戶開始 「自廢武功」，從降低交易額度，到嚴審開戶，似乎...", "full_text": "講到「數位帳戶」你一定不陌生，從台新銀行民國105年發表數位 品牌Richart迄今，數位帳戶在台發展已整整十年，網路世代習慣線 上解決生活大小事，都讓數位帳戶成為年輕族群開戶首選。不過在詐 騙案件盛行，政府要求銀行配合打詐的壓力下，這幾年數位帳戶開始 「自廢武功」，從降低交易額度，到嚴審開戶，似乎走進了有志難伸 的死胡同裡。根據金管會統計，截至114年底，共有36家國銀開辦數位帳戶，開 戶數達2819.2萬戶，幾乎是每個國人都至少有一個數位帳戶。\n\n前五大 開戶行分別為台新銀行Richart、國泰世華、連線銀行（LINE Bank） 、第一銀行iLeo及永豐銀行DAWHO，開戶數都在200萬戶以上。台新銀行是數位帳戶始祖，2016年以全新數位品牌Richart數位銀 行與數位信用卡@GoGo悠遊御璽卡共同上市的作法，開啟了數位帳戶 的戰國時代，整合儲蓄、投資、支付三大產品功能，祭出一般通路消 費1.5％、數位通路消費3.5％現金回饋的誘因，更掀起申辦熱潮，進 而奠定台新在數位帳戶無法撼動的地位。國泰世華銀行最早切入數位帳戶是以獨立的 KOKO App 為核心，提供 免費轉帳、提款次數及社群支付等功能，但隨著產品整併，KOKO品牌 整併至國泰世華CUBE App，近幾年改以「國泰世華數位存款帳戶」為 名，雖然沒有特別著重數位帳戶業務，但呈現穩定成長。\n\n限縮功能 誘因降低永豐銀行在108年推出DAWHO（大戶）數位帳戶品牌，以便利及優惠 的存款理財、信用卡消費回饋獲得年輕世代青睞，被視為市面上整合 度最高的數位帳戶，更透過金控優勢，結合永豐金證券推出「大戶投 」、「大戶豐」，將數位帳戶觸角從銀行延伸至證券及投信。至於在前五名唯一的公股行庫，則是近年在數位金融上相當賣力的 第一銀行，iLEO 數位帳戶功能涵蓋台幣、外幣、基金等金融服務，與 時下最夯的行動支付，並搭配iLEO信用卡上可愛的小粉獅，提供刷卡 消費5％現金回饋，在競爭激烈的數位帳戶戰場殺出一條生路。各銀行數位帳戶百家爭鳴，但近年數位帳戶似乎陷入停滯，開始進 入飽和階段，除了因為「想開戶的都開了」，加上銀行行銷推廣活動 與優惠減少，開數位存款的誘因降低；\n\n另一個最致命因素，恐是因為 詐騙盛行，各銀行為配合政府打詐，只得限縮數位帳戶功能。有志難伸 非戰之罪這波限縮令始於113年，中國信託銀行先是調降數位帳戶提款限額 ，從每日12萬元降成每月12萬元，創下金融機構調降提款上限先例， 也是首家針對數位帳戶提款「開鍘」的銀行。隨後再對轉帳功能下手 ，約定轉入僅限5組，如果不敷使用，將要求轉為一般存款帳戶。\n\n眼看民營銀行出手，公股行庫隨即跟進，針對認證強度最低的第三 類數位帳戶，大砍每日提款限額，台銀由15萬元砍半至8萬元、兆豐 銀則由12萬元縮至1萬元，彰銀則降至每日5萬元、每月15萬元。一夕 間殺聲隆隆，各銀行都為了給出打詐成績，只能犧牲用戶權益。面對數位帳戶陷入打詐、防詐的壓力，如今顯得有志難伸，銀行主 管坦言「這是非戰之罪」，但也坦言隨著數位帳戶飽和，加上各銀行 不可能無止盡撒錢，想發展數位帳戶，恐得揚棄過去的補貼作法，找 出更新穎、更貼近用戶的新業務來突破，且能避免遭詐團濫用。\n\n從台新銀行推出Richart數位品牌，幾乎與數位帳戶畫上等號，走 過了十年發展，到如今數位帳戶已是「人手一戶」，吸引力不若以往 ，要衝高開戶的難度大幅拉高，更重要的是，如何讓數位帳戶穩定使 用，避免變成呆戶，這挑戰更甚過往，不比過去十年輕鬆。回到目錄"}, {"title": "純網銀助攻 延續數位帳戶熱潮", "source": "中國時報 A07 生活理財", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "數位帳戶蓬勃發展，除疫情期間開戶數飆速成長，民國110年起陸 續開業的純網銀，在延續產品熱潮更是功不可沒。其中連線銀行（L INE Bank）挾LINE生態圈優勢，在衝高開戶數上尤為顯著，114年底 已達229萬戶，更躋身全台跨行轉帳前十大銀行，居數位帳戶榜第三 名，僅次於台新、國泰世華，爆發力相當...", "full_text": "數位帳戶蓬勃發展，除疫情期間開戶數飆速成長，民國110年起陸 續開業的純網銀，在延續產品熱潮更是功不可沒。其中連線銀行（L INE Bank）挾LINE生態圈優勢，在衝高開戶數上尤為顯著，114年底 已達229萬戶，更躋身全台跨行轉帳前十大銀行，居數位帳戶榜第三 名，僅次於台新、國泰世華，爆發力相當驚人。三家純網銀雖在疫情後開業，已面臨市場漸趨飽和的壓力，但靠著 「特色功能」，仍吸引不少嚐鮮客群。\n\n樂天商銀主打「傳承日本20年 純網銀經驗」，依會員等級每月享有跨提、跨轉、日本提款等免手續 費優惠，雖用戶數成長較為緩慢，但呈現穩定上揚趨勢。被視為「國家隊」的將來銀行，為集外匯、基金、美股、保險、房 貸、信貸、存款、支付及繳費等9大金融服務於一身的純網銀，不僅 提供一站式金融平台，從開業時的帳號自由選，到獨創的「N倍券」 放大，話題不斷，去年開辦的美股碎股投資服務，更令人耳目一新。將來銀行為強化品牌能見度，今年更找來羽球天后戴資穎（小戴） 擔任年度品牌大使，藉此延續「純網銀就是將來、將來就是純網銀」 的訴求，近期也攜手中華電信，藉電信繳款紀錄等資料，對「信用小 白」推出信貸利率減碼優惠等，展現獨特的普惠金融影響力。\n\nLINE Bank主打24小時不間斷的全業務服務，包括24小時跨行轉帳 、24小時全自動信用貸款、24小時換匯、24小時跨境匯款、24小時基 金申購贖回、24小時預購申購新募集ETF、24小時視訊客服，藉超過 200萬的開戶數，穩坐全台跨行轉帳前十大銀行，展現後來居上之勢 。LINE Bank瞄準貸款需求，積極整合數據優化放款流程和申貸速度 ，過去3年信貸餘額成長速度居市場第二，24小時可申貸、可撥款， 最快7分鐘到帳，刷新對純網銀的想像，也將數位帳戶推向「以產品 取勝」的競爭新局。除三家純網銀，很多人也會將幾乎沒有實體分行的王道銀行納入比 較。\n\n王道銀前身是台灣工銀，105年轉型商銀，並推出「O-BANK」的 數位銀行品牌，與台新Richart同期，原本希望搭上數位帳戶熱潮助 攻轉型，不過因一系列的策略失當，導致迄今開戶僅67萬戶。王道銀行106年發表數位帳戶時，曾發下豪語5年內成國內第一大網 銀，初期氣勢不錯，但卻因誤判用戶需求，如王道銀行欠缺ATM，但 數位帳戶初期卻僅提供跨轉優惠，等於存戶仍得負擔存提款費用，手 續費比利息還多，小資族覺得入不敷出，開戶之後便捨棄不用。此外，王道銀行不發信用卡、只發簽帳金融卡，雖然靠著換卡面、 異業合作，勉強博些版面，但效果有限，也因與台灣以信用卡為主力 的趨勢背道而馳，難以像台新、永豐發揮加乘效果；\n\n而112年普發60 00元爆發的「偷跑之亂」，更重挫其形象，相當可惜。回到目錄"}, {"title": "川普取消特使：伊朗想談可打電話", "source": "工商時報 A02 火線焦點", "cat": "其他重要國內外事件", "label": "KEY EVENTS", "priority": 0, "summary": "導】美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談 行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川 普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願 ，但拒絕被迫接受條件。川普取消派出特使威特科夫（Steve Witkoff）和女婿庫許納（Ja red K...", "full_text": "導】美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談 行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川 普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願 ，但拒絕被迫接受條件。\n
