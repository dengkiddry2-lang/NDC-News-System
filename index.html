<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPC Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7;
  --black: #000; --dark1: #1d1d1f; --dark2: #161617;
  --white: #fff; --offwhite: #fbfbfd;
  --border: rgba(255,255,255,0.1); --border-b: rgba(0,0,0,0.08);
  --tw: #f5f5f7; --tw2: #a1a1a6; --tw3: #6e6e73;
  --tb: #1d1d1f; --tb2: #6e6e73; --tb3: #86868b;
  --blue: #0071e3; --must: #ff3b30;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); font-family: -apple-system,'SF Pro Display','Helvetica Neue','Noto Sans TC',sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; color: var(--tb); }

/* ── GLOBAL NAV ── */
#gnav {
  height: 44px; background: rgba(0,0,0,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; position: sticky; top: 0; z-index: 900; gap: 0;
}
.gnav-left { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.gnav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
.gnav-name { font-size: 15px; font-weight: 600; color: var(--tw); letter-spacing: 0.02em; }
.gnav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; gap: 0; flex: 1; justify-content: center; }
.gnav-tabs::-webkit-scrollbar { display: none; }
.gnav-tab {
  padding: 0 14px; height: 44px; border: none; background: none;
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55);
  cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: color 0.15s; letter-spacing: 0.02em;
}
.gnav-tab:hover { color: var(--tw); }
.gnav-tab.active { color: var(--tw); }
.gnav-date { font-size: 11px; color: var(--tw3); flex-shrink: 0; }

/* ── HERO ── */
.hero-block {
  background: var(--black); text-align: center;
  padding: 100px 24px 72px; border-bottom: 1px solid var(--border);
}
.hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tw3); margin-bottom: 20px; }
.hero-headline { font-size: 72px; font-weight: 700; letter-spacing: -0.05em; line-height: 1.0; color: var(--tw); margin-bottom: 16px; }
.hero-sub { font-size: 21px; color: var(--tw2); font-weight: 300; margin-bottom: 56px; letter-spacing: -0.01em; }
.hero-kpis { display: flex; justify-content: center; gap: 72px; padding-top: 40px; border-top: 1px solid var(--border); }
.kpi-val { font-size: 52px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
.kpi-val.red { color: var(--must); }
.kpi-val.blue { color: var(--blue); }
.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--tw3); margin-top: 8px; }

/* ── HIGHLIGHTS STRIP ── */
.highlights-section { background: var(--offwhite); padding: 40px 0 36px; border-bottom: 1px solid var(--border-b); }
.highlights-eyebrow { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; color: var(--tb); text-align: center; margin-bottom: 24px; }
.highlights-scroll {
  display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none;
  padding: 0 24px; scroll-snap-type: x mandatory;
}
.highlights-scroll::-webkit-scrollbar { display: none; }
.highlight-card {
  flex-shrink: 0; width: 160px; background: var(--white);
  border-radius: 18px; padding: 22px 18px; cursor: pointer;
  border: 1px solid var(--border-b); scroll-snap-align: start;
  transition: transform 0.2s, box-shadow 0.2s;
}
.highlight-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.highlight-card.highlight-must { background: var(--must); border-color: transparent; }
.highlight-card.highlight-must .hl-label,
.highlight-card.highlight-must .hl-value { color: #fff; }
.hl-label { font-size: 13px; font-weight: 600; color: var(--tb); margin-bottom: 6px; letter-spacing: -0.01em; }
.hl-value { font-size: 13px; color: var(--tb3); font-weight: 400; }

/* ── CATEGORY BRICKS ── */
#brick-grid {
  background: var(--bg); display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px; padding: 12px;
}
.brick {
  border-radius: 22px; min-height: 440px;
  padding: 48px 40px; display: flex; flex-direction: column;
  justify-content: flex-end; cursor: pointer; position: relative;
  overflow: hidden; transition: transform 0.25s cubic-bezier(.25,.46,.45,.94);
}
.brick:hover { transform: scale(1.01); }
.brick-full { grid-column: 1 / -1; min-height: 480px; justify-content: center; align-items: flex-start; }
.brick-dark { background: var(--dark1); }
.brick-light { background: var(--white); border: 1px solid var(--border-b); }

.brick-must-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--must); border-radius: 22px 22px 0 0; }
.brick-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 14px; }
.brick-title { font-size: 26px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.2; color: var(--tw); margin-bottom: 10px; }
.brick-full .brick-title { font-size: 34px; }
.brick-light .brick-title { color: var(--tb); }
.brick-summary { font-size: 15px; color: var(--tw2); line-height: 1.6; margin-bottom: 24px; }
.brick-light .brick-summary { color: var(--tb2); }
.brick-cta-row { display: flex; gap: 24px; align-items: center; }
.brick-cta { font-size: 17px; color: var(--blue); font-weight: 400; letter-spacing: -0.01em; }
.brick-cta2 { font-size: 17px; color: var(--tw2); font-weight: 400; letter-spacing: -0.01em; }
.brick-light .brick-cta2 { color: var(--tb2); }

/* ── CATEGORY VIEW ── */
#cat-view { display: none; background: var(--bg); min-height: 100vh; }
.cat-nav {
  background: rgba(245,245,247,0.88); backdrop-filter: blur(20px);
  height: 44px; display: flex; align-items: center;
  padding: 0 22px; gap: 16px; border-bottom: 1px solid var(--border-b);
  position: sticky; top: 44px; z-index: 800;
}
.cat-nav-title { font-size: 14px; font-weight: 600; color: var(--tb); letter-spacing: -0.01em; }
.back-btn {
  background: none; border: none; font-size: 17px; color: var(--blue);
  cursor: pointer; font-family: inherit; padding: 0; display: flex;
  align-items: center; gap: 2px; transition: opacity 0.15s;
}
.back-btn:hover { opacity: 0.7; }

/* News rows in cat-view */
#cat-news-list { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }
.news-row {
  background: var(--white); border-radius: 18px; margin-top: 12px;
  overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid var(--border-b);
}
.news-row:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.news-row-inner { padding: 28px 32px; position: relative; }
.row-must-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--must); }
.row-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.row-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; color: var(--tb); margin-bottom: 10px; }
.row-summary { font-size: 14px; color: var(--tb2); line-height: 1.65; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.row-footer { display: flex; align-items: center; justify-content: space-between; }
.row-source { font-size: 12px; color: var(--tb3); }
.row-cta { font-size: 14px; color: var(--blue); }

/* ── ARTICLE VIEW ── */
#article-view { display: none; background: var(--white); min-height: 100vh; }
.article-nav {
  background: rgba(255,255,255,0.88); backdrop-filter: saturate(180%) blur(20px);
  height: 44px; display: flex; align-items: center; padding: 0 22px;
  border-bottom: 1px solid var(--border-b); position: sticky; top: 44px; z-index: 800; gap: 16px;
}
.article-nav-cat { font-size: 13px; color: var(--tb3); margin-left: auto; }
.article-hero {
  background: var(--white); padding: 72px 24px 48px; text-align: center;
  border-bottom: 1px solid var(--border-b);
}
.article-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; }
.article-headline { font-size: 44px; font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; color: var(--tb); margin-bottom: 20px; max-width: 760px; margin-left: auto; margin-right: auto; }
.article-source { font-size: 14px; color: var(--tb3); }
.article-summary-block {
  background: var(--offwhite); border-bottom: 1px solid var(--border-b);
  padding: 32px 24px;
}
.article-summary-block > * { max-width: 680px; margin-left: auto; margin-right: auto; }
.art-summary-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 10px; }
.art-summary-text { font-size: 17px; color: var(--tb2); line-height: 1.7; font-weight: 400; letter-spacing: -0.01em; }
.article-body { max-width: 680px; margin: 0 auto; padding: 52px 24px 100px; }
.article-body p { font-size: 19px; line-height: 1.9; color: var(--tb); margin-bottom: 1.5em; font-weight: 400; letter-spacing: -0.01em; }
.article-body p:last-child { margin-bottom: 0; }

/* responsive */
@media (max-width: 720px) {
  .hero-headline { font-size: 48px; }
  .hero-sub { font-size: 17px; }
  .hero-kpis { gap: 32px; }
  .kpi-val { font-size: 40px; }
  #brick-grid { grid-template-columns: 1fr; }
  .brick { min-height: 340px; padding: 36px 28px; border-radius: 18px; }
  .brick-title { font-size: 22px; }
  .brick.brick-full .brick-title { font-size: 26px; }
  .article-headline { font-size: 30px; }
  .article-body p { font-size: 17px; }
  .gnav-tabs { display: none; }
  .gnav-date { display: none; }
}

</style>
</head>
<body>

<!-- GLOBAL NAV -->
<nav id="gnav">
  <div class="gnav-left">
    <span class="gnav-dot"></span>
    <span class="gnav-name">EPC</span>
  </div>
  <div class="gnav-tabs" id="gnav-tabs"></div>
  <span class="gnav-date" id="gnav-date"></span>
</nav>

<!-- HOME VIEW -->
<div id="home-view">

  <!-- HERO -->
  <section class="hero-block">
    <p class="hero-eyebrow">National Development Council · Economic Planning Division</p>
    <h1 class="hero-headline">一眼掌握。</h1>
    <p class="hero-sub">今日經濟訊號，重點整理完成。</p>
    <div class="hero-kpis">
      <div>
        <div class="kpi-val red" id="kpi-must">12</div>
        <div class="kpi-label">Must Read</div>
      </div>
      <div>
        <div class="kpi-val blue" id="kpi-total">59</div>
        <div class="kpi-label">Today's Total</div>
      </div>
      <div>
        <div class="kpi-val" id="kpi-cat">6</div>
        <div class="kpi-label">Categories</div>
      </div>
    </div>
  </section>

  <!-- HIGHLIGHTS STRIP -->
  <section class="highlights-section">
    <p class="highlights-eyebrow">看這裡，畫重點。</p>
    <div class="highlights-scroll" id="highlights-scroll"></div>
  </section>

  <!-- CATEGORY BRICKS -->
  <div id="brick-grid"></div>

</div><!-- end home-view -->

<!-- CATEGORY VIEW (drill-down) -->
<div id="cat-view">
  <div class="cat-nav">
    <button class="back-btn" onclick="closeCatView()">&#8249; 返回</button>
    <span class="cat-nav-title" id="cat-view-title"></span>
  </div>
  <div id="cat-news-list"></div>
</div>

<!-- ARTICLE VIEW (full-page reading) -->
<div id="article-view">
  <nav class="article-nav">
    <button class="back-btn" onclick="closeArticle()" id="art-back-btn">&#8249; 返回</button>
    <span class="article-nav-cat" id="art-nav-cat"></span>
  </nav>
  <div class="article-hero">
    <p class="article-eyebrow" id="art-cat"></p>
    <h1 class="article-headline" id="art-title"></h1>
    <p class="article-source" id="art-source"></p>
  </div>
  <div class="article-summary-block" id="art-summary-block">
    <p class="art-summary-label">三句重點</p>
    <p class="art-summary-text" id="art-summary"></p>
  </div>
  <div class="article-body" id="art-body"></div>
</div>

<script>
const DATA = [{"title": "取消美伊談判行程 強調未必代表會重啟戰爭 川普：已收到伊朗新提案", "source": "經濟日報 A01 要聞", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫與女婿庫許納原定25日前往巴基斯坦首都伊斯蘭馬巴德，與伊朗代表團會談，但在伊朗外長阿拉奇25日離開巴基斯坦後，川普同日在社群媒體發文表示，「我才剛取消我的代表團到伊斯蘭馬巴德與伊朗人會面的行程，浪費太...", "full_text": "美國與伊朗衝突將在本周屆滿兩個月，美國總統川普25日表示，已取消特使團原定赴巴基斯坦與伊朗展開會談的行程，並聲稱他取消行程不到10分鐘後，美國就收到一份新文件，內容比伊朗的原先提案好很多。但荷莫茲海峽依然幾近停擺，僵局難解。川普的特使威科夫與女婿庫許納原定25日前往巴基斯坦首都伊斯蘭馬巴德，與伊朗代表團會談，但在伊朗外長阿拉奇25日離開巴基斯坦後，川普同日在社群媒體發文表示，「我才剛取消我的代表團到伊斯蘭馬巴德與伊朗人會面的行程，浪費太多時間在旅途，工作也太多，他們的『領導階層』內部激烈內鬥，沒有人知道誰在主導，連他們自己都不清楚」。\n\n他之後接受媒體採訪時說，「沒理由在那邊（伊斯蘭馬巴德）等兩天，讓人花16、17個小時在旅程上，我們不打算那樣做。如果他們（伊朗）想談，可以打通電話來」，但這未必代表美國會重啟戰爭。他也說，在他取消行程的不到10分鐘後，美國就收到一份新文件，內容比原先好很多。\n\n伊朗國營電視台則指出，阿拉奇並未安排與美方會晤。阿拉奇也在社群媒體發文表示，巴基斯坦之行「收穫豐碩」，已提出「永久結束戰爭的可行架構」，但質疑「美國是否真心渴望外交」。伊朗政府的聲明表示，伊朗總統裴澤斯基安透過電話告知巴基斯坦總理夏立夫，德黑蘭不會在封鎖的威脅下展開「被施壓的協商」，美國應先解除海上封鎖，雙方才能開始奠定和解的基礎。\n\n美軍25日在阿拉伯海攔截一艘遭制裁的船舶，伊朗也繼續以小型砲艇組成的「蚊子船隊」威脅商船，荷莫茲海峽通行量依然接近零。"}, {"title": "＜財經週報-本週熱點＞ 景氣燈號有望連4紅 首季拚雙位數成長", "source": "自由時報 A09 財經週報", "cat": "台灣總體經濟與數據", "priority": 1, "summary": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會先前公布的數據，2月景氣燈號綜合判斷分數升至40分，創下2024年5月以來、近22個月新高。", "full_text": "題報導本週有兩大重要數據公布，首先國發會將公布3月景氣燈號，預期在外貿、內需、金融市場持續熱絡下，景氣燈號有望再亮出第4顆紅燈；此外，行政院主計總處也將發布第一季國民所得概估，受出口表現優於預期激勵，首季經濟成長率可望挑戰雙位數。觀察國發會先前公布的數據，2月景氣燈號綜合判斷分數升至40分，創下2024年5月以來、近22個月新高。\n\n其中，工業及服務業加班工時轉為紅燈，貢獻2分；製造業營業氣候測驗點則因春節工作天數減少轉為黃藍燈，減少1分，其餘指標維持不變，使整體景氣續呈熱絡格局。儘管 2 月底中東衝突升溫推升國際油價，為後續景氣增添變數，但在政府穩定油價機制啟動，以及出口動能強勁、股市續創新高支撐下，預期3月景氣燈號仍有機會維持紅燈表現。\n\n另一方面，主計總處將公布第一季國民所得概估。依據2月最新預測，今年經濟成長率由3.54%大幅上修至7.71%，當時預估今年四季經濟成長率分別為11.46%、9.3%、7.76%、3.09%。其中，第一季可望因基期因素有雙位數的成長，之後逐季下滑。\n\n3月出口發威第一季GDP挑戰去年12.65%高牆3月雖然中東戰事爆發，不過受惠於AI需求應用持續擴張以及部分廠商提前拉貨效應發酵，財政部日前公布3月出口達801.8億元，創歷年單月新高，第一季出口規模1,957.4億美元，亦刷新歷史紀錄，並比主計總處預估值多了148億美元。在出口表現大幅優於預期，內需市場也維持穩定下，第一季GDP成長率可望站穩雙位數水準；至於是否能挑戰去年第四季12.65%、創下38年新高的紀錄，仍有待後續數據揭曉。"}, {"title": "又要普發現金？》藍再提稅收超徵修法 強調「還稅於民」制度化", "source": "自由時報 A04 政治新聞", "cat": "台灣總體經濟與數據", "priority": 1, "summary": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國民黨團於廿四日院會又提出相關修法，逕付二讀，交付黨團協商。對此，國民黨團人士表示，過去都是一次性的發放，目前在野黨推動的是把「還稅於民」制度化，讓未來只要稅收明顯超徵，就有一套明確、透明的機制，把多收...", "full_text": "導〕立法院財政委員會去年三月初審通過預算法增訂第八十一條之一條文草案，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但全案保留送院會協商，去年八月立法院會決議另定期處理後，擱置至今。不過，立法院國民黨團於廿四日院會又提出相關修法，逕付二讀，交付黨團協商。對此，國民黨團人士表示，過去都是一次性的發放，目前在野黨推動的是把「還稅於民」制度化，讓未來只要稅收明顯超徵，就有一套明確、透明的機制，把多收的錢回饋給全民，這是建立可長可久的民生保障制度。\n\n國民黨團人士指出，行政院的態度始終比較保守，甚至可以說是抗拒。因為一旦制度化，就代表財政的運用要受到規範，不能再由行政部門自由裁量。現在的情況是，錢什麼時候發、發多少，幾乎完全由行政院決定，這其實就是把權力集中在少數人手上。\n\n國民黨團人士強調，他們不是為了短期討好，而是要建立一個公平原則：稅收來自人民，當政府多收了，就應該在合理門檻下回到人民手中，而不是變成政府可以任意運用、甚至擴張支出的工具。國民黨團廿四日於院會提案指出，鑑於自二○二一年起，全國賦稅收入實際金額皆超過該年度預算預估三千億元以上。為明確化政府超徵預算的運用，爰擬具「預算法增訂第八十一條之一條文草案」，明定超徵稅收的優先用途與分配順序，以制度解決亂象。\n\n國民黨團並提議抽出此案逕付二讀，由於朝野無異議，逕付二讀，交付黨團協商。提案稱，「全年實徵淨額達到當年度預算編列數一一五％時，應優先弭平當年度歲入歲出之差短；如有賸餘，應辦理普發現金。\n\n」提案說明，稅收是人民交給政府處理公眾事務的資金。如果政府的預算執行完畢後還有顯著賸餘，這部分「多收的錢」在法理上應該回饋給國人。因此，稅收超徵達一定數額，應將一定的比例普發現金。"}, {"title": "伊朗：荷莫茲不恢復戰前狀態", "source": "中國時報 AA02 焦點新聞", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返回伊朗。真主黨一再敦促黎巴嫩退出停火談判，並警告任何協議都將缺乏全國共識，最近以色列發動的強力攻擊，進一步考驗與黎巴嫩之間脆弱的停火協議。", "full_text": "美國總統川普23日宣布以色列和黎巴嫩將停火延長3周，但以色列近日對黎巴嫩真主黨目標發動強力攻擊，令停火受到挑戰，黎巴嫩國家媒體報導，以色列 25 日對黎巴嫩南部至少 4 處發動攻擊，造成 6 人死亡、17 人受傷。另外，美軍中央司令部25日發聲明指出，美軍在阿拉伯海攔截一艘遭制裁的商船，並迫使船隻返回伊朗。真主黨一再敦促黎巴嫩退出停火談判，並警告任何協議都將缺乏全國共識，最近以色列發動的強力攻擊，進一步考驗與黎巴嫩之間脆弱的停火協議。\n\n黎巴嫩衛生部25日公佈的數據顯示，自3月2日黎以戰火重燃以來，以色列對黎巴嫩發動的攻擊已造成2496人死亡。以色列軍方稱，6名死者都是真主黨成員，包括消滅3名駕駛著裝滿武器車輛的真主黨成員，以及一名騎電動機車的真主黨成員，並在其他地點擊斃另外兩名武裝人員。另外，美軍中央司令部25日發聲明說，當天早些時候，美軍平克尼號飛彈驅逐艦出動直升機攔截一艘受到美國制裁的商船。\n\n據了解，這艘名為塞凡號（M／V Sevan）的油輪，是美國財政部24日制裁的19艘與伊朗有關的「影子艦隊」船隻之一，制裁原因是這些船隻涉嫌向海外市場運輸價值數十億美元的伊朗能源、石油和天然氣產品，包括丙烷和丁烷等。中央司令部指出，美軍持續執行進出伊朗港口船隻的封鎖。自封鎖措施實施以來，已有 37 艘船隻被迫改變航道。\n\n美伊雙方持續對荷莫茲海峽進行封鎖，已造成國際能源價格居高不下，據伊朗媒體 26日報導，伊朗伊斯蘭議會第二副議長尼克札德（Ali Nikzad）表示，伊朗最高領袖穆吉塔巴已明確下令，荷莫茲海峽不得恢復戰前狀態。"}, {"title": "美關鍵參議員不再阻撓 華許接掌Fed最大障礙沒了", "source": "工商時報 A02 火線焦點", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查，替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員會與全院擁有充足時間批准他的任命案。美國哥倫比亞特區檢察官皮洛（Jeanine Pirro）上周表示，已要求聯準會監察長仔細審查總部裝修超支問題後結束調查，但強調「若事實證明有必要，也會重啟調查」。", "full_text": "美國司法部24日宣布撤銷對聯準會（Fed）主席鮑爾的刑事調查，替美國總統川普提名的接班人選華許（KevinWarsh）清除政治障礙。參議院本周及5月11日當周都會開會，這意味著：參議院銀行委員會與全院擁有充足時間批准他的任命案。美國哥倫比亞特區檢察官皮洛（Jeanine Pirro）上周表示，已要求聯準會監察長仔細審查總部裝修超支問題後結束調查，但強調「若事實證明有必要，也會重啟調查」。\n\n司法部撤銷對鮑爾的調查，為華許提名案在國會通過鋪平道路。北卡羅來納州共和黨參議員、手握參院銀行委員會關鍵一票的提里斯（ Thom Tillis）26日表示，願意結束對聯準會主席提名人華許的阻撓。共和黨在參院銀行委員會擁有13比11的多數席位，提里斯的投票非常重要，因所有民主黨議員都拒絕在調查結束前審議此案。\n\n該委員會尚未宣布推進此提名案的表決日期。在華許21日的聽證會上，提里斯將寶貴質詢時間用於解釋翻修成本，而非盤問這位提名人，他表示：「你的資歷非常出色，無可挑剔。讓我們結束這項調查，我才能支持你的任命案。\n\n」 皮洛保留「重新啟動調查」權利的說法引發質疑，調查究竟是真的結束或僅是暫停？鑒於川普政府處理其他法律案件的立場反覆無常，兩者差別對鮑爾而言十分重要。鮑爾的任期將於5月15日屆滿，稍早他曾表示，若屆時繼任者尚未就任，將繼續代理主席。\n\n此外，鮑爾身為Fed理事的任期要到2028年1月才會結束。依慣例，卸任主席在繼任者宣誓就職時，也會一併辭去理事，但法律並未強制要求。若鮑爾留任理事，便可繼續作為決策單位聯邦公開市場委員會（FOMC）投票成員，一直到美國期中選舉甚至是川普第二任期最後一年。"}, {"title": "Fed本周開會 將以「鷹眼」緊盯通膨訊號 鮑爾可能暗示降息門檻高", "source": "經濟日報 A02 話題", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "美國及所有七大工業國集團（G7）本周都將召開利率決策會議，預料都將維持利率不變，聯準會（Fed）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員一同以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調將隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）28日開會，預料維持基準利率於0.75%。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於6月升息1碼。", "full_text": "美國及所有七大工業國集團（G7）本周都將召開利率決策會議，預料都將維持利率不變，聯準會（Fed）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員一同以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調將隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）28日開會，預料維持基準利率於0.75%。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於6月升息1碼。\n\nFed和加拿大央行都將於台灣時間30日發布利率決策，預料將位處觀望模式，等待及觀察中東情勢發展。Fed決策官員在3月會議後的發言已轉趨審慎，一些原先對降息持開放態度的「鴿派」官員現在也強調通膨上升風險，就連1月傾向降息的理事沃勒，近來都直接表示伊朗戰爭對能源價格的衝擊，並擴大成本壓力。美國參議院近期將針對Fed新任主席提名人華許人事案進行表決，若在5月15日前批准，本周將是鮑爾5月15日卸任前最後一次主持決策會議，鮑爾預料將暗示今年底前降息的門檻相當高。\n\n美國29日將公布的通膨指標3月個人消費支出（PCE）平減指數，預料將顯現中東戰爭對通膨的衝擊，3月核心PCE指標將月升0.3%，年升幅從3.0%升高到3.2%，促使決策官員更加高度警戒通膨預期是否快速升高。彭博經濟學家預期，Fed可能維持現行利率直到今年第4季。歐洲央行（ECB）與英國央行30日也將公布利率決策，幾乎能確定將釋出與Fed類似的訊息。\n\nECB近來從鷹派到鴿派官員似乎都認為應該按兵不動，先觀察伊朗戰爭結果與干擾的持續時間，預料將維持存款利率於 2%，可能會將升息延到6月，總裁拉加德預估將對各種選項都持開放態度。英國央行則可能保持基準利率在3.75%，但可能有兩位官員提出異議、主張升息1碼。彭博經濟學家認為，該央行今年都將維持利率不變。\n\n各大央行雖以國內經濟情勢為關注焦點，但荷莫茲海峽的動向也可能一部分決定貨幣政策的路徑。"}, {"title": "荷莫茲封閉 金融市場掀連鎖反應 波灣各國主權基金重新評估支出次序 優先聚焦國內經濟 恐衝擊全球投資交易", "source": "經濟日報 A06 國際", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "伊朗戰爭所致荷莫茲海峽實質封閉，即將進入第三個月，波灣國家因原油出口受阻而收入下滑，促使各國主權財富基金重新評估支出優先次序，可能衝擊全球投資交易。同時，航運危機持續加深。航運業者表示，即使是最佳情況下，這條航線也要好幾個月才能恢復正常。", "full_text": "伊朗戰爭所致荷莫茲海峽實質封閉，即將進入第三個月，波灣國家因原油出口受阻而收入下滑，促使各國主權財富基金重新評估支出優先次序，可能衝擊全球投資交易。同時，航運危機持續加深。航運業者表示，即使是最佳情況下，這條航線也要好幾個月才能恢復正常。\n\n英國金融時報（FT）報導，全球十大主權財富基金有六家位於波灣，包括阿布達比投資局（ADIA）、沙烏地阿拉伯公共投資基金（PIF）及卡達投資局（QIA），共掌管價值近5兆美元的財富，協助為許多大型交易提供融資。但在波灣國家遭遇伊朗的軍事攻擊、及荷莫茲海峽封閉致使收入下滑後，主權財富基金正重新評估資產組合與部署策略。PitchBook數據顯示，北美與歐洲至少有價值1,060億美元，仍卡在波灣國家還沒完成的承諾，懸而未決。\n\n銀行業人士預期，波灣國家至少將暫停部分投資，以優先聚焦國內經濟，這些主權財富基金支出模式即便只有小幅變動，都會對金融市場造成連鎖效應。此外，美國與伊朗對荷莫茲海峽的「雙重封鎖」，已使這條關鍵水道的每天通行船隻降到接近零。一些業界主管表示，美國戰艦在該海域攔截船隻，促使伊朗加強以「蚊子」砲艇的威脅封閉海峽，導致波灣更加動盪。\n\n高盛分析師團隊指出，波灣各國的原油產量已經比戰前減少57%；即便海峽重新開放，恢復期也需要好幾個月。高盛全球事務主管柯恩表示，他最近前往沙烏地阿拉伯、卡達、阿聯開會，當地人士表示荷莫茲海峽不太可能恢復正常，即便在長期間仍可能如此。\n\n柯恩指出，縱使伊朗政權垮台，荷莫茲海峽也不會恢復到一開始的情況，也許會有部分船隻通行，但伊朗可能會維持部分管控、或維持片面控制。日本商船三井社長田村城太郎表示，原先預期戰局短期內就將結束，但迄今已持續七周以上，實際而言可能要一些時間才能解除情況；他認為全世界將不會恢復舊觀。\n\n船東及管理人員表示，目前有數百艘船陷在波斯灣內，受困船員高達 2萬人；船上食物及飲水供應無缺，一些船員也因為雇用合約到期而離船，但很難找到替換船員，而且價格昂貴。"}, {"title": "緊盯通膨 Fed年底前降息 門檻很高 美國及G7央行本周舉行決策會議 預料利率不變", "source": "聯合報 A06 話題", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "美國及所有七大工業國集團（Ｇ7）本周都將舉行利率決策會議，預料都將維持利率不變，聯準會（Ｆｅｄ）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）廿八日開會，預料維持基準利率於百分之○點七五。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於六月升息一碼。", "full_text": "美國及所有七大工業國集團（Ｇ7）本周都將舉行利率決策會議，預料都將維持利率不變，聯準會（Ｆｅｄ）主席鮑爾預料將在任內最後一次決策會議，暗示今年底前降息的門檻很高，與其他央行官員以「鷹眼」緊盯能源價格高漲引燃通膨的訊號，強調隨時準備採取行動，不再樂觀認為通膨升高只是「過渡」現象。日本銀行（央行）廿八日開會，預料維持基準利率於百分之○點七五。日銀官員過去一周來的發言都傾向抑制市場對於本周升息的預期，多數經濟學者預料日銀將於六月升息一碼。\n\n聯準會和加拿大央行都將於台灣時間卅日發布利率決策，預料將進入觀望模式，等待及觀察中東情勢發展。彭博經濟學家預期，聯準會可能維持現行利率直到今年第四季。美國聯邦參議院近期將針對聯準會新任主席提名人華許人事案進行表決，若在五月十五日前批准，本周將是鮑爾五月十五日卸任前最後一次主持決策會議，鮑爾預料將暗示今年底前降息的門檻相當高。\n\n歐洲央行（ＥＣＢ）與英國央行卅日也將公布利率決策，幾乎能確定將釋出與聯準會類似的訊息。ＥＣＢ預料將維持存款利率於百分之二，可能會將升息延到六月，總裁拉加德預估將對各種選項都持開放態度。英國央行則可能保持基準利率在百分之三點七五，彭博經濟學家認為，英國央行今年都將維持利率不變。"}, {"title": "荷莫茲效應 凸顯全球化未告終 油價、糧食及供應鏈危機從美中到非洲都不能倖免", "source": "聯合報 A09 全球瞭望", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "美國與以色列於2月28日對伊朗展開聯合軍事打擊，雙方雖斷斷續續宣布停火2周，但荷莫茲海峽船舶數量仍未顯著恢復，油價、糧食及供應鏈危機也持續延燒，讓能源自主的美國飽受國內油價上漲之苦，反映出「全球化已死」雖在後冷戰時期不斷迴盪於耳，但全球化不會告終。油價飆漲逾半美國人有感美國總統川普再度上任後，地緣政治的變動、貿易政策不確定性創新高，以及美國創下 1930年代以來最高水平的關稅，國際企業經營更具挑戰，貿易成本更高，也讓外界預測全球化將在後...", "full_text": "美國與以色列於2月28日對伊朗展開聯合軍事打擊，雙方雖斷斷續續宣布停火2周，但荷莫茲海峽船舶數量仍未顯著恢復，油價、糧食及供應鏈危機也持續延燒，讓能源自主的美國飽受國內油價上漲之苦，反映出「全球化已死」雖在後冷戰時期不斷迴盪於耳，但全球化不會告終。油價飆漲逾半美國人有感美國總統川普再度上任後，地緣政治的變動、貿易政策不確定性創新高，以及美國創下 1930年代以來最高水平的關稅，國際企業經營更具挑戰，貿易成本更高，也讓外界預測全球化將在後冷戰時期告終。但曾任教哈佛大學的卡拉貝爾博士4月10日投書華盛頓郵報，指出伊朗衝突反倒凸顯全球經濟整合的程度前所未見之高。\n\n全球商品市場，特別是石油、天然氣及化學肥料等關鍵大宗商品市場依舊高度整合，即使美中等經濟巨人也無法免於價格與供應鏈的衝擊。早在1970年代，美國就努力降低依賴進口石油帶來的脆弱性。到了2010年代末期，美國因投資開採頁岩油、液化天然氣及生產乙醇，成為能源淨出口國，而俄國2022年攻打烏克蘭與歐盟限制進口俄國石油，進一步降低美國對單一供應商的依賴。\n\n即使美國能源產量充足，仍無法擺脫荷莫茲航運中斷帶來的能源價格與供應鏈衝擊。據美國能源資訊署統計，其國內原油消費仍有近 3 分之 1 依賴進口。隨著能源價格飆漲，美國本土生產原油多為輕質原油，僅適合提煉汽油，用於生產柴油、航空燃油等其他石油產品的效率較低，仍需進口重質原油及相關成品。\n\n這讓美國國內油價受到全球供需與交易員預期心態的衝擊，飽受國際油價飆漲之苦。據益普索與路透 3月20日的美國民調中，55%的受訪者說汽油價格上漲對其家庭財務狀況造成一定程度影響；其中，21%的受訪者說受很大的影響。\n\n供應鏈中斷恐釀長期通膨美國哈佛大學教授馬丁4月8日也投書紐約時報，表示眼下是水稻等糧食作物耕種季節，而尿素、氨等化肥原料短缺代表可能減產與漲價。新冠肺炎期間的經驗顯示，這類供應鏈中斷引發長期的通膨飆漲，衍生抵押貸款利率上升、財政危機到政治動盪等一系列副作用。中低收入國家將首當其衝。\n\n食品與能源價格上漲在美國等富裕國家是經濟壓力與政治動盪；但在其他國家可能是生死關頭。在非洲之角，進口化肥短缺更加深部分國家本已有的糧食危機。\n\n這證明全球能源、大宗商品及供應鏈仍高度相互依存，無論全球化是否失敗，國與國的互賴仍是當前現實。避開荷莫茲中東拚新建設此外，中東國家正投注於後荷莫茲時代的韌性建設，興建新基礎設施以避開荷莫茲海峽。如沙烏地阿拉伯紅海港與擴建後的東西輸油管線，避開荷莫茲連接波斯灣與紅海；\n\n阿聯東海岸富查伊拉港與管線則連接波灣產油國與印度洋，阿曼發展杜格姆港與蘇哈爾港，避開荷莫茲海峽。商品與能源已循這些路線流通，部分則通過跨境陸橋。這顯示眼下全球化並無終結跡象，僅是既有全球貿易網路的重組與再配置。\n\n阿聯商業與慈善特使賈法 4月7日投書金融時報說，將關鍵商業活動由荷莫茲轉移他處，可降低全球供應鏈風險。對歐洲、亞洲及非洲來說，意味著減少供應衝擊與關鍵資源取得更可靠，投資者與民間基礎建設開發商則藉此協助建造下半個世紀輸送全球貿易的走廊。現代汽車執行長穆尼奧斯 4 月8 日接受彭博資訊訪問表示，現代汽車正著手調整全球船隊路線，避開荷莫茲海峽，繞道非洲南部好望角，這樣的規畫讓南韓運往歐洲組裝廠的關鍵零件，運輸時間增加 10至15天。\n\n海運路線改變導致成本上升與物流瓶頸，不影響對美國西海岸的出口，卻干擾歐洲、北非及中東貨運。這加速現代汽車自全球化採購轉型至區域化生產群聚模式。在歐洲，現代汽車正評估零件在地化取得，減少依賴中東航線，這也符合歐盟要求電動車零件在地採購 70%的規定。\n\n這意味在汽車市場中，傳統全球化模式可能瓦解，朝區域化加速競爭。"}, {"title": "動能改善 陸GDP增長 外資機構上調至4.9% 全球地緣政治風險上升之際 看好人民幣資產由「可選配置」轉向重要組成", "source": "聯合報 A11 兩岸", "cat": "地緣政治與國際衝突", "priority": 1, "summary": "大陸第一季多項經濟運行指數表現超過預期，多家外資機構近期紛紛調高大陸今年全年ＧＤＰ增長數據，並把人民幣資產正由「可選配置」逐步轉向全球資產配置的重要組成。據大陸國家統計局多項數據，第一季大陸經濟增長超預期，內需亦呈現改善，第一季固定資產投資年增百分之一點七，其中基建投資與製造業投資均有所回升。此外，出口勢頭強勁及房地產市場企穩等因素下，多國機構陸續更新對大陸經濟與出口前景評估。", "full_text": "大陸第一季多項經濟運行指數表現超過預期，多家外資機構近期紛紛調高大陸今年全年ＧＤＰ增長數據，並把人民幣資產正由「可選配置」逐步轉向全球資產配置的重要組成。據大陸國家統計局多項數據，第一季大陸經濟增長超預期，內需亦呈現改善，第一季固定資產投資年增百分之一點七，其中基建投資與製造業投資均有所回升。此外，出口勢頭強勁及房地產市場企穩等因素下，多國機構陸續更新對大陸經濟與出口前景評估。\n\n德意志銀行大中華區首席經濟學家熊奕及其團隊在最新研報中表示，將二○二六年大陸全年實際ＧＤＰ增長預測上調○點四個百分點至百分之四點九，名義ＧＤＰ增長預測則上調至百分之六點五，為二○二二年以來最高水準。熊奕指，大陸經濟今年第一季呈現「量價齊升」態勢，通膨回升趨勢確立，有助改善企業盈利與居民收入。在消費方面，渣打銀行大中華及北亞首席經濟學家丁爽認為，政策正由短期刺激轉向長期機制建設，包括提升居民收入、完善社保體系及拓展服務消費，以穩定內需並降低預防性儲蓄。\n\n熊奕亦指出，娛樂休閒、醫療保健與公共服務等領域仍具較大成長空間，若能持續突破，將有助提升整體內需動能。券商中國指出，在地緣政治持續波動下，大陸第一季經濟數據優於預期，提升全球資金配置大陸資產意願。多家外資機構認為，隨著大陸經濟動能改善、內需結構優化與制度型開放推進，人民幣資產正從「可選項」逐步轉向「必選項」，長期配置趨勢愈加明確。\n\n報導稱，在全球地緣政治風險上升背景下，資金正尋求美元以外的配置標的。丁爽表示，當前境外投資者尋找可替代安全資產的需求較為強烈，人民幣資產吸引力正在提升，未來將成為全球資產配置中不可或缺的一部分，有望成為全球資產配置的重要組成。摩根士丹利中國首席經濟學家邢自強近期則表示，在全球再配置趨勢下，資金正逐步降低對美元資產依賴，大陸資產有望持續吸引外資流入。"}, {"title": "科技巨頭財報周登場 牽動市場波動 超級央行周 鮑爾最後談話成焦點", "source": "中國時報 A05 財經綜合", "cat": "國際金融與貨幣政策", "priority": 1, "summary": "全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時持平，但政策訊號將為後續利率走向提供重要線索。日銀決策28日率先登場，市場預估將維持短期利率在0.75％不變。", "full_text": "全球市場本周迎來「超級央行周」的關鍵時期，美國聯準會（Fed）、日銀、歐盟、英國和加拿大央行將密集公布利率決策。由於近日中東戰事推升能源價格、全球通膨再起，市場普遍預期各國利率暫時持平，但政策訊號將為後續利率走向提供重要線索。日銀決策28日率先登場，市場預估將維持短期利率在0.75％不變。\n\n儘管政策本身不變，但外界普遍預測日銀可能透過會後聲明或季度報告釋出偏鷹訊號，為最快6月升息鋪路。隨後聯準會將在台北時間30日凌晨公布利率決議，市場預估利率仍維持在3.5％至3.75％。在燃油成本飛漲的情況下，美國開始出現延後徵才、消費者信心走弱的跡象。\n\n分析稱，即便油價漲勢趨緩，整體物價仍處高檔，短期內不適宜降息。芝商所FedWatch工具亦顯示，聯準會年底仍維持現行利率的機率超過60％。值得留意的是，聯準會主席鮑爾將主持卸任前最後一場利率會議。\n\n美國司法部上周末宣布撤銷對鮑爾的刑事調查、接任人選華許的任命程序也隨之推進，聯準會正處於世代交替的動盪期，市場格外關注鮑爾在會後記者會釋出的政策訊號與經濟評估。中央大學經濟系教授吳大任分析指出，近期國際油價因中東局勢波動，相較前波高點已有回落，惟對美國通膨確實帶來影響，以最新數據來看，美國3月消費者物價指數（CPI）年增率約3.3％，未回到2％的設定目標，顯示通膨壓力仍未解除。在此背景下，聯準會「這次最可能還是維持利率不變」，並持續觀察4月及後續CPI走勢，再決定下一步動作。\n\n歐盟與英國央行則將於30日傍晚壓軸公布決策。市場預期兩者本次會議同樣維持利率不變，但對未來政策路徑的指引將成為焦點。路透調查顯示，超過半數經濟學家預期歐洲央行可能在6月啟動升息，以應對中東衝突帶來的能源衝擊及通膨壓力，目前歐元區通膨已明顯高於2％目標。\n\n英國央行則被認為今年內大致維持現行利率水準，但市場已上修對通膨的預期。央行決策外，本周同時迎來「超級財報周」，科技與製造業龍頭企業密集發布業績。大型科技股中，Alphabet、三星、微軟、蘋果、亞馬遜及 Meta 都將公布季度財報。\n\n市場普遍認為 30 日將成為本周最關鍵時點，央行決議、企業財報與多項經濟數據集中公布，市場波動可能因多方訊號進一步放大。"}, {"title": "從荷莫茲到馬六甲 縱橫天下／專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 1, "summary": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天，台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；", "full_text": "美以伊戰爭開打，荷莫茲海峽成為國際角力的焦點。許多國家也從荷莫茲的情勢去反思自己的處境。在台灣，我們想的是如果有一天，台灣海峽也被封鎖，會對台灣的經濟與國際經濟造成什麼影響；\n\n在東南亞，區域國家想的則是：如果馬六甲海峽也被封鎖，那又會是什麼狀況？馬六甲海峽長900公里，沿岸有印尼、泰國、馬來西亞、新加坡4國，是東亞到中東與歐洲最近的航路。全球海上貿易中有 22％的貨物經過馬六甲，更是重要的能源通道，2025 年上半年，每天有 2320 萬桶石油經過，占海上運輸石油量的29％，而每天從荷莫茲海峽經過的原油也才2090萬桶。\n\n伊朗對荷莫茲海峽收費後也在馬六甲海峽相關國家內引起騷動。新加坡強調自由航行權，認為應遵守國際法，不同意按照伊朗的要求付過路費，也不願就過路費一事和伊朗談判。馬來西亞則不同調，他們和伊朗談判，獲准讓幾艘馬國船隻通過海峽。\n\n印尼則一度考慮有樣學樣，22 日印尼財長波巴亞在一場研討會上拋出馬六甲海峽也收費的點子，結果遭星、馬等國反對，波巴亞沒多久就收回這個想法。其實馬六甲海峽收不收費是小事，更該攤開來看的是國際政經情勢的大地圖。荷莫茲海峽遭到封鎖後，東南亞國家立刻感到震撼。\n\n缺油影響到發電，也逼得許多國家不得不改採遠距上班；缺肥料更影響春耕與糧食供給。論者謂東南亞國家受到震撼的「強度」，顯示其對中東過於依賴，不若中國早就對能源供給想好多種備案。\n\n然而除了強度之外，更該注意的是「速度」: 何以荷莫茲海峽一被封鎖，馬六甲海峽這邊立刻就感受到震撼？因為兩地的經濟早已整合在一起了。通常我們把荷莫茲和馬六甲看成是兩個個別的海峽。\n\n但現在越來越多地緣政治學者指出，從荷莫茲到馬六甲是一條連在一起的石油走廊。油輪從荷莫茲海峽出來，向東過印度洋，最後是穿過馬六甲海峽進到亞洲。所以新加坡是這個走廊的東端出口。\n\n這還不夠，學者指出，亞洲和海灣兩地的經濟關係日漸密切，所以荷莫茲和馬六甲的聯繫不只是石油，還包括貿易、資金及制度化的連結。這從幾次東協與海灣合作理事會的峰會成果就可看出。海灣國家與中國的貿易也不斷增加，2025年前9個月海灣國家的主權基金有40％投到了亞洲。\n\n阿聯酋、沙烏地的公司與亞洲夥伴的國防工業合作，將亞洲的科技與製造能力融入了海灣國家的工業生態。亞洲的金融服務公司也在海灣各個金融中心擴大服務。荷莫茲到馬六甲的海上走廊已內化成亞洲成長的基礎建設。\n\n所以學者指出，現在重點不是東南亞如何減少對中東的依賴，而是如何與海灣國家一起有系統地分散風險，如聯合的倉儲設備、分散的船運安排、跨國界的資本夥伴、更深化的金融合作等，讓彼此能在經濟互賴的關係中，共同管控經濟的曝險程度。這個大戰略最終會形成什麼樣的國際政經格局，值得繼續觀察。（作者為東吳大學政治系教授）"}, {"title": "美超級財報周 點火AI台鏈 四大CSP及蘋果季報將揭曉，投資人關注資本支出是否轉化為獲利成長", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "全球超級央行周及美股超級財報周來臨，在美伊和談陷入膠著下，市場更期待「科技七雄（Magnificent 7）」 表現，與台股關連性高的微軟、Google、AWS（亞馬遜）、Meta等重量級四大CSP（雲端服務供應商）及蘋果將發布財報，加上台廠也有多家重量級AI相關概念股法說會同時於本周登場，相關概念股持續吸引成為市場焦點。金融市場迎來極度關鍵的一周，30日堪稱壓軸日，因美國聯準會（ Fed）、日銀、英央及歐央於28至30日陸續公布利率決...", "full_text": "全球超級央行周及美股超級財報周來臨，在美伊和談陷入膠著下，市場更期待「科技七雄（Magnificent 7）」 表現，與台股關連性高的微軟、Google、AWS（亞馬遜）、Meta等重量級四大CSP（雲端服務供應商）及蘋果將發布財報，加上台廠也有多家重量級AI相關概念股法說會同時於本周登場，相關概念股持續吸引成為市場焦點。金融市場迎來極度關鍵的一周，30日堪稱壓軸日，因美國聯準會（ Fed）、日銀、英央及歐央於28至30日陸續公布利率決策，五大央行均可望按兵不動，惟日銀可能因美伊戰爭與通膨壓力，釋放6月升息的鷹派訊號。但最受矚的是，重大財報也都集中在這一天，谷歌、微軟、亞馬遜、Meta將發布季報。\n\n台北時間30日，Alphabet預計公布財報，估每股盈餘（EPS）約2. 83美元、營收約1,070億美元，年增約11％，Google Cloud成長率可望近50％。同日還有亞馬遜，預估EPS約2.11美元、營收1,772億美元，年增14％；AWS雲端業務預計成長25％。\n\nMeta方面，市場估EPS達7.51美元、營收555億美元，年增31％。微軟同日壓軸，預估EPS約4.04美元、營收814億美元，雙雙年增逾15％；Azure雲端業務成長約38％，仍為AI變現核心。\n\n蘋果預定5月1日公布財報，預估EPS為1.96美元、營收1,093億美元。投資人關注焦點已從「是否擴張」轉向「投資是否帶來實質回報」，科技業能否證明高額資本支出轉化為營收與獲利成長，是本季關鍵檢驗。台新投顧總經理黃文清說，市場對美科技股營收展望正向，有望帶動台系供應鏈成長，美股雖第一季為產業淡季，營收多數呈現季減，但AI相關科技股營收持續上修，營運動能強，觀察標普500成份股第一季盈餘年增14.4％，科技股成長46.4％，表現最亮麗，預期科技股仍為主要成長動力，第二、三季也將維持強勁成長趨勢。\n\n本周也有多家中大型電子股舉辦第一季財報法說，預估相關電子股今年獲利普遍呈現雙位數成長。四大CSP廠相關概念股中，台股的上下游供應鏈有多家廠商入列，且囊括晶圓代工、封測、IP矽智材／ASIC、載板、散熱、AI伺服器等相關族群。檢視近期盤面，已有多檔個股獲得資金領先卡位，包括台積電、日月光控投、台達電、緯穎、世芯-KY、創意、聯發科、欣興、金像電、奇鋐、雙鴻、愛普*、智原、川湖等，股價表現強勢。"}, {"title": "聯發科參與Google TPU 8t專案ASIC傳捷報 供應鏈嗨", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後段設計服務；", "full_text": "聯發科30日召開法說會，市場關注其AI布局進展。隨著Google正式發表第八代TPU晶片，聯發科ASIC（特定應用積體電路）業務邁入新里程碑。據悉，聯發科參與TPU 8t（訓練）專案，提供I/O Die及後段設計服務；\n\n供應鏈透露，聯發科增購FT（Final Test）與SLT（系統級測試）機台，並持續拉高CoWoS需求，京元電子、精測、鴻勁等供應鏈將同步受惠。Google新一代TPU 8架構分為TPU 8t（訓練）與TPU 8i（推論），聯發科切入訓練端核心設計，並採用台積電 N3P 製程與 CoWoS-S 先進封裝技術共同打造 AI ASIC，顯示其技術能力已可支援高階 AI 模型訓練需求。Marvell（邁威爾科技）近期傳出將加入ASIC競局，供應鏈指出，目前尚未在TPU供應鏈中觀察到明確布局。\n\n隨設計難度提升，未來可能出現Consign die（委託提供晶粒）商業模式，市場競爭將由單純搶單轉向分工合作；Marvell亦可能切入LPU、NIC等其他AI加速領域，而非直接參與TPU專案。聯發科憑藉SerDes（序列化／反序列化器）、高速介面與系統整合能力，在先進製程節點成功切入訓練晶片設計，市場地位快速提升。\n\n執行長蔡力行預期，今年ASIC業務將創造超過10億美元營收。法人分析，Google TPU投片量持續上修，2027年有望達千萬顆規模，無論由聯發科或博通分食，均可帶動顯著營收貢獻。供應鏈指出，AI訓練晶片因採用先進製程與高複雜度封裝，測試強度大幅提升，京元電、精測深耕高效能運算（HPC）與AI晶片測試，將直接受惠TPU放量；\n\n鴻勁則提供測試設備，隨晶片單價提升，測試環節重要性提高，SLT有望成為標準流程。聯發科逐步建立「雲＋邊」雙軌布局，競爭優勢浮現。ASIC 業者分析，未來 AI 晶片將朝 chiplet（小晶片）與異質整合發展，對CoWoS與 SoIC等先進封裝依賴度持續提高，帶動台積電產能利用率維持高檔，並擴大封裝設備與材料需求。\n\n聯發科切入訓練晶片，不僅提升產品價值，也推升台灣半導體供應鏈整體技術層級。"}, {"title": "台中兩岸直航I點航道開放開發 離岸風電3-4期 釋4～6GW設置容量", "source": "工商時報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除，決開放作為開發風場海域，預估3-4期至少遠超過4GW設置容量可以釋出選商，今年底或明（2027）年初展開選商相關作業。另3-3期選商機制也傳出好消息，經濟部27日將發出開會通知，本周再召開實體及線上溝通會議，針對ESG定義、獎勵機制電業執照的作法，行...", "full_text": "風電3-1、3-2期至少三家外商陸續解約撤出台灣離岸風電市場，惟經長龔明鑫仍樂觀台灣風電市場開發後續。據悉，除解約風場容量將併到區塊開發3-4期招標以外，台中兩岸直航I點及其航道已公告刪除，決開放作為開發風場海域，預估3-4期至少遠超過4GW設置容量可以釋出選商，今年底或明（2027）年初展開選商相關作業。另3-3期選商機制也傳出好消息，經濟部27日將發出開會通知，本周再召開實體及線上溝通會議，針對ESG定義、獎勵機制電業執照的作法，行政契約意見等三方面，釋出善意作出更彈性處置及溝通說明，預計半年備標期時程不變，今年底前會完成3-3期選商，經部預估至少逾五家開發商有興趣。\n\n3-1期、3-2期獲選業者，不少外商未履約且解約撤出台灣市場，合計未執行包括科里歐海鼎二、法商EDF及台亞蔚藍海、力麗集團海峽二，3-2期未簽約的科理歐海鼎一、德能英華威集團德帥風場，以及二階被解約的海峽一風場，合計至少2.2GW風場空間未開發可釋出併入3-4期招商。知情人士透露，倘若業者布置密度更高，風機更大型化，可設置容量不排除上看3G。另交通部3月27日公告，刪除台中兩岸直航I點及其航道，供作離岸風場開發海域。\n\n據悉，航港局2024年曾委託海大調查，經由兩岸直航台中段（I航道）進出使用率僅約4％，行政院召開多次跨部會協調，決取消I點及其航道。據業者估計，可釋出空間約4至6GW。官員也說，此海域水深不深，不少業者趨之若鶩，已有人展開環評規劃。\n\n此外，能源署決對3-3期選商釋出更大彈性及善意，近日內再度召開實體及線上會議，針對公協會提出意見正式回覆，幫業者釐清國外總部質疑，以利備標。其中公協會最在意獎勵機制，20+N（N最長5年）是否抵觸電業法。原本《電業法》賦予電業執照最長可展延10年至30年的營運空間，業者擔心3-3期計算基礎若改為20+N+10，恐橫生枝節，影響金融機構融資到位意願。"}, {"title": "白宮記協晚宴 驚傳槍響", "source": "經濟日報 A01 要聞", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美國總統川普在美東時間25日晚間出席白宮記者協會晚宴時，現場驚傳槍響，引發現場恐慌。川普與第一夫人梅蘭妮亞遭緊急撤離，嫌犯也旋即遭逮捕並起訴。川普之後召開記者會表示，自己「狀況良好」，嫌犯可能是「孤狼」犯案，背後原因仍在調查中。", "full_text": "美國總統川普在美東時間25日晚間出席白宮記者協會晚宴時，現場驚傳槍響，引發現場恐慌。川普與第一夫人梅蘭妮亞遭緊急撤離，嫌犯也旋即遭逮捕並起訴。川普之後召開記者會表示，自己「狀況良好」，嫌犯可能是「孤狼」犯案，背後原因仍在調查中。\n\n在華府希爾頓飯店舉行的白宮記者協會晚宴，約2,600名賓客參與，包括美國頂尖媒體高層、總編輯與知名電視主播。在晚間8時30分過後，前菜剛送上，主要安檢區附近就傳出槍響，與會人士陷入恐慌，趴倒在地並躲到桌下，特勤局人員連忙撤離川普、梅蘭妮亞及副總統范斯。國安人員稍後表示，嫌犯身懷大量武裝衝向安檢點，朝特勤局幹員開槍。\n\n這名槍手隨後被制伏在地，被搜出一把霰彈槍、手槍、及好幾把小刀。槍手為來自加州的31歲男教師艾倫（Cole Allen），犯案動機不明。川普稍後召開記者會，盛讚安檢人員處理迅速而勇敢，還說他原本希望返回宴會廳完成演說。"}, {"title": "創業之星選秀 快來報名 創投產業推手跨境跨域整合實力，催動創新生態系升級 開發資本助新創搶AI先機", "source": "經濟日報 A01 要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "中華開發資本表示，AI正在重塑製造、移動、醫療、金融等各大產業競爭格局的核心動能，身為台灣創投產業推手之一，中華開發資本將持續以跨境跨域的整合實力，積極陪伴具前瞻視野的新創團隊、協助台灣創新生態系加速升級，在全球AI競賽中搶占先機。經濟日報於2017年起舉辦「創業之星選秀大賽」，為創業者與投資者之間搭起平台，藉由媒體傳播的力量，讓優質團隊更廣為人知，並且找到更多的資源協助。今年賽事由經濟日報主辦，合作單位為台大創創中心、鴻海科技集團，協...", "full_text": "中華開發資本表示，AI正在重塑製造、移動、醫療、金融等各大產業競爭格局的核心動能，身為台灣創投產業推手之一，中華開發資本將持續以跨境跨域的整合實力，積極陪伴具前瞻視野的新創團隊、協助台灣創新生態系加速升級，在全球AI競賽中搶占先機。經濟日報於2017年起舉辦「創業之星選秀大賽」，為創業者與投資者之間搭起平台，藉由媒體傳播的力量，讓優質團隊更廣為人知，並且找到更多的資源協助。今年賽事由經濟日報主辦，合作單位為台大創創中心、鴻海科技集團，協辦單位為中華開發資本、彰化銀行、國泰金控、日月光集團、臺灣企銀、宏匯集團、台新銀行、t.Hub內科創新育成基地。\n\n中華開發資本指出，全球AI產業正站在關鍵轉折點，中華開發資本不僅搭配母公司凱基金控資源，透過參與金融科技產業聯盟投資交流工作圈，統籌布局台灣創新科技母基金，以鏈結全球頂尖創投、強化金融科技與創新科技生態系，也規劃推出CDIB Capital AI Industrial and Mobility Fund，聚焦AI於工業產業與移動創新場景的應用發展，攜手產業夥伴加速AI技術於實體經濟中的商業化進程。中華開發資本表示，台灣長期深耕半導體、ICT與精密製造，在系統整合的關鍵環節累積全球領先實力，這不只是代工優勢的延伸，而是全新的「架構共創價值」，也是台灣新創在國際競局中，最獨特的差異化起點。面對地緣政治與供應鏈重組壓力，促使國際資本積極尋找合規且具備產業執行力的亞洲夥伴，台灣資本與台灣新創正共同站在這一結構性機遇的交匯點上，能深耕垂直場景、累積專屬資料並建立應用壁壘的新創團隊，將在這波產業變革中占據更有利的位置。\n\n中華開發資本認為，創業者應以市場需求為核心，將AI技術創新落實於真實應用場景，並以堅實的公司治理與透明管理機制，建立永續成長的基礎。未來，中華開發資本將持續深化投資布局、擴展全球網絡、強化策略合作，以完整的支持體系陪伴新創企業從早期育成到國際擴展，攜手打造台灣成為全球AI創新與產業升級的重要樞紐。本屆賽事即日起至5月15日（五）23：59截止報名，一律採線上報名，報名資訊細節請掃描QR Code，或上活動官網：https://money.udn.com/ACT/innovation/index.html。"}, {"title": "川普出席 白宮記協晚宴傳槍響", "source": "自由時報 A01 焦點新聞", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美國總統川普與第一夫人梅蘭妮亞25日晚間出席白宮記者協會晚宴時，一名槍手闖入華盛頓希爾頓飯店宴會廳外的安檢站，與警方爆發槍戰，特勤人員隨即掩護川普夫婦與內閣首長等要員緊急撤離，現場數百名政要與賓客驚恐躲避。從事電玩開發的31歲槍手已遭當局逮捕。", "full_text": "美國總統川普與第一夫人梅蘭妮亞25日晚間出席白宮記者協會晚宴時，一名槍手闖入華盛頓希爾頓飯店宴會廳外的安檢站，與警方爆發槍戰，特勤人員隨即掩護川普夫婦與內閣首長等要員緊急撤離，現場數百名政要與賓客驚恐躲避。從事電玩開發的31歲槍手已遭當局逮捕。"}, {"title": "孤狼槍手闖安檢 川普記協晚宴遇襲 開火後被捕 1特勤人員中彈", "source": "聯合報 A01 要聞", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "合報導美國總統川普廿五日首度以總統身分出席在華府希爾頓飯店舉辦的「白宮記者協會晚宴」，一名男子持槍闖越宴會廳附近的安全哨，開槍擊中一名特勤人員後被制伏逮捕。川普夫婦立即被護送離開，現場官員及出席賓客都沒有受傷。川普於美東時間廿五日晚間約八時十五分與第一夫人梅蘭妮亞一同進場上台；", "full_text": "合報導美國總統川普廿五日首度以總統身分出席在華府希爾頓飯店舉辦的「白宮記者協會晚宴」，一名男子持槍闖越宴會廳附近的安全哨，開槍擊中一名特勤人員後被制伏逮捕。川普夫婦立即被護送離開，現場官員及出席賓客都沒有受傷。川普於美東時間廿五日晚間約八時十五分與第一夫人梅蘭妮亞一同進場上台；\n\n約莫八時卅五分左右，川普正在台上與人談話之際，突然耳聞槍響，特勤人員隨即護送川普和梅蘭妮亞離開。川普稍晚發文稱讚特勤和執法人員表現非常出色，指他們快速行動，也很勇敢；川普說，槍手已被捕。\n\n執法官員證實，槍手為來自加州托倫斯的卅一歲男教師艾倫（Cole Allen）；他持槍闖過安全哨朝宴會廳方向衝去，開火後遭到維安人員制伏逮捕。一名特勤人員中彈，幸好身穿防彈衣並無大礙，送醫觀察幾小時後已出院。\n\n川普以為槍聲是盤子掉落川普隨後在白宮舉行記者會表示，他一開始聽到槍聲，以為是盤子掉落。他說，中槍的特勤人員是在「非常近的距離遭到一把威力很強的武器射擊，但防彈背心發揮作用」。他表示已與該名特勤人員通話，稱對方狀況良好、精神振奮，「他的士氣很高，我們也告訴他，我們愛他、尊敬他，他是一個非常自豪的人。\n\n」 川普表示，這起事件凸顯白宮興建大型宴會廳的必要性。他也呼籲保持和平，並稱讚媒體對事件的報導「相當負責任」。川普過去曾將媒體稱為「人民公敵」，但這回他語氣相當克制，表示在此次事件後，大家感受到「一股巨大的愛與凝聚力」。\n\n川普表示，在記協晚宴槍擊發生前，他原本的演說會嚴厲批評媒體，但現在將會收斂。他說：「我們談的是憲法中的言論自由，這才是重點。不只是白宮記者，這其實是基於我們憲法中的言論自由。\n\n」他說會在卅天內再辦一次白宮記協晚宴，且會「辦得更大更好也更完善」。川普表示，他研究過暗殺事件，人們會鎖定那些產生「最大影響力」的人，並提到遇刺的美國總統林肯。他表示，被鎖定的通常是「大人物」，「我不太願意這麼說，但某種程度上我感到榮幸」，他表示為國家做了很多事，但有些人對此並不滿意。\n\n川普：槍手應終生關在監獄川普說，沒人告訴他總統是這麼危險的工作，開玩笑說，如果國務卿魯比歐告訴他這份工作這麼危險，他就不會參選了。他表示，槍手應該是單獨犯案的「孤狼」，並認為槍手應該終生被關在監獄。川普還說，「你永遠不知道」這起事件是否可能與伊朗戰爭有關，「這不會阻礙我贏得伊朗戰爭」。\n\n被問及是否認為自己是嫌犯攻擊目標，川普說，「我想是的」。司法部代理部長白朗奇表示，槍手「意圖襲擊政府官員，很可能包括總統本人」。他表示，槍手幾年前購得作案槍支，並在晚宴舉辦前一兩天入住該飯店，調查人員已從嫌犯的電子設備中收集到一些訊息，搜索他在加州的住處並詢問一些認識他的人，調查作案動機。"}, {"title": "獨家專訪／促台速通過國防特別條例 釋出強化自我防衛信號 谷立言：嚇阻力 維護和平最佳途徑", "source": "中國時報 A01 要聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商，美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業，向國際社會釋出台灣願意強化自我防衛的重要信號，這對台灣的國防與產業發展都有莫大助益。近月來華府數個智庫接連訪台，美國議員並聯合致函立法院長韓國瑜，重點皆在關切1.25兆元國防特別預...", "full_text": "立法院朝野今（27）日再就《國防特別預算條例》草案進行協商，美國在台協會（AIT）台北辦事處長谷立言（Raymond F. Greene）接受《中國時報》專訪時強調，台灣應盡速通過「全面性」國防特別預算條例草案，除提升自我防衛能力，也可挹注發展本土無人機產業，向國際社會釋出台灣願意強化自我防衛的重要信號，這對台灣的國防與產業發展都有莫大助益。近月來華府數個智庫接連訪台，美國議員並聯合致函立法院長韓國瑜，重點皆在關切1.25兆元國防特別預算條例早日立法，谷立言也為此頻頻拜會在野人士，說明美方立場，盼能化解在野疑慮；他認為，目前立法院的討論已經很接近他們希望達成的結果，國防特別預算條例越快通過越好。\n\n以下為谷立言接受《中國時報》專訪重點：立院目前討論已很接近期待結果問：韓院長為了通過國防特別預算條例，很積極召集朝野協商，但尚未達成最後結論，台灣是否有迫切需要通過這項特別條例？答：我們非常感謝韓院長所做的努力。如你們所知，美國堅定支持台灣的自我防衛能力。\n\n鑑於當前的區域安全形勢，我們與台灣一樣都迫切希望確保嚇阻力，因為我們相信，這是維護和平的最佳途徑。我們歡迎國防部編列的特別預算條例草案，這將為台灣軍隊提供嚇阻衝突所需的裝備和能力。我們注意到立法院有兩種立場，一種是以特別預算來支付美國去年12月宣布的軍售案；\n\n另一種則是支持國防部所有需求的綜合方案。我認為兩者並不矛盾，事實上，兩者都需盡快進行。美方已針對多項防衛能力提供發價書，但由於立院尚未通過預算，美國只好延長發價書最後期限，以便給予立法院更多時間完成相關工作。\n\n在立院通過特別預算前，要先通過特別條例草案，因此希望立院盡快通過特別條例。展現採購意願爭取與武器商合作台灣通過「全面性」特別預算條例非常重要，這不僅向國際社會發出非常重要的信號，且對於確保台灣能夠獲得其所要求的全部防禦能力也至關重要。例如，我們已經宣布了一些系統，包括海馬士火箭和 M109自走砲系統，都是非常重要的系統；\n\n國防部的特別預算中，還希望採購包括一體化防空反導系統、無人載具、無人機等。正如在中東或烏克蘭戰場上所看到的情形，世界各地對這些系統的需求非常高，無論是民間企業或是美國政府都在進行資源競爭。如果台灣能通過特別條例，這是向這些武器設備商發出信號，表明台灣有採購的意願。\n\n但這並不意味著台灣必須在簽訂合約前支付款項。我曾與一些美國大型國防科技公司的執行長交談過，許多人非常渴望在台灣投資、建立供應鏈合作夥伴關係、開設辦事處，但他們都在觀望台灣是否有購買這些裝備的意願。因此，如果台灣能夠通過全面性的國防特別預算條例，這是向業界發出信號，即他們應該開始與台灣合作，共同投資這些項目，這對台灣產業也很重要。\n\n直言越快通過越好無具體期限問：有智庫學者警告，立法院若於5月7日前無法通過此特別條例，將影響美方協助台灣意願？答：我覺得沒有具體的日期。但如美國印太司令帕帕羅、戰爭部印太安全事務助理部長盧（John Noh）在眾議院軍事委員會聽證會上所述，他們都強調台灣盡快為其國防提供資金的重要性。\n\n如帕帕羅所說，我們正處於關鍵時刻，如果進行正確的投資，就能利用嚇阻力維護和平。如果不這麼做，等於將來要面對一場準備不足的衝突，台灣將陷入脆弱的困境。從華府的角度看，台灣越早表明自我防衛的意願，對所有人來說就越安全，因為台灣面臨威脅的嚴重性，令美、台及該地區其他國家都深有體會。\n\n因此，我們希望台灣盡快採取行動，似乎沒有必要再做更多辯論。不過立法院的討論已經很接近我們希望達成的結果，國防特別預算條例越快通過越好。"}, {"title": "又遇槍擊案 川普急撤報平安 白宮記協晚宴驚魂 31歲教師闖安檢站開火遭逮", "source": "中國時報 A01 要聞", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出槍響，引發恐慌。在隨扈與安全人員迅速掩護下，川普與副總統范斯等高層緊急撤離。隨後一名31歲、來自加州的槍手落網，他擁有電腦碩士學位，揚言以「政府官員」為槍擊目標。", "full_text": "美國總統川普25日在華府出席白宮記者協會晚宴時，現場突然傳出槍響，引發恐慌。在隨扈與安全人員迅速掩護下，川普與副總統范斯等高層緊急撤離。隨後一名31歲、來自加州的槍手落網，他擁有電腦碩士學位，揚言以「政府官員」為槍擊目標。\n\n川普返抵白宮後召開記者會，他對槍手未多加批評，也否認事件與伊朗有關，他呼籲國民「 和平解決分歧」。白宮記協成立於1914年，該協會1921年開始舉行年度晚宴，是媒體與政府官員加強溝通的社交活動，總統出席並發表演說一度成為慣例。半世紀以來，晚宴都在華府希爾頓飯店舉行，而該地也是川普的偶像、美國前總統雷根1981年遇刺重傷之地。\n\n現任白宮記者協會主席姜偉嘉（Weijia Jiang），因全程冷靜沉著而備受讚譽。她是CBS華裔資深白宮記者，出生於大陸廈門，2歲時全家移民美國。川普自嘲總統是最危險職業這已是川普近2年來第3度遇刺未遂。\n\n他在劫後對記者表示，嫌犯是「精神有問題的人」，並希望類似事件不再發生。他神情鎮定，甚至開玩笑說自己「研究過暗殺」，沒那麼容易崩潰，還提到歷史上約有 5.8％的美國總統曾遭槍擊，直言「想不到還有比總統更危險的職業」。美東時間25日晚間約8時30分。\n\n當時華府希爾頓飯店的宴會廳內約有2600人，春季豌豆搭配布拉塔起司的前菜剛上桌，賓客正在交談寒暄。川普與第一夫人梅蘭妮亞、范斯及姜偉嘉同坐台上。突如其來的槍聲打破熱鬧氣氛，川普事後回憶，他第一時間還以為是「托盤掉了」，而梅蘭妮亞則明顯察覺情況有異，神情驚慌。\n\n槍手被制伏後，川普一度希望晚宴繼續，但遭特勤人員拒絕。他略帶遺憾地說，原本準備了一篇「史上最不得體的演說」，卻無緣登台，並承諾將在30天內重辦晚宴。根據調查，該名31歲男子艾倫（Cole Thomas Allen）是孤狼犯案。\n\n他先在飯店側門、安檢較為鬆散處，組裝「長型」武器後，隨即衝過一處大廳安檢站，身上攜帶霰彈槍、手槍及多把刀具。執法人員迅速攔截並與其駁火，一名特勤幹員受傷但無大礙，嫌犯未中彈，最終被壓制上銬。孤狼犯案 2024捐款給賀錦麗多家美媒指出，嫌犯艾倫曾是加州托倫斯市C2教育機構的「明星教師」，2024年獲得「月度最佳教師」 稱號。\n\n另外，根據聯邦選舉委員會的紀錄，嫌犯2024年捐款25美元（台幣約787元）給當時競選總統的民主黨前副總統賀錦麗。根據艾倫的領英（LinkedIn）個人資料，他2017年畢業於加州理工學院，獲機械工程學士學位，去年更獲得加州州立大學多明格斯山分校電腦科學碩士學位。在加州理工學院就讀期間，因研發輪椅緊急煞車原型，而登上當地新聞報導。\n\n他自稱是電子遊戲開發者，且似乎在Steam遊戲平台上，以1.99美元價格發布一款名為《Bohrdom》的獨立遊戲。紐約郵報報導，槍手開槍前10分鐘，向家人發送反川普宣言。自稱「友好的聯邦刺客」。\n\n「我不是被炸死的學生，也不是挨餓的孩童，更不是被本屆政府中眾多罪犯虐待的少女。當『別人』遭受壓迫時，以德報怨並非基督徒的行為，而是壓迫者的共謀。」「我再也不願讓一個戀童癖、強暴犯和叛徒的罪行沾染我的雙手，」 艾倫寫道，顯然指的是川普。\n\n哥倫比亞特區聯邦檢察長皮洛表示，嫌犯被控使用槍枝及持危險武器襲擊執法人員等2項罪名，不排除追加罪名，預計27日提審。"}, {"title": "台積鉅額交易 創2,285元新高 總成交金額逾1.37億元", "source": "工商時報 B05 集中市場 期貨", "cat": "台灣產業與投資動向", "priority": 0, "summary": "護國神山台積電（2330）有政策加持，股價沒有最高只有更高！儘管24日股價收在2,185元大漲105元漲幅5.05％，股價創歷史新高，惟鉅額交易仍透過配對交易成交60張於2,285元，相當於當天的漲停價，總成交金額為1.37億餘元。台積電鉅額交易為股價引路，以台積電每漲1檔（5元）貢獻指數超過40點來看，台積電鉅額交易價格2,285元，對指數潛在貢獻超過80 0點，指數將輕易越過39K，並將向40K邁進。", "full_text": "護國神山台積電（2330）有政策加持，股價沒有最高只有更高！儘管24日股價收在2,185元大漲105元漲幅5.05％，股價創歷史新高，惟鉅額交易仍透過配對交易成交60張於2,285元，相當於當天的漲停價，總成交金額為1.37億餘元。台積電鉅額交易為股價引路，以台積電每漲1檔（5元）貢獻指數超過40點來看，台積電鉅額交易價格2,285元，對指數潛在貢獻超過80 0點，指數將輕易越過39K，並將向40K邁進。\n\n台積電24日鉅額交易共15筆，合計成交2,901張498股，總成交金額為63.05億元，平均每股價格為2,173.03元，略低於當天收盤價2,18 5元。不過，仍有60張成交在漲停價2,285元，比收盤多出100元，另成交 1,692張498股在平盤價2,185元，總成交金額為36.98億元。"}, {"title": "國科會揪經部 拚AI中央廚房 再次祭出徵案，業者每年每案最高補貼3,000萬元、大專院校則為500萬元", "source": "工商時報 A06 綜合要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "為打造台灣成為AI之島，國科會提出大南方新矽谷推動方案，希望提升AI應用落地，布局2040年「處處有AI」的願景，為此，國科會攜手經濟部商業發展署，針對智慧商業服務領域的 AI 中央廚房補助再次祭出徵案，業者每年每案最高補貼3,000萬元、大專院校500萬元補助，計畫期程為兩年。台南沙崙智慧綠能科學城資安大樓、AI創新應用大樓啟用，加上A I雲端算力中心、智慧機器人研究中心等研發聚落逐步成形，已有不少研發人才相繼進駐，大南方新矽谷推動辦...", "full_text": "為打造台灣成為AI之島，國科會提出大南方新矽谷推動方案，希望提升AI應用落地，布局2040年「處處有AI」的願景，為此，國科會攜手經濟部商業發展署，針對智慧商業服務領域的 AI 中央廚房補助再次祭出徵案，業者每年每案最高補貼3,000萬元、大專院校500萬元補助，計畫期程為兩年。台南沙崙智慧綠能科學城資安大樓、AI創新應用大樓啟用，加上A I雲端算力中心、智慧機器人研究中心等研發聚落逐步成形，已有不少研發人才相繼進駐，大南方新矽谷推動辦公室先前也預估，未來一至兩年外食人口將成長到萬人。為推動全民智慧生活圈願景，國科會以大南方（嘉義、台南、高雄或屏東）為AI應用示範場域，先前智慧雨林創生計畫已鎖定智慧餐飲。\n\n而後也宣示以AI中央廚房解決沙崙智慧科學城周邊用餐需求，去年 12月啟動徵案。依計畫，此案將聚焦在「中央廚房」與「智慧餐廚」場域轉型與擴散，由「商業服務業者、資訊服務業者、大專校院」跨域合作。根據推動機制，商業服務業者依實務痛點提出需求，整合資服業者 AI技術解方及學研團隊技術加值能量，落實場域實地驗證與應用擴散，藉此強化技術落地實戰性，並建構具備規模化潛力的智慧餐飲生態系。\n\n產業需求面，商業服務業者整合「中央廚房」與「智慧餐廚」，建構一站式供餐服務體系。針對產業核心痛點導入AI智慧化應用，深度優化生產流程，落實品質標準化控管。計畫也說明，提升整體營運效能的同時，將有效緩解餐飲業人力短缺的壓力。\n\n此外，透過智慧餐廚系統標準化模組，可達成多據點的快速複製與規模化布局。技術導入上則是資訊服務業者、系統整合商或設備製造商提出可落地的AI解決方案，針對業者需求進行技術評估、模型開發與系統整合，推動AI技術商品化與產業化應用，加速智慧化轉型落地。而大專院校參與則助力人才共育，計畫透過大專院校組成跨域研究團隊，媒合具相關專長師生參與專案開發與測試，強化實務應用與問題解決能力，同時培育AI應用實作人才，推動產學研協作與創新發展。"}, {"title": "AI中央廚房補助計畫地方美食IP化策略 讓特色料理變成數位資產", "source": "工商時報 A06 綜合要聞", "cat": "台灣產業與投資動向", "priority": 0, "summary": "大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產。這次計畫三大核心策略中，產線製程智慧化，主要以AIoT技術建立智慧化中央廚房模組，實現烹煮、包裝與檢測等關鍵環節自動化作業。國科會期望，藉由感測監控與數據分析，將傳統經驗轉化為可視化數據，確保中央廚房食品安全與品質一致，提升整體生產效率與穩定性。", "full_text": "大南方新矽谷推動方案的AI中央廚房補助計畫，核心策略除了產線製程智慧化、智慧餐廚模組化外，近年不少餐飲老店面臨世代交棒問題，計畫中，也以地方美食IP化策略，盼地方特色料理轉為數位資產。這次計畫三大核心策略中，產線製程智慧化，主要以AIoT技術建立智慧化中央廚房模組，實現烹煮、包裝與檢測等關鍵環節自動化作業。國科會期望，藉由感測監控與數據分析，將傳統經驗轉化為可視化數據，確保中央廚房食品安全與品質一致，提升整體生產效率與穩定性。\n\n智慧餐廚模組化則是透過美食參數數據化，在終端場域透過智慧化餐廚模組完成製作、烹調或復熱與擺盤，提供消費者現做感體驗，同時降低對專業廚師依賴，打造可複製、可快速擴展的商業模式。而地方美食IP化，主要希望將地方特色料理轉為數位資產，如建立數位IP食譜，運用AI將職人烹飪經驗「數據化」，涵蓋時間、溫度、 投料時機等關鍵變因，形成可跨地域轉移的數位資產。也可以透過AI風味優化演算法進行製程即時調控，針對產線波動進行動態補償，確保跨區生產成品風味具高度一致性，甚至可進行規模化製作，由在地走向多元通路供應。"}, {"title": "台積先進製程 神速擴產 法人推估今年底2、3奈米月產能上看28萬片 遠超預期 可望憑藉技術優勢「贏者全拿」", "source": "經濟日報 A03 話題", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台積電先進製程嚴重供不應求，正快馬加鞭擴產。供應鏈傳出，台積電當紅的3奈米台灣廠區原訂今年底月產能15萬片，如今可望增至18萬片，比預期多兩成；2奈米去年底量產後，今年底月產能就會衝高至近10萬片。", "full_text": "台積電先進製程嚴重供不應求，正快馬加鞭擴產。供應鏈傳出，台積電當紅的3奈米台灣廠區原訂今年底月產能15萬片，如今可望增至18萬片，比預期多兩成；2奈米去年底量產後，今年底月產能就會衝高至近10萬片。\n\n對於相關消息，台積電表示，不評論市場傳聞。法人推算，台積電今年底2奈米與3奈米月產能合計將達近28萬片，遠高於市場預期，凸顯AI、高速運算（HPC）需求強勁，台積電先進製程神速擴產，憑藉技術領先優勢「贏者全拿」，領先取得這波AI與高速運算熱潮帶來的龐大商機。市場原本預期，台積電去年底3奈米月產能約12萬至13萬片，今年頂多擴至15萬片。\n\n由於客戶需求遠出乎預期，供應鏈傳出，台積電全力衝刺3奈米新產能布建，今年底月產能將達18萬片左右，比預期多二成，年增率超過四成。台積日前在法說會提到，就過去而言，該公司不會在一個製程技術達到目標產能後再額外增加產能，但其首要責任是提供客戶最先進的技術和必要產能，為滿足 AI 應用強勁需求，正擴大資本投資，以增加 3 奈米產能。另外，台積電也調度台灣廠區資源，持續轉換5奈米設備，來支援3奈米產能。\n\n台積電正在南科新增一座3奈米廠，預計明年上半年進入量產；美國亞利桑那州第二座晶圓廠也將採用 3奈米製程，目前該晶圓廠已完成興建，規劃明年下半年開始量產。日本熊本第二座晶圓廠同樣將採用 3奈米製程，預計於2028年進入量產。\n\n相關供應鏈透露，台積電亞利桑那州二廠大約今年第3季就會開始進機台。台積電曾提到，2奈米製程已於去年第4季以優異良率表現進入量產，在對智慧手機、高速運算與AI應用的強勁需求支持下，該製程正同時在新竹及高雄的數期晶圓廠中量產。在其持續強化的策略下，會再推出 N2P與A16製程，並預期2奈米家族將成為公司另一個大規模且有長期需求的製程技術。\n\n台積電去年底2奈米每月投片量約落在3萬至4萬片之間，若如上述消息所言，今年底相關月產能將達近10萬片，等於產能在一年之內增加約1.4倍至2.1倍。"}, {"title": "經長挺高雄設算力園區", "source": "經濟日報 A05 焦點", "cat": "台灣產業與投資動向", "priority": 0, "summary": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區，讓民間加速 AI算力中心興建，他詢問經濟部是否支持？", "full_text": "立委建議在高雄推動大型AI算力中心，經濟部長龔明鑫日前在立法院經濟委員會回應，大型AI算力中心設置，到高雄較為適合，要往接近電源地方設置。民進黨立委賴瑞隆日前在立法院經濟委員會質詢指出，高雄電力充足，推動大型 AI算力中心設在高雄最適合。他也表示，高雄已經提出由國家設立園區，鼓勵大型算力中心設在專區，讓民間加速 AI算力中心興建，他詢問經濟部是否支持？\n\n龔明鑫回答，大型AI算力中心設置，到高雄比較適合，往接近電源地方設置。他並強調，經濟部會鼓勵、並支持高雄有國家算力園區，作為示範。賴瑞隆詢問，高雄有電力，如果在高雄設置國家算力園區，經濟部有哪些地方可以協助？\n\n龔明鑫表示，AI算力中心仍需要電網支持，台電需要把電網準備好。官員表示，因AI用電量龐大，密度高，台電建議愈接近電源愈好，以避免排擠原有用戶。而南部地區電力供應也較充足。"}, {"title": "時評 台灣淪先禁國家", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "大陸導航APP「高德地圖」近期在台灣竄紅，引發政府與民間高度關注。數位發展部23日將高德地圖定調為「危害國家資通安全產品」，並宣布政府機關禁止使用；國防部亦下令「全軍禁止使用」，卻引發網友一片罵聲，調侃台灣已成為「先禁國家」。", "full_text": "大陸導航APP「高德地圖」近期在台灣竄紅，引發政府與民間高度關注。數位發展部23日將高德地圖定調為「危害國家資通安全產品」，並宣布政府機關禁止使用；國防部亦下令「全軍禁止使用」，卻引發網友一片罵聲，調侃台灣已成為「先禁國家」。\n\n根據《政府採購法》及行政院國家資通安全會報發布的限制公告，政府各級機關無論是公務用或個人用的資通訊產品，均不得使用大陸廠牌，且不得安裝非公務用軟體，包括華為、大疆等19家大陸廠牌的電腦、無人機等，甚至連觸控筆都包括在內。換言之，高德地圖來台被禁只是早晚的事。只是去年12月，政府即以小紅書涉詐騙，實施限制接取1年，雖然近期以小紅書平台作為詐騙管道的案件確實下降，月平均件數為18. 3；\n\n但相較月均1萬4千多件的詐騙報案數據，其影響微乎其微，政府拿小紅書開刀，阻詐成效無異於大炮打小鳥，更別說詐騙平台大戶「 脆」或FB依舊老神在在。這回高德地圖掀波，跟當初禁小紅書一樣，反而促成台灣瞬間下載量暴增，不少網友使用後才知多項功能如此實用。更有趣的是，國發會說有信心和數發部一起做出比高德更好的APP，忘了數發部砸錢開發「網路詐騙通報查詢網」花了多長時間，還走了一位部長的經驗，如今國發會再開支票，能否兌現，有待檢驗。\n\n現今「資安等於國安」，隨著科技及AI進步，確實替大家生活帶來許多方便，但同時也容易失去隱私。政府若只為「反中」意識形態，一味先禁再說，恐怕會讓國內的數位發展「畫地自限」。"}, {"title": "台灣國是會議》司徒文呼籲立院通過增加國防預算", "source": "自由時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對美國及其在亞洲的民主鄰國的更廣泛安全利益，具有至關重要的地緣戰略意義。因此，台美的安全和經濟利益、共同價值觀以及台美的未來都息息相關。", "full_text": "導〕美國在台協會（AIT）前處長司徒文昨受邀於「第十四屆海內外台灣國是會議」主題演講時表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，他呼籲立法院通過支持增加國防預算，以抵抗中國威脅。司徒文指出，台灣位居第一島鏈中心，代表台灣對美國及其在亞洲的民主鄰國的更廣泛安全利益，具有至關重要的地緣戰略意義。因此，台美的安全和經濟利益、共同價值觀以及台美的未來都息息相關。\n\n針對台美關係，司徒文表示，美國總統川普的任期，確實為台美關係帶來更大的不確定性，其「美國優先」經濟政策優先於傳統安全聯盟，致使台美關係緊張；許多台美民眾憂心，川普會成為不可靠的盟友。司徒文指出，截至今年三月，川普在台灣問題上仍保持模糊立場，一方面強調台海和平必要性，另一方面又表示是否入侵台灣「取決於習近平」，並拒絕明確表態是否會保衛台灣，這使得美國的安全承諾變得撲朔迷離。\n\n司徒文說，川普也要求台灣增加國防支出，他個人認同此觀點，樂見總統賴清德正朝此方向努力；川普也將美國對台灣國防承諾視作一份保單，曾說「台灣應該為我們的國防付費」。司徒文也點出，川普對台言論與政策引起國防支出的自相矛盾與延誤問題，儘管美國向台灣運送武器的進程持續延誤，台灣立法院對國防預算也存在分歧，但美國卻對台灣施加巨大壓力，要求台灣大幅增加國防預算。\n\n針對疑美論，司徒文則引述葛來儀與藍立雅去年在德國馬歇爾基金會撰文內容指出，「台灣民眾對美國歷來好感度正在下降」，疑美論正變得愈來愈根深蒂固，若任其惡化，恐損害美國利益。司徒文也認為，台灣半導體在海外擴大生產，致使台灣戰略重要性削弱的可能性微乎其微。司徒文總結指出，美國民調一直顯示，美國民眾普遍支持台灣的國防，近期美國跨黨派議員訪台時也曾強調，美國兩黨對台一致支持，呼籲立法院通過支持增加預算，以抵抗中國威脅；\n\n他相信，台灣與美國、日本、民主國家的關係，對台灣的未來仍然相當重要。"}, {"title": "藍又要普發現金？》綠：擋預算又要發錢 讓國家失能", "source": "自由時報 A04 政治新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推「普發現金」討好民眾，邏輯自相矛盾；兼任民進黨發言人的立委李坤城也批評，在野黨不要只想做「無本生意」，呼籲趕快通過今年度中央政府總預算，不能又要馬兒好、又要馬兒不吃草。", "full_text": "陳鈺馥／台北報導〕立法院國民黨團再度擬具「預算法增訂第八十一條之一條文草案」，主張全年實徵淨額達當年度預算編列數一一五％，或超徵三千億元時，應普發現金。立法院民進黨團幹事長莊瑞雄昨痛批，藍白過去一路阻擋總預算付委、干擾正常審查，現在卻轉頭推「普發現金」討好民眾，邏輯自相矛盾；兼任民進黨發言人的立委李坤城也批評，在野黨不要只想做「無本生意」，呼籲趕快通過今年度中央政府總預算，不能又要馬兒好、又要馬兒不吃草。\n\n公民監督國會聯盟執行長張宏林質疑，地方政府稅收有盈餘，是不是也要比照普發？這些相關修法都是要拖垮中央財政、拖垮台灣，現在國民黨整個朝向不想執政，或認為無法執政的狀態，要拖著台灣一起去死，這才是最恐怖的。籲在野黨不要只想做「無本生意」 立法院財政委員會去年三月初初審通過「預算法增訂第八十一條之一條文草案」，明定法定歲入稅課收入全年實徵淨額達到當年度預算編列數一二○％，或超徵三千億元時應普發現金，但朝野、行政部門無共識，全案保留送院會協商，擱置至今；\n\n立法院國民黨團廿四日院會又提出相關修法，逕付二讀，交付黨團協商。莊瑞雄指出，所謂超徵稅收本就來自景氣波動與預測誤差，並非穩定財源，依法應優先用於減少赤字、償還債務與預留風險準備，而不是被寫成達標就發的固定公式，一手擋預算、一手要發錢，這不是監督，是讓國家失能。「今天發現金很爽，明天沒錢做事更痛！\n\n」莊瑞雄說，過去政府採取普發現金措施，是在整體情勢評估及國會壓力交織下的政策選擇；若強行入法常態化，將壓縮國防、社福與重大建設等必要支出，讓政府失去財政調度彈性。莊直言，預算不是紅包，是建設國家的未來，民進黨團支持在必要情況下紓困，但反對將短期討好制度化，將在後續協商中嚴格把關，守住國家財政紀律。\n\n李坤城也說明，如果有歲計賸餘，代表民進黨政府帶領國家拚經濟有成績，並不是政府「超收」人民的稅金，希望國民黨立委搞清楚。在野黨先前修改「財政收支劃分法」，已弱化中央政府的財政因應能力，如果有歲計賸餘，希望讓國家能有「子彈」面對國際情勢，呼籲在野黨趕快通過今年度總預算。"}, {"title": "司徒文促台增國防預算 吳志中籲結盟美日嚇阻", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中國威脅。外交部次長吳志中則說，台灣需要鏈結美、日等友盟國家嚇阻戰事發生。第14屆「海內外台灣國是會議」昨登場，邀請日本前防衛副大臣參議員中山泰秀、AIT前處長司徒文，以及外交部次長吳志中等人，就美日台三邊關...", "full_text": "美國在台協會（AIT）前處長司徒文26日直言，美國總統川普任內為美台關係帶來更大的不確定性，不過，美國民調持續顯示，美國民眾普遍支持台灣的國防，近期跨黨派國會議員訪台時都強調，鼓勵台灣立法院通過支持增加預算，強化台灣的防禦能力以抵抗中國威脅。外交部次長吳志中則說，台灣需要鏈結美、日等友盟國家嚇阻戰事發生。第14屆「海內外台灣國是會議」昨登場，邀請日本前防衛副大臣參議員中山泰秀、AIT前處長司徒文，以及外交部次長吳志中等人，就美日台三邊關係進行專題演講。\n\n司徒文表示，台美因共同價值觀團結，皆是民主國家，珍惜獨立、 自由、法治與人權，但除了共享價值觀外，共同利益至關重要，而台灣位於亞太地區第一島鏈中心，這意味著台灣對美國及其在亞洲的民主鄰國的更廣泛的安全利益具有至關重要的地緣戰略意義。因此，雙邊的安全和經濟利益、共同價值觀，以及未來都息息相關。司徒文表示，川普確實為美台關係帶來更大不確定性，川普反覆無常，政策經常發生突然且難以預測的變化，他並提到，川普種種發言與表態都增加了台灣民眾對美國的不信任，如果任由「疑美論」惡化，可能會損害美國的利益。\n\n對於川普要求台灣增加國防支出，他個人認同此觀點，也樂見賴清德總統朝此方向努力。他相信，台灣與美國、日本及各民主國家的關係，對台灣的未來仍然相當重要吳志中認為，2004年台灣推動防衛性公投時，被國際質疑是企圖改變現狀、是麻煩製造者，但如今「中國才是麻煩製造者」的國際敘事已然成形，面對中國等獨裁政權的崛起，台灣不僅要準備好強大的國防實力，更需要鏈結美、日等友盟國家，以國防及外交來嚇阻戰事發生。"}, {"title": "通過國防特別條例 有助鄭訪美氛圍 谷立言肯定親美友日和陸路線 稱嚇阻與對話並重 可維護區域安全", "source": "中國時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "訪】國民黨主席鄭麗文計畫於6月訪美，卻有人認為，若國防特別預算條例草案無法在立法院通過，恐不利於鄭麗文的華府行。美國在台協會（AIT）處長谷立言接受本報專訪時表示，尚未收到鄭訪美細節，不對假設性的安排，發表評論，但若國防特別預算條例盡快通過，會在她訪美之前營造正面的氛圍。谷立言肯定鄭麗文提出「親美友日和陸」的路線，這是受台灣民眾及國際所歡迎，他並提醒還要加上2D策略，即嚇阻（deterrence）與對話（dialogue），將有助維護區...", "full_text": "訪】國民黨主席鄭麗文計畫於6月訪美，卻有人認為，若國防特別預算條例草案無法在立法院通過，恐不利於鄭麗文的華府行。美國在台協會（AIT）處長谷立言接受本報專訪時表示，尚未收到鄭訪美細節，不對假設性的安排，發表評論，但若國防特別預算條例盡快通過，會在她訪美之前營造正面的氛圍。谷立言肯定鄭麗文提出「親美友日和陸」的路線，這是受台灣民眾及國際所歡迎，他並提醒還要加上2D策略，即嚇阻（deterrence）與對話（dialogue），將有助維護區域安全。\n\n谷立言接受專訪重點如下：問：您與鄭主席見了面，是否有談及「鄭習會」？答：我不會透露我們私下談話的細節，她確實分享了她此行的經驗與印象。問：您認為民進黨有能力與北京開始對話嗎？\n\n又或是北京應該率先伸出友誼的手進行對話？答：沒錯。我們認為北京應主動提出不設前提的對話提案。\n\n賴總統已經多次表示願意與北京對話。我們認為北京應該與台灣所有政黨，特別是民選領導人進行對話，以消除誤解，促進雙方合作。問：鄭習會後，北京提出「10項對台措施」，您如何評價這對兩岸關係的影響？\n\n答：整體來說，我們支持兩岸交流。但是，我們不希望看到以分裂台灣社會或削弱台灣社會為目的的行動。中國提出這10點方案，釋出善意，但幾天後，他們卻妨礙了賴總統出訪非洲的行程，這項舉動不僅嚴重損害區域和平與安全，也嚴重違反國際航空法規。\n\n我認為這傳遞出非常令人困惑的訊息，中國並沒有放棄對台灣施加脅迫，無論是外交、經濟或軍事脅迫。所以，我們認為中國要贏得台灣人民信任的最佳方法，是先與台灣社會各界對話，其次是減少對台灣的脅迫或恐嚇行為。問：鄭麗文認為國民黨立場是美中不選邊站，您是否同意或有何建議？\n\n答：首先我要表達一個基本事實，美國與國民黨有近百年情誼。在我擔任美國駐成都總領事期間，參觀許多在重慶和昆明的紀念二戰美軍與國民黨軍隊合作的場所。我覺得有趣的是，美國空軍與台灣空軍的飛行中隊歷史，可以追溯到美國志願軍「飛虎隊」。\n\n最近我陪同台北出生的太空人林琪兒訪問台中時，林父就是在台中清泉崗基地服役，我們一起參觀曾經是美軍俱樂部的美村綜合服務園區，展現了當年美台在台中建立的友誼。由此可見，美國與國民黨的友誼歷史悠久。近期國民黨有「親美友日和陸」政策，這樣的政治框架無論是對台灣人或從國際的角度來看，都是非常好。\n\n而且，國民黨一直奉行嚇阻與對話並重的「2D」政策，這也是非常明智的做法。台灣無需在嚇阻與對話、和平與戰爭之間做出抉擇。如果台灣和國民黨繼續保持平衡嚇阻與對話並重的傳統政策方向，將有助於促進對話，並維護區域安全。\n\n我認為，解決兩岸分歧只有三種途徑：對話、脅迫和衝突。如果台灣擁有足夠的自衛能力，就可以排除「衝突」的武力選項。如果台灣擁有足夠的社會經濟韌性，就可以消除「脅迫」的威脅。\n\n這樣一來，「對話」 必然能成為解決兩岸分歧的唯一途徑。問：如果特別條例在鄭麗文訪美前還沒通過，有人說鄭麗文將無法確保能與華府高層官員會面。這是可能發生的情況嗎？\n\n答：我們還沒收到她要訪美的細節，我就不對這個假設性的安排發表評論。不過，如果國防特別條例盡快通過，會在她訪美之前營造正面的氛圍。問：鄭麗文是否可獲得如同台中市長盧秀燕市長日前訪問華府的相同待遇？\n\n答：我認為，無論是國會、智庫或美國其他機構，都非常珍惜與台灣各政黨代表交流的機會。同時，我也認為，各方普遍關注台灣的安全問題，只要國防特別條例能在短期內取得正面成果，就能為對話營造非常有利的氛圍。"}, {"title": "無人機納國防特別預算 嚇阻力最快速", "source": "中國時報 A03 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算，但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，要提供最快的嚇阻力量，最好的方法是將其納入國防特別預算。問：在野黨希望將商購及委製部分移為年度預算編列，華府會對此感到失望嗎？答：我認為，台灣業者會非常失望。", "full_text": "訪】立法院朝野審查《國防特別預算條例》草案未達共識，一大分歧點是藍營主張商購與委製應該從特別預算中移出，編入一般年度預算，但美國在台協會處長谷立言認為，這會導致資金到位時間拉長，像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，要提供最快的嚇阻力量，最好的方法是將其納入國防特別預算。問：在野黨希望將商購及委製部分移為年度預算編列，華府會對此感到失望嗎？答：我認為，台灣業者會非常失望。\n\n如果商購與委製移為一般年度預算編列，資金到位的時間將會拉長，許多大型常規系統需要數年才能建成並交付給台灣。像無人機這類裝備，台灣可以非常迅速地建立許多這類相對應的能力，如果你的目標是盡快提供最快的嚇阻力量，我認為最好的方法是將其納入國防特別預算。一旦預算通過，台灣就可以立即生產。\n\n如同美國印太司令帕帕羅所說，這類系統在嚇阻方面至關重要，亦如在伊朗衝突和烏克蘭衝突中所見，大規模生產的無人機系統對台灣的安全具有舉足輕重的作用。因此，我們希望整套預算案能同時並進、向前推進。這不僅有利於台灣的安全，也有利於我們共同建構新的產業合作關係。\n\n問：國民黨擔心商購及委製的招標恐有不透明之處，易有弊端，因此主張特別預算應該拆分處理，您的看法如何？答：我有聽說這種講法。任何政府進行採購都應該有監督機制審查，例如，台灣要買救護車或新的發電設備，都會進行公開招標，採購無人機也相同。\n\n這對產業界是參與公開採購的機會，政府應有相關監督機制，解決採購流程中的疑慮。我與台中市盧秀燕市長會面時也談到，國民黨內部愈來愈多的人了解其中的巨大機會，對台中市的企業而言，漢翔科技就是領先的無人機系統整合商之一。因此，這將惠及民進黨和國民黨兩黨執政縣市。\n\n所以，我希望雙方能找到共同點，將此視為台灣所有企業蓬勃發展、為台灣安全做出貢獻的契機。從我們的角度來看，尤其對台灣的安全而言，大規模生產無人系統是非常重要。"}, {"title": "官方看法 加工死有違醫生使命 衛福部不支持多數決", "source": "中國時報 A04 生活綜合", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "藍白皆有意在年底提出公投，白營討論議題包括多年來充滿爭議的安樂死。衛福部指出，世界醫師會（WMA）明確反對安樂死及醫師協助自殺，無論動機如何，均與醫師專業使命相違。從事安寧緩和醫療的醫師也表示，安樂死又稱協助自殺，若合法化，等同容許人們的自主權大於生命權，也難保不會出現提前「下訂」 器官的對價關係，這是很嚴肅、複雜的議題。", "full_text": "藍白皆有意在年底提出公投，白營討論議題包括多年來充滿爭議的安樂死。衛福部指出，世界醫師會（WMA）明確反對安樂死及醫師協助自殺，無論動機如何，均與醫師專業使命相違。從事安寧緩和醫療的醫師也表示，安樂死又稱協助自殺，若合法化，等同容許人們的自主權大於生命權，也難保不會出現提前「下訂」 器官的對價關係，這是很嚴肅、複雜的議題。\n\n安樂死透過醫師處方，由他人協助或自行服用藥品終止生命。衛福部認為，這與醫療專業「救人」的核心價值有所牴觸，亦可能影響醫病關係信任基礎，國際醫學倫理主流未支持安樂死合法化。衛福部長石崇良表示，安樂死也就是協助結束生命的「加工死」，涉及《刑法》，必須推動除罪化才能進行，但能否執行安樂死，目前國內外意見都還很分歧。\n\n多年來國內推動安寧緩和醫療，希望讓臨終病患在自我意識選擇下有尊嚴的善終，屬於「自然死」。萬芳醫院安寧病房主任張家崙指出，安樂死不是解決痛苦，而是結束生命，等於容許人們的自主權大到可以決定自己的生死。他提出質疑，怎麼判斷病人的選擇是病態或理性？\n\n即便是理性的，也可能受外在因素影響，例如付不出醫藥費的人，可能因不想拖累家人而選擇安樂死。張家崙也擔心，不排除會有人向準備安樂死的人「下訂」器官，產生對價關係。民眾必須認清安樂死是加工死亡，這是非常嚴肅、複雜的議題，若沒辦法管理好就會被濫用，產生違背道德、人性的事件。\n\n相關討論還不夠成熟，他不贊同貿然公投。衛福部表示，依我國現行法制，生命終結涉及刑事責任與醫療行為界線，相關議題應透過專業審議、社會對話與立法程序逐步形成共識，而非簡化為多數決處理。"}, {"title": "未理賠可退保費 金管會要查 憂心健康險變儲蓄險，將偏", "source": "工商時報 A05 綜合要聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "壽險公司推出的防癌險設有「未理賠可退保費」機制被金管會盯上。金管會保險局上周五發函給全體壽險公司，要全面清查「現行市售含無理賠可退回保險費設計的保險商品」，限期本周內回覆。為鼓勵保戶維持健康，許多壽險公司推出的健康險商品，會設計「 未理賠的保戶回饋」機制，究竟是哪種回饋機制踩到金管會的監理紅線？", "full_text": "壽險公司推出的防癌險設有「未理賠可退保費」機制被金管會盯上。金管會保險局上周五發函給全體壽險公司，要全面清查「現行市售含無理賠可退回保險費設計的保險商品」，限期本周內回覆。為鼓勵保戶維持健康，許多壽險公司推出的健康險商品，會設計「 未理賠的保戶回饋」機制，究竟是哪種回饋機制踩到金管會的監理紅線？\n\n引起業界熱議。對此，保險局26日回應，壽險商品的「無理賠回饋」通常採用「提高保障額度」或「折抵保費」，若商品設計成生存保險金，將偏離無理賠回饋的本質，且已產生銷售誤導，至於市場上到底還有哪幾公司在銷售，保險局正在普查、進行了解中。據了解，市場現有幾種回饋機制，通常是保戶累積一定期間內未申請理賠，保險金額會增加額度，舉例而言，當保單在一定時間內（如 3年，常見1～6年內）未申請理賠，保險公司會增加下次理賠的保險金額，如增加20％，常見為10％至60％不等。\n\n過去業界也有部分保單的回饋設計是隨時間增加而遞增，保險金額最高可以增至100％。例如，無理賠紀錄期間滿2年，增額比率為10％；無理賠紀錄期間滿3年，增額比率為20％；\n\n無理賠紀錄期間滿4年，增額比率為 30％，依此類推。若保險公司約定「無理賠期間滿 3 年，增額 20％」，原本當次保險金額為 10,000 元，增額後變為12,000元。近來有多家壽險業者推出「無理賠可退回保費」設計的防癌險商品，其機制設計成，只要保戶維持健康「無理賠紀錄」，滿期可領回比年繳應繳保險費總額略高一些的保險費。\n\n壽險業者說明，壽險公司給予保戶的無理賠回饋機制十分常見，一般是設計在醫療險商品上，鼓勵保戶維持健康，希望在合理範圍內不要過度頻繁就醫，但保險局本波盯上的是具有未理賠退保費機制的癌症險，屬於一性次的商品。但也有壽險業者認為，目前市場上這類的商品為數不少，保險局普查過後，是否要求業者停售或調整商品機制，成為業界關注焦點。"}, {"title": "台灣消費的寒冬", "source": "工商時報 D08 全球財經周報 經濟教室", "cat": "社論與評論觀點", "priority": 0, "summary": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。", "full_text": "國欽／】多數人有個迷思，以為消費成長得靠有錢人，錯！民間消費成長關鍵在日常開銷。新車、珠寶消費看似澎湃，其實卻比不上一個便當。\n\n這些年我們常會看到，經營許久的豆花店歇業，賣燈飾的小舖乏人問津，很有口碑的咖啡館打烊，老字號的飯店吹熄燈號，這些故事天天在街頭上演，有人認為這是數位轉型的結果，其實這是消費走下坡的徵兆。最近政府官員總以經濟成長、人均 GDP 超越日、韓而感到驕傲，不少人都說股市熱絡會有財富效果，然而，去年民間消費低迷，哪來什麼財富效果？依國民所得統計，1980年代民間消費平均每年成長9％，1990年代仍有7％，去年只有1.5％，股市大漲並沒有讓消費得到擴張。\n\n財富集中日益嚴重去年經濟成長率8.7％，代表大家都更有錢了，何以消費弱到這步田地？原因就在財富集中日益嚴重。當一億元為一人擁有，他一年再怎麼花，終究花不完的，就算花個三千萬，還賸七千萬，消費能量怎能不低？\n\n但當這一億分給一千人，每個人分到十萬後都會花光，一毛不剩。同樣一億，一個人擁有與一千人擁有所創造的消費力道，哪個大？不言可喻。\n\n辛棄疾說「千年田換八百主，一人口插幾張匙？」說的就是這個道理，一個人再怎麼豪飲夜宴，再怎麼購買名車、買黃金珠寶，終究有限，這就是何以有錢人消費傾向低，窮人消費傾向高的原因。多數人有個迷思，以為消費成長得靠有錢人，錯了，民間消費成長的關鍵在於日常的小額消費，新車售價雖逾百萬，一年銷售不過7,6 00億，金飾珠寶有錢人最愛，一年不及400億，這些消費看似澎湃，卻比不上小小一個便當。\n\n真的嗎？我們假設台灣有2,000萬人每天吃一個110元的便當，一年下來便當的消費就高達8,000多億，比起汽車、珠寶黃金的消費多多了。此外，依財政部統計，國人在咖啡館裡喝咖啡及買咖啡豆，去年也花了300多億元，化妝品一年的消費更逾500億。\n\n這樣看來，吃便當、喝咖啡、買化妝品這日常開銷比起買名車、買黃金珠寶對民間消費的貢獻更大。日常開銷動能走下坡然而，當國內有七成的人領不到平均薪資，工作貧窮日趨普遍，人們就得省吃儉用，少吃一個便當，少喝一杯咖啡，少買一些化妝品，看似小小的撙節，卻在無聲無息中窒息了消費動能。咖啡館、精品店、書店、餐廳、文具店生意一落千丈，豈偶然哉？\n\n1980～2000年的台灣沒有今天這麼有錢，可是消費活力遠勝於今天，原因就在於那個年代GDP果實人人能分享。隨著資本經濟洗牌，贏者圈愈來愈小，貧富差距愈來愈大，如此就算經濟成長、人均GDP睥睨全球，民間消費也難以振衰起蔽。最後，拿民間消費占GDP比率與各國比一下，2000年台灣55％，低於美國，而高於日、韓，消費是推升GDP的重要動能，去年台灣民間消費占GDP比率降至43％，非僅不如日、韓、美，也拖累經濟成長。\n\n二十多年來到底發生什麼事，台灣消費動能何以一降再降，值得深思。小檔案■依財政部營利事業銷售資料，2025年全新汽車零售額7,6 70億元。其他化妝品零售536億，香水及香粉零售6億。\n\n金銀飾零售2 45億、珠寶零售83億、金（銀）條及金（銀）塊及金（銀）幣金（銀）錠零售額30億。小檔案■辛棄疾：「千年田換八百主，一人口插幾張匙？」明詩：「任君蓋下千間舍，一身能臥幾張床？\n\n」 皆在說明一個人只有一張口、一個身子，再怎麼消費，終究有限，萬貫家財集於一人之身，既無處可消費，最後皆成為儲蓄，無法推升GDP。"}, {"title": "亞資中心業務 拚全台落地 金管會7月起開放部分項目全國適用 市場看好家族辦公室、境外私募基金銷售先放行", "source": "經濟日報 A02 話題", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "試辦近一年後，亞洲資產管理中心高雄專區將「走出高雄」。金管會已完成業者意見調查，規劃 7月起開放部分業務全國適用，市場看好家族辦公室、境外私募基金銷售兩大業務最先放行，全台資產管理市場將迎來新一波結構性開放，商機再起。金管會對亞資中心的政策路徑採「試辦、檢討、調整、落地」，目前已進入檢討收斂階段，預計 6月底前拍板、7月正式上路，要從「區域試驗」走向「全台落地」。", "full_text": "試辦近一年後，亞洲資產管理中心高雄專區將「走出高雄」。金管會已完成業者意見調查，規劃 7月起開放部分業務全國適用，市場看好家族辦公室、境外私募基金銷售兩大業務最先放行，全台資產管理市場將迎來新一波結構性開放，商機再起。金管會對亞資中心的政策路徑採「試辦、檢討、調整、落地」，目前已進入檢討收斂階段，預計 6月底前拍板、7月正式上路，要從「區域試驗」走向「全台落地」。\n\n市場預期，低風險、具需求的業務將優先落地。家辦與境外私募基金銷售，被視為最具成熟度與擴張性的兩大項目，銀行與投信投顧已有合作模式，可快速複製至全台。從實際成效來看，家辦已成專區核心動能。\n\n據金管會統計，從去年7月高雄專區試辦以來，到2月底共21家銀行進駐，總管理資產（AUM）突破3,700億元，其中家辦累計127組、受託資產超過500億元，顯示高資產客群需求強勁。業者指出，若家辦業務不再限高雄開戶，將可直接承接全台家族企業需求，不僅擴大服務半徑，也有助銀行提升財管手續費與資產規模，形成雙贏。另一亮點是境外基金銷售模式。\n\n透過銀行與投信投顧合作，引進未具證投信基金性質的境外基金，發展多通路銷售，不僅滿足高資產客戶多元配置需求，也被視為未來跨境財管的重要引擎。相較之下，融資業務仍待觀察。包括自行質借、金融資產組合融資（Lombard Lending）及保單、保費融資等，因風險控管與市場爭議較高，且部分業者剛起步，短期內仍可能留在專區內持續驗證。\n\n政策下一步將強化境外資產整合。金管會規劃整併OBU、OSU、OIU三大境外中心，成為OAMU（境外資產管理平台），打造一站式境外資產管理平台，並擬放寬境外私募基金的99人募集限制，提升市場規模與彈性。據金管會到4月中統計，已有56家業者進駐、二家審核中，另有六家銀行申請高資產財管執照，整體高雄專區版圖上看64家，跨銀行、壽險、券商與投信投顧，財管生態鏈逐步成形。\n\n市場指出，從低風險業務率先全台落地，台灣資產管理市場也將從區域試點，邁向全面開放的新階段。"}, {"title": "台日產業政策鏈結 聚焦5領域合作", "source": "自由時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯學的局勢下，台日基於戰略同盟所擘劃的國家級產業政策鏈結，換言之，台日合作已從民間企業自發行為，上升到國家產業政策的高度。產發署說明，該計畫鼓勵台日企業投入具前瞻性、創新性及應用潛力的研發合作專案，聚焦...", "full_text": "導〕經濟部產發署公告「台日關鍵優勢產業合作補助計畫」，透過國際技術鏈結促進國內高科技及新興產業領域的實質技術合作與創新應用，並強化國際布局，聚焦智慧科技、智慧製造、材料與生物科技、自主移動載具及綠能科技；這項計畫被視為在現今以供應鏈韌性為顯學的局勢下，台日基於戰略同盟所擘劃的國家級產業政策鏈結，換言之，台日合作已從民間企業自發行為，上升到國家產業政策的高度。產發署說明，該計畫鼓勵台日企業投入具前瞻性、創新性及應用潛力的研發合作專案，聚焦五大領域，一是智慧科技，包括光電及半導體技術、人工智慧、物聯網、第五／第六代行動及衛星通訊技術、資安與數位應用服務等；\n\n二是智慧製造，涵蓋高階自動化、工業機器人技術、先進製程整合等；三是材料與生物科技，包括奈米材料、高機能材料、綠色化學、生技醫藥、光電融合材料、重要礦物等；四是自主移動載具，包括無人機、無人車、服務型機器人等；\n\n五是綠能科技，包括儲能系統、再生能源、節能減碳設備技術與服務等。產發署說，為確保計畫品質與雙邊合作實效，技術審查著重四大面向，一是計畫整體可行性與執行能力，二是技術瓶頸突破性、預期成果成熟度與未來商品化應用潛力及國際市場需求的對接性，三是台日雙邊互補與互利的合作效益，四是符合本次徵案的五大重點補助領域。產發署補充，這項計畫申請時程自公告日起至今年六月三十日止，申請標的僅適用於企業尚未開發的研發計畫；\n\n合作的日本廠商資格須是在日本當地有營業登記的企業，並已向日本政府提出與本計畫合作相關的申請補助。"}, {"title": "金管會祭台積電條款 台股今拚4萬點 法人：慎防震盪", "source": "中國時報 A05 財經綜合", "cat": "台灣產業與投資動向", "priority": 0, "summary": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬點「一定會到」，但根據過往經驗，近關情怯恐難避免，屆時中小個股震盪幅度勢必加大，仍須慎防殺盤。", "full_text": "台股挑戰4萬點，就看這周！金管會鬆綁持股限制，帶動台積電股價狂飆，台指期上周五夜更衝上39766點新高，衝上台股本周挑戰4萬點蓄積能量。法人指出，以台積電現階段難以預測高點之漲勢，4萬點「一定會到」，但根據過往經驗，近關情怯恐難避免，屆時中小個股震盪幅度勢必加大，仍須慎防殺盤。\n\n金管會放寬股票型基金、主動式ETF對台積電持股上限，帶動24日台積電股價以2190元及2185元創下盤中及收盤新天價，推升台股盤中攻上38989.94點新高，終場勁揚1218.25點，創下史上第5大單日漲點，以38932.4點作收，再創收盤新高，接下來將直取4萬點。法人指出，美伊戰事還在打，美國總統川普每天講的也都不一樣，但市場對此利空似乎已經鈍化，台股更在AI題材加持下，持續走自己的路，美股24日多數收紅，那斯達克和標準普爾500指數再度改寫歷史新高，外在環境都營造台股持續走高的能量。富邦投顧董事長陳奕光指出，金管會放寬股票基金、主動式ETF對台積電持股上限，可望帶動台積電股價走高，加上台積電權值高，將帶動台股挑戰4萬點大關，甚至更高；\n\n而美股4大指數近期創新高，台股會有比價效應，只要前波高點35579點未跌破，仍屬偏多格局。永豐投顧則說，外資持續加碼，內資受主動式ETF持續加碼買入，融資融券同步增加，多頭氣勢充足，而台股在上周五成功收復上影線站上歷史新高後，可先觀察能否站穩38900點，若能成功站穩，上攻空間就可打開。也有法人認為，在台積領軍下，台股出現「漲不停」的大多頭行情，但居高思危的壓力並非沒有，以台股上周五大漲 1218.25 點來看，台積電、台達電、聯發科三檔就貢獻了 1020的漲點，同時卻有 1224檔股票下跌，有84檔股價還創月新低，顯示極不均衡。\n\n法人指出，大盤乖離率過高，且因短時間內急速暴漲，市場浮現「 擦鞋童理論」疑慮，當開戶人數、交易人數屢創新高，貪婪情緒升溫，隨時都可能反轉下殺，就像上周四出現衝高後急殺，高低點價差1 757點，這種震盪隨台股愈近4萬點，愈有可能頻繁發生。"}, {"title": "川普取消特使：伊朗想談可打電話", "source": "工商時報 A02 火線焦點", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願，但拒絕被迫接受條件。", "full_text": "美國總統川普25日取消派出特使赴巴基斯坦，與伊朗代表進行會談行程，讓外界希望美伊雙方透過外交和談來結束戰爭的期待落空。川普認為伊朗若真的想要和平，可透過電話溝通。伊朗則重申談判意願，但拒絕被迫接受條件。\n\n川普取消派出特使威特科夫（Steve Witkoff）和女婿庫許納（Ja red Kushner）擔任談判特使，他解釋因認為伊朗提出願意達成和談的條件不足，不想兩人為此奔波與浪費開銷。川普在社交平台Truth Social發文，伊朗領導層存在極嚴重的權力鬥爭，內部混亂至連包括其高層在內，都沒人知道目前由誰主導伊朗局面。現在所有談判籌碼都由美國掌握而非伊朗。\n\n若伊朗真想和談，只要給他打電話就行。他說，在取消特使的談判行程後十分鐘，就收到伊朗提出更多讓步。雖然這些讓步仍不足夠，但川普仍暗示雙方28日再進行談判的可能。\n\n伊朗總統裴澤斯基安（Masoud Pezeshkian）重申願意談判，但拒絕在面對壓力和威脅下被迫與美國談判，也不接受對方單方面提出的條件，表示目前伊朗領導層既沒有強硬派，也沒有溫和派，警告若談判破局就不排除軍事行動。此外，除非美國停止敵對行動和施加壓力，應該首先解除包括海道封鎖等障礙，雙方才能開始坐下來談判。伊朗提出的四大訴求，包括安全保障、持續推進核計畫並保留高濃縮鈾、解除制裁、和2月底以來的戰爭賠償。\n\n美國則堅持伊朗不得擁有核武，並持續封鎖其港口。"}, {"title": "和談未明 川普：伊朗不擁核才能協議 美代表團取消赴巴基斯坦 伊朗外長又重返巴國：不在施壓下談判", "source": "聯合報 A10 國際", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美國總統川普廿五日聲稱，他從伊朗收到的美伊和平協議提案「不夠好」，因此取消美方代表團原定當天上午前往巴基斯坦的行程。他並強調，這並不代表美國及以色列將立即重啟對伊朗的攻擊。另外，伊朗官媒「伊朗通訊社」（ＩＲＮＡ）及美國有線電視新聞網（ＣＮＮ）引述伊朗消息人士報導，伊朗外長阿拉奇廿六日離開阿曼首都馬斯開特，返回巴基斯坦首都伊斯蘭馬巴德；", "full_text": "美國總統川普廿五日聲稱，他從伊朗收到的美伊和平協議提案「不夠好」，因此取消美方代表團原定當天上午前往巴基斯坦的行程。他並強調，這並不代表美國及以色列將立即重啟對伊朗的攻擊。另外，伊朗官媒「伊朗通訊社」（ＩＲＮＡ）及美國有線電視新聞網（ＣＮＮ）引述伊朗消息人士報導，伊朗外長阿拉奇廿六日離開阿曼首都馬斯開特，返回巴基斯坦首都伊斯蘭馬巴德；\n\n他當晚飛抵伊斯蘭馬巴德的努爾汗空軍基地，在短暫停留巴基斯坦後，將轉往俄羅斯莫斯科。阿拉奇感謝阿曼從中調解伊美的外交作為，並提醒美國在中東的軍事存在正造成不穩定及分裂；他在馬斯開特與阿曼蘇丹、國家元首塔瑞克會談，並重申伊朗致力維護和阿曼及其他波斯灣南部國家的友好關係。\n\n而這些伊朗鄰國境內均有美軍基地。川普廿五日宣布取消美方代表團赴巴基斯坦和伊方代表團舉行第二輪談判後指稱，「我們握有一切籌碼，伊朗卻一無所有，要是伊朗想談，只要打通電話就行，隨時都能聯絡我們；我已對我的團隊說，你們不用搭十八個小時的飛機過去那裡枯坐空談；\n\n他們原本已準備出發」。至於取消美方代表團原定的巴基斯坦行，是否代表美以伊戰爭將重燃戰火，川普說，「不是那個意思，我們還沒考慮到那一步」。川普還說，「（伊朗）他們給我們的協議文本應該要更好。\n\n但有趣的是，我取消美方代表團的行程後，還不到十分鐘，我們就收到一份更好的新文件，內容比原先的好很多」。他重申，整個協議「並不複雜」，即伊朗不能擁有核武，「就那麼簡單」；「他們做出很多讓步，但還不夠」。\n\n川普也在自創社媒真實社群又發文表示，伊朗領導高層內部目前內鬨嚴重且極為混亂，「沒人知道現在誰當家，甚至他們自己都不清楚」。伊朗外交部廿五日則發布聲明強調，伊美間（目前）沒計畫舉行談判，伊朗的想法將向巴基斯坦傳達。阿拉奇同日從巴基斯坦轉往阿曼訪問，他在社媒Ｘ寫道，巴基斯坦行成果豐碩，已提出讓這場戰爭終戰的可行框架。\n\n伊朗總統裴澤斯基安同日在與巴基斯坦總理夏立夫通話時表明，伊方將不會在美方的施壓、威脅及海上封鎖下談判，尤其美軍應先解除封鎖。負責美伊戰爭的美國中央司令部廿五日表示，美軍當天在阿拉伯海攔截一艘試圖闖關的「伊朗影子艦隊」油氣商船「塞凡號」。根據英國首相府，川普廿六日與英國首相施凱爾通話，討論當前急需紓解的荷莫茲海峽「塞船」問題。"}, {"title": "美伊各認占上風 談判卡關", "source": "聯合報 A10 國際", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "第二輪美伊談判仍無具體時間表。華爾街日報廿五日報導，這代表白宮正面臨重燃戰火或尋求談判的兩難抉擇，雙方仍各說各話。上周在和於美伊間擔任調解方的巴基斯坦領導高層會談後，伊朗外長阿拉奇向伊朗官媒「伊朗通訊社」（ＩＲＮＡ）說，美國是否真的認真想推進外交，仍有待觀察。", "full_text": "第二輪美伊談判仍無具體時間表。華爾街日報廿五日報導，這代表白宮正面臨重燃戰火或尋求談判的兩難抉擇，雙方仍各說各話。上周在和於美伊間擔任調解方的巴基斯坦領導高層會談後，伊朗外長阿拉奇向伊朗官媒「伊朗通訊社」（ＩＲＮＡ）說，美國是否真的認真想推進外交，仍有待觀察。\n\n英國智庫「皇家國際事務研究所」主任瓦基爾說，在伊朗和美國主張的立場更趨於接近前，伊方將不會想與美國直接談判；伊方認為現在就與美方會面沒意義，只會讓美國總統川普掌握話語權，看來像是伊方急於對話。在伊方封鎖荷莫茲海峽（下稱海峽）後，美方也封鎖伊朗各港口作為反制，因此伊方堅持除非美方先解除對伊朗港口的封鎖，雙方才能恢復談判。\n\n總部在比利時的非政府組織（ＮＧＯ）「國際危機組織」（ＩＣＧ）主任瓦艾斯也說，美伊都覺得自己占上風，要對海峽解封就應同時解封。除了海峽封鎖和以色列與黎巴嫩間的停火，伊朗核計畫更是美伊談判的重中之重。儘管白宮希望伊朗願將高純度的濃縮鈾庫存轉移海外，但德黑蘭仍堅持其核計畫是不可跨越的紅線，伊朗駐印度大使法塔里就強調，「唯有當敵人承認我國和平擁核的權利，那談判才能取得適當的進展」。\n\n為期兩周的美伊停火原定廿二日到期，但川普突宣布延期。然而，他仍持續對伊朗發出威脅。伊朗外交官及知情人士說，伊方已告知巴基斯坦，若美方願停止威脅，將有助說服德黑蘭的強硬派同意重啟美伊談判。"}, {"title": "川普取消特使赴巴 美伊談判停擺", "source": "中國時報 AA02 焦點新聞", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先預測，美伊雙方25日將針對結束戰爭、推動停火協議進行協商，不料伊朗外長阿拉奇（AbbasAraghchi）僅與巴基斯坦官員會談後便離開伊斯蘭馬巴德，阿拉奇稱，巴基斯坦之行成果豐碩，但他對華盛頓的意圖表...", "full_text": "美伊談判再度停滯，美國總統川普取消了美國代表團訪問巴基斯坦的行程，為和平前景帶來了新的挫折，不過川普表示這並不意味著戰爭會再次爆發。另外，伊朗總統裴澤斯基安與巴基斯坦總理夏立夫通話時強調，德黑蘭不會在壓力、威脅或封鎖下被迫進行談判。媒體原先預測，美伊雙方25日將針對結束戰爭、推動停火協議進行協商，不料伊朗外長阿拉奇（AbbasAraghchi）僅與巴基斯坦官員會談後便離開伊斯蘭馬巴德，阿拉奇稱，巴基斯坦之行成果豐碩，但他對華盛頓的意圖表示懷疑。\n\n伊朗國家電視台稱，阿拉奇沒有與美國官員會面的計畫，巴基斯坦將扮演傳遞提議的管道角色。路透報導，川普 25 日決定取消美國特使魏科夫（Steve Witkoff）和女婿庫許納（Jared Kushner）的訪問計畫，因為會談涉及過多的差旅和費用，而且伊朗最新的和平提議對他來說還不夠好。川普說，「我們掌握了所有籌碼。\n\n他們（伊朗）隨時可以聯繫我們，但我們不會再為了閒聊而飛 18 個小時了。」 當被問及取消行程是否意味著戰火將重燃時，川普回應說：「不，這並不意味著戰爭會再次爆發。我們還沒有考慮過這個問題。\n\n」 川普並表示，在他宣布取消訪問後，伊朗提交了一份修改後的方案，但還不夠好。根據伊朗通訊社（IRNA）報導，裴澤斯基安25日與夏立夫（Shehbaz Sharif）通話時，解釋了阻礙外交進程的因素。他強調，只要美國的敵對行動和軍事壓力持續存在，「重建信任和推進對話進程將面臨巨大困難」。\n\n裴澤斯基安表示，伊朗僅要求在國際法框架內維護本國合法權利，並未提出超出此框架的任何訴求。巴基斯坦總理辦公室發布聲明稱，兩國領導人就當前地區局勢以及為促進區域和平與穩定所做努力交換意見。另外，伊朗最高領袖穆吉塔巴．哈米尼（Mojtaba Khamenei）25日晚上在社群媒體上發文，敦促「伊朗南邊鄰國」認清形勢，作出正確判斷，對「邪惡勢力」的虛假承諾保持警惕。"}, {"title": "全球超級央行周 利率料全數按兵不動", "source": "工商時報 A02 火線焦點", "cat": "國際金融與貨幣政策", "priority": 0, "summary": "超級央行周登場，美加歐英日都將在本周公布貨幣決策。市場預估五大央行將按兵不動，以觀察美伊衝突帶來的外溢衝擊與通膨影響。各大央行維持觀望的另一原因，則是美國聯準會（Fed）主席能否順利換人仍存在不確定性。", "full_text": "超級央行周登場，美加歐英日都將在本周公布貨幣決策。市場預估五大央行將按兵不動，以觀察美伊衝突帶來的外溢衝擊與通膨影響。各大央行維持觀望的另一原因，則是美國聯準會（Fed）主席能否順利換人仍存在不確定性。\n\n美國司法部已撤銷對Fed總部翻修超支與鮑爾的刑事調查，為美國總統川普提名人選華許接任主席掃除障礙。這可能是鮑爾5月15日任期屆滿前最後一次以主席身分主持會議，他在會後記者會如何評估通膨走勢，將是市場關注焦點。經濟學家艾絲黛．歐（Estelle Ou）表示：「在未來一周，多數央行料在美伊緊張局勢下維持利率不變，我們預期Fed將按兵不動至第四季，歐洲與英國央行則會保留未來升息的可能性。\n\n」 日本央行（日銀）28日將公布貨幣政策，從官員近期發言推斷本月可能暫緩升息，多數經濟學家預期下一次升息可能在6月。受美伊開戰推升油氣價格的影響，市場對日銀短期升息的預期降溫。日本因高度依賴能源進口而承受極大壓力。\n\nFed在當地時間28～29日（台灣時間30日凌晨）召開聯邦公開市場委員會（FOMC）會議後，料將利率維持在3.5％～3.75％區間不變，連三次按兵不動，原因是通膨壓力攀升、就業市場與經濟展現韌性。在企業投資強勁的支撐下，美國經濟今年初加速成長、第一季國內生產毛額（GDP）季增年率估達2.2％，可望從2025年底政府停擺的低迷中反彈。但消費支出成長料放緩，通膨也可能急遽升高，原因是美伊衝突推高油價與生產成本。\n\n加拿大央行29日召開例會，市場預估利率將維持在2.25％不變，理由是通膨水平接近目標。但官員將密切觀察戰爭造成的油價衝擊如何影響經濟與物價。歐洲央行（ECB）與英國央行皆於30日公布貨幣決策，市場認為兩者都可能維持現行利率不變，分別為2％與3.75％。\n\n歐元區4月通膨估升至3％，這將是2023年底以來最高，且遠高於E CB設定的2％目標。經濟動能也難逃衝擊，這可能促使ECB官員將升息決策延後至6月，屆時將有新的季度預測可供參考。"}, {"title": "超級央行週 美英歐日料利率不變", "source": "自由時報 A02 焦點新聞", "cat": "國際金融與貨幣政策", "priority": 0, "summary": "導〕戰爭局勢不明彭博經濟學家預期 Q4前Fed將按兵不動彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策會議後，預料將維持借貸成本不變，同時密切關注伊朗戰爭引發的高能源成本是否加劇通膨。這些央行做出的最終決定，可能意味著全球貨幣政策官員再次重申他們準備好採取行動的決心。這種態度與二○二二年上次能源危機初期普遍存在的樂觀態度截然不同，當時許多決策官員認為，通膨飆升只是暫時的。", "full_text": "導〕戰爭局勢不明彭博經濟學家預期 Q4前Fed將按兵不動彭博報導，美國聯準會（Fed）、加拿大央行、英格蘭銀行、歐洲央行和日本銀行，在本週稍後舉行的貨幣政策會議後，預料將維持借貸成本不變，同時密切關注伊朗戰爭引發的高能源成本是否加劇通膨。這些央行做出的最終決定，可能意味著全球貨幣政策官員再次重申他們準備好採取行動的決心。這種態度與二○二二年上次能源危機初期普遍存在的樂觀態度截然不同，當時許多決策官員認為，通膨飆升只是暫時的。\n\n儘管國內情況對所有央行至關重要，但全球能源供應的重要水道荷姆茲海峽局勢，也可能在一定程度上左右其貨幣政策的走向。美國總統川普取消高級特使飛往巴基斯坦展開和談的計畫，伊朗則表示只要受到威脅就不會進行談判，因此重啟和平談判的努力陷入停滯狀態。彭博經濟學家Estelle Ou表示：「未來一週，Fed、歐洲央行、英格蘭銀行、日本銀行和加拿大央行，可能會維持利率不變，因為美伊緊張局勢持續且動盪。\n\n我們預計Fed將維持利率不變直至第四季，而歐洲央行和英格蘭銀行則保留升息的選擇權。」 日本銀行將率先於廿八日開會，上週發言的官員傾向於本月暫緩升息，多數經濟學家預期下一次升息可能在六月。經濟學家和投資人預期，Fed在廿九日會後將維持利率在三．五％至三．七五％區間不變，連三次按兵不動，主因中東衝突帶動能源價格飆升，導致通膨壓力攀升，而美國就業市場與經濟仍展現韌性；\n\n加拿大央行也將在廿九日會後維持利率二．二五％不變。歐洲央行和英格蘭銀行將於三十日會後公布利率決策，預料都將維持利率不變，分別為二％與三．七五％。"}, {"title": "美伊戰事未解 衝擊AI發展前景", "source": "聯合報 A09 全球瞭望", "cat": "地緣政治與國際衝突", "priority": 0, "summary": "因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建設。但美伊衝突將中東各國捲入，AI數據中心也成攻擊目標，加上能源價格上漲、原物料供應等危機，AI泡沫化又再度成為熱議題。伊朗報復攻擊AI設施隨著美國與以色列2月28日聯手軍事打擊伊朗，麻省理工學院研究員克德羅斯基3月20日告訴時代雜誌，由於能源與資訊網路高度相互依存，而衝突結局又未知，圍繞AI而生的系統性經濟風險讓人憂心。", "full_text": "因廉價且易於取得的能源、土地及當地政府支持，科技企業斥資數十億美元投入中東人工智慧（AI）基礎設施建設。但美伊衝突將中東各國捲入，AI數據中心也成攻擊目標，加上能源價格上漲、原物料供應等危機，AI泡沫化又再度成為熱議題。伊朗報復攻擊AI設施隨著美國與以色列2月28日聯手軍事打擊伊朗，麻省理工學院研究員克德羅斯基3月20日告訴時代雜誌，由於能源與資訊網路高度相互依存，而衝突結局又未知，圍繞AI而生的系統性經濟風險讓人憂心。\n\n由於 AI 數據中心成為伊朗報復攻擊目標，華府智庫戰略暨國際研究中心（CSIS）主任梅塔 3 月 11 日告訴 CNBC，管理AI基礎設施的企業可能制定因應方案，或考慮將數據中心移往風險較低的地區，或利用飛彈防禦、反無人機科技加強數據中心安全。跨國金融服務控股公司Hilco Global地緣政治部門執行董事墨菲說，「若波灣地緣政治風險不斷攀升，考量北歐、印度與東南亞的電力供應、監管機制及安全狀況更具預測性，企業可能會加速這些地區的建設」。美數據中心負荷超載雖然中東一向以廉價能源吸引科技企業的青睞；\n\n克德羅斯基認為，許多AI數據中心依賴天然氣供電，而波灣地區的天然氣設施卻成為攻擊目標，修復設施又耗時數個月，導致全球天然氣價格上漲。以歐洲天然氣價格主要基準之一的荷蘭天然氣交易中心（Dutch TTF）價格為例，2月25日價格為每百萬英制熱量單位10.75美元，3月19日漲至最高20.9美元，4月14日仍有15.03美元。儘管多數的數據中心仍位於美國，而美國又生產且出口天然氣，所受衝擊較低，不至於立即面臨成本上漲；\n\n但克德羅斯基說，其他數據中心的工作轉移至美國，而美國積累的工作量已非常龐大，無法負荷新任務將導致整個系統癱瘓。晶片製造成本恐變高美國政治與公共政策雜誌「美國展望」4月13日也指出，亞洲許多工業設施靠卡達與波灣地區供應的天然氣運作，而其供應已在戰爭期間耗盡。雖然台積電與南韓晶片製造商SK海力士均表示目前仍不受影響，拜登時期官員賈奎茲卻說，晶片製造商因與天然氣供應商簽署長期協議，故受市場日常波動影響較小。\n\n但合約屆期後若仍維持高價，製造商將支付更多能源與化學原料成本。半導體雖主要產自東亞與東南亞，許多原料卻來自中東，成為另一項問題。「美國展望」說，波灣國家化石燃料儲量豐富，而化石燃料又是生產半導體的關鍵。\n\n各企業斥資數千億美元建構數據中心之際，一旦生產中斷，不僅對消費性與商用電子產品的供應產生壓力，還可能嚴重阻礙AI算力成長。以氦氣為例，其可控制晶片生產過程中的溫度，也能偵測有毒化學物質外洩。美國知名信評機構惠譽稱，因生產設施受損與荷莫茲海峽運輸中斷影響，氦氣價格自戰爭以來已翻倍。\n\n卡達拉斯拉凡工業市氦氣產量占全球供應量近3分之1，卻因伊朗3月初的攻擊持續停產中。中東資料中心優勢減另一風險則是中東地區的數據中心成為衝突雙方飛彈攻擊的目標。面對美國與阿聯等國去年大力宣傳在中東興建大規模數據中心計畫，克德羅斯基說，這場衝突曠日持久，會讓這些建設計畫風險或成本過高。\n\n康乃爾大學教授尤峰崎說，衝突爆發前中東地區興建數據中心就面臨水資源消耗問題，若廉價可靠且無限的能源供應已不再穩定，「短期內許多公司可能會重新評估在中東建設資料中心」。歐盟媒體歐洲動態4月4日引述歐洲政策中心分析師勞斯伯格說法，電價、運費、原料成本上漲，「恐成壓垮駱駝的最後一根稻草」。"}, {"title": "自由廣場》國安修法防敵對動員 也要嚴守法治邊界", "source": "自由時報 A14 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。", "full_text": "民主能容納尖銳批評政府，也能容納統獨、國家定位與兩岸政策辯論；但民主沒有義務保護替敵對政權鼓吹武力消滅本國主權的宣傳。國安法修法的核心，不是讓政府拿國安壓言論，而是把自由討論、政治主張與敵對動員分清楚。\n\n草案針對以文字、聲音、影像等方式，公開鼓吹、倡議或支持外國、中國、港澳或境外敵對勢力，對中華民國發動戰爭，或以非和平手段消滅中華民國主權者，可處行政罰。這個事實說明，爭點不在一般政治意見，而是敵對勢力的暴力目標能否被包進言論自由。既然牽涉言論，政府更不能只喊國安。\n\n誰來認定、如何認定、如何救濟，都必須寫清楚；若涉及網路內容處置、限制接取或命令改正，更應有明確門檻與司法監督。國安名義越大，行政權越要受檢驗，法治邊界才不會被擠壓。\n\n在野黨質疑構成要件不明、行政權過度集中，不能用一句「反國安」打發；但這項質疑也不能倒過來替鼓吹武力滅國找藉口。若把公開支持敵對政權以戰爭或非和平手段消滅台灣主權，全都塞回言論自由，實質上就是要求民主制度替自己的解體放行。\n\n成熟民主不是沒有紅線，而是紅線必須窄、準、可受檢驗。批評政府、主張政策、討論統獨，應受保障；鼓吹敵對勢力以暴力或非和平方式消滅主權，則應被排除。\n\n界線劃不好，政府會被懷疑擴權；完全不劃，國安防衛就會被敵對宣傳反覆測試。國安修法要快，更要準。\n\n政府不能拿國安換取空白授權，在野黨也不能拿言論自由拆掉國安門鎖。自由不是替滅國宣傳開後門，法治也不是給行政權開空白支票；把紅線寫窄、程序審嚴、執法攤在陽光下，才是台灣面對敵對滲透時最該守住的民主防線！\n\n（作者為退休人士）"}, {"title": "自由廣場》併購案的國安盲點 外送大軍淪中共免費探路人？", "source": "自由時報 A14 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？", "full_text": "點外送是許多台灣人的日常，但這個再平凡不過的舉動，可能正在悄悄瓦解國防防線？公平會近期審查 Grab併購Foodpanda一案，多數人關心的是未來是否有免運？會員費是否調漲？\n\n然而，在全民國防的視角，這是一場山雨欲來的國土測繪保衛戰！所稱全民國防，即是認知到「生活處處是防線」。一旦戰爭打的是城鎮戰，勝負關鍵就在於「巷弄地形」。\n\n國人熟悉的Google地圖，多半只拍到大馬路。但Grab引以為傲的GrabMaps卻是大數據的「活地圖」，它即將可能靠著全台十幾萬名外送員，每天趕單進出防火巷、大樓側門、地下停車場等…鑽出來的。這無形中繪製出了台灣最精密的3D立體兵要圖。\n\n這些複雜的巷弄就是我們抵抗外敵的天然掩體，怎能輕易將數據交到外人手裡？Grab地圖技術與華為的「花瓣地圖」有著密切合作，其雲端服務更包含阿里巴巴的「阿里雲」，更令人毛骨悚然。在中共《國家情報法》的緊箍咒下，只要北京當局一聲令下，中企必須無條件交出所有數據。\n\n等於讓台灣十幾萬名外送大軍，於不知不覺中，被迫成為解放軍的免費探路人！試想，若我國防高官或重要將領，深夜點了一包鹹酥雞外送，敵方透過阿里雲的大數據比對，瞬間就能精準鎖定其座標與作息。若再循著被收買的外送員，其日常鑽出的「隱蔽路線」，直接進行精準斬首，後果不堪設想。\n\n全民國防不能只是一句口號，必須落實在每個數位細節裡。當我們的手機足跡已經成為現代戰爭的導引武器，公平會、數發部與國安單位，萬萬不能再用「外資合併」的單純商業邏輯來草率審查此案。呼籲相關單位，絕不能只用「市場有沒有壟斷」的舊有經濟思維來審查此案。\n\n台灣地理情資與全民個資，是數位時代最寶貴的國防資產。如果 Grab無法提出技術證明，保證台灣數據百分之百「落地」且徹底切斷與華為、阿里雲的聯繫，政府就應展現捍衛國土安全的魄力，直接否決這項併購案！守護台灣，就從守護我們的巷弄圖資做起。\n\n別讓一份日常的外送鐵板燒，成了中共無人機長驅直入的導航路標。（作者為教師）"}, {"title": "當政策只是回應壓力 難解醫護流失", "source": "聯合報 B01 健康", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為明顯。", "full_text": "台灣護理人力短缺並非新議題，早在十多年前就已現警訊。直至今日，急診壅塞、病房關閉與排床困難不減反增，我們必須正視一個核心事實，醫療體系所依賴的人力基礎，正在結構性流失。台灣整體醫療環境面臨的問題不是短期缺工，而是長期失衡，其中以護理專業最為明顯。\n\n總勞動力下降各行各業缺工缺工不只發生在護理人力，從工程師、機師到各類專業技術人員，缺工已是全面現象。當總體勞動供給下降，提高薪資與改善條件，往往只是產業間的人才再分配，而非真正增加人力。更根本的是，世代價值已經改變，新世代不再願意為高壓、長工時與高度責任承擔無限讓渡生活品質，護理工作的本質，與這樣的價值轉變之間，存在難以忽視的落差。\n\n台灣邁入超高齡社會，醫療與長照需求持續上升，但護理教育端招生不足，學成不願投入職場、留任率低，顯示供給緊縮，能提供服務的人卻愈來愈少。面對這樣的現實，如何讓護理人員在有尊嚴且合理的工作環境下留下來，同時改變醫療體系，解方或許是打掉重練，重建系統。首先，必須推動任務重分配，讓護理師從大量非核心工作中解放出來，將人力用在真正需要的地方。\n\n去年有人在公共政策網路平台倡議，要求落實三班護病比與非專業工作排除，例如要求明確把「點班（財物清點、物料盤點）與環境整理」等，定義為非護理專業，改由後勤或護理輔佐人力處理。當護理人員的雜務干擾減少，可回歸「直接照護病人」本業，這才是護理專業真正的價值。少子化難逆轉規畫外籍人力其次，啟動國際人力引進。\n\n許多先進國家將外籍人力視為常態配置。在護理人力回歸核心工作之後，非核心工作可轉由外籍人力處理，在少子缺工的情況下，引進外籍人力無法避免，必須及早認真思考，並做出合理可行的規畫。第三，科技導入不能停留在口號。\n\n全球發展人工智慧已是時代趨勢，面對未來物聯網、巨量資料及 AI發展，加上台灣人口結構老化的不可逆現象，人工智慧不只可協助醫師，也能幫助護理師等其他醫事人員，也許目前臨床導入AI尚未成熟，應以開放包容的心態與人工智慧共存。評估重建體系才是根本解方護理人員逃離醫院臨床工作，改善待遇與工作環境無庸置疑，但人力不足時，強制設定護病比標準，醫療機構只能透過關閉病床、減少收治量能來符合規範。當前討論在於「應該有多少人」的理想配置，但我們必須面對「實際上有多少人」。\n\n護理人力問題，從來不是單一職類問題，而是整體勞動供給結構的變化。台灣的政策討論反覆在理想與訴求間擺盪，如果政策只是回應壓力，未評估人力供給與體系承載能力，最終不僅無法改善護理人員處境，恐將使第一線"}, {"title": "新四通不是政策想像 是逼近的現實", "source": "聯合報 A13 北部生活圈", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還是機會存乎一心。距金門僅三公里的廈門翔安國際機場今年底啟用，金廈大橋議題也受關注。", "full_text": "大陸日前公布對台十大措施，包含支援金門共用廈門翔安新機場、推動新四通政策，金門府會今天欲組團赴廈門考察，在兩岸敏感氛圍下行程充滿變數。金廈是共同生活圈，「搭船去廈門」是金門人日常，小三通二十五年來穩定運作，顯示地方交流韌性，兩岸交流是威脅還是機會存乎一心。距金門僅三公里的廈門翔安國際機場今年底啟用，金廈大橋議題也受關注。\n\n議會日前下鄉考察，前往金沙鎮五龍山一帶，勘察金廈大橋預定銜接位置；眼見廈門段工程推進，預計今年底完成海上主體、明年底全線建成，預留延伸至金門的接口，但金門端還是荒草一片。對金門而言，這已不是遙遠的政策想像，而是正在逼近的現實。\n\n金門府會訪陸團為前往對岸了解翔安機場、新四通的影響，原訂四月二十七、二十八日由副縣長李文良偕議員赴陸，近期逢「鄭習會」、賴總統訪友邦史瓦帝尼生變等事件，中央對地方官員赴陸審查趨嚴。李文良及縣府一級主管赴陸申請遭駁回，遂緊急調整名單，改由副處長層級「代打」隨行。地方對金廈大橋、共用翔安機場看法兩極。\n\n金門仰賴台灣本島運油發電，成本高昂，若能透過陸橋系統引進對岸電力與天然氣可降低能源負擔，也能在霧季航班停飛、小三通中斷時，提供交通替代方案。若結合翔安機場，金門將成為兩岸與國際客往返的中轉樞紐，帶動觀光、餐飲、旅宿及租車等產業發展。反對者憂心，這不單純是交通建設，而是制度與安全選擇。\n\n值得關注的是，翔安機場啟用對金門是把雙面刃，利處是提升金門與國際接軌的效率，促進旅遊升級與產業出口，但大型客機低空起降帶來的飛安、噪音、空汙及海域汙染問題，對腹地有限、環境承載脆弱的金門將是長期且直接的壓力。廈門翔安機場牽動兩岸關係變化，對金門影響深遠，如何因應日後發展的新局、衝擊，地方政府要有協商對策，中央也應該展現態度。"}, {"title": "科技競爭的本質在於功能與使用者體驗 而非產地標籤 從「高德地圖」看新媒體時代的理性判讀", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台的資訊服務系統；", "full_text": "教授（桃園市）在智慧手機普及的今日，各式App百花齊放；特別是來自資訊使用量龐大、科技實力雄厚國家的應用程式，往往在功能與整合能力上展現了高度競爭力。大陸的「高德地圖」不只是地圖工具，更整合定位、交通、商業資訊與即時數據分析，成為一種跨平台的資訊服務系統；\n\n近期因紅綠燈秒數顯示幾乎「零時差」，在台灣引發了資安與國安的討論，值得從資訊傳播的角度冷靜觀察。首先，交通資訊本質上多屬於開放資料範疇。全球主要導航系統，皆依賴衛星定位（ＧＰＳ、北斗系統）與公開或半公開的交通數據，再透過演算法進行整合與預測。\n\n這種技術運作邏輯，是當代資訊社會的常態。國際業者利用大數據與人工智慧，將零散資訊轉化為即時導航服務，其目的在於提升效率與便利性。因此，若僅因應用程式的「中國背景」，便直接將其視為涉及機密的安全威脅，恐過於簡化問題，也忽略了全球科技發展的共通基礎。\n\n其次，當我們使用手機地圖導航時，其實早已習慣開啟「雙向定位」機制；使用者在獲取位置服務的同時，也將自身位置資訊回傳給系統後端。這樣的模式不僅存在於「高德地圖」，同樣適用於 Google Maps或Apple Maps等國際主流平台。\n\n定位資料的收集與分析，是提供精準導航、交通預測、路況優化的基礎條件；關鍵不在於「蒐集」，而是「如何蒐集使用」、是否受到有效監管。第三，面對科技快速演進，我們應思考是否「逢中必防」？\n\n或建立更精細的風險評估機制？「高德地圖」因紅綠燈倒數顯示而受到關注，反映了其在使用體驗上的創新優勢；相較之下，既有市場主導者卻未必在細節上具備同樣表現。\n\n這提醒我們，科技競爭的本質仍在於功能與使用者體驗，而非產地標籤。再者，App生態本身具有高度流動性，今日爆紅的應用程式，有可能在短時間內即被其他更具創新、或更符合需求的產品取代。這種「議題帶動流量」的現象，正是大眾傳播與數位平台交互作用的典型案例。\n\n一款地圖App最終是否能在台灣市場立足，仍取決於其導航準確度、使用便利性與在地化程度；若無法滿足使用者需求，自然會被市場淘汰。正如過去結合地圖與遊戲機制而爆紅的寶可夢GO，也是在不斷優化中維持其生命力。\n\n最後，若關切應用程式可能涉及敏感交通資訊，核心責任仍在政府的資安治理與制度建設；包括資料來源的審核、跨境資料流的監控，以及關鍵基礎設施的防護，都是維繫公共安全的關鍵。同時，社會也應培養更成熟的媒體素養與科技理解能力；\n\n面對「匯流」帶來的資訊穿透，我們不僅需要防範風險，更應學習各國技術優勢，強化本土數位服務的競爭力。「高德地圖」爭議提醒我們，在新媒體與數位科技高度交織的時代，解讀任何單一技術，都不宜過度簡化、政治化，台灣使用者也不一定習慣對岸的設計思維。唯有在理性分析、制度保障、技術理解三者並進之下，社會才能在便利與安全之間，找到穩健而長遠的平衡。"}, {"title": "組團地下化反添風險 政府應務實檢討對陸政策 掩耳盜鈴的赴陸禁團令", "source": "聯合報 A15 民意", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？", "full_text": "日前台灣旅遊團赴甘肅旅遊，因車輛翻覆導致了不幸的死傷事故。新聞曝光後，除了令人難過遺憾，更引發吾人思考：台灣現行的赴陸禁團令是否還有必要？甚至對陸政策是否應更務實彈性？\n\n基於陸方未開放陸客來台、且片面改變Ｍ5０3航路，以及考量觀光逆差與兩岸情勢，政府於二○二四年援引「發展觀光條例」第五十三條，以「損害國家利益」為由，於該年六月起暫停旅行業組團赴陸旅遊。然而，這所謂的赴陸禁團令實施迄今近兩年，並未阻絕台灣民眾赴陸熱潮。根據觀光署統計，二○二四年台灣赴陸人數為二七七萬，去年則增長至近三二四萬，大陸為台灣出境目的地第二名，僅次於日本。\n\n若加上由港、澳或其他國家轉機，實施禁團令以來，台灣每年赴陸人次超過四百萬。亦即，數據反映：禁團令下台灣民眾赴陸反而有增加趨勢。然而，眾所周知，赴陸禁團令實施初期，為規避監管，許多旅行業者將組團行為轉入地下，改以「考察」、「交流」或「落地成團」等名義赴陸旅遊，「地下化」造成至少三大後果：首先，消費者權益無法得到保障。\n\n地下赴陸團品質參差不齊，且往往缺乏合法的旅行業責任保險，一旦發生旅遊事故，旅客無法得到完整的保障；其次，旅行產業失序。禁團令縛住合法旅行社手腳，市場反而被不具保障的低價團與灰色操作占據；\n\n這無異是對合法旅行業者的懲罰；最後，政府無從監管。赴陸旅遊地下化，使得政府不但難以掌握切確的統計數據與赴陸動向，更容易形成涉陸政策的決策盲區。\n\n由於赴陸禁團令影響我國觀光業甚鉅，且上述問題經專家學者、業者多次反映；迄今所謂的赴陸禁團令執行上已沒有那麼嚴格，可說只剩徒具形式。也就是說，雖然政策上仍未開放組團赴陸，但政府意識到，無論是旅遊、經商，台灣每年仍有數百萬人赴陸的需求，若無完整配套的堅壁清野，不但罔顧現實，亦無益國安，更可能造成產業與民眾的雙輸；\n\n因此實務上等同已鬆綁。誠如吾人一再強調：面對大陸，台灣不但要能審時度勢，更應以辯證思維回應陸方的舉措。雖然大陸仍強調「和戰兩手」，但從各種情勢研判，穩定的台海關係，以及與台灣更多的交流合作，是目前大陸對台主旋律。\n\n因此，如何正確判讀、因勢利導，不但已是台灣的當務之急，更是台灣安全不可或缺的戰略思維。台灣應秉持開放社會應有的自信，相信我們有能力與陸交流的同時，透過透明的規範來應對風險。因而可藉此事件，從檢討名存實亡、掩耳盜鈴的赴陸禁團令開始；\n\n透過公私協力，讓政府與社會進行更多層次討論，規範出一套風險可控、務實可行、利益台灣的對陸政策！"}, {"title": "軍購今3度協商 8千億是關鍵密碼 立院可能挑燈夜戰拚送院會表決 在野準備加碼 設發價書才編預算但書", "source": "中國時報 A02 焦點新聞", "cat": "台灣政府與政策訊息", "priority": 0, "summary": "針對「國防特別條例」草案，立法院長韓國瑜今（27）日下午將召集朝野黨團進行第3次協商，並已告知「加班處理」，無論有無共識，將完成協商程序送交院會表決。據了解，藍營已有多種金額策略，但不輕易出手，如果執政黨願意退一步，不要堅持1.25兆元，在野黨已準備加碼上看至8000億元，並列需有發價書始得編列的但書。民眾黨主席黃國昌昨說，願意與國民黨針對新版本好好討論，但綠營仍堅持1.25兆元，絕不打折。", "full_text": "針對「國防特別條例」草案，立法院長韓國瑜今（27）日下午將召集朝野黨團進行第3次協商，並已告知「加班處理」，無論有無共識，將完成協商程序送交院會表決。據了解，藍營已有多種金額策略，但不輕易出手，如果執政黨願意退一步，不要堅持1.25兆元，在野黨已準備加碼上看至8000億元，並列需有發價書始得編列的但書。民眾黨主席黃國昌昨說，願意與國民黨針對新版本好好討論，但綠營仍堅持1.25兆元，絕不打折。\n\n據了解，目前藍營有兩個方案，一是黨內有人覺得第二波軍購沒有那麼快，主要是「川習會」在即和美國軍火商量能無法負荷，因此不急著預匡第二波軍購預算，只要表明立場，有發價書就會加編預算就好。另一方案為，預先匡列買美國的信任。由於韓國瑜壓力大，希望趕快結束軍購戰場，因此藍白確實討論過，倘若綠營調降金額，在野也願意調高至8000億元。\n\n不過從上周協商氣氛，若綠營不退讓，第二方案恐無法推進。藍委徐巧芯表示，韓國瑜請他們把今晚行程先排開，雖然只有少少條文，但確實可能要挑燈夜戰。她呼籲，協商過程中，希望各政黨秉持撙節國家預算、審慎使用納稅錢，以及認同建軍的重要性，而在對台軍售部分，其實國民黨相當有共識，所以在此前提之下，或許協商過程會花些時間，但也希望能有初步好結果。\n\n黃國昌指出，如果因為時程非常趕，需要立法院先授權行政部門編列美國至今還沒宣布的第二批軍購的話，立法條文技術要如何設計，民眾黨也開始進行相關研議工作。至於外傳韓國瑜與多數藍委要支持8000億元版本，且版本與說帖都已經準備好？黃國昌說，如果國民黨版本與說帖都準備好，就「趕快拿出來討論，民眾黨開大門走大路，願意針對新版本，坐下來好好討論。\n\n」但目前沒看到所謂版本，且國民黨也稱意見分歧、還在收攏中。民進黨立法院黨團幹事長莊瑞雄強調，黨團立場一貫且明確，即「 一切以國家安全為最高原則」，對於能夠提升國軍戰力、強化國防體系的內容，黨團會全力支持，但對於止於口號、規畫零散，切割、打折，甚至可能影響整體國防布局的提案，民進黨團寸步不讓。綠委陳冠廷指出，中東戰事使台灣在軍購產線面臨與中東盟友競爭優先順序的壓力，呼籲立法院盡速審議「國防特別條例」。"}, {"title": "榮景或台灣病？政府治理應如履薄冰 天堂不撤守／專欄", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣）的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代，應如履薄冰。筆者有感於全球局勢動盪及跨境產業激烈競爭，提出以下反思與展望：一、驕兵必敗，台股榮景下潛藏不容忽視的「台灣病」隱患。據報導，台灣因科技產業的蓬勃發展，股市總市值超過英國，台股指數正朝4萬點邁進，一切看...", "full_text": "狄更斯在《雙城記》中曾言：「It was the best of times, itw as the worst of times……」，中華民國台灣地區（以下稱台灣）的「政治產業」與「經濟產業」現況，亦處於最好也是最壞的時代，應如履薄冰。筆者有感於全球局勢動盪及跨境產業激烈競爭，提出以下反思與展望：一、驕兵必敗，台股榮景下潛藏不容忽視的「台灣病」隱患。據報導，台灣因科技產業的蓬勃發展，股市總市值超過英國，台股指數正朝4萬點邁進，一切看似蒸蒸日上。\n\n但筆者對此憂喜參半，蓋瞬變的股票市場行情只是表面，實則一個物價與房價齊揚而基本工資卻漲幅有限的台灣，如何稱得上幸福？《經濟學人》去年底便以「台灣病」為封面報導，形容台灣現況宛如 1970 年代產業失衡的「荷蘭病」翻版。如今不論是金管會放寬國內 ETF對於單一個股的投資比率限制，或台電對特定企業的電價補助等，均屬加速產業發展失衡的短視政策。\n\n全民除緊盯股價，更應在病入膏肓前促請執政者正視日漸嚴重的台灣病！二、全面產業升級迫在眉睫，亟需當代李國鼎、孫運璿之高瞻遠矚的政治家。當前台灣產業情勢嚴峻，包括對外有像川普不按牌理出牌的非典型總統，不僅無視國際法秩序，更數度誹謗稱「台灣偷走了美國的晶片產業」，並以關稅手段迫使台灣企業赴美投資；\n\n近日他再度點名台灣，宣稱美國必須在短期內取得全球近半的晶片供應，否則將對晶片進口課徵高額關稅。但事實是，台積電的成功除了當年經國政府的鼓勵與扶持外，也包括台積電創辦人張忠謀出眾的運營能力，首創「專業積體電路製造服務商業模式」，加上台灣工業製造的地理集中性、從事製造業的工程師和其他技術人員供應健全（包括法律人在內）等具競爭力之因素，加上員工及相關產業鏈不懈的努力，才有今日成績！絕非川普口中的台灣偷竊美國晶片市場，否則美國最大半導體公司英特爾何須積極與台積電討論合作之可能性。\n\n但對於川普汙衊式的指控，不論是台積電董事長或董事會，或賴政府均悶不吭聲，令筆者感到困惑。台積電董事會基於公司治理、善良管理人注意義務，本不應輕易屈服於政府（不論是台灣或美國）之意志，而做出違背公司長遠利益之投資決定。而政府（國發基金）乃台積電大股東之一，即便賴政府本該卻無力以官方角色替台積電爭取權益，至少應在董事會中發聲，促使董事會決策時審慎評估，並強化社會責任措施，包含促進整體產業轉型及競爭力提升之方案，避免可能的大西瓜效應，吸光其他企業養分，否則對台灣經濟百害無利。\n\n釜底抽薪，此刻台灣「政治產業」亟需像李國鼎、孫運璿等有能力、有遠見的無私政治家，為台灣產業轉型提供清晰的路徑與配套（包括重要的法制建置）。三、兩岸良制一國，政治產業沒有時間蹉跎！筆者認為，政治產業好、必須好，百工百業才會好！\n\n拋開意識形態，不論對美、對陸互動才能回歸福國利民之本質。兩岸求同存異且積極良制融合，除可降低不必要的誤會，亦能在交流中互相學習、砥礪，一個台灣與大陸共好的中國，絕對比劍拔弩張對立的兩岸關係來得更好。台灣病從政治產業而來，蔓延至法律及經濟產業之中，倘及時對症下藥，「健康快樂、國泰民安、良制一國」之理想國世界將指日可待；\n\n否則，前途堪慮。何去何從，端在政府和全國選民一念之間！（作者為超國界法學教授）"}, {"title": "《社論》大陸經濟仍未擺脫「供強需弱」困境", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預期改善，國內需求似在恢復。", "full_text": "中國大陸3月生產者價格指數（PPI）年增率0.5％，結束長達41個月的負成長；消費者價格指數（CPI）年增率1.0％，延續回升態勢。表面看來，物價水準正式走出通縮區間，企業盈利有望修復，通膨預期改善，國內需求似在恢復。\n\n然而，深入剖析數據背後的結構性特徵，不難發現：這一輪物價回升的基礎並不牢固，供給強、需求弱的根本格局尚未扭轉。大陸3月PPI同比轉正，國際能源價格大漲是核心推手，這種由外部成本衝擊驅動的價格上漲，本質上是一種「輸入性通膨」，而非國內需求旺盛拉動的結果。值得警惕的是，PPI內部結構出現明顯分化。\n\n3月生產資料價格同比上漲1.0％，而生活資料價格同比仍下降1.3％。這意味著價格回暖主要集中在產業鏈上游，尚未有效傳導至終端消費品。上游原材料成本上漲，下游需求卻依然疲弱，中下游企業的盈利空間將受到嚴重擠壓。\n\n這種「成本推動型」的價格回升，不僅不能代表經濟全面復甦，反而可能加劇企業經營困境。各項數據同時顯示，內生增長動力依然薄弱。從更宏觀的視角審視，當前居民消費呈現出「總量回暖、人均理性、結構性錯位」的複雜態勢。\n\n清明假期（2026年4月）全國出遊人次年增6.8％，但出遊總花費僅增長6.6％，人均消費並未出現爆發式反彈。消費者的行為模式正在從「排場消費」轉向「悅己消費」和「深度遊」，傳統高額購物支出減少，小眾城市旅遊、自然觀測等體驗式消費仍保持增長。實物消費領域同樣呈現出結構性特徵。\n\n近兩個月社會消費品零售總額增速維持在2.8％～3.0％左右，實物商品特別是耐久財的需求依然偏弱。主打性價比的電商平台和「白牌」商品的滲透率進一步提升，而處於「腰部」的中端品牌面臨極大的去庫存壓力。高淨值人群支撐的頂級白酒和奢侈品需求相對穩健，消費領域呈現出明顯的K型走勢。\n\n房地產價格的低位震盪使居民資產負債表處於「收縮修復期」，在負債端未結清、資產端未大幅增值之前，居民邊際消費傾向很難出現跨越式提升。這種「理性的回歸」而非「報復性的噴發」，恰恰說明了內需動能的不足。當前物價回升高度依賴外部輸入性通膨，內生需求支撐不足。\n\n持續的物價低迷會強化企業和消費者對價格下行的預期，導致消費延遲、 投資收縮。雖然 PPI 轉正有利於打破通縮預期的負向循環，有利於企業盈利修復，但促進物價合理回升仍需政策持續發力。首先，需要切實提振服務消費。\n\n服務消費占比提升是消費升級的客觀規律，應通過放寬市場准入、優化消費環境、豐富消費場景等方式，激發服務消費潛力。其次，要增加居民收入。收入是消費的基礎，應通過穩就業、完善社會保障、優化收入分配等方式，提升居民消費能力和意願。\n\n再次，要穩定房地產市場。房地產是居民財富重要組成部分，房價企穩有助修復居民資產負債表，進而提振消費信心。大陸經濟正走出通縮陰影，這固然令人欣喜。\n\n但必須清醒認識到，本輪物價回升更多得益於外部供給衝擊，內需驅動的物價上漲動力仍顯不足。PPI轉正主要依靠國際油價上漲的「虛火」，CPI回升也高度依賴能源價格反彈，核心CPI平穩但缺乏向上彈性。供給強、需求弱的困境尚未根本扭轉，政策支援對價格穩定仍十分重要。"}, {"title": "社論/從採購到投資：ART架構下的戰略轉型", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "priority": 0, "summary": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應鏈治理整合為整體戰略，成為當前最重要的政策課題。", "full_text": "隨著《台美對等貿易協定》（ART）完成簽署並進入立法院審議程序，台灣的經貿體系正面臨關鍵的轉折點。這項協定不僅象徵著台美之間關稅與市場開放的制度化，更顯示台灣長期以出口為核心的發展模式，已難以支撐未來的國際競爭。因此，如何將採購、投資與供應鏈治理整合為整體戰略，成為當前最重要的政策課題。\n\n在過去，對美採購往往被視為貿易平衡或政治協商的延伸工具，具高度被動性。然而在 ART架構下，若政府仍停留在「以進口換取空間」的思維，將錯失將經貿壓力轉化為戰略資產的機會。關鍵在於：如何讓採購不只是支出，而是能夠累積影響力的投資行為。\n\nART為台灣產業提供了調整空間。根據現行安排，美方對台灣產品採取15%且不疊加的對等關稅，並對2,072項產品提供豁免。此外，在半導體及部分232調查項目上，台灣也獲得較優惠待遇。\n\n這些措施有助於降低出口成本壓力，但關稅優勢本身並不會自動轉化為競爭力。真正的關鍵在於企業能否將成本節省轉投入自動化、數位轉型與低碳製程。政策應由防禦轉為引導，使「低關稅」 進一步轉化為「低碳與高效率」的競爭優勢，確保台灣在美國供應鏈重組中持續扮演不可替代的角色。\n\n2025年至2029年間，台灣對美採購的承諾高達848億美元。若這筆資金僅用於傳統能源與設備的進口，將難以產生長期的戰略效果。然而，若將其重新界定為「準主權投資」，則可能改變台灣在全球供應鏈中的位置。\n\n在此脈絡下，「採購股權化」的思維值得正視。其核心並非將採購預算金融操作，而是在長期採購與合作的過程中，爭取與供應安全相關的股權、治理參與或資訊權益。例如，在能源合作中，透過主權基金與國營事業協同布局，參與美國液化天然氣（LNG）接收站、出口設施或上游開發案，並爭取董事席次或觀察員地位，使台灣由單純買方轉為具影響力的長期參與者。\n\n此一轉變具有雙重意涵。一、穩定的利益連結：當台灣資本嵌入美國關鍵基礎設施，雙方將形成更穩定的利益連結，使安全關係從政治承諾延伸至經濟結構。二、提升議價能力：透過治理參與，台灣可更接近供應鏈資訊與價格形成機制，逐步提升議價能力，而非完全依賴外部市場定價。\n\n然而，這一路徑也伴隨風險。跨境基礎設施投資涉及政治審查、法規限制與市場波動，若缺乏專業管理，將可能導致資產效率不彰，甚至產生財務負擔。此外，過度集中於特定市場也可能提高地緣政治風險。\n\n因此，「股權化」 必須建立在嚴謹的風險控管與多元配置原則之上，而非政策口號。在制度面上，建立具專業治理能力的主權基金，已成為必要條件。面對如此規模的採購與投資需求，若仍受限於年度預算與傳統財政架構，將難以維持策略一致性。\n\n主權基金可作為資本整合平台，將分散的採購決策轉化為長期資產配置。其治理設計應強調去政治化與專業化：由政府設定戰略方向與風險邊界，實際投資與營運則交由專業團隊負責，以降低政策受選舉周期干擾的風險，並建立國際合作夥伴的信任。最終，ART的成敗不在於協定條文本身，而在於後續的治理能力。\n\n台灣面對的不只是能源採購問題，而是如何透過經貿安排，為未來數十年的產業韌性與安全結構奠基。因此，每一項採購所延伸的資產配置、治理參與與資訊掌握程度，都應納入國家安全與經濟安全的整體評估。《台美對等貿易協定》確實為台灣打開新的國際經貿空間，但真正的挑戰才正要開始。\n\n五年 848億美元的採購承諾，究竟會成為一次性的支出，還是轉化為可累積的戰略資產，關鍵取決於政策思維能否完成從「採購」到「投資」的轉型。唯有將採購視為資本運作的一環，並以制度化方式強化治理能力，台灣才能在新的經貿格局中，由被動回應者轉為具有實質影響力的參與者，為長期發展建立更穩固的基礎。"}, {"title": "社論》中國人認同為台灣帶來的災難", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民主政治的政黨之爭角度，將無法理解藍白之亂的根源，應由台灣人認同與中國人認同衝突，才能正確剖析這場災難的癥結。", "full_text": "本屆立法院在藍白合之下，成為政治震央，沒有為民興利除弊，只見非理性杯葛民進黨政府的施政，削弱台灣的國防，即使民意反對，與美國一再增強支持軍購力道，也只能讓藍白從拒審變成以嚴審之名的拖延戰術。何以會發生藍營帶頭，白營附從所製造的人為災難？從民主政治的政黨之爭角度，將無法理解藍白之亂的根源，應由台灣人認同與中國人認同衝突，才能正確剖析這場災難的癥結。\n\n在台灣，中國人認同是一種「想像的民族主義」，而台灣人認同則是「現實的命運共同體」。在台灣四百多年發展史上，來台的外來族群大抵具有兩種心態︰一種是從唐山渡過黑水溝而來，在台灣「篳路藍縷，以啟山林」，開拓新世界的移民心態；一種是逃難避禍而來，將台灣當成回歸母國跳板的難民心態。\n\n另有自古以來即是島嶼主人的原住民。難民關注他們想像的祖國，移民則重視落地生根，打造新的家國。這樣的差異造成對台灣定位的不同，成為內部衝突的根源。\n\n事實上，台灣四百年史，多數由外來政權統治，從荷蘭殖民南台灣，到明末鄭成功及其短命的東寧王國，後來清帝國終結了明鄭政權，但在清日甲午戰爭後，又將這個清人眼中「島不語、花不香」 的島嶼與澎湖群島永久割讓於日本。日本統治台灣五十年，後因二戰敗戰，在舊金山和約正式放棄台、澎主權，但未言明台澎主權未來歸屬。因此台灣由蔣介石政權「暫時接管」，卻因蔣氏於國共內戰全面潰敗，乃率數百萬軍民逃難至此，將台灣當成反攻復國的跳板。\n\n由歷史看來，台灣不僅「自古不屬於中國」，同樣也不屬於任何東西方的殖民帝國。雖然歷經多次外來政權統治，近年的民主化與本土化，已使避難而來的中華民國獲得新的內涵，以中華民國台灣之名，成為移民者的新家園。新加坡是多種族國家，人口以華裔為主，而且曾被馬來西亞聯邦逐出，卻發展出一個小而強大的多族群國家，與台灣處境非常類似，因此新加坡的發展經驗值得台灣
