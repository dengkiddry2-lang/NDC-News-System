\n兩國近年在石油、政治、人才與資本等多處摩擦加劇，阿聯希望積極變現已擴充的石油產能，沙烏地則傾向限制產量維持油價穩定，兩國的長期目標顯著分歧。川普稱阿聯退出OPEC一事「很棒」，並認為有助降低國際油價。但彭博指出，現階段左右市場的仍是海峽能否重啟，幾乎沒有數據佐證川普的論點，例如阿聯宣布退出後，油價反而持續攀升並刷新 2022 年以來高點。\n\n阿聯退出短期無助緩解供應緊張，但長期會削弱OPEC調控油價的能力。國際能源總署統計，戰爭前阿聯每日原油產量約 340 萬桶，但實際產能高達 485 萬桶，並計畫 2027 年提高至每日 500 萬桶。阿聯能源部長表示，退出OPEC後，阿聯將能以更大彈性滿足全球能源需求。\n\n不過他也承認因海峽封鎖，短期市場不會因阿聯退出而明顯變化。但長期而言，美媒分析戰爭結束後，阿聯、沙烏地與美國等主要產油國可能為爭奪市占展開價格戰。BBC推測，沙烏地可用增產回應阿聯，阿聯雖經濟結構較多元，足以承受較低油價，但其他財政更依賴石油收入的OPEC成員未必能承受同等壓力。"}, {"title": "鮑爾任內最後一舞 利率連3凍 內部決策罕見分歧 華許接任後面臨更複雜的政策局面", "source": "中國時報 A06 財經綜合", "cat": "國際經濟情勢", "priority": 0, "summary": "美國聯準會4月29日宣布連續第3次維持利率不變，主席鮑爾在卸任前最後一場會議表示，當前利率已接近中性水準，仍須觀察通膨、油價與關稅影響。不過，本次會議共有4人提出異議，顯示內部對降息路徑的分歧明顯擴大，也讓華許接任後面臨更複雜的政策局面。聯準會宣布利率維持在現行3.5％至3.75％區間。", "full_text": "美國聯準會4月29日宣布連續第3次維持利率不變，主席鮑爾在卸任前最後一場會議表示，當前利率已接近中性水準，仍須觀察通膨、油價與關稅影響。不過，本次會議共有4人提出異議，顯示內部對降息路徑的分歧明顯擴大，也讓華許接任後面臨更複雜的政策局面。聯準會宣布利率維持在現行3.5％至3.75％區間。\n\n聯準會表示，當前貨幣政策合適，在通膨仍受關稅與能源價格影響時，沒有必要急於調整利率。這是鮑爾主席的最後一場會議，他將在5月15日卸任主席，但他表示在聯準會翻修工程的調查徹底結束前，將繼續留任聯準會理事。鮑爾表示，目前貨幣政策「處於非常好的位置」，可繼續等待更多經濟數據。\n\n他認為中性利率落在3％至4％之間，目前仍屬合理範圍。鮑爾將近期通膨歸咎於能源與關稅影響，承認能源漲價短期內會拉高通膨，但目前不足以讓聯準會立即改變利率。此次會議內部分歧明顯升高。\n\n共有4人對政策或聲明提出異議，是 1992年以來反對票最多的一次。其中，理事米蘭（Stephen Miran）主張直接降息；另3位地區聯準銀行總裁雖支持維持利率不變，但反對聲明保留暗示未來可能降息的措辭。\n\n在政治壓力方面，鮑爾警告，若貨幣政策受到政治干預，將對市場與經濟造成嚴重後果。他同時表示已向接任人選華許表達祝賀，並相信會有「正常、標準的過渡過程」。被問及華許能否抵禦白宮壓力時，鮑爾表示他相信華許的承諾。\n\n另一方面，華許的聯準會主席提名，已獲參議院銀行委員會通過，正式進入全院表決程序。委員會29日以13票贊成、11票反對，依兩黨人數通過提名。若最終獲參議院確認，華許將在鮑爾任期屆滿前接掌聯準會。\n\n華許為爭取提名，曾提出聯準會體制變革，包括縮表、修正通膨政策，以及調整與公眾溝通策略，不過尚未得知如何落實。民主黨對華許提名明確表示反對。參議員華倫警告，川普仍有意掌控聯準會貨幣政策，華許可能助長白宮干預聯準會獨立性。\n\n值得留意的是，華許的提名未獲任何民主黨人支持，是參院史上首次完全按黨派表決聯準會主席提名。相較之下，鮑爾先前兩次提名分別僅有1票反對。"}, {"title": "打破慣例 鮑爾留任聯準會理事惹議", "source": "中國時報 A06 財經綜合", "cat": "國際經濟情勢", "priority": 0, "summary": "美國聯準會主席鮑爾 4 月 29 日在任內最後一場會議後，明確表示主席任期結束後仍將留任理事捍衛機構獨立性，直到針對聯準會的法律調查「以透明且徹底的方式結束」。美國總統川普隨後發文嘲諷鮑爾「找不到工作」才留在聯準會；財政部長貝森特也批評鮑爾打破聯準會慣例，並違背他自稱重視的制度準則。", "full_text": "美國聯準會主席鮑爾 4 月 29 日在任內最後一場會議後，明確表示主席任期結束後仍將留任理事捍衛機構獨立性，直到針對聯準會的法律調查「以透明且徹底的方式結束」。美國總統川普隨後發文嘲諷鮑爾「找不到工作」才留在聯準會；財政部長貝森特也批評鮑爾打破聯準會慣例，並違背他自稱重視的制度準則。\n\n聯準會29日會後維持政策利率不變，主席鮑爾在記者會上表示，這是他作為主席任內的最後一次會議，但他將在5月15日主席任期屆滿後，繼續擔任聯準會理事。鮑爾目前仍是7名理事之一，理事任期至 2028年。按照聯準會制度，主席必須同時具備理事身分，但過去75年來每位主席卸任後，均辭去理事職務離開聯準會。\n\n針對司法部近期的刑事調查，鮑爾也明確表示，在調查完全結束前，他不會離開理事會。他認為這些行動已威脅聯準會不受政治干擾執行貨幣政策的能力，過去3個月的情況，讓他認為除了堅持外別無選擇。不過，他也試圖淡化自己留任後的影響，表示自己不會扮演「影子主席」，後續會保持低調，全力支持新主席。\n\n鮑爾在記者會多次談到聯準會獨立性問題。他表示，民選政治人物通常都希望低利率，因此分割貨幣政策與政治，是控制通膨的重要基礎。他也批評剝奪地方聯準銀行總裁投票權的提議，稱若是每屆政府都如此調整制度，就是聯準會獨立性的終點，最終變成內閣機構。\n\n川普則在會後晚間於社群平台發文，譏諷鮑爾留任理事的決定。川普寫道，「『遲到鮑爾』想留在聯準會，是因為他在外面找不到工作，沒人要用他」。其中「遲到」顯然是諷刺鮑爾遲遲不降息。\n\n川普過去已多次批評鮑爾，並以遲到或太慢形容其政策。財長貝森特也批評鮑爾卸任主席後續任理事的做法。貝森特接受福斯新聞訪問時表示，打破慣例的是鮑爾，而不是白宮。\n\n貝森特還表示，鮑爾留任等同羞辱其他由川普任命的聯準會理事，因為即使鮑爾離開，其他理事仍可以捍衛聯準會的獨立性。"}, {"title": "自由廣場》製造恐慌更傷農 零關稅不等於「滅農」", "source": "自由時報 A12 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "在台美對等貿易協定（ART）尚未生效之際，雲林縣長張麗善對美國花生可能的零關稅待遇，直接定性為「滅農」，此說不僅欠缺事實基礎，更在政策評價上構成明確誤導。直白而言，這不是審慎評估，而是以誇張敘事取代理性分析，對市場預期形成實質干擾。從制度面檢視，我國對花生長期採取關稅配額與特別防衛措施雙軌保護，並非毫無屏障的全面開放。", "full_text": "在台美對等貿易協定（ART）尚未生效之際，雲林縣長張麗善對美國花生可能的零關稅待遇，直接定性為「滅農」，此說不僅欠缺事實基礎，更在政策評價上構成明確誤導。直白而言，這不是審慎評估，而是以誇張敘事取代理性分析，對市場預期形成實質干擾。從制度面檢視，我國對花生長期採取關稅配額與特別防衛措施雙軌保護，並非毫無屏障的全面開放。\n\n即便未來特定來源產品降為零關稅，只要進口量達門檻，仍會啟動加徵機制抑制衝擊。因此，將「部分降稅」等同「產業崩解」，係屬過度推論，亦忽視既有的制度設計。再觀察市場結構，國產與進口花生並不存在完全替代關係。\n\n國產主攻鮮食市場，憑藉品質與新鮮優勢，市場占比約七十五％；進口來源多用於加工，以美國花生為例，占比不到一％。更關鍵的是，加工業者若改用外國原料，須調整製程且風險升高，替代誘因自然不足，據此判斷，短期內形成價格崩跌的條件並不存在。\n\n二〇一九年雲林「花生之亂」，當時並未出現制度性開放，卻因市場謠言與錯誤訊息擴散，導致價格迅速下滑。事後證明，價格波動並非源於進口衝擊，而是預期心理被操弄。此例清楚顯示，真正傷害農民的，往往不是政策，而是被放大的恐慌敘事。\n\n此外，過去美國火雞肉開放進口時，同樣出現這類論述，但結果顯示消費者仍偏好國產火雞肉，進口火雞肉僅補足特定用途，在產品特性與消費偏好差異下，進口與國產多呈現分工關係，而非全面競爭。綜上，將ART簡化為「滅農」，在制度、價格與市場三個層面皆難成立。此類說法是對市場預期的直接干預。\n\n農業需要保障，但應依賴制度與升級，而非情緒操作。當政治語言凌駕專業判斷，真正被犧牲的，終究是農民的長遠利益。"}, {"title": "自由廣場》證交稅可補健保財務 但不能代替改革", "source": "自由時報 A12 自由廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "「台股救健保」聽來像替財務找到新財源，真正要問的是：健保永續能不能押在牛市上？政委陳時中提出以部分證交稅挹注健保，衛福部長石崇良表態樂見其成，確實點出健保長期倚賴薪資所得的結構壓力。但把這項構想說成能撐住未來廿年，可觀的稅收數字就可能蓋過改革責任。", "full_text": "「台股救健保」聽來像替財務找到新財源，真正要問的是：健保永續能不能押在牛市上？政委陳時中提出以部分證交稅挹注健保，衛福部長石崇良表態樂見其成，確實點出健保長期倚賴薪資所得的結構壓力。但把這項構想說成能撐住未來廿年，可觀的稅收數字就可能蓋過改革責任。\n\n支持多元財源並非問題。高齡化、少子化讓工作人口減少，醫療支出又持續上升；健保若主要靠受薪者保費維持，本就不公平。\n\n資本市場交易熱絡時，將部分稅收用於健保，有其正當性。但這筆錢只能減輕財務壓力，不能取代健保改革。關鍵在於財源是否穩定。\n\n證交稅是波動稅收，不是穩定保費。台股成交旺盛時，稅收看似充裕；市場轉弱時，財源也會減少。\n\n就醫需求、藥費、醫護人力與醫療品質，不會因交易量下降而同步下降。把不會跟著市場降溫的支出綁在波動財源上，最容易讓股市熱絡時的稅收遮住制度問題。財政紀律也不能被輕描淡寫。\n\n政府若每年透過預算撥補，立法院仍可審查用途與成效；若改成固定比例提撥既有稅收，甚至讓稅收變相專款專用，就會碰到現行財政紀律法的限制。健保要永續，不能把預算審查與財政紀律當成次要問題。\n\n更要警惕的是改革被往後推。額外財源若來得太順，保費負擔公平、醫療點值穩定、醫護待遇與醫療支出控管，真正該處理的改革，反而可能被擱下。證交稅若要挹注，就應明定用途、公開流向，優先用於穩定醫療品質，而不是變成掩蓋制度問題的財務止痛藥。\n\n健保永續不能只是再找一筆錢補上，而是要重建誰負擔、誰受益、誰監督的制度平衡。牛市可以替健保爭取時間，但改革不能交給股市完成！"}, {"title": "AI再怎麼能幹 也不該取代大腦 因為AI便利，現在很多人做事都不經過大腦，每每剪貼了事，險誤大事 創造力是一個人最重要的能力，原創性也是一件作品最珍貴的地方 如何平衡科技與人性，是現代教育政策制定者一定要去深思的事", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "現在網路上假訊息很多，很多人認為好東西要跟好朋友分享，便好心轉發出去；結果朋友因相信你，買了無益的補品，或吃了有害的偏方，反而怨你。所以我勸學生，不要做吃力不討好的事，轉發訊息前，先確定它是不是ＡＩ製作的假訊息，免得為虎作倀。", "full_text": "現在網路上假訊息很多，很多人認為好東西要跟好朋友分享，便好心轉發出去；結果朋友因相信你，買了無益的補品，或吃了有害的偏方，反而怨你。所以我勸學生，不要做吃力不討好的事，轉發訊息前，先確定它是不是ＡＩ製作的假訊息，免得為虎作倀。\n\n舉了幾個真實的例子後，學生果然小心了。但我沒想到，他們竟然矯枉過正，明明是真的，卻因不符合他們的預期或過去經驗，也存疑。例如有學生問：老師，康乃爾大學不是美國長春藤的名校之一嗎？\n\n他們的教授腦子應該沒有進水吧？為什麼會在課堂裡要求學生用打字機寫作文？是打字機，不是打印機喔。\n\n打字機不是那個博物館裡陳列的東西嗎？為什麼人類已經會走了，還要叫他回去爬？原來這是該校的一堂語文課，授課老師發現學生都依賴 ChatGPT 和線上工具來寫作文，雖然詞彙豐富，文法正確，甚至沒有錯別字，但它缺少了他們自己的思考與表達；\n\n沒有了原創性，作品就沒有了靈魂。所以她要求學生在課堂上不得用電腦打字，不可上網查資料，當場完成一篇作文。她要學生真正了解書寫與思考的本質。\n\n我很贊同這位老師的做法。因為ＡＩ的便利，現在很多人做事都不經過大腦，每每剪貼了事，常常牛頭不對馬嘴，險誤大事。心理學早有實驗發現，新知識若沒有經過反覆的思辨並與舊知識組織在一起，就不可能成為永久性的知識。\n\n短期記憶中的東西，若沒有經過思考，廿秒後便煙消雲散了。這位老師深知人性是好逸惡勞，既然有ＡＩ代勞，學生又怎可能不用？便想透過打字機，強迫學生慢下來思考他要說的話。\n\n老式打字機不能像電腦一樣，打錯字退回去修改，打錯只能用橡皮擦掉，如果打錯三個字以上，紙張塗改難看，就只好丟掉重來。果然，學生發現不能隨意的改動文字後，他們變得謹慎，先認真思考自己要說的話，想好了再打上去，謀定而後動，不然損失的是自己。因為寫出來的自己的話，不是別人的牙慧，作文課因此變得有意義了。\n\n過去也曾經有個實驗，上課時要求一半的學生用手抄筆記，另一半用打字，下課前十分鐘，請他們把今天上課的內容盡量回憶出來。結果發現手寫組的成績比打字組好。因為手寫時，語音要先轉換成語意，還要透過肌肉對字母的記憶把字寫出來，訊息在腦中處理的時間比打字組聽音按鍵的自動化歷程長，留下來的痕跡比較深，記憶的成績便比較好了。\n\n在數位工具日益主導學習模式的今日，康乃爾大學的這堂課提醒我們不要忘記教育的目的與初衷，科技提升效率，卻也削弱了人類最基本的思考與表達能力。創造力是一個人最重要的能力，原創性也是一件作品最珍貴的地方，別人的話，不管有多悅耳，它不是你的話。當一篇文章百分之九十都是別人的話時，這篇文章還有讀的必要嗎？\n\nＡＩ再怎麼能幹，它不該取代我們的大腦。如何平衡科技與人性，是現代教育政策制定者一定要去深思的事。"}, {"title": "勞工、雇主同時上街頭 示警制度結構性問題 雇主日 不是對立是補缺失", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "理事長張姮燕（高雄市）今年五月，台灣將出現一個值得嚴肅看待的現象：勞工與雇主同時走上街頭。這不是單一族群的抗議，而是台灣在經濟快速發展與產業轉型過程中所建立的制度，在現實壓力下已出現結構性問題。當原本被視為制度承擔者的雇主，都必須站出來爭取「平權」，代表問題已經不再是個別政策爭議，而是整體體系的失衡。", "full_text": "理事長張姮燕（高雄市）今年五月，台灣將出現一個值得嚴肅看待的現象：勞工與雇主同時走上街頭。這不是單一族群的抗議，而是台灣在經濟快速發展與產業轉型過程中所建立的制度，在現實壓力下已出現結構性問題。當原本被視為制度承擔者的雇主，都必須站出來爭取「平權」，代表問題已經不再是個別政策爭議，而是整體體系的失衡。\n\n在勞動節隔天訂為「雇主日」不是在飆創意，而是反映台灣引進移工卅年來，已迫切需要從「雇主角度」重新檢視移工制度。這場行動的意義，不在於對抗，而在於補上長期遺失的一塊拼圖。過去台灣討論移工，多半集中在勞工權益，這固然重要，但當制度建立在單一視角之上，忽略實際承擔責任與風險的一方，失衡就成為必然。\n\n雇主日提醒一個最基本的問題：沒有雇主，何來移工？沒有產業支撐，何來就業？沒有穩定照護，又何來安老社會？\n\n何況在聘僱關係中，看護工的雇主多為一般勞工家庭，而漁船船東本身也是第一線漁民。台灣在少子化、超高齡化與人才外流壓力下，穩定勞動力是維持競爭力的關鍵。因此問題從來不是「要不要移工」，而是「什麼樣的制度，才能讓這套體系正常運作」。\n\n一個健康的制度應能留下穩定履約的勞動者，同時淘汰不適任或長期破壞制度運作者，而不是讓風險長期堆積在雇主與整體社會之上。移工制度更深層的問題，在於缺乏「台灣優先」的基本原則。任何國家的勞動政策，都必須先回應本國社會的承受能力。\n\n然而台灣長期以來，制度設計高度回應外部壓力，卻對本國勞工與雇主的處境回應不足。這樣的失衡，已在多個面向顯現。從就業安定基金使用不透明，到移工安置制度的法律模糊，再到逃逸與黑工問題的持續擴大，都顯示制度已出現質變。\n\n當成本不斷上升、責任不斷加重，但風險卻沒有相應分攤，制度自然難以長期維持。在此脈絡下，社會也必須誠實面對一個敏感但無法迴避的問題：勞保與健保等社會保險制度，應更清楚區分公民與非公民的權利與義務。這並非歧視，而是制度設計的基本邏輯。\n\n不同身分本應對應不同責任、貢獻與保障，若界線不清，將加劇有限資源分配的爭議，並削弱制度正當性。回到制度核心，「就業服務法」從一九九二年制定以來，以單一架構涵蓋不同產業與勞動型態，並以同一法源適用性質差異甚大的看護工、產業工、農業工、漁工等工種，卅多年來卻只見片段式修補法條。當前問題已非單一修法可解，而是必須重新檢視整體設計，使制度能同時保障外籍勞工、支持本國勞工，並讓雇主有能力承擔且願意持續參與。\n\n雇主日的出現，不是對立的開始，而是警訊的出現。當雇主走上街頭，不是否定移工制度，是提醒制度若持續失衡，最終將無法保障任何一方。台灣需要外籍勞動力，但更需要一套能長期運作、兼顧公平與現實的制度。\n\n若改革仍停留在片段調整與口號回應，制度與現實的落差只會持續擴大。沒有雇主，就沒有制度的基礎；當基礎動搖，改革就不再是選擇，而是必要。"}, {"title": "落實尊嚴勞動 從政府做起", "source": "聯合報 A14 論壇", "cat": "社論與評論觀點", "priority": 0, "summary": "水（台北市）今天五一，也是台灣社會首次迎來全民放假的勞動節，這是去年「紀念日及節日實施條例」三讀通過後，終結一國兩制放假亂象的勞動平權里程碑。然而，社群平台上卻湧現家長的集體失落，哀嘆「專屬休息日沒了」、「跟一般周末沒兩樣」，這股情緒看似源於個人行程被打亂的抱怨，實則暴露了台灣社會對勞動與假期的深層誤解。回顧整個修法過程，政府部門消極不作為，一再以社會未達共識搪塞，不願運用行政權力促成公共對話以縮小認知差距，其效果正是延續價值混亂，執政...", "full_text": "水（台北市）今天五一，也是台灣社會首次迎來全民放假的勞動節，這是去年「紀念日及節日實施條例」三讀通過後，終結一國兩制放假亂象的勞動平權里程碑。然而，社群平台上卻湧現家長的集體失落，哀嘆「專屬休息日沒了」、「跟一般周末沒兩樣」，這股情緒看似源於個人行程被打亂的抱怨，實則暴露了台灣社會對勞動與假期的深層誤解。回顧整個修法過程，政府部門消極不作為，一再以社會未達共識搪塞，不願運用行政權力促成公共對話以縮小認知差距，其效果正是延續價值混亂，執政者這種坐收政治安全的態度，與其說是尊重多元意見，不如說是典型的威權心態—「你們自己吵，吵完再告訴我」。\n\n同樣消極卸責的就是軍公教調薪機制。近來政府不斷大外宣：台灣人均ＧＤＰ創新高、遠甩日韓，殊不知，經濟確實大幅成長，卻也同時見證一個荒謬的現實，撐起國家運作骨幹的軍公教，淪為繁榮景象下的實質新貧。過去十年人均ＧＤＰ飆升百分之九十三點二，但軍公教待遇累計調幅僅百分之十四點七，不到國家成長率的六分之一。\n\n其實，問題的關鍵不在於「這次調多少」，而在於「憑什麼這樣調」、「誰決定的」、「標準是什麼」。長期以來，軍公教待遇審議委員會的決策過程猶如黑箱，調薪與否、幅度多寡，全憑政治氛圍與行政院長裁決，缺乏與經濟成長率、物價指數、民間薪資水準連動的科學公式。更諷刺的是，當工會團體屢次呼籲應比照最低工資審議委員會，將基層軍公教代表納入待遇審議機制時，政府部門仍以「二者功能任務及性質明顯不同」為由斷然拒絕。\n\n至於攸關公教人員退休金永續的撥補問題，同樣令人憤慨。二○二三年公教人員改採個人專戶制後，相關法律均明定政府應依退撫基金財務精算結果，先行撥補新制退撫財務缺口。但三年來政府對撥補消極以對，已連續三年短編。\n\n依最新公布的退撫基金第九次精算報告，十年撥補較廿年可為國庫省下七五○億元，政府卻執意採取總花費更多且明顯不利於基金財務永續的撥補方案。這種違反常識的選擇，若非專業能力令人質疑，便是根本不在意自家員工的退休金永續。政府不僅是全民的政府，更是公教人員的雇主。\n\n從勞動節修法的消極以對，到調薪機制的黑箱作業，再到退休金撥補的消極作為，我們看到的是主其事者以最少政治成本，換取最大選舉利益的謀算。相較之下，勞動者的尊嚴、國家制度的透明、員工退休基金的永續，從來不在優先順序的前列。今年五一勞動節，我們終於不必再問「誰的假期」，但「誰的勞動被看見、誰的勞動被犧牲」卻始終是追求尊嚴勞動須追問的嚴肅課題。\n\n只有當政府主動扛起促成對話、揭露結構、保障弱勢的責任；只有當軍公教調薪制度化、透明化依法調整；只有當退休金撥補依據精算數據確實執行，那一天的勞動節才不只是假期，是社會尊重勞動的開始。"}, {"title": "AI紅利正在抵消能源衝擊", "source": "中國時報 A10 時論廣場", "cat": "社論與評論觀點", "priority": 0, "summary": "教授莊奕琦美伊戰爭爆發後，國際油價突破每桶 100 美元，全球能源供應受阻，通膨壓力升高。根據 IMF《世界經濟展望》2026年報告，全球GDP成長率已下修至3.1％，若衝突延續至2027年，油價可能再飆升，全球經濟恐將陷入困境甚至衰退。傳統上，這樣的能源衝擊往往導致股市下跌。", "full_text": "教授莊奕琦美伊戰爭爆發後，國際油價突破每桶 100 美元，全球能源供應受阻，通膨壓力升高。根據 IMF《世界經濟展望》2026年報告，全球GDP成長率已下修至3.1％，若衝突延續至2027年，油價可能再飆升，全球經濟恐將陷入困境甚至衰退。傳統上，這樣的能源衝擊往往導致股市下跌。\n\n然而，美股卻逆勢上漲，標普500自戰爭爆發後的低點反彈逾 8％，相較戰前水準約上升2％，顯示市場不僅收復跌幅，更持續走高；科技股領漲，Nvidia、Amazon等公司市值創新高，這一現象揭示全球經濟的新邏輯：AI生產力革命正在抵消能源衝擊的負面效應。首先，從需求面來看，高油價理論上會壓抑消費，降低總需求。\n\n然而，AI應用的擴張卻創造了新的需求。生成式 AI、雲端運算、AI 晶片的快速普及，使得企業與消費者在數位領域的支出持續增加。投資人普遍相信，AI將帶來長期效率革命，這種「結構性需求增長」抵消了能源衝擊下的消費疲弱。\n\n其次，從供給面來看，戰爭造成能源供應受阻，企業成本上升，理應壓縮獲利。但AI技術的導入提升了生產力，降低了營運成本。美國大型科技企業憑藉全球定價能力與雲端生態系，能夠在成本上升時維持高毛利。\n\n台積電董事長魏哲家更指出，AI晶片需求結構性增長，產能緊繃，摩爾定律延伸至系統層級效能，顯示科技供給面正在成為新一輪經濟支柱。需求面與供給面的交互作用，形成了新的市場邏輯：能源衝擊雖然存在，但AI紅利正在抵消其負面影響，甚至推動股市逆勢上漲。在短期內，油價飆升帶來通膨壓力，消費受到抑制。\n\n然而，避險資金流入美股，加上AI需求爆發，使得股市仍能上漲。投資人認為，聯準會不會因短期能源通膨而大幅升息，這種「理性預期」支撐了市場信心。在中期，如果油價持續高檔，停滯性通膨風險將浮現。\n\n企業成本上升，獲利可能受損。但AI提升效率，科技股獲利上修，能源與科技形成雙軸市場，傳統產業震盪，科技股領漲。在長期，若戰爭延續，全球增速下滑，經濟結構將面臨挑戰。\n\n然而，AI生產力革命可能推動全球供應鏈重組，美國與台灣半導體產業成為新核心。若AI紅利持續釋放，全球可能進入「低增長、低通膨、高效率」的新常態，經濟結構由能源驅動轉向科技驅動。聯準會面臨兩難：若油價持續居高不下，通膨壓力迫使升息；\n\n但 A I提升生產力，降低成本，使央行有更大政策空間。結果是升息壓力與生產力紅利的拉鋸。若聯準會忽視能源通膨，可能損及信譽；\n\n但若過度緊縮，可能壓抑AI投資與科技紅利。因此，政策需在抑制通膨與維持成長間取得平衡。這種政策挑戰，正是未來全球經濟治理的核心難題。\n\n美伊戰爭揭示了全球經濟的轉折點：能源衝擊不再必然導致股市崩跌，因為AI與科技紅利正在重塑市場韌性。未來的全球經濟將是一場「人工智能與能源的角力」，決定全球新秩序的走向。"}, {"title": "《社論》歡慶勞動節—政策美意盼落實", "source": "工商時報 A02 火線焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "2026年5月1日勞動節終於再度成為國定假日，勞動尊嚴與價值不再因從業身分而有所差異；對於投入生產要素的廣大勞工而言，也不再因勞保與公保身分不同，或公職人員、教師與勞工之別，而受到差別待遇。然而，勞動節雖恢復為國定假日，勞工整體處境卻更趨嚴峻。", "full_text": "2026年5月1日勞動節終於再度成為國定假日，勞動尊嚴與價值不再因從業身分而有所差異；對於投入生產要素的廣大勞工而言，也不再因勞保與公保身分不同，或公職人員、教師與勞工之別，而受到差別待遇。然而，勞動節雖恢復為國定假日，勞工整體處境卻更趨嚴峻。\n\n首先，2025年人工智慧（AI）的快速發展，以及對等關稅（包含232條款等）之課徵，使國內產業K型化發展日益明顯。例如，電子資通產品占總出口比重於2026年第1季創新高，達78.44％，其餘產業則萎縮至 21.56％，更加凸顯產業結構失衡趨勢；而位於下行端的傳統產業，因營運低迷，使從業勞工處境更形困難。\n\n例如，勞雇雙方協商減少工時的情形，近期低點出現在對等關稅實施前的2025年3月底（123家、實施人數1,989人），其後逐季攀升，至11月底已達456家、9,153人。雖然K型化發展並非臺灣所獨有，因全球化與產業發展失衡，部分國家呈現此一趨勢，但其影響往往集中於特定勞工族群，對社會的衝擊更值得關注。觀察後疫情時期，台灣失業率多低於4.0％（僅2021年5月至8月間，受疫情與畢業季影響，失業率短暫高於4.0％），已接近自然失業率，呈現充分就業狀態。\n\n然而，幾乎各行各業仍普遍反映缺工問題，且其樣態呈現分化：傳統產業式微部門與勞力密集型服務業多面臨招工困難，因而仰賴建教合作與外籍生作為替代人力員難以即時成為戰力；至於一線科技大廠，雖人才來源穩定，但在少子化影響下，「新鮮肝」仍顯不足。另一方面，壯齡與中高齡勞工多因技能落差、職場文化適應及勞動條件限制，轉職不易。\n\n自21世紀以來，台灣與歐美國家相似，在職業分化與產業轉型趨勢下，勞工流動率呈現下降，即使轉職，多以同業內移動或轉向服務業部分工時為主，較難累積技能與人力資本。為積極延展並開發優質勞動力、保障勞工生活，台灣自2020年後陸續施行多項新制，包括2020年施行之《中高齡者及高齡者就業促進法 》、2022年施行之《勞工職業災害保險及保護法》，以及2024年上路之《最低工資法》等。此外，自2026年初起，行政院推動「育嬰留職停薪彈性化措施」，放寬育嬰留停申請方式，得以30日額度按「日」為單位使用；\n\n家庭照顧假亦可改以「小時」計算（全年56小時）。考量我國30人以下企業占比逾97％，為避免雇主負擔過重及衍生隱性歧視與勞資關係緊張，政府並提供小微型企業經濟支持：凡勞工申請1日育嬰留停，雇主可獲得定額獎勵金1,000元。此類政策除促進工作與生活平衡、營造友善職場外，亦有助於提升員工留任率，並改善職務代理與責任分工，具有多方受益之潛力。\n\n然而，政策推動往往伴隨非預期效果。例如，過去50年來臺灣女性勞動參與率隨教育提升、性別平權意識及職場環境改善而顯著上升，但在配套措施不足、制度彈性與支持仍有限的情況下，反而為生育率持續下降形成結構性張力的主要原因之一。此外，在當前國際局勢動盪之際，企業營運面臨內外多重挑戰，包括中東戰事推升能源價格，以及關稅政策未定等不確定性風險。\n\n彈性化措施原意良善，但勞工是否終將受制於企業文化、績效壓力等隱性因素，而形成「看得到卻不敢使用」的情況，或僅限於公部門及大型企業員工得以適用，其政策實際效益仍有待觀察。"}, {"title": "社論/Fed鬥爭暗潮趨向白熱化", "source": "經濟日報 A02 話題", "cat": "社論與評論觀點", "priority": 0, "summary": "美國聯準會（Fed）29日會議決定維持利率不變，不僅完全符合預期，而且這項利率決策竟然淪為配角。各界關注的焦點轉到這次會議投下的兩枚震撼彈；其一是現任主席鮑爾保證他在5月15日主席任期屆滿後將繼續留任理事，其二是有三位決策委員反對Fed在會後聲明中出現暗示「降息」。", "full_text": "美國聯準會（Fed）29日會議決定維持利率不變，不僅完全符合預期，而且這項利率決策竟然淪為配角。各界關注的焦點轉到這次會議投下的兩枚震撼彈；其一是現任主席鮑爾保證他在5月15日主席任期屆滿後將繼續留任理事，其二是有三位決策委員反對Fed在會後聲明中出現暗示「降息」。\n\n這將使下任主席華許對Fed進行「體制改變」的願景面臨重大障礙，而他的降息主張在短期內也將難以落實。鮑爾在會後記者會上保證他在主席任滿之後，將留任理事「一段期間」，此舉打破 Fed數十年來主席卸任後便同時走人的慣例。但慣例並非法律，鮑爾依法有權留任；\n\n何況川普一再攻擊Fed的獨立性，早已打破總統與Fed之間的傳統關係。鮑爾決定留任理事至少有四點原因。第一，也是最重要的，就是提出調查案檢察官皮羅雖已撤回對鮑爾的刑事調查，但她表示未來仍可能重啟調查，代理檢察長布南奇也暗示這項調查仍然存在。\n\n這都顯示鮑爾完全離開 Fed的「最低門檻」並未得到滿足。第二，鮑爾留任，讓他有時間評估華許如何捍衛Fed的獨立性；第三，阻擋川普再任命一位理事；\n\n第四，為其他理事創下一個不在任期屆滿之前就離職的範例。鮑爾留任，Fed將出現先、後兩任主席同時出席決策會議的尷尬場面，而且川普政府必然將繼續猛烈攻擊鮑爾。但以鮑爾綿裡藏針的行事風格，加上律師背景，應可坦然以對，並伺機反擊。\n\n鮑爾留任的直接效應，就是現任的「川派」理事米倫必須離職，為華許空出理事（兼主席）位置。儘管現任理事沃勒與鮑蔓都是川普在第一任期時所任命，但兩人與川普的淵源並不深，沃勒最近更警告「伊朗戰爭使美國經濟面臨通膨震撼風險」。如此一來，華許上任後很可能淪為「光桿司令」，難以拆毀 Fed的既有體制，以及開革地區性聯準銀行總裁的可能性。\n\n華許接到的第二枚震撼彈，就是這次會議中有三位委員投下「異議」票。他們並非反對利率不變，而是主張將會後聲明中暗示Fed偏向「降息」的字眼刪除。這幾個字意思是「在考慮額外的調整幅度與時機時（Inconsidering the extent and timing of additional adjustments）」，表面上看似乎是「中性」，但由於之前都是降息，因此「額外」便是在暗示利率偏向下降；\n\n如果刪除，就意味Fed下一步是降息與升息的機率相當，因為中東戰爭使能源價格大幅上漲，對通膨造成重大威脅。如果政策聲明做出此種改變，等於是暗示降息已經出局，本身就會使金融情勢變緊。這次多數官員雖還不準備做出如此偏向「鷹派」的動作，但至少顯示華許就任後將遭遇重大的降息阻力。\n\n最後再看華許的政策主張。金融市場普遍認為華許一向屬於「鷹派」，現在卻因為政治原因而變成「鴿派」。但是這顯然忽略了華許低利率政策架構中最重要的一點，就是華許一直偏向「供給面」，認為人工智慧（AI）等新科技將帶動生產力及經濟成長大幅提升，既導致通膨下降，並且使勞動市場出現「創造性毀滅」，失業激增，因此可能需要寬鬆的貨幣政策。\n\n目前美國經濟成長依然熱絡，但就業卻明顯降溫，與華許的思維若合符節。另一方面，為顧及通膨，華許主張縮減Fed的資產負債表規模，作為降息的交換條件。華許是「貨幣學派」的信徒，認為通膨是貨幣供給過多所致，因此以縮表作為釜底抽薪的工具。\n\n目前Fed既維持利率不變，但同時又重新買進公債，兩種作法顯然相互矛盾。不過他這項主張不僅在Fed內部可能遭到抵制，也會引起大銀行的反對，因為縮表將使金融情勢變緊。總之，華許5月即將就任主席，鮑爾卻留任理事不走，加上Fed內部「鷹派」勢力抬頭，以及川普政府勢必將繼續攻擊鮑爾；\n\nFed的內鬥與外鬥都將趨向白熱化，貨幣政策出現錯誤的風險也將升高。"}, {"title": "社論》在野以拖待變 等「解放軍準備好了」？", "source": "自由時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "立法院正在審議的「國防特別條例草案」，攸關台灣能否加快腳步，建構更完整的不對稱戰力。行政院去年十一月提出一兆二千五百億元版本後，藍白兩黨幾乎週週聯手阻擋排審。直到國內民意反彈、美國行政與國會部門公開敦促，國民黨與民眾黨才分別提出三千八百億與四千億元版本交付審議。", "full_text": "立法院正在審議的「國防特別條例草案」，攸關台灣能否加快腳步，建構更完整的不對稱戰力。行政院去年十一月提出一兆二千五百億元版本後，藍白兩黨幾乎週週聯手阻擋排審。直到國內民意反彈、美國行政與國會部門公開敦促，國民黨與民眾黨才分別提出三千八百億與四千億元版本交付審議。\n\n然而，這項不足十條條文的法案，朝野黨團已歷經三度協商，進度依舊牛步，下週能否通過充滿變數。雖然部分國民黨立委主張將預算提高至八千億元，與黨中央意見相左，但尚未形成有力的集體主張，與政院版仍有明顯差距。當中共加速挑釁印太區域，我們提升國防戰力的時間極為急迫。\n\n在野黨從阻擋到拖延，如今又陷入內部喬不定的戲碼，令人質疑是否刻意「以拖待變」，企圖讓軍購案胎死腹中。賴清德總統去年推出國防特別預算案，藍白攻訐不斷，但多屬誤導。其中最大謬誤，是在野黨堅持必須先有美國軍售「發價書」，才能展開條例與預算審議。\n\n然而，發價書並非一般商業往來的報價單，而是美方同意供售的正式文件。軍購流程是我方先遞交「要價書」，表達採購意願並了解價格；待美方完成審查並決定供售後，才會發出「發價書」。\n\n換言之，一旦收到發價書，便代表進入付款階段。此次美方供售的海馬士多管火箭系統，就因國防特別條例在立法院遭卡，導致首期款無法支付，還出現由美方先代墊的尷尬情形。在野黨將「收到發價書」作為審議預算的必要條件，等於預示未來軍購款項都可能延遲。\n\n一旦個案變成通例，軍購將屢屢陷入簽約後卻無錢支應的窘境，甚至迫使軍方連提出「要價書」都趨於保守，等於實質阻擋未來的軍購。這既傷害台美關係，更讓國際懷疑我們的自我防衛決心。藍白另一項謬誤，是反對特別預算涵蓋國防自主、台美研發合作等約三至四千億元的「商購」、「委製」項目，要求回歸年度預算編列。\n\n這部分正是行政院版八年一兆二千五百億元的重要拼圖，透過規模化與穩定性的預算支應，結合國內外廠商建構「台灣之盾」，並打造「非紅供應鏈」。美方對此亦給予肯定與支持。然而，在野黨無視年度預算僅剩不足百億元的編列空間，執意不讓納入特別預算。\n\n國民黨主席鄭麗文甚至嗆說「死了這條心」。從烏俄戰爭到伊朗戰事，一再證明無人機等載具在戰場上的關鍵作用，專家更強烈建議我們應加速產製與購買，在台海防衛構築「地獄景象」，嚇阻共軍入侵。面對中共正大量生產無人載具，我們必須以更快速度應對。\n\n反之，對美軍購延宕，國防自主遭封殺，國防準備敵快我慢，差距勢必愈來愈大。助長中共謀台野心，將使台灣更陷危機。立法院長韓國瑜已經主持三次朝野協商，幾乎原地打轉。\n\n韓本週一協商原擬挑燈夜戰，結果不到三十分鐘便宣布散會。此外，為了擋下部分藍委推動八千億元版本，鄭麗文週二接受專訪先行定調，週三再聯手國民黨團總召傅崐萁，試圖在黨團大會強壓黨籍立委接受黨中央堅持的三千八百億版本。黨副主席更警告韓國瑜莫「賣黨求榮」，推其他提高預算的版本。\n\n國民黨內的軍購之亂很熱鬧，但不同於黨中央路線的藍委，至今尚未展現集體性的反制作為，替代版本也仍保守，未如政院版反映台灣的防衛需求。鄭麗文赴中見到習近平，宛如獲得紅色加持，對軍購案從阻擋到拖延，再強行拉回被批評為「閹割版」的杯葛立場，協商進度回到原點。藍營內鬥戲碼不斷，軍購案卻毫無進展，令人懷疑這正是「以拖待變」的策略。\n\n美國總統川普與習近平的「川習會」預計五月中旬登場。鄭麗文先前赴中「求和」，再到延宕國防特別預算案，正好成為習近平在美中談判桌上的籌碼。當台灣呈現給國際社會是不願積極承擔自我防衛責任的形象，勢必增加中共向美國遊說減少對台軍售或調整台海政策的機會。\n\n在野黨經常說台灣不該成為美中之間的交易棋子，但如今的拖延，反倒更像是「自我實現的諾言」。中共正利用媚中的鄭麗文在國會牽制兩個在野黨，進而鼓吹台灣減少防務才能換取台海和平的謬論。正如某位退役艦長近日登上共艦，竟跪舔著說「看到解放軍在進步，不會腿軟」、「看艙內整潔和文宣品，就知道解放軍準備好了」。\n\n貶低自己、誇耀敵人，正是部分在野人士的嘴臉。如今藍白對軍購案以拖待變，敵長我消，難道真要等到「解放軍準備好了」才甘心嗎？"}, {"title": "社論/雙重剝削：農產對美門戶洞開，對陸緊閉大門", "source": "聯合報 A02 焦點", "cat": "社論與評論觀點", "priority": 0, "summary": "繼放寬發芽馬鈴薯進口後，美國花生又將挾著「零關稅」及「豁免特別防衛措施」（ＳＳＧ）雙重利刃大舉攻台，而這不過是賴政府口中「漂亮全壘打」的台美對等貿易協定（ＡＲＴ）中的一道「前菜」。農民一方面要承受低價農產傾銷衝擊，另方面又因賴政府的意識形態作祟對大陸緊閉大門，失去潛在的廣大市場。一放一收間，形成了雙重剝削，全是賴政府政治凌駕民生種下的惡果。", "full_text": "繼放寬發芽馬鈴薯進口後，美國花生又將挾著「零關稅」及「豁免特別防衛措施」（ＳＳＧ）雙重利刃大舉攻台，而這不過是賴政府口中「漂亮全壘打」的台美對等貿易協定（ＡＲＴ）中的一道「前菜」。農民一方面要承受低價農產傾銷衝擊，另方面又因賴政府的意識形態作祟對大陸緊閉大門，失去潛在的廣大市場。一放一收間，形成了雙重剝削，全是賴政府政治凌駕民生種下的惡果。\n\nＡＲＴ二月間正式簽署時，賴政府高調宣傳成功爭取調降對等關稅，且有二六一項農產品豁免對等關稅，卻對一四八二項零關稅、卅一項調降至特定稅率的農產品輕輕帶過。美國貿易代表署三月底發布《各國貿易評估報告》，其間揭露賴政府對美全盤讓步、任憑予取予求的真相，甚至不惜犧牲食安與產業，大舉放寬美豬美牛及馬鈴薯、花生的進口標準。根據新規，進口美國馬鈴薯若發現發芽，無需整批退運，可送至指定加工廠進行選別後再製成食品。\n\n至於如何處理發芽馬鈴薯，衛福部與農業部不僅毫無章法，官員還在國會殿堂上演互踢皮球的難堪戲碼。行政院長卓榮泰更做出「逐顆檢查」的承諾，遭部屬打臉，外界訕笑。從官員到閣揆，一路失格。\n\n更可議的是，早在ＡＲＴ簽署前一周，農業部二月六日就公告訂定「美國產加工用馬鈴薯輸入檢疫條件」。亦即，合約尚未簽訂，農業部已忙著配合美方修改檢疫規定。這種毫無尊嚴的「配合度」，令人瞠目結舌。\n\n繼馬鈴薯後，美國花生也挾零關稅與豁免特別防衛機制雙利器兵臨城下，農業部的回應仍荒腔走板。農業部先稱，美國進口花生僅占進口一％，衝擊不大。問題是，目前美國去殼花生每公斤八十五．五元，約為本土花生一五○至一六○元價格之半，而此價格是計算配額內稅率與權利金的結果。\n\n若去除關稅及ＳＳＧ的雙重保護，美國花生到岸價格僅四十七元，為本土價格的三分之一。就連綠委都坦言，「吃習慣後，就不是只有一％」。面對如此劇烈的衝擊，農業部輕描淡寫在前，然後才匆忙提出輔導農民轉作、推動濕莢交易配套，除不切實際，更是緩不濟急，顯示農業部事前根本毫無因應方案。\n\n國內近九成花生均來自雲林，縣長張麗善憂心此舉將「滅農」；陳駿季竟稱，張麗善是「唱衰台灣、為選舉炒作」。農業部失職在先，還以政治性操作攻擊為農民發聲的縣市首長，目的只在掩飾自己的不作為。\n\n事實上，接下來還有更多美國低關稅或零關稅農產品將陸續叩關，依農業部這樣的態度，「滅農」之說絕非危言聳聽。另一方面，由於兩岸關係緊張，大陸幾年前對台多項農漁產品祭出禁令，農業部不斷宣稱已開拓多元外銷市場有成。但統計顯示，去年出口值比前年減少四．七億美元，年減近一成。\n\n農產品貿易逆差則擴大為一四二．六億美元，過去五年，出口下滑超過廿％。兩岸因地理及文化相近，是其他海外市場難以取代的優勢；從數據即可看出，台灣農漁產品出口大陸之萎縮，其缺口並非他國市場所能填補。\n\n賴政府對美國產品門戶洞開，對大陸釋出的經濟利多卻又緊閉大門。鄭習會後，陸方釋出十項利多措施，其中包括推動符合檢疫標準的台灣農漁產品進入大陸市場，卻被賴政府以「統戰」之名拒於門外。農民一方面要承受美國農產品的大軍壓境，一方面要承受農產品因政治阻撓無法輸陸的雙重壓迫；\n\n賴政府如此雙標，心中對人民竟無一絲悲憫嗎？"}, {"title": "社論／大陸民企出海 展現國家戰略韌性", "source": "中國時報 AA02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "大陸第一季經濟成長率5％，優於市場預期的4.8％，也較去年第四季4.5％略增。其中代表新質生產力的裝備製造業、高技術製造業增加值年增8.9％、12.5％，比傳統製造業的6.1％要好。若再細分，工業機器人及積體電路等製造業表現更為優異，分別較去年同期成長33.2％及24.3％。", "full_text": "大陸第一季經濟成長率5％，優於市場預期的4.8％，也較去年第四季4.5％略增。其中代表新質生產力的裝備製造業、高技術製造業增加值年增8.9％、12.5％，比傳統製造業的6.1％要好。若再細分，工業機器人及積體電路等製造業表現更為優異，分別較去年同期成長33.2％及24.3％。\n\n可見大陸產業轉型升級進展順利，新質生產力已成為經濟成長新支柱。新質生產力成出口主力大陸2011年啟動十二五規劃，就開始推動製造業結構轉型，如今初步有成，接著將轉型重心移往出口結構，以「新三樣」產品為出口主力，希望在內外複雜情勢下，找到長期增長動能。結構調整必須付出成本與代價，譬如房地產、水泥、石化、鋼鐵等傳統產業，在轉型過程中被犧牲。\n\n但這不見得是壞事，只要轉型成功，效果顯而易見，第一季經濟成長數字就是證明。值得注意的是，隨著經濟、產業、出口等結構的優化，對外投資結構也跟著轉變，由國企主導模式轉向民企主導，民企布局以市場需求為主，強調生產效率、技術提升與供應鏈安全。隨著新質生產力全面推動，民企角色也變得愈加吃重。\n\n4月上旬，經濟學人智庫舉辦一場中國對外投資研討會，會後結論明確點出，民企將取代國企成為出海主力。轉變並不令人意外，在「中國走出去」戰略初期及「一帶一路」倡議高峰期，國企在政府主導下，憑藉雄厚資本與國家信用，廣泛在世界各地進行能源開發、港口建設與大宗物資布局。2012年中海油收購加拿大上市油氣公司尼克森、2016年中遠海運收購希臘最大港口管理局等，都是當時鮮明的案例。\n\n這些收購案背後有滿足國家戰略儲備與基礎設施需求的目標。隨著國際政治環境的轉變，西方國家對大陸國企背景的敏感度提升，這種由上而下的擴張模式，面臨嚴格的合規性挑戰與審查壓力。與此同時，大陸內部也經歷了全面性的結構調整，高科技民企崛起。\n\n多重因素交織下，民企開始填補國企留下的戰略空白。地緣風險中保持競爭力根據普華永道（pwc)最新發布的《2025年中國企業併購市場回顧與展望》，2025年陸企海外併購案共272件，其中民企發起比重達66％，已連續三年成為陸企海外併購最活躍主體，明顯高於國企的8％。安永發布的《2025年中國海外投資概覽》亦指出，若按交易件數來區分，2025年陸企海外併購集中於先進製造與運輸及科技、媒體娛樂與電信，其中以京東收購德國大型零售集團 Ceconomy、騰訊收購法國遊戲開發商育碧子公司最具代表性。\n\n面對此一趨勢，大陸決策高層需與時俱進，適時轉換思維並調整作法。長期以來，大陸對外投資政策重心與資源分配，往往優先向國企傾斜。面對地緣衝突升溫與全球供應鏈重組加速，國企優先的作法，不但無助陸企拓展海外市場，甚至可能會招致反效果。\n\n特別是各國對大陸國企海外併購，防禦心日重，將資源移轉到民企是務實的策略。民企海外投資的彈性與靈活度，將擁有更大的生存與擴張空間。以寧德時代為例，近年藉由在歐洲及印尼的海外投資布局，不僅讓自己更貼近全球汽車製造商，同時也規避掉部分貿易壁壘，維持全球電池龍頭地位。\n\n站在供應鏈安全角度，大陸中央支援民企出海，是分散市場風險的重要手段。除了可直接鏈結當地市場資源外，更可作為海外備援生產基地，避免斷鏈危機。若說國企出海是中國參與全球化的1.0版，側重於資源與基建，民企出海就是2.0版，強調市場需求與供應鏈安全。\n\n產業結構的調整與轉變，絕非僅是企業自身獲利的考量，更是大陸在地緣政治風險中保持競爭優勢的關鍵。也因為如此，未來如何在政策資源上，給予民企更多實質性幫助，將其海外布局視為國家戰略韌性的一環，將是北京重要的課題。"}, {"title": "社論／挺直脊梁審預算 別胡扯認同", "source": "中國時報 A02 焦點新聞", "cat": "社論與評論觀點", "priority": 0, "summary": "自從鄭麗文赴大陸訪問後，台灣原本存在的問題，尤其是軍購爭議，國民黨內部對此不但沒有共識，爭論不休，而民進黨更是把軍購案歸因於大陸因素。事實上，無論鄭麗文有沒有去大陸，軍購問題早已存在。原本就必須理性討論，正視主流民意的變化，朝野對話，尋求解決之道，而不是高舉美國巨棒，以霸凌民意為能事。", "full_text": "自從鄭麗文赴大陸訪問後，台灣原本存在的問題，尤其是軍購爭議，國民黨內部對此不但沒有共識，爭論不休，而民進黨更是把軍購案歸因於大陸因素。事實上，無論鄭麗文有沒有去大陸，軍購問題早已存在。原本就必須理性討論，正視主流民意的變化，朝野對話，尋求解決之道，而不是高舉美國巨棒，以霸凌民意為能事。\n\n美國誠信民眾擔憂民進黨自始有一個說法：鄭麗文的中國人認同，使得台灣內部降低敵我意識，藍白與北京共謀，阻止軍購，破壞國安。這是一個非常嚴重而荒謬的指控。最大的錯誤在於，軍購案跟民族認同一點關係都沒有。\n\n問題根源在於台灣老百姓早已非常厭惡美國的言而無信，甚至明著要錢；採購的軍備不按時程交貨，違背誠信原則。每一個老百姓都心知肚明，任何一家公司要採購，都必須列出採購清單，才能編列預算，採購還要訂合約，註明什麼時候交貨檢驗。\n\n而民進黨政府的軍購，採購什麼不清不楚，沒有清單，沒有預算細目，只會一直要求立法院通過。難怪學者笑它是「無菜單料理」。更誇張的是，台灣所買來的美國飛機乃至於飛彈，原始碼掌握在美國手裡，台灣完全沒有自主權。\n\n換言之，這些武器能不能使用，飛機能不能起飛，飛彈能不能射出去，根本不是控制在台灣手裡，而是美國直接掌握。那麼，買這些武器有什麼用？中共打來的時候，美國按住武器，你能防備嗎？\n\n就算當個看門狗，好歹也要有一點咬人的權利吧？而現在的軍購，沒有購買清單，只有賴總統忽然喊出1.25兆，然後強迫國會接受，強迫全民埋單。民間正在流傳一種說法：美國為什麼要錢要得那麼急？\n\n是不是想利用川普去北京之前，先把台灣能夠榨到的錢先榨乾了，到時候川普要怎麼「賣」，就無所顧忌了。民間擔憂，錢都給了，他把你賣了，你還毫無辦法。不如先把軍購握在手上當籌碼，等川習會後再說。\n\n這麼通俗而現實的民意，老百姓都想得到，各政黨怎麼會不懂呢？可是民進黨不回答這個問題，卻把實際且必須理性對待的事，歸諸於風馬牛不相及的「中國人認同」，就是要刻意模糊焦點。國民黨內當然也有不少「反共」人士，骨子裡和民進黨唱同調。\n\n事實上，中國人認同跟台灣人認同兩者根本不矛盾。過去有民意調查總喜歡在認同問題上作文章，把「你認同自己是中國人還是台灣人」當選項，但這根本是一個「白馬非馬」的問題。台灣人與中國人本來並不矛盾，白馬當然還是一匹馬。\n\n這正如今天在台北市做民調，問台北人說「你覺得自己是台北人還是台灣人」，大部分人會說自己是台北人，但這樣的結論可以說台北人不是台灣人嗎？沒有對立意義的名詞，刻意搞對立，得出這樣的結論有意義嗎？抹紅抹黑模糊焦點更何況，從鄭成功開台以「反清復明」為大志，到清朝大量移民認同唐山過台灣的原鄉意識；\n\n再到日本時代充滿反抗精神的文化協會、 農民組合運動、台灣民眾黨、工友總聯盟等，莫不充滿中國人意識。這是移民者對原鄉的精神歸依，也是對父祖之國的回報。乃至於光復後，台灣人馬上拋掉日本人強迫祭拜的天照大神，歡天喜地拿出祖先牌位，見證慎終追遠的信念。\n\n而今，為了政權一時的利益而想切割原鄉精神，那註定是無用的。畢竟政權是一時的，而中華民族文化認同卻是恆遠的。幾百年後，世間不知會輪換過幾個朝代，現在的執政黨早已灰飛煙滅，但中華文化認同終將永存。\n\n今天，軍購預算不好好編列，朝野協商不好好談，只會用抹紅抹黑的手段，把它變成「中國人認同」問題，根本就是故意模糊焦點。不檢討美國的言而無信，軍購項目符不符合戰略需求，更不追究美國原始碼不交給我國軍隊。這些事都不討論，一群人竟吵得像比賽誰更適合當美國小弟，這國會還有一點脊梁嗎？\n\n請聽聽台灣民間的聲音吧！軍購是國家政略與國防戰略問題，涉及對美外交和兩岸關係，也涉及國家財政和人民觀感，不是市場買菜。不論是買武器或賣武器的，都要好好坐下來談，拿出清單，理性討論，而不是漫天喊價、就地還價，不要威脅恐嚇，更不要再鬼扯淡了！"}];

    btn.dataset.cat = cat;
    btn.textContent = DEPTS[cat] ? DEPTS[cat].short : cat;
    btn.onclick = () => openCatView(cat);
    bar.appendChild(btn);
  });
  document.getElementById('must-stat-btn').onclick = () => openCatView('must');
}

function setActiveNav(cat) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
}

// ── 跑馬燈 ──
function buildTicker() {
  const items = DATA.filter(i => i.priority === 1);
  const bar = document.getElementById('ticker-bar');
  if (!items.length) { bar.style.display = 'none'; return; }
  const html = items.map((item, i) => {
    const idx = DATA.indexOf(item);
    return `<span class="t-item" onclick="openArticle(${idx})">${esc(item.title)}</span><span class="t-sep">／</span>`;
  }).join('');
  const track = document.getElementById('ticker-track');
  track.innerHTML = html + html; // 複製一份讓捲動無縫
}

// ── 頭條 ──
function buildTopStory() {
  const wrap = document.getElementById('top-story-wrap');
  const top = DATA.find(i => i.priority === 1) || DATA[0];
  if (!top) return;
  const idx = DATA.indexOf(top);
  wrap.innerHTML = `
    <div class="top-story" onclick="openArticle(${idx})">
      ${top.priority===1 ? '<div class="ts-red-bar"></div>' : '<div class="ts-black-bar"></div>'}
      <div class="ts-meta">
        <span class="ts-cat">${esc(top.cat)}</span>
        ${top.priority===1 ? '<span class="ts-badge">頭版要聞</span>' : ''}
      </div>
      <h2 class="ts-title">${esc(top.title)}</h2>
      <p class="ts-summary">${esc(top.summary)}</p>
      <div class="ts-footer">
        <span class="ts-src">${esc(top.source)}</span>
        <span class="ts-more">閱讀全文 →</span>
      </div>
    </div>`;
}

// ── 次要新聞 ──
function buildSubNews() {
  const wrap = document.getElementById('sub-news-wrap');
  const items = DATA.slice(1, 8);
  if (!items.length) return;
  const rows = items.map((item, i) => {
    const idx = DATA.indexOf(item);
    return `
      <div class="sub-row${item.priority===1?' sub-must':''}" onclick="openArticle(${idx})">
        ${item.priority===1
          ? '<div class="sub-dot-red"></div>'
          : `<div class="sub-num">${i+1}</div>`}
        <div class="sub-body">
          <div class="sub-cat">${esc(item.cat)}</div>
          <div class="sub-title">${esc(item.title)}</div>
          <div class="sub-src">${esc(item.source)}</div>
        </div>
      </div>`;
  }).join('');
  wrap.innerHTML = `
    <div class="sub-header">更多要聞</div>
    <div class="sub-list">${rows}</div>`;
}

// ── 側欄：今日必看 ──
function buildMustList() {
  const list = document.getElementById('must-list');
  const items = DATA.filter(i => i.priority === 1);
  if (!items.length) { document.getElementById('must-block').style.display='none'; return; }
  items.slice(0,8).forEach(item => {
    const idx = DATA.indexOf(item);
    const el = document.createElement('div');
    el.className = 'must-item';
    el.innerHTML = `
      <div class="mi-cat">${esc(item.cat)}</div>
      <div class="mi-title">${esc(item.title)}</div>
      <div class="mi-src">${esc(item.source)}</div>`;
    el.onclick = () => openArticle(idx);
    list.appendChild(el);
  });
}

// ── 側欄：分類總覽 ──
function buildCatOverview() {
  const wrap = document.getElementById('cat-overview');
  CAT_ORDER.forEach(cat => {
    const cnt = DATA.filter(i => i.cat===cat).length;
    if (!cnt) return;
    const must = DATA.filter(i => i.cat===cat && i.priority===1).length;
    const dept = DEPTS[cat] || {};
    const el = document.createElement('div');
    el.className = 'co-row';
    el.innerHTML = `
      <span class="co-name">${esc((dept.icon||'')+' '+(dept.short||cat))}</span>
      <span class="co-right">
        <span class="co-cnt">${cnt}</span>
        ${must ? `<span class="co-must">${must}必看</span>` : ''}
      </span>`;
    el.onclick = () => openCatView(cat);
    wrap.appendChild(el);
  });
}

// ── 各分類新聞區塊 ──
function buildAllSections() {
  const container = document.getElementById('all-section-inner');
  CAT_ORDER.forEach(cat => {
    const items = DATA.filter(i => i.cat===cat);
    if (!items.length) return;
    const dept = DEPTS[cat] || {};
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.innerHTML = `
      <div class="cs-header">
        <span class="cs-icon">${dept.icon||''}</span>
        <span class="cs-title">${esc(cat)}</span>
        <span class="cs-count">${items.length} 則</span>
        <button class="cs-more" onclick="event.stopPropagation();openCatView('${cat}')">查看全部 →</button>
      </div>
      <div class="cs-grid" id="csg-${cat.replace(/\W/g,'_')}"></div>`;
    container.appendChild(sec);
    const grid = sec.querySelector('.cs-grid');
    items.slice(0,6).forEach((item, i) => {
      const idx = DATA.indexOf(item);
      const card = document.createElement('div');
      card.className = 'cs-card' + (item.priority===1?' cs-must':'') + (i===0?' cs-lead':'');
      card.innerHTML = `
        ${item.priority===1 ? '<div class="cs-red-stripe"></div>' : ''}
        <div class="cs-card-cat">${esc(item.cat)}</div>
        <div class="cs-card-title">${esc(item.title)}</div>
        ${i===0 ? `<div class="cs-card-summary">${esc(item.summary)}</div>` : ''}
        <div class="cs-card-src">${esc(item.source)}</div>`;
      card.onclick = () => openArticle(idx);
      grid.appendChild(card);
    });
  });
}

// ── 分類頁 ──
function openCatView(cat) {
  const isMust = cat==='must';
  const items = isMust ? DATA.filter(i=>i.priority===1) : DATA.filter(i=>i.cat===cat);
  document.getElementById('cat-view-title').textContent = isMust ? '頭版要聞' : cat;
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  items.forEach(item => {
    const idx = DATA.indexOf(item);
    const row = document.createElement('div');
    row.className = 'list-row' + (item.priority===1?' list-must':'');
    row.innerHTML = `
      <div class="lr-inner">
        ${item.priority===1 ? '<div class="lr-red-bar"></div>' : ''}
        <div class="lr-meta">
          <span class="lr-cat">${esc(item.cat)}</span>
          ${item.priority===1 ? '<span class="lr-must-tag">頭版</span>' : ''}
        </div>
        <div class="lr-title">${esc(item.title)}</div>
        <div class="lr-summary">${esc(item.summary)}</div>
        <div class="lr-footer">
          <span class="lr-src">${esc(item.source)}</span>
          <span class="lr-cta">閱讀全文 →</span>
        </div>
      </div>`;
    row.onclick = () => openArticle(idx);
    list.appendChild(row);
  });
  showView('cat-view');
  setActiveNav(isMust ? 'all' : cat);
}

// ── 文章頁 ──
function openArticle(idx) {
  const item = DATA[idx];
  const dept = DEPTS[item.cat] || {};
  document.getElementById('art-cat-label').textContent = (dept.icon||'') + ' ' + item.cat;
  document.getElementById('art-nav-cat').textContent = item.cat;
  document.getElementById('art-title').textContent = item.title;
  document.getElementById('art-source').textContent = '來源：' + item.source;
  document.getElementById('art-summary').textContent = item.summary;
  document.getElementById('art-summary-block').style.display = item.summary ? 'block' : 'none';
  document.getElementById('art-body').innerHTML =
    (item.full_text || '尚未擷取到內文內容').split('\n\n').map(p => '<p>' + esc(p.trim()) + '</p>').join('');
  const fromCat = currentView === 'cat-view';
  document.getElementById('art-back-btn').onclick = fromCat ? () => showView('cat-view') : () => closeArticle();
  showView('article-view');
  history.pushState({view:'article',idx}, '');
}

function closeArticle() {
  if (history.state && history.state.view==='cat-view') showView('cat-view');
  else goHome();
}

// ── View 管理 ──
var currentView = 'home-view';
function showView(id) {
  ['home-view','cat-view','article-view'].forEach(v =>
    document.getElementById(v).style.display = v===id ? 'block' : 'none');
  document.getElementById('section-nav').style.display = id==='home-view' ? 'block' : 'none';
  document.getElementById('masthead').style.display = id==='home-view' ? 'block' : 'none';
  document.getElementById('utility-bar').style.display = id==='home-view' ? 'block' : 'none';
  currentView = id;
  window.scrollTo(0,0);
}
function goHome() {
  showView('home-view');
  setActiveNav('all');
}

window.addEventListener('popstate', () => {
  if (currentView==='article-view') closeArticle();
  else if (currentView==='cat-view') goHome();
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (currentView==='article-view') closeArticle();
    else if (currentView==='cat-view') goHome();
  }
});

// ── 初始化（全部在 IIFE 內，確保 DOM 已就緒）──
(function() {
  buildNav();
  buildTicker();
  buildTopStory();
  buildSubNews();
  buildMustList();
  buildCatOverview();
  buildAllSections();
  showView('home-view');
})();
</script>
</body>
</html>
